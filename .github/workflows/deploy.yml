name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so check_translations can read git timestamps
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Validate schema
        run: uv run python -m build.validate

      - name: Lint schema content
        run: uv run python -m build.lint

      - name: Check translation completeness and staleness
        run: uv run python -m build.check_translations

      - name: Build vocabulary data
        run: uv run python -m build.build

      - name: Copy downloads to site
        run: rsync -a --include='*.csv' --include='*.xlsx' --include='*/' --exclude='*' dist/downloads/ site/public/

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Build site
        uses: withastro/action@v6
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
