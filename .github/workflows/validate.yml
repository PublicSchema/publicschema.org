name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the translation-staleness check can read git
          # timestamps across files.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - run: uv sync

      - name: Validate schema
        run: uv run python -m build.validate

      - name: Run tests
        run: uv run pytest

      - name: Check translation completeness and staleness
        run: uv run python -m build.check_translations

      - name: Build vocabulary data
        run: uv run python -m build.build

      - name: Copy downloads to site
        run: rsync -a --include='*.csv' --include='*.xlsx' --include='*/' --exclude='*' dist/downloads/ site/public/

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Build site
        uses: withastro/action@v6
        with:
          path: site
