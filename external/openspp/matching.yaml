    child: child
    child_in_law: in_law
    grandchild: grandchild
    parent: parent
    parent_in_law: in_law
    grandparent: grandparent
    sibling: sibling
    other_relative: other
    non_relative: other
    parent_organization: null
    subsidiary: null
    partner_organization: null
    affiliated_with: null
