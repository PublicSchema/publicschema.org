- v2_vocabulary: grievance-status
  external_vocabulary: GRMTicketStageType
  surface: internal_model
  api_coverage: none
  external_source: spp_grm/models/grm_ticket_stage.py
  confidence: medium
  notes: OpenSPP GRMTicketStageType categorizes ticket stages for workflow logic. GRM is not exposed through
    the REST API v2 (no grm resource in spp_api_v2*/schemas/). 'new' maps to v2 'submitted'. 'in_progress'
    and 'waiting' both map to 'under_review'. 'escalated' to 'escalated'. 'resolved' to 'resolved'. 'closed'
    to 'closed'. 'cancelled' has no direct v2 equivalent; v2 does not model grievance cancellation as
    a distinct status. V2 'rejected' has no OpenSPP equivalent in GRMTicketStageType (rejection is tracked
    via the GRMTicketDecision field instead).
  value_mapping:
    new: submitted
    in_progress: under_review
    waiting: under_review
    escalated: escalated
    resolved: resolved
    closed: closed
    cancelled: null
  gaps:
    v2_only:
    - rejected
    external_only:
    - cancelled
    - waiting
- v2_vocabulary: event-severity
  external_vocabulary: HazardIncidentSeverity
  surface: internal_model
  api_coverage: none
  external_source: spp_hazard/models/hazard_incident.py
  confidence: low
  notes: 'v2 event-severity is used on HazardEvent to classify disaster impact (OASIS CAP v1.2). The domain-appropriate
    OpenSPP counterpart is HazardIncidentSeverity from spp_hazard (a 5-level numeric scale), not GRMTicketSeverity
    (which measures grievance urgency, a different domain). Semantic alignment is approximate: ''1'' (Minor)
    maps to ''minor'', ''2'' (Moderate) to ''moderate'', ''3'' (Significant) and ''4'' (Severe) both collapse
    to ''severe'', ''5'' (Catastrophic) to ''extreme''. Not exposed through the REST API v2.'
  value_mapping:
    '1': minor
    '2': moderate
    '3': severe
    '4': severe
    '5': extreme
  gaps:
    v2_only:
    - unknown
    external_only:
    - '3'
    - '4'
no_match:
- v2_vocabulary: benefit-frequency
  reason: OpenSPP does not have a vocabulary or selection enum for benefit delivery frequency. Cycle recurrence
    in OpenSPP is configured via date ranges and the Odoo recurrence infrastructure (RRULE), not a controlled
    vocabulary.
- v2_vocabulary: event-certainty
  reason: No OpenSPP vocabulary or selection for data certainty or confidence level on recorded attributes.
- v2_vocabulary: conditionality-type
  reason: OpenSPP does not expose a conditionality classification vocabulary. Whether a program is conditional
    or unconditional is implicit in program configuration, not a controlled vocabulary field.
- v2_vocabulary: delivery-channel
  reason: OpenSPP does not have a delivery channel vocabulary. Payment delivery mechanism is determined
    by the FSP (Financial Service Provider) configuration, not a separate enumeration.
- v2_vocabulary: grievance-type
  reason: OpenSPP GRM does not have a structured grievance category vocabulary in the extracted data.
    Ticket categorization is done through configurable category records (spp.grm.ticket.category), not
    a fixed selection enum, making a code-level mapping impossible without deployment-specific data.
- v2_vocabulary: hazard-type
  reason: OpenSPP spp_hazard module defines hazard incidents but does not expose a hazard type classification
    vocabulary or selection in the extracted data. Hazard types would be configured per deployment.
- v2_vocabulary: referral-status
  reason: OpenSPP does not have a referral module or referral lifecycle vocabulary in the extracted data.
    The spp_case_base module tracks intake source (including 'referral') but not outbound referral status.
- v2_vocabulary: targeting-approach
  reason: OpenSPP does not have a controlled vocabulary for targeting methodology. Targeting is implemented
    through configurable filter rules and scoring models (spp_scoring), not a classification vocabulary.
- v2_vocabulary: script
  reason: No OpenSPP vocabulary for writing scripts (ISO 15924). OpenSPP language vocabulary uses ISO
    639 codes only.
- v2_vocabulary: region
  reason: No OpenSPP vocabulary for UN M49 geographic regions. Country selection uses ISO 3166-1; regional
    groupings are not exposed as a controlled vocabulary.
external_excess:
- external_vocabulary: GRMTicketSeverity
  external_source: spp_grm/models/grm_ticket.py
  reason: GRMTicketSeverity (low/medium/high/critical) classifies grievance ticket urgency, not hazard
    impact. v2 event-severity is domain-specific to HazardEvent (OASIS CAP v1.2), so mapping grievance
    priority into it would conflate domains. v2 has no dedicated grievance-priority vocabulary; deployments
    that need one should define a separate severity scale rather than reuse event-severity.
- external_vocabulary: Religion (UN Census Framework)
  external_source: spp_vocabulary/data/vocabulary_religion.xml
  reason: PublicSchema v2 does not define a religion vocabulary. Religious affiliation is domain-specific
    and highly deployment-sensitive; the v2 schema treats it as a free-text or deployment-defined field.
- external_vocabulary: Disability Domain (Washington Group)
  external_source: spp_vocabulary/data/vocabulary_disability.xml
  reason: PublicSchema v2 does not have a disability domain vocabulary. Disability information is referenced
    as a property but the WG-SS domain classification (seeing, hearing, walking, etc.) is not in the v2
    vocabulary set.
- external_vocabulary: Disability Severity (Washington Group)
  external_source: spp_vocabulary/data/vocabulary_disability.xml
  reason: No v2 vocabulary for Washington Group severity levels (1-4 scale). Would need to be defined
    in v2 if disability data is to be represented.
- external_vocabulary: Disability Status
  external_source: spp_vocabulary/data/vocabulary_disability.xml
  reason: No v2 vocabulary for summarized disability status (Y/N/U). This is an OpenSPP-derived indicator,
