  api_endpoint: /api/v2/spp/Vocabulary/urn:openspp:vocab:relationship
  confidence: medium
  notes: OpenSPP covers individual-to-individual kinship and group-to-group organizational relationships.
    V2 covers individual kinship only. OpenSPP organizational codes (parent_organization, subsidiary,
    partner_organization, affiliated_with) have no v2 equivalent. OpenSPP 'child_in_law' and 'parent_in_law'
    map to v2 'in_law'. V2 adds guardian, caregiver, dependent, in_law, extended_family, payment_proxy,
