- v2_vocabulary: enrollment-status
  external_vocabulary: ProgramMembership.status
  surface: rest_api_v2
  external_source: spp_api_v2/schemas/program_membership.py#ProgramMembership.status
  api_field: ProgramMembership.status
  confidence: medium
  notes: The ProgramMembership.status field exposes ProgramMembershipState codes verbatim as a Literal
    pattern ^(draft|enrolled|paused|exited|not_eligible|duplicated)$. Internal source is spp_programs/models/program_membership.py.
    'draft' maps to v2 'pending_verification' (not yet confirmed). 'enrolled' maps to 'active'. 'paused'
    maps to 'suspended'. 'exited' maps to 'closed'. 'not_eligible' has no dedicated v2 enrollment-status
    code; it is a determination outcome, not an enrollment state. 'duplicated' has no v2 equivalent. V2
    'graduated' has no OpenSPP equivalent in this enum (graduation is handled by a separate spp_graduation
    module).
  value_mapping:
    draft: pending_verification
    enrolled: active
    paused: suspended
    exited: closed
    not_eligible: null
    duplicated: null
  gaps:
    v2_only:
    - graduated
    external_only:
    - not_eligible
    - duplicated
- v2_vocabulary: payment-status
  external_vocabulary: Entitlement.state + internal PaymentState / PaymentStatus
  surface: rest_api_v2
  external_source: spp_api_v2_entitlements/schemas/entitlement.py#Entitlement.state
  api_field: Entitlement.state
  notes_internal_sources:
  - 'spp_programs/models/payment.py (PaymentState: issued, sent, reconciled)'
  - 'spp_programs/models/payment.py (PaymentStatus: paid, failed)'
  - 'spp_programs/models/entitlement.py (EntitlementPaymentStatus: paid, notpaid)'
  confidence: medium
  notes: 'OpenSPP splits payment lifecycle across three separate internal enumerations; the API exposes
    the unified Entitlement.state (a free-form string in the schema; values come from the internal EntitlementState
    machine: draft, pending_validation, approved, trans2FSP, rdpd2ben, rejected, cancelled, expired).
    PaymentState and PaymentStatus are not surfaced directly through a payment-specific API resource.
    Together the internal enums cover the v2 payment-status codes, but there is no single one-to-one mapping.
    ''issued'' maps to ''pending'', ''sent'' to ''processing'' (in transit), ''reconciled'' to ''paid''
    (v2 does not distinguish reconciliation from paid). V2 ''returned'' has no OpenSPP equivalent. V2
    ''cancelled'' is covered by EntitlementState (cancelled, expired) rather than payment status fields.'
  value_mapping:
    issued: pending
    sent: processing
    reconciled: paid
    paid: paid
    failed: failed
    notpaid: pending
  gaps:
    v2_only:
    - returned
    - cancelled
    - rejected
    - partial
    external_only: []
