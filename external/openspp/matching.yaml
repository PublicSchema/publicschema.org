system: openspp
system_version: "19.0"
source_repository: "https://github.com/OpenSPP/OpenSPP2"
source_branch: "19.0"

# Scope: OpenSPP vocabularies mapped against PublicSchema v2 vocabularies.
#
# Primary target surface: OpenSPP REST API v2 (/api/v2/spp/...).
# Documented as Production/Stable, OAuth 2.0, auto-generated OpenAPI, Pydantic
# schemas under spp_api_v2*/schemas/. See external/openspp/README.md for why we
# target the API rather than internal Odoo models.
#
# Per-entry fields:
#   v2_vocabulary       PublicSchema vocabulary id
#   external_vocabulary Human-readable OpenSPP name
#   surface             rest_api_v2 | internal_model (see api_coverage)
#   external_source     Path relative to source_repository/source_branch/
#                       For vocabulary passthroughs this is the XML that the
#                       API serves unchanged. For Pass-B enums exposed through
#                       the API this is the Pydantic schema (ClassName.field).
#                       For internal_model entries this is the Odoo model file.
#   api_endpoint        REST path integrators consume (passthrough vocabularies)
#   api_coverage: none  Flag indicating no API surface maps this vocabulary;
#                       internal model is the canonical machine-readable source.
#   same_standard       Both sides reference the same international standard.
#   confidence          high | medium | low
#   notes, value_mapping, gaps (as before)
#
# Confidence levels:
#   high   - same standard or very close semantic alignment with clear code mapping
#   medium - similar concept, partial overlap or some codes don't map cleanly
#   low    - related domain but significant structural differences

matches:

  # -----------------------------------------------------------------------
  # Standard equivalences served by GET /api/v2/spp/Vocabulary/{uri}
  # The XML file is the authoritative code list; the API passes it through.
  # -----------------------------------------------------------------------

  - v2_vocabulary: country
    external_vocabulary: "Country (ISO 3166-1)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_country.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:iso:std:iso:3166"
    confidence: high
    same_standard: true
    notes: "Both use ISO 3166-1 alpha-2 codes. OpenSPP adds three non-standard codes (XA=Stateless, XK=Kosovo, ZZ=Unknown/Not Stated) not present in the v2 vocabulary."
    gaps:
      v2_only: []
      external_only:
        - XA  # Stateless
        - XK  # Kosovo
        - ZZ  # Unknown / Not Stated

  - v2_vocabulary: currency
    external_vocabulary: "Currency (ISO 4217)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_currency.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:iso:std:iso:4217"
    confidence: high
    same_standard: true
    notes: "Both use ISO 4217 alphabetic codes. OpenSPP XML is more complete (~180 codes) than the v2 sync from the Six Group XML, but the code space is identical."
    gaps:
      v2_only: []
      external_only: []

  - v2_vocabulary: language
    external_vocabulary: "Language (ISO 639)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_language.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:iso:std:iso:639"
    confidence: high
    same_standard: true
    notes: "Both use ISO 639-1 two-letter codes. OpenSPP adds three non-standard codes (sgn, und, zxx) for sign language, undetermined, and no linguistic content."
    gaps:
      v2_only: []
      external_only:
        - sgn  # Sign Language
        - und  # Undetermined
        - zxx  # No Linguistic Content

  - v2_vocabulary: occupation
    external_vocabulary: "Occupation (ISCO-08)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_occupation.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:ilo:isco:08"
    confidence: high
    same_standard: true
    notes: "Both use ISCO-08 codes. OpenSPP exposes two levels (major groups and sub-major groups, 53 codes total). The v2 vocabulary is synced from the same ILO standard."
    gaps:
      v2_only: []
      external_only: []

  # -----------------------------------------------------------------------
  # Value-level matches
  # -----------------------------------------------------------------------

  - v2_vocabulary: sex
    external_vocabulary: "Gender (ISO 5218)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_gender.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:iso:std:iso:5218"
    api_field: "Individual.gender.coding[system=urn:iso:std:iso:5218]"
    confidence: high
    same_standard: true
    notes: "OpenSPP stores numeric ISO 5218 codes (0, 1, 2, 9); v2 maps those same numeric codes to named identifiers. The API exposes this as a CodeableConcept on Individual.gender with system=urn:iso:std:iso:5218 (see spp_api_v2/schemas/individual.py example payload)."
    value_mapping:
      "0": not_known
      "1": male
      "2": female
      "9": not_applicable
    gaps:
      v2_only: []
      external_only: []

  - v2_vocabulary: education-level
    external_vocabulary: "Education Level (ISCED 2011)"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_education_level.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:unesco:isced:2011"
    confidence: high
    same_standard: true
    notes: "Both use ISCED 2011 levels 0-8. OpenSPP adds code 'N' (No Formal Education) and code '9' (Not Stated / Unknown) which have no v2 equivalents. The numeric codes 0-8 map directly."
    value_mapping:
      "0": early_childhood
      "1": primary
      "2": lower_secondary
      "3": upper_secondary
      "4": post_secondary_non_tertiary
      "5": short_cycle_tertiary
      "6": bachelor
      "7": master
      "8": doctoral
    gaps:
      v2_only: []
      external_only:
        - N   # No Formal Education (OpenSPP extension, not in ISCED 2011 standard)
        - "9" # Not Stated / Unknown (OpenSPP extension)

  - v2_vocabulary: marital-status
    external_vocabulary: "Marital Status"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_marital_status.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:openspp:vocab:marital-status"
    confidence: medium
    notes: "OpenSPP uses UN census letter codes (S, M, W, D, L, C). Both sides derive from the UN Principles and Recommendations for Population and Housing Censuses. OpenSPP 'C' (Consensual Union) maps to v2 'consensual_union'. All six OpenSPP codes map cleanly; v2 adds no extra codes beyond the UN set OpenSPP exposes."
    value_mapping:
      "S": never_married
      "M": married
      "W": widowed
      "D": divorced
      "L": legally_separated
      "C": consensual_union
    gaps:
      v2_only: []
      external_only: []

  - v2_vocabulary: relationship-type
    external_vocabulary: "Relationship Type"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_relationship.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:openspp:vocab:relationship"
    confidence: medium
    notes: "OpenSPP covers individual-to-individual kinship and group-to-group organizational relationships. V2 covers individual kinship only. OpenSPP organizational codes (parent_organization, subsidiary, partner_organization, affiliated_with) have no v2 equivalent. OpenSPP 'child_in_law' and 'parent_in_law' map to v2 'in_law'. V2 adds guardian, caregiver, dependent, in_law, extended_family, payment_proxy, survivor which OpenSPP does not define in this vocabulary. OpenSPP 'head' is a group role, not a person-to-person relationship; it belongs in group-role, not relationship-type."
    value_mapping:
      "head": ~               # group role, not person-to-person relationship; see group-role vocabulary
      "spouse": spouse
      "child": child
      "child_in_law": in_law
      "grandchild": grandchild
      "parent": parent
      "parent_in_law": in_law
      "grandparent": grandparent
      "sibling": sibling
      "other_relative": other
      "non_relative": other
      "parent_organization": ~      # no v2 equivalent (organizational relationship)
      "subsidiary": ~               # no v2 equivalent
      "partner_organization": ~     # no v2 equivalent
      "affiliated_with": ~          # no v2 equivalent
    gaps:
      v2_only:
        - guardian        # legal guardianship, not in OpenSPP relationship vocab
        - caregiver       # care provider without legal status
        - dependent       # financial/care dependency role
        - payment_proxy   # authorized collector, not in OpenSPP relationship vocab
        - survivor        # benefit survivor entitlement role
      external_only:
        - parent_organization   # group-to-group hierarchical relationship
        - subsidiary            # group-to-group hierarchical relationship
        - partner_organization  # group-to-group peer relationship
        - affiliated_with       # group-to-group loose affiliation

  - v2_vocabulary: identifier-type
    external_vocabulary: "ID Type"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_id_type.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:openspp:vocab:id-type"
    confidence: high
    notes: "OpenSPP defines 4 active ID types. All 4 map cleanly to v2 number categories. V2 covers additional number categories (social security, voter, program, household, drivers licence, civil registration numbers, location codes) with no OpenSPP equivalent. OpenSPP source file has additional commented-out codes (child and spouse types) that are not active."
    value_mapping:
      "national_id": national_id_number
      "passport": passport_number
      "tax_id": tax_id_number
      "birth_certificate": birth_registration_number
    gaps:
      v2_only:
        - social_security_number
        - program_id_number
        - household_id_number
        - drivers_license_number
        - voter_id_number
        - marriage_registration_number
        - death_registration_number
        - country_code
        - subdivision_code
        - postal_code
        - p_code
        - fips_code
        - hasc_code
        - un_locode
        - other
      external_only: []

  - v2_vocabulary: group-type
    external_vocabulary: "Group Type"
    surface: rest_api_v2
    external_source: "spp_api_v2/schemas/group.py#Group.group_type"
    api_field: "Group.groupType"
    confidence: high
    notes: "The Group.groupType API field is a Literal pattern ^(household|family|organization|other)$ (spp_api_v2/schemas/group.py). The spp.vocabulary XML backs only two of those codes (household, family); organization and other are added at the API layer for orgs and fallback typing. Household and family map cleanly to v2. V2 'farm' is not a group type in OpenSPP (farmer registry is a separate registry object, not a group-type code). The API-only codes 'organization' and 'other' are documented as external_only gaps rather than value mappings: 'organization' has no v2 Group-type analogue (use the Organization concept), and 'other' is a generic fallback rather than a semantic equivalent of v2 'other'."
    value_mapping:
      "household": household
      "family": family
    gaps:
      v2_only:
        - farm   # OpenSPP has a dedicated farmer registry, not a group-type code
      external_only:
        - organization   # API-level code; Organization is a separate concept in v2
        - other          # API-level fallback; not backed by the XML vocabulary

  - v2_vocabulary: group-role
    external_vocabulary: "Group Membership Type"
    surface: rest_api_v2
    external_source: "spp_vocabulary/data/vocabulary_group_membership_type.xml"
    api_endpoint: "/api/v2/spp/Vocabulary/urn:openspp:vocab:relationship"
    api_field: "Group.member[].role.coding[system=urn:openspp:vocab:relationship]"
    confidence: medium
    notes: "OpenSPP only has one active code ('head') in this vocabulary. Other roles (child, spouse, etc.) are commented out in the source file. The API exposes the role via Group.member[].role as a CodeableConcept using the urn:openspp:vocab:relationship system. The single OpenSPP code maps cleanly; all other v2 codes are v2-only from this vocabulary's perspective."
    value_mapping:
      "head": head
    gaps:
      v2_only:
        - spouse        # commented out in OpenSPP vocabulary_group_membership_type.xml
        - child         # commented out in OpenSPP vocabulary_group_membership_type.xml
        - dependent     # not defined in OpenSPP vocabulary
        - parent        # not defined in OpenSPP vocabulary
        - other_relative  # not defined in OpenSPP vocabulary
        - non_relative  # not defined in OpenSPP vocabulary
      external_only: []

  - v2_vocabulary: enrollment-status
    external_vocabulary: "ProgramMembership.status"
    surface: rest_api_v2
    external_source: "spp_api_v2/schemas/program_membership.py#ProgramMembership.status"
    api_field: "ProgramMembership.status"
    confidence: medium
    notes: "The ProgramMembership.status field exposes ProgramMembershipState codes verbatim as a Literal pattern ^(draft|enrolled|paused|exited|not_eligible|duplicated)$. Internal source is spp_programs/models/program_membership.py. 'draft' maps to v2 'pending_verification' (not yet confirmed). 'enrolled' maps to 'active'. 'paused' maps to 'suspended'. 'exited' maps to 'closed'. 'not_eligible' has no dedicated v2 enrollment-status code; it is a determination outcome, not an enrollment state. 'duplicated' has no v2 equivalent. V2 'graduated' has no OpenSPP equivalent in this enum (graduation is handled by a separate spp_graduation module)."
    value_mapping:
      "draft": pending_verification
      "enrolled": active
      "paused": suspended
      "exited": closed
      "not_eligible": ~   # no v2 enrollment-status code; closest is eligibility-status.ineligible
      "duplicated": ~     # no v2 equivalent
    gaps:
      v2_only:
        - graduated   # handled by spp_graduation module, not ProgramMembershipState
      external_only:
        - not_eligible  # eligibility outcome, not enrollment lifecycle state
        - duplicated    # deduplication flag, not an enrollment lifecycle state

  - v2_vocabulary: payment-status
    external_vocabulary: "Entitlement.state + internal PaymentState / PaymentStatus"
    surface: rest_api_v2
    external_source: "spp_api_v2_entitlements/schemas/entitlement.py#Entitlement.state"
    api_field: "Entitlement.state"
    notes_internal_sources:
      - "spp_programs/models/payment.py (PaymentState: issued, sent, reconciled)"
      - "spp_programs/models/payment.py (PaymentStatus: paid, failed)"
      - "spp_programs/models/entitlement.py (EntitlementPaymentStatus: paid, notpaid)"
    confidence: medium
    notes: "OpenSPP splits payment lifecycle across three separate internal enumerations; the API exposes the unified Entitlement.state (a free-form string in the schema; values come from the internal EntitlementState machine: draft, pending_validation, approved, trans2FSP, rdpd2ben, rejected, cancelled, expired). PaymentState and PaymentStatus are not surfaced directly through a payment-specific API resource. Together the internal enums cover the v2 payment-status codes, but there is no single one-to-one mapping. 'issued' maps to 'pending', 'sent' to 'processing' (in transit), 'reconciled' to 'paid' (v2 does not distinguish reconciliation from paid). V2 'returned' has no OpenSPP equivalent. V2 'cancelled' is covered by EntitlementState (cancelled, expired) rather than payment status fields."
    value_mapping:
      # PaymentState
      "issued": pending
      "sent": processing
      "reconciled": paid
      # PaymentStatus
      "paid": paid
      "failed": failed
      # EntitlementPaymentStatus
      "notpaid": pending
    gaps:
      v2_only:
        - returned    # no OpenSPP payment status for returned/reversed payments
        - cancelled   # covered in EntitlementState, not payment status fields
        - rejected    # v2 has rejected; OpenSPP PaymentState/PaymentStatus do not
        - partial     # v2 has partial; no OpenSPP equivalent
      external_only: []

  - v2_vocabulary: eligibility-status
    external_vocabulary: "ProgramMembership.status (partial)"
    surface: rest_api_v2
    external_source: "spp_api_v2/schemas/program_membership.py#ProgramMembership.status"
    api_field: "ProgramMembership.status"
    confidence: low
    notes: "OpenSPP does not have a dedicated eligibility determination vocabulary. The closest is ProgramMembership.status 'not_eligible', which overlaps with v2 eligibility-status.ineligible. OpenSPP's spp_scoring module computes scores and classifications but does not expose a formal eligibility-status enum. The mapping is partial: only 'not_eligible' from ProgramMembership.status has a direct v2 equivalent."
    value_mapping:
      "not_eligible": ineligible
    gaps:
      v2_only:
        - eligible          # no standalone OpenSPP eligibility status; implied by enrolled state
        - pending           # no OpenSPP eligibility pending status; implied by draft membership
        - under_review      # no OpenSPP eligibility review status
        - conditional       # no OpenSPP eligibility conditional status
      external_only: []

  - v2_vocabulary: benefit-modality
    external_vocabulary: "Entitlement.entitlementType"
    surface: rest_api_v2
    external_source: "spp_api_v2_entitlements/schemas/entitlement.py#Entitlement.entitlement_type"
    api_field: "Entitlement.entitlementType"
    confidence: low
    notes: "Entitlement.entitlementType is a Literal['cash', 'inkind'] that only partially covers v2 benefit-modality. OpenSPP 'cash' maps to v2 'cash'; 'inkind' maps to v2 'in_kind'. V2 voucher, service, and fee_waiver modalities are not distinguished in the OpenSPP entitlement type."
    value_mapping:
      "cash": cash
      "inkind": in_kind
    gaps:
      v2_only:
        - voucher     # not distinguished in OpenSPP entitlement type
        - service     # not distinguished in OpenSPP entitlement type
        - fee_waiver  # not distinguished in OpenSPP entitlement type
      external_only: []

  # -----------------------------------------------------------------------
  # Internal-model entries (no API surface exposes these directly)
  # -----------------------------------------------------------------------

  - v2_vocabulary: gender-type
    external_vocabulary: "res.partner.gender (text enum)"
    surface: internal_model
    api_coverage: none
    external_source: "spp_base/models/res_partner.py#res_partner.gender"
    confidence: high
    notes: "The res.partner.gender text enum ('male', 'female', 'other') exists in the internal model but is not exposed through the REST API in this form. The API projects partner.gender into Individual.gender as a CodeableConcept using ISO 5218 numeric codes (see the sex mapping above). This entry is retained to document the internal-model shape; integrators consuming the API should use the sex mapping."
    value_mapping:
      "male": male
      "female": female
      "other": other
    gaps:
      v2_only:
        - not_stated  # No model field for 'not stated' gender in OpenSPP
      external_only: []

  - v2_vocabulary: grievance-status
    external_vocabulary: "GRMTicketStageType"
    surface: internal_model
    api_coverage: none
    external_source: "spp_grm/models/grm_ticket_stage.py"
    confidence: medium
    notes: "OpenSPP GRMTicketStageType categorizes ticket stages for workflow logic. GRM is not exposed through the REST API v2 (no grm resource in spp_api_v2*/schemas/). 'new' maps to v2 'submitted'. 'in_progress' and 'waiting' both map to 'under_review'. 'escalated' to 'escalated'. 'resolved' to 'resolved'. 'closed' to 'closed'. 'cancelled' has no direct v2 equivalent; v2 does not model grievance cancellation as a distinct status. V2 'rejected' has no OpenSPP equivalent in GRMTicketStageType (rejection is tracked via the GRMTicketDecision field instead)."
    value_mapping:
      "new": submitted
      "in_progress": under_review
      "waiting": under_review
      "escalated": escalated
      "resolved": resolved
      "closed": closed
      "cancelled": ~   # no v2 grievance-status code for cancelled
    gaps:
      v2_only:
        - rejected    # tracked via GRMTicketDecision.rejected, not a stage type
      external_only:
        - cancelled   # no v2 equivalent; grievances are not cancelled in v2 model
        - waiting     # merged into under_review; v2 does not distinguish waiting from active review

  - v2_vocabulary: event-severity
    external_vocabulary: "GRMTicketSeverity"
    surface: internal_model
    api_coverage: none
    external_source: "spp_grm/models/grm_ticket.py"
    confidence: medium
    notes: "GRMTicketSeverity is the best OpenSPP match for v2 severity (OASIS CAP). GRM is not exposed through the REST API v2. OpenSPP uses a 4-level scale (low, medium, high, critical); v2 uses a 5-level OASIS CAP scale (extreme, severe, moderate, minor, unknown). 'critical' maps to 'extreme', 'high' to 'severe', 'medium' to 'moderate', 'low' to 'minor'. V2 'unknown' and 'extreme' have no OpenSPP GRM equivalent. OpenSPP also has HazardIncidentSeverity (numeric 1-5 scale) which maps more directly to CAP levels but covers a different domain."
    value_mapping:
      "low": minor
      "medium": moderate
      "high": severe
      "critical": extreme
    gaps:
      v2_only:
        - unknown   # no OpenSPP GRM severity code for unknown/not yet determined
      external_only: []

  - v2_vocabulary: event-severity
    external_vocabulary: "HazardIncidentSeverity"
    surface: internal_model
    api_coverage: none
    external_source: "spp_hazard/models/hazard_incident.py"
    confidence: low
    notes: "HazardIncidentSeverity uses a numeric 1-5 scale (Minor through Catastrophic), which aligns structurally with OASIS CAP but has 5 levels to v2's 5 levels. The semantic mapping is approximate: '1' (Minor) maps to 'minor', '2' (Moderate) to 'moderate', '3' (Significant) to 'severe', '4' (Severe) to 'severe', '5' (Catastrophic) to 'extreme'. Levels 3 and 4 both collapse to 'severe', which is a lossy mapping. Not exposed through the REST API v2."
    value_mapping:
      "1": minor
      "2": moderate
      "3": severe
      "4": severe
      "5": extreme
    gaps:
      v2_only:
        - unknown   # no OpenSPP hazard severity for undetermined severity
      external_only:
        - "3"  # Significant: distinct from both moderate and severe, collapses to severe
        - "4"  # Severe: collapses with level 3 into v2 severe

# -----------------------------------------------------------------------
# No-match entries
# -----------------------------------------------------------------------

no_match:

  # v2 vocabularies with no OpenSPP equivalent

  - v2_vocabulary: benefit-frequency
    reason: "OpenSPP does not have a vocabulary or selection enum for benefit delivery frequency. Cycle recurrence in OpenSPP is configured via date ranges and the Odoo recurrence infrastructure (RRULE), not a controlled vocabulary."

  - v2_vocabulary: event-certainty
    reason: "No OpenSPP vocabulary or selection for data certainty or confidence level on recorded attributes."

  - v2_vocabulary: conditionality-type
    reason: "OpenSPP does not expose a conditionality classification vocabulary. Whether a program is conditional or unconditional is implicit in program configuration, not a controlled vocabulary field."

  - v2_vocabulary: delivery-channel
    reason: "OpenSPP does not have a delivery channel vocabulary. Payment delivery mechanism is determined by the FSP (Financial Service Provider) configuration, not a separate enumeration."

  - v2_vocabulary: grievance-type
    reason: "OpenSPP GRM does not have a structured grievance category vocabulary in the extracted data. Ticket categorization is done through configurable category records (spp.grm.ticket.category), not a fixed selection enum, making a code-level mapping impossible without deployment-specific data."

  - v2_vocabulary: hazard-type
    reason: "OpenSPP spp_hazard module defines hazard incidents but does not expose a hazard type classification vocabulary or selection in the extracted data. Hazard types would be configured per deployment."

  - v2_vocabulary: referral-status
    reason: "OpenSPP does not have a referral module or referral lifecycle vocabulary in the extracted data. The spp_case_base module tracks intake source (including 'referral') but not outbound referral status."

  - v2_vocabulary: targeting-approach
    reason: "OpenSPP does not have a controlled vocabulary for targeting methodology. Targeting is implemented through configurable filter rules and scoring models (spp_scoring), not a classification vocabulary."


  - v2_vocabulary: script
    reason: "No OpenSPP vocabulary for writing scripts (ISO 15924). OpenSPP language vocabulary uses ISO 639 codes only."

  - v2_vocabulary: region
    reason: "No OpenSPP vocabulary for UN M49 geographic regions. Country selection uses ISO 3166-1; regional groupings are not exposed as a controlled vocabulary."

  # OpenSPP vocabularies with no v2 equivalent

  - external_vocabulary: "Religion (UN Census Framework)"
    external_source: "spp_vocabulary/data/vocabulary_religion.xml"
    reason: "PublicSchema v2 does not define a religion vocabulary. Religious affiliation is domain-specific and highly deployment-sensitive; the v2 schema treats it as a free-text or deployment-defined field."

  - external_vocabulary: "Disability Domain (Washington Group)"
    external_source: "spp_vocabulary/data/vocabulary_disability.xml"
    reason: "PublicSchema v2 does not have a disability domain vocabulary. Disability information is referenced as a property but the WG-SS domain classification (seeing, hearing, walking, etc.) is not in the v2 vocabulary set."

  - external_vocabulary: "Disability Severity (Washington Group)"
    external_source: "spp_vocabulary/data/vocabulary_disability.xml"
    reason: "No v2 vocabulary for Washington Group severity levels (1-4 scale). Would need to be defined in v2 if disability data is to be represented."

  - external_vocabulary: "Disability Status"
    external_source: "spp_vocabulary/data/vocabulary_disability.xml"
    reason: "No v2 vocabulary for summarized disability status (Y/N/U). This is an OpenSPP-derived indicator, not based on an international standard."

  - external_vocabulary: "Ethnocultural Status"
    external_source: "spp_vocabulary/data/vocabulary_ethnocultural.xml"
    reason: "No v2 vocabulary for ethnocultural status. This is a deployment-sensitive category; v2 does not define it as a standard vocabulary."

  - external_vocabulary: "Economic Activity Status (ILO)"
    external_source: "spp_vocabulary/data/vocabulary_economic_activity.xml"
    reason: "No v2 vocabulary for ILO economic activity status (ICSE-18). Employment status is not currently in the v2 vocabulary set."

  - external_vocabulary: "Housing Type (UN Rev.3)"
    external_source: "spp_vocabulary/data/vocabulary_housing.xml"
    reason: "No v2 vocabulary for UN housing type classification. Housing data is referenced as a property but housing type categories are not in the v2 vocabulary set."

  - external_vocabulary: "Crop Classification (FAO ICC)"
    external_source: "spp_farmer_registry_vocabularies/data/vocab_crops_default.xml"
