- v2_vocabulary: group-type
  external_vocabulary: Group Type
  surface: rest_api_v2
  external_source: spp_api_v2/schemas/group.py#Group.group_type
  api_field: Group.groupType
  confidence: high
  notes: 'The Group.groupType API field is a Literal pattern ^(household|family|organization|other)$ (spp_api_v2/schemas/group.py).
    The spp.vocabulary XML backs only two of those codes (household, family); organization and other are
    added at the API layer for orgs and fallback typing. Household and family map cleanly to v2. V2 ''farm''
    has no direct group-type code in OpenSPP: farms are represented as household-typed groups annotated
    by the spp_farmer_registry module, and OpenSPP''s Farm Type vocabulary (urn:openspp:vocab:farm-type,
    values crop/livestock/aquaculture/mixed) classifies farming activity rather than the group as a whole.
    Deployments that want to round-trip v2 ''farm'' need to preserve the farmer-registry annotation separately.
    The API-only codes ''organization'' and ''other'' are documented as external_only gaps rather than
    value mappings: ''organization'' has no v2 Group-type analogue (use the Organization concept), and
    ''other'' is a generic fallback rather than a semantic equivalent of v2 ''other''.'
  value_mapping:
    household: household
    family: family
  gaps:
    v2_only:
    - farm
    external_only:
    - organization
    - other
