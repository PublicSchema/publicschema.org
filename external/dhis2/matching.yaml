external_excess:
- external_entity: TrackedEntityAttribute
  reason: 'Meta-model record describing one configurable attribute. In v2, attributes are not reified;
    properties live on concepts directly. TEAs surface through Identifier (for unique=true TEAs) but there
    is no general "attribute definition" concept.

    '
- external_entity: TrackedEntityType
  reason: 'Meta-model record describing what attributes apply to a kind of tracked entity. v2 does not
    reify per-type configuration at the schema level.

    '
- external_entity: ProgramStage
  reason: 'Meta-model record for a workflow step within a program. V2 Profile is related (see concept_matches)
    but ProgramStage itself is configuration metadata, not a v2 concept.

    '
- external_entity: DataElement
  reason: 'Meta-model record for a data point (question or indicator). Equivalent to a v2 property definition,
    which is not a concept.

    '
- external_entity: RelationshipType
  reason: 'Configuration of a relationship class (bidirectional flag, constraints). Surfaces in the Relationship
    decomposition above; not a v2 concept.

    '
- external_entity: RelationshipConstraint
  reason: Configuration attached to RelationshipType; not a v2 concept.
- external_entity: TrackerRelationshipItem
  reason: Wrapper around one side of a TrackerRelationship; plumbing, not a concept.
- external_entity: TrackerDataValue
  reason: 'A single observed value within a TrackerEvent. v2 does not reify individual observations as
    a concept; observations live inside Profile records as property values.

    '
- external_entity: TrackerNote
  reason: Free-form caseworker note. No v2 concept for this.
- external_entity: TrackerUser
  reason: User reference carrying UID and display name. V2 has no User concept.
- external_entity: TrackerProgramOwner
  reason: 'Links a tracked entity to its owning OrganisationUnit for a given Program. Access-control metadata,
    not a v2 concept.

    '
- external_vocabulary: EventStatus
  reason: 'Workflow status of a TrackerEvent (ACTIVE, COMPLETED, VISITED, SCHEDULE, OVERDUE, SKIPPED).
    v2 does not reify tracker-event workflow status; Event records model the real-world occurrence.

    '
- external_vocabulary: ValueType
  reason: 'DHIS2 primitive value type for DataElement / TEA configuration (TEXT, NUMBER, DATE, etc.).
    v2 types are implicit in property definitions and not surfaced as a shared enum.

    '
- external_vocabulary: FeatureType
  reason: 'Geometry shape type for OrganisationUnit / TrackerEvent (NONE, POINT, POLYGON, MULTI_POLYGON,
    SYMBOL). v2 Location geometry is expressed via GeoJSON directly; no shape-type enum.

    '
- external_vocabulary: AccessLevel
  reason: 'Program confidentiality policy (OPEN, AUDITED, PROTECTED, CLOSED). V2 does not model access
    policy at the concept level.

    '
- external_vocabulary: RelationshipEntity
  reason: 'Which kind of tracker item each side of a RelationshipType can link (TRACKED_ENTITY_INSTANCE,
    PROGRAM_INSTANCE, PROGRAM_STAGE_INSTANCE). V2 Relationship only links parties.

    '
- external_vocabulary: ProgramType
  reason: 'WITH_REGISTRATION vs WITHOUT_REGISTRATION — DHIS2 architecture distinction between tracker
    and event programmes. No v2 equivalent.

    '
