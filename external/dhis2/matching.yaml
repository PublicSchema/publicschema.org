system: dhis2
system_version: stable-2-42-4
concept_matches:
- v2_concept: Person
  external_entity: TrackedEntityType(name="Person")
  external_source: extracted/tracked-entity-types.json
  match: broad
  notes: 'DHIS2 Person is not a fixed type: it is a TrackedEntityType whose attributes are configured
    per deployment. The demo instance ships eleven attributes (Unique ID, First name, Last name, Gender,
    Email, Date of birth, Address, City, National identifier, Mobile number, Civil status). This aligns
    semantically with v2 Person but DHIS2 treats the attribute set as open and deployment-specific. PersonName
    components are flat string fields on the DHIS2 side; v2 Person uses a structured `name` object.

    '
  decomposition:
  - dhis2_field: Unique ID
    target_concept: Identifier
    target_property: '*'
    notes: Would become an Identifier record linked to the Person. DHIS2 stores it as a TrackedEntityAttribute
      with unique=true.
  - dhis2_field: First name
    target_concept: Person
    target_property: name.given
  - dhis2_field: Last name
    target_concept: Person
    target_property: name.family
  - dhis2_field: Gender
    target_concept: Person
    target_property: gender
    notes: Demo option set 'Gender' value-mapped via gender-type system_mappings.
  - dhis2_field: Email
    target_concept: Person
    target_property: contact_points
    notes: Would be decomposed into a ContactPoint with type=email. DHIS2 stores it flat.
  - dhis2_field: Date of birth
    target_concept: Person
    target_property: date_of_birth
  - dhis2_field: Address
    target_concept: Person
    target_property: addresses
    notes: DHIS2 holds a free-text address string; v2 Address is structured.
  - dhis2_field: City
    target_concept: Person
    target_property: addresses
    notes: Would be folded into an Address record with locality set.
  - dhis2_field: National identifier
    target_concept: Identifier
    target_property: '*'
    notes: Separate Identifier with identifier_type=national_id_number.
  - dhis2_field: Mobile number
    target_concept: Person
    target_property: contact_points
    notes: ContactPoint with type=mobile_phone.
  - dhis2_field: Civil status
    target_concept: Person
    target_property: marital_status
    notes: Demo option set value-mapped via marital-status system_mappings.
- v2_concept: Organization
  external_entity: OrganisationUnit
  external_source: extracted/entities.json:OrganisationUnit
  match: related
  notes: 'OrganisationUnit is the single tree DHIS2 uses for anything place-shaped (countries, regions,
    districts, facilities, offices). It conflates what v2 separates into Organization, Location, GeographicArea,
    and HealthFacility. Mapping to Organization applies when an OrganisationUnit represents a service-delivery
    actor (a ministry, a facility''s administrative owner) rather than a geographical or physical place.

    '
- v2_concept: Location
  external_entity: OrganisationUnit
  external_source: extracted/entities.json:OrganisationUnit
  match: related
  notes: 'When an OrganisationUnit carries `geometry` (point or polygon) or `featureType` it functions
    as a physical place. v2 Location covers that physical-place aspect; the same OrganisationUnit record
    may simultaneously be a v2 Organization and a v2 Location.

    '
- v2_concept: HealthFacility
  external_entity: OrganisationUnit
  external_source: extracted/entities.json:OrganisationUnit
  match: related
  notes: 'DHIS2 has no HealthFacility type. Facilities are leaf-ish nodes in the OrganisationUnit tree,
    typically distinguished by level or by an OrganisationUnitGroup tagging. Deployments often define
    a "Facility type" option set configured per country.

    '
  decomposition:
  - dhis2_field: level
    target_concept: HealthFacility
    target_property: null
    notes: Tree level is how deployments distinguish facility nodes from district/region nodes.
  - dhis2_field: organisationUnitGroups
    target_concept: HealthFacility
    target_property: facility_type
    notes: OU groups commonly carry 'Hospital', 'Health centre', 'Clinic' classifications; these would
      map via the health-facility-type vocabulary.
  - dhis2_field: geometry
    target_concept: Location
    target_property: geometry
  - dhis2_field: featureType
    target_concept: Location
    target_property: geometry
    notes: NONE/POINT/POLYGON/MULTI_POLYGON/SYMBOL; shapes the geometry representation.
- v2_concept: GeographicArea
  external_entity: OrganisationUnit
  external_source: extracted/entities.json:OrganisationUnit
  match: related
  notes: 'Upper levels of the OrganisationUnit tree (country, region, district) function as geographic
    areas. The same conflation note applies: v2 GeographicArea is one projection of an OrganisationUnit,
    not a dedicated DHIS2 type.

    '
- v2_concept: Event
  external_entity: TrackerEvent
  external_source: extracted/entities.json:TrackerEvent
  match: related
  notes: 'v2 Event is an abstract supertype for real-world occurrences with temporal grounding (vital
    events, payment events, hazard events). DHIS2 TrackerEvent is a data-collection occurrence: when a
    form was filled in, by whom, at which OrganisationUnit. The semantic overlap is partial: a TrackerEvent
    can represent a vaccination administration (real-world event) or a household survey completion (collection
    event). Deployments need to inspect the ProgramStage to know which.

    '
  decomposition:
  - dhis2_field: occurredAt
    target_concept: Event
    target_property: event_date
  - dhis2_field: scheduledAt
    target_concept: Event
    target_property: null
    notes: Scheduling metadata; not a v2 Event property.
  - dhis2_field: orgUnit
    target_concept: Event
    target_property: event_location
  - dhis2_field: dataValues
    target_concept: Profile
    target_property: observations
    notes: Observation data collected at this event. Maps to a v2 Profile whose subtype depends on the
      ProgramStage semantics.
  - dhis2_field: enrollment
    target_concept: Event
    target_property: null
    notes: Backlink to TrackerEnrollment; not a v2 Event field. Surfaces in the sp/Enrollment decomposition
      instead.
  - dhis2_field: status
    target_concept: Event
    target_property: null
    notes: EventStatus (ACTIVE, COMPLETED, VISITED, SCHEDULE, OVERDUE, SKIPPED) is a workflow state, not
      an event property.
- v2_concept: Relationship
  external_entity: TrackerRelationship
  external_source: extracted/entities.json:TrackerRelationship
  match: broad
  notes: 'TrackerRelationship links any two tracker items (TrackedEntity, Enrollment, or Event). v2 Relationship
    is narrower: it links parties only. The type and direction metadata live in RelationshipType, not
    on the Relationship itself.

    '
  decomposition:
  - dhis2_field: from
    target_concept: Relationship
    target_property: party_a
    notes: TrackerRelationshipItem resolves to one of TrackedEntity/Enrollment/Event. Only the TrackedEntity
      case maps cleanly to v2 party slots.
  - dhis2_field: to
    target_concept: Relationship
    target_property: party_b
  - dhis2_field: relationshipType
    target_concept: Relationship
    target_property: relationship_type
    notes: Country-configured; no fixed enum. RelationshipType additionally carries bidirectionality via
      fromConstraint/toConstraint.
  - dhis2_field: bidirectional
    target_concept: Relationship
    target_property: null
    notes: Property of the RelationshipType, not the Relationship record in v2.
- v2_concept: Identifier
  external_entity: TrackedEntityAttribute
  external_source: extracted/entities.json:TrackedEntityAttribute
  match: narrow
  notes: 'DHIS2 TrackedEntityAttributes with `unique=true` and (typically) `valueType=TEXT` function as
    identifiers. The demo instance uses "Unique ID" and "National identifier" this way. v2 Identifier
    is a first-class entity with type, issuer, validity; DHIS2 collapses all of that into a TEA configuration
    plus the stored attribute value.

    '
- v2_concept: Profile
  external_entity: ProgramStage
  external_source: extracted/entities.json:ProgramStage
  match: related
  notes: 'v2 Profile is an abstract supertype for observation records (FunctioningProfile, SocioEconomicProfile,
    etc.). DHIS2 expresses the same intent structurally: a ProgramStage defines which data elements are
    collected; a TrackerEvent is an instance; each TrackerDataValue on that event is one observation.
    Reading a v2 Profile from DHIS2 means projecting an event''s DataValues into the Profile shape. The
    mapping is a pattern, not a type equivalence.

    '
- v2_concept: sp/Enrollment
  external_entity: TrackerEnrollment
  external_source: extracted/entities.json:TrackerEnrollment
  match: broad
  notes: 'TrackerEnrollment is DHIS2''s operational record of a TrackedEntity joining a Program. It is
    broader than sp/Enrollment: it applies to any tracker program, health or otherwise. The eligibility/entitlement
    side of sp/Enrollment has no DHIS2 counterpart; a TrackerEnrollment has been admitted by the time
    it exists.

    '
  decomposition:
  - dhis2_field: trackedEntity
    target_concept: sp/Enrollment
    target_property: participant
  - dhis2_field: program
    target_concept: sp/Enrollment
    target_property: program
  - dhis2_field: enrolledAt
    target_concept: sp/Enrollment
    target_property: start_date
  - dhis2_field: occurredAt
    target_concept: sp/Enrollment
    target_property: null
    notes: Date of an incident event captured on enrollment (e.g., date of diagnosis). No direct v2 slot;
      often a domain-specific field.
  - dhis2_field: completedAt
    target_concept: sp/Enrollment
    target_property: end_date
  - dhis2_field: status
    target_concept: sp/Enrollment
    target_property: status
    notes: EnrollmentStatus (ACTIVE, COMPLETED, CANCELLED) value-mapped via sp/enrollment-status system_mappings.
  - dhis2_field: orgUnit
    target_concept: sp/Enrollment
    target_property: null
    notes: OwningOU. In v2 this sits on Program or the enrolling office, not on Enrollment itself.
  - dhis2_field: events
    target_concept: sp/Enrollment
    target_property: null
    notes: Child events within this enrollment. In v2 each would be a separate Event or Profile record
      referencing the Enrollment.
  - dhis2_field: notes
    target_concept: sp/Enrollment
    target_property: null
    notes: Free-form caseworker notes. No v2 equivalent field.
- v2_concept: sp/Program
  external_entity: Program
  external_source: extracted/entities.json:Program
  match: broad
  notes: 'DHIS2 Program is broader than sp/Program: it covers any tracker or event programme, including
    health surveillance and data collection forms. The benefit-schedule / entitlement side of sp/Program
    has no counterpart.

    '
  decomposition:
  - dhis2_field: name
    target_concept: sp/Program
    target_property: name
  - dhis2_field: description
    target_concept: sp/Program
    target_property: description
  - dhis2_field: programType
    target_concept: sp/Program
    target_property: null
    notes: WITH_REGISTRATION vs WITHOUT_REGISTRATION is DHIS2 architecture, not a v2 property.
  - dhis2_field: trackedEntityType
    target_concept: sp/Program
    target_property: eligible_party_type
    notes: 'Approximate: restricts which kind of Party can enrol.'
  - dhis2_field: programStages
    target_concept: sp/Program
    target_property: null
    notes: Workflow steps; not directly modeled in sp/Program. Would surface through linked Profile or
      Event configurations.
  - dhis2_field: programTrackedEntityAttributes
    target_concept: sp/Program
    target_property: null
    notes: Attributes to collect on enrollment. In v2 these drive Profile/Identifier records rather than
      living on Program.
  - dhis2_field: accessLevel
    target_concept: sp/Program
    target_property: null
    notes: OPEN/AUDITED/PROTECTED/CLOSED — confidentiality policy. No v2 equivalent.
  - dhis2_field: organisationUnits
    target_concept: sp/Program
    target_property: null
    notes: Which OUs this program is rolled out to. v2 handles coverage through a different construct.
matches:
- v2_vocabulary: sp/enrollment-status
  external_vocabulary: EnrollmentStatus
  external_source: extracted/enums.json:EnrollmentStatus
  confidence: medium
  notes: 'DHIS2 has three enrollment states (ACTIVE, COMPLETED, CANCELLED) vs. v2''s richer lifecycle.
    Both COMPLETED and CANCELLED map to `closed` because DHIS2 does not distinguish graduation, voluntary
    exit, administrative termination, or error cancellation. v2 state `pending_verification` has no DHIS2
    equivalent: a TrackerEnrollment only exists once registration is accepted. `suspended` is not modelled;
    DHIS2 implementations typically use event status or auxiliary attributes to record suspension.

    '
  value_mapping:
    ACTIVE: active
    COMPLETED: closed
    CANCELLED: closed
  gaps:
    v2_only:
    - pending_verification
    - waitlisted
    - suspended
    - graduated
    - on_hold
    external_only: []
- v2_vocabulary: gender-type
  external_vocabulary: Gender
  external_source: extracted/enums.json:Gender
  confidence: low
  notes: 'Gender is a demo-instance option set with only two values (Male, Female). This is demo-specific;
    production DHIS2 deployments configure their own option sets, often with richer vocabularies. v2 codes
    `other` and `not_stated` have no equivalent in this snapshot. The mapping matches schema/vocabularies/gender-type.yaml
    system_mappings.dhis2.

    '
  value_mapping:
    Male: male
    Female: female
  gaps:
    v2_only:
    - other
    - not_stated
    external_only: []
- v2_vocabulary: marital-status
  external_vocabulary: Civil status
  external_source: extracted/enums.json:Civil status
  confidence: low
  notes: 'Civil status is a demo-instance option set with only two values. "Single or widow" conflates
    two distinct v2 statuses (never_married and widowed) and therefore cannot be value-mapped safely;
    it is left unmapped. "Married (conjugal cohabitation)" maps cleanly to `married`. Production DHIS2
    deployments configure their own civil status option sets with finer distinctions. Matches schema/vocabularies/marital-status.yaml
    system_mappings.dhis2.

    '
  value_mapping:
    Married (conjugal cohabitation): married
  gaps:
    v2_only:
    - never_married
    - widowed
    - divorced
    - legally_separated
    - consensual_union
    external_only:
    - Single or widow
no_match:
- v2_concept: Agent
  reason: 'Abstract supertype for Person/Organization/SoftwareAgent. DHIS2 has no analogous abstraction;
    User, TrackedEntity, and OrganisationUnit are unrelated types.

    '
- v2_concept: Party
  reason: 'Abstract supertype for Person/Group. DHIS2 does not abstract "beneficiary-side" actors; TrackedEntity
    (the closest construct) is concrete and has no sibling for Group.

    '
- v2_concept: Address
  reason: 'DHIS2 stores address as a free-text string TEA on Person. There is no structured Address type
    in the meta-model.

    '
- v2_concept: BiometricSample
  reason: 'DHIS2 core does not model biometric enrolment. Attachments on a tracked entity via file resource
    TEAs are possible but carry no modality, template, or capture metadata.

    '
- v2_concept: ConsentRecord
  reason: 'No consent-record construct in DHIS2. Programs can be configured with a `captureCoordinates`
    or `selectIncidentDatesInFuture` flag, but consent as a reified record is not modelled.

    '
- v2_concept: DeliveryItem
  reason: DHIS2 is not a benefit-delivery system; no delivery-item concept.
- v2_concept: Family
  reason: 'DHIS2 tracker has no first-class Family construct. Some deployments model kinship via Relationships
    between tracked entities; no reified Family group exists.

    '
- v2_concept: Farm
  reason: DHIS2 does not model agricultural holdings.
- v2_concept: Group
  reason: 'Abstract supertype for Family/Household/Farm. DHIS2 has no equivalent abstraction over collective
    parties.

    '
- v2_concept: GroupMembership
  reason: 'No group-membership construct. The closest pattern is a TrackerRelationship with a parent/child-of-household
    RelationshipType, which does not carry role or validity.

    '
- v2_concept: HazardEvent
  reason: DHIS2 does not model hazard events as a first-class type.
- v2_concept: Household
  reason: No household construct in DHIS2 core (see Group above).
- v2_concept: IdentityDocument
  reason: 'DHIS2 records identifier values on a Person via unique TEAs, but does not reify the issuing
    document, its validity period, or jurisdiction.

    '
- v2_concept: InKindDelivery
  reason: DHIS2 is not a benefit-delivery system.
- v2_concept: Instrument
  reason: 'DHIS2 does not catalog data-collection instruments as reified records with authorship, version,
    and provenance. A ProgramStage plus its DataElements is the closest operational analogue but carries
    no Instrument metadata.

    '
- v2_concept: PaymentEvent
  reason: DHIS2 is not a payment system.
- v2_concept: PrivacyNotice
  reason: No privacy-notice construct in DHIS2 core.
- v2_concept: RegistrationOffice
  reason: 'No registration-office construct. OrganisationUnits can represent offices but carry no distinct
    registration-office typing.

    '
- v2_concept: School
  reason: DHIS2 does not model schools as a typed OrganisationUnit subtype.
- v2_concept: ScoringEvent
  reason: 'DHIS2 has no construct recording the application of a scoring rule to observation data. Indicators
    exist in the aggregate analytics side but are out of scope for the meta-model mapping.

    '
- v2_concept: ScoringRule
  reason: 'DHIS2 programIndicators and predictors can compute values, but they live in the analytics layer
    rather than in tracker metadata. They are out of scope here.

    '
- v2_concept: ServicePoint
  reason: No generic service-point construct distinct from OrganisationUnit.
- v2_concept: SocioEconomicProfile
  reason: 'Profile subtypes are not reified as types in DHIS2. A deployment could encode a socio-economic
    assessment as a ProgramStage but the meta-model does not name it.

    '
- v2_concept: FunctioningProfile
  reason: 'Same pattern as SocioEconomicProfile: no Profile-subtype reification in the meta-model.

    '
- v2_concept: SoftwareAgent
  reason: 'DHIS2 has a User model and API tokens, but no SoftwareAgent concept for recording the identity/version
    of scoring software or other automated actors.

    '
- v2_concept: Voucher
  reason: DHIS2 is not a voucher-delivery system.
- v2_concept: VoucherRedemption
  reason: Same as Voucher.
- v2_concept: WaterPoint
  reason: No water-point construct; would be an OrganisationUnit subtype if modelled.
- v2_concept: sp/BenefitSchedule
  reason: DHIS2 does not model benefit schedules.
- v2_concept: sp/EligibilityDecision
  reason: DHIS2 has no eligibility-decision record. Admission is implicit in the existence of a TrackerEnrollment.
- v2_concept: sp/Entitlement
  reason: DHIS2 is not an entitlement-management system.
- v2_concept: sp/Grievance
  reason: No grievance/complaint workflow in DHIS2 core.
- v2_concept: sp/Referral
  reason: 'DHIS2 can model referrals as tracker relationships or program events but has no first-class
    Referral type with status, origin, and destination facility semantics.

    '
- v2_concept: crvs/VitalEvent
  reason: DHIS2 is not a CRVS. Births/deaths can be recorded as tracker events within a health programme,
    but not as legal vital events.
- v2_concept: crvs/Birth
  reason: Not modelled in DHIS2. Birth Notification programs exist as deployment content; the meta-model
    does not name them.
- v2_concept: crvs/Death
  reason: Not modelled in DHIS2. Mortality surveillance deployments exist; the meta-model does not name
    them.
- v2_concept: crvs/FetalDeath
  reason: Not modelled in DHIS2.
- v2_concept: crvs/Marriage
  reason: Not modelled in DHIS2.
- v2_concept: crvs/MarriageTermination
  reason: Not modelled in DHIS2.
- v2_concept: crvs/Adoption
  reason: Not modelled in DHIS2.
- v2_concept: crvs/Legitimation
  reason: Not modelled in DHIS2.
- v2_concept: crvs/PaternityRecognition
  reason: Not modelled in DHIS2.
- v2_concept: crvs/Parent
  reason: No parent link type. Kinship can be expressed via tracker relationships but carries no parental-role
    semantics.
- v2_concept: crvs/Certificate
  reason: No civil-status certificate record in DHIS2.
- v2_concept: crvs/CivilStatusDocument
  reason: Abstract CRVS document supertype. DHIS2 does not model any civil-status documents.
- v2_concept: crvs/CivilStatusRecord
  reason: No reified civil-status-record type in DHIS2.
- v2_concept: crvs/CivilStatusAnnotation
  reason: No annotation construct for civil status updates.
- v2_concept: crvs/FamilyRegister
  reason: DHIS2 does not model family registers (livret de famille, koseki, hukou).
- v2_concept: crvs/Person
  reason: 'Separate from universal Person, crvs/Person is the CRVS projection with civil-status-specific
    fields. DHIS2 has no CRVS layer, so the universal Person match already covers what DHIS2 represents.

    '
- v2_vocabulary: sex
  reason: DHIS2 uses a single 'Gender' option set per deployment; no separate biological-sex vocabulary.
- v2_vocabulary: identifier-type
  reason: Identifier types are per-TEA configuration, not a shared vocabulary.
- v2_vocabulary: document-type
