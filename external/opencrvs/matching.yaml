system: opencrvs
system_version: v1-graphql

# Scope: OpenCRVS v1 GraphQL core only (25 entities, 16 enums extracted from
# packages/client/src/tests/schema.graphql). Excludes the v2 event service,
# Farajaland country config, and the verifiable-credentials schemas.
#
# --- Structural note: the *Registration conflation ---
# OpenCRVS bundles three things into each *Registration type:
#   1. the vital event (the occurrence)
#   2. the civil status record (the embedded Registration sub-object:
#      registrationNumber, page, book, status)
#   3. the workflow wrapper (registration.status[] of RegWorkflow, plus history[])
# PublicSchema separates these into VitalEvent + CivilStatusRecord + Certificate.
# Concept-level matches therefore use `broad` for Birth/Death/Marriage: OpenCRVS's
# type is genuinely wider than ours. The decomposition tables below route each
# OpenCRVS field to the correct PublicSchema concept; see
# docs/opencrvs-decomposition.md for a worked example and the reverse direction.

concept_matches:

  - v2_concept: VitalEvent
    external_entity: EventRegistration
    external_source: packages/client/src/tests/schema.graphql:EventRegistration
    match: related
    notes: >
      EventRegistration is the implicit parent of BirthRegistration,
      DeathRegistration, and MarriageRegistration (see `parent: EventRegistration`
      on each type in entities.json). It has no dedicated GraphQL type of its own.
      Our VitalEvent is the abstract supertype grouping shared properties of the
      occurrence; the overlap is conceptual, not structural.

  - v2_concept: Birth
    external_entity: BirthRegistration
    external_source: packages/client/src/tests/schema.graphql:BirthRegistration
    match: broad
    notes: >
      BirthRegistration is genuinely broader than our Birth because it bundles
      the vital event, the embedded Registration record, the workflow wrapper,
      and the history/audit trail. Reading a BirthRegistration requires
      decomposing into Birth + CivilStatusRecord + Certificate records. See the
      field-level decomposition below.
    decomposition:
      - opencrvs_field: child
        target_concept: Birth
        target_property: child
        notes: "Typed as Person on both sides; direct slot match."
      - opencrvs_field: mother
        target_concept: Birth
        target_property: parents
        notes: "Wrap the OpenCRVS Person in a Parent link entity with parental_role=biological_mother."
      - opencrvs_field: father
        target_concept: Birth
        target_property: parents
        notes: "Wrap the OpenCRVS Person in a Parent link entity with parental_role=biological_father. Adoptive, legal, and surrogate roles are not representable in v1."
      - opencrvs_field: informant
        target_concept: VitalEvent
        target_property: informant
        notes: "OpenCRVS uses RelatedPerson (Person + relationship); we drop the relationship role on our informant slot."
      - opencrvs_field: eventLocation
        target_concept: VitalEvent
        target_property: event_location
      - opencrvs_field: birthType
        target_concept: Birth
        target_property: birth_type
        notes: "Country-configured String on OpenCRVS side; our birth-type vocabulary defines a recommended set."
      - opencrvs_field: weightAtBirth
        target_concept: Birth
        target_property: weight_at_birth
      - opencrvs_field: attendantAtBirth
        target_concept: Birth
        target_property: attendant_at_birth
        notes: "Country-configured String on OpenCRVS side."
      - opencrvs_field: child.Person.birthDate
        target_concept: VitalEvent
        target_property: event_date
        notes: "No event_date field on BirthRegistration itself; derived from the child's birthDate."
      - opencrvs_field: child.Person.multipleBirth
        target_concept: Birth
        target_property: birth_order
      - opencrvs_field: child.Person.gender
        target_concept: Birth
        target_property: sex_at_birth
        notes: "Gender enum value-mapped via the sex vocabulary system_mappings."
      - opencrvs_field: registration.registrationNumber
        target_concept: CivilStatusRecord
        target_property: record_id
      - opencrvs_field: registration.type
        target_concept: CivilStatusRecord
        target_property: record_type
        notes: "RegistrationType (BIRTH/DEATH/MARRIAGE) maps to the civil-status-record-type vocabulary."
      - opencrvs_field: registration.status
        target_concept: VitalEvent
        target_property: registration_status
        notes: "Array of RegWorkflow; the current status is the most recent entry's `type` (a RegStatus value)."
      - opencrvs_field: registration.certificates
        target_concept: Certificate
        target_property: "*"
        notes: "Each Certificate in the array becomes one PublicSchema Certificate record linked back to the Birth and the CivilStatusRecord."
      - opencrvs_field: foetalDeathsToMother
        target_concept: null
        target_property: null
        notes: >
          Statistical count of prior fetal deaths borne by the mother. Not a
          registration of a fetal death. Intentionally unmapped.
      - opencrvs_field: history
        target_concept: CivilStatusRecord
        target_property: null
        notes: "Audit trail entries; no PublicSchema property yet. Annotations surface through a separate mechanism (CivilStatusAnnotation is unmapped in v1)."

  - v2_concept: Death
    external_entity: DeathRegistration
    external_source: packages/client/src/tests/schema.graphql:DeathRegistration
    match: broad
    notes: >
      Same bundling pattern as BirthRegistration: event + record + workflow
      collapsed into a single type. DeathRegistration additionally carries
      cause-of-death fields.
    decomposition:
      - opencrvs_field: deceased
        target_concept: Death
        target_property: deceased
        notes: "Typed as Person on both sides; direct slot match."
      - opencrvs_field: informant
        target_concept: VitalEvent
        target_property: informant
      - opencrvs_field: eventLocation
        target_concept: VitalEvent
        target_property: event_location
      - opencrvs_field: deceased.Person.deceased.deathDate
        target_concept: VitalEvent
        target_property: event_date
        notes: "Nested on the Deceased sub-object; no event_date on DeathRegistration itself."
      - opencrvs_field: mannerOfDeath
        target_concept: Death
        target_property: manner_of_death
        notes: "Country-configured String on OpenCRVS side."
      - opencrvs_field: causeOfDeath
        target_concept: Death
        target_property: cause_of_death
        notes: "Free text on both sides."
      - opencrvs_field: causeOfDeathMethod
        target_concept: Death
        target_property: cause_of_death_method
        notes: "Country-configured String on OpenCRVS side."
      - opencrvs_field: medicalPractitioner
        target_concept: Death
        target_property: medical_certifier
        notes: "OpenCRVS uses a dedicated MedicalPractitioner entity; ours is a Person reference."
      - opencrvs_field: registration.registrationNumber
        target_concept: CivilStatusRecord
        target_property: record_id
      - opencrvs_field: registration.type
        target_concept: CivilStatusRecord
        target_property: record_type
      - opencrvs_field: registration.status
        target_concept: VitalEvent
        target_property: registration_status
      - opencrvs_field: registration.certificates
        target_concept: Certificate
        target_property: "*"
      - opencrvs_field: history
        target_concept: CivilStatusRecord
        target_property: null

  - v2_concept: Marriage
    external_entity: MarriageRegistration
    external_source: packages/client/src/tests/schema.graphql:MarriageRegistration
    match: broad
    notes: >
      Same bundling pattern as the other *Registration types. OpenCRVS uses
      gendered slots (bride/groom); our Marriage uses gender-neutral party_1/
      party_2. The mapping assigns party_1=bride and party_2=groom. The
      assignment is arbitrary but applied symmetrically to both rows so the
      structural correspondence is honest.
    decomposition:
      - opencrvs_field: bride
        target_concept: Marriage
        target_property: party_1
        notes: "Gendered-to-neutral mapping; party_1 is typed Person in PublicSchema."
      - opencrvs_field: groom
        target_concept: Marriage
        target_property: party_2
        notes: "Gendered-to-neutral mapping; party_2 is typed Person in PublicSchema."
      - opencrvs_field: witnessOne
        target_concept: Marriage
        target_property: witnesses
        notes: "OpenCRVS uses exactly two named slots; our witnesses list has unlimited cardinality."
      - opencrvs_field: witnessTwo
        target_concept: Marriage
        target_property: witnesses
      - opencrvs_field: informant
        target_concept: VitalEvent
        target_property: informant
      - opencrvs_field: eventLocation
        target_concept: VitalEvent
        target_property: event_location
      - opencrvs_field: typeOfMarriage
        target_concept: Marriage
        target_property: type_of_marriage
        notes: "Country-configured String on OpenCRVS side."
      - opencrvs_field: registration.registrationNumber
        target_concept: CivilStatusRecord
        target_property: record_id
      - opencrvs_field: registration.type
        target_concept: CivilStatusRecord
        target_property: record_type
      - opencrvs_field: registration.status
        target_concept: VitalEvent
        target_property: registration_status
      - opencrvs_field: registration.certificates
        target_concept: Certificate
        target_property: "*"
      - opencrvs_field: history
        target_concept: CivilStatusRecord
        target_property: null

  - v2_concept: CivilStatusRecord
    external_entity: Registration
    external_source: packages/client/src/tests/schema.graphql:Registration
    match: related
    notes: >
      The structural role differs. Registration is embedded inside *Registration
      and carries administrative metadata (tracking IDs, attachments, workflow
      status) rather than functioning as the legal acte. Our CivilStatusRecord
      is the legal record of the event. `related` reflects genuine conceptual
      overlap without pretending the responsibilities line up.
    decomposition:
      - opencrvs_field: registrationNumber
        target_concept: CivilStatusRecord
        target_property: record_id
      - opencrvs_field: type
        target_concept: CivilStatusRecord
        target_property: record_type
        notes: "RegistrationType maps to our civil-status-record-type vocabulary (narrow)."
      - opencrvs_field: status
        target_concept: VitalEvent
        target_property: registration_status
        notes: "Array of RegWorkflow; the current state is the most recent entry's `type`."
      - opencrvs_field: attachments
        target_concept: CivilStatusRecord
        target_property: null
        notes: "Supporting documents; no PublicSchema property."
      - opencrvs_field: certificates
        target_concept: Certificate
        target_property: "*"

  - v2_concept: Certificate
    external_entity: Certificate
    external_source: packages/client/src/tests/schema.graphql:Certificate
    match: close
    notes: >
      Both represent a certificate issued for a registration. The noun matches
      but the fields diverge: OpenCRVS emphasises collection and payment
      (collector, payments, certificateTemplateId) while we emphasise issuance
      metadata (certificate_document_type, certificate_format, issue_date,
      issuing_office, certificate_number). Field-level overlap is minimal.
    decomposition:
      - opencrvs_field: collector
        target_concept: Certificate
        target_property: null
        notes: "Who picks up the certificate; no direct PublicSchema equivalent."
      - opencrvs_field: certificateTemplateId
        target_concept: Certificate
        target_property: certificate_document_type
        notes: "Free String in v1; country configuration decides the template-to-document-type mapping."
      - opencrvs_field: payments
        target_concept: null
        target_property: null
        notes: "Registrar-side fee collection. Structurally distinct from PublicSchema's PaymentEvent (benefit disbursement). Intentionally unmapped."

  - v2_concept: PaternityRecognition
    external_entity: null
    external_source: packages/client/src/tests/schema.graphql:RegAction
    match: related
    notes: >
      Not a first-class type in v1. In practice OpenCRVS handles paternity
      recognition through the correction workflow on an existing BirthRegistration:
      a RegAction of CORRECTED (with a preceding REQUESTED_CORRECTION) is
      recorded in History with an input/output diff. Recorded here as `related`
      so implementers can locate the operational pattern. A value-level mapping
      is not applicable because the target is a workflow action code, not an
      event type.


matches:

  # --- sex vs Gender ---
  # OpenCRVS uses a single GraphQL enum called "Gender" for what is semantically
  # biological sex (male, female, unknown) plus a social "other" category.
  # V2 separates these into sex (ISO 5218, biological) and gender-type (social gender).
  # Both v2 vocabularies map onto the same OpenCRVS enum.

  - v2_vocabulary: sex
    external_vocabulary: Gender
    external_source: "packages/client/src/tests/schema.graphql:711"
    confidence: medium
    notes: >
      OpenCRVS calls this enum "Gender" but uses it on birth, death, and marriage
      declarations where the field captures biological sex (not social gender).
      The mapping is close but not exact: OpenCRVS "other" is mapped to
      not_applicable because ISO 5218 has no "other" — it uses not_applicable (9)
      for cases outside the male/female binary. OpenCRVS "unknown" maps to
      not_known (ISO 5218 code 0). The name mismatch ("Gender" vs biological sex)
      reflects a common conflation in CRVS systems.
    value_mapping:
      "male": male
      "female": female
      "other": not_applicable
      "unknown": not_known
    gaps:
      v2_only:
        - not_applicable  # mapped from "other"; no distinct OpenCRVS code for it
      external_only: []

  - v2_vocabulary: gender-type
    external_vocabulary: Gender
    external_source: "packages/client/src/tests/schema.graphql:711"
    confidence: high
    notes: >
      OpenCRVS "Gender" aligns well with v2 gender-type, which also references
      FHIR AdministrativeGender. Both treat "other" as a residual category for
      people not captured by male/female. OpenCRVS "unknown" maps to not_stated
      (gender not recorded or disclosed). This is a better semantic fit than the
      sex mapping above because gender-type is the social/administrative framing.
    value_mapping:
      "male": male
      "female": female
      "other": other
      "unknown": not_stated
    gaps:
      v2_only: []
      external_only: []

  # --- payment-status vs PaymentOutcomeType ---
  # OpenCRVS records a fee payment outcome when a certificate is issued.
  # V2 payment-status covers the full disbursement lifecycle for benefit payments.
  # These are different contexts: OpenCRVS payments are service fees collected
  # by registrars, not welfare benefit disbursements.

  - v2_vocabulary: payment-status
    external_vocabulary: PaymentOutcomeType
    external_source: "packages/client/src/tests/schema.graphql:1138"
    confidence: low
    notes: >
      OpenCRVS PaymentOutcomeType records whether a civil registration service fee
      was collected (COMPLETED, ERROR, PARTIAL). This is registrar-side fee
      collection, not benefit disbursement — the contexts are fundamentally
      different. COMPLETED maps to paid; ERROR maps to failed. PARTIAL has no
      clean v2 equivalent because v2 does not model partial payment as a distinct
      terminal state; it is mapped to paid as the closest approximation, with the
      caveat that partial payment semantics differ.
    value_mapping:
      "COMPLETED": paid
      "ERROR": failed
      "PARTIAL": paid
    gaps:
      v2_only:
        - pending     # no pre-transmission state in OpenCRVS fee model
        - returned    # no return concept in OpenCRVS fee model
        - cancelled   # no cancellation concept in OpenCRVS fee model
        - reconciled  # no reconciliation state in OpenCRVS fee model
      external_only:
        - PARTIAL     # partial fee payment; no v2 equivalent

  # --- identifier-type vs IdentityDocumentType (country-configurable) ---
  # OpenCRVS does not define identity document types in core code.
  # The GraphQL schema uses String for the type field. Example values
  # (PASSPORT, DRIVING_LICENSE, NID, etc.) appear only in test fixtures.
  # However, OpenCRVS does reference NATIONAL_ID and BIRTH_REGISTRATION_NUMBER
  # as constants in specific integration contexts, so partial overlap exists.

  - v2_vocabulary: identifier-type
    external_vocabulary: IdentityDocumentType
    confidence: low
    country_config: true
    notes: >
      OpenCRVS does not define identity document types in core code — the field
      is a free-text String configured per country deployment. Test fixtures show
      values such as PASSPORT, DRIVING_LICENSE, NID, REFUGEE_NUMBER, but these
      are not authoritative. The BIRTH_REGISTRATION_NUMBER and
      DEATH_REGISTRATION_NUMBER constants appear in integration code, which have
      no direct v2 equivalent (v2 uses birth_certificate as a general category).
      No value mapping is possible without a specific country deployment.

  # --- SP country-configurable matches (no value mapping possible) ---

  - v2_vocabulary: marital-status
    external_vocabulary: MaritalStatus
    confidence: null
    country_config: true
    notes: >
      OpenCRVS does not define marital status values in core. The field is typed
      as String on the GraphQL Person type (line 1157 in schema.graphql). Values
      are country-configurable at deployment time. V2 uses FHIR v3-MaritalStatus
      as its reference standard.

  - v2_vocabulary: education-level
    external_vocabulary: EducationLevel
    confidence: null
    country_config: true
    notes: >
      OpenCRVS does not define education level values in core. The field
      (educationalAttainment) is typed as String in the FHIR-based model. Values
      are country-configurable. V2 uses ISCED 2011 as its reference standard.

  - v2_vocabulary: occupation
    external_vocabulary: Occupation
    confidence: null
    country_config: true
    notes: >
      OpenCRVS does not define occupation values in core. The field is typed as
      String on the GraphQL Person type (line 1158 in schema.graphql). Values
      are country-configurable. V2 uses ISCO-08 as its reference standard.

  # --- CRVS domain vocabulary matches (real OpenCRVS enums) ---

  - v2_vocabulary: crvs/registration-status
    external_vocabulary: RegStatus
    external_source: packages/client/src/tests/schema.graphql:RegStatus
    confidence: high
    notes: >
      RegStatus enumerates the OpenCRVS workflow lifecycle with finer granularity
      than crvs/registration-status: it splits our `registered` into VALIDATED →
      REGISTERED → CERTIFIED → ISSUED and adds IN_PROGRESS (pre-declaration
      draft) and DECLARATION_UPDATED. Our `cancelled` has no OpenCRVS equivalent;
      the workflow reaches `rejected` or `archived` instead. Our `corrected`
      captures the outcome of a correction flow that OpenCRVS records with a
      separate CORRECTION_REQUESTED pending state.
    value_mapping:
      DECLARED: declared
      WAITING_VALIDATION: pending_validation
      REGISTERED: registered
      REJECTED: rejected
      ARCHIVED: archived
      IN_PROGRESS: null
      DECLARATION_UPDATED: null
      CORRECTION_REQUESTED: null
      VALIDATED: null
      CERTIFIED: null
      ISSUED: null
    gaps:
      v2_only:
        - cancelled
        - corrected
      external_only:
        - IN_PROGRESS           # pre-declaration draft
        - DECLARATION_UPDATED   # declaration edited after submission
        - CORRECTION_REQUESTED  # correction pending registrar review
        - VALIDATED             # pre-registration review complete
        - CERTIFIED             # certificate printed
        - ISSUED                # certificate handed to collector

  - v2_vocabulary: crvs/civil-status-record-type
    external_vocabulary: Event
    external_source: packages/client/src/tests/schema.graphql:Event
    confidence: high
    notes: >
      OpenCRVS Event enumerates three event types (birth, death, marriage) used
      as the RegistrationType discriminator. Our civil-status-record-type covers
      a broader set including paternity_recognition, supplementary_judgment, and
      court_ordered_substitute — values with no counterpart in v1 core. The
      three shared values align cleanly. Note: RegistrationType is the uppercase
      mirror of Event used on Registration.type; the value-level mapping applies
      equally to both.
    value_mapping:
      birth: birth
      death: death
      marriage: marriage
    gaps:
      v2_only:
        - paternity_recognition
        - supplementary_judgment
        - court_ordered_substitute
      external_only: []

  # --- CRVS country-configured vocabularies ---
  # OpenCRVS leaves these fields as untyped String in v1 GraphQL core. Values
  # are defined at country-deployment time (e.g. Farajaland's forms.json).
  # PublicSchema provides a recommended value set.

  - v2_vocabulary: crvs/birth-type
    external_vocabulary: BirthRegistration.birthType
    confidence: null
    country_config: true
    notes: >
      String field. Farajaland reference config uses SINGLE, TWIN, TRIPLET,
      QUADRUPLET, HIGHER_MULTIPLE_DELIVERY. Our set maps closely but uses
      quintuplet + higher_order in place of HIGHER_MULTIPLE_DELIVERY.

  - v2_vocabulary: crvs/birth-attendant
    external_vocabulary: BirthRegistration.attendantAtBirth
    confidence: null
    country_config: true
    notes: >
      String field. Farajaland reference config values: PHYSICIAN, NURSE,
      MIDWIFE, OTHER_PARAMEDICAL_PERSONNEL, LAYPERSON, TRADITIONAL_BIRTH_ATTENDANT,
      NONE. Roughly aligned with our vocabulary.

  - v2_vocabulary: crvs/manner-of-death
    external_vocabulary: DeathRegistration.mannerOfDeath
    confidence: null
    country_config: true
    notes: >
      String field. Farajaland reference config values: NATURAL_CAUSES, ACCIDENT,
      SUICIDE, HOMICIDE, MANNER_UNDETERMINED. Our vocabulary follows the WHO/ICD
      8-value taxonomy; the Farajaland set collapses several categories (e.g.
      legal_intervention and war are absent).

  - v2_vocabulary: crvs/cause-of-death-method
    external_vocabulary: DeathRegistration.causeOfDeathMethod
    confidence: null
    country_config: true
    notes: >
      String field. Farajaland reference config values: PHYSICIAN, LAY_REPORTED,
      VERBAL_AUTOPSY, MEDICALLY_CERTIFIED. Partial overlap with our vocabulary.

  - v2_vocabulary: crvs/marriage-type
    external_vocabulary: MarriageRegistration.typeOfMarriage
    confidence: null
    country_config: true
    notes: >
      String field. No Farajaland reference values observed in forms.json.
      Country-configurable.

  - v2_vocabulary: crvs/parental-role
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      Parental roles are implicit in OpenCRVS field names (mother, father).
      There is no enumeration, and RelatedPerson.relationship is a free String.
      No value-level mapping is possible.

  - v2_vocabulary: crvs/place-type
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      OpenCRVS eventLocation is typed as Location (an entity), not a coded
      place-type. No core enum exists; country deployments may add their own
      typing through Location.type (also an untyped String).

  - v2_vocabulary: crvs/certificate-document-type
    external_vocabulary: Certificate.certificateTemplateId
    confidence: null
    country_config: true
    notes: >
      Free String in v1 (a template identifier). Country configuration decides
      the mapping from template ID to document type.

  - v2_vocabulary: crvs/certificate-format
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      OpenCRVS makes no core-level distinction between full copy, extract, and
      multilingual extract. Any such distinction would live inside the template
      definition itself.

  - v2_vocabulary: crvs/adoption-type
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      Adoption is not a v1 event type; no field exists. Recorded as country_config
      because an OpenCRVS deployment extending for adoption support would define
      this vocabulary in country config.

  - v2_vocabulary: crvs/annotation-type
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      No annotation concept in v1 core. A country deployment modelling marginal
      annotations would define this vocabulary itself; OpenCRVS provides no
      default set.

  - v2_vocabulary: crvs/family-register-status
    external_vocabulary: null
    confidence: null
    country_config: true
    notes: >
      OpenCRVS has no family-register construct. A deployment adding one would
      define this vocabulary in country config.


no_match:

  # --- v2 concepts with no OpenCRVS v1 equivalent ---

  - v2_concept: FetalDeath
    reason: >
      Not modelled as a distinct event type. BirthRegistration.foetalDeathsToMother
      is a statistical count on the mother's birth record, not a registration of
      the fetal death itself.

  - v2_concept: MarriageTermination
    reason: "Abstract concept; no v1 equivalent because neither divorce nor annulment is modelled."

  - v2_concept: Divorce
    reason: "Not modelled in v1 core. No divorce registration entity exists."

  - v2_concept: Annulment
    reason: "Not modelled in v1 core. No annulment registration entity exists."

  - v2_concept: Adoption
    reason: >
      Not modelled as a distinct registration type in v1 core. Adoption scenarios
      are handled in country extensions or via the correction workflow, not as a
      first-class event.

  - v2_concept: Legitimation
    reason: "Not modelled in v1 core. Same pattern as PaternityRecognition (operationally a correction)."

  - v2_concept: CivilStatusAnnotation
    reason: >
      No reified marginal-annotation type in v1. Corrections flow through the
      RegAction CORRECTION_REQUESTED → CORRECTED workflow recorded in History,
      which is an audit trail rather than an annotation with its own type,
      authority, and triggering event.

  - v2_concept: FamilyRegister
    reason: >
      OpenCRVS v1 is event-record centric. There is no concept of a family
      register (livret de famille, koseki, hukou); families are not modelled
      as a tracked unit.

  - v2_concept: Parent
    reason: >
      Our Parent is a reified link entity (Person + parental_role). OpenCRVS
      uses typed slots (mother, father) with roles implicit in field names.
      Adoptive, legal, and surrogate roles are not representable in v1.

  # --- v2 vocabularies with no OpenCRVS equivalent ---
  # SP vocabularies — OpenCRVS is a civil registration system and has no
  # enrollment, eligibility, benefit, or grievance constructs.

  - v2_vocabulary: enrollment-status
    reason: >
      OpenCRVS has no concept of program enrollment. Civil registration records
      vital events (birth, death, marriage); it does not track program participation.

  - v2_vocabulary: eligibility-status
    reason: >
      No eligibility assessment in OpenCRVS. Eligibility determination is a social
      protection function with no CRVS equivalent.

  - v2_vocabulary: benefit-frequency
    reason: >
      No benefit disbursement cycle in OpenCRVS. Payments in OpenCRVS are one-time
      service fees, not recurring benefit transfers.

  - v2_vocabulary: benefit-modality
    reason: >
      No benefit type or modality concept in OpenCRVS. Cash, in-kind, and voucher
      transfers are social protection constructs absent from CRVS.

  - v2_vocabulary: event-certainty
    reason: >
      No probability or certainty scoring in OpenCRVS. The concept is used in v2
      for targeting and assessment confidence levels, which have no CRVS analog.

  - v2_vocabulary: conditionality-type
    reason: >
      Conditionalities (co-responsibilities attached to benefits) are a social
      protection concept with no equivalent in civil registration.

  - v2_vocabulary: delivery-channel
    reason: >
      Delivery channel (how benefits reach beneficiaries) is a disbursement
      concept absent from OpenCRVS.

  - v2_vocabulary: grievance-status
    reason: >
      OpenCRVS has no formal grievance management module. Complaints and appeals
      are social protection constructs.

  - v2_vocabulary: grievance-type
    reason: "Same as grievance-status: no grievance classification in OpenCRVS."

  - v2_vocabulary: group-role
    reason: >
      V2 group-role covers household membership roles (head, spouse, child, etc.)
      in a social protection context. OpenCRVS captures family relationships
      differently — as string fields on the birth or marriage registration record
      — with no shared enumeration.

  - v2_vocabulary: group-type
    reason: >
      V2 group-type distinguishes household, family, farm, and other group
      structures used in social protection targeting. OpenCRVS has no equivalent
      grouping concept.

  - v2_vocabulary: hazard-type
    reason: >
      Hazard classification is used in social protection for shock-responsive
      programming. No analog in civil registration.

  - v2_vocabulary: referral-status
    reason: >
      Referral tracking between programs is a social protection construct with
      no civil registration equivalent.

  - v2_vocabulary: event-severity
    reason: >
      Severity scoring (for shocks, grievances, or needs) is a social protection
      assessment concept absent from OpenCRVS.

  - v2_vocabulary: targeting-approach
    reason: >
      Program targeting methodology is a social protection planning concept with
      no civil registration equivalent.

  # v2 CRVS vocabulary with a semantic mismatch:

  - v2_vocabulary: crvs/registration-type
    reason: >
      Semantic mismatch with OpenCRVS RegistrationType. Ours describes the
      timing and procedural route of registration (current, late, court_ordered,
      reconstruction). OpenCRVS RegistrationType describes which event type is
      being registered (BIRTH, DEATH, MARRIAGE) — that dimension maps to our
      civil-status-record-type vocabulary, not registration-type. The two
      vocabularies share a name but no dimension.

  # --- OpenCRVS domain-relevant vocabularies with no v2 equivalent ---

  - external_vocabulary: RegAction
    reason: >
      Audit-trail action codes (VERIFIED, REQUESTED_CORRECTION, CORRECTED,
      MARKED_AS_DUPLICATE, etc.). PublicSchema does not enumerate workflow
      actions. Note: RegAction.CORRECTED is the operational home for paternity
      recognition, legitimation, and similar amendments in v1 — see
      concept_matches.PaternityRecognition for the `related` reference.

  - external_vocabulary: RegistrationType
    reason: >
      Uppercase mirror of Event (BIRTH, DEATH, MARRIAGE) used on
      Registration.type. Not a separate mapping target; the value-level mapping
      under matches[Event] applies to both enums.

  - external_vocabulary: EventStatus
    reason: >
      Extended registration lifecycle (CREATED, NOTIFIED, DECLARED, REGISTERED,
      ARCHIVED) used in some notification paths. The overlap with
      crvs/registration-status is captured via RegStatus; EventStatus itself has
      no direct mapping because CREATED/NOTIFIED are not modelled in v2.

  - external_vocabulary: ActionType
    reason: >
      CRVS action taxonomy (DECLARE, REGISTER, REJECT, PRINT_CERTIFICATE, etc.).
      Civil registration workflow actions; no v2 concept.

  - external_vocabulary: ActionStatus
    reason: >
      Lifecycle of an individual CRVS action (Requested, Accepted, Rejected).
      Internal to the OpenCRVS events engine; no v2 equivalent.

  - external_vocabulary: UserStatus
    reason: "User account lifecycle. System administration concept; no v2 equivalent."

  - external_vocabulary: SystemRoleType
    reason: >
      Built-in CRVS role types (FIELD_AGENT, LOCAL_REGISTRAR, etc.). Role-based
      access control for a specific system; no v2 equivalent.

  - external_vocabulary: SystemType
    reason: >
      Types of external integrating systems (NATIONAL_ID, HEALTH, RECORD_SEARCH,
      etc.). OpenCRVS integration taxonomy; no v2 equivalent.

  - external_vocabulary: SystemStatus
    reason: "Lifecycle status of an external integrating system client. No v2 equivalent."

  - external_vocabulary: IntegratingSystemType
    reason: "Sub-type for national ID integrations (OSIA, OTHER). Narrow integration taxonomy; no v2 equivalent."

  - external_vocabulary: LocationTypeV1
    reason: >
      Deprecated location type enum (ADMIN_STRUCTURE, CRVS_OFFICE,
      HEALTH_FACILITY). Superseded in v2 by country-configurable strings.
      PublicSchema uses a numeric administrative_level integer (OCHA COD-AB
      convention) rather than named tiers, which covers a related concept
      but at a different granularity.

  - external_vocabulary: AdministrativeAreaType
    reason: >
      Field configuration enum for location types (same values as LocationTypeV1).
      Infrastructure concept; no v2 equivalent.

  - external_vocabulary: AddressType
    reason: >
      Whether an address is domestic or international. V2 does not currently
      define an address type vocabulary — address is modelled as a concept, not
      a typed enum.

  - external_vocabulary: AddressUse
    reason: >
      Purpose of an address (home, work, temp, old) from the FHIR-based legacy
      model. V2 does not define an address use vocabulary.

  - external_vocabulary: GeographicalArea
    reason: >
      Urban/rural classification of an address location. V2 does not define this
      vocabulary, though the concept is relevant to social protection targeting.

  - external_vocabulary: TelecomSystem
    reason: >
      Type of telecommunications contact (phone, fax, email, etc.). Contact point
      infrastructure; no v2 equivalent.

  - external_vocabulary: TelecomUse
    reason: >
      Purpose of a contact point (home, work, temp, etc.). Contact point
      infrastructure; no v2 equivalent.

  - external_vocabulary: AttachmentStatus
    reason: >
      Status of an attached document (PRELIMINARY, FINAL, AMENDED, etc.).
      Document lifecycle concept from the FHIR-based model; no v2 equivalent.

  - external_vocabulary: PaymentType
    reason: >
      Method of fee payment for civil registration services (MANUAL only).
      Registrar-side fee collection; structurally incompatible with v2
      payment-status (disbursement lifecycle).

  - external_vocabulary: VerificationStatus
    reason: >
      Status of an identity verification check against an external system
      (verified, authenticated, failed, pending). CRVS integration concept
      relevant to identity verification workflows; no v2 equivalent.

