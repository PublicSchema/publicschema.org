    fr: Prestation fournie une fois tous les trois mois.
    es: Prestación proporcionada una vez cada tres meses.
  source: schema/vocabularies/benefit-frequency.yaml
- kind: vocabulary_value
  id: benefit-frequency/semi_annually
  labels:
    en: Semi-annually
    fr: Semestriel
    es: Semestral
  definition:
