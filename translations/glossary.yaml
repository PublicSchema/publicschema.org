- kind: vocabulary_value
  id: benefit-frequency/one_time
  labels:
    en: One-time
    fr: Ponctuel
    es: Único
  definition:
    en: A single, non-recurring transfer or benefit.
    fr: Un transfert ou une prestation unique, non récurrent.
    es: Una transferencia o prestación única, no recurrente.
