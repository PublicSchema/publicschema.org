- kind: vocabulary_value
  id: voucher-format/electronic
  labels:
    en: Electronic
    fr: Electronique
    es: Electronico
  definition:
    en: A digital code or token delivered via SMS, mobile application, QR code, or other electronic means.
    fr: Un code ou jeton numerique delivre par SMS, application mobile, code QR ou autre moyen electronique.
    es: Un codigo o token digital entregado por SMS, aplicacion movil, codigo QR u otro medio electronico.
  source: schema/vocabularies/voucher-format.yaml
- kind: vocabulary_value
  id: voucher-format/paper
  labels:
    en: Paper
    fr: Papier
    es: Papel
  definition:
    en: A printed document that the beneficiary presents physically at a vendor or distribution point.
    fr: Un document imprime que le beneficiaire presente physiquement chez un vendeur ou un point de distribution.
    es: Un documento impreso que el beneficiario presenta fisicamente en un vendedor o punto de distribucion.
  source: schema/vocabularies/voucher-format.yaml
- kind: vocabulary
  id: voucher-status
  labels:
    en: voucher-status
    fr: voucher-status
    es: voucher-status
  definition:
    en: The lifecycle states of a voucher instrument, from creation through redemption or expiry.
    fr: Les etats du cycle de vie d'un instrument de bon, de la creation a l'echange ou l'expiration.
    es: Los estados del ciclo de vida de un instrumento de vale, desde la creacion hasta el canje o vencimiento.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/created
  labels:
    en: Created
    fr: Cree
    es: Creado
  definition:
    en: The voucher has been generated but not yet distributed to the beneficiary.
    fr: Le bon a ete genere mais n'a pas encore ete distribue au beneficiaire.
    es: El vale ha sido generado pero aun no ha sido distribuido al beneficiario.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/issued
  labels:
    en: Issued
    fr: Emis
    es: Emitido
  definition:
    en: The voucher has been distributed to the beneficiary or their authorized representative.
    fr: Le bon a ete distribue au beneficiaire ou a son representant autorise.
    es: El vale ha sido distribuido al beneficiario o su representante autorizado.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/suspended
  labels:
    en: Suspended
    fr: Suspendu
    es: Suspendido
  definition:
    en: The voucher has been temporarily deactivated and cannot be redeemed until reactivated. Reasons
      include suspected fraud, verification checks, or administrative holds.
    fr: Le bon a ete temporairement desactive et ne peut pas etre echange jusqu'a sa reactivation. Les
      raisons incluent une suspicion de fraude, des verifications ou des blocages administratifs.
    es: El vale ha sido temporalmente desactivado y no puede ser canjeado hasta su reactivacion. Las razones
      incluyen sospecha de fraude, verificaciones o bloqueos administrativos.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/partially_redeemed
  labels:
    en: Partially redeemed
    fr: Partiellement echange
    es: Parcialmente canjeado
  definition:
    en: Some but not all of the voucher's value or entitled commodities have been redeemed. The voucher
      remains active for further use until fully redeemed or expired.
    fr: Une partie mais pas la totalite de la valeur du bon ou des produits auxquels il donne droit a
      ete echangee. Le bon reste actif pour une utilisation ulterieure jusqu'a echange complet ou expiration.
    es: Se ha canjeado parte pero no la totalidad del valor del vale o de los productos a los que da derecho.
      El vale permanece activo para uso posterior hasta el canje completo o vencimiento.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/redeemed
  labels:
    en: Redeemed
    fr: Echange
    es: Canjeado
  definition:
    en: The voucher has been fully used at a vendor or agent.
    fr: Le bon a ete entierement utilise aupres d'un vendeur ou d'un agent.
    es: El vale ha sido completamente utilizado en un vendedor o agente.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/expired
  labels:
    en: Expired
    fr: Expire
    es: Vencido
  definition:
    en: The voucher's validity period has passed without redemption.
    fr: La periode de validite du bon est passee sans echange.
    es: El periodo de validez del vale ha pasado sin canje.
  source: schema/vocabularies/voucher-status.yaml
- kind: vocabulary_value
  id: voucher-status/cancelled
  labels:
    en: Cancelled
    fr: Annule
    es: Cancelado
  definition:
    en: The voucher has been voided by the program before redemption.
    fr: Le bon a ete annule par le programme avant l'echange.
    es: El vale ha sido anulado por el programa antes del canje.
  source: schema/vocabularies/voucher-status.yaml
