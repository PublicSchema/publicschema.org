- kind: vocabulary
  id: conditionality-type
  labels:
    en: conditionality-type
    fr: conditionality-type
    es: conditionality-type
  definition:
    en: Categories describing whether and how a social protection program requires beneficiaries to meet
      behavioral conditions to receive or continue receiving benefits.
    fr: Catégories décrivant si et comment un programme de protection sociale exige des bénéficiaires
      qu'ils remplissent des conditions comportementales pour recevoir ou continuer à recevoir des prestations.
    es: Categorías que describen si y cómo un programa de protección social requiere que los beneficiarios
      cumplan condiciones de comportamiento para recibir o continuar recibiendo beneficios.
  source: schema/vocabularies/sp/conditionality-type.yaml
- kind: vocabulary_value
  id: conditionality-type/unconditional
  labels:
    en: Unconditional
    fr: Inconditionnel
    es: Incondicional
  definition:
    en: Benefits are provided without requiring the beneficiary to fulfill any behavioral conditions.
    fr: Les prestations sont fournies sans exiger que le bénéficiaire remplisse des conditions comportementales.
    es: Los beneficios se proporcionan sin requerir que el beneficiario cumpla condiciones de comportamiento.
  source: schema/vocabularies/sp/conditionality-type.yaml
- kind: vocabulary_value
  id: conditionality-type/conditional
  labels:
    en: Conditional
    fr: Conditionnel
    es: Condicional
  definition:
    en: Benefits require the beneficiary to meet specified behavioral conditions, such as school attendance,
      health checkups, or participation in training.
    fr: Les prestations exigent que le bénéficiaire remplisse des conditions comportementales spécifiées,
      telles que la fréquentation scolaire, les bilans de santé ou la participation à des formations.
    es: Los beneficios requieren que el beneficiario cumpla condiciones de comportamiento especificadas,
      como asistencia escolar, chequeos de salud o participación en capacitación.
  source: schema/vocabularies/sp/conditionality-type.yaml
- kind: vocabulary_value
  id: conditionality-type/soft_conditional
  labels:
    en: Soft conditional
    fr: Conditionnel souple
    es: Condicional flexible
  definition:
    en: Conditions are encouraged and monitored but non-compliance does not result in benefit suspension
      or termination.
    fr: Les conditions sont encouragées et suivies mais le non-respect n'entraîne pas la suspension ou
      la fin des prestations.
    es: Las condiciones se fomentan y monitorean pero el incumplimiento no resulta en suspensión o terminación
      de beneficios.
  source: schema/vocabularies/sp/conditionality-type.yaml
- kind: vocabulary_value
  id: conditionality-type/labelled
  labels:
    en: Labelled
    fr: Étiqueté
    es: Etiquetado
  definition:
    en: Benefits are designated for a specific purpose (e.g., food, education) but spending is not strictly
      enforced or verified.
    fr: Les prestations sont désignées pour un usage spécifique (par ex., alimentation, éducation) mais
      les dépenses ne sont pas strictement contrôlées ou vérifiées.
    es: Los beneficios se designan para un propósito específico (p. ej., alimentación, educación) pero
      el gasto no se aplica ni verifica estrictamente.
  source: schema/vocabularies/sp/conditionality-type.yaml
- kind: vocabulary
  id: targeting-approach
  labels:
    en: targeting-approach
    fr: targeting-approach
    es: targeting-approach
  definition:
    en: The methods used to identify and select eligible beneficiaries for a social protection program.
    fr: Les méthodes utilisées pour identifier et sélectionner les bénéficiaires éligibles à un programme
      de protection sociale.
    es: Los métodos utilizados para identificar y seleccionar a los beneficiarios elegibles de un programa
      de protección social.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/means_tested
  labels:
    en: Means tested
    fr: Sous condition de ressources
    es: Con verificación de medios
  definition:
    en: Eligibility based on verified income or asset assessment.
    fr: Éligibilité basée sur une évaluation vérifiée des revenus ou des actifs.
    es: Elegibilidad basada en una evaluación verificada de ingresos o activos.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/proxy_means_tested
  labels:
    en: Proxy means tested
    fr: Test par approximation du niveau de vie
    es: Prueba de medios por aproximación
  definition:
    en: Eligibility based on a statistical model predicting welfare from observable household characteristics.
    fr: Éligibilité basée sur un modèle statistique prédisant le bien-être à partir de caractéristiques
      observables du ménage.
    es: Elegibilidad basada en un modelo estadístico que predice el bienestar a partir de características
      observables del hogar.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/categorical
  labels:
    en: Categorical
    fr: Catégoriel
    es: Categórico
  definition:
    en: Eligibility based on demographic category such as age, disability, pregnancy, or orphanhood.
    fr: Éligibilité basée sur une catégorie démographique telle que l'âge, le handicap, la grossesse ou
      l'état d'orphelin.
    es: Elegibilidad basada en una categoría demográfica como edad, discapacidad, embarazo o orfandad.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/geographic
  labels:
    en: Geographic
    fr: Géographique
    es: Geográfico
  definition:
    en: Eligibility based on residence in a defined geographic area.
    fr: Éligibilité basée sur la résidence dans une zone géographique définie.
    es: Elegibilidad basada en la residencia en un área geográfica definida.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/universal
  labels:
    en: Universal
    fr: Universel
    es: Universal
  definition:
    en: Available to all individuals within a defined population, regardless of income or other characteristics.
    fr: Accessible à tous les individus au sein d'une population définie, indépendamment du revenu ou
      d'autres caractéristiques.
    es: Disponible para todos los individuos dentro de una población definida, independientemente de los
      ingresos u otras características.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/community_based
  labels:
    en: Community based
    fr: Basé sur la communauté
    es: Basado en la comunidad
  definition:
    en: The community selects beneficiaries based on local knowledge of relative welfare.
    fr: La communauté sélectionne les bénéficiaires en se basant sur la connaissance locale du bien-être
      relatif.
    es: La comunidad selecciona a los beneficiarios basándose en el conocimiento local del bienestar relativo.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary_value
  id: targeting-approach/self_targeting
  labels:
    en: Self targeting
    fr: Auto-ciblage
    es: Auto-focalización
  definition:
    en: Program design deters non-poor participation, typically by setting wages below market rate or
      requiring time-intensive participation.
    fr: La conception du programme décourage la participation des non-pauvres, généralement en fixant
      des salaires inférieurs au taux du marché ou en exigeant une participation intensive en temps.
    es: El diseño del programa desincentiva la participación de los no pobres, típicamente fijando salarios
      por debajo de la tasa de mercado o exigiendo una participación que requiere mucho tiempo.
  source: schema/vocabularies/sp/targeting-approach.yaml
- kind: vocabulary
  id: unit-of-measure
  labels:
    en: unit-of-measure
    fr: unit-of-measure
    es: unit-of-measure
  definition:
    en: Units of measure for quantities of goods distributed or redeemable through benefit programs.
    fr: Unites de mesure pour les quantites de biens distribues ou echangeables dans les programmes de
      prestations.
    es: Unidades de medida para las cantidades de bienes distribuidos o canjeables a traves de programas
      de beneficios.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/kg
  labels:
    en: Kilogram
    fr: Kilogramme
    es: Kilogramo
  definition:
    en: Unit of mass equal to 1,000 grams.
    fr: Unite de masse egale a 1 000 grammes.
    es: Unidad de masa igual a 1.000 gramos.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/g
  labels:
    en: Gram
    fr: Gramme
    es: Gramo
  definition:
    en: Unit of mass equal to one thousandth of a kilogram.
    fr: Unite de masse egale a un millieme de kilogramme.
    es: Unidad de masa igual a una milesima de kilogramo.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/l
  labels:
    en: Litre
    fr: Litre
    es: Litro
  definition:
    en: Unit of volume equal to 1,000 cubic centimetres.
    fr: Unite de volume egale a 1 000 centimetres cubes.
    es: Unidad de volumen igual a 1.000 centimetros cubicos.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/ml
  labels:
    en: Millilitre
    fr: Millilitre
    es: Mililitro
  definition:
    en: Unit of volume equal to one thousandth of a litre.
    fr: Unite de volume egale a un millieme de litre.
    es: Unidad de volumen igual a una milesima de litro.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/unit
  labels:
    en: Unit
    fr: Unite
    es: Unidad
  definition:
    en: A discrete countable item (e.g., one textbook, one seed packet).
    fr: Un article denombrable discret (par ex., un manuel, un paquet de semences).
    es: Un articulo contable discreto (por ej., un libro de texto, un paquete de semillas).
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/kit
  labels:
    en: Kit
    fr: Kit
    es: Kit
  definition:
    en: A pre-assembled package of multiple items (e.g., hygiene kit, education kit).
    fr: Un ensemble pre-assemble de plusieurs articles (par ex., kit d'hygiene, kit educatif).
    es: Un paquete preensamblado de multiples articulos (por ej., kit de higiene, kit educativo).
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/meal
  labels:
    en: Meal
    fr: Repas
    es: Comida
  definition:
    en: A single prepared meal serving (used in school feeding and institutional programs).
    fr: Une portion de repas prepare (utilise dans les programmes d'alimentation scolaire et institutionnels).
    es: Una porcion de comida preparada (utilizada en programas de alimentacion escolar e institucionales).
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary_value
  id: unit-of-measure/mt
  labels:
    en: Metric ton
    fr: Tonne metrique
    es: Tonelada metrica
  definition:
    en: Unit of mass equal to 1,000 kilograms. Used for bulk commodity tracking.
    fr: Unite de masse egale a 1 000 kilogrammes. Utilisee pour le suivi des produits en vrac.
    es: Unidad de masa igual a 1.000 kilogramos. Utilizada para el seguimiento de productos a granel.
  source: schema/vocabularies/unit-of-measure.yaml
- kind: vocabulary
  id: voucher-format
  labels:
    en: voucher-format
    fr: voucher-format
