- kind: vocabulary
  id: payment-status
  labels:
    en: payment-status
    fr: payment-status
    es: payment-status
  definition:
    en: The processing states of a payment event in the disbursement cycle.
    fr: Les états de traitement d'un événement de paiement dans le cycle de versement.
    es: Los estados de procesamiento de un evento de pago en el ciclo de desembolso.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/pending
  labels:
    en: Pending
    fr: En attente
    es: Pendiente
  definition:
    en: The payment has been scheduled or initiated but has not yet been transmitted or confirmed.
    fr: Le paiement a été planifié ou initié mais n'a pas encore été transmis ou confirmé.
    es: El pago ha sido programado o iniciado pero aún no ha sido transmitido o confirmado.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/processing
  labels:
    en: Processing
    fr: En traitement
    es: En procesamiento
  definition:
    en: The payment instruction has been accepted by the financial intermediary and is being executed.
    fr: L'instruction de paiement a été acceptée par l'intermédiaire financier et est en cours d'exécution.
    es: La instrucción de pago ha sido aceptada por el intermediario financiero y está siendo ejecutada.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/paid
  labels:
    en: Paid
    fr: Payé
    es: Pagado
  definition:
    en: The payment has been successfully transmitted and received by the beneficiary.
    fr: Le paiement a été transmis avec succès et reçu par le bénéficiaire.
    es: El pago ha sido transmitido con éxito y recibido por el beneficiario.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/failed
  labels:
    en: Failed
    fr: Échoué
    es: Fallido
  definition:
    en: The payment attempt did not complete successfully due to a technical or account-level error.
    fr: La tentative de paiement n'a pas abouti en raison d'une erreur technique ou au niveau du compte.
    es: El intento de pago no se completó con éxito debido a un error técnico o a nivel de cuenta.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/returned
  labels:
    en: Returned
    fr: Retourné
    es: Devuelto
  definition:
    en: The payment was transmitted but subsequently returned by the receiving institution or agent.
    fr: Le paiement a été transmis mais a ensuite été retourné par l'institution ou l'agent récepteur.
    es: El pago fue transmitido pero posteriormente devuelto por la institución o agente receptor.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/rejected
  labels:
    en: Rejected
    fr: Rejeté
    es: Rechazado
  definition:
    en: The payment was evaluated and denied based on a business or policy decision, such as a failed
      eligibility check or a disputed claim.
    fr: Le paiement a été évalué et refusé sur la base d'une décision commerciale ou politique, telle
      qu'un contrôle d'éligibilité échoué ou une réclamation contestée.
    es: El pago fue evaluado y denegado en base a una decisión comercial o de política, como una verificación
      de elegibilidad fallida o una reclamación disputada.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/cancelled
  labels:
    en: Cancelled
    fr: Annulé
    es: Cancelado
  definition:
    en: The payment was cancelled before transmission, typically due to eligibility changes or administrative
      decision.
    fr: Le paiement a été annulé avant la transmission, généralement en raison de changements d'éligibilité
      ou d'une décision administrative.
    es: El pago fue cancelado antes de la transmisión, generalmente debido a cambios de elegibilidad o
      decisión administrativa.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary_value
  id: payment-status/reconciled
  labels:
    en: Reconciled
    fr: Réconcilié
    es: Conciliado
  definition:
    en: The payment record has been matched and verified against financial system records, confirming
      accuracy.
    fr: Le registre de paiement a été rapproché et vérifié par rapport aux registres du système financier,
      confirmant l'exactitude.
    es: El registro de pago ha sido cotejado y verificado con los registros del sistema financiero, confirmando
      su exactitud.
  source: schema/vocabularies/payment-status.yaml
- kind: vocabulary
  id: referral-status
  labels:
    en: referral-status
    fr: referral-status
    es: referral-status
  definition:
    en: The lifecycle states of a referral between programs or services.
    fr: Les états du cycle de vie d'une orientation entre programmes ou services.
    es: Los estados del ciclo de vida de una derivación entre programas o servicios.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/pending
  labels:
    en: Pending
    fr: En attente
    es: Pendiente
  definition:
    en: The referral has been created and sent to the receiving program but has not yet been acted upon.
    fr: L'orientation a été créée et envoyée au programme récepteur mais n'a pas encore été traitée.
    es: La derivación ha sido creada y enviada al programa receptor pero aún no ha sido procesada.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/accepted
  labels:
    en: Accepted
    fr: Acceptée
    es: Aceptada
  definition:
    en: The receiving program has acknowledged the referral and agreed to serve the referred person.
    fr: Le programme récepteur a accusé réception de l'orientation et a accepté de prendre en charge la
      personne orientée.
    es: El programa receptor ha reconocido la derivación y ha aceptado atender a la persona derivada.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/declined
  labels:
    en: Declined
    fr: Refusée
    es: Rechazada
  definition:
    en: The receiving program has reviewed but declined to accept the referral, typically due to ineligibility
      or capacity constraints.
    fr: Le programme récepteur a examiné mais refusé l'orientation, généralement en raison d'inéligibilité
      ou de contraintes de capacité.
    es: El programa receptor ha revisado pero rechazado la derivación, generalmente por inelegibilidad
      o restricciones de capacidad.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/completed
  labels:
    en: Completed
    fr: Complétée
    es: Completada
  definition:
    en: The referred person has been enrolled or served by the receiving program, and the referral process
      is finished.
    fr: La personne orientée a été inscrite ou prise en charge par le programme récepteur, et le processus
      d'orientation est terminé.
    es: La persona derivada ha sido inscrita o atendida por el programa receptor, y el proceso de derivación
      ha finalizado.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/cancelled
  labels:
    en: Cancelled
    fr: Annulée
    es: Cancelada
  definition:
    en: The referral was withdrawn by the referring program or the referred person before the receiving
      program acted on it.
    fr: L'orientation a été retirée par le programme référant ou la personne orientée avant que le programme
      récepteur n'agisse.
    es: La derivación fue retirada por el programa referente o la persona derivada antes de que el programa
      receptor actuara.
  source: schema/vocabularies/referral-status.yaml
- kind: vocabulary_value
  id: referral-status/expired
  labels:
    en: Expired
    fr: Expirée
    es: Expirada
  definition:
    en: The referral was not acted upon within the expected timeframe and is no longer valid.
    fr: L'orientation n'a pas été traitée dans le délai prévu et n'est plus valide.
    es: La derivación no fue procesada dentro del plazo esperado y ya no es válida.
  source: schema/vocabularies/referral-status.yaml
