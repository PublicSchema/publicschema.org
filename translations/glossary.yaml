- kind: vocabulary
  id: delivery-channel
  labels:
    en: delivery-channel
    fr: delivery-channel
    es: delivery-channel
  definition:
    en: The mechanisms through which benefit transfers reach beneficiaries.
    fr: Les mécanismes par lesquels les transferts de prestations parviennent aux bénéficiaires.
    es: Los mecanismos a través de los cuales las transferencias de beneficios llegan a los beneficiarios.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/bank_transfer
  labels:
    en: Bank transfer
    fr: Virement bancaire
    es: Transferencia bancaria
  definition:
    en: Payment credited directly to a beneficiary's bank account via electronic funds transfer.
    fr: Paiement crédité directement sur le compte bancaire d'un bénéficiaire par virement électronique.
    es: Pago acreditado directamente en la cuenta bancaria de un beneficiario mediante transferencia electrónica
      de fondos.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/mobile_money
  labels:
    en: Mobile money
    fr: Monnaie mobile
    es: Dinero móvil
  definition:
    en: Payment transmitted to a beneficiary's registered mobile money account (e.g., M-Pesa, Orange Money).
    fr: Paiement transmis au compte de monnaie mobile enregistré d'un bénéficiaire (ex. M-Pesa, Orange
      Money).
    es: Pago transmitido a la cuenta de dinero móvil registrada de un beneficiario (p. ej., M-Pesa, Orange
      Money).
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/cash
  labels:
    en: Cash
    fr: Espèces
    es: Efectivo
  definition:
    en: Physical currency handed directly to the beneficiary, typically at a distribution point.
    fr: Monnaie physique remise directement au bénéficiaire, généralement à un point de distribution.
    es: Moneda física entregada directamente al beneficiario, generalmente en un punto de distribución.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/agent_network
  labels:
    en: Agent network
    fr: Réseau d'agents
    es: Red de agentes
  definition:
    en: Payment disbursed through a network of authorised retail agents acting on behalf of a financial
      institution.
    fr: Paiement versé par un réseau d'agents de détail autorisés agissant pour le compte d'une institution
      financière.
    es: Pago desembolsado a través de una red de agentes minoristas autorizados que actúan en nombre de
      una institución financiera.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/prepaid_card
  labels:
    en: Prepaid card
    fr: Carte prépayée
    es: Tarjeta prepaga
  definition:
    en: Funds loaded onto a physical or virtual prepaid card that the beneficiary uses to make purchases
      or withdraw cash.
    fr: Fonds chargés sur une carte prépayée physique ou virtuelle que le bénéficiaire utilise pour effectuer
      des achats ou retirer de l'argent.
    es: Fondos cargados en una tarjeta prepaga física o virtual que el beneficiario utiliza para realizar
      compras o retirar efectivo.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/service_point
  labels:
    en: Service point
    fr: Point de service
    es: Punto de servicio
  definition:
    en: Benefits accessed at a designated service facility, such as a health clinic or community centre.
    fr: Prestations accessibles dans un établissement de service désigné, tel qu'une clinique de santé
      ou un centre communautaire.
    es: Beneficios a los que se accede en una instalación de servicio designada, como una clínica de salud
      o un centro comunitario.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary_value
  id: delivery-channel/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A delivery channel not covered by the other defined values.
    fr: Un canal de livraison non couvert par les autres valeurs définies.
    es: Un canal de entrega no cubierto por los demás valores definidos.
  source: schema/vocabularies/delivery-channel.yaml
- kind: vocabulary
  id: education-level
  labels:
    en: education-level
    fr: education-level
    es: education-level
  definition:
    en: The highest level of education completed by a person, classified according to the International
      Standard Classification of Education (ISCED 2011).
    fr: Le plus haut niveau d'éducation atteint par une personne, classé selon la Classification internationale
      type de l'éducation (CITE 2011).
    es: El nivel más alto de educación alcanzado por una persona, clasificado según la Clasificación Internacional
      Normalizada de la Educación (CINE 2011).
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/early_childhood
  labels:
    en: Early childhood education
    fr: Éducation de la petite enfance
    es: Educación de la primera infancia
  definition:
    en: 'ISCED level 0: programmes for children below the age of entry into primary education.'
    fr: 'CITE niveau 0 : programmes destinés aux enfants en dessous de l''âge d''entrée dans l''enseignement
      primaire.'
    es: 'CINE nivel 0: programas para niños menores de la edad de entrada en la educación primaria.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/primary
  labels:
    en: Primary education
    fr: Enseignement primaire
    es: Educación primaria
  definition:
    en: 'ISCED level 1: first stage of basic education, typically starting at age 5-7.'
    fr: 'CITE niveau 1 : première étape de l''éducation de base, débutant généralement entre 5 et 7 ans.'
    es: 'CINE nivel 1: primera etapa de la educación básica, que comienza típicamente entre los 5 y 7
      años.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/lower_secondary
  labels:
    en: Lower secondary education
    fr: Premier cycle de l'enseignement secondaire
    es: Educación secundaria baja
  definition:
    en: 'ISCED level 2: second stage of basic education, building on primary.'
    fr: 'CITE niveau 2 : deuxième étape de l''éducation de base, faisant suite à l''enseignement primaire.'
    es: 'CINE nivel 2: segunda etapa de la educación básica, que continúa a partir de la primaria.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/upper_secondary
  labels:
    en: Upper secondary education
    fr: Deuxième cycle de l'enseignement secondaire
    es: Educación secundaria alta
  definition:
    en: 'ISCED level 3: final stage of secondary education, preparing for tertiary or employment.'
    fr: 'CITE niveau 3 : dernière étape de l''enseignement secondaire, préparant à l''enseignement supérieur
      ou à l''emploi.'
    es: 'CINE nivel 3: etapa final de la educación secundaria, que prepara para la educación terciaria
      o el empleo.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/post_secondary_non_tertiary
  labels:
    en: Post-secondary non-tertiary education
    fr: Enseignement post-secondaire non supérieur
    es: Educación postsecundaria no terciaria
  definition:
    en: 'ISCED level 4: programmes between upper secondary and tertiary that are not typically considered
      higher education.'
    fr: 'CITE niveau 4 : programmes situés entre le secondaire supérieur et le supérieur, non généralement
      considérés comme enseignement supérieur.'
    es: 'CINE nivel 4: programas entre la educación secundaria alta y la terciaria que no se consideran
      habitualmente educación superior.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/short_cycle_tertiary
  labels:
    en: Short-cycle tertiary education
    fr: Enseignement supérieur de cycle court
    es: Educación terciaria de ciclo corto
  definition:
    en: 'ISCED level 5: short practical or vocational programmes at the tertiary level.'
    fr: 'CITE niveau 5 : programmes courts, pratiques ou professionnels au niveau de l''enseignement supérieur.'
    es: 'CINE nivel 5: programas cortos, prácticos o vocacionales a nivel terciario.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/bachelor
  labels:
    en: Bachelor's or equivalent
    fr: Licence ou équivalent
    es: Grado o equivalente
  definition:
    en: 'ISCED level 6: first degree or equivalent, typically 3-4 years.'
    fr: 'CITE niveau 6 : premier diplôme ou équivalent, généralement 3 à 4 ans.'
    es: 'CINE nivel 6: primer título o equivalente, típicamente de 3 a 4 años.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/master
  labels:
    en: Master's or equivalent
    fr: Master ou équivalent
    es: Maestría o equivalente
  definition:
    en: 'ISCED level 7: second degree or equivalent, typically 1-2 years after bachelor''s.'
    fr: 'CITE niveau 7 : deuxième diplôme ou équivalent, généralement 1 à 2 ans après la licence.'
    es: 'CINE nivel 7: segundo título o equivalente, típicamente 1 a 2 años después del grado.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary_value
  id: education-level/doctoral
  labels:
    en: Doctoral or equivalent
    fr: Doctorat ou équivalent
    es: Doctorado o equivalente
  definition:
    en: 'ISCED level 8: highest level of education, involving original research.'
    fr: 'CITE niveau 8 : niveau d''éducation le plus élevé, impliquant une recherche originale.'
    es: 'CINE nivel 8: nivel más alto de educación, que implica investigación original.'
  source: schema/vocabularies/education-level.yaml
- kind: vocabulary
  id: eligibility-status
  labels:
    en: eligibility-status
    fr: eligibility-status
    es: eligibility-status
  definition:
    en: The possible outcomes of a formal eligibility determination for a program or service.
    fr: Les résultats possibles d'une détermination formelle d'éligibilité à un programme ou service.
    es: Los posibles resultados de una determinación formal de elegibilidad para un programa o servicio.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary_value
  id: eligibility-status/eligible
  labels:
    en: Eligible
    fr: Éligible
    es: Elegible
  definition:
    en: The subject meets the program's criteria and is approved to receive benefits.
    fr: Le sujet satisfait aux critères du programme et est approuvé pour recevoir des prestations.
    es: El sujeto cumple los criterios del programa y está aprobado para recibir beneficios.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary_value
  id: eligibility-status/ineligible
  labels:
    en: Ineligible
    fr: Non éligible
    es: No elegible
  definition:
    en: The subject does not meet the program's criteria and is not approved for benefits.
    fr: Le sujet ne satisfait pas aux critères du programme et n'est pas approuvé pour recevoir des prestations.
    es: El sujeto no cumple los criterios del programa y no está aprobado para recibir beneficios.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary_value
  id: eligibility-status/pending
  labels:
    en: Pending
    fr: En attente
    es: Pendiente
  definition:
    en: The eligibility determination is in progress and a final decision has not yet been issued.
    fr: La détermination de l'éligibilité est en cours et une décision finale n'a pas encore été rendue.
    es: La determinación de elegibilidad está en curso y aún no se ha emitido una decisión final.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary_value
  id: eligibility-status/under_review
  labels:
    en: Under review
    fr: En cours d'examen
    es: En revisión
  definition:
    en: The eligibility assessment is actively being evaluated by a case worker or review body.
    fr: L'évaluation de l'éligibilité est activement examinée par un agent de terrain ou un organe d'examen.
    es: La evaluación de elegibilidad está siendo evaluada activamente por un trabajador social o un órgano
      de revisión.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary_value
  id: eligibility-status/conditional
  labels:
    en: Conditional
    fr: Conditionnel
    es: Condicional
  definition:
    en: The subject is eligible provided they meet additional conditions, such as school attendance or
      health check-ups.
    fr: Le sujet est éligible à condition de remplir des conditions supplémentaires, telles que la fréquentation
      scolaire ou les examens médicaux.
    es: El sujeto es elegible siempre que cumpla condiciones adicionales, como asistencia escolar o chequeos
      de salud.
  source: schema/vocabularies/eligibility-status.yaml
- kind: vocabulary
  id: enrollment-status
  labels:
    en: enrollment-status
    fr: enrollment-status
    es: enrollment-status
  definition:
    en: The lifecycle states of an enrollment in a program.
    fr: Les états du cycle de vie d'une inscription dans un programme.
    es: Los estados del ciclo de vida de una inscripción en un programa.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/waitlisted
  labels:
    en: Waitlisted
    fr: En liste d'attente
    es: En lista de espera
  definition:
    en: The applicant has been verified as eligible but is awaiting an available program slot due to capacity
      or budget constraints.
    fr: Le demandeur a été vérifié comme éligible mais attend une place disponible dans le programme en
      raison de contraintes de capacité ou de budget.
    es: El solicitante ha sido verificado como elegible pero está esperando un lugar disponible en el
      programa debido a restricciones de capacidad o presupuesto.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/active
  labels:
    en: Active
    fr: Actif
    es: Activo
  definition:
    en: The enrollment is current and benefits are being delivered.
    fr: L'inscription est en cours et les prestations sont délivrées.
    es: La inscripción está vigente y las prestaciones se están entregando.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/suspended
  labels:
    en: Suspended
    fr: Suspendu
    es: Suspendido
  definition:
    en: The enrollment has been temporarily paused, typically pending verification or compliance action.
    fr: L'inscription a été temporairement suspendue, en attente de vérification ou d'action de conformité.
    es: La inscripción ha sido temporalmente pausada, generalmente pendiente de verificación o acción
      de cumplimiento.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/closed
  labels:
    en: Closed
    fr: Clos
    es: Cerrado
  definition:
    en: The enrollment has been permanently ended for administrative reasons such as ineligibility, non-compliance,
      voluntary withdrawal, or death. Use graduated when exit is through program-defined criteria.
    fr: L'inscription a été définitivement clôturée pour des raisons administratives telles que l'inéligibilité,
      le non-respect des conditions, le retrait volontaire ou le décès. Utilisez graduated lorsque la
      sortie se fait selon les critères définis par le programme.
    es: La inscripción ha sido terminada de forma permanente por razones administrativas como inelegibilidad,
      incumplimiento, retiro voluntario o fallecimiento. Use graduated cuando la salida es a través de
      criterios definidos por el programa.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/pending_verification
  labels:
    en: Pending verification
    fr: En attente de vérification
    es: Pendiente de verificación
  definition:
    en: The application is awaiting document or data verification before enrollment is confirmed.
    fr: La demande attend la vérification des documents ou des données avant que l'inscription soit confirmée.
    es: La solicitud está a la espera de verificación de documentos o datos antes de confirmar la inscripción.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary_value
  id: enrollment-status/graduated
  labels:
    en: Graduated
    fr: Sorti avec succès
    es: Graduado
  definition:
    en: The beneficiary has successfully exited the program through program-defined graduation criteria.
    fr: Le bénéficiaire a quitté le programme avec succès selon les critères de graduation définis par
      le programme.
    es: El beneficiario ha salido exitosamente del programa a través de los criterios de graduación definidos
      por el programa.
  source: schema/vocabularies/enrollment-status.yaml
- kind: vocabulary
  id: entitlement-status
  labels:
    en: entitlement-status
    fr: entitlement-status
    es: entitlement-status
  definition:
    en: The lifecycle states of a benefit entitlement instance, from creation through fulfillment or termination.
    fr: Les états du cycle de vie d'une instance de droit à prestation, de la création à l'exécution ou
      la clôture.
    es: Los estados del ciclo de vida de una instancia de derecho a prestación, desde la creación hasta
      el cumplimiento o la terminación.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/pending
  labels:
    en: Pending
    fr: En attente
    es: Pendiente
  definition:
    en: The entitlement has been created but has not yet been confirmed through validation or approval.
    fr: Le droit a été créé mais n'a pas encore été confirmé par validation ou approbation.
    es: El derecho ha sido creado pero aún no ha sido confirmado mediante validación o aprobación.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/approved
  labels:
    en: Approved
    fr: Approuvé
    es: Aprobado
  definition:
    en: The entitlement has been confirmed and is awaiting fulfillment.
    fr: Le droit a été confirmé et est en attente d'exécution.
    es: El derecho ha sido confirmado y está pendiente de cumplimiento.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/suspended
  labels:
    en: Suspended
    fr: Suspendu
    es: Suspendido
  definition:
    en: The entitlement is temporarily withheld, for example due to a failed conditionality check or pending
      verification.
    fr: Le droit est temporairement retenu, par exemple en raison d'un contrôle de conditionnalité échoué
      ou d'une vérification en cours.
    es: El derecho está temporalmente retenido, por ejemplo debido a una verificación de condicionalidad
      fallida o una verificación pendiente.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/rejected
  labels:
    en: Rejected
    fr: Rejeté
    es: Rechazado
  definition:
    en: The entitlement was evaluated and denied. Unlike cancellation, rejection means the entitlement
      was never valid.
    fr: Le droit a été évalué et refusé. Contrairement à l'annulation, le rejet signifie que le droit
      n'a jamais été valide.
    es: El derecho fue evaluado y denegado. A diferencia de la cancelación, el rechazo significa que el
      derecho nunca fue válido.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/cancelled
  labels:
    en: Cancelled
    fr: Annulé
    es: Cancelado
  definition:
    en: The entitlement has been withdrawn and will not be fulfilled.
    fr: Le droit a été retiré et ne sera pas exécuté.
    es: El derecho ha sido retirado y no será cumplido.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/expired
  labels:
    en: Expired
    fr: Expiré
    es: Expirado
  definition:
    en: The entitlement's validity period has passed without fulfillment. Unlike cancellation, no one
      actively withdrew the entitlement; it lapsed.
    fr: La période de validité du droit a expiré sans exécution. Contrairement à l'annulation, personne
      n'a activement retiré le droit ; il a expiré.
    es: El período de validez del derecho ha pasado sin cumplimiento. A diferencia de la cancelación,
      nadie retiró activamente el derecho; caducó.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/partially_fulfilled
  labels:
    en: Partially fulfilled
    fr: Partiellement exécuté
    es: Parcialmente cumplido
  definition:
    en: Some but not all of the entitled amount has been delivered, for example one tranche of a multi-tranche
      payment or a voucher issued but not yet redeemed.
    fr: Une partie mais pas la totalité du montant du droit a été versée, par exemple une tranche d'un
      paiement à tranches multiples ou un bon émis mais pas encore échangé.
    es: Se ha entregado parte pero no la totalidad del monto del derecho, por ejemplo una cuota de un
      pago en múltiples cuotas o un vale emitido pero aún no canjeado.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary_value
  id: entitlement-status/fulfilled
  labels:
    en: Fulfilled
    fr: Exécuté
    es: Cumplido
  definition:
    en: The full entitled amount has been delivered to the beneficiary.
    fr: Le montant total du droit a été versé au bénéficiaire.
    es: El monto total del derecho ha sido entregado al beneficiario.
  source: schema/vocabularies/entitlement-status.yaml
- kind: vocabulary
  id: event-certainty
  labels:
    en: event-certainty
    fr: event-certainty
    es: event-certainty
  definition:
    en: The confidence that an event has occurred or will occur. Values are compatible with OASIS CAP
      v1.2 certainty codes.
    fr: La confiance qu'un evenement s'est produit ou se produira. Les valeurs sont compatibles avec les
      codes de certitude d'OASIS CAP v1.2.
    es: La confianza de que un evento ha ocurrido o ocurrira. Los valores son compatibles con los codigos
      de certeza de OASIS CAP v1.2.
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary_value
  id: event-certainty/observed
  labels:
    en: Observed
    fr: Observe
    es: Observado
  definition:
    en: The event has been observed or confirmed.
    fr: L'evenement a ete observe ou confirme.
    es: El evento ha sido observado o confirmado.
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary_value
  id: event-certainty/likely
  labels:
    en: Likely
    fr: Probable
    es: Probable
  definition:
    en: The event is likely to occur (probability greater than 50%).
    fr: L'evenement est susceptible de se produire (probabilite superieure a 50%).
    es: Es probable que el evento ocurra (probabilidad superior al 50%).
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary_value
  id: event-certainty/possible
  labels:
    en: Possible
    fr: Possible
    es: Posible
  definition:
    en: The event is possible but not likely (probability less than 50%).
    fr: L'evenement est possible mais peu probable (probabilite inferieure a 50%).
    es: El evento es posible pero poco probable (probabilidad inferior al 50%).
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary_value
  id: event-certainty/unlikely
  labels:
    en: Unlikely
    fr: Peu probable
    es: Improbable
  definition:
    en: The event is not expected to occur.
    fr: L'evenement n'est pas prevu.
    es: No se espera que el evento ocurra.
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary_value
  id: event-certainty/unknown
  labels:
    en: Unknown
    fr: Inconnue
    es: Desconocida
  definition:
    en: Certainty is not yet determined.
    fr: La certitude n'est pas encore determinee.
    es: La certeza aun no se ha determinado.
  source: schema/vocabularies/event-certainty.yaml
- kind: vocabulary
  id: event-severity
  labels:
    en: event-severity
    fr: event-severity
    es: event-severity
  definition:
    en: The observed or expected severity of an event's impact. Values are compatible with OASIS CAP v1.2
      severity codes.
    fr: La gravite observee ou attendue de l'impact d'un evenement. Les valeurs sont compatibles avec
      les codes de gravite d'OASIS CAP v1.2.
    es: La gravedad observada o esperada del impacto de un evento. Los valores son compatibles con los
      codigos de gravedad de OASIS CAP v1.2.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary_value
  id: event-severity/extreme
  labels:
    en: Extreme
    fr: Extreme
    es: Extrema
  definition:
    en: Extraordinary threat to life or property.
    fr: Menace extraordinaire pour la vie ou les biens.
    es: Amenaza extraordinaria para la vida o la propiedad.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary_value
  id: event-severity/severe
  labels:
    en: Severe
    fr: Grave
    es: Grave
  definition:
    en: Significant threat to life or property.
    fr: Menace significative pour la vie ou les biens.
    es: Amenaza significativa para la vida o la propiedad.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary_value
  id: event-severity/moderate
  labels:
    en: Moderate
    fr: Moderee
    es: Moderada
  definition:
    en: Possible threat to life or property.
    fr: Menace possible pour la vie ou les biens.
    es: Amenaza posible para la vida o la propiedad.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary_value
  id: event-severity/minor
  labels:
    en: Minor
    fr: Mineure
    es: Menor
  definition:
    en: Minimal or no known threat to life or property.
    fr: Menace minimale ou nulle pour la vie ou les biens.
    es: Amenaza minima o nula para la vida o la propiedad.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary_value
  id: event-severity/unknown
  labels:
    en: Unknown
    fr: Inconnue
    es: Desconocida
  definition:
    en: Severity is not yet determined.
    fr: La gravite n'est pas encore determinee.
    es: La gravedad aun no se ha determinado.
  source: schema/vocabularies/event-severity.yaml
- kind: vocabulary
  id: gender-type
  labels:
    en: gender-type
    fr: gender-type
    es: gender-type
  definition:
    en: The administrative gender of a person as recorded in a registry or identity system. Distinct from
      biological sex (see the sex vocabulary). No single international standard governs gender vocabulary;
      ISO/IEC 5218 explicitly covers biological sex only. This vocabulary provides a minimal common set
      based on what social protection systems actually record.
    fr: Le genre administratif d'une personne tel qu'enregistre dans un registre ou un systeme d'identite.
      Distinct du sexe biologique (voir le vocabulaire sex). Aucune norme internationale unique ne regit
      le vocabulaire du genre. Ce vocabulaire fournit un ensemble minimal commun base sur ce que les systemes
      de protection sociale enregistrent.
    es: El genero administrativo de una persona tal como se registra en un registro o sistema de identidad.
      Distinto del sexo biologico (ver el vocabulario sex). Ninguna norma internacional unica rige el
      vocabulario de genero. Este vocabulario proporciona un conjunto minimo comun basado en lo que los
      sistemas de proteccion social registran.
  source: schema/vocabularies/gender-type.yaml
- kind: vocabulary_value
  id: gender-type/male
  labels:
    en: Male
    fr: Masculin
    es: Masculino
  definition:
    en: Person identifies or is recorded as male.
    fr: La personne s'identifie ou est enregistree comme homme.
    es: La persona se identifica o esta registrada como hombre.
  source: schema/vocabularies/gender-type.yaml
- kind: vocabulary_value
  id: gender-type/female
  labels:
    en: Female
    fr: Feminin
    es: Femenino
  definition:
    en: Person identifies or is recorded as female.
    fr: La personne s'identifie ou est enregistree comme femme.
    es: La persona se identifica o esta registrada como mujer.
  source: schema/vocabularies/gender-type.yaml
- kind: vocabulary_value
  id: gender-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A gender not captured by the male or female categories.
    fr: Un genre qui n'est pas couvert par les categories homme ou femme.
    es: Un genero no cubierto por las categorias hombre o mujer.
  source: schema/vocabularies/gender-type.yaml
- kind: vocabulary_value
  id: gender-type/not_stated
  labels:
    en: Not stated
    fr: Non declare
    es: No declarado
  definition:
    en: Gender has not been recorded or the person declined to disclose.
    fr: Le genre n'a pas ete enregistre ou la personne a refuse de le divulguer.
    es: El genero no ha sido registrado o la persona se nego a divulgarlo.
  source: schema/vocabularies/gender-type.yaml
- kind: vocabulary
  id: grievance-status
  labels:
    en: grievance-status
    fr: grievance-status
    es: grievance-status
  definition:
    en: The lifecycle states of a grievance record in a program or service.
    fr: Les états du cycle de vie d'un dossier de grief dans un programme ou service.
    es: Los estados del ciclo de vida de un registro de agravio en un programa o servicio.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/submitted
  labels:
    en: Submitted
    fr: Soumis
    es: Presentado
  definition:
    en: The grievance has been formally received and registered in the system, awaiting assignment.
    fr: Le grief a été formellement reçu et enregistré dans le système, en attente d'affectation.
    es: El agravio ha sido recibido formalmente y registrado en el sistema, a la espera de asignación.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/under_review
  labels:
    en: Under review
    fr: En cours d'examen
    es: En revisión
  definition:
    en: The grievance is being actively investigated or assessed by a case worker or review body.
    fr: Le grief est en cours d'investigation ou d'évaluation active par un agent de terrain ou un organe
      d'examen.
    es: El agravio está siendo investigado o evaluado activamente por un trabajador social o un órgano
      de revisión.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/resolved
  labels:
    en: Resolved
    fr: Résolu
    es: Resuelto
  definition:
    en: A decision or remedy has been issued and communicated to the complainant.
    fr: Une décision ou un remède a été émis et communiqué au plaignant.
    es: Se ha emitido y comunicado al reclamante una decisión o remedio.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/closed
  labels:
    en: Closed
    fr: Clos
    es: Cerrado
  definition:
    en: The grievance process is complete and the record is archived, either after resolution or withdrawal.
    fr: Le processus de grief est terminé et le dossier est archivé, que ce soit après résolution ou retrait.
    es: El proceso de agravio está completo y el registro está archivado, ya sea después de la resolución
      o retiro.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/escalated
  labels:
    en: Escalated
    fr: Escaladé
    es: Escalado
  definition:
    en: The grievance has been referred to a higher authority or external body because it could not be
      resolved at the first level.
    fr: Le grief a été renvoyé à une autorité supérieure ou un organisme externe parce qu'il n'a pas pu
      être résolu au premier niveau.
    es: El agravio ha sido referido a una autoridad superior u organismo externo porque no pudo resolverse
      en el primer nivel.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/rejected
  labels:
    en: Rejected
    fr: Rejeté
    es: Rechazado
  definition:
    en: The grievance was found to be invalid, outside program scope, or a duplicate, and was not accepted
      for processing.
    fr: Le grief a été jugé invalide, hors du champ du programme ou en double, et n'a pas été accepté
      pour traitement.
    es: El agravio fue considerado inválido, fuera del alcance del programa o duplicado, y no fue aceptado
      para procesamiento.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary_value
  id: grievance-status/withdrawn
  labels:
    en: Withdrawn
    fr: Retiré
    es: Retirado
  definition:
    en: The complainant has voluntarily withdrawn the grievance before resolution.
    fr: Le plaignant a volontairement retiré le grief avant la résolution.
    es: El reclamante ha retirado voluntariamente el agravio antes de la resolución.
  source: schema/vocabularies/grievance-status.yaml
- kind: vocabulary
  id: grievance-type
  labels:
    en: grievance-type
    fr: grievance-type
    es: grievance-type
  definition:
    en: Categories describing the nature of a grievance or complaint received by a program through its
      redress mechanism.
    fr: Catégories décrivant la nature d'un grief ou d'une plainte reçu par un programme via son mécanisme
      de recours.
    es: Categorías que describen la naturaleza de un agravio o queja recibido por un programa a través
      de su mecanismo de recurso.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/exclusion_error
  labels:
    en: Exclusion error
    fr: Erreur d'exclusion
    es: Error de exclusión
  definition:
    en: A complaint that an eligible person or household was wrongly excluded from a program, benefit,
      or service.
    fr: Une plainte indiquant qu'une personne ou un ménage éligible a été injustement exclu d'un programme,
      d'une prestation ou d'un service.
    es: Una queja de que una persona u hogar elegible fue injustamente excluido de un programa, beneficio
      o servicio.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/inclusion_error
  labels:
    en: Inclusion error
    fr: Erreur d'inclusion
    es: Error de inclusión
  definition:
    en: A report that an ineligible person or household is receiving benefits or services they should
      not be entitled to.
    fr: Un signalement qu'une personne ou un ménage inéligible reçoit des prestations ou services auxquels
      il ne devrait pas avoir droit.
    es: Un reporte de que una persona u hogar inelegible está recibiendo beneficios o servicios a los
      que no debería tener derecho.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/payment_complaint
  labels:
    en: Payment complaint
    fr: Plainte de paiement
    es: Queja de pago
  definition:
    en: A complaint about delayed, missing, incorrect, or incomplete benefit payments.
    fr: Une plainte concernant des paiements de prestations retardés, manquants, incorrects ou incomplets.
    es: Una queja sobre pagos de beneficios retrasados, faltantes, incorrectos o incompletos.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/data_correction
  labels:
    en: Data correction
    fr: Correction de données
    es: Corrección de datos
  definition:
    en: A request to correct inaccurate or outdated personal data held by the program, such as a misspelled
      name, wrong date of birth, or incorrect disability status.
    fr: Une demande de correction de données personnelles inexactes ou obsolètes détenues par le programme,
      comme un nom mal orthographié, une date de naissance erronée ou un statut de handicap incorrect.
    es: Una solicitud para corregir datos personales inexactos u obsoletos en poder del programa, como
      un nombre mal escrito, una fecha de nacimiento incorrecta o un estado de discapacidad incorrecto.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/appeal
  labels:
    en: Appeal
    fr: Appel
    es: Recurso
  definition:
    en: A formal request to review an administrative decision, such as an eligibility determination, benefit
      calculation, or exit decision.
    fr: Une demande formelle de révision d'une décision administrative, telle qu'une détermination d'éligibilité,
      un calcul de prestation ou une décision de sortie.
    es: Una solicitud formal para revisar una decisión administrativa, como una determinación de elegibilidad,
      un cálculo de beneficio o una decisión de salida.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/service_quality
  labels:
    en: Service quality
    fr: Qualité de service
    es: Calidad de servicio
  definition:
    en: A complaint about the quality, accessibility, or timeliness of services provided by the program
      or its agents.
    fr: Une plainte concernant la qualité, l'accessibilité ou la rapidité des services fournis par le
      programme ou ses agents.
    es: Una queja sobre la calidad, accesibilidad o oportunidad de los servicios proporcionados por el
      programa o sus agentes.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/misconduct
  labels:
    en: Misconduct
    fr: Mauvaise conduite
    es: Mala conducta
  definition:
    en: An allegation of fraud, corruption, exploitation, abuse, harassment, or other improper behavior
      by program staff or agents.
    fr: Une allégation de fraude, corruption, exploitation, abus, harcèlement ou autre comportement inapproprié
      de la part du personnel ou des agents du programme.
    es: Una alegación de fraude, corrupción, explotación, abuso, acoso u otro comportamiento impropio
      por parte del personal o agentes del programa.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/information_request
  labels:
    en: Information request
    fr: Demande d'information
    es: Solicitud de información
  definition:
    en: A request for information about program rules, eligibility criteria, benefit entitlements, or
      complaint procedures, when received through the grievance intake channel.
    fr: Une demande d'information sur les règles du programme, les critères d'éligibilité, les droits
      aux prestations ou les procédures de plainte, lorsqu'elle est reçue par le canal d'accueil des griefs.
    es: Una solicitud de información sobre las reglas del programa, los criterios de elegibilidad, los
      derechos a beneficios o los procedimientos de queja, cuando se recibe a través del canal de recepción
      de agravios.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary_value
  id: grievance-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A grievance that does not fit the other categories, or where the type has not yet been determined.
    fr: Un grief qui ne correspond pas aux autres catégories, ou dont le type n'a pas encore été déterminé.
    es: Un agravio que no se ajusta a las otras categorías, o cuyo tipo aún no ha sido determinado.
  source: schema/vocabularies/grievance-type.yaml
- kind: vocabulary
  id: group-role
  labels:
    en: group-role
    fr: group-role
    es: group-role
  definition:
    en: The role a person plays within a group such as a household, family, or other organizational unit.
      Roles are defined relative to the group's reference person (head).
    fr: Le rôle qu'une personne joue au sein d'un groupe tel qu'un ménage, une famille ou une autre unité
      organisationnelle. Les rôles sont définis par rapport à la personne de référence du groupe (chef).
    es: El rol que una persona desempeña dentro de un grupo como un hogar, familia u otra unidad organizacional.
      Los roles se definen en relación con la persona de referencia del grupo (jefe/a).
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/head
  labels:
    en: Head
    fr: Chef
    es: Jefe/a
  definition:
    en: The person recognized as the primary decision-maker or representative of the group for administrative
      purposes.
    fr: La personne reconnue comme le principal décideur ou représentant du groupe à des fins administratives.
    es: La persona reconocida como el principal tomador de decisiones o representante del grupo para fines
      administrativos.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/spouse
  labels:
    en: Spouse
    fr: Conjoint(e)
    es: Cónyuge
  definition:
    en: The husband, wife, or legally recognized partner of the group head.
    fr: Le mari, la femme ou le partenaire légalement reconnu du chef de groupe.
    es: El esposo, esposa o pareja legalmente reconocida del jefe de grupo.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/child
  labels:
    en: Child
    fr: Enfant
    es: Hijo/a
  definition:
    en: A son or daughter of the group head or spouse, whether biological, adopted, or fostered.
    fr: Un fils ou une fille du chef de groupe ou du conjoint, biologique, adopté(e) ou placé(e).
    es: Un hijo o hija del jefe de grupo o cónyuge, ya sea biológico, adoptado o en acogida.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/dependent
  labels:
    en: Dependent
    fr: Personne à charge
    es: Dependiente
  definition:
    en: A person who relies on the group for financial support or daily living needs, not classified as
      spouse or child.
    fr: Une personne qui dépend du groupe pour son soutien financier ou ses besoins quotidiens, non classée
      comme conjoint ou enfant.
    es: Una persona que depende del grupo para su sustento financiero o necesidades diarias, no clasificada
      como cónyuge o hijo/a.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/parent
  labels:
    en: Parent
    fr: Parent
    es: Padre/Madre
  definition:
    en: A parent of the group head or spouse living in the same group.
    fr: Un parent du chef de groupe ou du conjoint vivant dans le même groupe.
    es: Un padre o madre del jefe de grupo o cónyuge que vive en el mismo grupo.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/sibling
  labels:
    en: Sibling
    fr: Frère/Sœur
    es: Hermano/a
  definition:
    en: A brother or sister of the group head or their spouse.
    fr: Un frère ou une sœur du chef de groupe ou de son conjoint.
    es: Un hermano o hermana del jefe de grupo o de su cónyuge.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/grandparent
  labels:
    en: Grandparent
    fr: Grand-parent
    es: Abuelo/a
  definition:
    en: A parent of the group head's parent, living in the same group.
    fr: Un parent du parent du chef de groupe, vivant dans le même groupe.
    es: Un padre o madre del padre o madre del jefe de grupo, que vive en el mismo grupo.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/grandchild
  labels:
    en: Grandchild
    fr: Petit-enfant
    es: Nieto/a
  definition:
    en: A child of the group head's child, living in the same group.
    fr: Un enfant de l'enfant du chef de groupe, vivant dans le même groupe.
    es: Un hijo o hija del hijo o hija del jefe de grupo, que vive en el mismo grupo.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/other_relative
  labels:
    en: Other relative
    fr: Autre parent
    es: Otro pariente
  definition:
    en: A family member of the group head who does not fit the other kinship categories.
    fr: Un membre de la famille du chef de groupe qui ne correspond pas aux autres catégories de parenté.
    es: Un miembro de la familia del jefe de grupo que no encaja en las otras categorías de parentesco.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary_value
  id: group-role/non_relative
  labels:
    en: Non-relative
    fr: Non-parent
    es: No pariente
  definition:
    en: A group member who has no kinship tie to the group head.
    fr: Un membre du groupe qui n'a aucun lien de parenté avec le chef de groupe.
    es: Un miembro del grupo que no tiene vínculo de parentesco con el jefe de grupo.
  source: schema/vocabularies/group-role.yaml
- kind: vocabulary
  id: group-type
  labels:
    en: group-type
    fr: group-type
    es: group-type
  definition:
    en: Categories used to classify the administrative or social type of a group in a public service delivery
      system.
    fr: Catégories utilisées pour classer le type administratif ou social d'un groupe dans un système
      de prestation de services publics.
    es: Categorías utilizadas para clasificar el tipo administrativo o social de un grupo en un sistema
      de prestación de servicios públicos.
  source: schema/vocabularies/group-type.yaml
- kind: vocabulary_value
  id: group-type/household
  labels:
    en: Household
    fr: Ménage
    es: Hogar
  definition:
    en: A group of persons who share a dwelling and typically pool resources for daily living. The operational
      definition varies across countries and programs, combining criteria of co-residence, shared budget,
      shared cooking, kinship, and administrative registration.
    fr: Un groupe de personnes partageant un logement et mettant généralement en commun des ressources
      pour la vie quotidienne. La définition opérationnelle varie selon les pays et les programmes, combinant
      des critères de corésidence, de budget partagé, de cuisine commune, de parenté et d'enregistrement
      administratif.
    es: Un grupo de personas que comparten una vivienda y generalmente comparten recursos para la vida
      diaria. La definición operativa varía entre países y programas, combinando criterios de corresidencia,
      presupuesto compartido, cocina compartida, parentesco y registro administrativo.
  source: schema/vocabularies/group-type.yaml
- kind: vocabulary_value
  id: group-type/family
  labels:
    en: Family
    fr: Famille
    es: Familia
  definition:
    en: A group defined by legal or biological kinship ties, which may span multiple households.
    fr: Un groupe défini par des liens de parenté légaux ou biologiques, pouvant s'étendre sur plusieurs
      ménages.
    es: Un grupo definido por lazos de parentesco legal o biológico, que puede abarcar varios hogares.
  source: schema/vocabularies/group-type.yaml
- kind: vocabulary_value
  id: group-type/farm
  labels:
    en: Farm
    fr: Exploitation agricole
    es: Granja
  definition:
    en: An agricultural production unit, often household-based, used for targeting agricultural support
      programs.
    fr: Une unité de production agricole, souvent basée sur le ménage, utilisée pour cibler les programmes
      d'aide agricole.
    es: Una unidad de producción agrícola, generalmente basada en el hogar, utilizada para focalizar programas
      de apoyo agrícola.
  source: schema/vocabularies/group-type.yaml
- kind: vocabulary_value
  id: group-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A group type not covered by the other categories.
    fr: Un type de groupe non couvert par les autres catégories.
    es: Un tipo de grupo no cubierto por las otras categorías.
  source: schema/vocabularies/group-type.yaml
- kind: vocabulary
  id: hazard-type
  labels:
    en: hazard-type
    fr: hazard-type
    es: hazard-type
  definition:
    en: The category of hazard or disruptive event, based on the Sendai Framework classification with
      extensions for social and economic shocks.
    fr: La categorie de risque ou d'evenement perturbateur, basee sur la classification du Cadre de Sendai
      avec des extensions pour les chocs sociaux et economiques.
    es: La categoria de peligro o evento perturbador, basada en la clasificacion del Marco de Sendai con
      extensiones para choques sociales y economicos.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/geophysical
  labels:
    en: Geophysical
    fr: Geophysique
    es: Geofisico
  definition:
    en: Earthquakes, landslides, tsunamis, or volcanic activity.
    fr: Tremblements de terre, glissements de terrain, tsunamis ou activite volcanique.
    es: Terremotos, deslizamientos de tierra, tsunamis o actividad volcanica.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/meteorological
  labels:
    en: Meteorological
    fr: Meteorologique
    es: Meteorologico
  definition:
    en: Floods, storms, extreme temperatures, or drought.
    fr: Inondations, tempetes, temperatures extremes ou secheresse.
    es: Inundaciones, tormentas, temperaturas extremas o sequia.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/biological
  labels:
    en: Biological
    fr: Biologique
    es: Biologico
  definition:
    en: Disease outbreaks, epidemics, pest infestations, or biological contamination.
    fr: Epidemies, infestations de ravageurs ou contamination biologique.
    es: Brotes de enfermedades, epidemias, infestaciones de plagas o contaminacion biologica.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/environmental
  labels:
    en: Environmental
    fr: Environnemental
    es: Ambiental
  definition:
    en: Pollution, deforestation, desertification, or ecological degradation.
    fr: Pollution, deforestation, desertification ou degradation ecologique.
    es: Contaminacion, deforestacion, desertificacion o degradacion ecologica.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/technological
  labels:
    en: Technological
    fr: Technologique
    es: Tecnologico
  definition:
    en: Industrial accidents, infrastructure failures, or chemical spills.
    fr: Accidents industriels, defaillances d'infrastructure ou deversements chimiques.
    es: Accidentes industriales, fallas de infraestructura o derrames quimicos.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/conflict
  labels:
    en: Conflict
    fr: Conflit
    es: Conflicto
  definition:
    en: Armed conflict, civil unrest, or forced displacement.
    fr: Conflit arme, troubles civils ou deplacement force.
    es: Conflicto armado, disturbios civiles o desplazamiento forzado.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/economic
  labels:
    en: Economic
    fr: Economique
    es: Economico
  definition:
    en: Economic shocks such as price spikes, currency collapse, or market disruption.
    fr: Chocs economiques tels que flambee des prix, effondrement monetaire ou perturbation des marches.
    es: Choques economicos como alzas de precios, colapso monetario o perturbacion de mercados.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary_value
  id: hazard-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: Events not covered by any other category.
    fr: Evenements non couverts par aucune autre categorie.
    es: Eventos no cubiertos por ninguna otra categoria.
  source: schema/vocabularies/hazard-type.yaml
- kind: vocabulary
  id: identifier-type
  labels:
    en: identifier-type
    fr: identifier-type
    es: identifier-type
  definition:
    en: Categories of identifier documents or numbers used to identify persons in administrative and service
      delivery systems.
    fr: Categories de documents ou de numeros d'identification utilises pour identifier les personnes
      dans les systemes administratifs et de prestation de services.
    es: Categorias de documentos o numeros de identificacion utilizados para identificar personas en sistemas
      administrativos y de prestacion de servicios.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/national_id
  labels:
    en: National ID
    fr: Carte d'identite nationale
    es: Documento de identidad nacional
  definition:
    en: A government-issued national identity number or card.
    fr: Un numero ou une carte d'identite nationale delivre par le gouvernement.
    es: Un numero o tarjeta de identidad nacional emitido por el gobierno.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/birth_certificate
  labels:
    en: Birth certificate
    fr: Acte de naissance
    es: Certificado de nacimiento
  definition:
    en: An official record of a person's birth issued by a civil registry.
    fr: Un document officiel de naissance delivre par un registre d'etat civil.
    es: Un registro oficial de nacimiento emitido por un registro civil.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/passport
  labels:
    en: Passport
    fr: Passeport
    es: Pasaporte
  definition:
    en: A government-issued travel document that also serves as a proof of identity and nationality.
    fr: Un document de voyage delivre par le gouvernement servant egalement de preuve d'identite et de
      nationalite.
    es: Un documento de viaje emitido por el gobierno que tambien sirve como prueba de identidad y nacionalidad.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/voter_id
  labels:
    en: Voter ID
    fr: Carte d'electeur
    es: Tarjeta de votante
  definition:
    en: An identity document issued for electoral registration purposes.
    fr: Un document d'identite delivre a des fins d'inscription electorale.
    es: Un documento de identidad emitido con fines de registro electoral.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/program_id
  labels:
    en: Program ID
    fr: Identifiant de programme
    es: ID de programa
  definition:
    en: A beneficiary identifier assigned by a specific program.
    fr: Un identifiant de beneficiaire attribue par un programme specifique.
    es: Un identificador de beneficiario asignado por un programa especifico.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/household_id
  labels:
    en: Household ID
    fr: Identifiant de menage
    es: ID de hogar
  definition:
    en: An identifier assigned to a household rather than to an individual person.
    fr: Un identifiant attribue a un menage plutot qu'a une personne individuelle.
    es: Un identificador asignado a un hogar en lugar de a una persona individual.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/social_security_number
  labels:
    en: Social security number
    fr: Numero de securite sociale
    es: Numero de seguridad social
  definition:
    en: A number assigned by a social security or social insurance administration, distinct from a national
      identity number in many countries.
    fr: Un numero attribue par une administration de securite sociale ou d'assurance sociale, distinct
      du numero d'identite nationale dans de nombreux pays.
    es: Un numero asignado por una administracion de seguridad social o seguro social, distinto del numero
      de identidad nacional en muchos paises.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/tax_id
  labels:
    en: Tax ID
    fr: Identifiant fiscal
    es: Identificacion fiscal
  definition:
    en: A tax identification number assigned by a revenue or fiscal authority.
    fr: Un numero d'identification fiscale attribue par une autorite fiscale ou de recettes.
    es: Un numero de identificacion fiscal asignado por una autoridad tributaria o fiscal.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/drivers_license
  labels:
    en: Driver's license
    fr: Permis de conduire
    es: Licencia de conducir
  definition:
    en: A government-issued permit to operate motor vehicles, commonly used as identification.
    fr: Un permis delivre par le gouvernement pour conduire des vehicules a moteur, couramment utilise
      comme piece d'identite.
    es: Un permiso emitido por el gobierno para operar vehiculos motorizados, comúnmente utilizado como
      identificacion.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/marriage_certificate
  labels:
    en: Marriage certificate
    fr: Acte de mariage
    es: Certificado de matrimonio
  definition:
    en: An official record of a marriage issued by a civil registry or religious authority.
    fr: Un document officiel de mariage delivre par un registre d'etat civil ou une autorite religieuse.
    es: Un registro oficial de matrimonio emitido por un registro civil o una autoridad religiosa.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/death_certificate
  labels:
    en: Death certificate
    fr: Acte de deces
    es: Certificado de defuncion
  definition:
    en: An official record of a death issued by a civil registry or health authority.
    fr: Un document officiel de deces delivre par un registre d'etat civil ou une autorite sanitaire.
    es: Un registro oficial de defuncion emitido por un registro civil o una autoridad sanitaria.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary_value
  id: identifier-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: An identifier type not covered by the other categories.
    fr: Un type d'identifiant non couvert par les autres categories.
    es: Un tipo de identificador no cubierto por las otras categorias.
  source: schema/vocabularies/identifier-type.yaml
- kind: vocabulary
  id: language
  labels:
    en: language
    fr: language
    es: language
  definition:
    en: Language codes as defined by the ISO 639-3 standard, covering all known human languages.
    fr: Codes de langues tels que définis par la norme ISO 639-3, couvrant toutes les langues humaines
      connues.
    es: Códigos de idiomas según la norma ISO 639-3, que abarca todos los idiomas humanos conocidos.
  source: schema/vocabularies/language.yaml
