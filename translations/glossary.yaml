- kind: vocabulary
  id: relationship-type
  labels:
    en: relationship-type
    fr: relationship-type
    es: relationship-type
  definition:
    en: Categories describing the nature of the connection between two persons, covering kinship, administrative,
      and economic relationships.
    fr: Catégories décrivant la nature du lien entre deux personnes, couvrant les relations de parenté,
      administratives et économiques.
    es: Categorías que describen la naturaleza de la conexión entre dos personas, abarcando relaciones
      de parentesco, administrativas y económicas.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/spouse
  labels:
    en: Spouse
    fr: Conjoint(e)
    es: Cónyuge
  definition:
    en: A person's husband, wife, or legally recognized partner.
    fr: Le mari, la femme ou le partenaire légalement reconnu d'une personne.
    es: El esposo, esposa o pareja legalmente reconocida de una persona.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/parent
  labels:
    en: Parent
    fr: Parent
    es: Padre/Madre
  definition:
    en: A biological or legally recognized mother or father.
    fr: Une mère ou un père biologique ou légalement reconnu(e).
    es: Una madre o padre biológico o legalmente reconocido.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/child
  labels:
    en: Child
    fr: Enfant
    es: Hijo/a
  definition:
    en: A biological or legally recognized son or daughter.
    fr: Un fils ou une fille biologique ou légalement reconnu(e).
    es: Un hijo o hija biológico o legalmente reconocido.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/sibling
  labels:
    en: Sibling
    fr: Frère/Sœur
    es: Hermano/a
  definition:
    en: A brother or sister sharing at least one biological or legal parent.
    fr: Un frère ou une sœur partageant au moins un parent biologique ou légal.
    es: Un hermano o hermana que comparte al menos un padre biológico o legal.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/grandparent
  labels:
    en: Grandparent
    fr: Grand-parent
    es: Abuelo/a
  definition:
    en: A parent of a person's parent.
    fr: Un parent du parent d'une personne.
    es: Un padre o madre del padre o madre de una persona.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/grandchild
  labels:
    en: Grandchild
    fr: Petit-enfant
    es: Nieto/a
  definition:
    en: A child of a person's child.
    fr: Un enfant de l'enfant d'une personne.
    es: Un hijo o hija del hijo o hija de una persona.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/guardian
  labels:
    en: Guardian
    fr: Tuteur/Tutrice
    es: Tutor/a
  definition:
    en: A person with legal responsibility for the care and management of another, typically a minor or
      incapacitated adult.
    fr: Une personne ayant la responsabilité légale de la prise en charge d'une autre personne, généralement
      un mineur ou un adulte incapable.
    es: Una persona con responsabilidad legal del cuidado y gestión de otra, generalmente un menor o un
      adulto incapacitado.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/caregiver
  labels:
    en: Caregiver
    fr: Soignant(e)
    es: Cuidador/a
  definition:
    en: A person who provides ongoing care or assistance, whether or not they hold legal guardianship.
    fr: Une personne qui fournit des soins ou une assistance continue, qu'elle détienne ou non la tutelle
      légale.
    es: Una persona que proporciona cuidado o asistencia continua, tenga o no la tutela legal.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/dependent
  labels:
    en: Dependent
    fr: Personne à charge
    es: Dependiente
  definition:
    en: A person who relies on another for financial support or daily living needs.
    fr: Une personne qui dépend d'une autre pour son soutien financier ou ses besoins quotidiens.
    es: Una persona que depende de otra para su sustento financiero o necesidades diarias.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/in_law
  labels:
    en: In-law
    fr: Par alliance
    es: Pariente político
  definition:
    en: A person related through marriage rather than by blood, such as a parent-in-law, child-in-law,
      or sibling-in-law.
    fr: Une personne liée par le mariage plutôt que par le sang, comme un beau-parent, un gendre/belle-fille
      ou un beau-frère/belle-sœur.
    es: Una persona relacionada por matrimonio en lugar de por sangre, como un suegro/a, yerno/nuera o
      cuñado/a.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/extended_family
  labels:
    en: Extended family
    fr: Famille élargie
    es: Familia extendida
  definition:
    en: A family member beyond the immediate kinship categories (e.g. aunt, uncle, cousin, niece, nephew)
      where the specific type is not recorded.
    fr: Un membre de la famille au-delà des catégories de parenté immédiate (p. ex. tante, oncle, cousin,
      nièce, neveu) dont le type spécifique n'est pas enregistré.
    es: Un miembro de la familia más allá de las categorías de parentesco inmediato (p. ej. tía, tío,
      primo, sobrina, sobrino) cuyo tipo específico no está registrado.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/payment_proxy
  labels:
    en: Payment proxy
    fr: Mandataire de paiement
    es: Apoderado de pago
  definition:
    en: A person authorized to collect benefits on behalf of another, often used when the beneficiary
      cannot collect in person.
    fr: Une personne autorisée à collecter des prestations au nom d'une autre, souvent utilisée lorsque
      le bénéficiaire ne peut pas collecter en personne.
    es: Una persona autorizada para cobrar beneficios en nombre de otra, utilizada frecuentemente cuando
      el beneficiario no puede cobrar en persona.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/survivor
  labels:
    en: Survivor
    fr: Survivant(e)
    es: Sobreviviente
  definition:
    en: A person entitled to continued or transferred benefits following the death of the primary beneficiary.
    fr: Une personne ayant droit à la continuation ou au transfert des prestations suite au décès du bénéficiaire
      principal.
    es: Una persona con derecho a la continuación o transferencia de beneficios tras el fallecimiento
      del beneficiario principal.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary_value
  id: relationship-type/other
  labels:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A relationship type not covered by the other categories.
    fr: Un type de relation non couvert par les autres catégories.
    es: Un tipo de relación no cubierto por las otras categorías.
  source: schema/vocabularies/relationship-type.yaml
- kind: vocabulary
  id: script
  labels:
    en: script
    fr: script
    es: script
  definition:
    en: Writing system codes as defined by the ISO 15924 standard.
    fr: Codes de systèmes d'écriture tels que définis par la norme ISO 15924.
    es: Códigos de sistemas de escritura según la norma ISO 15924.
  source: schema/vocabularies/script.yaml
