    fr: Prestation fournie une fois par semaine.
    es: Prestación proporcionada una vez por semana.
  source: schema/vocabularies/benefit-frequency.yaml
- kind: vocabulary_value
  id: benefit-frequency/every_two_weeks
  labels:
