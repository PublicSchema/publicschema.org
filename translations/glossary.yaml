domain_terms:
- kind: concept
  id: Address
  labels:
    en: Address
    fr: Address
    es: Address
  definition:
    en: A structured physical or postal location used to reach a person, household, or organization. Addresses
      combine spatial and administrative components such as street, settlement, district, and postal code.
    fr: Un emplacement physique ou postal structure utilise pour joindre une personne, un menage ou une
      organisation. Les adresses combinent des composantes spatiales et administratives telles que la
      rue, le quartier, le district et le code postal.
    es: Una ubicacion fisica o postal estructurada utilizada para contactar a una persona, hogar u organizacion.
      Las direcciones combinan componentes espaciales y administrativos como calle, localidad, distrito
      y codigo postal.
  source: schema/concepts/address.yaml
- kind: concept
  id: AssessmentEvent
  labels:
    en: AssessmentEvent
    fr: AssessmentEvent
    es: AssessmentEvent
  definition:
    en: A discrete event where a subject's data is processed through a specific assessment framework to
      generate a welfare profile or score. Triggers include initial registration, recertification, and
      shock-response reassessment.
    fr: Un événement discret au cours duquel les données d'un sujet sont traitées via un cadre d'évaluation
      spécifique pour générer un profil ou un score de bien-être. Les déclencheurs comprennent l'enregistrement
      initial, la recertification et la réévaluation en réponse à un choc.
    es: Un evento discreto en el que los datos de un sujeto se procesan a través de un marco de evaluación
      específico para generar un perfil o puntuación de bienestar. Los desencadenantes incluyen el registro
      inicial, la recertificación y la reevaluación ante un choque.
  source: schema/concepts/assessment-event.yaml
- kind: concept
  id: AssessmentFramework
  labels:
    en: AssessmentFramework
    fr: AssessmentFramework
    es: AssessmentFramework
  definition:
    en: A persistent set of rules, formulas, or criteria used to process subject data into a welfare profile
      or score. Assessment frameworks include proxy means tests, community scorecards, and composite welfare
      indices.
    fr: Un ensemble persistant de règles, de formules ou de critères utilisés pour traiter les données
      d'un sujet afin de produire un profil ou un score de bien-être. Les cadres d'évaluation comprennent
      les tests de proxy des moyens, les fiches d'évaluation communautaires et les indices composites
      de bien-être.
    es: Un conjunto persistente de reglas, fórmulas o criterios utilizados para procesar los datos de
      un sujeto y generar un perfil o puntuación de bienestar. Los marcos de evaluación incluyen pruebas
      de proxy de medios, tarjetas de puntuación comunitarias e índices compuestos de bienestar.
  source: schema/concepts/assessment-framework.yaml
- kind: concept
  id: BenefitSchedule
  labels:
    en: BenefitSchedule
    fr: BenefitSchedule
    es: BenefitSchedule
  definition:
    en: A program-level definition of a benefit stream that specifies the modality, amount, frequency,
      and time period over which benefits are provided. A program may have one or more benefit schedules
      (e.g., a monthly cash transfer and an annual school supplies kit).
    fr: Une definition au niveau du programme d'un flux de prestations qui specifie la modalite, le montant,
      la frequence et la periode pendant laquelle les prestations sont fournies. Un programme peut avoir
      un ou plusieurs calendriers de prestations (par ex., un transfert monetaire mensuel et un kit de
      fournitures scolaires annuel).
    es: Una definicion a nivel de programa de un flujo de beneficios que especifica la modalidad, el monto,
      la frecuencia y el periodo durante el cual se proporcionan los beneficios. Un programa puede tener
      uno o mas calendarios de beneficios (por ej., una transferencia monetaria mensual y un kit de utiles
      escolares anual).
  source: schema/concepts/benefit-schedule.yaml
- kind: concept
  id: DeliveryItem
  labels:
    en: DeliveryItem
    fr: DeliveryItem
    es: DeliveryItem
  definition:
    en: A line item describing a specific commodity and quantity within a delivery or voucher. Used to
      represent food baskets, supply kits, and other composite benefits where multiple commodities are
      included at specified quantities.
    fr: Une ligne de detail decrivant un produit specifique et sa quantite dans une livraison ou un bon.
      Utilise pour representer les paniers alimentaires, les kits de fournitures et d'autres prestations
      composites ou plusieurs produits sont inclus a des quantites specifiees.
    es: Una linea de detalle que describe un producto especifico y su cantidad dentro de una entrega o
      vale. Se utiliza para representar canastas de alimentos, kits de suministros y otros beneficios
      compuestos donde se incluyen multiples productos en cantidades especificadas.
  source: schema/concepts/delivery-item.yaml
- kind: concept
  id: EligibilityDecision
  labels:
    en: EligibilityDecision
    fr: EligibilityDecision
    es: EligibilityDecision
  definition:
    en: A formal determination of whether a subject meets a program's criteria based on assessed conditions.
      One assessment event can produce multiple eligibility decisions for different programs.
    fr: Une détermination formelle indiquant si un sujet satisfait aux critères d'un programme sur la
      base des conditions évaluées. Un événement d'évaluation peut produire plusieurs décisions d'éligibilité
      pour différents programmes.
    es: Una determinación formal de si un sujeto cumple los criterios de un programa en función de las
      condiciones evaluadas. Un evento de evaluación puede producir múltiples decisiones de elegibilidad
      para diferentes programas.
  source: schema/concepts/eligibility-decision.yaml
- kind: concept
  id: Enrollment
  labels:
    en: Enrollment
    fr: Enrollment
    es: Enrollment
  definition:
    en: The administrative process of registering an eligible individual or household as an active beneficiary
      of a program. Enrollment activates benefit delivery and creates the link between the beneficiary
      and the program.
    fr: Le processus administratif d'intégration d'un sujet éligible en tant que bénéficiaire actif d'un
      programme. Les contraintes budgétaires signifient que l'éligibilité ne garantit pas l'inscription.
    es: El proceso administrativo de incorporación de un sujeto elegible como beneficiario activo de un
      programa. Las restricciones presupuestarias significan que la elegibilidad no garantiza la inscripción.
  source: schema/concepts/enrollment.yaml
- kind: concept
  id: Entitlement
  labels:
    en: Entitlement
    fr: Entitlement
    es: Entitlement
  definition:
    en: An instance of a recognized right of a specific beneficiary to receive a benefit. Each entitlement
      typically corresponds to one disbursement period, but multiple entitlements may exist for the same
      enrollment and overlapping periods (e.g., base transfer plus top-up, multi-tranche payments, or
      emergency supplements). The entitlement references both the enrollment (who) and the benefit schedule
      (what was promised).
    fr: Une instance d'un droit reconnu d'un beneficiaire specifique a recevoir une prestation. Chaque
      droit correspond generalement a une periode de versement, mais plusieurs droits peuvent exister
      pour la meme inscription et des periodes chevauchantes (par ex., transfert de base plus complement,
      paiements a tranches multiples ou supplements d'urgence). Le droit reference a la fois l'inscription
      (qui) et le calendrier de prestations (ce qui a ete promis).
    es: Una instancia de un derecho reconocido de un beneficiario especifico a recibir un beneficio. Cada
      derecho corresponde tipicamente a un periodo de desembolso, pero pueden existir multiples derechos
      para la misma inscripcion y periodos superpuestos (por ej., transferencia base mas complemento,
      pagos en multiples cuotas o suplementos de emergencia). El derecho referencia tanto la inscripcion
      (quien) como el calendario de beneficios (lo que se prometio).
  source: schema/concepts/entitlement.yaml
- kind: concept
  id: Event
  labels:
    en: Event
    fr: Event
    es: Event
  definition:
    en: Something that happens at a specific time or over a bounded period within a delivery system. Event
      is the shared supertype for records that capture occurrences (assessments, decisions, payments,
      deliveries, referrals, etc.), as distinct from standing entities like persons, groups, or programs.
    fr: Quelque chose qui se produit à un moment précis ou sur une période délimitée au sein d'un système
      de prestation. Event est le supertype partagé pour les enregistrements qui capturent des occurrences
      (évaluations, décisions, paiements, livraisons, orientations, etc.), distincts des entités permanentes
      comme les personnes, les groupes ou les programmes.
    es: Algo que ocurre en un momento específico o durante un período delimitado dentro de un sistema
      de prestación. Event es el supertipo compartido para los registros que capturan ocurrencias (evaluaciones,
      decisiones, pagos, entregas, derivaciones, etc.), distintos de las entidades permanentes como personas,
      grupos o programas.
  source: schema/concepts/event.yaml
- kind: concept
  id: Family
  labels:
    en: Family
    fr: Family
    es: Family
  definition:
    en: A social unit defined by kinship, marriage, or adoption, regardless of shared budget or co-residence.
      A family can span multiple households and geographic boundaries.
    fr: Une unité sociale définie par la parenté, le mariage ou l'adoption, indépendamment du budget partagé
      ou de la corésidence. Une famille peut s'étendre sur plusieurs ménages et frontières géographiques.
    es: Una unidad social definida por el parentesco, el matrimonio o la adopción, independientemente
      del presupuesto compartido o la corresidencia. Una familia puede abarcar varios hogares y fronteras
      geográficas.
  source: schema/concepts/family.yaml
- kind: concept
  id: Farm
  labels:
    en: Farm
    fr: Farm
    es: Farm
  definition:
    en: An organizational and operating unit of agricultural production under single management. Farm
      records appear across agricultural registries, land administration, social protection, and climate
      adaptation programs.
    fr: Une unite organisationnelle et operationnelle de production agricole sous gestion unique. Les
      donnees sur les exploitations agricoles apparaissent dans les registres agricoles, l'administration
      fonciere, la protection sociale et les programmes d'adaptation climatique.
    es: Una unidad organizativa y operativa de produccion agricola bajo gestion unica. Los registros de
      fincas aparecen en registros agricolas, administracion de tierras, proteccion social y programas
      de adaptacion climatica.
  source: schema/concepts/farm.yaml
- kind: concept
  id: GeographicArea
  labels:
    en: GeographicArea
    fr: GeographicArea
    es: GeographicArea
  definition:
    en: A defined geographic region described by boundary geometry, administrative codes, or named locations.
      Used to specify the spatial extent of alerts, program coverage, and other location-bounded concepts.
    fr: Une region geographique definie par une geometrie de limites, des codes administratifs ou des
      lieux nommes. Utilisee pour specifier l'etendue spatiale des alertes, de la couverture des programmes
      et d'autres concepts lies a un lieu.
    es: Una region geografica definida por geometria de limites, codigos administrativos o ubicaciones
      con nombre. Se utiliza para especificar la extension espacial de alertas, cobertura de programas
      y otros conceptos vinculados a una ubicacion.
  source: schema/concepts/geographic-area.yaml
- kind: concept
  id: Grievance
  labels:
    en: Grievance
    fr: Grievance
    es: Grievance
  definition:
    en: A record of a participant's or applicant's formal expression of dissatisfaction or dispute regarding
      any aspect of the delivery chain. Grievance subsumes appeals (requests to reverse a decision) and
      complaints (dissatisfaction with service quality).
    fr: Un enregistrement de l'expression formelle d'insatisfaction ou de contestation d'un participant
      ou d'un demandeur concernant tout aspect de la chaîne de livraison. Le grief englobe les appels
      (demandes d'annulation d'une décision) et les plaintes (insatisfaction vis-à-vis de la qualité du
      service).
    es: Un registro de la expresión formal de insatisfacción o disputa de un participante o solicitante
      con respecto a cualquier aspecto de la cadena de entrega. El agravio engloba los recursos (solicitudes
      para revertir una decisión) y las quejas (insatisfacción con la calidad del servicio).
  source: schema/concepts/grievance.yaml
- kind: concept
  id: GroupMembership
  labels:
    en: GroupMembership
    fr: GroupMembership
    es: GroupMembership
  definition:
    en: The link between a Person and a Group, carrying the role the person plays within that group (such
      as head, spouse, or dependent). This join record allows a person to belong to multiple groups simultaneously.
    fr: Le lien entre une personne et un groupe, indiquant le role que la personne joue au sein de ce
      groupe (tel que chef, conjoint ou dependant). Cet enregistrement de jointure permet a une personne
      d'appartenir a plusieurs groupes simultanement.
    es: El vinculo entre una persona y un grupo, que indica el rol que la persona desempena dentro de
      ese grupo (como jefe, conyuge o dependiente). Este registro de union permite que una persona pertenezca
      a varios grupos al mismo tiempo.
  source: schema/concepts/group-membership.yaml
- kind: concept
  id: Group
  labels:
    en: Group
    fr: Group
    es: Group
  definition:
    en: An abstract collection of persons that serves as the base for concrete group types such as Household,
      Family, and Farm. Groups are linked to their members via GroupMembership records.
    fr: Un regroupement abstrait de personnes qui sert de base aux types de groupes concrets tels que
      Menage, Famille et Exploitation agricole. Les groupes sont lies a leurs membres via des enregistrements
      GroupMembership.
    es: Una coleccion abstracta de personas que sirve como base para tipos de grupos concretos como Hogar,
      Familia y Granja. Los grupos se vinculan a sus miembros mediante registros GroupMembership.
  source: schema/concepts/group.yaml
- kind: concept
  id: HazardEvent
  labels:
    en: HazardEvent
    fr: HazardEvent
    es: HazardEvent
  definition:
    en: An event or condition that may disrupt the delivery of public services or affect the well-being
      of a population. Covers natural hazards (floods, droughts, earthquakes), health emergencies, conflict,
      and economic shocks. Aligned with the Sendai Framework's broad definition of hazard, and mappable
      to OASIS CAP v1.2 for alert interoperability.
    fr: Un evenement ou une condition pouvant perturber la prestation de services publics ou affecter
      le bien-etre d'une population. Couvre les risques naturels (inondations, secheresses, tremblements
      de terre), les urgences sanitaires, les conflits et les chocs economiques. Aligne sur la definition
      large du Cadre de Sendai et compatible avec OASIS CAP v1.2 pour l'interoperabilite des alertes.
    es: Un evento o condicion que puede interrumpir la prestacion de servicios publicos o afectar el bienestar
      de una poblacion. Cubre riesgos naturales (inundaciones, sequias, terremotos), emergencias sanitarias,
      conflictos y choques economicos. Alineado con la definicion amplia del Marco de Sendai y compatible
      con OASIS CAP v1.2 para la interoperabilidad de alertas.
  source: schema/concepts/hazard-event.yaml
- kind: concept
  id: Household
  labels:
    en: Household
    fr: Household
    es: Household
  definition:
    en: A social and economic unit of one or more persons who share food and other essentials for living.
      The operational definition varies across countries and programs, combining criteria of co-residence,
      shared budget, shared cooking, kinship, and administrative registration.
    fr: Une unité sociale et économique d'une ou plusieurs personnes qui partagent la nourriture et d'autres
      biens essentiels à la vie. La définition opérationnelle varie selon les pays et les programmes,
      combinant des critères de corésidence, de budget partagé, de cuisine commune, de parenté et d'enregistrement
      administratif.
    es: Una unidad social y económica de una o más personas que comparten alimentos y otros elementos
      esenciales para la vida. La definición operacional varía según los países y programas, combinando
      criterios de corresidencia, presupuesto compartido, cocina común, parentesco y registro administrativo.
  source: schema/concepts/household.yaml
- kind: concept
  id: Identifier
  labels:
    en: Identifier
    fr: Identifier
    es: Identifier
  definition:
    en: A unique alphanumeric code assigned to a party (person or group) by a system or authority, such
      as a national ID number, birth certificate number, household registration number, or program-assigned
      beneficiary code.
    fr: Un code alphanumerique unique attribue a une partie (personne ou groupe) par un systeme ou une
      autorite, tel qu'un numero d'identite nationale, un numero d'acte de naissance, un numero d'enregistrement
      de menage ou un code beneficiaire attribue par un programme.
    es: Un codigo alfanumerico unico asignado a una parte (persona o grupo) por un sistema o autoridad,
      como un numero de identidad nacional, numero de certificado de nacimiento, numero de registro de
      hogar o codigo de beneficiario asignado por un programa.
  source: schema/concepts/identifier.yaml
- kind: concept
  id: InKindDelivery
  labels:
    en: InKindDelivery
    fr: InKindDelivery
    es: InKindDelivery
  definition:
    en: A record of a direct physical distribution of goods or services from a program to a beneficiary,
      with no financial instrument involved. Covers food distribution, supply kits, agricultural inputs,
      school feeding, and direct service provision. Multiple in-kind deliveries may fulfill a single entitlement.
    fr: Un enregistrement d'une distribution physique directe de biens ou de services d'un programme vers
      un beneficiaire, sans instrument financier implique. Couvre la distribution alimentaire, les kits
      de fournitures, les intrants agricoles, l'alimentation scolaire et la prestation directe de services.
      Plusieurs livraisons en nature peuvent remplir un seul droit.
    es: Un registro de una distribucion fisica directa de bienes o servicios de un programa a un beneficiario,
      sin instrumento financiero involucrado. Cubre la distribucion de alimentos, kits de suministros,
      insumos agricolas, alimentacion escolar y prestacion directa de servicios. Varias entregas en especie
      pueden cumplir un solo derecho.
  source: schema/concepts/in-kind-delivery.yaml
- kind: concept
  id: Location
  labels:
    en: Location
    fr: Location
    es: Location
  definition:
    en: A named geographic or administrative area, such as a region, district, commune, or village. Location
      captures where a household or event is situated within an administrative hierarchy, distinct from
      a street address.
    fr: Une zone geographique ou administrative nommee, telle qu'une region, un district, une commune
      ou un village. La localisation indique ou se situe un menage ou un evenement dans une hierarchie
      administrative, distinct d'une adresse postale.
    es: Una area geografica o administrativa con nombre, como una region, distrito, municipio o aldea.
      La ubicacion indica donde se situa un hogar o evento dentro de una jerarquia administrativa, distinta
      de una direccion postal.
  source: schema/concepts/location.yaml
- kind: concept
  id: Party
  labels:
    en: Party
    fr: Party
    es: Party
  definition:
    en: A person or organized group of persons that can be identified, enrolled in programs, and receive
      benefits or services. Party is the shared supertype for Person and Group, enabling references that
      accept either.
    fr: Une personne ou un groupe organise de personnes pouvant etre identifie, inscrit dans des programmes
      et recevoir des prestations ou des services. Party est le supertype partage pour Person et Group,
      permettant des references acceptant l'un ou l'autre.
    es: Una persona o grupo organizado de personas que puede ser identificado, inscrito en programas y
      recibir beneficios o servicios. Party es el supertipo compartido para Person y Group, permitiendo
      referencias que aceptan cualquiera de los dos.
  source: schema/concepts/party.yaml
- kind: concept
  id: PaymentEvent
  labels:
    en: PaymentEvent
    fr: PaymentEvent
    es: PaymentEvent
  definition:
    en: A record of a direct monetary transfer from a program to a beneficiary. Covers bank transfer,
      mobile money, cash, agent network, and prepaid card channels. Multiple payment events may fulfill
      a single entitlement (e.g., split payments, multi-tranche disbursements, or retries after failure).
    fr: Un enregistrement d'un transfert monetaire direct d'un programme vers un beneficiaire. Couvre
      les canaux de virement bancaire, monnaie mobile, especes, reseau d'agents et carte prepayee. Plusieurs
      evenements de paiement peuvent remplir un seul droit (par ex., paiements fractionnes, versements
      a tranches multiples ou nouvelles tentatives apres echec).
    es: Un registro de una transferencia monetaria directa de un programa a un beneficiario. Cubre los
      canales de transferencia bancaria, dinero movil, efectivo, red de agentes y tarjeta prepaga. Varios
      eventos de pago pueden cumplir un solo derecho (por ej., pagos fraccionados, desembolsos en multiples
      cuotas o reintentos tras fallo).
  source: schema/concepts/payment-event.yaml
- kind: concept
  id: Person
  labels:
    en: Person
    fr: Person
    es: Person
  definition:
    en: The unique individual human being who is a subject of record within a social protection system.
      Person is the persistent, atomic unit of identity in registries; operational statuses such as Registrant,
      Applicant, or Beneficiary are transient roles defined by the person's relationship to a specific
      Program, not properties of the Person entity itself.
    fr: L'individu unique qui fait l'objet d'un enregistrement dans un systeme de protection sociale.
      La personne est l'unite atomique et persistante d'identite dans les registres; les statuts operationnels
      tels que demandeur ou beneficiaire sont des roles transitoires definis par la relation de la personne
      a un programme specifique.
    es: El individuo unico que es sujeto de registro en un sistema de proteccion social. La persona es
      la unidad atomica y persistente de identidad en los registros; los estados operacionales como solicitante
      o beneficiario son roles transitorios definidos por la relacion de la persona con un programa especifico.
  source: schema/concepts/person.yaml
- kind: concept
  id: Program
  labels:
    en: Program
    fr: Program
    es: Program
  definition:
    en: A government or institutional social protection intervention that provides benefits to eligible
      individuals or households based on defined criteria. A program has a name, implementing agency,
      targeting approach, and coverage area.
    fr: Une intervention gouvernementale ou institutionnelle de protection sociale qui fournit des prestations
      aux individus ou aux ménages éligibles selon des critères définis. Un programme a un nom, une agence
      de mise en oeuvre, une approche de ciblage et une zone de couverture.
    es: Una intervención gubernamental o institucional de protección social que proporciona beneficios
      a individuos u hogares elegibles según criterios definidos. Un programa tiene un nombre, una agencia
      implementadora, un enfoque de focalización y un área de cobertura.
  source: schema/concepts/program.yaml
- kind: concept
  id: Referral
  labels:
    en: Referral
    fr: Referral
    es: Referral
  definition:
    en: A structured process of linking a subject to an external program, service, or provider to address
      identified needs. Referrals span a spectrum from passive information sharing to active service linkage
      with follow-up.
    fr: Un processus structuré de mise en relation d'un sujet avec un programme, un service ou un prestataire
      externe pour répondre aux besoins identifiés. Les orientations vont d'un simple partage d'information
      passif à une mise en lien active avec suivi.
    es: Un proceso estructurado de vinculación de un sujeto con un programa, servicio o proveedor externo
      para abordar las necesidades identificadas. Las derivaciones abarcan un espectro que va desde el
      intercambio pasivo de información hasta la vinculación activa de servicios con seguimiento.
  source: schema/concepts/referral.yaml
- kind: concept
  id: Relationship
  labels:
    en: Relationship
    fr: Relationship
    es: Relationship
  definition:
    en: 'A link defining the social, legal, or administrative connection between an individual and another
      person or group. Three broad types exist: kinship (biological or legal ties), administrative (grantee,
      caregiver, payment proxy), and economic (dependent, survivor).'
    fr: 'Un lien définissant la connexion sociale, légale ou administrative entre un individu et une autre
      personne ou un groupe. Trois grands types existent : la parenté (liens biologiques ou juridiques),
      l''administratif (bénéficiaire, soignant, mandataire de paiement) et l''économique (dépendant, survivant).'
    es: 'Un vínculo que define la conexión social, legal o administrativa entre un individuo y otra persona
      o grupo. Existen tres tipos generales: parentesco (vínculos biológicos o legales), administrativo
      (beneficiario, cuidador, apoderado de pago) y económico (dependiente, sobreviviente).'
  source: schema/concepts/relationship.yaml
- kind: concept
  id: VoucherRedemption
  labels:
    en: VoucherRedemption
    fr: VoucherRedemption
    es: VoucherRedemption
  definition:
    en: A record of a single redemption transaction against a voucher. Each VoucherRedemption captures
      one visit to a vendor or agent where part or all of a voucher's value or entitled commodities were
      collected. For single-use vouchers, there is one VoucherRedemption. For incremental redemption (common
      in WFP value voucher programs), multiple VoucherRedemption records track each visit.
    fr: Un enregistrement d'une transaction de canje unique contre un bon. Chaque VoucherRedemption capture
      une visite chez un vendeur ou agent ou une partie ou la totalite de la valeur du bon ou des produits
      auxquels il donne droit a ete collectee. Pour les bons a usage unique, il y a un seul VoucherRedemption.
      Pour le canje incremental (courant dans les programmes de bons de valeur du PAM), plusieurs enregistrements
      VoucherRedemption suivent chaque visite.
    es: Un registro de una transaccion de canje unica contra un vale. Cada VoucherRedemption captura una
      visita a un vendedor o agente donde se recogio parte o la totalidad del valor del vale o de los
      productos a los que da derecho. Para vales de uso unico, hay un solo VoucherRedemption. Para el
      canje incremental (comun en los programas de vales de valor del PMA), multiples registros VoucherRedemption
      rastrean cada visita.
  source: schema/concepts/voucher-redemption.yaml
- kind: concept
  id: Voucher
  labels:
    en: Voucher
    fr: Voucher
    es: Voucher
  definition:
    en: 'A redeemable instrument issued to a beneficiary as fulfillment of a benefit entitlement. A voucher
      has a distinct lifecycle: creation, issuance, redemption, expiry, or cancellation. It may be electronic
      (digital code, SMS, QR) or paper. Multiple vouchers may fulfill a single entitlement, and a voucher''s
      face value may differ from the entitlement amount.'
    fr: 'Un instrument echangeable emis au benefice d''un beneficiaire en execution d''un droit a prestation.
      Un bon a un cycle de vie distinct: creation, emission, echange, expiration ou annulation. Il peut
      etre electronique (code numerique, SMS, QR) ou papier. Plusieurs bons peuvent remplir un seul droit,
      et la valeur nominale d''un bon peut differer du montant du droit.'
    es: 'Un instrumento canjeable emitido a un beneficiario como cumplimiento de un derecho a prestacion.
      Un vale tiene un ciclo de vida distinto: creacion, emision, canje, vencimiento o cancelacion. Puede
      ser electronico (codigo digital, SMS, QR) o en papel. Varios vales pueden cumplir un solo derecho,
      y el valor nominal de un vale puede diferir del monto del derecho.'
  source: schema/concepts/voucher.yaml
- kind: property
  id: address
  labels:
    en: address
    fr: address
    es: address
  definition:
    en: The physical or postal address associated with this household.
    fr: L'adresse physique ou postale associée à ce ménage.
    es: La dirección física o postal asociada a este hogar.
  source: schema/properties/address.yaml
- kind: property
  id: address_area
  labels:
    en: address_area
    fr: address_area
    es: address_area
  definition:
    en: The name of a geographic area such as a neighborhood, quarter, or ward that groups addresses below
      the city level.
    fr: Le nom d'une zone geographique telle qu'un quartier ou un secteur qui regroupe des adresses en
      dessous du niveau de la ville.
    es: El nombre de un area geografica como un barrio o sector que agrupa direcciones por debajo del
      nivel de la ciudad.
  source: schema/properties/address_area.yaml
- kind: property
  id: administrative_area
  labels:
    en: administrative_area
    fr: administrative_area
    es: administrative_area
  definition:
    en: The first-level administrative subdivision (province, state, region) containing the address.
    fr: La premiere subdivision administrative (province, etat, region) contenant l'adresse.
    es: La primera subdivision administrativa (provincia, estado, region) que contiene la direccion.
  source: schema/properties/administrative_area.yaml
- kind: property
  id: administrative_level
  labels:
    en: administrative_level
    fr: administrative_level
    es: administrative_level
  definition:
    en: 'The numeric tier in the administrative hierarchy, following the OCHA COD-AB convention: 0 = country,
      1 = first subnational (state, province, region), 2 = second subnational (district, county, department),
      and so on. No fixed maximum depth.'
    fr: 'Le niveau numerique dans la hierarchie administrative, selon la convention OCHA COD-AB : 0 =
      pays, 1 = premier niveau sous-national (etat, province, region), 2 = deuxieme niveau sous-national
      (district, comte, departement), et ainsi de suite. Pas de profondeur maximale fixe.'
    es: 'El nivel numerico en la jerarquia administrativa, segun la convencion OCHA COD-AB: 0 = pais,
      1 = primer nivel subnacional (estado, provincia, region), 2 = segundo nivel subnacional (distrito,
      condado, departamento), y asi sucesivamente. Sin profundidad maxima fija.'
  source: schema/properties/administrative_level.yaml
- kind: property
  id: affected_locations
  labels:
    en: affected_locations
    fr: affected_locations
    es: affected_locations
  definition:
    en: The geographic or administrative areas affected by this event.
    fr: Les zones geographiques ou administratives affectees par cet evenement.
    es: Las areas geograficas o administrativas afectadas por este evento.
  source: schema/properties/affected_locations.yaml
- kind: property
  id: affected_programs
  labels:
    en: affected_programs
    fr: affected_programs
    es: affected_programs
  definition:
    en: Programs whose operations or beneficiaries are affected by this event.
    fr: Les programmes dont les operations ou les beneficiaires sont affectes par cet evenement.
    es: Programas cuyas operaciones o beneficiarios se ven afectados por este evento.
  source: schema/properties/affected_programs.yaml
- kind: property
  id: altitude_max
  labels:
    en: altitude_max
    fr: altitude_max
    es: altitude_max
  definition:
    en: The maximum altitude of the area, in meters above sea level (WGS84 datum).
    fr: L'altitude maximale de la zone, en metres au-dessus du niveau de la mer (datum WGS84).
    es: La altitud maxima del area, en metros sobre el nivel del mar (datum WGS84).
  source: schema/properties/altitude_max.yaml
- kind: property
  id: altitude_min
  labels:
    en: altitude_min
    fr: altitude_min
    es: altitude_min
  definition:
    en: The minimum altitude of the area, in meters above sea level (WGS84 datum).
    fr: L'altitude minimale de la zone, en metres au-dessus du niveau de la mer (datum WGS84).
    es: La altitud minima del area, en metros sobre el nivel del mar (datum WGS84).
  source: schema/properties/altitude_min.yaml
- kind: property
  id: amount
  labels:
    en: amount
    fr: amount
    es: amount
  definition:
    en: The monetary or quantitative value associated with this record.
    fr: La valeur monetaire ou quantitative associee a cet enregistrement.
    es: El valor monetario o cuantitativo asociado a este registro.
  source: schema/properties/amount.yaml
- kind: property
  id: applicant
  labels:
    en: applicant
    fr: applicant
    es: applicant
  definition:
    en: The person or group that applied for and received this eligibility decision.
    fr: La personne ou le groupe ayant demandé et reçu cette décision d'éligibilité.
    es: La persona o grupo que solicitó y recibió esta decisión de elegibilidad.
  source: schema/properties/applicant.yaml
- kind: property
  id: area_description
  labels:
    en: area_description
    fr: area_description
    es: area_description
