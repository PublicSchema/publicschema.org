  source: schema/properties/dwelling_type.yaml
- kind: property
  id: education_level
  labels:
    en: education_level
    fr: education_level
    es: education_level
  definition:
    en: The highest level of formal education completed by a person.
    fr: Le plus haut niveau d'éducation formelle atteint par une personne.
    es: El nivel más alto de educación formal alcanzado por una persona.
  source: schema/properties/education_level.yaml
- kind: property
  id: eligibility_decision_ref
  labels:
    en: eligibility_decision_ref
    fr: eligibility_decision_ref
    es: eligibility_decision_ref
  definition:
    en: Reference to the eligibility decision that authorized this enrollment.
    fr: Référence à la décision d'éligibilité qui a autorisé cette inscription.
    es: Referencia a la decisión de elegibilidad que autorizó esta inscripción.
  source: schema/properties/eligibility_decision_ref.yaml
- kind: property
  id: eligibility_status
  labels:
    en: eligibility_status
    fr: eligibility_status
    es: eligibility_status
  definition:
    en: The outcome of the eligibility determination.
    fr: Le résultat de la détermination de l'éligibilité.
    es: El resultado de la determinación de elegibilidad.
  source: schema/properties/eligibility_status.yaml
- kind: property
  id: email_address
  labels:
    en: email_address
    fr: email_address
    es: email_address
  definition:
    en: An email address through which the person can be contacted.
    fr: Une adresse electronique par laquelle la personne peut etre contactee.
    es: Una direccion de correo electronico a traves de la cual se puede contactar a la persona.
  source: schema/properties/email_address.yaml
- kind: property
  id: end_date
  labels:
    en: end_date
    fr: end_date
    es: end_date
  definition:
    en: The date on which this record or relationship ceased to be effective.
    fr: La date à laquelle cet enregistrement ou cette relation a cessé d'être effectif.
    es: La fecha en que este registro o relación dejó de ser efectivo.
  source: schema/properties/end_date.yaml
- kind: property
  id: enrollment_date
