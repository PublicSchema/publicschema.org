    es: Una descripcion legible del area geografica, como un nombre de region o una etiqueta de limite
      administrativo.
  source: schema/properties/area_description.yaml
- kind: property
  id: assessed_entity
  labels:
    en: assessed_entity
    fr: assessed_entity
    es: assessed_entity
  definition:
    en: Reference to the person or group that was assessed.
    fr: Référence à la personne ou au groupe qui a été évalué.
    es: Referencia a la persona o grupo que fue evaluado.
  source: schema/properties/assessed_entity.yaml
- kind: property
  id: assessment_date
  labels:
    en: assessment_date
    fr: assessment_date
