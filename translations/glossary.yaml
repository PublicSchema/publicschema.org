      provider.
    fr: Un document ou code échangeable qui donne droit au titulaire d'obtenir des biens ou services auprès
      d'un prestataire désigné.
    es: Un documento o código canjeable que da derecho al titular a obtener bienes o servicios de un proveedor
      designado.
  source: schema/vocabularies/benefit-modality.yaml
- kind: vocabulary_value
  id: benefit-modality/in_kind
  labels:
    en: In-kind
    fr: En nature
    es: En especie
  definition:
    en: Physical goods (food, clothing, agricultural inputs, etc.) provided directly rather than as a
      monetary equivalent.
    fr: Biens physiques (nourriture, vêtements, intrants agricoles, etc.) fournis directement plutôt que
      sous forme d'équivalent monétaire.
    es: Bienes físicos (alimentos, ropa, insumos agrícolas, etc.) proporcionados directamente en lugar
      de como equivalente monetario.
  source: schema/vocabularies/benefit-modality.yaml
- kind: vocabulary_value
  id: benefit-modality/service
  labels:
    en: Service
    fr: Service
    es: Servicio
  definition:
    en: Access to a social service such as healthcare, education, childcare, or skills training provided
      as the benefit.
    fr: Accès à un service social tel que les soins de santé, l'éducation, la garde d'enfants ou la formation
      professionnelle fourni comme prestation.
    es: Acceso a un servicio social como atención médica, educación, cuidado infantil o formación profesional
      proporcionado como beneficio.
  source: schema/vocabularies/benefit-modality.yaml
- kind: vocabulary_value
  id: benefit-modality/fee_waiver
  labels:
    en: Fee waiver
    fr: Exonération de frais
    es: Exención de tarifa
  definition:
    en: An exemption from a fee or charge that would otherwise apply, such as school fees, health co-payments,
      or utility costs.
    fr: Une exonération d'une redevance ou d'un frais qui s'appliquerait autrement, comme les frais de
      scolarité, les co-paiements de santé ou les coûts des services publics.
    es: Una exención de una tarifa o cargo que de otro modo se aplicaría, como cuotas escolares, copagos
      de salud o costos de servicios públicos.
  source: schema/vocabularies/benefit-modality.yaml
- kind: vocabulary_value
  id: benefit-modality/insurance
  labels:
    en: Insurance
    fr: Assurance
    es: Seguro
  definition:
    en: Enrollment in or subsidization of an insurance scheme (health, crop, social) as the benefit provided
      to the beneficiary.
    fr: Inscription ou subvention d'un régime d'assurance (santé, récolte, social) comme prestation fournie
      au bénéficiaire.
    es: Inscripción en o subsidio de un esquema de seguro (salud, cosecha, social) como beneficio proporcionado
      al beneficiario.
  source: schema/vocabularies/benefit-modality.yaml
- kind: vocabulary
  id: country
  labels:
    en: country
    fr: country
    es: country
  definition:
    en: Countries and territories as defined by the ISO 3166-1 standard, using alpha-2 codes.
    fr: Pays et territoires tels que définis par la norme ISO 3166-1, utilisant les codes alpha-2.
    es: Países y territorios según la norma ISO 3166-1, utilizando códigos alfa-2.
