  <text x="476" y="193" text-anchor="middle" fill="#92400e" font-size="11" font-weight="500">Selective</text>

  <!-- Row 6: Transaction reference -->
  <rect x="0" y="206" width="160" height="32" fill="#faf9f6" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="12" y="227" fill="#1e1b18" font-size="12">Transaction reference</text>

  <rect x="162" y="206" width="124" height="32" fill="#f0ece7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="224" y="227" text-anchor="middle" fill="#9a958f" font-size="11">n/a</text>

  <rect x="288" y="206" width="124" height="32" fill="#f0ece7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="350" y="227" text-anchor="middle" fill="#9a958f" font-size="11">n/a</text>

  <rect x="414" y="206" width="124" height="32" fill="#fef3c7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="476" y="227" text-anchor="middle" fill="#92400e" font-size="11" font-weight="500">Selective</text>
