<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 250"
     fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- Header row -->
  <rect x="0" y="0" width="160" height="34" rx="0" fill="#1e3a5f"/>
  <text x="80" y="22" text-anchor="middle"
        fill="#ffffff" font-size="12" font-weight="600">Claim group</text>

  <rect x="162" y="0" width="124" height="34" rx="0" fill="#1e3a5f"/>
