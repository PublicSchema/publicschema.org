  <rect x="162" y="104" width="124" height="32" fill="#f0ece7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="224" y="125" text-anchor="middle" fill="#9a958f" font-size="11">n/a</text>

  <rect x="288" y="104" width="124" height="32" fill="#dcfce7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="350" y="125" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">Always</text>

