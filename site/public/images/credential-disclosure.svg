  <rect x="0" y="172" width="160" height="32" fill="#faf9f6" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="12" y="193" fill="#1e1b18" font-size="12">Financial details</text>

  <rect x="162" y="172" width="124" height="32" fill="#f0ece7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="224" y="193" text-anchor="middle" fill="#9a958f" font-size="11">n/a</text>

  <rect x="288" y="172" width="124" height="32" fill="#f0ece7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="350" y="193" text-anchor="middle" fill="#9a958f" font-size="11">n/a</text>

