  <rect x="162" y="36" width="124" height="32" fill="#dcfce7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="224" y="57" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">Always</text>

  <rect x="288" y="36" width="124" height="32" fill="#dcfce7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="350" y="57" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">Always</text>

  <rect x="414" y="36" width="124" height="32" fill="#dcfce7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="476" y="57" text-anchor="middle" fill="#166534" font-size="11" font-weight="500">Always</text>

  <!-- Row 2: Person identity -->
  <rect x="0" y="70" width="160" height="32" fill="#faf9f6" stroke="#ddd8d3" stroke-width="0.5"/>
