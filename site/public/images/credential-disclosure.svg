  <rect x="162" y="70" width="124" height="32" fill="#fef3c7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="224" y="91" text-anchor="middle" fill="#92400e" font-size="11" font-weight="500">Selective</text>

  <rect x="288" y="70" width="124" height="32" fill="#fef3c7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="350" y="91" text-anchor="middle" fill="#92400e" font-size="11" font-weight="500">Selective</text>

  <rect x="414" y="70" width="124" height="32" fill="#fef3c7" stroke="#ddd8d3" stroke-width="0.5"/>
  <text x="476" y="91" text-anchor="middle" fill="#92400e" font-size="11" font-weight="500">Selective</text>

  <!-- Row 3: Status and dates -->
  <rect x="0" y="104" width="160" height="32" fill="#faf9f6" stroke="#ddd8d3" stroke-width="0.5"/>
