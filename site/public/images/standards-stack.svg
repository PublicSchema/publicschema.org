<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300"
     fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- Layer 1: Trust and transport -->
  <rect x="20" y="8" width="560" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="33" fill="#1e1b18" font-size="13" font-weight="500">Trust and transport</text>
  <text x="564" y="33" text-anchor="end"
        fill="#6f6b66" font-size="11">EBSI · OpenID4VC · W3C VC</text>

  <!-- Layer 2: Identity attributes -->
  <rect x="20" y="54" width="560" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="79" fill="#1e1b18" font-size="13" font-weight="500">Identity attributes</text>
  <text x="564" y="79" text-anchor="end"
        fill="#6f6b66" font-size="11">EU Core Person · W3C Citizenship</text>

  <!-- Layer 3: Service catalogues -->
  <rect x="20" y="100" width="560" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="125" fill="#1e1b18" font-size="13" font-weight="500">Service catalogues</text>
  <text x="564" y="125" text-anchor="end"
        fill="#6f6b66" font-size="11">CPSV-AP · HSDS · schema.org</text>

  <!-- Layer 4: API interoperability -->
  <rect x="20" y="146" width="560" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="171" fill="#1e1b18" font-size="13" font-weight="500">API interoperability</text>
  <text x="564" y="171" text-anchor="end"
        fill="#6f6b66" font-size="11">DCI/SPDCI · GovStack</text>

  <!-- Layer 5: Statistical measurement -->
  <rect x="20" y="192" width="560" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="217" fill="#1e1b18" font-size="13" font-weight="500">Statistical measurement</text>
  <text x="564" y="217" text-anchor="end"
        fill="#6f6b66" font-size="11">ILO · World Bank ASPIRE</text>

  <!-- Layer 6: Delivery lifecycle (PublicSchema) -->
  <rect x="20" y="244" width="560" height="48" rx="5" fill="#1e3a5f"/>
  <text x="36" y="273" fill="#ffffff" font-size="14" font-weight="600">Delivery lifecycle vocabulary</text>
  <text x="564" y="273" text-anchor="end"
        fill="#a3bdd4" font-size="12" font-weight="500">PublicSchema</text>
</svg>
