<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320"
     fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- Column header: How data moves -->
  <text x="195" y="20" text-anchor="middle"
        fill="#6f6b66" font-size="10" font-weight="600"
        letter-spacing="0.05em" text-transform="uppercase">HOW DATA MOVES</text>

  <!-- Column header: What data means -->
  <text x="490" y="20" text-anchor="middle"
        fill="#6f6b66" font-size="10" font-weight="600"
        letter-spacing="0.05em" text-transform="uppercase">WHAT DATA MEANS</text>

  <!-- Left column: existing standards -->
  <rect x="20" y="36" width="350" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="61" fill="#1e1b18" font-size="12" font-weight="500">Trust and transport</text>
  <text x="354" y="61" text-anchor="end"
        fill="#6f6b66" font-size="11">EBSI · OpenID4VC · W3C VC</text>

  <rect x="20" y="82" width="350" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="107" fill="#1e1b18" font-size="12" font-weight="500">Identity attributes</text>
  <text x="354" y="107" text-anchor="end"
        fill="#6f6b66" font-size="11">EU Core Person</text>

  <rect x="20" y="128" width="350" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="153" fill="#1e1b18" font-size="12" font-weight="500">Service catalogues</text>
  <text x="354" y="153" text-anchor="end"
        fill="#6f6b66" font-size="11">CPSV-AP · HSDS</text>

  <rect x="20" y="174" width="350" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="199" fill="#1e1b18" font-size="12" font-weight="500">API interoperability</text>
  <text x="354" y="199" text-anchor="end"
        fill="#6f6b66" font-size="11">DCI · GovStack</text>

  <rect x="20" y="220" width="350" height="40" rx="5"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1"/>
  <text x="36" y="245" fill="#1e1b18" font-size="12" font-weight="500">Statistical measurement</text>
  <text x="354" y="245" text-anchor="end"
        fill="#6f6b66" font-size="11">ILO · World Bank ASPIRE</text>

  <!-- Right column: PublicSchema -->
  <rect x="390" y="36" width="190" height="224" rx="6" fill="#1e3a5f"/>
  <text x="485" y="130" text-anchor="middle"
        fill="#ffffff" font-size="15" font-weight="600">PublicSchema</text>
  <text x="485" y="152" text-anchor="middle"
        fill="#a3bdd4" font-size="11">Delivery lifecycle</text>
  <text x="485" y="168" text-anchor="middle"
        fill="#a3bdd4" font-size="11">vocabulary</text>

  <!-- Connecting arrows: complementary relationship -->
  <line x1="370" y1="100" x2="390" y2="100" stroke="#9a958f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="370" y1="150" x2="390" y2="150" stroke="#9a958f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="370" y1="196" x2="390" y2="196" stroke="#9a958f" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Caption -->
  <text x="300" y="296" text-anchor="middle"
        fill="#6f6b66" font-size="11" font-style="italic">Other standards define how data moves. PublicSchema defines what it means.</text>
  <text x="300" y="312" text-anchor="middle"
        fill="#6f6b66" font-size="11" font-style="italic">The two are complementary.</text>
</svg>
