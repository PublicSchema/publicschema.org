<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80"
     fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

  <!-- System A -->
  <rect x="10" y="20" width="130" height="40" rx="6"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1.5"/>
  <text x="75" y="45" text-anchor="middle"
        fill="#1e1b18" font-size="13" font-weight="500">System A</text>

  <!-- Arrow A to PS -->
  <path d="M140 40 L222 40" stroke="#9a958f" stroke-width="1.5"/>
  <polygon points="218,35 228,40 218,45" fill="#9a958f"/>
  <text x="184" y="33" text-anchor="middle"
        fill="#6f6b66" font-size="10">map</text>

  <!-- PublicSchema -->
  <rect x="228" y="14" width="144" height="52" rx="6" fill="#1e3a5f"/>
  <text x="300" y="45" text-anchor="middle"
        fill="#ffffff" font-size="13" font-weight="600">PublicSchema</text>

  <!-- Arrow PS to B -->
  <path d="M372 40 L452 40" stroke="#9a958f" stroke-width="1.5"/>
  <polygon points="448,35 458,40 448,45" fill="#9a958f"/>
  <text x="416" y="33" text-anchor="middle"
        fill="#6f6b66" font-size="10">map</text>

  <!-- System B -->
  <rect x="458" y="20" width="130" height="40" rx="6"
        fill="#f0ece7" stroke="#ddd8d3" stroke-width="1.5"/>
  <text x="523" y="45" text-anchor="middle"
        fill="#1e1b18" font-size="13" font-weight="500">System B</text>
</svg>
