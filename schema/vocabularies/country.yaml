id: country
maturity: normative
label:
  en: Country
  fr: Pays
  es: País
definition:
  en: Countries and territories as defined by the ISO 3166-1 standard, using alpha-2 codes.
  fr: Pays et territoires tels que définis par la norme ISO 3166-1, utilisant les codes alpha-2.
  es: Países y territorios según la norma ISO 3166-1, utilizando códigos alfa-2.
standard:
  name: ISO 3166-1
  uri: https://www.iso.org/iso-3166-country-codes.html
sync:
  source_url: https://raw.githubusercontent.com/lukes/ISO-3166-Countries-with-Regional-Codes/master/all/all.json
  format: github-json
  last_synced: '2026-04-12'
  note: "ISO 3166-1 is paywalled on iso.org (Country Codes Collection, PUB500001). The `lukes/ISO-3166-Countries-with-Regional-Codes` GitHub repository is a widely-used open mirror that combines ISO 3166-1 codes with UN M49 regional groupings. Authoritative citation for the standard itself is `standard.uri`."
same_standard_systems:
- openspp
external_values: true
external_equivalents:
  semic:
    label: Country
    uri: http://publications.europa.eu/resource/dataset/country
    match: close
    vocabulary: Core Location
    note: The EU Publications Office publishes this country list as a Named Authority List that Core Location reuses (it
      is not owned by Core Location). The list is derived from ISO 3166-1 and is keyed by ISO 3166-1 alpha-3 codes;
      PublicSchema uses alpha-2 codes, so consumers crosswalking to SEMIC must translate between the two forms.
