id: unit-of-measure
maturity: draft
definition:
  en: Units of measure for quantities of goods distributed or redeemable through benefit programs.
  fr: Unités de mesure pour les quantités de biens distribués ou échangeables dans les programmes de prestations.
  es: Unidades de medida para las cantidades de bienes distribuidos o canjeables a través de programas de beneficios.
references:
  - name: "UN/CEFACT Recommendation 20 - Codes for Units of Measure"
    uri: "https://unece.org/trade/uncefact/cl-recommendations"
    relationship: superset
    machine_readable: true
    notes: "UN/CEFACT Rec 20 is the authoritative standard for trade units. This vocabulary is a small subset covering common humanitarian and social protection commodities."
values:
- code: kg
  label:
    en: Kilogram
    fr: Kilogramme
    es: Kilogramo
  definition:
    en: Unit of mass equal to 1,000 grams.
    fr: Unité de masse égale à 1 000 grammes.
    es: Unidad de masa igual a 1.000 gramos.
- code: g
  label:
    en: Gram
    fr: Gramme
    es: Gramo
  definition:
    en: Unit of mass equal to one thousandth of a kilogram.
    fr: Unité de masse égale à un millième de kilogramme.
    es: Unidad de masa igual a una milésima de kilogramo.
- code: l
  label:
    en: Litre
    fr: Litre
    es: Litro
  definition:
    en: Unit of volume equal to 1,000 cubic centimetres.
    fr: Unité de volume égale à 1 000 centimètres cubes.
    es: Unidad de volumen igual a 1.000 centímetros cúbicos.
- code: ml
  label:
    en: Millilitre
    fr: Millilitre
    es: Mililitro
  definition:
    en: Unit of volume equal to one thousandth of a litre.
    fr: Unité de volume égale à un millième de litre.
    es: Unidad de volumen igual a una milésima de litro.
- code: unit
  label:
    en: Unit
    fr: Unité
    es: Unidad
  definition:
    en: A discrete countable item (e.g., one textbook, one seed packet).
    fr: Un article dénombrable discret (par ex., un manuel, un paquet de semences).
    es: Un artículo contable discreto (por ej., un libro de texto, un paquete de semillas).
- code: kit
  label:
    en: Kit
    fr: Kit
    es: Kit
  definition:
    en: A pre-assembled package of multiple items (e.g., hygiene kit, education kit).
    fr: Un ensemble pré-assemblé de plusieurs articles (par ex., kit d'hygiène, kit éducatif).
    es: Un paquete preensamblado de múltiples artículos (por ej., kit de higiene, kit educativo).
- code: meal
  label:
    en: Meal
    fr: Repas
    es: Comida
  definition:
    en: A single prepared meal serving (used in school feeding and institutional programs).
    fr: Une portion de repas préparé (utilisée dans les programmes d'alimentation scolaire et institutionnels).
    es: Una porción de comida preparada (utilizada en programas de alimentación escolar e institucionales).
- code: mt
  label:
    en: Metric ton
    fr: Tonne métrique
    es: Tonelada métrica
  definition:
    en: Unit of mass equal to 1,000 kilograms. Used for bulk commodity tracking.
    fr: Unité de masse égale à 1 000 kilogrammes. Utilisée pour le suivi des produits en vrac.
    es: Unidad de masa igual a 1.000 kilogramos. Utilizada para el seguimiento de productos a granel.
