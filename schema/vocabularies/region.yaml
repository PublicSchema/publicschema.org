id: region
maturity: draft
label:
  en: Region
  fr: Région
  es: Región
definition:
  en: Geographic regions and country groupings as defined by the United Nations M49 standard.
  fr: Régions géographiques et groupements de pays tels que définis par la norme M49 des Nations Unies.
  es: Regiones geográficas y agrupaciones de países según la norma M49 de las Naciones Unidas.
standard:
  name: UN M49
  uri: https://unstats.un.org/unsd/methodology/m49/
sync:
  source_url: https://raw.githubusercontent.com/datasets/country-codes/main/data/country-codes.csv
  format: csv
  last_synced: '2026-04-12'
  note: "UNSD publishes UN M49 directly at `standard.uri` but does not expose a stable machine-readable download on that
    landing page. The `datasets/country-codes` GitHub mirror consolidates UN M49 codes with ISO 3166 for sync purposes;
    authoritative citation for the standard itself is `standard.uri`."
