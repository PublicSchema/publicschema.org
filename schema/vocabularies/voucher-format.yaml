id: voucher-format
maturity: draft
label:
  en: Voucher Format
  fr: Format de bon
  es: Formato de vale
definition:
  en: The physical or digital form of a voucher.
  fr: La forme physique ou numérique d'un bon.
  es: La forma física o digital de un vale.
values:
- code: electronic
  label:
    en: Electronic
    fr: Électronique
    es: Electrónico
  definition:
    en: A digital code or token delivered via SMS, mobile application, QR code, or other electronic means.
    fr: Un code ou jeton numérique délivré par SMS, application mobile, code QR ou autre moyen électronique.
    es: Un código o token digital entregado por SMS, aplicación móvil, código QR u otro medio electrónico.
- code: paper
  label:
    en: Paper
    fr: Papier
    es: Papel
  definition:
    en: A printed document that the beneficiary presents physically at a vendor or distribution point.
    fr: Un document imprimé que le bénéficiaire présente physiquement chez un vendeur ou un point de distribution.
    es: Un documento impreso que el beneficiario presenta físicamente en un vendedor o punto de distribución.
