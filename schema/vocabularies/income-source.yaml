id: income-source
maturity: draft
label:
  en: Income Source
  fr: Source de revenu
  es: Fuente de ingresos
definition:
  en: "The source of income for a household, combining employment-derived categories (informed by ILO ICSE-18) with non-employment income types relevant to social protection targeting."
  fr: "La source de revenu d'un ménage, combinant des catégories dérivées de l'emploi (basées sur la CISE-18 de l'OIT) avec des types de revenus hors emploi pertinents pour le ciblage de la protection sociale."
  es: "La fuente de ingresos de un hogar, que combina categorías derivadas del empleo (basadas en la CISE-18 de la OIT) con tipos de ingresos no laborales relevantes para la focalización de la protección social."
values:
- code: wages_salary
  label:
    en: Wages/salary
    fr: Salaires/traitements
    es: Salarios/sueldos
  definition:
    en: Income from paid employment as an employee earning regular wages or salary.
    fr: Revenus d'un emploi salarié en tant qu'employé percevant des salaires ou traitements réguliers.
    es: Ingresos del empleo remunerado como asalariado que percibe salarios o sueldos regulares.
- code: self_employment_non_farm
  label:
    en: Self-employment (non-farm)
    fr: Travail indépendant (non agricole)
    es: Trabajo independiente (no agrícola)
  definition:
    en: Income from non-agricultural self-employment, own-account work, or business ownership.
    fr: Revenus du travail indépendant non agricole, du travail à compte propre ou de la propriété d'une entreprise.
    es: Ingresos del trabajo independiente no agrícola, trabajo por cuenta propia o propiedad de un negocio.
- code: farming
  label:
    en: Farming
    fr: Agriculture
    es: Agricultura
  definition:
    en: Income from agricultural production including crop cultivation and animal husbandry.
    fr: Revenus de la production agricole, notamment la culture et l'élevage.
    es: Ingresos de la producción agrícola, incluidos el cultivo y la ganadería.
- code: fishing
  label:
    en: Fishing
    fr: Pêche
    es: Pesca
  definition:
    en: Income from fishing, aquaculture, or related harvesting of aquatic resources.
    fr: Revenus de la pêche, de l'aquaculture ou de la récolte connexe de ressources aquatiques.
    es: Ingresos de la pesca, la acuicultura o la cosecha relacionada de recursos acuáticos.
- code: remittances
  label:
    en: Remittances
    fr: Envois de fonds
    es: Remesas
  definition:
    en: Income received as transfers from household members or relatives living elsewhere, including international remittances.
    fr: Revenus reçus sous forme de transferts de membres du ménage ou de proches vivant ailleurs, y compris les envois de fonds internationaux.
    es: Ingresos recibidos como transferencias de miembros del hogar o parientes que viven en otro lugar, incluidas las remesas internacionales.
- code: social_transfers
  label:
    en: Social transfers
    fr: Transferts sociaux
    es: Transferencias sociales
  definition:
    en: Income from government social protection programs including cash transfers, pensions, disability benefits, and social assistance.
    fr: Revenus des programmes gouvernementaux de protection sociale, notamment les transferts monétaires, les pensions, les allocations d'invalidité et l'aide sociale.
    es: Ingresos de los programas gubernamentales de protección social, incluidas las transferencias en efectivo, pensiones, prestaciones por discapacidad y asistencia social.
- code: pension
  label:
    en: Pension
    fr: Retraite
    es: Pensión
  definition:
    en: Income from occupational or private pension schemes (distinct from state social assistance).
    fr: Revenus des régimes de retraite professionnels ou privés (distincts de l'aide sociale de l'État).
    es: Ingresos de planes de pensiones ocupacionales o privados (distintos de la asistencia social del Estado).
- code: rental_income
  label:
    en: Rental income
    fr: Revenus locatifs
    es: Ingresos por alquiler
  definition:
    en: Income from renting out property, land, or other assets.
    fr: Revenus de la location de propriétés, de terres ou d'autres actifs.
    es: Ingresos del arrendamiento de propiedades, tierras u otros activos.
- code: casual_labor
  label:
    en: Casual labor
    fr: Travail occasionnel
    es: Trabajo ocasional
  definition:
    en: Income from irregular, short-term, or seasonal labor without a formal employment contract.
    fr: Revenus du travail irrégulier, temporaire ou saisonnier sans contrat de travail formel.
    es: Ingresos del trabajo irregular, a corto plazo o estacional sin contrato de trabajo formal.
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: An income source not covered by the other categories.
    fr: Une source de revenu non couverte par les autres catégories.
    es: Una fuente de ingresos no cubierta por las otras categorías.
