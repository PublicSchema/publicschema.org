id: delivery-channel
maturity: trial-use
label:
  en: Delivery Channel
  fr: Canal de prestation
  es: Canal de entrega
definition:
  en: The mechanisms through which benefit transfers reach beneficiaries.
  fr: Les mécanismes par lesquels les transferts de prestations parviennent aux bénéficiaires.
  es: Los mecanismos a través de los cuales las transferencias de beneficios llegan a los beneficiarios.
see_also:
  - vocabulary: benefit-modality
    note: "delivery-channel describes how a benefit reaches the beneficiary (the mechanism); benefit-modality describes what form the benefit takes (cash, voucher, in-kind). A cash benefit (modality) can be delivered via bank transfer, mobile money, or cash (channels)."
references:
  - name: "GovStack Payments Building Block"
    uri: "https://specs.govstack.global/payments/2-description"
    relationship: structural_pattern
    machine_readable: false
    notes: "GovStack distinguishes origin channel from delivery instrument. This vocabulary focuses on delivery instrument only."
  - name: "GSMA Mobile Money API"
    uri: "https://developer.mobilemoneyapi.io/"
    relationship: partial_overlap
    machine_readable: true
values:
- code: bank_transfer
  label:
    en: Bank transfer
    fr: Virement bancaire
    es: Transferencia bancaria
  definition:
    en: Payment credited directly to a beneficiary's bank account via electronic funds transfer.
    fr: Paiement crédité directement sur le compte bancaire d'un bénéficiaire par virement électronique.
    es: Pago acreditado directamente en la cuenta bancaria de un beneficiario mediante transferencia electrónica de fondos.
- code: mobile_money
  label:
    en: Mobile money
    fr: Monnaie mobile
    es: Dinero móvil
  definition:
    en: Payment transmitted to a beneficiary's registered mobile money account (e.g., M-Pesa, Orange Money).
    fr: Paiement transmis au compte de monnaie mobile enregistré d'un bénéficiaire (ex. M-Pesa, Orange Money).
    es: Pago transmitido a la cuenta de dinero móvil registrada de un beneficiario (p. ej., M-Pesa, Orange Money).
- code: cash
  label:
    en: Cash
    fr: Espèces
    es: Efectivo
  definition:
    en: Physical currency handed directly to the beneficiary, typically at a distribution point.
    fr: Monnaie physique remise directement au bénéficiaire, généralement à un point de distribution.
    es: Moneda física entregada directamente al beneficiario, generalmente en un punto de distribución.
- code: agent_network
  label:
    en: Agent network
    fr: Réseau d'agents
    es: Red de agentes
  definition:
    en: Payment disbursed through a network of authorised retail agents acting on behalf of a financial institution.
    fr: Paiement versé par un réseau d'agents de détail autorisés agissant pour le compte d'une institution financière.
    es: Pago desembolsado a través de una red de agentes minoristas autorizados que actúan en nombre de una institución financiera.
- code: prepaid_card
  label:
    en: Prepaid card
    fr: Carte prépayée
    es: Tarjeta prepaga
  definition:
    en: Funds loaded onto a physical or virtual prepaid card that the beneficiary uses to make purchases or withdraw cash.
    fr: Fonds chargés sur une carte prépayée physique ou virtuelle que le bénéficiaire utilise pour effectuer des achats ou
      retirer de l'argent.
    es: Fondos cargados en una tarjeta prepaga física o virtual que el beneficiario utiliza para realizar compras o retirar
      efectivo.
- code: service_point
  label:
    en: Service point
    fr: Point de service
    es: Punto de servicio
  definition:
    en: Benefits accessed at a designated service facility, such as a health clinic or community centre.
    fr: Prestations accessibles dans un établissement de service désigné, tel qu'une clinique de santé ou un centre communautaire.
    es: Beneficios a los que se accede en una instalación de servicio designada, como una clínica de salud o un centro comunitario.
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A delivery channel not covered by the other defined values.
    fr: Un canal de livraison non couvert par les autres valeurs définies.
    es: Un canal de entrega no cubierto por los demás valores definidos.
system_mappings:
  openimis:
    vocabulary_name: PayTypeChoices
    values:
    - code: B
      label: Bank Transfer
      maps_to: bank_transfer
    - code: C
      label: Cash
      maps_to: cash
    - code: M
      label: Mobile
      maps_to: mobile_money
    - code: F
      label: Funding
      maps_to: null
      unmapped_reason: no_equivalent
      note: "Funding is a program-to-program financial transfer, not a beneficiary delivery channel."
    unmapped_canonical:
    - agent_network
    - prepaid_card
    - service_point
  govstack_payments:
    vocabulary_name: paymentModality
    values:
    - code: "00"
      label: Bank Account
      maps_to: bank_transfer
    - code: "01"
      label: Mobile Money
      maps_to: mobile_money
    - code: "02"
      label: Voucher
      maps_to: null
      unmapped_reason: out_of_scope
    - code: "03"
      label: Digital Wallet
      maps_to: null
      unmapped_reason: no_equivalent
    - code: "04"
      label: Proxy
      maps_to: null
      unmapped_reason: no_equivalent
    unmapped_canonical:
    - cash
    - agent_network
    - prepaid_card
    - service_point
    - other
