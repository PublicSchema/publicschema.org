id: occupation
maturity: normative
label:
  en: Occupation
  fr: Profession
  es: Ocupación
definition:
  en: Categories describing a person's occupation, based on the full ISCO-08 classification hierarchy (major groups, sub-major
    groups, minor groups, and unit groups).
  fr: Catégories décrivant la profession d'une personne, basées sur la classification hiérarchique complète ISCO-08 (grands
    groupes, sous-grands groupes, sous-groupes et groupes de base).
  es: Categorías que describen la ocupación de una persona, basadas en la clasificación jerárquica completa ISCO-08 (grandes
    grupos, subgrupos principales, subgrupos y grupos primarios).
