id: literacy
maturity: draft
definition:
  en: Whether a person can, with understanding, both read and write a short simple statement on everyday life.
  fr: Si une personne peut, avec compréhension, lire et écrire un court énoncé simple sur la vie quotidienne.
  es: Si una persona puede, con comprensión, leer y escribir una declaración breve y sencilla sobre la vida cotidiana.
standard:
  name: UNSD Principles and Recommendations for Population and Housing Censuses, Rev.3
  uri: https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf
  notes: "Para 2.202: binary classification of literacy."
values:
  - code: literate
    label:
      en: Literate
      fr: Alphabétisé
      es: Alfabetizado
    definition:
      en: "Can, with understanding, both read and write a short simple statement on everyday life."
      fr: "Peut, avec compréhension, lire et écrire un court énoncé simple sur la vie quotidienne."
      es: "Puede, con comprensión, leer y escribir una declaración breve y sencilla sobre la vida cotidiana."
  - code: illiterate
    label:
      en: Illiterate
      fr: Analphabète
      es: Analfabeto
    definition:
      en: "Cannot, with understanding, both read and write a short simple statement on everyday life."
      fr: "Ne peut pas, avec compréhension, lire et écrire un court énoncé simple sur la vie quotidienne."
      es: "No puede, con comprensión, leer y escribir una declaración breve y sencilla sobre la vida cotidiana."
external_equivalents:
  opencrvs:
    label: "No v1 equivalent"
    match: none
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS v1 does not include a literacy field or vocabulary."
