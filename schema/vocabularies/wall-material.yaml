id: wall-material
maturity: draft
label:
  en: Wall Material
definition:
  en: The primary material of the exterior walls in the household's dwelling.
standard:
  name: DHS/MICS Harmonized Housing Codes
  notes: "Shared classification used by DHS (hv214) and MICS (HC5). No standalone international standard exists for wall materials; the survey programs are the de facto standard."
values:
- code: no_walls
  label:
    en: No walls
  definition:
    en: Dwelling has no exterior walls (open structure).
- code: cane_palm_trunks
  label:
    en: Cane, palm, or trunks
  definition:
    en: Walls made of natural cane, palm fronds, or tree trunks without additional finishing.
- code: dirt
  label:
    en: Dirt
  definition:
    en: Walls made of packed dirt or mud without any structural reinforcement.
- code: bamboo_with_mud
  label:
    en: Bamboo with mud
  definition:
    en: Bamboo frame walls plastered or filled with mud.
- code: stone_with_mud
  label:
    en: Stone with mud
  definition:
    en: Stone walls bonded with mud rather than mortar or cement.
- code: uncovered_adobe
  label:
    en: Uncovered adobe
  definition:
    en: Sun-dried mud brick (adobe) walls without an exterior plaster or render coating.
- code: plywood
  label:
    en: Plywood
  definition:
    en: Walls made of plywood sheets.
- code: cardboard
  label:
    en: Cardboard
  definition:
    en: Walls made of cardboard or similar paper-based material.
- code: reused_wood
  label:
    en: Reused wood
  definition:
    en: Walls built from salvaged or reused wooden boards and planks.
- code: cement
  label:
    en: Cement
  definition:
    en: Walls made of poured concrete or cement render on a structural frame.
- code: stone_with_lime_cement
  label:
    en: Stone with lime or cement
  definition:
    en: Stone walls bonded with lime or cement mortar.
- code: bricks
  label:
    en: Bricks
  definition:
    en: Walls made of fired clay bricks.
- code: cement_blocks
  label:
    en: Cement blocks
  definition:
    en: Walls made of concrete masonry units (hollow or solid cement blocks).
- code: covered_adobe
  label:
    en: Covered adobe
  definition:
    en: Adobe (sun-dried mud brick) walls with an exterior plaster or render coating.
- code: wood_planks_shingles
  label:
    en: Wood planks or shingles
  definition:
    en: Walls clad with milled wood planks or wooden shingles.
- code: other
  label:
    en: Other
  definition:
    en: Wall material not covered by the other categories.
