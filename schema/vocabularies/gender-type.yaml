id: gender-type
maturity: trial-use
definition:
  en: >-
    The administrative gender of a person as recorded in a registry or identity system. Distinct from biological sex
    (see the sex vocabulary). No single international standard governs gender vocabulary; ISO/IEC 5218 explicitly
    covers biological sex only. This vocabulary provides a minimal common set based on what social protection systems
    actually record.
  fr: >-
    Le genre administratif d'une personne tel qu'enregistre dans un registre ou un systeme d'identite. Distinct du
    sexe biologique (voir le vocabulaire sex). Aucune norme internationale unique ne regit le vocabulaire du genre.
    Ce vocabulaire fournit un ensemble minimal commun base sur ce que les systemes de protection sociale enregistrent.
  es: >-
    El genero administrativo de una persona tal como se registra en un registro o sistema de identidad. Distinto del
    sexo biologico (ver el vocabulario sex). Ninguna norma internacional unica rige el vocabulario de genero. Este
    vocabulario proporciona un conjunto minimo comun basado en lo que los sistemas de proteccion social registran.
# No governing standard. ISO/IEC 5218 covers biological sex only (2022 revision).
# FHIR R5 Gender Harmony and SEMIC Core Person 2.1.1 both separate sex from gender
# but neither mandates a controlled vocabulary for gender.
values:
- code: male
  label:
    en: Male
    fr: Masculin
    es: Masculino
  definition:
    en: Person identifies or is recorded as male.
    fr: La personne s'identifie ou est enregistree comme homme.
    es: La persona se identifica o esta registrada como hombre.
- code: female
  label:
    en: Female
    fr: Feminin
    es: Femenino
  definition:
    en: Person identifies or is recorded as female.
    fr: La personne s'identifie ou est enregistree comme femme.
    es: La persona se identifica o esta registrada como mujer.
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A gender not captured by the male or female categories.
    fr: Un genre qui n'est pas couvert par les categories homme ou femme.
    es: Un genero no cubierto por las categorias hombre o mujer.
- code: not_stated
  label:
    en: Not stated
    fr: Non declare
    es: No declarado
  definition:
    en: Gender has not been recorded or the person declined to disclose.
    fr: Le genre n'a pas ete enregistre ou la personne a refuse de le divulguer.
    es: El genero no ha sido registrado o la persona se nego a divulgarlo.
external_equivalents:
  semic:
    label: "Gender"
    uri: "http://data.europa.eu/m8g/gender"
    match: broad
    vocabulary: "Core Person"
    note: "SEMIC Core Person 2.1.1 defines gender as a separate property from sex but mandates no controlled vocabulary, leaving the choice to implementers."
system_mappings:
  openimis:
    vocabulary_name: Gender
    values:
    - code: M
      label: Male
      maps_to: male
    - code: F
      label: Female
      maps_to: female
    - code: O
      label: Other
      maps_to: other
    unmapped_canonical:
    - not_stated
  openspp:
    vocabulary_name: Iso5218GenderCodes
    values:
    - code: '1'
      label: Male
      maps_to: male
    - code: '2'
      label: Female
      maps_to: female
    - code: '9'
      label: Not applicable
      maps_to: other
    - code: '0'
      label: Not known
      maps_to: not_stated
  dhis2:
    vocabulary_name: Gender
    values:
    - code: Male
      label: Male
      maps_to: male
    - code: Female
      label: Female
      maps_to: female
    unmapped_canonical:
    - other
    - not_stated
  fhir_r4:
    vocabulary_name: AdministrativeGender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: other
    - code: unknown
      label: Unknown
      maps_to: not_stated
  opencrvs:
    vocabulary_name: Gender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: other
    - code: unknown
      label: Unknown
      maps_to: not_stated
