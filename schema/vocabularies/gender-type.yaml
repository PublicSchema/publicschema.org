id: gender-type
maturity: trial-use
definition:
  en: >-
    The administrative gender of a person as recorded in a registry or identity system. Distinct from biological sex
    (see the sex vocabulary). No single international standard governs gender vocabulary; ISO/IEC 5218 explicitly
    covers biological sex only. This vocabulary provides a minimal common set based on what administrative systems
    actually record.
  fr: >-
    Le genre administratif d'une personne tel qu'enregistré dans un registre ou un système d'identité. Distinct du
    sexe biologique (voir le vocabulaire sex). Aucune norme internationale unique ne régit le vocabulaire du genre.
    Ce vocabulaire fournit un ensemble minimal commun basé sur ce que les systèmes administratifs enregistrent.
  es: >-
    El género administrativo de una persona tal como se registra en un registro o sistema de identidad. Distinto del
    sexo biológico (ver el vocabulario sex). Ninguna norma internacional única rige el vocabulario de género. Este
    vocabulario proporciona un conjunto mínimo común basado en lo que los sistemas administrativos registran.
references:
  - name: "FHIR R5 Gender Harmony Implementation Guide"
    uri: "https://hl7.org/fhir/extensions/StructureDefinition-individual-genderIdentity.html"
    relationship: structural_pattern
    machine_readable: true
    notes: "FHIR R5 separates sex from gender but does not mandate a controlled vocabulary for gender identity."
  - name: "SEMIC Core Person Vocabulary 2.1.1"
    uri: "https://semiceu.github.io/Core-Person-Vocabulary/releases/2.1.1/"
    relationship: structural_pattern
    machine_readable: false
    notes: "SEMIC defines gender as a separate property from sex but leaves vocabulary choice to implementers."
# No governing standard. ISO/IEC 5218 covers biological sex only (2022 revision).
values:
- code: male
  label:
    en: Male
    fr: Masculin
    es: Masculino
  definition:
    en: Person identifies or is recorded as male.
    fr: La personne s'identifie ou est enregistrée comme homme.
    es: La persona se identifica o está registrada como hombre.
- code: female
  label:
    en: Female
    fr: Féminin
    es: Femenino
  definition:
    en: Person identifies or is recorded as female.
    fr: La personne s'identifie ou est enregistrée comme femme.
    es: La persona se identifica o está registrada como mujer.
- code: other
  label:
    en: Other
    fr: Autre
    es: Otro
  definition:
    en: A gender identity that is not exclusively male or female, including but not limited to non-binary, third gender, or gender-diverse identities as recognized by the recording system.
    fr: Une identité de genre qui n'est pas exclusivement masculine ou féminine, y compris mais sans s'y limiter les identités non binaires, de troisième genre ou de genre diversifié telles que reconnues par le système d'enregistrement.
    es: Una identidad de género que no es exclusivamente masculina o femenina, incluyendo pero no limitándose a identidades no binarias, de tercer género o de género diverso según lo reconocido por el sistema de registro.
- code: not_stated
  label:
    en: Not stated
    fr: Non déclaré
    es: No declarado
  definition:
    en: Gender has not been recorded or the person declined to disclose.
    fr: Le genre n'a pas été enregistré ou la personne a refusé de le divulguer.
    es: El género no ha sido registrado o la persona se negó a divulgarlo.
external_equivalents:
  semic:
    label: "Gender"
    uri: "http://data.europa.eu/m8g/gender"
    match: broad
    vocabulary: "Core Person"
    note: "SEMIC Core Person 2.1.1 defines gender as a separate property from sex but mandates no controlled vocabulary, leaving the choice to implementers."
system_mappings:
  openimis:
    vocabulary_name: Gender
    values:
    - code: M
      label: Male
      maps_to: male
    - code: F
      label: Female
      maps_to: female
    - code: O
      label: Other
      maps_to: other
    unmapped_canonical:
    - not_stated
  openspp:
    vocabulary_name: Iso5218GenderCodes
    values:
    - code: '1'
      label: Male
      maps_to: male
    - code: '2'
      label: Female
      maps_to: female
    - code: '9'
      label: Not applicable
      maps_to: other
    - code: '0'
      label: Not known
      maps_to: not_stated
  dhis2:
    vocabulary_name: Gender
    values:
    - code: Male
      label: Male
      maps_to: male
    - code: Female
      label: Female
      maps_to: female
    unmapped_canonical:
    - other
    - not_stated
  fhir_r4:
    vocabulary_name: AdministrativeGender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: other
    - code: unknown
      label: Unknown
      maps_to: not_stated
  opencrvs:
    vocabulary_name: Gender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: other
    - code: unknown
      label: Unknown
      maps_to: not_stated
