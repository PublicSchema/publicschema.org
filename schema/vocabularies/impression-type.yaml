id: impression-type
maturity: draft
label:
  en: Impression Type
  fr: Type d'impression
  es: Tipo de impresión
definition:
  en: >-
    The method by which a fingerprint biometric was captured. Covers live-scan,
    non-live-scan, and latent capture methods. Applies to fingerprint captures;
    not relevant for iris or face modalities.
  fr: >-
    La méthode par laquelle une empreinte digitale biométrique a été capturée.
    Couvre les méthodes de capture par scan en direct, scan non direct et
    capture latente. S'applique aux captures d'empreintes digitales; non
    pertinent pour les modalités iris ou visage.
  es: >-
    El método mediante el cual se capturó una huella dactilar biométrica. Cubre
    los métodos de captura por escaneo en vivo, escaneo no en vivo y captura
    latente. Se aplica a capturas de huellas dactilares; no es relevante para
    las modalidades de iris o rostro.
references:
  - name: "OSIA ImpressionType Enum"
    uri: "https://secureidentityalliance.github.io/osia/"
    relationship: based_on
    machine_readable: false
    notes: "Full 19-value OSIA ImpressionType enumeration."
