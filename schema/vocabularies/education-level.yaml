      maps_to: primary
    - code: '2'
      label: Lower secondary education
      maps_to: lower_secondary
    - code: '3'
      label: Upper secondary education
      maps_to: upper_secondary
    - code: '4'
      label: Post-secondary non-tertiary education
      maps_to: post_secondary_non_tertiary
    - code: '5'
      label: Short-cycle tertiary education
      maps_to: short_cycle_tertiary
    - code: '6'
