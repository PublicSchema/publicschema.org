  dhs:
    vocabulary_name: "hv106 - Highest educational level"
    values:
    - code: '0'
      label: No education
      maps_to: none
    - code: '1'
      label: Primary
      maps_to: primary
    - code: '2'
      label: Secondary
      maps_to: upper_secondary
      note: "DHS does not distinguish lower from upper secondary; mapped to upper_secondary as the completed-level interpretation"
    - code: '3'
      label: Higher
      maps_to: bachelor
      note: "DHS 'Higher' covers all tertiary; mapped to bachelor as the most common tertiary completion level"
    - code: '8'
      label: Don't know
      maps_to: null
      unmapped_reason: no_equivalent
    - code: '9'
      label: Missing
      maps_to: null
      unmapped_reason: no_equivalent
    unmapped_canonical:
    - lower_secondary
    - post_secondary_non_tertiary
    - short_cycle_tertiary
    - master
    - doctoral
    - early_childhood
  mics:
    vocabulary_name: "melevel - Education level of mother/caretaker"
    values:
    - code: '0'
      label: None or ECE
      maps_to: none
      note: "MICS combines 'no education' and 'early childhood education' into a single code"
