id: marital-status
maturity: draft
definition:
  en: Categories describing a person's marital or civil status as recorded in a registry or administrative system.
  fr: Catégories décrivant le statut matrimonial ou civil d'une personne tel qu'enregistré dans un registre ou un système
    administratif.
  es: Categorías que describen el estado civil o matrimonial de una persona tal como se registra en un registro o sistema
    administrativo.
standard:
  name: UN UNSD Population Census Framework
  uri: urn:un:unsd:pop-census:marital-status
values:
- code: never_married
  label:
    en: Never Married
    fr: Jamais marié(e)
    es: Nunca casado/a
  definition:
    en: Person who has never been married.
  standard_code: S
- code: married
  label:
    en: Married
    fr: Marié(e)
    es: Casado/a
  definition:
    en: Currently married.
  standard_code: M
- code: widowed
  label:
    en: Widowed
    fr: Veuf/Veuve
    es: Viudo/a
  definition:
    en: Person whose spouse has died and who has not remarried.
  standard_code: W
- code: divorced
  label:
    en: Divorced
    fr: Divorcé(e)
    es: Divorciado/a
  definition:
    en: Person whose marriage has been legally dissolved and who has not remarried.
  standard_code: D
- code: legally_separated
  label:
    en: Legally Separated
    fr: Séparé(e) légalement
    es: Separado/a legalmente
  definition:
    en: Person who is legally separated from their spouse.
  standard_code: L
- code: consensual_union
  label:
    en: Consensual Union
    fr: Union consensuelle
    es: Unión consensual
  definition:
    en: Person living in a consensual union (cohabitation without formal marriage).
  standard_code: C

system_mappings:
  openspp:
    vocabulary_name: "MaritalStatus"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Separated"
        maps_to: legally_separated
      - code: "C"
        label: "Consensual Union"
        maps_to: consensual_union
  spdci:
    vocabulary_name: "MaritalStatusEnum"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widow"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "U"
        label: "Unmarried"
        maps_to: null
        unmapped_reason: no_equivalent
    unmapped_canonical: [consensual_union]
  dhis2:
    vocabulary_name: "Civil status"
    values:
      - code: "Single or widow"
        label: "Single or widow"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "Married (conjugal cohabitation)"
        label: "Married (conjugal cohabitation)"
        maps_to: married
    unmapped_canonical: [never_married, widowed, divorced, legally_separated, consensual_union]
  fhir_r4:
    vocabulary_name: "Marital Status Codes"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "I"
        label: "Interlocutory"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "P"
        label: "Polygamous"
        maps_to: null
        unmapped_reason: not_yet_mapped
      - code: "T"
        label: "Domestic partner"
        maps_to: null
        unmapped_reason: not_yet_mapped
      - code: "U"
        label: "unmarried"
        maps_to: null
        unmapped_reason: no_equivalent
    unmapped_canonical: [consensual_union]
