      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Separated"
        maps_to: legally_separated
      - code: "C"
        label: "Consensual Union"
        maps_to: consensual_union
  dci:
    vocabulary_name: "MaritalStatusEnum"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widow"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
