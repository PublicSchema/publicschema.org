id: marital-status
maturity: trial-use
definition:
  en: Categories describing a person's marital or civil status as recorded in a registry or administrative system.
  fr: Catégories décrivant le statut matrimonial ou civil d'une personne tel qu'enregistré dans un registre ou un système
    administratif.
  es: Categorías que describen el estado civil o matrimonial de una persona tal como se registra en un registro o sistema
    administrativo.
standard:
  name: UN UNSD Population Census Framework
  uri: https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf
values:
- code: never_married
  label:
    en: Never Married
    fr: Jamais marié(e)
    es: Nunca casado/a
  definition:
    en: Person who has never been married.
    fr: "Personne qui n'a jamais été mariée."
    es: "Persona que nunca ha estado casada."
  standard_code: S
- code: married
  label:
    en: Married
    fr: Marié(e)
    es: Casado/a
  definition:
    en: Currently married.
    fr: "Actuellement marié(e)."
    es: "Actualmente casado/a."
  standard_code: M
- code: widowed
  label:
    en: Widowed
    fr: Veuf/Veuve
    es: Viudo/a
  definition:
    en: Person whose spouse has died and who has not remarried.
    fr: "Personne dont le conjoint est décédé et qui ne s'est pas remariée."
    es: "Persona cuyo cónyuge ha fallecido y que no se ha vuelto a casar."
  standard_code: W
- code: divorced
  label:
    en: Divorced
    fr: Divorcé(e)
    es: Divorciado/a
  definition:
    en: Person whose marriage has been legally dissolved and who has not remarried.
    fr: "Personne dont le mariage a été légalement dissous et qui ne s'est pas remariée."
    es: "Persona cuyo matrimonio ha sido legalmente disuelto y que no se ha vuelto a casar."
  standard_code: D
- code: legally_separated
  label:
    en: Legally Separated
    fr: Séparé(e) légalement
    es: Separado/a legalmente
  definition:
    en: Person who is legally separated from their spouse.
    fr: "Personne légalement séparée de son conjoint."
    es: "Persona legalmente separada de su cónyuge."
  standard_code: L
- code: consensual_union
  label:
    en: Consensual Union
    fr: Union consensuelle
    es: Unión consensual
  definition:
    en: Person living in a consensual union (cohabitation without formal marriage).
    fr: "Personne vivant en union consensuelle (cohabitation sans mariage formel)."
    es: "Persona que vive en unión consensual (cohabitación sin matrimonio formal)."
  standard_code: C

system_mappings:
  openspp:
    vocabulary_name: "MaritalStatus"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Separated"
        maps_to: legally_separated
      - code: "C"
        label: "Consensual Union"
        maps_to: consensual_union
  dci:
    vocabulary_name: "MaritalStatusEnum"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widow"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "U"
        label: "Unmarried"
        maps_to: null
        unmapped_reason: no_equivalent
    unmapped_canonical: [consensual_union]
  dhis2:
    vocabulary_name: "Civil status"
    values:
      - code: "Single or widow"
        label: "Single or widow"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "Married (conjugal cohabitation)"
        label: "Married (conjugal cohabitation)"
        maps_to: married
    unmapped_canonical: [never_married, widowed, divorced, legally_separated, consensual_union]
  fhir_r4:
    vocabulary_name: "Marital Status Codes"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "I"
        label: "Interlocutory"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "P"
        label: "Polygamous"
        maps_to: married
        note: "Per UN census standards (Rev. 3/4), all parties in a polygamous union are 'married.' Polygamy is a union characteristic, not a marital status. Use the number_of_spouses property to capture union type."
      - code: "T"
        label: "Domestic partner"
        maps_to: null
        unmapped_reason: not_yet_mapped
      - code: "U"
        label: "unmarried"
        maps_to: null
        unmapped_reason: no_equivalent
    unmapped_canonical: [consensual_union]
