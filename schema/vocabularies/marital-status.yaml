  fhir_r4:
    vocabulary_name: "Marital Status Codes"
    values:
      - code: "S"
        label: "Never Married"
        maps_to: never_married
      - code: "M"
        label: "Married"
        maps_to: married
      - code: "W"
        label: "Widowed"
        maps_to: widowed
      - code: "D"
        label: "Divorced"
        maps_to: divorced
      - code: "L"
        label: "Legally Separated"
        maps_to: legally_separated
      - code: "A"
        label: "Annulled"
        maps_to: null
        unmapped_reason: no_equivalent
      - code: "I"
        label: "Interlocutory"
        maps_to: null
        unmapped_reason: no_equivalent
