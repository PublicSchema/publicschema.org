id: functional-difficulty-severity
maturity: draft
label:
  en: Functional Difficulty Severity
  fr: "Sévérité de la difficulté fonctionnelle"
  es: "Gravedad de la dificultad funcional"
definition:
  en: "The degree of difficulty a person experiences in a functional domain, based on the Washington Group Short Set on Functioning (WG-SS) four-point response scale."
  fr: "Le degré de difficulté que ressent une personne dans un domaine fonctionnel, selon l'échelle de réponse en quatre niveaux du Groupe de Washington sur la statistique du handicap (WG-SS)."
  es: "El grado de dificultad que experimenta una persona en un dominio funcional, según la escala de respuesta de cuatro niveles del Grupo de Washington sobre Estadísticas de Discapacidad (WG-SS)."
standard:
  name: Washington Group Short Set on Functioning (WG-SS)
  uri: https://www.washingtongroup-disability.com/question-sets/wg-short-set-on-functioning-wg-ss/
  notes: Endorsed by the UN Statistical Commission. The standard survey instrument for disability measurement in censuses and surveys.
values:
- code: no_difficulty
  label:
    en: No difficulty
    fr: Aucune difficulté
    es: Sin dificultad
  definition:
    en: The person reports no difficulty performing the function.
    fr: La personne ne signale aucune difficulté à accomplir la fonction.
    es: La persona no reporta ninguna dificultad para realizar la función.
- code: some_difficulty
  label:
    en: Some difficulty
    fr: Quelques difficultés
    es: Alguna dificultad
  definition:
    en: The person reports some difficulty but can perform the function.
    fr: La personne signale quelques difficultés mais peut accomplir la fonction.
    es: La persona reporta alguna dificultad pero puede realizar la función.
- code: a_lot_of_difficulty
  label:
    en: A lot of difficulty
    fr: Beaucoup de difficultés
    es: Mucha dificultad
  definition:
    en: The person reports a lot of difficulty performing the function. This is the lower threshold for the WG recommended disability identifier.
    fr: La personne signale beaucoup de difficultés à accomplir la fonction. Il s'agit du seuil inférieur de l'identifiant de handicap recommandé par le WG.
    es: La persona reporta mucha dificultad para realizar la función. Este es el umbral inferior del identificador de discapacidad recomendado por el WG.
- code: cannot_do
  label:
    en: Cannot do at all
    fr: Ne peut pas du tout
    es: No puede hacerlo en absoluto
  definition:
    en: The person cannot perform the function at all.
    fr: La personne ne peut pas du tout accomplir la fonction.
    es: La persona no puede realizar la función en absoluto.
system_mappings:
  dhs:
    vocabulary_name: DHS Disability Module response scale
    values:
    - code: '1'
      label: No difficulty
      maps_to: no_difficulty
    - code: '2'
      label: Some difficulty
      maps_to: some_difficulty
    - code: '3'
      label: A lot of difficulty
      maps_to: a_lot_of_difficulty
    - code: '4'
      label: Cannot do at all
      maps_to: cannot_do
    note: "DHS optional Disability Module. Uses the WG-SS response scale verbatim for persons age 5+; DHS reframes the question stems to third-person. Not included in all DHS surveys."
  mics:
    vocabulary_name: MICS6 WG-SS response scale
    values:
    - code: '1'
      label: No difficulty
      maps_to: no_difficulty
    - code: '2'
      label: Some difficulty
      maps_to: some_difficulty
    - code: '3'
      label: A lot of difficulty
      maps_to: a_lot_of_difficulty
    - code: '4'
      label: Cannot do at all
      maps_to: cannot_do
    note: "MICS6 Functioning Module (AF1-AF6). Uses the WG-SS response scale verbatim for women 18-49 (men in some countries); MICS reframes the question stems for the module."
