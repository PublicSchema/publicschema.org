id: sex
maturity: normative
label:
  en: Sex
  fr: Sexe
  es: Sexo
definition:
  en: The biological sex of a person as recorded in an official register or identity document, following ISO/IEC 5218.
  fr: Le sexe biologique d'une personne tel qu'enregistré dans un registre officiel ou un document d'identité, selon la norme
    ISO/IEC 5218.
  es: El sexo biológico de una persona tal como se registra en un registro oficial o documento de identidad, según la norma
    ISO/IEC 5218.
standard:
  name: ISO/IEC 5218:2022
  uri: https://www.iso.org/standard/81682.html
  notes: 'Codes for the representation of human sexes, per ISO/IEC 5218:2022 (which supersedes the withdrawn ISO/IEC 5218:2004).
    The 2022 revision retains the same four code points (0, 1, 2, 9) with the same semantics. Numeric codes mapped to readable
    identifiers. EBSI PID schemas extend ISO 5218 with additional codes: 3 (other), 4 (inter), 5 (diverse), 6 (open). PublicSchema
    follows the base ISO standard. Systems using those extension values should leave them unmapped here or use a local extension
    rather than collapsing them into ISO 5218 ''not applicable''.'
values:
- code: not_known
  label:
    en: Not known
    fr: Inconnu
    es: Desconocido
  standard_code: '0'
  definition:
    en: Sex has not been recorded or is not known.
    fr: "Le sexe n'a pas été enregistré ou n'est pas connu."
    es: "El sexo no ha sido registrado o no se conoce."
- code: male
  label:
    en: Male
    fr: Masculin
    es: Masculino
  standard_code: '1'
  definition:
    en: Male sex.
    fr: "Sexe masculin."
    es: "Sexo masculino."
- code: female
  label:
    en: Female
    fr: Féminin
    es: Femenino
  standard_code: '2'
  definition:
    en: Female sex.
    fr: "Sexe féminin."
    es: "Sexo femenino."
- code: not_applicable
  label:
    en: Not applicable
    fr: Non applicable
    es: No aplica
  standard_code: '9'
  definition:
    en: Sex is not applicable in this context (e.g., legal entities).
    fr: "Le sexe n'est pas applicable dans ce contexte (par ex., entités juridiques)."
    es: "El sexo no es aplicable en este contexto (por ej., entidades jurídicas)."
external_equivalents:
  semic:
    label: "Human Sex"
    uri: "http://publications.europa.eu/resource/authority/human-sex"
    match: close
    vocabulary: "Core Person"
    note: "EU Named Authority List for human sex, based on ISO/IEC 5218. The NAL carries 5 non-deprecated concepts (MALE, FEMALE, NKN, NAP, NST); PublicSchema has 4. NST (not stated) distinguishes disclosure refusal from unknown status and has no counterpart here."
system_mappings:
  openspp:
    vocabulary_name: Iso5218GenderCodes
    values:
    - code: '0'
      label: Not known
      maps_to: not_known
    - code: '1'
      label: Male
      maps_to: male
    - code: '2'
      label: Female
      maps_to: female
    - code: '9'
      label: Not applicable
      maps_to: not_applicable
  dci:
    vocabulary_name: SexCategoryEnum
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Others
      maps_to: null
      unmapped_reason: no_equivalent
    - code: unknown
      label: Unknown
      maps_to: not_known
  opencrvs:
    vocabulary_name: Gender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: null
      unmapped_reason: no_equivalent
    - code: unknown
      label: Unknown
      maps_to: not_known
  fhir_r4:
    vocabulary_name: AdministrativeGender
    values:
    - code: male
      label: Male
      maps_to: male
    - code: female
      label: Female
      maps_to: female
    - code: other
      label: Other
      maps_to: null
      unmapped_reason: no_equivalent
    - code: unknown
      label: Unknown
      maps_to: not_known
  semic:
    vocabulary_name: "EU Human Sex NAL"
    values:
    - code: MALE
      label: Male
      maps_to: male
    - code: FEMALE
      label: Female
      maps_to: female
    - code: NKN
      label: Not known
      maps_to: not_known
    - code: NAP
      label: Not applicable
      maps_to: not_applicable
    - code: NST
      label: Not stated
      maps_to: null
      unmapped_reason: no_equivalent
