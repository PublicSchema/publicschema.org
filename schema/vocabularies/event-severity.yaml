id: event-severity
maturity: draft
label:
  en: Event Severity
  fr: "Gravité de l'événement"
  es: Gravedad del evento
definition:
  en: The observed or expected severity of an event's impact. Values are compatible with OASIS CAP v1.2 severity codes.
  fr: La gravité observée ou attendue de l'impact d'un événement. Les valeurs sont compatibles avec les codes de gravité d'OASIS
    CAP v1.2.
  es: La gravedad observada o esperada del impacto de un evento. Los valores son compatibles con los códigos de gravedad de
    OASIS CAP v1.2.
standard:
  name: OASIS CAP v1.2
  uri: https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html
values:
- code: extreme
  label:
    en: Extreme
    fr: Extrême
    es: Extrema
  definition:
    en: Extraordinary threat to life or property.
    fr: Menace extraordinaire pour la vie ou les biens.
    es: Amenaza extraordinaria para la vida o la propiedad.
- code: severe
  label:
    en: Severe
    fr: Grave
    es: Grave
  definition:
    en: Significant threat to life or property.
    fr: Menace significative pour la vie ou les biens.
    es: Amenaza significativa para la vida o la propiedad.
- code: moderate
  label:
    en: Moderate
    fr: Modérée
    es: Moderada
  definition:
    en: Possible threat to life or property.
    fr: Menace possible pour la vie ou les biens.
    es: Amenaza posible para la vida o la propiedad.
- code: minor
  label:
    en: Minor
    fr: Mineure
    es: Menor
  definition:
    en: Minimal to no known threat to life or property.
    fr: Menace minimale voire nulle pour la vie ou les biens.
    es: Amenaza mínima o nula para la vida o la propiedad.
- code: unknown
  label:
    en: Unknown
    fr: Inconnu
    es: Desconocido
  definition:
    en: Severity is not yet determined.
    fr: La gravité n'est pas encore déterminée.
    es: La gravedad aún no se ha determinado.
system_mappings:
  openspp:
    vocabulary_name: HazardIncidentSeverity
    values:
    - code: "1"
      label: Minor
      maps_to: minor
    - code: "2"
      label: Moderate
      maps_to: moderate
    - code: "3"
      label: Significant
      maps_to: severe
    - code: "4"
      label: Severe
      maps_to: severe
    - code: "5"
      label: Catastrophic
      maps_to: extreme
    unmapped_canonical:
    - unknown
    note: "Mapped against OpenSPP's spp_hazard HazardIncidentSeverity (numeric 1-5 scale), which shares the hazard/disaster-impact domain with v2 event-severity. GRMTicketSeverity (grievance urgency) is deliberately not mapped here because it classifies a different domain."
