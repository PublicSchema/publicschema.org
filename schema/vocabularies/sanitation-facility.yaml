id: sanitation-facility
maturity: draft
label:
  en: Sanitation Facility
definition:
  en: The type of toilet or latrine facility used by the household, classified according to the WHO/UNICEF Joint Monitoring Programme (JMP).
standard:
  name: WHO/UNICEF Joint Monitoring Programme (JMP)
  uri: https://washdata.org/monitoring/sanitation
  notes: Canonical facility type classification for SDG 6.2 sanitation monitoring.
values:
- code: flush_to_piped_sewer
  label:
    en: Flush to piped sewer system
  definition:
    en: A flush or pour-flush toilet connected to a municipal or communal piped sewer network.
- code: flush_to_septic_tank
  label:
    en: Flush to septic tank
  definition:
    en: A flush or pour-flush toilet connected to an on-site septic tank.
- code: flush_to_pit_latrine
  label:
    en: Flush to pit latrine
  definition:
    en: A flush or pour-flush toilet where waste is directed to a pit below or nearby.
- code: flush_to_open_drain
  label:
    en: Flush to open drain
  definition:
    en: A flush or pour-flush toilet where waste is discharged into an open drain or ditch.
- code: flush_to_unknown
  label:
    en: Flush to unknown place / don't know where
  definition:
    en: A flush or pour-flush toilet where the destination of waste is unknown or the respondent does not know.
- code: ventilated_improved_pit
  label:
    en: Ventilated improved pit latrine (VIP)
  definition:
    en: A pit latrine fitted with a ventilation pipe and a fly screen, which reduces odours and fly breeding.
- code: pit_latrine_with_slab
  label:
    en: Pit latrine with slab
  definition:
    en: A pit latrine with a concrete or other solid slab covering the pit, reducing contamination risk.
- code: pit_latrine_without_slab
  label:
    en: Pit latrine without slab / open pit
  definition:
    en: A pit latrine with no covering slab, leaving the pit directly exposed.
- code: composting_toilet
  label:
    en: Composting toilet
  definition:
    en: A dry toilet that treats human waste through aerobic decomposition, producing compost.
- code: bucket_latrine
  label:
    en: Bucket latrine
  definition:
    en: A toilet or latrine in which waste is collected in a bucket or container for later removal.
- code: hanging_toilet
  label:
    en: Hanging toilet / hanging latrine
  definition:
    en: A toilet or latrine built over water or open ground where waste falls directly below without containment.
- code: open_defecation
  label:
    en: No facility / bush / field (open defecation)
  definition:
    en: No toilet or latrine is used; defecation takes place in the open, in fields, forests, bodies of water, or other open spaces.
- code: other
  label:
    en: Other
  definition:
    en: A sanitation facility not covered by the other categories.
