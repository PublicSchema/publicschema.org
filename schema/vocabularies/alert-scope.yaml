id: alert-scope
maturity: draft

definition:
  en: "The intended audience scope of an alert message."
  fr: "La portee du public vise d'un message d'alerte."
  es: "El alcance del publico destinatario de un mensaje de alerta."

standard:
  name: "OASIS CAP v1.2"
  uri: "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"

values:
  - code: public
    label:
      en: Public
      fr: Public
      es: Publico
    definition:
      en: "The alert is intended for unrestricted public dissemination."
      fr: "L'alerte est destinee a une diffusion publique sans restriction."
      es: "La alerta esta destinada a difusion publica sin restricciones."

  - code: restricted
    label:
      en: Restricted
      fr: Restreint
      es: Restringido
    definition:
      en: "The alert is restricted to specific operational audiences."
      fr: "L'alerte est restreinte a des publics operationnels specifiques."
      es: "La alerta esta restringida a audiencias operativas especificas."

  - code: private
    label:
      en: Private
      fr: Prive
      es: Privado
    definition:
      en: "The alert is intended only for specifically addressed recipients."
      fr: "L'alerte est destinee uniquement aux destinataires specifiquement adresses."
      es: "La alerta esta destinada solo a destinatarios especificamente indicados."
