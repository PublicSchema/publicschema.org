id: annotation-type
maturity: draft
domain: crvs

definition:
  en: "The category of a marginal annotation (mention marginale) added to a civil status record when the annotation is not derivable from a triggering vital event. Event-triggered annotations (e.g., annotating a birth acte with a marriage) carry their annotation type implicitly through the triggering event and are not listed here."
  fr: "La catégorie d'une mention marginale ajoutée à un acte d'état civil lorsque la mention n'est pas déductible d'un événement d'état civil déclencheur. Les mentions déclenchées par un événement (par ex., mentionner un mariage sur un acte de naissance) portent leur type implicitement à travers l'événement déclencheur et ne sont pas listées ici."
  es: "La categoría de una anotación marginal (mention marginale) añadida a un acta de estado civil cuando la anotación no es derivable de un evento vital desencadenante. Las anotaciones desencadenadas por un evento (por ej., anotar un matrimonio en un acta de nacimiento) llevan su tipo de forma implícita a través del evento desencadenante y no se listan aquí."

values:
  - code: court_ordered_correction
    label:
      en: Court ordered correction
      fr: Correction ordonnée par le tribunal
      es: Corrección ordenada por el tribunal
    definition:
      en: "An annotation reflecting a judicial correction of a prior entry in the civil status record (e.g., rectification of a name or date)."
      fr: "Une mention reflétant une correction judiciaire d'une inscription antérieure dans l'acte d'état civil (par ex., rectification d'un nom ou d'une date)."
      es: "Una anotación que refleja una corrección judicial de una inscripción previa en el acta de estado civil (por ej., rectificación de un nombre o fecha)."

  - code: nationality_change
    label:
      en: Nationality change
      fr: Changement de nationalité
      es: Cambio de nacionalidad
    definition:
      en: "An annotation reflecting a change in the person's nationality, for example through naturalization or loss of citizenship."
      fr: "Une mention reflétant un changement de nationalité de la personne, par exemple par naturalisation ou perte de citoyenneté."
      es: "Una anotación que refleja un cambio en la nacionalidad de la persona, por ejemplo, a través de naturalización o pérdida de ciudadanía."

  - code: name_change
    label:
      en: Name change
      fr: Changement de nom
      es: Cambio de nombre
    definition:
      en: "An annotation reflecting an administrative or judicial change of the person's name that does not itself constitute a vital event."
      fr: "Une mention reflétant un changement de nom de la personne, par voie administrative ou judiciaire, qui ne constitue pas en lui-même un événement d'état civil."
      es: "Una anotación que refleja un cambio administrativo o judicial del nombre de la persona que no constituye en sí mismo un evento vital."

  - code: gender_marker_change
    label:
      en: Gender marker change
      fr: Changement de mention de sexe
      es: Cambio de mención de sexo
    definition:
      en: "An annotation reflecting a change to the gender marker recorded on the person's civil status record, issued by an administrative or judicial authority."
      fr: "Une mention reflétant un changement de la mention de sexe portée sur l'acte d'état civil de la personne, prononcé par une autorité administrative ou judiciaire."
      es: "Una anotación que refleja un cambio de la mención de sexo inscrita en el acta de estado civil de la persona, dictado por una autoridad administrativa o judicial."

external_equivalents:
  opencrvs:
    label: "No v1 equivalent"
    match: none
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS v1 core has no annotation concept; corrections flow through the RegAction workflow recorded in History, which is an audit trail rather than a typed marginal annotation."
