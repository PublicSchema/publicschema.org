id: biometric-subtype
maturity: draft
label:
  en: Biometric Subtype
  fr: Sous-type biométrique
  es: Subtipo biométrico
definition:
  en: >-
    The specific body part or position within a biometric modality. Values must be
    consistent with the biometric_modality property: finger codes with fingerprint,
    eye codes with iris, portrait with face.
  fr: >-
    La partie du corps ou la position spécifique au sein d'une modalité biométrique.
    Les valeurs doivent être cohérentes avec la propriété biometric_modality: les
    codes de doigt avec empreinte digitale, les codes oculaires avec iris, portrait
    avec visage.
  es: >-
    La parte del cuerpo o posición específica dentro de una modalidad biométrica.
    Los valores deben ser consistentes con la propiedad biometric_modality: los
    códigos de dedo con huella dactilar, los códigos oculares con iris, retrato
    con rostro.
references:
  - name: "ISO 19794-2 Finger Position Codes"
    uri: "https://www.iso.org/standard/50864.html"
    relationship: subset
    machine_readable: false
    notes: "Finger positions 1-10 mapped to named codes."
  - name: "OSIA BiometricSubType"
    uri: "https://secureidentityalliance.github.io/osia/"
    relationship: partial_overlap
    machine_readable: false
    notes: "OSIA defines 56 subtypes; this vocabulary uses 14 covering social protection and national ID use cases."
