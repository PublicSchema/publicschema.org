id: livestock-type
maturity: draft
label:
  en: Livestock Type
  fr: Type de bétail
  es: Tipo de ganado
definition:
  en: Types of livestock kept by the agricultural holding, classified according to the FAO World Programme for the Census of Agriculture.
  fr: Types de bétail élevés par l'exploitation agricole, classifiés selon le Programme mondial du recensement de l'agriculture de la FAO.
  es: Tipos de ganado criados por la explotación agrícola, clasificados según el Programa Mundial del Censo Agropecuario de la FAO.
standard:
  name: FAO World Programme for the Census of Agriculture 2020
  uri: https://www.fao.org/world-census-agriculture/wcarounds/wca2020/en/
  notes: FAO defines livestock categories for agricultural censuses. The list below covers the main species relevant to social protection targeting.
values:
- code: cattle
  label:
    en: Cattle
    fr: Bovins
    es: Ganado bovino
  definition:
    en: Domesticated bovines including cows, bulls, oxen, and calves.
    fr: Bovins domestiqués, y compris vaches, taureaux, bœufs et veaux.
    es: Bovinos domesticados, incluidas vacas, toros, bueyes y terneros.
- code: sheep
  label:
    en: Sheep
    fr: Ovins
    es: Ovejas
  definition:
    en: Domesticated sheep of all ages.
    fr: Ovins domestiqués de tous âges.
    es: Ovejas domesticadas de todas las edades.
- code: goats
  label:
    en: Goats
    fr: Caprins
    es: Cabras
  definition:
    en: Domesticated goats of all ages.
    fr: Caprins domestiqués de tous âges.
    es: Cabras domesticadas de todas las edades.
- code: pigs
  label:
    en: Pigs
    fr: Porcins
    es: Cerdos
  definition:
    en: Domesticated pigs and swine of all ages.
    fr: Porcins domestiqués de tous âges.
    es: Cerdos domesticados de todas las edades.
- code: chickens
  label:
    en: Chickens
    fr: Poulets
    es: Pollos
  definition:
    en: Domesticated chickens, hens, roosters, and chicks.
    fr: Poulets, poules, coqs et poussins domestiqués.
    es: Pollos, gallinas, gallos y pollitos domesticados.
- code: other_poultry
  label:
    en: Other poultry
    fr: Autres volailles
    es: Otras aves de corral
  definition:
    en: Domesticated birds other than chickens, including ducks, turkeys, guinea fowl, and geese.
    fr: Oiseaux domestiqués autres que les poulets, notamment les canards, dindes, pintades et oies.
    es: Aves domesticadas distintas de los pollos, incluidos patos, pavos, gallinas de guinea y gansos.
- code: horses
  label:
    en: Horses
    fr: Chevaux
    es: Caballos
  definition:
    en: Domesticated horses of all ages.
    fr: Chevaux domestiqués de tous âges.
    es: Caballos domesticados de todas las edades.
- code: donkeys_mules
  label:
    en: Donkeys/mules
    fr: Ânes/mulets
    es: Asnos/mulas
  definition:
    en: Domesticated donkeys, mules, and hinnies.
    fr: Ânes, mulets et bardots domestiqués.
    es: Asnos, mulas y burdéganos domesticados.
- code: camels
  label:
    en: Camels
    fr: Chameaux
    es: Camellos
  definition:
    en: Domesticated camels (dromedary and Bactrian).
    fr: Chameaux domestiqués (dromadaires et chameaux de Bactriane).
    es: Camellos domesticados (dromedarios y camellos bactrianos).
- code: rabbits
  label:
    en: Rabbits
    fr: Lapins
    es: Conejos
  definition:
    en: Domesticated rabbits raised for meat, fur, or other products.
    fr: Lapins domestiqués élevés pour la viande, la fourrure ou d'autres produits.
    es: Conejos domesticados criados para carne, piel u otros productos.
- code: beehives
  label:
    en: Beehives
    fr: Ruches
    es: Colmenas
  definition:
    en: Bee colonies maintained in hives for honey production.
    fr: Colonies d'abeilles maintenues dans des ruches pour la production de miel.
    es: Colonias de abejas mantenidas en colmenas para la producción de miel.
- code: other_livestock
  label:
    en: Other livestock
    fr: Autre bétail
    es: Otro ganado
  definition:
    en: Livestock species not covered by the other categories.
    fr: Espèces de bétail non couvertes par les autres catégories.
    es: Especies de ganado no cubiertas por las otras categorías.
system_mappings:
  dhs:
    vocabulary_name: DHS Recode7 livestock variables (hv246a-j)
    values:
    - code: hv246a
      label: Cattle
      maps_to: cattle
    - code: hv246b
      label: Cows/bulls
      maps_to: cattle
    - code: hv246c
      label: Horses/donkeys/mules
      maps_to: horses
      note: "DHS combines horses, donkeys, and mules. Maps to horses as primary; donkeys_mules is not separately identifiable."
    - code: hv246d
      label: Goats
      maps_to: goats
    - code: hv246e
      label: Sheep
      maps_to: sheep
    - code: hv246f
      label: Chickens/poultry
      maps_to: chickens
      note: "DHS combines chickens with other poultry. Maps to chickens as the dominant category."
    - code: hv246g
      label: Pigs
      maps_to: pigs
    - code: hv246h
      label: Other
      maps_to: other_livestock
    unmapped_canonical:
    - other_poultry
    - donkeys_mules
    - camels
    - rabbits
    - beehives
    note: "DHS Recode7 hv246a-h. Each variable records the count of animals owned by the household. Code here is the variable name. Some DHS phases use different subsets of these variables."
  lsms_isa:
    vocabulary_name: LSMS-ISA harmonized livestock roster
    values:
    - code: '1'
      label: Indigenous/local cattle
      maps_to: cattle
    - code: '2'
      label: Exotic/cross cattle
      maps_to: cattle
    - code: '3'
      label: Sheep
      maps_to: sheep
    - code: '4'
      label: Goats
      maps_to: goats
    - code: '5'
      label: Pigs
      maps_to: pigs
    - code: '6'
      label: Local chickens
      maps_to: chickens
    - code: '7'
      label: Exotic/cross chickens
      maps_to: chickens
    - code: '8'
      label: Other poultry
      maps_to: other_poultry
    - code: '9'
      label: Donkeys
      maps_to: donkeys_mules
    - code: '10'
      label: Horses
      maps_to: horses
    - code: '11'
      label: Mules
      maps_to: donkeys_mules
    - code: '12'
      label: Camels
      maps_to: camels
    - code: '13'
      label: Beehives
      maps_to: beehives
    - code: '14'
      label: Rabbits
      maps_to: rabbits
    note: "LSMS-ISA harmonized livestock codes from the 7-country Sub-Saharan Africa panel. More granular than DHS; distinguishes indigenous from exotic breeds."
