id: special-category-basis
maturity: normative
label:
  en: Special Category Basis
  fr: Base pour catégories particulières
  es: Base de categoría especial
definition:
  en: The explicit legal ground for processing special-category personal data (sensitive categories such as health, biometric, or ethnic-origin data) under GDPR Article 9(2) and equivalent national provisions. Processing special-category data requires both a standard legal basis from legal-basis and one of these additional grounds. Ten values correspond to GDPR Article 9(2)(a) through (j).
  fr: Le fondement juridique explicite pour traiter des données à caractère personnel de catégorie particulière (catégories sensibles telles que les données de santé, biométriques ou relatives à l'origine ethnique) en vertu de l'article 9, paragraphe 2, du RGPD et des dispositions nationales équivalentes. Le traitement de données de catégorie particulière nécessite à la fois une base juridique standard tirée de legal-basis et l'un de ces fondements supplémentaires. Les dix valeurs correspondent aux points a à j de l'article 9, paragraphe 2, du RGPD.
  es: El fundamento jurídico explícito para tratar datos personales de categoría especial (categorías sensibles como datos de salud, biométricos o de origen étnico) con arreglo al artículo 9, apartado 2, del RGPD y disposiciones nacionales equivalentes. El tratamiento de datos de categoría especial requiere tanto una base jurídica estándar de legal-basis como uno de estos fundamentos adicionales. Los diez valores corresponden al artículo 9, apartado 2, letras a a j, del RGPD.
external_equivalents:
  dpv-gdpr:
    label: "GDPR Article 9 - Processing of special categories of personal data"
    uri: "https://w3id.org/dpv/legal/eu/gdpr#A9"
    match: exact
    vocabulary: "DPV GDPR extension v2"
    note: "The ten values of this vocabulary map one-to-one to GDPR Article 9(2)(a) through Article 9(2)(j). See individual value notes for per-value URIs."
references:
  - name: "GDPR Article 9 - Processing of special categories of personal data"
    uri: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679#d1e2066-1-1"
    relationship: superset
    machine_readable: false
    notes: "Article 9(2)(a) through (j) define the ten grounds. Equivalent provisions exist in Kenya DPA 2019 s.45(1), South Africa POPIA s.27(1), Brazil LGPD Art.11."
values:
- code: explicit_consent
  label:
    en: Explicit consent
    fr: Consentement explicite
    es: Consentimiento explícito
  definition:
    en: The data subject has given explicit consent to the processing of their special-category data for one or more specific purposes. Explicit consent requires more than a general tick-box; it must be a clear affirmative act, written or biometric, specifically addressing the special-category data. DPV GDPR mapping, GDPR Article 9(2)(a), dpv-gdpr:A9-2-a.
    fr: La personne concernée a donné son consentement explicite au traitement de ses données de catégorie particulière pour une ou plusieurs finalités spécifiques. Le consentement explicite requiert plus qu'une simple case cochée générique; il doit s'agir d'un acte affirmatif clair, écrit ou biométrique, portant spécifiquement sur les données de catégorie particulière. Correspondance DPV RGPD, article 9, paragraphe 2, point a, dpv-gdpr:A9-2-a.
    es: El interesado ha dado su consentimiento explícito para el tratamiento de sus datos de categoría especial con uno o varios fines específicos. El consentimiento explícito requiere más que una casilla de verificación genérica; debe ser un acto afirmativo claro, escrito o biométrico, que aborde específicamente los datos de categoría especial. Correspondencia DPV RGPD, artículo 9, apartado 2, letra a, dpv-gdpr:A9-2-a.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-a, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-a"
- code: employment_social_security
  label:
    en: Employment and social security
    fr: Emploi et sécurité sociale
    es: Empleo y seguridad social
  definition:
    en: Processing is necessary for obligations and rights in employment, social security, or social protection law, to the extent authorised by national law providing appropriate safeguards. Applies when a national social protection law explicitly authorises the processing of, for example, disability or health data for benefit determination. DPV GDPR mapping, GDPR Article 9(2)(b), dpv-gdpr:A9-2-b.
    fr: Le traitement est nécessaire pour l'exécution d'obligations et de droits en droit du travail, de la sécurité sociale ou de la protection sociale, dans la mesure autorisée par le droit national prévoyant des garanties appropriées. S'applique lorsqu'une loi nationale de protection sociale autorise explicitement le traitement, par exemple, de données relatives au handicap ou à la santé pour la détermination des prestations. Correspondance DPV RGPD, article 9, paragraphe 2, point b, dpv-gdpr:A9-2-b.
    es: El tratamiento es necesario para el cumplimiento de obligaciones y el ejercicio de derechos en derecho laboral, de seguridad social o protección social, en la medida en que esté autorizado por el derecho nacional con las salvaguardias adecuadas. Se aplica cuando una ley nacional de protección social autoriza explícitamente el tratamiento de, por ejemplo, datos de discapacidad o salud para determinar prestaciones. Correspondencia DPV RGPD, artículo 9, apartado 2, letra b, dpv-gdpr:A9-2-b.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-b, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-b"
- code: vital_interests
  label:
    en: Vital interests
    fr: Intérêts vitaux
    es: Intereses vitales
  definition:
    en: Processing is necessary to protect the vital interests of the data subject or another person where the subject is physically or legally incapable of giving consent, such as in humanitarian emergency response. The scope is narrow; it does not apply to routine program delivery. DPV GDPR mapping, GDPR Article 9(2)(c), dpv-gdpr:A9-2-c.
    fr: Le traitement est nécessaire pour protéger les intérêts vitaux de la personne concernée ou d'une autre personne, lorsque la personne concernée est physiquement ou juridiquement dans l'incapacité de donner son consentement, par exemple lors d'une réponse humanitaire d'urgence. La portée est étroite et ne s'applique pas à la prestation ordinaire du programme. Correspondance DPV RGPD, article 9, paragraphe 2, point c, dpv-gdpr:A9-2-c.
    es: El tratamiento es necesario para proteger los intereses vitales del interesado o de otra persona, cuando el interesado no está físicamente o legalmente en condiciones de dar su consentimiento, como en la respuesta humanitaria de emergencia. El alcance es estrecho y no se aplica a la prestación rutinaria de programas. Correspondencia DPV RGPD, artículo 9, apartado 2, letra c, dpv-gdpr:A9-2-c.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-c, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-c"
- code: non_profit_body
  label:
    en: Non-profit body
    fr: Organisme sans but lucratif
    es: Organismo sin fines de lucro
  definition:
    en: Processing is carried out in the course of legitimate activities by a foundation, association, or other not-for-profit body with a political, philosophical, religious, or trade-union aim, and the processing relates solely to members or former members, or persons in regular contact in connection with those purposes. DPV GDPR mapping, GDPR Article 9(2)(d), dpv-gdpr:A9-2-d.
    fr: Le traitement est effectué dans le cadre des activités légitimes d'une fondation, d'une association ou de tout autre organisme sans but lucratif poursuivant un but politique, philosophique, religieux ou syndical, et porte uniquement sur les membres ou anciens membres, ou les personnes entretenant des contacts réguliers en lien avec ces finalités. Correspondance DPV RGPD, article 9, paragraphe 2, point d, dpv-gdpr:A9-2-d.
    es: El tratamiento es realizado en el curso de las actividades legítimas de una fundación, asociación u otro organismo sin ánimo de lucro con un objetivo político, filosófico, religioso o sindical, y el tratamiento se refiere únicamente a sus miembros o ex miembros, o a personas que tienen contacto regular en relación con esos fines. Correspondencia DPV RGPD, artículo 9, apartado 2, letra d, dpv-gdpr:A9-2-d.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-d, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-d"
- code: publicly_disclosed
  label:
    en: Manifestly made public
    fr: Données manifestement rendues publiques
    es: Manifestamente hecho público
  definition:
    en: Processing relates to data that has been manifestly made public by the data subject themselves. Only applies when the subject themselves chose to make the data public; it does not apply when data was disclosed by a third party or collected from a public source. DPV GDPR mapping, GDPR Article 9(2)(e), dpv-gdpr:A9-2-e.
    fr: Le traitement porte sur des données manifestement rendues publiques par la personne concernée elle-même. S'applique uniquement lorsque la personne concernée a elle-même choisi de rendre les données publiques; ne s'applique pas lorsque les données ont été divulguées par un tiers ou collectées auprès d'une source publique. Correspondance DPV RGPD, article 9, paragraphe 2, point e, dpv-gdpr:A9-2-e.
    es: El tratamiento se refiere a datos que han sido manifiestamente hechos públicos por el propio interesado. Solo se aplica cuando el interesado ha decidido hacer pública la información; no se aplica cuando los datos fueron divulgados por un tercero o recopilados de una fuente pública. Correspondencia DPV RGPD, artículo 9, apartado 2, letra e, dpv-gdpr:A9-2-e.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-e, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-e"
- code: legal_claims
  label:
    en: Legal claims
    fr: Actions en justice
    es: Reclamaciones jurídicas
  definition:
    en: Processing is necessary for the establishment, exercise, or defence of legal claims, or when courts act in their judicial capacity. Applies when a program must process special-category data to defend itself in a legal dispute or to enforce a legal obligation. DPV GDPR mapping, GDPR Article 9(2)(f), dpv-gdpr:A9-2-f.
    fr: Le traitement est nécessaire à la constatation, à l'exercice ou à la défense de droits en justice, ou chaque fois que des juridictions agissent dans l'exercice de leur fonction juridictionnelle. S'applique lorsqu'un programme doit traiter des données de catégorie particulière pour se défendre dans un litige ou faire respecter une obligation légale. Correspondance DPV RGPD, article 9, paragraphe 2, point f, dpv-gdpr:A9-2-f.
    es: El tratamiento es necesario para la formulación, el ejercicio o la defensa de reclamaciones o cuando los tribunales actúan en el ejercicio de su función judicial. Se aplica cuando un programa debe tratar datos de categoría especial para defenderse en una disputa legal o hacer cumplir una obligación legal. Correspondencia DPV RGPD, artículo 9, apartado 2, letra f, dpv-gdpr:A9-2-f.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-f, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-f"
- code: substantial_public_interest
  label:
    en: Substantial public interest
    fr: Intérêt public important
    es: Interés público sustancial
  definition:
    en: Processing is necessary for reasons of substantial public interest, on the basis of a specific national or EU law, with appropriate safeguards. Used for social protection programs where national law explicitly authorises processing of sensitive data such as disability status or ethnic origin for targeting or inclusion. DPV GDPR mapping, GDPR Article 9(2)(g), dpv-gdpr:A9-2-g.
    fr: Le traitement est nécessaire pour des motifs d'intérêt public important, sur la base d'une loi nationale ou européenne spécifique, avec des garanties appropriées. Utilisé pour les programmes de protection sociale où la loi nationale autorise explicitement le traitement de données sensibles telles que le statut de handicap ou l'origine ethnique à des fins de ciblage ou d'inclusion. Correspondance DPV RGPD, article 9, paragraphe 2, point g, dpv-gdpr:A9-2-g.
    es: El tratamiento es necesario por razones de interés público sustancial, sobre la base de una ley nacional o de la UE específica, con las salvaguardias adecuadas. Se utiliza para programas de protección social donde la ley nacional autoriza expresamente el tratamiento de datos sensibles como la discapacidad o el origen étnico para la focalización o inclusión. Correspondencia DPV RGPD, artículo 9, apartado 2, letra g, dpv-gdpr:A9-2-g.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-g, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-g"
- code: preventive_health
  label:
    en: Preventive or occupational medicine
    fr: Médecine préventive ou du travail
    es: Medicina preventiva u ocupacional
  definition:
    en: Processing is necessary for the purposes of preventive or occupational medicine, assessment of the working capacity of the employee, medical diagnosis, provision of health or social care, or management of health or social care systems. Requires a health professional bound by professional secrecy or equivalent obligation. DPV GDPR mapping, GDPR Article 9(2)(h), dpv-gdpr:A9-2-h.
    fr: Le traitement est nécessaire à des fins de médecine préventive ou du travail, d'évaluation de la capacité de travail du salarié, de diagnostic médical, de prise en charge sanitaire ou sociale, ou de gestion des systèmes de soins de santé ou de protection sociale. Nécessite un professionnel de santé soumis au secret professionnel ou à une obligation équivalente. Correspondance DPV RGPD, article 9, paragraphe 2, point h, dpv-gdpr:A9-2-h.
    es: El tratamiento es necesario con fines de medicina preventiva o laboral, evaluación de la capacidad laboral del trabajador, diagnóstico médico, prestación de asistencia sanitaria o social, o gestión de los sistemas y servicios de asistencia sanitaria o social. Requiere un profesional de la salud sujeto a secreto profesional o a una obligación equivalente. Correspondencia DPV RGPD, artículo 9, apartado 2, letra h, dpv-gdpr:A9-2-h.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-h, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-h"
- code: public_health
  label:
    en: Public health
    fr: Santé publique
    es: Salud pública
  definition:
    en: Processing is necessary for reasons of public interest in the area of public health, such as protection against serious cross-border health threats or ensuring high standards of quality and safety of health care and medicinal products, on the basis of national law providing appropriate safeguards. DPV GDPR mapping, GDPR Article 9(2)(i), dpv-gdpr:A9-2-i.
    fr: Le traitement est nécessaire pour des motifs d'intérêt public dans le domaine de la santé publique, tels que la protection contre les menaces transfrontalières graves pour la santé ou la garantie de normes élevées de qualité et de sécurité des soins de santé et des médicaments, sur la base d'une loi nationale prévoyant des garanties appropriées. Correspondance DPV RGPD, article 9, paragraphe 2, point i, dpv-gdpr:A9-2-i.
    es: El tratamiento es necesario por razones de interés público en el ámbito de la salud pública, como la protección frente a amenazas transfronterizas graves para la salud o el aseguramiento de elevados niveles de calidad y seguridad de la asistencia sanitaria y de los medicamentos, sobre la base de una ley nacional con las salvaguardias adecuadas. Correspondencia DPV RGPD, artículo 9, apartado 2, letra i, dpv-gdpr:A9-2-i.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-i, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-i"
- code: archiving_research
  label:
    en: Archiving, research, or statistics
    fr: Archivage, recherche ou statistiques
    es: Archivo, investigación o estadísticas
  definition:
    en: Processing is necessary for archiving purposes in the public interest, scientific or historical research purposes, or statistical purposes, in accordance with national law subject to appropriate safeguards for the rights and freedoms of the data subject. Used for program evaluations, longitudinal studies, and anonymised reporting. DPV GDPR mapping, GDPR Article 9(2)(j), dpv-gdpr:A9-2-j.
    fr: Le traitement est nécessaire à des fins d'archivage dans l'intérêt public, à des fins de recherche scientifique ou historique, ou à des fins statistiques, conformément au droit national, sous réserve de garanties appropriées pour les droits et libertés de la personne concernée. Utilisé pour les évaluations de programmes, les études longitudinales et les rapports anonymisés. Correspondance DPV RGPD, article 9, paragraphe 2, point j, dpv-gdpr:A9-2-j.
    es: El tratamiento es necesario con fines de archivo en interés público, fines de investigación científica o histórica, o fines estadísticos, de conformidad con el derecho nacional sujeto a las salvaguardias adecuadas para los derechos y libertades del interesado. Se utiliza para evaluaciones de programas, estudios longitudinales e informes anonimizados. Correspondencia DPV RGPD, artículo 9, apartado 2, letra j, dpv-gdpr:A9-2-j.
  notes:
    en: "DPV GDPR: dpv-gdpr:A9-2-j, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-j"
