id: event-certainty
maturity: draft

definition:
  en: "The confidence that an event has occurred or will occur. Values are compatible with OASIS CAP v1.2 certainty codes."
  fr: "La confiance qu'un evenement s'est produit ou se produira. Les valeurs sont compatibles avec les codes de certitude d'OASIS CAP v1.2."
  es: "La confianza de que un evento ha ocurrido o ocurrira. Los valores son compatibles con los codigos de certeza de OASIS CAP v1.2."

standard:
  name: "OASIS CAP v1.2"
  uri: "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"

values:
  - code: observed
    label:
      en: Observed
      fr: Observe
      es: Observado
    definition:
      en: "The event has been observed or confirmed."
      fr: "L'evenement a ete observe ou confirme."
      es: "El evento ha sido observado o confirmado."

  - code: likely
    label:
      en: Likely
      fr: Probable
      es: Probable
    definition:
      en: "The event is likely to occur (probability greater than 50%)."
      fr: "L'evenement est susceptible de se produire (probabilite superieure a 50%)."
      es: "Es probable que el evento ocurra (probabilidad superior al 50%)."

  - code: possible
    label:
      en: Possible
      fr: Possible
      es: Posible
    definition:
      en: "The event is possible but not likely (probability less than 50%)."
      fr: "L'evenement est possible mais peu probable (probabilite inferieure a 50%)."
      es: "El evento es posible pero poco probable (probabilidad inferior al 50%)."

  - code: unlikely
    label:
      en: Unlikely
      fr: Peu probable
      es: Improbable
    definition:
      en: "The event is not expected to occur."
      fr: "L'evenement n'est pas prevu."
      es: "No se espera que el evento ocurra."

  - code: unknown
    label:
      en: Unknown
      fr: Inconnue
      es: Desconocida
    definition:
      en: "Certainty is not yet determined."
      fr: "La certitude n'est pas encore determinee."
      es: "La certeza aun no se ha determinado."
