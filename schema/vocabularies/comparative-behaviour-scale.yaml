id: comparative-behaviour-scale
maturity: draft
label:
  en: Comparative Behaviour Scale
  fr: "Échelle comparative du comportement"
  es: "Escala comparativa de comportamiento"
definition:
  en: "A three-point scale comparing a child's behaviour to other children of the same age, used in the WG/UNICEF Child Functioning Module (CFM) for the behaviour domain."
  fr: "Une échelle à trois niveaux comparant le comportement d'un enfant à celui d'autres enfants du même âge, utilisée dans le Module sur le fonctionnement de l'enfant (CFM) du WG/UNICEF pour le domaine comportemental."
  es: "Una escala de tres niveles que compara el comportamiento de un niño con el de otros niños de la misma edad, utilizada en el Módulo de Funcionamiento Infantil (CFM) del WG/UNICEF para el dominio conductual."
standard:
  name: "WG/UNICEF Child Functioning Module (CFM)"
  uri: https://www.washingtongroup-disability.com/question-sets/wg-unicef-child-functioning-module-cfm/
  notes: "Joint product of the Washington Group on Disability Statistics and UNICEF. Used for the controlling behaviour domain in the CFM 2-4 age module only (CF16, kick/bite/hit wording). The CFM 5-17 controlling behaviour item (CF21) uses the standard functional-difficulty-severity scale with general behaviour-control wording, not this scale."
values:
- code: not_at_all
  label:
    en: Not at all
    fr: Pas du tout
    es: En absoluto
  definition:
    en: "The child does not exhibit the behaviour at all."
    fr: "L'enfant ne présente pas du tout ce comportement."
    es: "El niño no presenta el comportamiento en absoluto."
- code: same_or_less
  label:
    en: The same or less than other children
    fr: Pareil ou moins que les autres enfants
    es: Igual o menos que otros niños
  definition:
    en: "The child's behaviour is the same as or less than that of other children of the same age."
    fr: "Le comportement de l'enfant est identique ou moins prononcé que celui des autres enfants du même âge."
    es: "El comportamiento del niño es igual o menos pronunciado que el de otros niños de la misma edad."
- code: more
  label:
    en: More than other children
    fr: Plus que les autres enfants
    es: Más que otros niños
  definition:
    en: "The child's behaviour is more than that of other children of the same age."
    fr: "Le comportement de l'enfant est plus prononcé que celui des autres enfants du même âge."
    es: "El comportamiento del niño es más pronunciado que el de otros niños de la misma edad."
- code: a_lot_more
  label:
    en: A lot more than other children
    fr: Beaucoup plus que les autres enfants
    es: Mucho más que otros niños
  definition:
    en: "The child's behaviour is a lot more than that of other children of the same age."
    fr: "Le comportement de l'enfant est beaucoup plus prononcé que celui des autres enfants du même âge."
    es: "El comportamiento del niño es mucho más pronunciado que el de otros niños de la misma edad."
system_mappings:
  mics:
    vocabulary_name: "MICS6 CFM Behaviour scale"
    values:
    - code: '1'
      label: "Not at all"
      maps_to: not_at_all
    - code: '2'
      label: "The same or less"
      maps_to: same_or_less
    - code: '3'
      label: "More"
      maps_to: more
    - code: '4'
      label: "A lot more"
      maps_to: a_lot_more
    note: "MICS6 Child Functioning Module, ages 2-4: CF16 (controlling behaviour, kick/bite/hit wording) per the 19 March 2020 CFM PDF. Printed order: Not at all / The same or less / More / A lot more."
