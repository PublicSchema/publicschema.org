id: pregnancy-status
maturity: draft
label:
  en: Pregnancy Status
  fr: Statut de grossesse
  es: Estado de embarazo
definition:
  en: "The current pregnancy status of a person. Aligned with the LOINC LL4129-4 answer list (pregnant, not pregnant, unknown), with an additional postpartum value for social-protection programs that target postpartum or lactating women separately."
  fr: "Le statut de grossesse actuel d'une personne. Aligné sur la liste de réponses LOINC LL4129-4 (enceinte, pas enceinte, inconnu), avec une valeur supplémentaire post-partum pour les programmes de protection sociale qui ciblent séparément les femmes en post-partum ou allaitantes."
  es: "El estado de embarazo actual de una persona. Alineado con la lista de respuestas LOINC LL4129-4 (embarazada, no embarazada, desconocido), con un valor posparto adicional para los programas de protección social que se dirigen por separado a mujeres posparto o lactantes."
standard:
  name: "LOINC LL4129-4 Pregnancy Status"
  uri: https://loinc.org/LL4129-4/
  notes: >
    LOINC answer list LL4129-4 (for LOINC observation code 82810-3) defines
    three values: Pregnant, Not pregnant, Unknown. This vocabulary carries
    those three verbatim and adds `postpartum` as a PublicSchema extension.
    Note that the FHIR R4 International Patient Summary pregnancy-status
    pattern uses SNOMED CT codes for the observation value, not the LOINC
    answer list; implementations that need FHIR IPS conformance should map
    through SNOMED CT rather than treat this vocabulary as a drop-in.
values:
- code: not_pregnant
  label:
    en: Not pregnant
    fr: Pas enceinte
    es: No embarazada
  definition:
    en: "The person is not currently pregnant."
    fr: "La personne n'est pas actuellement enceinte."
    es: "La persona no está actualmente embarazada."
- code: pregnant
  label:
    en: Pregnant
    fr: Enceinte
    es: Embarazada
  definition:
    en: "The person is currently pregnant."
    fr: "La personne est actuellement enceinte."
    es: "La persona está actualmente embarazada."
- code: postpartum
  label:
    en: Postpartum
    fr: Post-partum
    es: Posparto
  definition:
    en: "The person has recently given birth and is in the postpartum period. This value is a PublicSchema extension for social protection use; FHIR handles postpartum via a separate observation."
    fr: "La personne a récemment accouché et se trouve en période post-partum. Cette valeur est une extension PublicSchema pour les programmes de protection sociale; FHIR gère le post-partum via une observation séparée."
    es: "La persona ha dado a luz recientemente y se encuentra en el período posparto. Este valor es una extensión de PublicSchema para uso en protección social; FHIR gestiona el posparto mediante una observación separada."
- code: unknown
  label:
    en: Unknown
    fr: Inconnu
    es: Desconocido
  definition:
    en: "The pregnancy status is not known or was not ascertained."
    fr: "Le statut de grossesse n'est pas connu ou n'a pas été établi."
    es: "El estado de embarazo no se conoce o no fue determinado."
system_mappings:
  dhs:
    vocabulary_name: "v213 - Currently pregnant"
    values:
    - code: '0'
      label: "No or unsure"
      maps_to: not_pregnant
    - code: '1'
      label: "Yes"
      maps_to: pregnant
    unmapped_canonical:
    - postpartum
    - unknown
    note: "DHS Recode 7 v213 defines only two substantive codes (0=No or unsure, 1=Yes); uncertainty is folded into code 0 rather than carried as a separate value. The male recode variable mv213 (partner pregnancy) has an additional code 8 'Don't know' but that value is not present on v213 itself. Postpartum status is not captured as a DHS variable; it is inferred from birth dates."
  mics:
    vocabulary_name: "CP1 - Currently pregnant"
    values:
    - code: '1'
      label: "Yes"
      maps_to: pregnant
    - code: '2'
      label: "No"
      maps_to: not_pregnant
    - code: '8'
      label: "Don't know"
      maps_to: unknown
    unmapped_canonical:
    - postpartum
    note: "MICS6 Contraception/Unmet Need module (CP1). Same gap for postpartum as DHS."
