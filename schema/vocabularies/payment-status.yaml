id: payment-status
maturity: trial-use
definition:
  en: The processing states of a payment event in the disbursement cycle.
  fr: Les états de traitement d'un événement de paiement dans le cycle de versement.
  es: Los estados de procesamiento de un evento de pago en el ciclo de desembolso.
references:
  - name: "ISO 20022 ExternalPaymentTransactionStatus1Code"
    uri: "https://www.iso20022.org/catalogue-messages/additional-content-messages/external-code-sets"
    relationship: superset
    machine_readable: true
    notes: "ISO 20022 defines granular interbank processing states. This vocabulary is a deliberate high-level simplification."
  - name: "Mojaloop FSPIOP TransferState"
    uri: "https://docs.mojaloop.io/technical/api/fspiop/logical-data-model.html"
    relationship: partial_overlap
    machine_readable: true
values:
- code: pending
  label:
    en: Pending
    fr: En attente
    es: Pendiente
  definition:
    en: The payment has been scheduled or initiated but has not yet been transmitted or confirmed.
    fr: Le paiement a été planifié ou initié mais n'a pas encore été transmis ou confirmé.
    es: El pago ha sido programado o iniciado pero aún no ha sido transmitido o confirmado.
- code: processing
  label:
    en: Processing
    fr: En traitement
    es: En procesamiento
  definition:
    en: The payment instruction has been accepted by the financial intermediary and is being executed.
    fr: L'instruction de paiement a été acceptée par l'intermédiaire financier et est en cours d'exécution.
    es: La instrucción de pago ha sido aceptada por el intermediario financiero y está siendo ejecutada.
- code: partial
  label:
    en: Partial
    fr: Partiel
    es: Parcial
  definition:
    en: Part of the payment amount has been transmitted but the full amount has not yet been delivered.
    fr: Une partie du montant du paiement a été transmise mais le montant total n'a pas encore été versé.
    es: Parte del monto del pago ha sido transmitida pero el monto total aún no ha sido entregado.
- code: paid
  label:
    en: Paid
    fr: Payé
    es: Pagado
  definition:
    en: The payment has been successfully transmitted and received by the beneficiary.
    fr: Le paiement a été transmis avec succès et reçu par le bénéficiaire.
    es: El pago ha sido transmitido con éxito y recibido por el beneficiario.
- code: failed
  label:
    en: Failed
    fr: Échoué
    es: Fallido
  definition:
    en: The payment attempt did not complete successfully due to a technical or account-level error.
    fr: La tentative de paiement n'a pas abouti en raison d'une erreur technique ou au niveau du compte.
    es: El intento de pago no se completó con éxito debido a un error técnico o a nivel de cuenta.
- code: returned
  label:
    en: Returned
    fr: Retourné
    es: Devuelto
  definition:
    en: The payment was transmitted but subsequently returned by the receiving institution or agent.
    fr: Le paiement a été transmis mais a ensuite été retourné par l'institution ou l'agent récepteur.
    es: El pago fue transmitido pero posteriormente devuelto por la institución o agente receptor.
- code: rejected
  label:
    en: Rejected
    fr: Rejeté
    es: Rechazado
  definition:
    en: The payment was evaluated and denied based on a business or policy decision, such as a failed eligibility check or a
      disputed claim.
    fr: Le paiement a été évalué et refusé sur la base d'une décision commerciale ou politique, telle qu'un contrôle d'éligibilité
      échoué ou une réclamation contestée.
    es: El pago fue evaluado y denegado en base a una decisión comercial o de política, como una verificación de elegibilidad
      fallida o una reclamación disputada.
- code: cancelled
  label:
    en: Cancelled
    fr: Annulé
    es: Cancelado
  definition:
    en: The payment was cancelled before transmission, typically due to eligibility changes or administrative decision.
    fr: Le paiement a été annulé avant la transmission, généralement en raison de changements d'éligibilité ou d'une décision
      administrative.
    es: El pago fue cancelado antes de la transmisión, generalmente debido a cambios de elegibilidad o decisión administrativa.
- code: reconciled
  deprecated: true
  deprecated_note: "Use the is_reconciled property on PaymentEvent instead. This value will be removed in a future major version."
  label:
    en: Reconciled
    fr: Réconcilié
    es: Conciliado
  definition:
    en: The payment record has been matched and verified against financial system records, confirming accuracy.
    fr: Le registre de paiement a été rapproché et vérifié par rapport aux registres du système financier, confirmant l'exactitude.
    es: El registro de pago ha sido cotejado y verificado con los registros del sistema financiero, confirmando su exactitud.
  notes:
    en: "Deprecated: use the is_reconciled property instead. This status mixed financial reconciliation with payment lifecycle states."
system_mappings:
  openspp:
    values:
    - code: issued
      label: Issued
      maps_to: pending
    - code: sent
      label: Sent
      maps_to: processing
    - code: reconciled
      label: Reconciled
      maps_to: reconciled
      migration_note: "Will map to is_reconciled: true + payment_status: paid when reconciled status is removed."
    - code: paid
      label: Paid
      maps_to: paid
    - code: failed
      label: Failed
      maps_to: failed
    - code: notpaid
      label: Not Paid
      maps_to: pending
    unmapped_canonical:
    - returned
    - cancelled
    - rejected
  fhir_r4:
    vocabulary_name: PaymentStatusCodes
    values:
    - code: paid
      label: Paid
      maps_to: paid
    - code: cleared
      label: Cleared
      maps_to: reconciled
      migration_note: "Will map to is_reconciled: true + payment_status: paid when reconciled status is removed."
    unmapped_canonical:
    - pending
    - failed
    - returned
    - cancelled
    - processing
    - rejected
  opencrvs:
    vocabulary_name: PaymentOutcomeType
    values:
    - code: COMPLETED
      label: Completed
      maps_to: paid
    - code: ERROR
      label: Error
      maps_to: failed
    - code: PARTIAL
      label: Partial
      maps_to: partial
    unmapped_canonical:
    - pending
    - returned
    - cancelled
    - reconciled
    - processing
    - rejected
  openimis:
    vocabulary_name: BenefitConsumptionStatus
    values:
    - code: CREATED
      label: Created
      maps_to: pending
    - code: ACCEPTED
      label: Accepted
      maps_to: processing
    - code: PENDING_APPROVAL
      label: Pending Approval
      maps_to: pending
    - code: APPROVE_FOR_PAYMENT
      label: Approve For Payment
      maps_to: processing
    - code: REJECTED
      label: Rejected
      maps_to: rejected
    - code: DUPLICATE
      label: Duplicate
      maps_to: cancelled
    - code: PENDING_DELETION
      label: Pending Deletion
      maps_to: cancelled
    - code: RECONCILED
      label: Reconciled
      maps_to: reconciled
      migration_note: "Will map to is_reconciled: true + payment_status: paid when reconciled status is removed."
    unmapped_canonical:
    - paid
    - failed
    - returned
  govstack_payments:
    vocabulary_name: "BatchTransactionStatus (implied)"
    values:
    - code: ongoing
      label: Ongoing
      maps_to: processing
    - code: completed
      label: Completed
      maps_to: paid
    - code: failed
      label: Failed
      maps_to: failed
    unmapped_canonical:
    - pending
    - returned
    - rejected
    - cancelled
    - reconciled
