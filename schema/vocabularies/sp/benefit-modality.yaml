id: benefit-modality
maturity: normative
domain: sp
label:
  en: Benefit Modality
  fr: Modalité de prestation
  es: Modalidad de prestación
definition:
  en: The form in which a benefit or entitlement is delivered to a beneficiary.
  fr: La forme sous laquelle une prestation ou un droit est remis à un bénéficiaire.
  es: La forma en que se entrega una prestación o derecho a un beneficiario.
see_also:
  - vocabulary: delivery-channel
    note: "benefit-modality describes what form the benefit takes (cash, voucher, in-kind); delivery-channel describes how it reaches the beneficiary (bank transfer, mobile money, agent). The two are orthogonal: a voucher (modality) can be delivered as e-voucher or paper voucher (channels)."
references:
  - name: "CaLP Network Glossary"
    uri: "https://www.calpnetwork.org/resources/glossary-of-terms/"
    relationship: partial_overlap
    machine_readable: false
  - name: "WFP Transfer Modality Framework"
    uri: "https://executiveboard.wfp.org/document_download/WFP-0000148946"
    relationship: partial_overlap
    machine_readable: false
values:
- code: cash
  label:
    en: Cash
    fr: Espèces
    es: Efectivo
  definition:
    en: A direct monetary transfer to the beneficiary, delivered as physical currency or electronic funds.
    fr: Un transfert monétaire direct au bénéficiaire, sous forme d'espèces physiques ou de fonds électroniques.
    es: Una transferencia monetaria directa al beneficiario, entregada como moneda física o fondos electrónicos.
- code: voucher
  label:
    en: Voucher
    fr: Bon
    es: Vale
  definition:
    en: A redeemable document or code that entitles the holder to obtain goods or services from a designated provider.
    fr: Un document ou code échangeable qui donne droit au titulaire d'obtenir des biens ou services auprès d'un prestataire
      désigné.
    es: Un documento o código canjeable que da derecho al titular a obtener bienes o servicios de un proveedor designado.
- code: in_kind
  label:
    en: In-kind
    fr: En nature
    es: En especie
  definition:
    en: Physical goods (food, clothing, agricultural inputs, etc.) provided directly rather than as a monetary equivalent.
    fr: Biens physiques (nourriture, vêtements, intrants agricoles, etc.) fournis directement plutôt que sous forme d'équivalent
      monétaire.
    es: Bienes físicos (alimentos, ropa, insumos agrícolas, etc.) proporcionados directamente en lugar de como equivalente
      monetario.
- code: service
  label:
    en: Service
    fr: Service
    es: Servicio
  definition:
    en: Access to a social service such as healthcare, education, childcare, or skills training provided as the benefit.
    fr: Accès à un service social tel que les soins de santé, l'éducation, la garde d'enfants ou la formation professionnelle
      fourni comme prestation.
    es: Acceso a un servicio social como atención médica, educación, cuidado infantil o formación profesional, proporcionado
      como prestación.
- code: fee_waiver
  label:
    en: Fee waiver
    fr: Exonération de frais
    es: Exención de tarifa
  definition:
    en: An exemption from a fee or charge that would otherwise apply, such as school fees, health co-payments, or utility
      costs.
    fr: Une exonération d'une redevance ou d'un frais qui s'appliquerait autrement, comme les frais de scolarité, les co-paiements
      de santé ou les coûts des services publics.
    es: Una exención de una tarifa o cargo que de otro modo se aplicaría, como cuotas escolares, copagos de salud o costos
      de servicios públicos.
- code: insurance
  label:
    en: Insurance
    fr: Assurance
    es: Seguro
  definition:
    en: Enrollment in or subsidization of an insurance scheme (health, crop, social) as the benefit provided to the beneficiary.
    fr: Inscription à un régime d'assurance ou subvention de celui-ci (santé, récolte, social) comme prestation fournie au bénéficiaire.
    es: Inscripción en un régimen de seguro o subvención del mismo (salud, cosechas, social) como prestación proporcionada al beneficiario.
