id: enrollment-status
maturity: trial-use
domain: sp
definition:
  en: The lifecycle states of an enrollment in a program.
  fr: Les états du cycle de vie d'une inscription dans un programme.
  es: Los estados del ciclo de vida de una inscripción en un programa.
references:
  - name: "HL7 FHIR EpisodeOfCare.status"
    uri: "https://build.fhir.org/codesystem-episode-of-care-status.json.html"
    relationship: structural_pattern
    machine_readable: true
    notes: "FHIR's episode lifecycle informed the structure."
  - name: "World Bank Social Protection Delivery Systems Framework"
    uri: "https://thedocs.worldbank.org/en/doc/147511529959939838-0160022017/original/11amMarch9DeliverySystemsFrameworkCORECOURSEWITHCLICKERSSENT8March2017.pdf"
    relationship: prose_guidance
    machine_readable: false
values:
- code: waitlisted
  label:
    en: Waitlisted
    fr: En liste d'attente
    es: En lista de espera
  definition:
    en: The applicant has been verified as eligible but is awaiting an available program slot due to capacity or budget constraints.
    fr: Le demandeur a été vérifié comme éligible mais attend une place disponible dans le programme en raison de contraintes
      de capacité ou de budget.
    es: El solicitante ha sido verificado como elegible pero está esperando un lugar disponible en el programa debido a restricciones
      de capacidad o presupuesto.
- code: active
  label:
    en: Active
    fr: Actif
    es: Activo
  definition:
    en: The enrollment is current and benefits are being delivered.
    fr: L'inscription est en cours et les prestations sont délivrées.
    es: La inscripción está vigente y las prestaciones se están entregando.
- code: suspended
  label:
    en: Suspended
    fr: Suspendu
    es: Suspendido
  definition:
    en: The enrollment has been temporarily paused, typically pending verification or compliance action.
    fr: L'inscription a été temporairement suspendue, en attente de vérification ou d'action de conformité.
    es: La inscripción ha sido temporalmente pausada, generalmente pendiente de verificación o acción de cumplimiento.
- code: closed
  label:
    en: Closed
    fr: Clos
    es: Cerrado
  definition:
    en: "The enrollment has been permanently ended. The reason for closure is captured in exit_reason."
    fr: "L'inscription a été définitivement clôturée. La raison de la clôture est indiquée dans exit_reason."
    es: "La inscripción ha sido terminada de forma permanente. La razón del cierre se indica en exit_reason."
- code: pending_verification
  label:
    en: Pending verification
    fr: En attente de vérification
    es: Pendiente de verificación
  definition:
    en: The application is awaiting document or data verification before enrollment is confirmed.
    fr: La demande attend la vérification des documents ou des données avant que l'inscription soit confirmée.
    es: La solicitud está a la espera de verificación de documentos o datos antes de confirmar la inscripción.
- code: graduated
  domain: sp
  label:
    en: Graduated
    fr: Sorti avec succès
    es: Graduado
  definition:
    en: The beneficiary has successfully exited the program through program-defined graduation criteria.
    fr: Le bénéficiaire a quitté le programme avec succès selon les critères de graduation définis par le programme.
    es: El beneficiario ha salido exitosamente del programa a través de los criterios de graduación definidos por el programa.
system_mappings:
  openspp:
    values:
    - code: draft
      label: Draft
      maps_to: pending_verification
    - code: enrolled
      label: Enrolled
      maps_to: active
    - code: paused
      label: Paused
      maps_to: suspended
    - code: exited
      label: Exited
      maps_to: closed
    unmapped_canonical:
    - waitlisted
    - graduated
  dhis2:
    vocabulary_name: EnrollmentStatus
    values:
    - code: ACTIVE
      label: Active
      maps_to: active
    - code: COMPLETED
      label: Completed
      maps_to: closed
    - code: CANCELLED
      label: Cancelled
      maps_to: closed
    unmapped_canonical:
    - waitlisted
    - suspended
    - pending_verification
    - graduated
    note: "COMPLETED may map to graduated or closed + exit_reason depending on program context. CANCELLED maps to closed + exit_reason (administrative or voluntary_withdrawal)."
  openimis:
    vocabulary_name: BeneficiaryStatus
    values:
    - code: POTENTIAL
      label: Potential
      maps_to: pending_verification
    - code: ACTIVE
      label: Active
      maps_to: active
    - code: GRADUATED
      label: Graduated
      maps_to: graduated
    - code: SUSPENDED
      label: Suspended
      maps_to: suspended
    unmapped_canonical:
    - waitlisted
    - closed
  dci:
    vocabulary_name: EnrollmentStatusEnum
    values:
    - code: '1'
      label: Active
      maps_to: active
    - code: '2'
      label: Deceased
      maps_to: closed
    - code: '3'
      label: Graduated
      maps_to: graduated
    - code: '4'
      label: Suspended
      maps_to: suspended
    unmapped_canonical:
    - waitlisted
    - pending_verification
