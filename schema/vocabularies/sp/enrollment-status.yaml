id: enrollment-status
maturity: normative
domain: sp
label:
  en: Enrollment Status
  fr: "Statut d'inscription"
  es: Estado de inscripción
definition:
  en: The lifecycle states of an enrollment in a program.
  fr: Les états du cycle de vie d'une inscription dans un programme.
  es: Los estados del ciclo de vida de una inscripción en un programa.
references:
  - name: "HL7 FHIR EpisodeOfCare.status"
    uri: "https://build.fhir.org/codesystem-episode-of-care-status.json.html"
    relationship: structural_pattern
    machine_readable: true
    notes: "FHIR's episode lifecycle informed the structure."
  - name: "World Bank Social Protection Delivery Systems Framework"
    uri: "https://thedocs.worldbank.org/en/doc/147511529959939838-0160022017/original/11amMarch9DeliverySystemsFrameworkCORECOURSEWITHCLICKERSSENT8March2017.pdf"
    relationship: prose_guidance
    machine_readable: false
values:
- code: pending_verification
  label:
    en: Pending verification
    fr: Vérification en attente
    es: Verificación pendiente
  definition:
    en: The enrollment has been initiated but cannot become active until required eligibility, identity, or document checks are completed.
    fr: L'inscription a été initiée mais ne peut pas devenir active tant que les vérifications requises d'admissibilité, d'identité ou de documents ne sont pas terminées.
    es: La inscripción ha sido iniciada pero no puede volverse activa hasta que se completen las verificaciones requeridas de elegibilidad, identidad o documentos.
- code: waitlisted
  label:
    en: Waitlisted
    fr: En liste d'attente
    es: En lista de espera
  definition:
    en: The applicant has been verified as eligible but is awaiting an available program slot due to capacity or budget constraints.
    fr: Le demandeur a été reconnu admissible mais attend une place disponible dans le programme en raison de contraintes
      de capacité ou de budget.
    es: El solicitante ha sido verificado como elegible pero está esperando un lugar disponible en el programa debido a restricciones
      de capacidad o presupuesto.
- code: active
  label:
    en: Active
    fr: Actif
    es: Activo
  definition:
    en: The enrollment is current and benefits are being delivered.
    fr: L'inscription est en cours et les prestations sont délivrées.
    es: La inscripción está vigente y las prestaciones se están entregando.
- code: suspended
  label:
    en: Suspended
    fr: Suspendu
    es: Suspendido
  definition:
    en: The enrollment has been temporarily paused, typically due to a compliance issue, administrative hold, or temporary ineligibility.
    fr: L'inscription a été temporairement suspendue, généralement en raison d'un problème de conformité, d'un gel administratif ou d'une inéligibilité temporaire.
    es: La inscripción ha sido temporalmente suspendida, generalmente debido a un problema de cumplimiento, una retención administrativa o una inelegibilidad temporal.
- code: closed
  label:
    en: Closed
    fr: Clos
    es: Cerrado
  definition:
    en: "The enrollment has been permanently ended."
    fr: "L'inscription a été définitivement clôturée."
    es: "La inscripción ha sido terminada de forma permanente."
- code: graduated
  domain: sp
  label:
    en: Graduated
    fr: Sorti avec succès
    es: Graduado
  definition:
    en: The beneficiary has successfully exited the program through program-defined graduation criteria.
    fr: Le bénéficiaire a quitté le programme avec succès selon les critères de sortie définis par le programme.
    es: El beneficiario ha salido exitosamente del programa a través de los criterios de graduación definidos por el programa.
system_mappings:
  openspp:
    values:
    - code: draft
      label: Draft
      maps_to: pending_verification
      note: "Draft is the closest OpenSPP equivalent for an enrollment that exists but is not yet fully verified or activated."
    - code: enrolled
      label: Enrolled
      maps_to: active
    - code: paused
      label: Paused
      maps_to: suspended
    - code: exited
      label: Exited
      maps_to: closed
    unmapped_canonical:
    - waitlisted
    - graduated
  dhis2:
    vocabulary_name: EnrollmentStatus
    values:
    - code: ACTIVE
      label: Active
      maps_to: active
    - code: COMPLETED
      label: Completed
      maps_to: closed
    - code: CANCELLED
      label: Cancelled
      maps_to: closed
    unmapped_canonical:
    - pending_verification
    - waitlisted
    - suspended
    - graduated
    note: "COMPLETED may map to graduated or closed + exit_reason depending on program context. CANCELLED maps to closed + exit_reason (administrative or voluntary_withdrawal)."
  openimis:
    vocabulary_name: BeneficiaryStatus
    values:
    - code: POTENTIAL
      label: Potential
      maps_to: pending_verification
      note: "Potential is the closest openIMIS equivalent for a beneficiary record that is not yet fully admitted or activated."
    - code: ACTIVE
      label: Active
      maps_to: active
    - code: GRADUATED
      label: Graduated
      maps_to: graduated
    - code: SUSPENDED
      label: Suspended
      maps_to: suspended
    unmapped_canonical:
    - waitlisted
    - closed
  dci:
    vocabulary_name: EnrollmentStatusEnum
    values:
    - code: '1'
      label: Active
      maps_to: active
    - code: '2'
      label: Deceased
      maps_to: closed
    - code: '3'
      label: Graduated
      maps_to: graduated
    - code: '4'
      label: Suspended
      maps_to: suspended
    unmapped_canonical:
    - pending_verification
    - waitlisted
