id: grievance-type
maturity: normative
domain: sp
label:
  en: Grievance Type
  fr: Type de réclamation
  es: Tipo de reclamación

definition:
  en: "Categories describing the primary issue raised in a grievance record handled through a program's redress mechanism."
  fr: "Catégories décrivant le principal problème soulevé dans un dossier de réclamation traité par le mécanisme de recours d'un programme."
  es: "Categorías que describen el problema principal planteado en un registro de queja o reclamación tramitado por el mecanismo de reclamaciones de un programa."

references:
  - name: "World Bank Sourcebook on the Foundations of Social Protection Delivery Systems, Chapter 8"
    uri: "https://openknowledge.worldbank.org/entities/publication/17e749c6-3586-5908-b836-16d988ebabee"
    relationship: prose_guidance
    machine_readable: false
    notes: "Chapter 8 covers grievance redress mechanisms in social protection delivery, organizing grievance types along delivery chain phases."
  - name: "World Bank Grievance Redress Mechanisms Guidance Note"
    uri: "https://openknowledge.worldbank.org/bitstreams/b4a57d20-24bf-518a-93b1-1a5db3bdbae1/download"
    relationship: prose_guidance
    machine_readable: false
    notes: "Distinguishes formal grievance handling from broader inquiry and feedback channels. This vocabulary covers the issue category once a case is treated as a grievance."
  - name: "ISO 10002 - Quality management, Complaints handling"
    uri: "https://www.iso.org/standard/71580.html"
    relationship: prose_guidance
    machine_readable: false

values:
  - code: exclusion_error
    label:
      en: Exclusion error
      fr: Erreur d'exclusion
      es: Error de exclusión
    definition:
      en: "A complaint that an eligible person or household was wrongly excluded from a program, benefit, or service."
      fr: "Une plainte indiquant qu'une personne ou un ménage admissible a été injustement exclu d'un programme, d'une prestation ou d'un service."
      es: "Una queja de que una persona u hogar elegible fue injustamente excluido de un programa, beneficio o servicio."

  - code: inclusion_error
    label:
      en: Inclusion error
      fr: Erreur d'inclusion
      es: Error de inclusión
    definition:
      en: "A report that an ineligible person or household is receiving benefits or services they should not be entitled to."
      fr: "Un signalement indiquant qu'une personne ou un ménage non admissible reçoit des prestations ou services auxquels il ne devrait pas avoir droit."
      es: "Un reporte de que una persona u hogar inelegible está recibiendo beneficios o servicios a los que no debería tener derecho."

  - code: payment_complaint
    label:
      en: Payment complaint
      fr: Plainte de paiement
      es: Queja de pago
    definition:
      en: "A complaint about delayed, missing, incorrect, or incomplete benefit payments."
      fr: "Une plainte concernant des paiements de prestations retardés, manquants, incorrects ou incomplets."
      es: "Una queja sobre pagos de beneficios retrasados, faltantes, incorrectos o incompletos."

  - code: data_correction
    label:
      en: Data correction
      fr: Correction de données
      es: Corrección de datos
    definition:
      en: "A grievance seeking correction of inaccurate or outdated program data, such as a misspelled name, wrong date of birth, or incorrect disability status."
      fr: "Une réclamation demandant la correction de données inexactes ou obsolètes détenues par le programme, comme un nom mal orthographié, une date de naissance erronée ou un statut de handicap incorrect."
      es: "Una reclamación que solicita corregir datos inexactos u obsoletos en poder del programa, como un nombre mal escrito, una fecha de nacimiento incorrecta o un estado de discapacidad incorrecto."

  - code: appeal
    label:
      en: Appeal
      fr: Appel
      es: Recurso
    definition:
      en: "A formal request to review an administrative decision, such as an eligibility determination, benefit calculation, or exit decision."
      fr: "Une demande formelle de révision d'une décision administrative, telle qu'une détermination d'admissibilité, un calcul de prestation ou une décision de sortie."
      es: "Una solicitud formal para revisar una decisión administrativa, como una determinación de elegibilidad, un cálculo de beneficio o una decisión de salida."

  - code: service_quality
    label:
      en: Service quality
      fr: Qualité de service
      es: Calidad de servicio
    definition:
      en: "A complaint about the quality, accessibility, or timeliness of services provided by the program or its agents."
      fr: "Une plainte concernant la qualité, l'accessibilité ou la rapidité des services fournis par le programme ou ses agents."
      es: "Una queja sobre la calidad, accesibilidad o oportunidad de los servicios proporcionados por el programa o sus agentes."

  - code: misconduct
    label:
      en: Misconduct
      fr: Manquement professionnel
      es: Mala conducta
    definition:
      en: "An allegation of fraud, corruption, exploitation, abuse, harassment, or other improper behavior by program staff or agents."
      fr: "Une allégation de fraude, corruption, exploitation, abus, harcèlement ou autre comportement inapproprié de la part du personnel ou des agents du programme."
      es: "Una alegación de fraude, corrupción, explotación, abuso, acoso u otro comportamiento impropio por parte del personal o agentes del programa."

  - code: other
    label:
      en: Other
      fr: Autre
      es: Otro
    definition:
      en: "A grievance whose primary issue does not fit the named categories, or has not yet been classified."
      fr: "Une réclamation dont le problème principal ne correspond pas aux catégories nommées, ou n'a pas encore été classé."
      es: "Una reclamación cuyo problema principal no encaja en las categorías definidas, o aún no ha sido clasificado."

# General information requests are not modeled as grievance types. If a program's
# intake channel receives mixed traffic, classify those inquiries outside this
# vocabulary and reserve grievance_type for complaints, appeals, correction
# requests, and misconduct allegations.
#
# OpenSPP GRM categories are deployment-configurable records rather than a fixed
# enum, and the extracted openIMIS grievance module does not expose a comparable
# grievance type vocabulary. This taxonomy is therefore literature-grounded and
# deployment-mappable, but not reducible to stable code-level cross-system
# mappings today.
