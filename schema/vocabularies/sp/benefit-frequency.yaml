id: benefit-frequency
maturity: draft
domain: sp
label:
  en: Benefit Frequency
  fr: Fréquence des prestations
  es: Frecuencia de prestaciones

definition:
  en: "The schedule on which a benefit or transfer is provided to a recipient, ranging from one-time payments to recurring disbursements at fixed intervals."
  fr: "Le calendrier selon lequel une prestation ou un transfert est fourni à un bénéficiaire, allant des paiements uniques aux versements récurrents à intervalles fixes."
  es: "El calendario con el que se otorga una prestación o transferencia a un beneficiario, desde pagos únicos hasta desembolsos recurrentes a intervalos fijos."

references:
  - name: "ISO 20022 EventFrequency1Code"
    uri: "https://www.iso20022.org/catalogue-messages/additional-content-messages/external-code-sets"
    relationship: partial_overlap
    machine_readable: true
    notes: "ISO 20022 frequency codes map to monthly, quarterly, semi_annually, annually. This vocabulary includes additional values not in ISO 20022."
  - name: "RFC 5545 - iCalendar RRULE"
    uri: "https://datatracker.ietf.org/doc/html/rfc5545#section-3.3.10"
    relationship: structural_pattern
    machine_readable: true
    notes: "The 'custom' code uses RRULE format."

external_equivalents:
  semic:
    label: "Frequency"
    uri: "http://publications.europa.eu/resource/authority/frequency"
    match: close
    vocabulary: "CPOV"
    note: "EU Frequency Named Authority List covers general recurrence patterns. PublicSchema benefit-frequency is scoped to benefit payment schedules but overlapping concepts map directly."

values:
  - code: one_time
    label:
      en: One-time
      fr: Ponctuel
      es: Único
    definition:
      en: "A single, non-recurring transfer or benefit."
      fr: "Un transfert ou une prestation unique, non récurrent."
      es: "Una transferencia o prestación única, no recurrente."

  - code: daily
    label:
      en: Daily
      fr: Quotidien
      es: Diario
    definition:
      en: "Benefit provided every day."
      fr: "Prestation fournie chaque jour."
      es: "Prestación proporcionada cada día."

  - code: weekly
    label:
      en: Weekly
      fr: Hebdomadaire
      es: Semanal
    definition:
      en: "Benefit provided once per week."
      fr: "Prestation fournie une fois par semaine."
      es: "Prestación proporcionada una vez por semana."

  - code: every_two_weeks
    label:
      en: Every two weeks
      fr: Toutes les deux semaines
      es: Cada dos semanas
    definition:
      en: "Benefit provided every two weeks."
      fr: "Prestation fournie toutes les deux semaines."
      es: "Prestación proporcionada cada dos semanas."

  - code: monthly
    label:
      en: Monthly
      fr: Mensuel
      es: Mensual
    definition:
      en: "Benefit provided once per month."
      fr: "Prestation fournie une fois par mois."
      es: "Prestación proporcionada una vez al mes."

  - code: quarterly
    label:
      en: Quarterly
      fr: Trimestriel
      es: Trimestral
    definition:
      en: "Benefit provided once every three months."
      fr: "Prestation fournie une fois tous les trois mois."
      es: "Prestación proporcionada una vez cada tres meses."

  - code: semi_annually
    label:
      en: Semi-annually
      fr: Semestriel
      es: Semestral
    definition:
      en: "Benefit provided twice per year (every six months)."
      fr: "Prestation fournie deux fois par an (tous les six mois)."
      es: "Prestación proporcionada dos veces al año (cada seis meses)."

  - code: annually
    label:
      en: Annually
      fr: Annuel
      es: Anual
    definition:
      en: "Benefit provided once per year."
      fr: "Prestation fournie une fois par an."
      es: "Prestación proporcionada una vez al año."

  - code: as_needed
    label:
      en: As needed
      fr: Selon les besoins
      es: Según necesidad
    definition:
      en: "Benefit provided on demand or as circumstances require, without a fixed schedule."
      fr: "Prestation fournie à la demande ou selon les circonstances, sans calendrier fixe."
      es: "Prestación proporcionada a demanda o según las circunstancias lo requieran, sin un calendario fijo."

  - code: custom
    label:
      en: Custom
      fr: Personnalisé
      es: Personalizado
    definition:
      en: "A recurrence schedule not covered by the predefined frequencies, specified as an iCalendar RRULE (RFC 5545) in the frequency_rule property."
      fr: "Un calendrier de récurrence non couvert par les fréquences prédéfinies, spécifié sous forme de RRULE iCalendar (RFC 5545) dans la propriété frequency_rule."
      es: "Un calendario de recurrencia no cubierto por las frecuencias predefinidas, especificado como una RRULE de iCalendar (RFC 5545) en la propiedad frequency_rule."

system_mappings:
  semic:
    vocabulary_name: "EU Frequency NAL"
    values:
    - code: ANNUAL
      label: Annual
      maps_to: annually
    - code: DAILY
      label: Daily
      maps_to: daily
    - code: WEEKLY
      label: Weekly
      maps_to: weekly
    - code: MONTHLY
      label: Monthly
      maps_to: monthly
    - code: QUARTERLY
      label: Quarterly
      maps_to: quarterly
    - code: BIWEEKLY
      label: Biweekly
      maps_to: every_two_weeks
    - code: BIANNUAL
      label: Biannual
      maps_to: semi_annually
    - code: IRREG
      label: Irregular
      maps_to: as_needed
    - code: OTHER
      label: Other
      maps_to: custom
    - code: BIMONTHLY
      label: Bimonthly
      maps_to: null
      unmapped_reason: not_yet_mapped
    - code: CONT
      label: Continuous
      maps_to: null
      unmapped_reason: out_of_scope
    - code: NEVER
      label: Never
      maps_to: null
      unmapped_reason: out_of_scope
    unmapped_canonical:
    - one_time
