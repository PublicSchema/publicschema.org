id: lcs-strategy
maturity: draft
label:
  en: Livelihood Coping Strategy
  fr: "Stratégie d'adaptation des moyens d'existence"
  es: "Estrategia de afrontamiento de medios de vida"
definition:
  en: "The twelve household coping strategies tracked by the WFP Livelihood Coping Strategies (LCS) module, grouped into three severity tiers: stress strategies are reversible and indicate reduced ability to deal with future shocks; crisis strategies directly reduce future productive capacity; emergency strategies are harder to reverse and affect long-term welfare. Under CARI, a household's LCS output is the highest tier reported to have been adopted."
  fr: "Les douze stratégies d'adaptation des ménages suivies par le module Livelihood Coping Strategies (LCS) du PAM, regroupées en trois niveaux de gravité : les stratégies de stress sont réversibles et indiquent une capacité réduite à faire face aux chocs futurs ; les stratégies de crise réduisent directement la capacité productive future ; les stratégies d'urgence sont plus difficiles à inverser et affectent le bien-être à long terme. Sous CARI, la sortie LCS d'un ménage est le niveau le plus élevé déclaré avoir été adopté."
  es: "Las doce estrategias de afrontamiento de los hogares monitoreadas por el módulo Livelihood Coping Strategies (LCS) del PMA, agrupadas en tres niveles de gravedad: las estrategias de estrés son reversibles e indican capacidad reducida para enfrentar choques futuros; las estrategias de crisis reducen directamente la capacidad productiva futura; las estrategias de emergencia son más difíciles de revertir y afectan el bienestar a largo plazo. Bajo CARI, la salida LCS de un hogar es el nivel más alto reportado como adoptado."
standard:
  name: "WFP CARI Guidelines (3rd edition, 2021)"
  uri: "https://docs.wfp.org/api/documents/WFP-0000132207/download/"
  notes: "The exact list of strategies and their tier assignments are contextualized per country by WFP VAM. The twelve strategies below are the canonical set most frequently deployed; country-specific adaptations extend or substitute strategies within each tier."
values:
- code: spent_savings
  label:
    en: Spent savings
    fr: "A puisé dans l'épargne"
    es: "Usó los ahorros"
  definition:
    en: "The household spent savings to meet food needs. Stress tier."
    fr: "Le ménage a puisé dans son épargne pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar usó sus ahorros para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: sold_household_items
  label:
    en: Sold household items (non-productive assets)
    fr: "A vendu des biens du ménage (actifs non productifs)"
    es: "Vendió bienes del hogar (activos no productivos)"
  definition:
    en: "The household sold household items such as furniture, radio, jewellery to meet food needs. Stress tier."
    fr: "Le ménage a vendu des biens du ménage tels que meubles, radio, bijoux pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar vendió bienes del hogar como muebles, radio, joyas para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: reduced_nonfood_expenses
  label:
    en: Reduced non-food expenses (health, education)
    fr: "A réduit les dépenses non alimentaires (santé, éducation)"
    es: "Redujo gastos no alimentarios (salud, educación)"
  definition:
    en: "The household reduced non-essential non-food expenses such as health or education spending to afford food. Stress tier."
    fr: "Le ménage a réduit les dépenses non alimentaires non essentielles telles que les dépenses de santé ou d'éducation pour se permettre la nourriture. Niveau stress."
    es: "El hogar redujo gastos no alimentarios no esenciales como salud o educación para poder pagar alimentos. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: borrowed_money_food
  label:
    en: Borrowed money or bought food on credit
    fr: "A emprunté de l'argent ou acheté de la nourriture à crédit"
    es: "Pidió dinero prestado o compró alimentos a crédito"
  definition:
    en: "The household borrowed money or purchased food on credit to meet food needs. Stress tier."
    fr: "Le ménage a emprunté de l'argent ou acheté de la nourriture à crédit pour couvrir ses besoins alimentaires. Niveau stress."
    es: "El hogar pidió dinero prestado o compró alimentos a crédito para cubrir las necesidades alimentarias. Nivel estrés."
  notes:
    en: "LCS tier = stress"
- code: sold_productive_assets
  label:
    en: Sold productive assets (tools, livestock)
    fr: "A vendu des actifs productifs (outils, bétail)"
    es: "Vendió activos productivos (herramientas, ganado)"
  definition:
    en: "The household sold productive assets such as tools, sewing machine, wheelbarrow, or livestock to meet food needs. Crisis tier: directly reduces future productive capacity."
    fr: "Le ménage a vendu des actifs productifs tels qu'outils, machine à coudre, brouette ou bétail pour couvrir ses besoins alimentaires. Niveau crise : réduit directement la capacité productive future."
    es: "El hogar vendió activos productivos como herramientas, máquina de coser, carretilla o ganado para cubrir las necesidades alimentarias. Nivel crisis: reduce directamente la capacidad productiva futura."
  notes:
    en: "LCS tier = crisis"
- code: withdrew_children_from_school
  label:
    en: Withdrew children from school
    fr: "A retiré des enfants de l'école"
    es: "Retiró a los niños de la escuela"
  definition:
    en: "The household withdrew children from school to save on fees or free their time for work. Crisis tier."
    fr: "Le ménage a retiré des enfants de l'école pour économiser sur les frais ou libérer leur temps pour le travail. Niveau crise."
    es: "El hogar retiró a los niños de la escuela para ahorrar en matrículas o liberar su tiempo para trabajar. Nivel crisis."
  notes:
    en: "LCS tier = crisis"
- code: reduced_essential_nonfood
  label:
    en: Reduced essential non-food expenses (health)
    fr: "A réduit les dépenses non alimentaires essentielles (santé)"
    es: "Redujo gastos no alimentarios esenciales (salud)"
  definition:
    en: "The household reduced essential non-food expenses such as health care, preventing access to needed treatment. Crisis tier."
    fr: "Le ménage a réduit les dépenses non alimentaires essentielles telles que les soins de santé, empêchant l'accès aux traitements nécessaires. Niveau crise."
    es: "El hogar redujo gastos no alimentarios esenciales como atención sanitaria, impidiendo el acceso al tratamiento necesario. Nivel crisis."
  notes:
    en: "LCS tier = crisis"
- code: harvested_immature_crops
  label:
    en: Consumed seed stock or harvested immature crops
    fr: "A consommé les stocks de semences ou récolté des cultures immatures"
    es: "Consumió las reservas de semillas o cosechó cultivos inmaduros"
  definition:
    en: "The household consumed seed stocks held for the next planting season, or harvested crops before maturity. Crisis tier: compromises the next production cycle."
    fr: "Le ménage a consommé les stocks de semences conservés pour la prochaine saison ou a récolté des cultures avant maturité. Niveau crise : compromet le prochain cycle de production."
    es: "El hogar consumió reservas de semillas guardadas para la próxima siembra, o cosechó cultivos antes de su madurez. Nivel crisis: compromete el próximo ciclo productivo."
  notes:
    en: "LCS tier = crisis"
- code: sold_house_or_land
  label:
    en: Sold house or land
    fr: "A vendu la maison ou la terre"
    es: "Vendió la casa o la tierra"
  definition:
    en: "The household sold its house or land to meet food needs. Emergency tier: irreversible loss of productive or sheltering asset."
    fr: "Le ménage a vendu sa maison ou sa terre pour couvrir ses besoins alimentaires. Niveau urgence : perte irréversible d'un actif productif ou de logement."
    es: "El hogar vendió su casa o tierra para cubrir las necesidades alimentarias. Nivel emergencia: pérdida irreversible de activo productivo o de vivienda."
  notes:
    en: "LCS tier = emergency"
- code: migrated_whole_household
  label:
    en: Migrated as a whole household
    fr: "A migré en tant que ménage entier"
    es: "Migró como hogar entero"
  definition:
    en: "The whole household migrated to find food or income. Emergency tier: distinct from normal seasonal labour migration, which is not coping."
    fr: "Le ménage entier a migré pour trouver de la nourriture ou un revenu. Niveau urgence : distinct de la migration de main-d'œuvre saisonnière normale, qui ne relève pas de l'adaptation de crise."
    es: "El hogar entero migró para buscar alimentos o ingresos. Nivel emergencia: distinto de la migración laboral estacional normal, que no constituye afrontamiento de crisis."
  notes:
    en: "LCS tier = emergency"
- code: child_labor_or_early_marriage
  label:
    en: Engaged in high-risk work, child labour, or early marriage
    fr: "A eu recours au travail à haut risque, au travail des enfants ou au mariage précoce"
    es: "Recurrió a trabajo de alto riesgo, trabajo infantil o matrimonio precoz"
  definition:
    en: "Household members, including children, engaged in exploitative or high-risk work; or children were married early to reduce household burden. Emergency tier: long-term welfare harm, protection red flag."
    fr: "Des membres du ménage, y compris des enfants, ont eu recours à un travail exploitant ou à haut risque, ou des enfants ont été mariés tôt pour alléger la charge du ménage. Niveau urgence : préjudice de bien-être à long terme, signal d'alerte en matière de protection."
    es: "Miembros del hogar, incluidos niños, recurrieron a trabajo de explotación o de alto riesgo; o se casaron niños tempranamente para reducir la carga familiar. Nivel emergencia: daño al bienestar de largo plazo, señal de alerta de protección."
  notes:
    en: "LCS tier = emergency"
- code: begging
  label:
    en: Begged for food or money
    fr: "A mendié de la nourriture ou de l'argent"
    es: "Mendigó comida o dinero"
  definition:
    en: "Household members begged for food or money. Emergency tier."
    fr: "Des membres du ménage ont mendié de la nourriture ou de l'argent. Niveau urgence."
    es: "Miembros del hogar mendigaron comida o dinero. Nivel emergencia."
  notes:
    en: "LCS tier = emergency"
