id: status-in-employment
maturity: candidate
label:
  en: Status in Employment
  fr: "Statut dans l'emploi"
  es: Situación en el empleo
definition:
  en: The type of employment relationship a person has, classified according to the ILO International Classification of Status in Employment (ICSE-18).
  fr: Le type de relation d'emploi d'une personne, classé selon la Classification internationale de la situation dans l'emploi (CISE-18) de l'OIT.
  es: El tipo de relación de empleo de una persona, clasificado según la Clasificación Internacional de la Situación en el Empleo (CISE-18) de la OIT.
standard:
  name: ILO ICSE-18 (20th ICLS, 2018)
  uri: https://www.ilo.org/media/209766/download
  notes: "International Classification of Status in Employment. ICSE-18 defines 7 aggregated and 10 detailed categories organised by two dichotomies (type of authority, type of economic risk). This vocabulary enumerates six high-level values most commonly used in social-protection registries: employer, own-account worker, dependent contractor, employee, contributing family worker, cooperative member. Implementers requiring the full ICSE-18 structure should extend or refine this list."
values:
  - code: employee
    label:
      en: Employee
      fr: Salarié
      es: Empleado asalariado
    definition:
      en: "A worker who holds an explicit or implicit employment contract giving them basic remuneration not directly dependent on the revenue of the employer."
      fr: "Un travailleur titulaire d'un contrat de travail explicite ou implicite lui garantissant une rémunération de base non directement dépendante du revenu de l'employeur."
      es: "Un trabajador que tiene un contrato de trabajo explícito o implícito que le otorga una remuneración básica no dependiente directamente de los ingresos del empleador."
  - code: employer
    label:
      en: Employer
      fr: Employeur
      es: Empleador
    definition:
      en: "An independent worker who, on a continuous basis, engages one or more persons to work for them as employees."
      fr: "Un travailleur indépendant qui, de manière continue, engage une ou plusieurs personnes pour travailler pour lui en tant que salariés."
      es: "Un trabajador independiente que, de manera continua, contrata a una o más personas para que trabajen como empleados."
  - code: own_account_worker
    label:
      en: Own-account worker
      fr: Travailleur à son propre compte
      es: Trabajador por cuenta propia
    definition:
      en: "An independent worker who does not engage employees on a continuous basis."
      fr: "Un travailleur indépendant qui n'engage pas de salariés de manière continue."
      es: "Un trabajador independiente que no contrata empleados de manera continua."
  - code: dependent_contractor
    label:
      en: Dependent contractor
      fr: Travailleur sous contrat dépendant
      es: Contratista dependiente
    definition:
      en: "A worker engaged on a contractual basis to produce goods or provide services for another economic unit, who is not treated as an employee but depends on that unit for the organisation of work, access to work, or access to markets. Introduced as a distinct category in ICSE-18 to capture workers such as platform-based gig workers."
      fr: "Un travailleur engagé sur une base contractuelle pour produire des biens ou fournir des services à une autre unité économique, qui n'est pas traité comme salarié mais dépend de cette unité pour l'organisation du travail, l'accès au travail ou l'accès aux marchés. Catégorie distincte introduite par la CISE-18 pour saisir notamment les travailleurs des plateformes numériques."
      es: "Un trabajador contratado para producir bienes o prestar servicios a otra unidad económica, que no es tratado como empleado pero depende de esa unidad para la organización del trabajo, el acceso al trabajo o el acceso a los mercados. Categoría distinta introducida en la CISE-18 para capturar, entre otros, a los trabajadores de plataformas digitales."
  - code: contributing_family_worker
    label:
      en: Contributing family worker
      fr: Aide familial
      es: Trabajador familiar auxiliar
    definition:
      en: "A person who works without pay in an economic enterprise operated by a related person living in the same household."
      fr: "Une personne qui travaille sans rémunération dans une entreprise économique dirigée par un membre de sa famille vivant dans le même ménage."
      es: "Una persona que trabaja sin remuneración en una empresa económica dirigida por un familiar que vive en el mismo hogar."
  - code: cooperative_member
    label:
      en: Member of a producers' cooperative
      fr: "Membre d'une coopérative de producteurs"
      es: Miembro de una cooperativa de productores
    definition:
      en: "A worker who holds a self-employment job in a cooperative that produces goods or services, in which each member takes part on an equal footing in organizing production and other activities."
      fr: "Un travailleur qui occupe un emploi indépendant dans une coopérative qui produit des biens ou des services, dans laquelle chaque membre participe sur un pied d'égalité à l'organisation de la production et des autres activités."
      es: "Un trabajador que tiene un empleo independiente en una cooperativa que produce bienes o servicios, en la cual cada miembro participa en igualdad de condiciones en la organización de la producción y otras actividades."
external_equivalents:
  opencrvs:
    label: "No v1 equivalent"
    match: none
    vocabulary: "OpenCRVS v2 event service"
    note: "OpenCRVS v2 does not include a status-in-employment field or vocabulary."
