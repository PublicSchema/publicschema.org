id: cooking-fuel
maturity: draft
label:
  en: Cooking Fuel
definition:
  en: The primary fuel used by the household for cooking, classified according to the WHO Household Energy Database categories.
standard:
  name: WHO Household Energy Database
  uri: https://www.who.int/data/gho/data/themes/air-pollution/household-air-pollution
  notes: WHO classification of household cooking fuels for monitoring clean energy access (SDG 7.1.2).
values:
- code: electricity
  label:
    en: Electricity
  definition:
    en: Cooking using electric stoves, induction cooktops, or other electrically powered cooking appliances.
- code: lpg_natural_gas
  label:
    en: LPG/natural gas
  definition:
    en: Cooking using liquefied petroleum gas (LPG), natural gas, or biogas piped or from cylinders.
- code: biogas
  label:
    en: Biogas
  definition:
    en: Cooking using gas produced from anaerobic digestion of organic matter (animal dung, crop residue, food waste).
- code: kerosene
  label:
    en: Kerosene
  definition:
    en: Cooking using kerosene (paraffin) as fuel in stoves or lamps.
- code: coal_lignite
  label:
    en: Coal/lignite
  definition:
    en: Cooking using coal, lignite, or charcoal briquettes made from coal.
- code: charcoal
  label:
    en: Charcoal
  definition:
    en: Cooking using charcoal produced from wood or other biomass through pyrolysis.
- code: wood
  label:
    en: Wood
  definition:
    en: Cooking using firewood, wood chips, or sawdust.
- code: straw_shrubs_grass
  label:
    en: Straw/shrubs/grass
  definition:
    en: Cooking using straw, shrubs, grass, or other light plant materials.
- code: agricultural_crop_waste
  label:
    en: Agricultural crop waste
  definition:
    en: Cooking using crop residues such as husks, stalks, cobs, or bagasse.
- code: animal_dung
  label:
    en: Animal dung
  definition:
    en: Cooking using dried animal dung cakes or pellets.
- code: no_food_cooked
  label:
    en: No food cooked in household
  definition:
    en: The household does not cook food (eats out, receives prepared meals, or uses only cold food).
- code: other
  label:
    en: Other
  definition:
    en: A cooking fuel not covered by the other categories.
