id: alert-severity
maturity: draft

definition:
  en: "The severity level of an alert event, indicating the intensity of the expected impact."
  fr: "Le niveau de gravite d'un evenement d'alerte, indiquant l'intensite de l'impact attendu."
  es: "El nivel de gravedad de un evento de alerta, indicando la intensidad del impacto esperado."

standard:
  name: "OASIS CAP v1.2"
  uri: "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"

values:
  - code: extreme
    label:
      en: Extreme
      fr: Extreme
      es: Extremo
    definition:
      en: "Extraordinary threat to life or property."
      fr: "Menace extraordinaire pour la vie ou les biens."
      es: "Amenaza extraordinaria para la vida o la propiedad."

  - code: severe
    label:
      en: Severe
      fr: Grave
      es: Severo
    definition:
      en: "Significant threat to life or property."
      fr: "Menace importante pour la vie ou les biens."
      es: "Amenaza significativa para la vida o la propiedad."

  - code: moderate
    label:
      en: Moderate
      fr: Modere
      es: Moderado
    definition:
      en: "Possible threat to life or property."
      fr: "Menace possible pour la vie ou les biens."
      es: "Posible amenaza para la vida o la propiedad."

  - code: minor
    label:
      en: Minor
      fr: Mineur
      es: Menor
    definition:
      en: "Minimal to no known threat to life or property."
      fr: "Menace minimale ou inexistante pour la vie ou les biens."
      es: "Amenaza minima o inexistente para la vida o la propiedad."

  - code: unknown
    label:
      en: Unknown
      fr: Inconnu
      es: Desconocido
    definition:
      en: "Severity is not known."
      fr: "La gravite n'est pas connue."
      es: "La gravedad no es conocida."
