id: acute-malnutrition-severity
maturity: draft
label:
  en: Acute Malnutrition Severity
  fr: Sévérité de la malnutrition aiguë
  es: Gravedad de la desnutrición aguda
definition:
  en: "The severity of acute malnutrition based on mid-upper arm circumference (MUAC) cutoffs for children aged 6-59 months, as defined by the WHO/UNICEF/WFP/UNHCR joint criteria."
  fr: "La sévérité de la malnutrition aiguë basée sur les seuils de périmètre brachial pour les enfants de 6 à 59 mois, tels que définis par les critères conjoints OMS/UNICEF/PAM/UNHCR."
  es: "La gravedad de la desnutrición aguda basada en los puntos de corte de la circunferencia media del brazo para niños de 6 a 59 meses, según los criterios conjuntos OMS/UNICEF/PMA/ACNUR."
standard:
  name: "WHO/UNICEF/WFP/UNHCR Joint Statement on Community-based Management of Acute Malnutrition (2007)"
  uri: https://www.who.int/publications/i/item/9789280641479
  notes: "MUAC cutoffs for children 6-59 months: SAM < 115mm, MAM 115-124mm, adequate >= 125mm. Updated thresholds confirmed in the 2009 WHO child growth standards implementation guide."
values:
- code: adequate
  label:
    en: Adequate
    fr: Adéquat
    es: Adecuado
  definition:
    en: "MUAC >= 125mm for children aged 6-59 months. No acute malnutrition detected by MUAC screening."
    fr: "Périmètre brachial supérieur ou égal à 125mm pour les enfants de 6 à 59 mois. Aucune malnutrition aiguë détectée par le dépistage du périmètre brachial."
    es: "Circunferencia media del brazo mayor o igual a 125mm en niños de 6 a 59 meses. No se detecta desnutrición aguda en el tamizaje."
- code: moderate_acute_malnutrition
  label:
    en: Moderate acute malnutrition (MAM)
    fr: Malnutrition aiguë modérée (MAM)
    es: Desnutrición aguda moderada (MAM)
  definition:
    en: "MUAC 115-124mm for children aged 6-59 months. Indicates moderate acute malnutrition requiring supplementary feeding."
    fr: "Périmètre brachial de 115 à 124mm pour les enfants de 6 à 59 mois. Indique une malnutrition aiguë modérée nécessitant une alimentation supplémentaire."
    es: "Circunferencia media del brazo de 115 a 124mm en niños de 6 a 59 meses. Indica desnutrición aguda moderada que requiere alimentación suplementaria."
- code: severe_acute_malnutrition
  label:
    en: Severe acute malnutrition (SAM)
    fr: Malnutrition aiguë sévère (MAS)
    es: Desnutrición aguda grave (DAG)
  definition:
    en: "MUAC < 115mm for children aged 6-59 months. Indicates severe acute malnutrition requiring therapeutic treatment."
    fr: "Périmètre brachial inférieur à 115mm pour les enfants de 6 à 59 mois. Indique une malnutrition aiguë sévère nécessitant un traitement thérapeutique."
    es: "Circunferencia media del brazo inferior a 115mm en niños de 6 a 59 meses. Indica desnutrición aguda grave que requiere tratamiento terapéutico."
