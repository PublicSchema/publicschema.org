id: acute-malnutrition-severity
maturity: draft
label:
  en: Acute Malnutrition Severity
  fr: Sévérité de la malnutrition aiguë
  es: Gravedad de la desnutrición aguda
definition:
  en: "The severity band of a person's acute malnutrition, expressed as adequate, moderate, or severe. The band is a classification layer used across age groups and reference systems; the raw cutoffs that produce it differ by age (MUAC thresholds for children 6-59 months, weight-for-height z-score for under-5s, BMI-for-age for school-age children and adolescents, adult BMI for adults, pregnant/lactating cutoffs for women of reproductive age). Programs applying this vocabulary on an AnthropometricProfile must cite the muac_cutoff_rule that produced the band."
  fr: "La bande de sévérité de la malnutrition aiguë d'une personne, exprimée comme adéquate, modérée ou sévère. La bande est une couche de classification utilisée pour tous les groupes d'âge et systèmes de référence ; les seuils bruts qui la produisent diffèrent selon l'âge (seuils de périmètre brachial pour les enfants de 6 à 59 mois, score z poids-pour-taille pour les moins de 5 ans, IMC-pour-âge pour les enfants d'âge scolaire et adolescents, IMC adulte pour les adultes, seuils femmes enceintes/allaitantes). Les programmes appliquant ce vocabulaire sur un AnthropometricProfile doivent citer le muac_cutoff_rule ayant produit la bande."
  es: "La banda de gravedad de la desnutrición aguda de una persona, expresada como adecuada, moderada o grave. La banda es una capa de clasificación utilizada en todos los grupos de edad y sistemas de referencia; los puntos de corte crudos que la producen difieren según la edad (umbrales de perímetro braquial para niños de 6 a 59 meses, puntaje z peso-para-talla para menores de 5 años, IMC-para-edad para niños en edad escolar y adolescentes, IMC adulto para adultos, umbrales para mujeres embarazadas/lactantes). Los programas que apliquen este vocabulario sobre un AnthropometricProfile deben citar el muac_cutoff_rule que produjo la banda."
standard:
  name: "WHO/UNICEF/WFP/UNHCR Joint Statement on Community-based Management of Acute Malnutrition (2007)"
  uri: https://www.who.int/publications/i/item/9789280641479
  notes: "Reference cutoffs by age group: children 6-59 months, MUAC with SAM < 115mm, MAM 115-124mm, adequate >= 125mm, or WHZ bands SAM < -3 SD, MAM -3 to < -2 SD (WHO Child Growth Standards 2006); school-age / adolescents, BMI-for-age z-score thresholds from WHO 2007 Growth Reference; adults, BMI < 16 severe, 16-18.4 moderate, >= 18.5 adequate; pregnant and lactating women, MUAC cutoff (commonly < 210mm or < 230mm per protocol). Programs choose the rule appropriate to the subject and cite it on the AnthropometricProfile."
values:
- code: adequate
  label:
    en: Adequate
    fr: Adéquat
    es: Adecuado
  definition:
    en: "No acute malnutrition detected under the cutoff rule applied. Reference thresholds by age: MUAC >= 125mm for children 6-59 months; WHZ >= -2 SD for under-5s; BMI-for-age z-score >= -2 SD for school-age and adolescents; BMI >= 18.5 for adults."
    fr: "Aucune malnutrition aiguë détectée selon la règle de seuil appliquée. Seuils de référence par âge : périmètre brachial >= 125mm pour les enfants de 6 à 59 mois ; score z poids-pour-taille >= -2 SD pour les moins de 5 ans ; IMC-pour-âge z-score >= -2 SD pour les enfants d'âge scolaire et adolescents ; IMC >= 18,5 pour les adultes."
    es: "No se detecta desnutrición aguda según la regla de corte aplicada. Umbrales de referencia por edad: perímetro braquial >= 125mm para niños de 6 a 59 meses; puntaje z peso-para-talla >= -2 SD para menores de 5 años; IMC-para-edad z-score >= -2 SD para niños en edad escolar y adolescentes; IMC >= 18,5 para adultos."
- code: moderate_acute_malnutrition
  label:
    en: Moderate acute malnutrition (MAM)
    fr: Malnutrition aiguë modérée (MAM)
    es: Desnutrición aguda moderada (MAM)
  definition:
    en: "Moderate acute malnutrition under the cutoff rule applied. Reference thresholds by age: MUAC 115-124mm for children 6-59 months; WHZ -3 to <-2 SD for under-5s; BMI-for-age z-score -3 to <-2 SD for school-age and adolescents; BMI 16-18.4 for adults. Typically requires supplementary feeding."
    fr: "Malnutrition aiguë modérée selon la règle de seuil appliquée. Seuils de référence par âge : périmètre brachial de 115 à 124mm pour les enfants de 6 à 59 mois ; score z poids-pour-taille -3 à <-2 SD pour les moins de 5 ans ; IMC-pour-âge z-score -3 à <-2 SD pour les enfants d'âge scolaire et adolescents ; IMC 16 à 18,4 pour les adultes. Nécessite généralement une alimentation supplémentaire."
    es: "Desnutrición aguda moderada según la regla de corte aplicada. Umbrales de referencia por edad: perímetro braquial de 115 a 124mm para niños de 6 a 59 meses; puntaje z peso-para-talla -3 a <-2 SD para menores de 5 años; IMC-para-edad z-score -3 a <-2 SD para niños en edad escolar y adolescentes; IMC 16 a 18,4 para adultos. Generalmente requiere alimentación suplementaria."
- code: severe_acute_malnutrition
  label:
    en: Severe acute malnutrition (SAM)
    fr: Malnutrition aiguë sévère (MAS)
    es: Desnutrición aguda grave (DAG)
  definition:
    en: "Severe acute malnutrition under the cutoff rule applied, or presence of bilateral pitting oedema. Reference thresholds by age: MUAC < 115mm for children 6-59 months; WHZ < -3 SD for under-5s; BMI-for-age z-score < -3 SD for school-age and adolescents; BMI < 16 for adults. Requires therapeutic treatment."
    fr: "Malnutrition aiguë sévère selon la règle de seuil appliquée, ou présence d'œdèmes bilatéraux prenant le godet. Seuils de référence par âge : périmètre brachial < 115mm pour les enfants de 6 à 59 mois ; score z poids-pour-taille < -3 SD pour les moins de 5 ans ; IMC-pour-âge z-score < -3 SD pour les enfants d'âge scolaire et adolescents ; IMC < 16 pour les adultes. Nécessite un traitement thérapeutique."
    es: "Desnutrición aguda grave según la regla de corte aplicada, o presencia de edema bilateral con fóvea. Umbrales de referencia por edad: perímetro braquial < 115mm para niños de 6 a 59 meses; puntaje z peso-para-talla < -3 SD para menores de 5 años; IMC-para-edad z-score < -3 SD para niños en edad escolar y adolescentes; IMC < 16 para adultos. Requiere tratamiento terapéutico."
