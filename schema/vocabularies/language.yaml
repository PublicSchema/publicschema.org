id: language
maturity: draft
definition:
  en: Language codes as defined by the ISO 639-3 standard, covering all known human languages.
  fr: Codes de langues tels que définis par la norme ISO 639-3, couvrant toutes les langues humaines connues.
  es: Códigos de idiomas según la norma ISO 639-3, que abarca todos los idiomas humanos conocidos.
standard:
  name: ISO 639-3
  uri: https://www.iso.org/iso-639-language-code
sync:
  source_url: https://iso639-3.sil.org/sites/iso639-3/files/downloads/iso-639-3.tab
  format: tsv
  last_synced: '2026-04-07'
same_standard_systems:
  - openspp
  - fhir_r4
external_values: true
external_equivalents:
  semic:
    label: "Language"
    uri: "http://publications.europa.eu/resource/authority/language"
    match: close
    vocabulary: "Core Public Event"
    note: "EU Language NAL uses ISO 639-1/2 (~180/500 codes). PublicSchema uses ISO 639-3 (~7,900 codes), the superset covering all known human languages. Every 639-1/2 code maps to a 639-3 code. 639-3 is necessary for minority, indigenous, and refugee-context languages that 639-1/2 does not cover."
