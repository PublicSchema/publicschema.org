id: Location
maturity: trial-use

definition:
  en: >
    A named geographic or administrative area, such as a region, district,
    commune, or village. Location captures where a household or event is
    situated within an administrative hierarchy, distinct from a street address.
  fr: >
    Une zone géographique ou administrative nommée, telle qu'une région,
    un district, une commune ou un village. La localisation précise où se
    situe un ménage ou un événement dans une hiérarchie administrative,
    distincte d'une adresse postale.
  es: >
    Un área geográfica o administrativa con nombre, como una región,
    distrito, municipio o aldea. La ubicación indica dónde se sitúa
    un hogar o evento dentro de una jerarquía administrativa, distinta
    de una dirección postal.

properties:
  - location_name
  - latitude
  - longitude
  - geometry
  - administrative_level
  - level_name
  - parent_location
  - geocodes

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Location"
    uri: "http://purl.org/dc/terms/Location"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC dc:Location is a generic spatial thing; ours is a hierarchical administrative node with level and parent"
  dci:
    label: "Place"
    uri: "https://schema.spdci.org/core/v1/data/Place"
    match: close
    vocabulary: "DCI Core"
    note: "Both are hierarchical named locations with coordinates; DCI uses contained_in_place/contains_place for hierarchy while PublicSchema uses parent_location and administrative_level"

convergence:
  system_count: 6
  total_systems: 6
