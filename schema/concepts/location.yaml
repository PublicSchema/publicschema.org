id: Location
maturity: trial-use

definition:
  en: >
    A named geographic or administrative area, such as a region, district,
    commune, or village. Location captures where a household or event is
    situated within an administrative hierarchy, distinct from a street address.
  fr: >
    Une zone geographique ou administrative nommee, telle qu'une region,
    un district, une commune ou un village. La localisation indique ou
    se situe un menage ou un evenement dans une hierarchie administrative,
    distinct d'une adresse postale.
  es: >
    Una area geografica o administrativa con nombre, como una region,
    distrito, municipio o aldea. La ubicacion indica donde se situa
    un hogar o evento dentro de una jerarquia administrativa, distinta
    de una direccion postal.

properties:
  - location_name
  - latitude
  - longitude
  - geometry
  - administrative_level
  - level_name
  - parent_location
  - geocodes

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Location"
    uri: "http://purl.org/dc/terms/Location"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC dc:Location is a generic spatial thing; ours is a hierarchical administrative node with level and parent"
  dci:
    label: "Place"
    uri: "https://schema.spdci.org/core/v1/data/Place"
    match: close
    vocabulary: "SPDCI Core"
    note: "Both are hierarchical named locations with coordinates; DCI uses contained_in_place/contains_place for hierarchy while PublicSchema uses parent_location and administrative_level"

convergence:
  system_count: 6
  total_systems: 6
