external_equivalents:
  dpv:
    label: "Consent Record"
    uri: "https://w3id.org/dpv#ConsentRecord"
    match: exact
    vocabulary: "W3C DPV v2"
    note: "W3C Data Privacy Vocabulary 2.0 defines dpv:ConsentRecord as a record of consent and provides predicates (hasDataSubject, hasDataController, hasPurpose, etc.) that align with our properties. Our ConsentRecord is the direct equivalent; ours adds field-workflow fields (signed_date, witnessed_by, collection_medium) that DPV does not name."
  fhir-r4:
    label: "Consent"
    uri: "http://hl7.org/fhir/StructureDefinition/Consent"
    match: close
    vocabulary: "FHIR R4"
    note: "FHIR R4 Consent is the canonical health-sector consent record. Scope is close but narrower: FHIR Consent is health-centric, single-controller, and does not model receipt-as-record-type. Our ConsentRecord generalises across domains; fields verified_by, verified_date map to FHIR verification, verificationDate."
  fhir-r5:
    label: "Consent"
    uri: "http://hl7.org/fhir/StructureDefinition/Consent"
    match: close
    vocabulary: "FHIR R5"
    note: "FHIR R5 revises Consent and introduces the separate Permission resource for controller-side authorization. Mapping is primarily to R5 Consent; our evidence_ref maps to sourceAttachment and verified_by / verified_date map to verification.verifiedWith / verificationDate."

convergence:
  system_count: 4
  total_systems: 6
  notes: >
    Consent record structure converges across OpenSPP (spp.consent.record),
    OpenIMIS insuree consent records, openCRVS permission tracking,
    GovStack Consent Building Block, W3C DPV, ISO/IEC TS 27560, and
    Kantara Consent Receipt v1.1. Variation is mainly in scope (single
    vs joint controller, digital vs paper workflow, consent-only vs
    full legal-basis coverage). This concept takes the broader scope;
    narrower profiles are available via external_equivalents on specific
    properties.
