id: ConsentRecord
label:
  en: Consent Record
  fr: Enregistrement de consentement
  es: Registro de consentimiento
maturity: draft

definition:
  en: >
    ConsentRecord documents the lawful basis for processing a data subject's
    personal data. Despite the name, consent is only one of six possible
    legal bases under GDPR Article 6(1); records with legal_basis other than
    consent still use this concept because the standards (W3C DPV, ISO/IEC
    TS 27560) converge on the name. Records are produced individually in
    office workflows and in bulk during community intake sessions; the
    schema does not distinguish these at v1.
  fr: >
    ConsentRecord documente la base juridique du traitement des données
    personnelles d'une personne concernée. Malgré son nom, le consentement
    n'est qu'une des six bases juridiques possibles au titre de l'article
    6, paragraphe 1, du RGPD; les enregistrements dont la base juridique
    n'est pas le consentement utilisent aussi ce concept parce que les
    normes (W3C DPV, ISO/IEC TS 27560) convergent sur ce nom. Les
    enregistrements sont produits individuellement dans les circuits de
    bureau et en masse lors des sessions d'enregistrement communautaire; le
    schéma ne distingue pas ces deux cas en v1.
  es: >
    ConsentRecord documenta la base jurídica del tratamiento de los
    datos personales de un interesado. A pesar de su nombre, el
    consentimiento es solo una de las seis bases jurídicas posibles en
    virtud del artículo 6, apartado 1, del RGPD; los registros cuya base
    jurídica no es el consentimiento también utilizan este concepto
    porque las normas (W3C DPV, ISO/IEC TS 27560) convergen en este
    nombre. Los registros se producen individualmente en los flujos de
    oficina y en masa durante las sesiones de captación comunitaria; el
    esquema no distingue ambos casos en v1.

