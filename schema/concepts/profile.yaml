id: Profile
label:
  en: Profile
  fr: Profil
  es: Perfil
maturity: draft
abstract: true

definition:
  en: >
    A point-in-time record of data collected about a subject using a
    defined instrument. Profile is the shared supertype for
    SocioEconomicProfile and FunctioningProfile within PublicSchema, and
    for additional profile subtypes in domain-specific schemas such as
    AidOps (schema.aidops.org). Each profile captures who was observed,
    when, using which instrument, under which administration mode, and
    by whom. A profile records the structured responses from a single
    administration, and may also carry outputs derived from those
    responses by applying the canonical scoring rule for the instrument.
    Non-canonical scoring, alternate thresholds, a different rule version,
    or recomputation after the canonical rule is revised, is captured as
    a ScoringEvent rather than written back to the profile.
  fr: >
    Un enregistrement ponctuel de données collectées sur un sujet à l'aide
    d'un instrument défini. Profile est le supertype partagé de
    SocioEconomicProfile et FunctioningProfile dans PublicSchema, et de
    sous-types supplémentaires dans des schémas spécifiques au domaine
    tels qu'AidOps (schema.aidops.org). Chaque profil consigne qui a été
    observé, quand, avec quel instrument, selon quel mode d'administration
    et par qui. Un profil enregistre les réponses structurées d'une
    administration unique et peut aussi porter les résultats dérivés de
    ces réponses en appliquant la règle de notation canonique de
    l'instrument. La notation non canonique, les seuils alternatifs, une
    version différente de la règle ou un recalcul après révision de la
    règle canonique sont consignés dans un ScoringEvent plutôt que
    réécrits sur le profil.
  es: >
    Un registro puntual de datos recopilados sobre un sujeto mediante un
    instrumento definido. Profile es el supertipo compartido de
    SocioEconomicProfile y FunctioningProfile en PublicSchema, y de
    subtipos adicionales en esquemas de dominio como AidOps
    (schema.aidops.org). Cada perfil consigna quién fue observado,
    cuándo, con qué instrumento, bajo qué modo de administración y por
    quién. Un perfil registra las respuestas estructuradas de una
    administración única, y también puede llevar resultados derivados
    de esas respuestas aplicando la regla de puntuación canónica del
    instrumento. La puntuación no canónica, los umbrales alternativos,
    una versión diferente de la regla o el recálculo tras la revisión
    de la regla canónica se registran como un ScoringEvent en lugar de
    reescribirse en el perfil.

properties:
  - subject
  - observation_date
  - performed_by
  - instrument_used
  - software_used
  - administration_mode
  - respondent
  - respondent_relationship
  - items_asked

subtypes: [SocioEconomicProfile, FunctioningProfile]
supertypes: [Event]

external_equivalents:
  fhir:
    label: "QuestionnaireResponse"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "FHIR QuestionnaireResponse is the canonical peer for a single administration of a data-collection instrument. Our Profile is abstract and splits by instrument family; FunctioningProfile and SocioEconomicProfile align most closely because they serialize as a single QuestionnaireResponse."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    Profile is a PublicSchema abstract supertype; no mapped system exposes a
    profile supertype by that name, so system_count is reported as 0/6 per
    the convention stated in design-principles.md section 3. FHIR models
    instrument administration as a first-class record (QuestionnaireResponse,
    Observation), which is the closest supertype-level analogue; the other
    five mapped cores (DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Core) flatten
    observation data into the subject record. The observation pattern is
    nonetheless how domain tools model this data outside MIS cores: DHS and
    MICS store responses as separate survey records, CommCare CMAM keeps
    nutrition measurements on a visit form, and Washington Group analytics
    tabulate from raw item responses, not Person flags. DCI's
    SocioEconomicProfile is the closest peer in social protection and names
    the pattern explicitly. Convergence evidence for the abstract sits with
    the concrete Profile subtypes (FunctioningProfile, SocioEconomicProfile,
    and domain-specific extensions in sibling schemas).
