external_equivalents:
  fhir:
    label: "QuestionnaireResponse (food security battery)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "Each FCS, rCSI, LCS, CARI, HDDS, FIES, MDD-W, MAHFP, or HHS administration serializes naturally as a QuestionnaireResponse whose Questionnaire is the corresponding WFP, FAO, or FANTA instrument definition. The composite CARI index is a derived result rather than a raw response, and is better represented by a FHIR RiskAssessment or Observation produced by a scoring step."
  dhis2:
    label: "DHIS2 FCS data elements"
    uri: "https://docs.dhis2.org/en/topics/metadata/global-health-data-sets.html"
    match: close
    vocabulary: "DHIS2 global health data sets"
    note: "DHIS2 implementations of household food security commonly carry FCS items as individual data elements in a tracked entity program, but FIES, LCS, and CARI are rarely modelled at item level."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    Only FHIR and DHIS2 represent an item-level food-security administration.
    OpenCRVS, OpenSPP, openIMIS, and DCI Social Registry do not carry food
    security survey items in core; national deployments that collect them
    (Kenya HSNP, Somalia Baxnaano, Ethiopia PSNP, Yemen food-security
    assessments) store them in separate humanitarian assessment modules
    whose shape matches this concept. The informing standards bodies are
    WFP VAM, FAO Voices of the Hungry, and FANTA rather than the v1 MIS
    core set; this convergence number understates the prevalence of the
    data because the v1 set does not include humanitarian survey platforms.
