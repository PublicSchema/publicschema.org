id: Party
maturity: trial-use

definition:
  en: >
    A person or organized group of persons that can be identified, enrolled in
    programs, and receive benefits or services. Party is the shared supertype
    for Person and Group, enabling references that accept either.
  fr: >
    Une personne ou un groupe organisé de personnes pouvant être identifié,
    inscrit dans des programmes et recevoir des prestations ou des services.
    Party est le supertype partagé pour Person et Group, permettant des
    références acceptant l'un ou l'autre.
  es: >
    Una persona o grupo organizado de personas que puede ser identificado,
    inscrito en programas y recibir beneficios o servicios. Party es el
    supertipo compartido para Person y Group, permitiendo referencias que
    aceptan cualquiera de los dos.

properties:
  - name
  - identifiers

subtypes: [Person, Group]
supertypes: []

external_equivalents:
  semic:
    label: "Agent"
    uri: "http://xmlns.com/foaf/0.1/Agent"
    match: close
    vocabulary: "Core Person"
    note: "SEMIC foaf:Agent includes software agents and any acting entity; ours is specifically persons and organized groups in social protection"

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    All mapped systems distinguish between individual and group-level records
    but share common identification and naming properties across both.
    OpenSPP models this explicitly as "Registrant."
