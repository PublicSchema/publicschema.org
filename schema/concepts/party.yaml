id: Party
label:
  en: Party
  fr: Partie
  es: Parte
maturity: candidate
abstract: true

definition:
  en: >
    A person or organized group of persons that can be identified, enrolled in
    programs, and receive benefits or services. Party is the shared supertype
    for Person and Group, enabling references that accept either.
  fr: >
    Une personne ou un groupe organisé de personnes pouvant être identifié,
    inscrit dans des programmes et recevoir des prestations ou des services.
    Party est le supertype commun de Person et Group, permettant de les
    désigner indifféremment dans une référence.
  es: >
    Una persona o grupo organizado de personas que puede ser identificado,
    inscrito en programas y recibir beneficios o servicios. Party es el
    supertipo compartido para Person y Group, que permite referencias que
    acepten cualquiera de los dos.

properties:
  - name
  - identifiers
  - identity_documents

subtypes: [Person, Group]
supertypes: []

external_equivalents:
  semic:
    label: "Person (Core Person)"
    uri: "http://www.w3.org/ns/person#Person"
    match: related
    vocabulary: "Core Person"
    note: "SEMIC Core Person covers the individual human. Party is the beneficiary-side supertype for persons and organized groups of persons (Household, Family, Farm) that can be enrolled in programs and receive services. The broader SEMIC/foaf:Agent vocabulary for acting entities maps to our Agent concept, not to Party."

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    All mapped systems distinguish between individual and group-level records
    but share common identification and naming properties across both.
    OpenSPP models this explicitly as "Registrant."
