id: Group
maturity: trial-use

definition:
  en: >
    An abstract collection of persons that serves as the base for concrete
    group types such as Household, Family, and Farm. Groups are linked to
    their members via GroupMembership records.
  fr: >
    Un regroupement abstrait de personnes qui sert de base aux types de
    groupes concrets tels que Menage, Famille et Exploitation agricole.
    Les groupes sont lies a leurs membres via des enregistrements
    GroupMembership.
  es: >
    Una coleccion abstracta de personas que sirve como base para tipos
    de grupos concretos como Hogar, Familia y Granja. Los grupos se
    vinculan a sus miembros mediante registros GroupMembership.

properties:
  - group_type
  - formation_date
  - member_count
  - memberships

supertypes: [Party]
subtypes: [Household, Family, Farm]

external_equivalents:
  dci:
    label: "Group"
    uri: "https://schema.spdci.org/core/v1/data/Group"
    match: close
    vocabulary: "SPDCI Core"
    note: "DCI Group embeds member lists and poverty scoring directly; PublicSchema separates membership into GroupMembership records and scoring into AssessmentEvent"

convergence:
  system_count: 5
  total_systems: 6
