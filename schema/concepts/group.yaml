id: Group
label:
  en: Group
  fr: Groupe
  es: Grupo
maturity: candidate
abstract: true
featured: true

definition:
  en: >
    An abstract collection of persons that serves as the base for concrete
    group types such as Household, Family, and Farm. Groups are linked to
    their members via membership links.
  fr: >
    Un regroupement abstrait de personnes qui sert de base aux types de
    groupes concrets tels que Ménage, Famille et Exploitation agricole.
    Les groupes sont liés à leurs membres via des liens d'appartenance.
  es: >
    Una colección abstracta de personas que sirve como base para tipos
    de grupos concretos como Hogar, Familia y Explotación Agrícola. Los
    grupos se vinculan a sus miembros a través de relaciones de
    pertenencia.

properties:
  - group_type
  - formation_date
  - member_count
  - memberships

supertypes: [Party]
subtypes: [Household, Family, Farm]

external_equivalents:
  dci:
    label: "Group"
    uri: "https://schema.spdci.org/core/v1/data/Group"
    match: close
    vocabulary: "DCI Core"
    note: "DCI Group embeds member lists and poverty scoring directly; PublicSchema separates membership into GroupMembership records and scoring into ScoringEvent"

convergence:
  system_count: 5
  total_systems: 6
