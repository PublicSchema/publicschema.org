id: Household
label:
  en: Household
  fr: Ménage
  es: Hogar
maturity: candidate
featured: true

definition:
  en: >
    A social and economic unit of one or more persons who share food and other
    essentials for living. The operational definition varies across countries and
    programs, combining criteria of co-residence, shared budget, shared cooking,
    kinship, and administrative registration.
  fr: >
    Une unité sociale et économique d'une ou plusieurs personnes qui partagent
    la nourriture et d'autres biens essentiels à la vie. La définition
    opérationnelle varie selon les pays et les programmes, combinant des critères
    de corésidence, de budget partagé, de cuisine commune, de parenté et
    d'enregistrement administratif.
  es: >
    Una unidad social y económica de una o más personas que comparten alimentos
    y otros elementos esenciales para la vida. La definición operacional varía
    según los países y programas, combinando criterios de corresidencia,
    presupuesto compartido, cocina común, parentesco y registro administrativo.

properties:
  - address
  - location
  - food_security_level

property_groups:
  - category: identity
    properties:
      - name
      - identifiers
      - identity_documents
  - category: administrative
    properties:
      - group_type
      - formation_date
      - member_count
      - memberships
  - category: location
    properties:
      - address
      - location
  - category: food_security
    properties:
      - food_security_level

supertypes: [Group]
subtypes: []

external_equivalents:
  semic:
    label: "N/A"
    match: none
    vocabulary: "Core Person"
    note: "SEMIC Core Person does not define a household concept. Residence-related data attaches to Person via address."
  dci:
    label: "N/A"
    match: none
    vocabulary: "DCI Core"
    note: "DCI does not define a standalone household entity. Household-like grouping is handled through Group with role-based membership."

convergence:
  system_count: 4
  total_systems: 6
  notes: >
    No OpenCRVS or standalone OpenIMIS match. Detailed point-in-time
    socio-economic and living-conditions data (dwelling, WASH, energy,
    assets, ICT, income source, settlement type) lives on
    SocioEconomicProfile records; Household keeps only identity, location,
    and a coarse food_security_level current-state summary. Practitioner
    review confirmed that operational social registries commonly read a
    current-state food-security flag off the household record even when
    the survey evidence is stored separately.
