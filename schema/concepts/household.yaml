id: Household
label:
  en: Household
  fr: Ménage
  es: Hogar
maturity: candidate

definition:
  en: >
    A social and economic unit of one or more persons who share food and other
    essentials for living. The operational definition varies across countries and
    programs, combining criteria of co-residence, shared budget, shared cooking,
    kinship, and administrative registration.
  fr: >
    Une unité sociale et économique d'une ou plusieurs personnes qui partagent
    la nourriture et d'autres biens essentiels à la vie. La définition
    opérationnelle varie selon les pays et les programmes, combinant des critères
    de corésidence, de budget partagé, de cuisine commune, de parenté et
    d'enregistrement administratif.
  es: >
    Una unidad social y económica de una o más personas que comparten alimentos
    y otros elementos esenciales para la vida. La definición operacional varía
    según los países y programas, combinando criterios de corresidencia,
    presupuesto compartido, cocina común, parentesco y registro administrativo.

properties:
  - address
  - location
  - dwelling_type
  - income_source
  - floor_material
  - wall_material
  - roof_material
  - water_source
  - water_service_level
  - sanitation_facility
  - sanitation_service_level
  - cooking_fuel
  - electricity_access
  - household_assets
  - ict_access
  - food_security_level

