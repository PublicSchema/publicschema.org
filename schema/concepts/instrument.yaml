external_equivalents:
  fhir:
    label: "Questionnaire"
    uri: "http://hl7.org/fhir/Questionnaire"
    match: close
    vocabulary: "FHIR R4"
    note: "FHIR Questionnaire is the canonical peer for a data-collection instrument; our Instrument also covers measurement protocols and screening forms beyond survey questionnaires"

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    Only FHIR carries a first-class instrument registry (Questionnaire).
    DHIS2, OpenCRVS, OpenSPP, openIMIS, and DCI Core do not catalog
    instruments. In practice, standards bodies publish the instruments
    themselves (Washington Group, UNICEF MICS, WHO, SMART), and adopters
    reference them by name and version. This concept gives those
    references a citable home so Profile records can declare exactly
    which tool and version produced them.
