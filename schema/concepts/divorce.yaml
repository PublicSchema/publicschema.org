id: Divorce
maturity: draft
domain: crvs

definition:
  en: >
    The dissolution of a valid marriage by judicial or administrative decree.
    Distinct from Annulment, which declares the marriage invalid from the
    outset.
  fr: >
    La dissolution d'un mariage valide par décision judiciaire ou
    administrative. Distincte de l'annulation, qui déclare le mariage nul
    dès l'origine.
  es: >
    La disolución de un matrimonio válido mediante sentencia judicial o
    resolución administrativa. Distinta de la Anulación, que declara el
    matrimonio nulo desde el origen.

properties: []

subtypes: []
supertypes: [MarriageTermination]

external_equivalents:
  opencrvs:
    label: "No v1 equivalent"
    match: none
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "Divorce registration is not modelled in OpenCRVS v1 core. No divorce registration entity exists."
