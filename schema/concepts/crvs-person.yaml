id: CRVSPerson
maturity: draft
domain: crvs

definition:
  en: >
    A temporal snapshot of a Person as observed at the time of a vital event.
    Carries the same demographic properties as Person, but frozen at event time
    rather than reflecting current values. Used wherever a vital event needs to
    record who a person was (occupation, residence, education, etc.) at the
    moment the event occurred.
  fr: >
    Un instantané temporel d'une Personne telle qu'observée au moment d'un
    événement d'état civil. Porte les mêmes propriétés démographiques que
    Personne, mais figées au moment de l'événement plutôt que reflétant les
    valeurs actuelles. Utilisé partout où un événement d'état civil doit
    enregistrer qui était une personne (profession, résidence, éducation,
    etc.) au moment où l'événement s'est produit.
  es: >
    Una instantánea temporal de una Persona tal como se observó en el momento
    de un evento vital. Lleva las mismas propiedades demográficas que Persona,
    pero congeladas en el momento del evento en lugar de reflejar valores
    actuales. Se utiliza en cualquier lugar donde un evento vital necesite
    registrar quién era una persona (ocupación, residencia, educación, etc.)
    en el momento en que ocurrió el evento.

properties:
  - person
  - nationality
  - occupation
  - education_level
  - marital_status
  - literacy
  - religion
  - ethnic_group
  - employment_status
  - status_in_employment
  - industry
  - place_of_usual_residence
  - age_at_event

subtypes: [Parent]
supertypes: []
