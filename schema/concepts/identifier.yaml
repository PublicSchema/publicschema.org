id: Identifier
label:
  en: Identifier
  fr: Identifiant
  es: Identificador
maturity: candidate
featured: true

definition:
  en: >
    A coded value assigned to an entity within an identification scheme.
    Identifiers disambiguate entities such as persons, groups, locations,
    administrative areas, or records within a specific registry or catalog.
    The identifier is the value and its scheme; documents that carry
    identifiers (passports, national ID cards, beneficiary cards) are
    modeled separately as IdentityDocument.
  fr: >
    Une valeur codée attribuée à une entité au sein d'un schéma
    d'identification. Les identifiants lèvent l'ambiguïté sur des entités
    telles que des personnes, des groupes, des lieux, des zones
    administratives ou des enregistrements dans un registre ou catalogue
    spécifique. L'identifiant est la valeur et son schéma; les documents
    qui portent des identifiants (passeports, cartes d'identité nationale,
    cartes de bénéficiaire) sont modélisés séparément comme IdentityDocument.
  es: >
    Un valor codificado asignado a una entidad dentro de un esquema de
    identificación. Los identificadores distinguen entidades como personas,
    grupos, ubicaciones, áreas administrativas o registros dentro de un
    registro o catálogo específico. El identificador es el valor y su
    esquema; los documentos que portan identificadores (pasaportes, tarjetas
    de identidad nacional, tarjetas de beneficiario) se modelan
    separadamente como IdentityDocument.

properties:
  - identifier_value
  - identifier_scheme_id
  - identifier_scheme_name
  - identifier_type

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Identifier"
    uri: "http://www.w3.org/ns/adms#Identifier"
    match: exact
    vocabulary: "ADMS"
    note: "ADMS Identifier is a generic notation-plus-scheme value, aligning with this Identifier. Document-level lifecycle metadata (issuer, issue date) is carried on IdentityDocument."
  dci:
    label: "Identifier"
    uri: "https://schema.spdci.org/core/v1/data/Identifier"
    match: exact
    vocabulary: "DCI Core"
    note: "DCI Identifier is also a (type, value) pair without document lifecycle fields."

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    All mapped systems carry coded values identifying persons, groups,
    or administrative areas, though most conflate the value with document
    metadata. After the split, Identifier covers only the value and scheme;
    the lifecycle concerns live on IdentityDocument.
