id: Identifier
maturity: trial-use

definition:
  en: >
    A unique alphanumeric code assigned to a party (person or group) by a
    system or authority, such as a national ID number, birth certificate
    number, household registration number, or program-assigned beneficiary
    code.
  fr: >
    Un code alphanumerique unique attribue a une partie (personne ou groupe)
    par un systeme ou une autorite, tel qu'un numero d'identite nationale,
    un numero d'acte de naissance, un numero d'enregistrement de menage ou
    un code beneficiaire attribue par un programme.
  es: >
    Un codigo alfanumerico unico asignado a una parte (persona o grupo)
    por un sistema o autoridad, como un numero de identidad nacional,
    numero de certificado de nacimiento, numero de registro de hogar o
    codigo de beneficiario asignado por un programa.

properties:
  - identifier_type
  - identifier_value
  - issuing_authority
  - issue_date
  - expiry_date
  - identifier_scheme_id
  - identifier_scheme_name
  - issuing_jurisdiction

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Identifier"
    uri: "http://www.w3.org/ns/adms#Identifier"
    match: exact
    vocabulary: "ADMS"
  dci:
    label: "Identifier"
    uri: "https://schema.spdci.org/core/v1/data/Identifier"
    match: close
    vocabulary: "DCI Core"
    note: "DCI Identifier has only type and value; PublicSchema adds credential lifecycle metadata (issuing authority, issue/expiry dates, scheme identifiers)"

convergence:
  system_count: 5
  total_systems: 6
  notes: >
    Present in 5 of 6 mapped systems. EBSI ELM and PID schemas informed
    additional scheme metadata properties (identifier_scheme_id,
    identifier_scheme_name, issuing_jurisdiction) not present in the
    original convergence systems.
