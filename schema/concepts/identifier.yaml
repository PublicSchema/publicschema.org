id: Identifier
maturity: trial-use

definition:
  en: >
    A unique alphanumeric code assigned to a party (person or group) by a
    system or authority, such as a national ID number, birth certificate
    number, household registration number, or program-assigned beneficiary
    code.
  fr: >
    Un code alphanumérique unique attribué à une partie (personne ou groupe)
    par un système ou une autorité, tel qu'un numéro d'identité nationale,
    un numéro d'acte de naissance, un numéro d'enregistrement de ménage ou
    un code bénéficiaire attribué par un programme.
  es: >
    Un código alfanumérico único asignado a una parte (persona o grupo)
    por un sistema o autoridad, como un número de identidad nacional,
    número de certificado de nacimiento, número de registro de hogar o
    código de beneficiario asignado por un programa.

properties:
  - identifier_type
  - identifier_value
  - issuing_authority
  - issue_date
  - expiry_date
  - identifier_scheme_id
  - identifier_scheme_name
  - issuing_jurisdiction

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Identifier"
    uri: "http://www.w3.org/ns/adms#Identifier"
    match: exact
    vocabulary: "ADMS"
  dci:
    label: "Identifier"
    uri: "https://schema.spdci.org/core/v1/data/Identifier"
    match: close
    vocabulary: "DCI Core"
    note: "DCI Identifier has only type and value; PublicSchema adds credential lifecycle metadata (issuing authority, issue/expiry dates, scheme identifiers)"

convergence:
  system_count: 5
  total_systems: 6
  notes: >
    Present in 5 of 6 mapped systems. EBSI ELM and PID schemas informed
    additional scheme metadata properties (identifier_scheme_id,
    identifier_scheme_name, issuing_jurisdiction) not present in the
    original convergence systems.
