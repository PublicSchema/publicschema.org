id: Birth
maturity: draft
domain: crvs

definition:
  en: >
    A live birth, meaning the complete expulsion or extraction of a product of
    conception from its mother, irrespective of duration of pregnancy, which
    after such separation breathes or shows any other evidence of life. Captures
    the child, the parents, and attributes used by civil registration and
    vital statistics (sex at birth, birth order, attendant, weight, place type).
  fr: >
    Une naissance vivante, c'est-à-dire l'expulsion ou l'extraction complète du
    produit de la conception hors du corps de la mère, indépendamment de la
    durée de la grossesse, et qui, après cette séparation, respire ou manifeste
    tout autre signe de vie. Recueille les données relatives à l'enfant, aux parents et aux attributs
    utilisés par l'état civil et les statistiques vitales (sexe à la
    naissance, ordre de naissance, personne ayant assisté à l'accouchement,
    poids, type de lieu).
  es: >
    Un nacimiento vivo, es decir, la expulsión o extracción completa del
    producto de la concepción fuera del cuerpo de la madre, independientemente
    de la duración del embarazo, que tras dicha separación respira o muestra
    cualquier otra señal de vida. Recoge al niño o niña, a los padres y los
    atributos utilizados por el registro civil y las estadísticas vitales
    (sexo al nacer, orden de nacimiento, persona que atendió, peso, tipo de
    lugar).

properties:
  - child
  - parents
  - sex_at_birth
  - nationality_at_birth
  - place_type
  - birth_type
  - birth_order
  - weight_at_birth
  - attendant_at_birth

subtypes: []
supertypes: [VitalEvent]

external_equivalents:
  opencrvs:
    label: "BirthRegistration"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#BirthRegistration"
    match: broad
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS BirthRegistration bundles the event, the civil status record, and the workflow into one type. Broader scope than PublicSchema Birth; see docs/opencrvs-decomposition.md."
