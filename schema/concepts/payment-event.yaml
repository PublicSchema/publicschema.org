id: PaymentEvent
label:
  en: Payment Event
  fr: Événement de paiement
  es: Evento de pago
maturity: candidate
featured: true

definition:
  en: >
    A record of a direct monetary transfer from a program to a beneficiary.
    Covers bank transfer, mobile money, cash, agent network, and prepaid card
    channels. Multiple payment events may fulfill a single entitlement (e.g.,
    split payments, multi-tranche disbursements, or retries after failure).
  fr: >
    Un enregistrement d'un transfert monétaire direct d'un programme vers un
    bénéficiaire. Couvre les canaux suivants : virement bancaire, argent mobile,
    espèces, réseau d'agents et carte prépayée. Plusieurs événements de
    paiement peuvent honorer un seul droit (par ex., paiements fractionnés,
    versements à tranches multiples ou nouvelles tentatives après échec).
  es: >
    Un registro de una transferencia monetaria directa de un programa a un
    beneficiario. Cubre los canales de transferencia bancaria, dinero móvil,
    efectivo, red de agentes y tarjeta prepaga. Varios eventos de pago pueden
    cumplir un solo derecho (por ej., pagos fraccionados, desembolsos en
    múltiples cuotas o reintentos tras un error).

properties:
  - entitlement_ref
  - enrollment_ref
  - recipient
  - payment_amount
  - payment_currency
  - payment_date
  - payment_status
  - delivery_channel
  - failure_reason
  - is_reconciled

subtypes: []
supertypes: [Event]

external_equivalents:
  dci:
    label: "N/A"
    match: none
    vocabulary: "DCI Core"
    note: "DCI does not define a standalone payment event entity. Payment data is tracked as properties on Beneficiary (disbursement history)."

convergence:
  system_count: 6
  total_systems: 6
