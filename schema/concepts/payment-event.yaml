id: PaymentEvent
maturity: draft

definition:
  en: >
    A record of a direct monetary transfer from a program to a beneficiary.
    Covers bank transfer, mobile money, cash, agent network, and prepaid card
    channels. Multiple payment events may fulfill a single entitlement (e.g.,
    split payments, multi-tranche disbursements, or retries after failure).
  fr: >
    Un enregistrement d'un transfert monetaire direct d'un programme vers un
    beneficiaire. Couvre les canaux de virement bancaire, monnaie mobile,
    especes, reseau d'agents et carte prepayee. Plusieurs evenements de
    paiement peuvent remplir un seul droit (par ex., paiements fractionnes,
    versements a tranches multiples ou nouvelles tentatives apres echec).
  es: >
    Un registro de una transferencia monetaria directa de un programa a un
    beneficiario. Cubre los canales de transferencia bancaria, dinero movil,
    efectivo, red de agentes y tarjeta prepaga. Varios eventos de pago pueden
    cumplir un solo derecho (por ej., pagos fraccionados, desembolsos en
    multiples cuotas o reintentos tras fallo).

properties:
  - entitlement_ref
  - enrollment_ref
  - recipient
  - payment_amount
  - payment_currency
  - payment_date
  - payment_status
  - delivery_channel
  - transaction_reference
  - failure_reason

subtypes: []
supertypes: []

convergence:
  system_count: 6
  total_systems: 6
