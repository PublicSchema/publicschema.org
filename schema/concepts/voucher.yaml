id: Voucher
maturity: draft

definition:
  en: >
    A redeemable instrument issued to a beneficiary as fulfillment of a
    benefit entitlement. A voucher has a distinct lifecycle: creation,
    issuance, redemption, expiry, or cancellation. It may be electronic
    (digital code, SMS, QR) or paper. Multiple vouchers may fulfill a
    single entitlement, and a voucher's face value may differ from the
    entitlement amount.
  fr: >
    Un instrument échangeable délivré à un bénéficiaire en exécution d'un
    droit à prestation. Un bon a un cycle de vie propre : création,
    émission, échange, expiration ou annulation. Il peut être électronique
    (code numérique, SMS, QR) ou papier. Plusieurs bons peuvent honorer un
    seul droit, et la valeur nominale d'un bon peut différer du montant
    du droit.
  es: >
    Un instrumento canjeable emitido a un beneficiario como cumplimiento
    de un derecho a prestación. Un vale tiene un ciclo de vida distinto:
    creación, emisión, canje, vencimiento o cancelación. Puede ser
    electrónico (código digital, SMS, QR) o en papel. Varios vales pueden
    cumplir un solo derecho, y el valor nominal de un vale puede diferir
    del monto del derecho.

properties:
  - entitlement_ref
  - issued_to
  - redeemable_by
