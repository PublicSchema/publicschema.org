subtypes: []
supertypes: []

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    None of the six currently mapped SP systems model vouchers as standalone
    entities. GovStack Payments Building Block (a specification, not a mapped
    system) models vouchers as first-class entities with a full lifecycle API.
    Voucher-based delivery is common in humanitarian programs (WFP SCOPE,
    UNICEF RapidPro). Expect gap-heavy SSSOM mappings initially.
