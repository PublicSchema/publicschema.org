id: GroupMembership
label:
  en: Group Membership
  fr: Appartenance à un groupe
  es: Membresía de grupo
maturity: trial-use

definition:
  en: >
    The link between a Person and a Group, carrying the role the person
    plays within that group (such as head, spouse, or dependent). This
    link allows a person to belong to multiple groups at the same time.
  fr: >
    Le lien entre une personne et un groupe, indiquant le rôle que la
    personne joue au sein de ce groupe (tel que chef de groupe, conjoint
    ou dépendant). Ce lien permet à une personne d'appartenir à plusieurs
    groupes simultanément.
  es: >
    El vínculo entre una persona y un grupo, que indica el rol que la
    persona desempeña dentro de ese grupo (como jefe, cónyuge o
    dependiente). Este vínculo permite que una persona pertenezca a
    varios grupos al mismo tiempo.

properties:
  - person
  - group
  - role
  - start_date
  - end_date
  - is_active

supertypes: []
subtypes: []

external_equivalents:
  dci:
    label: "Member"
    uri: "https://schema.spdci.org/core/v1/data/Member"
    match: broad
    vocabulary: "DCI Core"
    note: "DCI Member conflates group membership with an extended person profile (demographics, disability, employment); PublicSchema separates the join (GroupMembership) from the person record (Person)"

convergence:
  system_count: 5
  total_systems: 6
