id: Death
maturity: draft
domain: crvs

definition:
  en: >
    The permanent disappearance of all evidence of life at any time after a
    live birth has taken place. Captures the deceased person, the cause and
    manner of death, the method used to ascertain cause, and the medical
    certifier. Aligned with the WHO definition and the ICD structure for
    cause-of-death classification.
  fr: >
    La disparition permanente de toute trace de vie à un moment quelconque
    après la naissance vivante. Saisit la personne décédée, la cause et la
    manière du décès, la méthode utilisée pour déterminer la cause et le
    certificateur médical. Aligné sur la définition de l'OMS et la structure
    CIM pour la classification des causes de décès.
  es: >
    La desaparición permanente de toda evidencia de vida en cualquier momento
    tras haber ocurrido un nacimiento vivo. Captura a la persona fallecida,
    la causa y la manera de la defunción, el método utilizado para determinar
    la causa y el certificador médico. Alineado con la definición de la OMS
    y la estructura CIE para la clasificación de causas de defunción.

properties:
  - deceased
  - place_of_usual_residence
  - place_type
  - cause_of_death
  - cause_of_death_code
  - cause_of_death_coding_system
  - manner_of_death
  - cause_of_death_method
  - medical_certifier

subtypes: []
supertypes: [VitalEvent]

external_equivalents:
  opencrvs:
    label: "DeathRegistration"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#DeathRegistration"
    match: broad
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "DeathRegistration follows the same bundling pattern: event, civil status record, and workflow in one type. It also carries cause-of-death fields that sit directly on Death in PublicSchema."
