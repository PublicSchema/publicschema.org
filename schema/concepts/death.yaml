id: Death
maturity: candidate
featured: true
domain: crvs
label:
  en: Death
  fr: Décès
  es: Defunción

definition:
  en: >
    The permanent disappearance of all evidence of life at any time after a
    live birth has taken place. Captures the deceased person, the cause and
    manner of death, the method used to ascertain cause, and the medical
    certifier. Aligned with the WHO definition and the ICD structure for
    cause-of-death classification.
  fr: >
    La disparition permanente de toute trace de vie à un moment quelconque
    après la naissance vivante. Recueille les données relatives à la personne décédée, à la cause et à la
    manière du décès, à la méthode utilisée pour déterminer la cause et au
    certificateur médical. Conforme à la définition de l'OMS et à la
    structure de la CIM pour la classification des causes de décès.
  es: >
    La desaparición permanente de toda manifestación de vida en cualquier
    momento tras haber ocurrido un nacimiento vivo. Recoge a la persona
    fallecida, la causa y la manera de la defunción, el método utilizado para
    determinar la causa y el certificador médico. Alineado con la definición
    de la OMS y la estructura CIE para la clasificación de causas de
    defunción.

properties:
  - deceased
  - place_type
  - cause_of_death
  - cause_of_death_code
  - cause_of_death_coding_system
  - manner_of_death
  - cause_of_death_method
  - medical_certifier

subtypes: []
supertypes: [crvs/VitalEvent]

external_equivalents:
  opencrvs:
    label: "EventDocument (type='death', country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent"
    match: broad
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 core, a death is an EventDocument whose type string is the country-configured death event id. All death-specific fields (deceased name, cause of death, manner of death, medical certifier) live in EventConfig.declaration. Farajaland's deathEvent defines the reference implementation."
