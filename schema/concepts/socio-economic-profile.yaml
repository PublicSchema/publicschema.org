  - floor_material
  - wall_material
  - roof_material
  - water_source
  - water_service_level
  - sanitation_facility
  - sanitation_service_level
  - cooking_fuel
  - electricity_access
  - household_assets
  - ict_access
  - income_source
  - settlement_type
  - food_security_level

