external_equivalents:
  dci:
    label: "SocioEconomicProfile"
    uri: "https://schema.spdci.org/extensions/social-registries/v1/data/SocioEconomicProfile"
    match: close
    vocabulary: "DCI Social Registry"
    note: "Direct peer; DCI defines a socio-economic profile as a typed addition on the social registry side"

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    DCI Social Registry is the only v1 system that names this concept
    directly. OpenSPP, OpenCRVS, and openIMIS do not carry socio-economic
    survey data in core; where national deployments collect it (Cadastro
    Unico, Listahanan, Kenya SR-NIS, Indonesia DTKS, Turkiye ISAS), it lives
    in a separate registration-survey module whose shape matches this
    concept even when the name differs. FHIR can serialize these as a
    QuestionnaireResponse for a PMT or registration questionnaire.
    Household retains food_security_level as a current-state summary;
    survey-collected dwelling, WASH, energy, assets, ICT, income, and
    settlement data belong here.
