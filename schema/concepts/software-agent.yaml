id: SoftwareAgent
maturity: draft
label:
  en: Software Agent
  fr: Agent logiciel
  es: Agente de software

definition:
  en: >
    A software product or system that performed a step in a delivery
    process, such as a scoring engine that computed a proxy means test
    score or a rule engine that evaluated eligibility. SoftwareAgent
    records the identity and version of the software so that a result
    can be reproduced or audited later. SoftwareAgent is a subtype of
    Agent, alongside Person and Organization. It is distinct from the
    Person or Organization accountable for the action (recorded in
    properties such as performed_by or evaluator) and from an
    Instrument (the questionnaire or measurement tool administered to
    a subject).
  fr: >
    Un produit ou système logiciel ayant effectué une étape dans un
    processus de prestation, par exemple un moteur de notation qui a
    calculé un score de test de substitution des ressources ou un
    moteur de règles qui a évalué l'admissibilité. SoftwareAgent
    enregistre l'identité et la version du logiciel afin qu'un résultat
    puisse être reproduit ou audité ultérieurement. SoftwareAgent est
    un sous-type d'Agent, au même titre que Person et Organization. Il
    est distinct de la Person ou de l'Organization responsable de
    l'action (consignée dans des propriétés comme performed_by ou
    evaluator) et d'un Instrument (le questionnaire ou l'outil de
    mesure administré à un sujet).
  es: >
    Un producto o sistema de software que realizó un paso en un proceso
    de prestación, por ejemplo un motor de puntuación que calculó una
    puntuación de prueba proxy de medios de vida o un motor de reglas
    que evaluó la elegibilidad. SoftwareAgent registra la identidad y
    la versión del software para que un resultado pueda reproducirse
    o auditarse posteriormente. SoftwareAgent es un subtipo de Agent,
    junto con Person y Organization. Es distinto de la Person u
    Organization responsable de la acción (registrada en propiedades
    como performed_by o evaluator) y de un Instrument (el cuestionario
    o la herramienta de medición administrada a un sujeto).

properties:
  - name
  - version
  - publisher
  - publication_url

subtypes: []
supertypes: [Agent]

external_equivalents:
  prov:
    label: "SoftwareAgent"
    uri: "http://www.w3.org/ns/prov#SoftwareAgent"
    match: exact
    vocabulary: "PROV-O"
    note: "Direct W3C PROV-O equivalent: a software agent that played a role in an activity. Our SoftwareAgent is scoped to recording the software that acted within a public delivery process."
  foaf:
    label: "Agent"
    uri: "http://xmlns.com/foaf/0.1/Agent"
    match: broad
    vocabulary: "FOAF"
    note: "foaf:Agent is the broad supertype covering persons, organisations, and software. SoftwareAgent is narrower: software specifically. Our Agent concept is the local peer for foaf:Agent and is the shared supertype of Person, Organization, and SoftwareAgent."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    No mapped system currently models scoring engines or rule engines as
    structured entities. Software identity is typically left implicit or
    stored as a free-text log entry, which makes audit and reproducibility
    difficult.
