id: Grievance
maturity: candidate
featured: true
domain: sp
label:
  en: Grievance
  fr: Réclamation
  es: Reclamación

definition:
  en: >
    A record of a complaint, appeal, correction request, or misconduct
    allegation raised through a program's grievance redress mechanism.
    It captures formal issues about eligibility, enrollment, payments,
    service delivery, or program conduct.
  fr: >
    Un enregistrement d'une plainte, d'un recours, d'une demande de correction
    ou d'une allégation de manquement professionnel soulevé dans le cadre du
    mécanisme de recours d'un programme. Il capture des problèmes formels liés
    à l'admissibilité, à l'inscription, aux paiements, à la prestation des
    services ou à la conduite du programme.
  es: >
    Un registro de una queja, recurso, solicitud de corrección o alegación de
    mala conducta planteada a través del mecanismo de reclamaciones de un
    programa. Captura problemas formales sobre elegibilidad, inscripción,
    pagos, prestación de servicios o conducta del programa.

properties:
  - complainant
  - grievance_subject
  - grievance_type
  - grievance_status
  - submission_date
  - resolution_date

subtypes: []
supertypes: [Event]

