id: Alert
maturity: draft

definition:
  en: >
    A public warning or notification about an event that may require
    awareness or action. Modeled after the OASIS Common Alerting Protocol
    (CAP v1.2), an alert carries the event type, urgency, severity, and
    certainty along with geographic scope and recommended response.
  fr: >
    Un avertissement public ou une notification concernant un evenement
    pouvant necessiter une prise de conscience ou une action. Inspire du
    protocole commun d'alerte de l'OASIS (CAP v1.2), une alerte porte
    le type d'evenement, l'urgence, la gravite et la certitude ainsi que
    la portee geographique et la reponse recommandee.
  es: >
    Una advertencia publica o notificacion sobre un evento que puede
    requerir atencion o accion. Modelado segun el Protocolo Comun de
    Alertas de OASIS (CAP v1.2), una alerta lleva el tipo de evento,
    urgencia, gravedad y certeza junto con el alcance geografico y la
    respuesta recomendada.

properties:
  # Identity
  - identifiers
  - sender
  - sent_at
  # Lifecycle
  - alert_status
  - alert_message_type
  - alert_scope
  - supersedes
  # Event classification
  - alert_category
  - event_name
  - alert_urgency
  - alert_severity
  - alert_certainty
  # Recommended response
  - alert_response_type
  # Content
  - headline
  - alert_description
  - instruction
  - info_url
  # Temporal
  - effective_at
  - onset_at
  - expires_at
  # Geographic scope
  - affected_areas

supertypes: []
subtypes: []
