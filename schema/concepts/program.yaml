id: Program
maturity: draft
domain: sp
label:
  en: Program
  fr: Programme
  es: Programa

definition:
  en: >
    A government or institutional social protection intervention that provides
    benefits to eligible individuals or households based on defined criteria.
    A program has a name, implementing agency, targeting approach, and coverage
    area.
  fr: >
    Une intervention gouvernementale ou institutionnelle de protection sociale
    qui fournit des prestations aux individus ou aux ménages admissibles
    selon des critères définis. Un programme a un nom, une agence de mise en oeuvre,
    une approche de ciblage et une zone de couverture.
  es: >
    Una intervención gubernamental o institucional de protección social que
    proporciona beneficios a individuos u hogares elegibles según criterios
    definidos. Un programa tiene un nombre, una agencia implementadora, un
    enfoque de focalización y un área de cobertura.

properties:
  - name
  - implementing_agency
  - coverage_area
  - targeting_approach
  - conditionality_type
  - start_date
  - end_date

subtypes: []
supertypes: []

external_equivalents:
  dci:
    label: "Programme"
    uri: "https://schema.spdci.org/extensions/ibr/v1/Programme"
    match: close
    vocabulary: "DCI IBR"
    note: "Both describe a social protection program; DCI emphasizes benefit modalities and institutional classification while PublicSchema emphasizes coverage area and targeting approach"

convergence:
