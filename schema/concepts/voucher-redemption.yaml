id: VoucherRedemption
maturity: draft

definition:
  en: >
    A record of a single redemption transaction against a voucher. Each
    VoucherRedemption captures one visit to a vendor or agent where part or
    all of a voucher's value or entitled commodities were collected. For
    single-use vouchers, there is one VoucherRedemption. For incremental
    redemption (common in WFP value voucher programs), multiple
    VoucherRedemption records track each visit.
  fr: >
    Un enregistrement d'une transaction de canje unique contre un bon.
    Chaque VoucherRedemption capture une visite chez un vendeur ou agent
    ou une partie ou la totalite de la valeur du bon ou des produits
    auxquels il donne droit a ete collectee. Pour les bons a usage unique,
    il y a un seul VoucherRedemption. Pour le canje incremental (courant
    dans les programmes de bons de valeur du PAM), plusieurs
    enregistrements VoucherRedemption suivent chaque visite.
  es: >
    Un registro de una transaccion de canje unica contra un vale. Cada
    VoucherRedemption captura una visita a un vendedor o agente donde se
    recogio parte o la totalidad del valor del vale o de los productos a
    los que da derecho. Para vales de uso unico, hay un solo
    VoucherRedemption. Para el canje incremental (comun en los programas
    de vales de valor del PMA), multiples registros VoucherRedemption
    rastrean cada visita.

properties:
  - voucher_ref
  - redemption_date
  - redeemed_by
  - redemption_agent
  - amount
  - currency
  - items

subtypes: []
supertypes: []

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    No direct analog in the six mapped SP systems. The GovStack Payments
    Building Block models voucher redemption as an API operation but not
    as a standalone entity. WFP SCOPE tracks individual vendor transactions
    against value vouchers, which is the closest real-world pattern.
