id: Event
label:
  en: Event
  fr: Événement
  es: Evento
maturity: normative
abstract: true

definition:
  en: >
    Something that happens at a specific time or over a bounded period within
    a delivery system. Event is the shared supertype for records that capture
    occurrences (assessments, decisions, payments, deliveries, referrals, etc.),
    as distinct from standing entities like persons, groups, or programs.
  fr: >
    Quelque chose qui se produit à un moment précis ou sur une période
    délimitée au sein d'un système de prestation. Event est le supertype
    partagé pour les enregistrements qui capturent des occurrences
    (évaluations, décisions, paiements, remises de prestations, orientations, etc.),
    distincts des entités permanentes comme les personnes, les groupes ou
    les programmes.
  es: >
    Algo que ocurre en un momento específico o durante un período delimitado
    dentro de un sistema de prestación. Event es el supertipo compartido para
    los registros que capturan ocurrencias (evaluaciones, decisiones, pagos,
    entregas, derivaciones, etc.), distintos de las entidades permanentes
    como personas, grupos o programas.

properties:
  - identifiers

subtypes: [sp/EligibilityDecision, sp/Enrollment, sp/Grievance, HazardEvent, InKindDelivery, PaymentEvent, Profile, sp/Referral, ScoringEvent, crvs/VitalEvent, VoucherRedemption]
supertypes: []

external_equivalents:
  semic:
    label: "N/A"
    match: none
    vocabulary: "Core Vocabularies"
    note: "SEMIC Core Vocabularies do not define a generic event supertype. Domain-specific events are modeled directly."
  dci:
    label: "N/A"
    match: none
    vocabulary: "DCI Core"
    note: "DCI does not define a generic event supertype. Timestamped occurrences are modeled as properties on domain entities."

convergence:
  system_count: 0
  total_systems: 6
  notes: >
    Event is a PublicSchema abstract supertype; no mapped system exposes an
    event supertype by that name, so system_count is reported as 0/6 per the
    convention stated in design-principles.md section 3. All six systems
    nonetheless model timestamped occurrence records (payments, assessments,
    decisions, referrals) that map to concrete Event subtypes, and those
    subtypes carry their own convergence evidence.
