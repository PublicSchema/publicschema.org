id: Event
maturity: trial-use

definition:
  en: >
    Something that happens at a specific time or over a bounded period within
    a delivery system. Event is the shared supertype for records that capture
    occurrences (assessments, decisions, payments, deliveries, referrals, etc.),
    as distinct from standing entities like persons, groups, or programs.
  fr: >
    Quelque chose qui se produit à un moment précis ou sur une période
    délimitée au sein d'un système de prestation. Event est le supertype
    partagé pour les enregistrements qui capturent des occurrences
    (évaluations, décisions, paiements, livraisons, orientations, etc.),
    distincts des entités permanentes comme les personnes, les groupes ou
    les programmes.
  es: >
    Algo que ocurre en un momento específico o durante un período delimitado
    dentro de un sistema de prestación. Event es el supertipo compartido para
    los registros que capturan ocurrencias (evaluaciones, decisiones, pagos,
    entregas, derivaciones, etc.), distintos de las entidades permanentes
    como personas, grupos o programas.

properties:
  - identifiers

subtypes: [AssessmentEvent, EligibilityDecision, HazardEvent, InKindDelivery, PaymentEvent, Referral, VoucherRedemption]
supertypes: []

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    Event is a PublicSchema abstraction; no mapped system has an explicit
    event supertype. All six systems model timestamped occurrence records
    (payments, assessments, decisions, referrals) that correspond to Event
    subtypes.
