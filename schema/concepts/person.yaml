id: Person
label:
  en: Person
  fr: Personne
  es: Persona
maturity: candidate

definition:
  en: >
    The unique individual human being who is a subject of record within a
    social protection system. Person is the persistent, indivisible unit of
    identity in registries; operational statuses such as Registrant,
    Applicant, or Beneficiary are transient roles defined by the person's
    relationship to a specific Program, not properties of the person themselves.
  fr: >
    L'individu unique qui fait l'objet d'un enregistrement dans un
    système de protection sociale. La personne est l'unité indivisible
    et persistante d'identité dans les registres. Les statuts
    opérationnels tels que Registrant, demandeur ou bénéficiaire sont
    des rôles transitoires définis par la relation de la personne à un
    programme spécifique.
  es: >
    El individuo único que es sujeto de registro en un sistema de
    protección social. La persona es la unidad indivisible y persistente
    de identidad en los registros; los estados operacionales como
    inscrito, solicitante o beneficiario son roles transitorios definidos
    por la relación de la persona con un programa específico.

