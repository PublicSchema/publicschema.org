external_equivalents:
  semic:
    label: "Person"
    uri: "http://www.w3.org/ns/person#Person"
    match: exact
    vocabulary: "Core Person"
  dci:
    label: "Person"
    uri: "https://schema.spdci.org/core/v1/data/Person"
    match: close
    vocabulary: "DCI Core"
    note: "DCI Person carries only basic demographics (name, sex, birth/death dates, contact); attributes like marital status, education, and occupation live on DCI Member instead"

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    Universal across all 6 mapped systems. The most consistently represented
    concept in social protection delivery systems. All systems maintain a
    person-level record as the primary unit of identity. Detailed
    point-in-time functioning and anthropometric observations live on
    FunctioningProfile and AnthropometricProfile records; Person keeps only
    a coarse current-state summary (functioning_status, nutrition_status)
    for targeting and reporting workflows. Practitioner review confirmed
    this hybrid matches operational systems such as UNHCR proGres Specific
    Needs, Brazil Cadastro Unico, and Philippines Listahanan.
