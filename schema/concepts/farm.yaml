id: Farm
maturity: draft

definition:
  en: >
    An organizational and operating unit of agricultural production under single
    management. Farm records appear across agricultural registries, land
    administration, social protection, and climate adaptation programs.
  fr: >
    Une unité organisationnelle et opérationnelle de production agricole sous
    gestion unique. Les données sur les exploitations agricoles apparaissent
    dans les registres agricoles, l'administration foncière, la protection
    sociale et les programmes d'adaptation climatique.
  es: >
    Una unidad organizativa y operativa de producción agrícola bajo gestión
    única. Los registros de explotaciones agrícolas aparecen en registros
    agrícolas, administración de tierras, protección social y programas de
    adaptación climática.

properties:
  - farm_area_hectares
  - primary_crop
  - location

supertypes: [Group]
subtypes: []

convergence:
  system_count: 2
  total_systems: 6
  notes: "Low coverage. Only DHIS2 (workaround) and OpenSPP have farm data models."
