id: Address
label:
  en: Address
  fr: Adresse
  es: Dirección
maturity: normative

definition:
  en: >
    A structured physical or postal location used to reach a person,
    household, or organization. Addresses combine spatial and administrative
    components such as street, settlement, district, and postal code.
  fr: >
    Un emplacement physique ou postal structuré, utilisé pour joindre une
    personne, un ménage ou une organisation. Les adresses combinent des
    composantes spatiales et administratives telles que la rue, la localité,
    le district et le code postal.
  es: >
    Una ubicación física o postal estructurada utilizada para contactar
    a una persona, hogar u organización. Las direcciones combinan
    componentes espaciales y administrativos como calle, localidad,
    distrito y código postal.

properties:
  - full_address
  - street_address
  - house_number
  - building_name
  - address_area
  - city
  - administrative_area
  - postal_code
  - country
  - location

property_groups:
  - category: location
    properties:
      - full_address
      - street_address
      - house_number
      - building_name
  - category: administrative
    properties:
      - address_area
      - city
      - administrative_area
      - postal_code
      - country
      - location

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Address"
    uri: "http://www.w3.org/ns/locn#Address"
    match: exact
    vocabulary: "Core Location"
  dci:
    label: "Address"
    uri: "https://schema.spdci.org/core/v1/data/Address"
    match: close
    vocabulary: "DCI Core"
    note: "Same concept, different property decomposition; DCI uses address_line_1/2 while PublicSchema decomposes into street, house number, and building name"

convergence:
  system_count: 5
  total_systems: 6
  notes: >
    Present in 5 of 6 mapped systems. EBSI PID and PDA1 schemas informed
    additional decomposition properties (house_number, building_name) not
    present in the original convergence systems.
