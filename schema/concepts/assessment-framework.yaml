id: AssessmentFramework
maturity: draft
domain: sp
label:
  en: Assessment Framework
  fr: "Cadre d'évaluation"
  es: Marco de evaluación

definition:
  en: >
    A persistent set of rules, formulas, or criteria used to process subject
    data into a welfare profile or score. Assessment frameworks include proxy
    means tests, community scorecards, and composite welfare indices.
  fr: >
    Un ensemble persistant de règles, de formules ou de critères utilisés pour
    traiter les données d'un sujet afin de produire un profil ou un score de
    bien-être. Les cadres d'évaluation comprennent les tests de substitution des
    ressources (proxy means tests), les cartes de performance communautaires
    et les indices composites de bien-être.
  es: >
    Un conjunto persistente de reglas, fórmulas o criterios utilizados para
    procesar los datos de un sujeto y generar un perfil o puntuación de
    bienestar. Los marcos de evaluación incluyen pruebas proxy de medios de vida,
    tarjetas de calificación comunitarias e índices compuestos de bienestar.

properties:
  - name
  - scoring_method
  - data_sources
  - cutoff_score

subtypes: []
supertypes: []

