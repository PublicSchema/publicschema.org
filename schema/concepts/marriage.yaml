id: Marriage
maturity: candidate
featured: true
domain: crvs
label:
  en: Marriage
  fr: Mariage
  es: Matrimonio

definition:
  en: >
    The legal union of two persons under the applicable law. Captures the two
    parties, witnesses, and the type of marriage (civil, religious, customary,
    common law). Treated as a vital event rather than a standing relationship,
    since what is being registered is the occurrence that creates legal
    spousal status.
  fr: >
    L'union légale de deux personnes selon la loi applicable. Saisit les deux
    parties, les témoins et le type de mariage (civil, religieux, coutumier,
    de fait). Traité comme un événement d'état civil plutôt que comme une
    relation permanente, car ce qui est enregistré est l'événement qui crée
    le statut juridique de conjoint.
  es: >
    La unión legal de dos personas según la ley aplicable. Captura a las dos
    partes, los testigos y el tipo de matrimonio (civil, religioso,
    consuetudinario, de hecho). Tratada como un evento vital y no como una
    relación permanente, ya que lo que se registra es el suceso que crea el
    estatus jurídico de cónyuge.

properties:
  - party_1
  - party_2
  - witnesses
  - type_of_marriage

subtypes: []
supertypes: [crvs/VitalEvent]

external_equivalents:
  opencrvs:
    label: "EventDocument (type='marriage', country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event"
    match: broad
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 core, a marriage is an EventDocument whose type string is the country-configured marriage event id (Farajaland Event enum defines Event.Marriage='marriage'). All marriage-specific fields live in EventConfig.declaration. No full marriage EventConfig is present in the Farajaland reference clone; the Event enum confirms the convention."
