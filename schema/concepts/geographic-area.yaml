id: GeographicArea
maturity: draft

definition:
  en: >
    A defined geographic region described by boundary geometry, administrative
    codes, or named locations. Used to specify the spatial extent of alerts,
    program coverage, and other location-bounded concepts.
  fr: >
    Une région géographique définie par une géométrie de limites, des codes
    administratifs ou des lieux nommés. Utilisée pour spécifier l'étendue
    spatiale des alertes, de la couverture des programmes et d'autres
    concepts liés à un lieu.
  es: >
    Una región geográfica definida por geometría de límites, códigos
    administrativos o ubicaciones con nombre. Se utiliza para especificar
    la extensión espacial de alertas, cobertura de programas y otros
    conceptos vinculados a una ubicación.

properties:
  - area_description
  - geometry
  - geocodes
  - locations
  - altitude_min
  - altitude_max

supertypes: []
subtypes: []

external_equivalents:
  semic:
    label: "Administrative Unit"
    uri: "http://data.europa.eu/m8g/AdminUnit"
    match: broad
    vocabulary: "Core Location"
    note: "SEMIC AdminUnit is strictly an administrative hierarchy node; ours also covers non-administrative boundaries like flood zones and program coverage areas"
