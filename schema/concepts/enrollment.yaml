id: Enrollment
maturity: trial-use
domain: sp

definition:
  en: >
    The administrative process of registering an eligible person or household
    as an active beneficiary of a program. Budget constraints and capacity
    limits mean that eligibility does not guarantee enrollment.
  fr: >
    Le processus administratif d'inscription d'une personne ou d'un ménage
    admissible en tant que bénéficiaire actif d'un programme. Les contraintes
    budgétaires et les limites de capacité font que l'admissibilité ne
    garantit pas l'inscription.
  es: >
    El proceso administrativo de inscripción de una persona u hogar elegible
    como beneficiario activo de un programa. Las restricciones presupuestarias
    y los límites de capacidad significan que la elegibilidad no garantiza la
    inscripción.

properties:
  - beneficiary
  - program_ref
  - eligibility_decision_ref
  - enrollment_status
  - enrollment_date
  - exit_date
  - exit_reason
  - is_enrolled
  - governing_jurisdiction

subtypes: []
supertypes: []

external_equivalents:
  dci:
    label: "Beneficiary"
    uri: "https://schema.spdci.org/extensions/ibr/v1/data/Beneficiary"
    match: broad
    vocabulary: "DCI IBR"
    note: "DCI Beneficiary bundles enrollment status, benefit history, and beneficiary identity into one object; PublicSchema separates these into Enrollment (status), Entitlement (what is owed), and PaymentEvent (what was paid)"

convergence:
  system_count: 6
  total_systems: 6
  notes: >
    Universal across all 6 mapped systems. EBSI PDA1 (Portable Document A1
    for cross-border social security coordination) informed the
    governing_jurisdiction property for explicit jurisdiction tracking in
    federated or cross-border contexts.
