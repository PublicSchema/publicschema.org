id: EligibilityDecision
maturity: draft
domain: sp
label:
  en: Eligibility Decision
  fr: "Décision d'éligibilité"
  es: Decisión de elegibilidad

definition:
  en: >
    A formal determination of whether a subject meets a program's criteria
    based on assessed conditions. A single scoring event or profile can
    support multiple eligibility decisions across different programs.
  fr: >
    Une détermination formelle indiquant si un sujet satisfait aux critères
    d'un programme sur la base des conditions évaluées. Un même événement
    de notation ou profil peut fonder plusieurs décisions d'admissibilité
    pour différents programmes.
  es: >
    Una determinación formal de si un sujeto cumple los criterios de un
    programa en función de las condiciones evaluadas. Un mismo evento de
    puntuación o perfil puede sustentar múltiples decisiones de
    elegibilidad para diferentes programas.

properties:
  - applicant
  - program_ref
  - eligibility_status
  - decision_date
  - decision_basis
  - software_used
  - valid_until

subtypes: []
supertypes: [Event]

convergence:
  system_count: 2
  total_systems: 6
