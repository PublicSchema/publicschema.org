id: Entitlement
maturity: candidate
domain: sp
label:
  en: Entitlement
  fr: Droit
  es: Derecho

definition:
  en: >
    An instance of a recognized right of a specific beneficiary to receive a
    benefit. Each entitlement typically corresponds to one disbursement period,
    but multiple entitlements may exist for the same enrollment and overlapping
    periods (e.g., base transfer plus top-up, multi-tranche payments, or
    emergency supplements). The entitlement references both the enrollment
    (who) and the benefit schedule (what was promised).
  fr: >
    Une instance d'un droit reconnu d'un bénéficiaire spécifique à recevoir
    une prestation. Chaque droit correspond généralement à une période de
    versement, mais plusieurs droits peuvent exister pour la même inscription
    et des périodes qui se chevauchent (par ex., transfert de base plus
    complément, paiements à tranches multiples ou suppléments d'urgence).
    Le droit renvoie à la fois à l'inscription (qui) et au calendrier de
    prestations (ce qui a été promis).
  es: >
    Una instancia de un derecho reconocido de un beneficiario específico a
    recibir un beneficio. Cada derecho corresponde típicamente a un período
    de desembolso, pero pueden existir múltiples derechos para la misma
    inscripción y períodos superpuestos (por ej., transferencia base más
    complemento, pagos en múltiples cuotas o suplementos de emergencia).
    El derecho hace referencia tanto a la inscripción (quién) como al
    calendario de beneficios (lo que se prometió).

properties:
  - enrollment_ref
  - schedule_ref
  - benefit_modality
  - benefit_description
  - amount
  - currency
  - coverage_period_start
  - coverage_period_end
  - entitlement_status
  - document_expiry_date

subtypes: []
supertypes: []

external_equivalents:
  dci:
    label: "Benefit"
    uri: "https://schema.spdci.org/extensions/ibr/v1/data/Benefit"
    match: broad
    vocabulary: "DCI IBR"
    note: "DCI Benefit records what was delivered (type, value, date); PublicSchema Entitlement records the recognized right to receive. DCI has no equivalent of the promise-to-delivery separation, so entitled-but-not-yet-paid states cannot be represented"

convergence:
  system_count: 5
  total_systems: 6
  notes: >
    Present in 5 of 6 mapped systems. EBSI PRC (Provisional Replacement
    Certificate for the European Health Insurance Card) informed the
    document_expiry_date property, distinguishing credential expiry from
    entitlement period.
