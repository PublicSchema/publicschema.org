id: PaternityRecognition
maturity: draft
domain: crvs
label:
  en: Paternity Recognition
  fr: Reconnaissance de paternité
  es: Reconocimiento de paternidad

definition:
  en: >
    A formal act in which a parent, typically a father, establishes legal
    parentage for a child born outside marriage. Takes place before a
    registrar, notary, or court and is often annotated on the child's
    original birth record. Distinct from Legitimation, which additionally
    establishes the child as born within marriage.
  fr: >
    Un acte formel par lequel un parent, généralement le père, établit la
    filiation juridique d'un enfant né hors mariage. Reçu par un officier
    d'état civil, un notaire ou un tribunal, et souvent consigné en mention
    marginale sur l'acte de naissance de l'enfant. Distinct de la
    Légitimation, qui établit en outre l'enfant comme né dans le cadre du
    mariage.
  es: >
    Un acto formal mediante el cual un progenitor, habitualmente el padre,
    establece la filiación jurídica de un hijo o hija nacido fuera del
    matrimonio. Se efectúa ante un oficial del registro civil, un notario
    o un tribunal, y se suele anotar al margen del acta de nacimiento
    original del menor. Distinto de la Legitimación, que además establece
    al menor como nacido dentro del matrimonio.

properties:
  - recognizing_parent
  - child
  - mother
  - birth_ref
  - judgment_date
  - judgment_reference
  - court

subtypes: []
supertypes: [crvs/VitalEvent]

external_equivalents:
  opencrvs:
    label: "RequestedCorrectionAction / ApprovedCorrectionAction"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#RequestedCorrectionAction"
    match: related
    vocabulary: "OpenCRVS v2 event service"
    note: "PaternityRecognition has no first-class event type in v2. The correction workflow (ActionType.REQUEST_CORRECTION followed by ActionType.APPROVE_CORRECTION) is the operational mechanism for amending a birth record to add or change parentage. The match is related because the target is a workflow action pair, not an event type."
