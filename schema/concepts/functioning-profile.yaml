id: FunctioningProfile
label:
  en: Functioning Profile
  fr: Profil de fonctionnement
  es: Perfil de funcionamiento
maturity: draft

definition:
  en: >
    A point-in-time record of functioning data collected about a person
    using a defined instrument from the Washington Group family: WG-SS
    (Short Set), WG-ES (Extended Set), CFM 2-4, or CFM 5-17. Captures the
    structured item responses (seeing, hearing, walking, cognition,
    self-care, communication, affect, pain, fatigue, behaviour, and
    related extended items) alongside the administration context
    (administration mode, respondent, instrument version). A functioning
    profile is not a disability classification of the person: it is the
    raw evidence from which disability identifiers can be constructed by
    applying a documented cutoff rule.
  fr: >
    Un enregistrement ponctuel de données de fonctionnement collectées sur
    une personne à l'aide d'un instrument défini de la famille Washington
    Group : WG-SS (ensemble court), WG-ES (ensemble étendu), CFM 2-4 ou
    CFM 5-17. Consigne les réponses structurées aux items (vision,
    audition, marche, cognition, soins personnels, communication, affect,
    douleur, fatigue, comportement et items étendus associés) ainsi que le
    contexte d'administration (mode d'administration, répondant, version
    de l'instrument). Un profil de fonctionnement n'est pas une
    classification du handicap de la personne : c'est la donnée brute à
    partir de laquelle des indicateurs d'identification du handicap
    peuvent être construits en appliquant une règle de seuil documentée.
  es: >
    Un registro puntual de datos de funcionamiento recopilados sobre una
    persona mediante un instrumento definido de la familia Washington
    Group: WG-SS (conjunto corto), WG-ES (conjunto extendido), CFM 2-4 o
    CFM 5-17. Consigna las respuestas estructuradas a los ítems (visión,
    audición, caminar, cognición, cuidado personal, comunicación, afecto,
    dolor, fatiga, conducta e ítems extendidos relacionados) junto con el
    contexto de administración (modo de administración, respondiente,
    versión del instrumento). Un perfil de funcionamiento no es una
    clasificación de discapacidad de la persona: es la evidencia bruta a
    partir de la cual pueden construirse identificadores de discapacidad
    aplicando una regla de corte documentada.

