id: FunctioningProfile
label:
  en: Functioning Profile
  fr: Profil de fonctionnement
  es: Perfil de funcionamiento
maturity: draft

definition:
  en: >
    A point-in-time record of functioning data collected about a person
    using a defined instrument from the Washington Group family: WG-SS
    (Short Set), WG-ES (Extended Set), CFM 2-4, or CFM 5-17. Captures the
    structured item responses (seeing, hearing, walking, cognition,
    self-care, communication, affect, pain, fatigue, behaviour, and
    related extended items) alongside the administration context
    (administration mode, respondent, instrument version). For WG-SS
    administrations, the profile carries the canonical disability
    identifier (recommended cutoff: at least one domain reports "a lot
    of difficulty" or "cannot do at all") and the domains that triggered
    it. This is a survey-based statistical identifier for population
    reporting, not a clinical disability determination. Alternate cutoffs
    are recorded via ScoringEvent. No equivalent derived identifier is
    yet defined for CFM or WG-ES administrations.
  fr: >
    Un enregistrement ponctuel de données de fonctionnement collectées sur
    une personne à l'aide d'un instrument défini de la famille Washington
    Group : WG-SS (ensemble court), WG-ES (ensemble étendu), CFM 2-4 ou
    CFM 5-17. Consigne les réponses structurées aux items (vision,
    audition, marche, cognition, soins personnels, communication, affect,
    douleur, fatigue, comportement et items étendus associés) ainsi que le
    contexte d'administration (mode d'administration, répondant, version
    de l'instrument). Pour les administrations WG-SS, le profil porte
    l'identifiant canonique de handicap (seuil recommandé : au moins un
    domaine rapporte « beaucoup de difficulté » ou « ne peut pas du
    tout ») et les domaines qui l'ont déclenché. Il s'agit d'un
    identifiant statistique d'enquête pour le reporting de population,
    pas d'une détermination clinique du handicap. Les seuils alternatifs
    sont enregistrés via ScoringEvent. Aucun identifiant dérivé
    équivalent n'est encore défini pour les administrations CFM ou
    WG-ES.
  es: >
    Un registro puntual de datos de funcionamiento recopilados sobre una
    persona mediante un instrumento definido de la familia Washington
    Group: WG-SS (conjunto corto), WG-ES (conjunto extendido), CFM 2-4 o
    CFM 5-17. Consigna las respuestas estructuradas a los ítems (visión,
    audición, caminar, cognición, cuidado personal, comunicación, afecto,
    dolor, fatiga, conducta e ítems extendidos relacionados) junto con el
    contexto de administración (modo de administración, respondiente,
    versión del instrumento). Para administraciones WG-SS, el perfil
    lleva el identificador canónico de discapacidad (corte recomendado:
    al menos un dominio reporta "mucha dificultad" o "no puede hacerlo")
    y los dominios que lo activaron. Es un identificador estadístico de
    encuesta para reporte poblacional, no una determinación clínica de
    discapacidad. Los cortes alternativos se registran mediante
    ScoringEvent. Aún no se define un identificador derivado equivalente
    para administraciones CFM o WG-ES.

