external_equivalents:
  fhir:
    label: "QuestionnaireResponse (WG panel)"
    uri: "http://hl7.org/fhir/QuestionnaireResponse"
    match: close
    vocabulary: "FHIR R4"
    note: "WG and CFM administrations serialize naturally as a QuestionnaireResponse whose Questionnaire is the corresponding WG or CFM instrument definition"

convergence:
  system_count: 1
  total_systems: 6
  notes: >
    Only FHIR directly represents a WG or CFM administration (as a
    QuestionnaireResponse). The other five v1 systems (DHIS2, OpenCRVS,
    OpenSPP, openIMIS, DCI) carry a derived disability category on the
    Person record, not the item-level answers. The Washington Group analytic
    guidelines require the raw items to derive cutoff-based identifiers,
    and national surveys that feed disability statistics (DHS, MICS, census
    long forms) keep the items as separate survey records. This concept
    gives programs a standards-faithful home for those answers; Person
    retains a coarse functioning_status flag for operational queries.
