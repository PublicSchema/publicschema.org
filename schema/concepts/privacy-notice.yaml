id: PrivacyNotice
label:
  en: Privacy Notice
  fr: Notice d'information
  es: Aviso de privacidad
maturity: draft

definition:
  en: >
    PrivacyNotice is the artefact presented to a data subject describing
    which personal data will be processed, by whom, for what purposes,
    under which legal basis, and with what rights. It bounds the scope of
    each ConsentRecord anchored to it: a record's processing scope must
    fall within the notice's declared scope, or the notice must be
    updated and re-consent obtained. Notice versioning is deliberate; a
    substantive change (new purposes, new recipients, new data categories)
    triggers re-consent, while editorial changes (typos, translation
    fixes, contact refresh) do not.
  fr: >
    PrivacyNotice est l'artefact présenté à une personne concernée
    décrivant quelles données personnelles seront traitées, par qui, à
    quelles fins, sur quelle base juridique et avec quels droits. Elle
    délimite le périmètre de chaque ConsentRecord qui y est rattaché:
    le périmètre de traitement d'un enregistrement doit rester dans
    celui déclaré par l'avis, sinon l'avis doit être mis à jour
    et un nouveau consentement recueilli. Le versionnage de l'avis
    est délibéré; un changement substantiel (nouvelles finalités,
    nouveaux destinataires, nouvelles catégories de données) déclenche
    un nouveau consentement, alors qu'un changement rédactionnel
    (corrections, traductions, coordonnées) ne le déclenche pas.
  es: >
    PrivacyNotice es el artefacto presentado al interesado que describe
    qué datos personales se tratarán, por quién, con qué fines, bajo
    qué base jurídica y con qué derechos. Delimita el alcance de cada
    ConsentRecord que lo referencia: el alcance de tratamiento de un
    registro debe permanecer dentro del declarado por el aviso; de lo
    contrario, el aviso debe actualizarse y obtenerse un nuevo
    consentimiento. El versionado del aviso es deliberado; un cambio
    sustantivo (nuevas finalidades, nuevos destinatarios, nuevas
    categorías de datos) desencadena un nuevo consentimiento, mientras
    que un cambio editorial (correcciones, traducciones, datos de
    contacto) no lo hace.

