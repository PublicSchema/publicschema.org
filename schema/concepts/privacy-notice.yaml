external_equivalents:
  dpv:
    label: "Privacy Notice"
    uri: "https://w3id.org/dpv#PrivacyNotice"
    match: exact
    vocabulary: "W3C DPV v2"
    note: "W3C DPV 2.0 defines dpv:PrivacyNotice as a notice of privacy practices. When legal_basis includes consent, the notice is also a dpv:ConsentNotice (same class, narrower role)."
  dpv-consent-notice:
    label: "Consent Notice"
    uri: "https://w3id.org/dpv#ConsentNotice"
    match: related
    vocabulary: "W3C DPV v2"
    note: "dpv:ConsentNotice is the consent-focused specialisation of dpv:PrivacyNotice. Our PrivacyNotice is the supertype; records with legal_basis = consent are anchored against notices that also satisfy the ConsentNotice specialisation."

convergence:
  system_count: 2
  total_systems: 6
  notes: >
    PrivacyNotice as a first-class artefact is less widespread than
    ConsentRecord. ISO/IEC 29184 specifies notice structure; W3C DPV
    models it as dpv:PrivacyNotice. Most delivery systems handle notice
    text as prose in program documentation rather than as a structured
    record. This concept exists so adopters can version notices
    alongside records, trace re-consent triggers, and generate
    jurisdiction-aware notice text from structured inputs.
