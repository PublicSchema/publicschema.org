      bibliography_refs: '["fhir-bfdr", "un-vital-stats-rev3", "who-skilled-birth-attendants-2018"]'
  birth_order:
    slot_uri: publicschema:birth_order
    title: Birth order
    description: For multiple births, the sequence number of this infant among the siblings born in the
      same delivery (1 for first-born, 2 for second-born, etc.).
    range: integer
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent
    annotations:
      label_es: Orden de nacimiento
      label_fr: Rang de naissance
      description_es: Para partos múltiples, el número de orden de este recién nacido entre los hermanos
        nacidos en el mismo parto (1 para el primogénito, 2 para el segundo, etc.).
      description_fr: Pour les naissances multiples, le numéro d'ordre de ce nouveau-né parmi les frères
        et sœurs nés lors du même accouchement (1 pour le premier né, 2 pour le deuxième, etc.).
      domain_override: crvs
      external_alignments_json: '[{"label": "Birth declaration field (country-configured)", "match": "close",
        "note": "In v2 there is no core birth-order or multipleBirth field. The field would be a country-configured
        integer or SELECT in EventConfig.declaration.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-bfdr", "un-vital-stats-rev3"]'
  birth_ref:
    slot_uri: publicschema:birth_ref
    title: Birth record reference
    description: A reference to the Birth record of the child whose parentage is being recognized, legitimized,
      or otherwise modified. Links the current event back to the original birth record.
    range: Birth
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Referencia al registro de nacimiento
      label_fr: Référence à l'acte de naissance
      description_es: Una referencia al registro de Nacimiento del hijo o hija cuya filiación se está
        reconociendo, legitimando o modificando de otro modo. Vincula el evento actual con el registro
        de nacimiento original.
      description_fr: Une référence à l'acte de Naissance de l'enfant dont la filiation est reconnue,
        légitimée ou autrement modifiée. Relie l'événement en cours à l'acte de naissance d'origine.
      domain_override: crvs
  birth_type:
    slot_uri: publicschema:birth_type
    title: Birth type
    description: Whether the birth was single, twin, triplet, or higher-order multiple. Captured at the
      level of the delivery, not per infant.
    range: BirthType
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent
    annotations:
      label_es: Tipo de nacimiento
      label_fr: Type de naissance
      description_es: Indica si el parto fue simple, gemelar, triple o de orden mayor. Se captura al nivel
        del parto, no por cada recién nacido.
      description_fr: Indique si la naissance est unique, gémellaire, triple ou d'un ordre plus élevé.
        La valeur est enregistrée au niveau de l'accouchement, et non par nouveau-né.
      domain_override: crvs
      external_alignments_json: '[{"label": "Birth type declaration field (country-configured)", "match":
        "close", "note": "In v2 there is no core birth-type field. The field is a country-configured SELECT
        in EventConfig.declaration. Our birth-type vocabulary recommends a canonical set of values.",
        "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-bfdr", "un-vital-stats-rev3"]'
  cause_of_death:
    slot_uri: publicschema:cause_of_death
    title: Cause of death
    description: A free-text description of the underlying cause of death as stated on the death certificate.
      Captured alongside a coded cause_of_death_code when classification is available.
    range: string
    multivalued: false
    status: bibo:draft
    exact_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent
    annotations:
      label_es: Causa de defunción
      label_fr: Cause du décès
      description_es: Una descripción en texto libre de la causa subyacente de la defunción tal como figura
        en el certificado de defunción. Se captura junto con un cause_of_death_code codificado cuando
        hay clasificación disponible.
      description_fr: Une description en texte libre de la cause sous-jacente du décès, telle qu'indiquée
        sur l'acte de décès. Renseigné conjointement avec cause_of_death_code lorsqu'une classification
        est disponible.
      domain_override: crvs
      external_alignments_json: '[{"label": "Cause of death declaration field (country-configured)", "match":
        "exact", "note": "In v2 there is no core causeOfDeath field. The field is a country-configured
        text field in EventConfig.declaration. Free text on both sides.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "icd-10", "icd-11", "who-medical-cert-death", "who-verbal-autopsy-2022"]'
  cause_of_death_code:
    slot_uri: publicschema:cause_of_death_code
    title: Cause of death code
    description: The coded underlying cause of death, typically an ICD-10 or ICD-11 code. The coding scheme
      in use is specified by cause_of_death_coding_system.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Código de causa de defunción
      label_fr: Code de la cause du décès
      description_es: La causa subyacente de la defunción en forma codificada, típicamente un código CIE-10
        o CIE-11. El sistema de codificación utilizado se especifica en cause_of_death_coding_system.
      description_fr: La cause sous-jacente du décès sous forme codée, généralement un code CIM-10 ou
        CIM-11. Le système de codage utilisé est précisé par cause_of_death_coding_system.
      domain_override: crvs
      bibliography_refs: '["fhir-vrdr", "icd-10", "icd-11", "who-verbal-autopsy-2022"]'
  cause_of_death_coding_system:
    slot_uri: publicschema:cause_of_death_coding_system
    title: Cause of death coding system
    description: The classification system used to code the cause of death (for example ICD-10, ICD-11,
      or a national variant). Required when comparing coded causes across jurisdictions.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Sistema de codificación de la causa de defunción
      label_fr: Système de codage de la cause du décès
      description_es: El sistema de clasificación utilizado para codificar la causa de la defunción (por
        ejemplo CIE-10, CIE-11 o una variante nacional). Es necesario al comparar causas codificadas entre
        jurisdicciones.
      description_fr: Le système de classification utilisé pour coder la cause du décès (par exemple CIM-10,
        CIM-11 ou une variante nationale). Nécessaire pour comparer les causes codées entre juridictions.
      domain_override: crvs
      bibliography_refs: '["fhir-vrdr", "icd-10", "icd-11"]'
  cause_of_death_method:
    slot_uri: publicschema:cause_of_death_method
    title: Cause of death method
    description: 'The method used to ascertain the cause of death: physician certified, verbal autopsy,
      coroner, lay reporting, or other. Important for judging data quality, since verbal autopsy and lay
      reporting are less precise than physician certification.'
    range: CauseOfDeathMethod
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent
    annotations:
      label_es: Método de determinación de la causa de defunción
      label_fr: Méthode de détermination de la cause du décès
      description_es: 'El método utilizado para determinar la causa de la defunción: certificación médica,
        autopsia verbal, médico forense, declaración no profesional u otro. Importante para juzgar la
        calidad de los datos, dado que la autopsia verbal y la declaración no profesional son menos precisas
        que la certificación médica.'
      description_fr: 'La méthode utilisée pour déterminer la cause du décès: certification médicale,
        autopsie verbale, coroner, déclaration par un non-professionnel, ou autre. Importante pour apprécier
        la qualité des données, l''autopsie verbale et la déclaration non professionnelle étant moins
        précises que la certification médicale.'
      domain_override: crvs
      external_alignments_json: '[{"label": "Cause-of-death method declaration field (country-configured)",
        "match": "close", "note": "In v2 there is no core causeOfDeathMethod field. The field is a country-configured
        SELECT in EventConfig.declaration. Our cause-of-death-method vocabulary recommends a canonical
        set.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "who-medical-cert-death", "who-verbal-autopsy-2022"]'
  cause_of_fetal_death:
    slot_uri: publicschema:cause_of_fetal_death
    title: Cause of fetal death
    description: A free-text description of the cause of a fetal death. Captured alongside cause_of_fetal_death_code
      when an ICD-PM or equivalent code is assigned.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Causa de muerte fetal
      label_fr: Cause de la mortinaissance
      description_es: Una descripción en texto libre de la causa de la muerte fetal. Se captura junto
        con cause_of_fetal_death_code cuando se asigna un código CIE-PM o equivalente.
      description_fr: Une description en texte libre de la cause d'une mortinaissance. Renseigné conjointement
        avec cause_of_fetal_death_code lorsqu'un code CIM-PM ou équivalent est attribué.
      domain_override: crvs
      bibliography_refs: '["fhir-bfdr", "icd-pm", "who-cert-perinatal-death"]'
  cause_of_fetal_death_code:
    slot_uri: publicschema:cause_of_fetal_death_code
    title: Cause of fetal death code
    description: The coded cause of a fetal death, typically an ICD-PM (Perinatal Mortality) code. The
      coding system is specified by cause_of_fetal_death_coding_system.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Código de causa de muerte fetal
      label_fr: Code de la cause de la mortinaissance
      description_es: La causa codificada de la muerte fetal, típicamente un código CIE-PM (Mortalidad
        perinatal). El sistema de codificación se especifica en cause_of_fetal_death_coding_system.
      description_fr: La cause codée d'une mortinaissance, généralement un code CIM-PM (Mortalité périnatale).
        Le système de codage est précisé par cause_of_fetal_death_coding_system.
      domain_override: crvs
      bibliography_refs: '["fhir-bfdr", "icd-pm", "who-cert-perinatal-death"]'
  cause_of_fetal_death_coding_system:
    slot_uri: publicschema:cause_of_fetal_death_coding_system
    title: Cause of fetal death coding system
    description: The classification system used to code the cause of a fetal death (for example ICD-PM,
      ICD-10, or a national variant).
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Sistema de codificación de la causa de muerte fetal
      label_fr: Système de codage de la cause de la mortinaissance
      description_es: El sistema de clasificación utilizado para codificar la causa de una muerte fetal
        (por ejemplo CIE-PM, CIE-10 o una variante nacional).
      description_fr: Le système de classification utilisé pour coder la cause d'une mortinaissance (par
        exemple CIM-PM, CIM-10 ou une variante nationale).
      domain_override: crvs
      bibliography_refs: '["fhir-bfdr", "icd-pm", "who-cert-perinatal-death"]'
  certificate_document_type:
    slot_uri: publicschema:certificate_document_type
    title: Certificate document type
    description: The type of event the certificate attests to (birth, death, marriage, divorce, adoption).
      Describes what the document is about, orthogonal to its format.
    range: CertificateDocumentType
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#PrintCertificateAction
    annotations:
      label_es: Tipo de documento del certificado
      label_fr: Type de document du certificat
      description_es: El tipo de evento que acredita el certificado (nacimiento, defunción, matrimonio,
        divorcio, adopción). Describe de qué trata el documento, con independencia de su formato.
      description_fr: Le type d'événement attesté par le certificat (naissance, décès, mariage, divorce,
        adoption). Décrit l'objet du document, indépendamment de son format.
      domain_override: crvs
      external_alignments_json: '[{"label": "PrintCertificateAction.content.templateId", "match": "broad",
        "note": "PrintCertificateAction carries an optional templateId string. The mapping from template
        ID to document type is country-configured; v2 core imposes no constraint on template identifier
        values.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#PrintCertificateAction",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  certificate_format:
    slot_uri: publicschema:certificate_format
    title: Certificate format
    description: 'The format of the certificate: full copy (reproducing the acte including marginal annotations),
      extract (summary only), or a multilingual extract for international use.'
    range: CertificateFormat
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Formato del certificado
      label_fr: Format du certificat
      description_es: 'El formato del certificado: copia íntegra (que reproduce el acta incluyendo las
        anotaciones marginales), extracto (solo resumen), o extracto multilingüe para uso internacional.'
      description_fr: 'Le format du certificat: copie intégrale (reproduisant l''acte y compris les mentions
        marginales), extrait (résumé uniquement), ou extrait plurilingue pour un usage international.'
      domain_override: crvs
      bibliography_refs: '["iccs-convention-16", "iccs-convention-34"]'
  certificate_label:
    slot_uri: publicschema:certificate_label
    title: Certificate label
    description: A free-text field carrying the role label as it must appear on the printed legal certificate.
      Jurisdictions that require gendered designations (for example, 'mother', 'father') or positional
      labels ('parent 1', 'parent 2') on the certificate use this field. The underlying role-nature is
      already carried on parental_role; certificate_label is purely a display hint for document generation.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Etiqueta de certificado
      label_fr: Étiquette de certificat
      description_es: Un campo de texto libre que contiene la etiqueta de rol tal como debe aparecer en
        el certificado legal impreso. Las jurisdicciones que exigen designaciones por género (por ejemplo,
        'madre', 'padre') o etiquetas posicionales ('progenitor 1', 'progenitor 2') en el certificado
        utilizan este campo. La naturaleza del rol subyacente ya está recogida en parental_role; certificate_label
        es únicamente una indicación de visualización para la generación de documentos.
      description_fr: Un champ de texte libre portant l'étiquette de rôle telle qu'elle doit figurer sur
        le certificat légal imprimé. Les juridictions qui exigent des désignations genrées (par exemple,
        'mère', 'père') ou des étiquettes positionnelles ('parent 1', 'parent 2') sur le certificat utilisent
        ce champ. La nature du rôle sous-jacent est déjà portée par parental_role ; certificate_label
        est uniquement un indicateur d'affichage pour la génération de documents.
      domain_override: crvs
  certificate_number:
    slot_uri: publicschema:certificate_number
    title: Certificate number
    description: The number printed on the issued certificate. Distinct from the registration number of
      the underlying event or record, since multiple certificates can be issued from the same record over
      time.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Número de certificado
      label_fr: Numéro de certificat
      description_es: El número impreso en el certificado emitido. Distinto del número de registro del
        evento o acta subyacente, dado que pueden emitirse varios certificados a partir del mismo acta
        a lo largo del tiempo.
      description_fr: Le numéro imprimé sur le certificat délivré. Distinct du numéro d'enregistrement
        de l'événement ou de l'acte sous-jacent, puisque plusieurs certificats peuvent être délivrés à
        partir du même acte au fil du temps.
      domain_override: crvs
  child:
    slot_uri: publicschema:child
    title: Child
    description: The child whose birth, adoption, or legitimation is recorded in this event.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts
    annotations:
      label_es: Niño o niña
      label_fr: Enfant
      description_es: El niño o la niña cuyo nacimiento, adopción o legitimación se registra en este evento.
      description_fr: L'enfant dont la naissance, l'adoption ou la légitimation est consignée dans cet
        événement.
      domain_override: crvs
      external_alignments_json: '[{"label": "Birth declaration field group (country-configured)", "match":
        "close", "note": "In v2 there is no typed child field at the core level. Farajaland''s birth declaration
        form defines a ''child'' field group (child.firstname, child.surname, child.dob, child.gender,
        etc.) in EventConfig.declaration. The semantic role matches but the structure is entirely country-configured.",
        "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  civil_status_record:
    slot_uri: publicschema:civil_status_record
    title: Civil status record
    description: A reference to a CivilStatusRecord. Used on annotations to point to the record being
      annotated, and on certificates to point to the record from which the certificate is issued.
    range: CivilStatusRecord
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Acta de estado civil
      label_fr: Acte d'état civil
      description_es: Una referencia a un CivilStatusRecord. Se utiliza en las anotaciones para remitir
        al acta que se anota, y en los certificados para remitir al acta a partir de la cual se emite
        el certificado.
      description_fr: Une référence à un CivilStatusRecord. Utilisée sur les mentions marginales pour
        désigner l'acte annoté, et sur les certificats pour désigner l'acte à partir duquel le certificat
        est délivré.
      domain_override: crvs
  court:
    slot_uri: publicschema:court
    title: Court
    description: The court that issued the judgment for a divorce, annulment, adoption, paternity recognition,
      or other court-ordered vital event.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tribunal
      label_fr: Tribunal
      description_es: El tribunal que dictó la sentencia para un divorcio, anulación, adopción, reconocimiento
        de paternidad u otro evento vital ordenado por tribunal.
      description_fr: Le tribunal qui a rendu le jugement pour un divorce, une annulation, une adoption,
        une reconnaissance de paternité ou un autre événement d'état civil ordonné par un tribunal.
      domain_override: crvs
  creation_date:
    slot_uri: publicschema:creation_date
    title: Creation date
    description: The date on which the family register was created, typically at marriage, at the birth
      of the first child, or when a new household is administratively constituted.
    range: date
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha de creación
      label_fr: Date de création
      description_es: La fecha en que se creó el registro familiar, generalmente al contraerse matrimonio,
        al nacimiento del primer hijo o al constituirse administrativamente un nuevo hogar.
      description_fr: La date à laquelle le registre familial a été créé, généralement lors d'un mariage,
        à la naissance du premier enfant ou lors de la constitution administrative d'un nouveau ménage.
      domain_override: crvs
  deceased:
    slot_uri: publicschema:deceased
    title: Deceased
    description: The person whose death is recorded. Remains a Person entity so that existing identifiers
      and attributes can still be referenced after death.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/forms/pages/eventDetails.ts
    annotations:
      label_es: Fallecido
      label_fr: Défunt
      description_es: La persona cuyo fallecimiento se registra. Sigue siendo una entidad Persona para
        que los identificadores y atributos existentes puedan consultarse tras la defunción.
      description_fr: La personne dont le décès est enregistré. Reste une entité Personne afin que les
        identifiants et attributs existants puissent toujours être référencés après le décès.
      domain_override: crvs
      external_alignments_json: '[{"label": "Death declaration field group (country-configured)", "match":
        "close", "note": "In v2 there is no typed deceased field at the core level. Farajaland''s death
        declaration form defines the deceased''s data as field groups in EventConfig.declaration. The
        semantic role matches but the structure is country-configured.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/forms/pages/eventDetails.ts",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  establishment_basis:
    slot_uri: publicschema:establishment_basis
    title: Establishment basis
    description: 'The legal route by which the parent''s parentage was established: marital presumption,
      voluntary recognition, judicial declaration, adoption order, or surrogacy order. Complements parental_role,
      which captures the role-nature (biological, gestational, legal, adoptive); establishment_basis captures
      the mechanism.'
    range: ParentEstablishmentBasis
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Base de establecimiento
      label_fr: Fondement de l'établissement
      description_es: 'La vía legal por la que se estableció la parentalidad del progenitor: presunción
        matrimonial, reconocimiento voluntario, declaración judicial, resolución de adopción o resolución
        de gestación subrogada. Complementa parental_role, que captura la naturaleza del rol (biológico,
        gestacional, legal, adoptivo); establishment_basis captura el mecanismo.'
      description_fr: 'Le fondement juridique par lequel la parenté du parent a été établie : présomption
        maritale, reconnaissance volontaire, déclaration judiciaire, jugement d''adoption ou jugement
        de gestation pour autrui. Complète parental_role, qui capture la nature du rôle (biologique, gestationnel,
        légal, adoptif) ; establishment_basis capture le mécanisme.'
      domain_override: crvs
      bibliography_refs: '["hague-intercountry-adoption"]'
  event_date:
    slot_uri: publicschema:event_date
    title: Event date
    description: The date on which the vital event (birth, death, marriage, etc.) occurred. Distinct from
      the registration date, which is when the event was recorded by a registration authority.
    range: date
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata
    annotations:
      label_es: Fecha del evento
      label_fr: Date de l'événement
      description_es: La fecha en que ocurrió el evento vital (nacimiento, defunción, matrimonio, etc.).
        Distinta de la fecha de registro, que es cuando el evento fue registrado por una autoridad de
        registro.
      description_fr: La date à laquelle l'événement d'état civil (naissance, décès, mariage, etc.) s'est
        produit. Distincte de la date d'enregistrement, qui est la date à laquelle l'événement a été consigné
        par une autorité d'enregistrement.
      domain_override: crvs
      external_alignments_json: '[{"label": "EventMetadata.dateOfEvent (country-configured)", "match":
        "related", "note": "In v2, EventMetadata.dateOfEvent is a nullable date field set from the country-configured
        declaration field referenced by EventConfig.dateOfEvent. For births, Farajaland uses the child''s
        date of birth; for deaths, the date of death. No top-level event date exists at the v2 core level
        independent of country configuration.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  event_date_estimated:
    slot_uri: publicschema:event_date_estimated
    title: Event date estimated
    description: Whether the event date is an estimate rather than a known exact date. Common for late-registered
      births or deaths where the precise date is not documented.
    range: boolean
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha estimada del evento
      label_fr: Date estimée de l'événement
      description_es: Indica si la fecha del evento es una estimación en lugar de una fecha exacta conocida.
        Común para nacimientos o defunciones registrados tardíamente cuya fecha precisa no está documentada.
      description_fr: Indique si la date de l'événement est une estimation plutôt qu'une date exacte connue.
        Fréquent pour les naissances ou décès enregistrés tardivement dont la date précise n'est pas documentée.
      domain_override: crvs
  event_location:
    slot_uri: publicschema:event_location
    title: Event location
    description: The specific place where the vital event occurred (for example, the hospital of birth
      or the place of death). Distinct from the registration location, which is where the event was recorded.
    range: Location
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata
    annotations:
      label_es: Lugar del evento
      label_fr: Lieu de l'événement
      description_es: El lugar específico donde ocurrió el evento vital (por ejemplo, el hospital de nacimiento
        o el lugar de defunción). Distinto del lugar de registro, que es donde se registró el evento.
      description_fr: Le lieu précis où l'événement d'état civil s'est produit (par exemple, l'hôpital
        de naissance ou le lieu du décès). Distinct du lieu d'enregistrement, qui est l'endroit où l'événement
        a été consigné.
      domain_override: crvs
      external_alignments_json: '[{"label": "EventMetadata.placeOfEvent (UUID reference)", "match": "close",
        "note": "In v2, EventMetadata.placeOfEvent is a nullable UUID referencing a location in the Location
        service. Farajaland''s EventConfig sets this from a country-configured location picker field.
        The semantic role (where the event occurred) aligns well.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  family:
    slot_uri: publicschema:family
    title: Family
    description: The family group tracked by a family register. Modeled as a Group so that household-level
      and family-level concepts can share structure.
    range: Group
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Familia
      label_fr: Famille
      description_es: El grupo familiar registrado en un registro familiar. Modelado como un Grupo para
        que los conceptos a nivel de hogar y a nivel de familia puedan compartir la misma estructura.
      description_fr: Le groupe familial suivi par un registre familial. Modélisé comme un Groupe afin
        que les concepts de niveau ménage et de niveau famille puissent partager la même structure.
      domain_override: crvs
  family_register_status:
    slot_uri: publicschema:family_register_status
    title: Family register status
    description: 'The lifecycle status of the family register: active, closed, split into multiple registers,
      or merged with another. Tracks how vital events reshape the register over time.'
    range: FamilyRegisterStatus
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Estado del registro familiar
      label_fr: Statut du registre familial
      description_es: 'El estado del ciclo de vida del registro familiar: activo, cerrado, dividido en
        varios registros o fusionado con otro. Da seguimiento a cómo los eventos vitales transforman el
        registro a lo largo del tiempo.'
      description_fr: 'Le statut du cycle de vie du registre familial: actif, clôturé, scindé en plusieurs
        registres ou fusionné avec un autre. Retrace la manière dont les événements d''état civil transforment
        le registre au fil du temps.'
      domain_override: crvs
  gestational_age:
    slot_uri: publicschema:gestational_age
    title: Gestational age
    description: The completed weeks of gestation at the time of the event. Used for fetal death and birth
      records to distinguish viability and to apply the ICD-PM mortality classification.
    range: integer
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Edad gestacional
      label_fr: Âge gestationnel
      description_es: Las semanas completas de gestación al momento del evento. Utilizado en registros
        de muerte fetal y nacimiento para distinguir la viabilidad y aplicar la clasificación de mortalidad
        CIE-PM.
      description_fr: Le nombre de semaines de gestation révolues au moment de l'événement. Utilisé pour
        les actes de mortinaissance et de naissance afin de distinguer la viabilité et d'appliquer la
        classification de mortalité CIM-PM.
      domain_override: crvs
      bibliography_refs: '["fhir-bfdr", "un-vital-stats-rev3", "who-preterm-lbw-care-2022"]'
  head_of_household:
    slot_uri: publicschema:head_of_household
    title: Head of household
    description: The person designated as head of the family register, around whom the register is organized.
      Terminology and legal significance vary (koseki hittosha in Japan, hu zhu in China, chef de famille
      in French-inspired systems).
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Jefe de hogar
      label_fr: Chef de ménage
      description_es: La persona designada como cabeza del registro familiar, en torno a la cual se organiza
        el registro. La terminología y el alcance jurídico varían (koseki hittosha en Japón, hu zhu en
        China, jefe de familia en los sistemas de inspiración francesa).
      description_fr: La personne désignée comme chef du registre familial, autour de laquelle le registre
        est organisé. La terminologie et la portée juridique varient (koseki hittosha au Japon, hu zhu
        en Chine, chef de famille dans les systèmes inspirés du droit français).
      domain_override: crvs
      bibliography_refs: '["un-census-rev3"]'
  informant:
    slot_uri: publicschema:informant
    title: Informant
    description: The person who declares the vital event to the civil registration authority. Typically
      a parent for births, a relative or medical professional for deaths, or the parties themselves for
      marriages.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/informant.ts
    annotations:
      label_es: Declarante
      label_fr: Déclarant
      description_es: La persona que declara el evento vital ante la autoridad de registro civil. Típicamente
        un padre o madre en nacimientos, un familiar o profesional médico en defunciones, o las propias
        partes en matrimonios.
      description_fr: La personne qui déclare l'événement à l'autorité d'état civil. Habituellement un
        parent pour les naissances, un proche ou un professionnel de santé pour les décès, ou les parties
        elles-mêmes pour les mariages.
      domain_override: crvs
      external_alignments_json: '[{"label": "Informant declaration field group (country-configured)",
        "match": "close", "note": "In v2, informant data lives in country-configured EventConfig.declaration
        fields. Farajaland''s birth declaration defines an informant field group. The semantic role matches
        but the structure is country-configured.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/informant.ts",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  issuing_authority_location:
    slot_uri: publicschema:issuing_authority_location
    title: Issuing authority location
    description: The civil registration office that issued the record, modeled as a Location. Distinct
      from the string-valued issuing_authority property used on generic identifiers.
    range: Location
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Ubicación de la autoridad emisora
      label_fr: Localisation de l'autorité émettrice
      description_es: La oficina de registro civil que emitió el acta, modelada como una Ubicación. Distinta
        de la propiedad issuing_authority, de tipo cadena, utilizada en identificadores genéricos.
      description_fr: Le bureau d'état civil qui a délivré l'acte, représenté comme un Lieu. Distinct
        de la propriété issuing_authority, de type chaîne, utilisée sur les identifiants génériques.
      domain_override: crvs
  issuing_office:
    slot_uri: publicschema:issuing_office
    title: Issuing office
    description: The civil registration or judicial office that issued the certificate. May differ from
      the office that holds the underlying record, for example when an embassy issues a certificate based
      on a record held elsewhere.
    range: Location
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Oficina emisora
      label_fr: Bureau émetteur
      description_es: La oficina de registro civil o la oficina judicial que emitió el certificado. Puede
        diferir de la oficina que conserva el acta subyacente, por ejemplo cuando una embajada emite un
        certificado a partir de un acta conservada en otro lugar.
      description_fr: Le bureau d'état civil ou l'office judiciaire qui a délivré le certificat. Peut
        différer du bureau qui conserve l'acte sous-jacent, par exemple lorsqu'une ambassade délivre un
        certificat sur la base d'un acte conservé ailleurs.
      domain_override: crvs
  judgment_date:
    slot_uri: publicschema:judgment_date
    title: Judgment date
    description: The date of the court judgment that granted a divorce, annulment, adoption, paternity
      recognition, or other court-ordered vital event. Distinct from the registration date.
    range: date
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha de la sentencia
      label_fr: Date du jugement
      description_es: La fecha de la sentencia judicial que otorgó un divorcio, anulación, adopción, reconocimiento
        de paternidad u otro evento vital ordenado por tribunal. Distinta de la fecha de registro.
      description_fr: La date du jugement ayant prononcé un divorce, une annulation, une adoption, une
        reconnaissance de paternité ou un autre événement d'état civil ordonné par tribunal. Distincte
        de la date d'enregistrement.
      domain_override: crvs
  judgment_reference:
    slot_uri: publicschema:judgment_reference
    title: Judgment reference
    description: The case number or other identifier of the court judgment that ordered this vital event.
      Enables retrieval of the underlying judicial record.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Referencia de la sentencia
      label_fr: Référence du jugement
      description_es: El número de expediente u otro identificador de la sentencia judicial que ordenó
        este evento vital. Permite recuperar la resolución judicial subyacente.
      description_fr: Le numéro de dossier ou autre identifiant du jugement ayant ordonné cet événement
        d'état civil. Permet de retrouver la décision judiciaire sous-jacente.
      domain_override: crvs
  manner_of_death:
    slot_uri: publicschema:manner_of_death
    title: Manner of death
    description: 'The circumstances under which the death occurred: natural, accident, intentional self-harm,
      assault, legal intervention, war, pending investigation, or could not be determined. Follows the
      WHO death certificate structure.'
    range: MannerOfDeath
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent
    annotations:
      label_es: Circunstancias de la defunción
      label_fr: Circonstances du décès
      description_es: 'Las circunstancias en las que ocurrió la defunción: natural, accidente, lesión
        autoinfligida intencional, agresión, intervención legal, guerra, investigación pendiente o no
        determinada. Sigue la estructura del certificado de defunción de la OMS.'
      description_fr: 'Les circonstances dans lesquelles le décès s''est produit : naturel, accident,
        violence auto-infligée intentionnelle, agression, intervention légale, guerre, enquête en cours
        ou indéterminé. Suit la structure du certificat médical de cause de décès de l''OMS.'
      domain_override: crvs
      external_alignments_json: '[{"label": "Manner of death declaration field (country-configured)",
        "match": "close", "note": "In v2 there is no core mannerOfDeath field. The field is a country-configured
        SELECT in EventConfig.declaration. Our manner-of-death vocabulary recommends a canonical set.",
        "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "who-icd-manner-of-death"]'
  marriage_ref:
    slot_uri: publicschema:marriage_ref
    title: Marriage reference
    description: A reference to the Marriage record that this termination (divorce or annulment) dissolves.
      Links the end of the union back to its formation.
    range: Marriage
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Referencia al matrimonio
      label_fr: Référence au mariage
      description_es: Una referencia al registro de Matrimonio que esta terminación (divorcio o anulación)
        disuelve. Vincula el fin de la unión con su formación.
      description_fr: Une référence à l'acte de Mariage que cette dissolution (divorce ou annulation)
        met fin. Relie la fin de l'union à sa formation.
      domain_override: crvs
  medical_certifier:
    slot_uri: publicschema:medical_certifier
    title: Medical certifier
    description: The medical practitioner who certified the cause of death. Distinct from the registrar,
      who records the death with the civil registration authority.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent
    annotations:
      label_es: Certificador médico
      label_fr: Certificateur médical
      description_es: El profesional médico que certificó la causa de la defunción. Distinto del funcionario
        de registro civil, que inscribe la defunción ante la autoridad de registro.
      description_fr: Le praticien médical qui a certifié la cause du décès. Distinct de l'officier d'état
        civil, qui consigne le décès auprès de l'autorité d'enregistrement.
      domain_override: crvs
      external_alignments_json: '[{"label": "Medical certifier declaration field group (country-configured)",
        "match": "close", "note": "In v2 there is no core medicalPractitioner field. Medical certifier
        data is a country-configured field group in EventConfig.declaration.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "who-cert-perinatal-death", "who-medical-cert-death"]'
  mother:
    slot_uri: publicschema:mother
    title: Mother
    description: 'A convenience reference to the Parent instance whose parental_role is gestational (or,
      where no gestational parent is recorded, whose certificate_label indicates ''mother''). Retained
      for compatibility with UN DESA Principles and Recommendations for a Vital Statistics System, Rev
      3 (2014), which organizes birth-statistics variables under ''Characteristics of the mother'' (Table
      III.1). Systems that satisfy UN DESA Rev 3 tabulation requirements can derive the ''mother'' statistical
      category by mapping parental_role: gestational to ''mother''. This is a statistical-tabulation helper
      field, not a modelling assertion that only one parent is a ''mother'' or that parenthood is gendered.'
    range: Parent
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Madre
      label_fr: Mère
      description_es: 'Referencia de conveniencia a la instancia de Parent cuyo parental_role es gestacional
        (o, cuando no se registra ningún progenitor gestacional, cuyo certificate_label indica ''madre'').
        Se conserva para compatibilidad con los Principios y Recomendaciones para un Sistema de Estadísticas
        Vitales de ONU DESA, Rev. 3 (2014), que organiza las variables estadísticas de nacimientos bajo
        ''Características de la madre'' (Tabla III.1). Los sistemas que satisfacen los requisitos de tabulación
        de ONU DESA Rev. 3 pueden derivar la categoría estadística ''madre'' asignando parental_role:
        gestacional a ''madre''. Este es un campo auxiliar de tabulación estadística, no una afirmación
        de modelado de que solo un progenitor es ''madre'' o de que la parentalidad esté determinada por
        el género.'
      description_fr: 'Référence pratique à l''instance de Parent dont le parental_role est gestationnel
        (ou, en l''absence de parent gestationnel enregistré, dont le certificate_label indique ''mère'').
        Conservé pour la compatibilité avec les Principes et recommandations pour un système de statistiques
        de l''état civil de l''ONU DESA, Rév. 3 (2014), qui organise les variables statistiques relatives
        aux naissances sous ''Caractéristiques de la mère'' (Tableau III.1). Les systèmes qui satisfont
        aux exigences de tabulation de l''ONU DESA Rév. 3 peuvent dériver la catégorie statistique ''mère''
        en associant parental_role : gestationnel à ''mère''. Ce champ est un auxiliaire de tabulation
        statistique, et non une affirmation de modélisation selon laquelle un seul parent serait une ''mère''
        ou que la parenté serait genrée.'
      domain_override: crvs
      bibliography_refs: '["un-vital-stats-rev3"]'
  nationality_at_birth:
    slot_uri: publicschema:nationality_at_birth
    title: Nationality at birth
    description: The nationality acquired by the child at the time of birth, typically derived from parentage
      (jus sanguinis) or place of birth (jus soli) according to the applicable national law.
    range: Country
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Nacionalidad al nacer
      label_fr: Nationalité à la naissance
      description_es: La nacionalidad adquirida por el niño o la niña al momento del nacimiento, típicamente
        derivada de la filiación (jus sanguinis) o del lugar de nacimiento (jus soli) según la ley nacional
        aplicable.
      description_fr: La nationalité acquise par l'enfant au moment de la naissance, généralement déterminée
        par la filiation (jus sanguinis) ou le lieu de naissance (jus soli) selon la loi nationale applicable.
      domain_override: crvs
      bibliography_refs: '["iso-3166-1"]'
  originating_event:
    slot_uri: publicschema:originating_event
    title: Originating event
    description: The vital event that this civil status record attests to (the birth behind a birth record,
      the marriage behind a marriage record, etc.). Anchors the record to its underlying occurrence.
    range: VitalEvent
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Evento de origen
      label_fr: événement d'origine
      description_es: El evento vital que esta acta de estado civil acredita (el nacimiento que dio origen
        al acta de nacimiento, el matrimonio que dio origen al acta de matrimonio, etc.). Vincula el acta
        al suceso subyacente.
      description_fr: L'événement d'état civil que cet acte atteste (la naissance derrière un acte de
        naissance, le mariage derrière un acte de mariage, etc.). Rattache l'acte à l'événement sous-jacent.
      domain_override: crvs
  parental_role:
    slot_uri: publicschema:parental_role
    title: Parental role
    description: The role-nature of the parent relationship (biological, gestational, legal, or adoptive),
      decoupled from gender. Makes the nature of parentage explicit and separable from the parent's identity.
      For jurisdictions requiring gendered or positional labels on the printed certificate, use certificate_label
      alongside this property.
    range: ParentalRole
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Rol parental
      label_fr: Rôle parental
      description_es: La naturaleza del rol parental (biológico, gestacional, legal o adoptivo), desacoplada
        del género. Hace explícita y separable la naturaleza de la parentalidad respecto a la identidad
        del progenitor. Para las jurisdicciones que exigen etiquetas de género o posicionales en el certificado
        impreso, use certificate_label junto con esta propiedad.
      description_fr: La nature du rôle parental (biologique, gestationnel, légal ou adoptif), découplée
        du genre. Rend explicite et séparable la nature de la parenté par rapport à l'identité du parent.
        Pour les juridictions qui exigent des étiquettes genrées ou positionnelles sur le certificat imprimé,
        utilisez certificate_label en complément de cette propriété.
      domain_override: crvs
      bibliography_refs: '["fhir-v3-role-code"]'
  parents:
    slot_uri: publicschema:parents
    title: Parents
    description: The parents of the child, each captured as a Parent link entity that combines a Person
      with a parental role-nature (biological, gestational, legal, or adoptive).
    range: Parent
    multivalued: true
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/mother.ts
    annotations:
      label_es: Progenitores
      label_fr: Parents
      description_es: Los progenitores del niño o de la niña, cada uno representado por una entidad de
        enlace Parent que combina una Persona con una naturaleza de rol parental (biológico, gestacional,
        legal o adoptivo).
      description_fr: Les parents de l'enfant, chacun représenté par une entité de lien Parent qui associe
        une Personne à une nature de rôle parental (biologique, gestationnel, légal ou adoptif).
      domain_override: crvs
      external_alignments_json: '[{"label": "Birth declaration field groups (mother.*, father.*, country-configured)",
        "match": "broad", "note": "In v2 there are no typed mother/father fields at the core level. Farajaland''s
        birth declaration form defines separate ''mother'' and ''father'' field groups in EventConfig.declaration
        using key prefixes. The semantic role matches but the structure is country-configured.", "uri":
        "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/mother.ts",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  party_1:
    slot_uri: publicschema:party_1
    title: Party 1
    description: One of the two parties to a marriage, divorce, or annulment. Ordering between party_1
      and party_2 is arbitrary and does not imply a role or precedence.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Parte 1
      label_fr: Partie 1
      description_es: Una de las dos partes de un matrimonio, divorcio o anulación. El orden entre party_1
        y party_2 es arbitrario y no implica rol ni precedencia.
      description_fr: L'une des deux parties à un mariage, un divorce ou une annulation. L'ordre entre
        party_1 et party_2 est arbitraire et n'implique ni rôle ni préséance.
      domain_override: crvs
      external_alignments_json: '[{"label": "Marriage party_1 declaration field (country-configured)",
        "match": "close", "note": "In v2 there are no core gendered marriage party slots. Party data lives
        in country-configured EventConfig.declaration fields. The gender-neutral party_1 maps to the first
        spouse defined by the country config.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  party_2:
    slot_uri: publicschema:party_2
    title: Party 2
    description: The second of the two parties to a marriage, divorce, or annulment. Ordering between
      party_1 and party_2 is arbitrary and does not imply a role or precedence.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Parte 2
      label_fr: Partie 2
      description_es: La segunda de las dos partes de un matrimonio, divorcio o anulación. El orden entre
        party_1 y party_2 es arbitrario y no implica rol ni precedencia.
      description_fr: La seconde des deux parties à un mariage, un divorce ou une annulation. L'ordre
        entre party_1 et party_2 est arbitraire et n'implique ni rôle ni préséance.
      domain_override: crvs
      external_alignments_json: '[{"label": "Marriage party_2 declaration field (country-configured)",
        "match": "close", "note": "In v2 there are no core gendered marriage party slots. Party data lives
        in country-configured EventConfig.declaration fields. The gender-neutral party_2 maps to the second
        spouse defined by the country config.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  place_type:
    slot_uri: publicschema:place_type
    title: Place type
    description: The category of place where the vital event occurred (health facility, home, en route,
      etc.). Complements the specific Location by describing what kind of setting it was.
    range: PlaceType
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tipo de lugar
      label_fr: Type de lieu
      description_es: La categoría de lugar donde ocurrió el evento vital (establecimiento de salud, hogar,
        en camino, etc.). Complementa la ubicación específica al describir qué tipo de entorno era.
      description_fr: La catégorie de lieu où l'événement d'état civil s'est produit (établissement de
        santé, domicile, en chemin, etc.). Complète la Localisation spécifique en décrivant le type de
        milieu concerné.
      domain_override: crvs
  previous_parents:
    slot_uri: publicschema:previous_parents
    title: Previous parents
    description: The parents whose legal relationship with the adoptee is modified or terminated by the
      adoption. Present in full adoption (where biological parental rights end); often absent in simple
      adoption (where they are preserved).
    range: Parent
    multivalued: true
    status: bibo:draft
    annotations:
      label_es: Progenitores anteriores
      label_fr: Parents précédents
      description_es: Los padres cuya relación legal con la persona adoptada se modifica o termina con
        la adopción. Presentes en la adopción plena (donde cesan los derechos parentales biológicos);
        a menudo ausentes en la adopción simple (donde se conservan).
      description_fr: Les parents dont le lien juridique avec l'adopté est modifié ou rompu par l'adoption.
        Présents dans l'adoption plénière (où les droits parentaux biologiques cessent); souvent absents
        dans l'adoption simple (où ils sont conservés).
      domain_override: crvs
      bibliography_refs: '["hague-intercountry-adoption"]'
  recognizing_parent:
    slot_uri: publicschema:recognizing_parent
    title: Recognizing parent
    description: The parent who is formally recognizing parentage of a child, for example a person acknowledging
      a child born outside marriage. Captured as a Parent link entity so the parental role-nature and
      establishment basis are explicit.
    range: Parent
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Progenitor reconociente
      label_fr: Parent reconnaissant
      description_es: El progenitor que reconoce formalmente la filiación de un hijo o hija, por ejemplo
        una persona que reconoce a un hijo nacido fuera del matrimonio. Representado como una entidad
        de enlace Parent para que la naturaleza del rol parental y la base de establecimiento sean explícitas.
      description_fr: Le parent qui reconnaît formellement la filiation d'un enfant, par exemple une personne
        reconnaissant un enfant né hors mariage. Représenté comme une entité de lien Parent afin que la
        nature du rôle parental et le fondement de l'établissement soient explicites.
      domain_override: crvs
  record_type:
    slot_uri: publicschema:record_type
    title: Record type
    description: 'The type of civil status record: birth, marriage, death, paternity recognition, supplementary
      judgment (jugement supplétif), or a court-ordered substitute record. Determines which original vital
      event the record attests to.'
    range: CivilStatusRecordType
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventDocument.ts#EventDocument
    annotations:
      label_es: Tipo de acta
      label_fr: Type d'acte
      description_es: 'El tipo de acta de estado civil: nacimiento, matrimonio, defunción, reconocimiento
        de paternidad, sentencia supletoria, o acta sustitutiva ordenada por tribunal. Determina a qué
        evento vital original acredita el acta.'
      description_fr: 'Le type d''acte d''état civil: naissance, mariage, décès, reconnaissance de paternité,
        jugement supplétif, ou acte de substitution ordonné par tribunal. Détermine à quel événement d''état
        civil original l''acte se rattache.'
      domain_override: crvs
      external_alignments_json: '[{"label": "EventDocument.type (country-configured string)", "match":
        "close", "note": "In v2, EventDocument.type is a free string set by the country config (e.g. ''birth'',
        ''death'', ''marriage''). This is the closest v2 equivalent to our record_type property; the correspondence
        is close but the v2 field is a string rather than an enum.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventDocument.ts#EventDocument",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  register_authority:
    slot_uri: publicschema:register_authority
    title: Register authority
    description: The authority that maintains the family register. Typically a municipal or ward-level
      civil registration office.
    range: Location
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Autoridad del registro
      label_fr: Autorité du registre
      description_es: La autoridad que mantiene el registro familiar. Generalmente una oficina de registro
        civil a nivel municipal o de distrito.
      description_fr: L'autorité qui tient le registre familial. Généralement un bureau d'état civil au
        niveau municipal ou d'arrondissement.
      domain_override: crvs
  register_number:
    slot_uri: publicschema:register_number
    title: Register number
    description: The unique number that identifies the family register within its issuing jurisdiction.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Número de registro
      label_fr: Numéro de registre
      description_es: El número único que identifica el registro familiar dentro de la jurisdicción que
        lo emite.
      description_fr: Le numéro unique qui identifie le registre familial au sein de la juridiction qui
        le délivre.
      domain_override: crvs
  registrar:
    slot_uri: publicschema:registrar
    title: Registrar
    description: The civil registration officer who recorded the event. In many jurisdictions this is
      the officer whose signature appears on the acte.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Registrador
      label_fr: Officier d'état civil
      description_es: El funcionario de registro civil que registró el evento. En muchas jurisdicciones,
        es el funcionario cuya firma aparece en el acta.
      description_fr: L'officier d'état civil qui a enregistré l'événement. Dans de nombreuses juridictions,
        il s'agit de l'officier dont la signature figure sur l'acte.
      domain_override: crvs
  registration_date:
    slot_uri: publicschema:registration_date
    title: Registration date
    description: The date on which the vital event was officially registered with the civil registration
      authority. May be later than the event date, especially for late registrations.
    range: date
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha de registro
      label_fr: Date d'enregistrement
      description_es: La fecha en que el evento vital fue registrado oficialmente ante la autoridad de
        registro civil. Puede ser posterior a la fecha del evento, especialmente para registros tardíos.
      description_fr: La date à laquelle l'événement d'état civil a été officiellement enregistré auprès
        de l'autorité d'état civil. Peut être postérieure à la date de l'événement, en particulier pour
        les enregistrements tardifs.
      domain_override: crvs
  registration_location:
    slot_uri: publicschema:registration_location
    title: Registration location
    description: The civil registration office where the vital event was registered. Often a municipal
      or district-level registry distinct from the place of occurrence.
    range: Location
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Lugar de registro
      label_fr: Lieu d'enregistrement
      description_es: La oficina de registro civil donde se registró el evento vital. A menudo es un registro
        municipal o distrital, distinto del lugar donde ocurrió el evento.
      description_fr: Le bureau d'état civil où l'événement a été enregistré. Souvent un bureau municipal
        ou de district, distinct du lieu où l'événement s'est produit.
      domain_override: crvs
  registration_status:
    slot_uri: publicschema:registration_status
    title: Registration status
    description: 'The lifecycle state of the registration process for this vital event: whether it is
      declared, pending validation, registered, rejected, cancelled, or has been corrected or archived.'
    range: RegistrationStatus
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventStatus
    annotations:
      label_es: Estado del registro
      label_fr: Statut de l'enregistrement
      description_es: 'El estado del ciclo de vida del proceso de registro para este evento vital: declarado,
        pendiente de validación, registrado, rechazado, cancelado, corregido o archivado.'
      description_fr: 'L''état du cycle de vie du processus d''enregistrement pour cet événement d''état
        civil: déclaré, en attente de validation, enregistré, rejeté, annulé, corrigé ou archivé.'
      domain_override: crvs
      external_alignments_json: '[{"label": "EventMetadata.status (EventStatus)", "match": "related",
        "note": "In v2, EventMetadata.status is derived from the action log and carries one of five values
        (CREATED, NOTIFIED, DECLARED, REGISTERED, ARCHIVED). PublicSchema records only the current status;
        the action log provides the full audit trail.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventStatus",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  registration_type:
    slot_uri: publicschema:registration_type
    title: Registration type
    description: 'The regime under which the registration was processed: current (within the legal window),
      late, court-ordered, or reconstruction of a lost record. Affects legal weight and downstream uses.'
    range: RegistrationType
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tipo de registro
      label_fr: Type d'enregistrement
      description_es: 'El régimen bajo el cual se procesó el registro: corriente (dentro del plazo legal),
        tardío, ordenado por tribunal, o reconstitución de un acta perdida. Afecta el peso legal y los
        usos posteriores.'
      description_fr: 'Le régime selon lequel l''enregistrement a été traité: courant (dans le délai légal),
        tardif, ordonné par un tribunal, ou reconstitution d''un acte perdu. Influe sur la valeur juridique
        et les usages ultérieurs.'
      domain_override: crvs
  sex_at_birth:
    slot_uri: publicschema:sex_at_birth
    title: Sex at birth
    description: The sex of the child as observed and recorded at the time of birth. Distinct from any
      later legal or administrative sex marker.
    range: Sex
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts
    annotations:
      label_es: Sexo al nacer
      label_fr: Sexe à la naissance
      description_es: El sexo del niño o de la niña tal como se observa y registra en el momento del nacimiento.
        Distinto de cualquier marcador de sexo legal o administrativo posterior.
      description_fr: Le sexe de l'enfant tel qu'observé et consigné au moment de la naissance. Distinct
        de tout marqueur de sexe légal ou administratif ultérieur.
      domain_override: crvs
      external_alignments_json: '[{"label": "Child gender/sex declaration field (country-configured)",
        "match": "close", "note": "In v2 there is no core gender/sex enum. Farajaland''s birth declaration
        defines a gender field on the child field group as a country-configured SELECT. The sex vocabulary
        system_mappings apply.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-bfdr", "iso-5218"]'
  termination_type:
    slot_uri: publicschema:termination_type
    title: Termination type
    description: Whether the marriage was terminated by divorce (dissolution of a valid marriage) or by
      annulment (declaration that the marriage was void from its inception).
    range: MarriageTerminationType
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tipo de disolución
      label_fr: Type de dissolution
      description_es: Indica si el matrimonio fue disuelto por divorcio (disolución de un matrimonio válido)
        o por anulación (declaración de que el matrimonio era nulo desde el origen).
      description_fr: Indique si le mariage a été dissous par divorce (dissolution d'un mariage valide)
        ou par annulation (déclaration que le mariage était nul ab initio).
      domain_override: crvs
  triggering_vital_event:
    slot_uri: publicschema:triggering_vital_event
    title: Triggering vital event
    description: The vital event that triggered this record. On CivilStatusAnnotation the referenced VitalEvent
      identifies the later marriage, divorce, death, paternity recognition, or adoption that prompted
      the marginal annotation on the original acte.
    range: VitalEvent
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Evento vital desencadenante
      label_fr: Événement d'état civil déclencheur
      description_es: El evento vital que desencadenó este registro. En CivilStatusAnnotation, el VitalEvent
        referenciado identifica el matrimonio, divorcio, defunción, reconocimiento de paternidad o adopción
        posterior que motivó la anotación marginal en el acta original.
      description_fr: L'événement d'état civil qui a déclenché cet enregistrement. Sur CivilStatusAnnotation,
        le VitalEvent référencé identifie le mariage, le divorce, le décès, la reconnaissance de paternité
        ou l'adoption ultérieurs qui ont motivé la mention marginale sur l'acte original.
      category: vital_event
  type_of_marriage:
    slot_uri: publicschema:type_of_marriage
    title: Type of marriage
    description: 'The legal regime under which the marriage was contracted: civil, religious, customary,
      or common law. Determines which authority registered or recognized the union and how subsequent
      terminations are handled.'
    range: MarriageType
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Tipo de matrimonio
      label_fr: Type de mariage
      description_es: 'El régimen jurídico bajo el cual se contrajo el matrimonio: civil, religioso, consuetudinario
        o de hecho. Determina qué autoridad registró o reconoció la unión y cómo se gestionan las terminaciones
        posteriores.'
      description_fr: 'Le régime juridique sous lequel le mariage a été contracté: civil, religieux, coutumier
        ou de fait. Détermine quelle autorité a enregistré ou reconnu l''union et la manière dont les
        dissolutions ultérieures sont traitées.'
      domain_override: crvs
      external_alignments_json: '[{"label": "Type of marriage declaration field (country-configured)",
        "match": "close", "note": "In v2 there is no core typeOfMarriage field. The field is a country-configured
        SELECT in EventConfig.declaration. Our marriage-type vocabulary recommends a canonical set.",
        "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
  vital_event:
    slot_uri: publicschema:vital_event
    title: Vital event
    description: The vital event that this certificate attests to. Used on certificates issued directly
      from a vital event record rather than from a stored civil status record.
    range: VitalEvent
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Evento vital
      label_fr: Événement d'état civil
      description_es: El evento vital que acredita este certificado. Utilizado en certificados emitidos
        directamente a partir de un registro de evento vital, en lugar de un acta de estado civil almacenada.
      description_fr: L'événement d'état civil attesté par ce certificat. Utilisé sur les certificats
        délivrés directement à partir d'un enregistrement d'événement d'état civil plutôt qu'à partir
        d'un acte d'état civil conservé.
      domain_override: crvs
  weight:
    slot_uri: publicschema:weight
    title: Weight
    description: The weight of the fetus at the time of a fetal death, recorded in grams. Combined with
      gestational age, used to classify viability and stillbirth type.
    range: decimal
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Peso
      label_fr: Poids
      description_es: El peso del feto al momento de la muerte fetal, registrado en gramos. Combinado
        con la edad gestacional, se utiliza para clasificar la viabilidad y el tipo de muerte fetal.
      description_fr: Le poids du fœtus au moment de la mortinaissance, enregistré en grammes. Combiné
        à l'âge gestationnel, sert à classer la viabilité et le type de mortinaissance.
      domain_override: crvs
      bibliography_refs: '["who-preterm-lbw-care-2022"]'
  weight_at_birth:
    slot_uri: publicschema:weight_at_birth
    title: Weight at birth
    description: The weight of the child at birth, recorded in grams. A core UN Principles and Recommendations
      vital statistics variable used to identify low birth weight.
    range: decimal
    multivalued: false
    status: bibo:draft
    exact_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent
    annotations:
      label_es: Peso al nacer
      label_fr: Poids à la naissance
      description_es: El peso del niño o de la niña al nacer, registrado en gramos. Variable clave de
        los Principios y Recomendaciones de las Naciones Unidas sobre estadísticas vitales, utilizada
        para identificar el bajo peso al nacer.
      description_fr: Le poids de l'enfant à la naissance, enregistré en grammes. Variable essentielle
        des Principes et Recommandations des Nations Unies sur les statistiques de l'état civil, utilisée
        pour identifier l'insuffisance pondérale à la naissance.
      domain_override: crvs
      external_alignments_json: '[{"label": "Weight at birth declaration field (country-configured)",
        "match": "exact", "note": "In v2 there is no core weightAtBirth field. The field is a country-configured
        numeric field in EventConfig.declaration.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-bfdr", "un-vital-stats-rev3", "who-preterm-lbw-care-2022"]'
  witnesses:
    slot_uri: publicschema:witnesses
    title: Witnesses
    description: People who witnessed the vital event and attested to it at the time of registration.
      Witness requirements vary by jurisdiction and event type (marriages most commonly require them).
    range: CrvsPerson
    multivalued: true
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Testigos
      label_fr: Témoins
      description_es: Personas que presenciaron el evento vital y lo atestiguaron al momento del registro.
        Los requisitos de testigos varían según la jurisdicción y el tipo de evento (los matrimonios los
        exigen con mayor frecuencia).
      description_fr: Personnes qui ont été témoins de l'événement d'état civil et qui l'ont attesté au
        moment de l'enregistrement. Les exigences en matière de témoins varient selon la juridiction et
        le type d'événement (les mariages en exigent le plus souvent).
      domain_override: crvs
      external_alignments_json: '[{"label": "Witness declaration field group (country-configured)", "match":
        "broad", "note": "In v2 there are no core witness fields. Witness data is a country-configured
        field group in EventConfig.declaration. Our witnesses list has unlimited cardinality.", "uri":
        "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
