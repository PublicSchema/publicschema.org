classes:
  Adoption:
    class_uri: publicschema:Adoption
    title: Adoption
    description: 'A legal act by which one or more persons acquire the status of parent to a child, creating
      a parent-child relationship that did not previously exist in law. Distinguishes full adoption (where
      prior biological filiation is replaced) from simple adoption (where it is preserved alongside the
      new bond), following civil-law traditions and the Hague Convention on Intercountry Adoption.

      '
    is_a: VitalEvent
    slots:
    - adoptee
    - adoptive_parents
    - previous_parents
    - adoption_type
    - judgment_date
    - judgment_reference
    - court
    status: bibo:draft
    annotations:
      label_es: Adopción
      label_fr: Adoption
      description_es: Un acto jurídico por el cual una o varias personas adquieren la calidad de progenitores
        de un niño o niña, creando una relación de filiación que no existía previamente en derecho. Distingue
        la adopción plena (donde la filiación biológica anterior es sustituida) de la adopción simple
        (donde se conserva junto al nuevo vínculo), siguiendo las tradiciones de derecho civil y el Convenio
        de La Haya sobre adopción internacional.
      description_fr: Un acte juridique par lequel une ou plusieurs personnes acquièrent le statut de
        parent d'un enfant, créant une relation parent-enfant qui n'existait pas auparavant en droit.
        Distingue l'adoption plénière (où la filiation biologique antérieure est remplacée) de l'adoption
        simple (où elle est conservée parallèlement au nouveau lien), suivant les traditions de droit
        civil et la Convention de La Haye sur l'adoption internationale.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "Adoption is
        not modelled as a distinct event type in OpenCRVS v2 core or the Farajaland reference config.
        Adoption scenarios would require a country-specific EventConfig.", "vocabulary": "OpenCRVS v2
        event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["crc-convention", "hague-intercountry-adoption", "un-vital-stats-rev3"]'
  Birth:
    class_uri: publicschema:Birth
    title: Birth
    description: 'A live birth, meaning the complete expulsion or extraction of a product of conception
      from its mother, irrespective of duration of pregnancy, which after such separation breathes or
      shows any other evidence of life. Captures the child, the parents, and attributes used by civil
      registration and vital statistics (sex at birth, birth order, attendant, weight, place type).

      '
    is_a: VitalEvent
    slots:
    - child
    - parents
    - sex_at_birth
    - nationality_at_birth
    - place_type
    - birth_type
    - birth_order
    - weight_at_birth
    - attendant_at_birth
    status: bibo:status/forthcoming
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent
    annotations:
      label_es: Nacimiento
      label_fr: Naissance
      description_es: Un nacimiento vivo, es decir, la expulsión o extracción completa del producto de
        la concepción fuera del cuerpo de la madre, independientemente de la duración del embarazo, que
        tras dicha separación respira o muestra cualquier otra señal de vida. Recoge al niño o niña, a
        los padres y los atributos utilizados por el registro civil y las estadísticas vitales (sexo al
        nacer, orden de nacimiento, persona que atendió, peso, tipo de lugar).
      description_fr: Une naissance vivante, c'est-à-dire l'expulsion ou l'extraction complète du produit
        de la conception hors du corps de la mère, indépendamment de la durée de la grossesse, et qui,
        après cette séparation, respire ou manifeste tout autre signe de vie. Recueille les données relatives
        à l'enfant, aux parents et aux attributs utilisés par l'état civil et les statistiques vitales
        (sexe à la naissance, ordre de naissance, personne ayant assisté à l'accouchement, poids, type
        de lieu).
      featured: true
      source_domain: crvs
      external_alignments_json: '[{"label": "EventDocument (type=''birth'', country-configured)", "match":
        "broad", "note": "In v2 core, a birth is an EventDocument whose type string is the country-configured
        birth event id. All birth-specific fields (child name, parents, birth type, attendant, weight)
        live in EventConfig.declaration. The EventDocument envelope is broader than our Birth concept;
        Farajaland''s birthEvent defines the reference implementation.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["crc-convention", "fhir-bfdr", "un-vital-stats-rev3", "who-intrapartum-care-2018",
        "who-preterm-lbw-care-2022", "who-skilled-birth-attendants-2018"]'
  Certificate:
    class_uri: publicschema:Certificate
    title: Certificate
    description: 'A document issued from a civil status record or vital event that attests to the event
      for external use. Distinct from the underlying record: certificates can be issued repeatedly, in
      different formats (full copy, extract, multilingual extract under ICCS/CIEC conventions), and by
      different offices (for example, an embassy issuing an extract of a record held in the country of
      origin).

      '
    is_a: CivilStatusDocument
    slots:
    - vital_event
    - civil_status_record
    - certificate_number
    - issue_date
    - issuing_office
    - certificate_document_type
    - certificate_format
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#PrintCertificateAction
    annotations:
      label_es: Certificado
      label_fr: Certificat
      description_es: 'Un documento emitido a partir de un acta de estado civil o de un evento vital,
        que acredita dicho evento para uso externo. Distinto del acta subyacente: los certificados pueden
        emitirse repetidamente, en distintos formatos (copia íntegra, extracto, extracto multilingüe bajo
        las convenciones CIEC) y por distintas oficinas (por ejemplo, una embajada que emite un extracto
        de un acta conservada en el país de origen).'
      description_fr: 'Un document délivré à partir d''un acte d''état civil ou d''un fait vital, attestant
        de cet événement pour un usage externe. Distinct de l''acte sous-jacent: les certificats peuvent
        être délivrés de manière répétée, sous différents formats (copie intégrale, extrait, extrait plurilingue
        selon les conventions CIEC) et par différents bureaux (par exemple, une ambassade délivrant un
        extrait d''un acte conservé dans le pays d''origine).'
      featured: true
      source_domain: crvs
      external_alignments_json: '[{"label": "PrintCertificateAction", "match": "related", "note": "PrintCertificateAction
        is an ActionDocument variant (type=PRINT_CERTIFICATE) that carries an optional content.templateId.
        This records the act of printing rather than the certificate as a legal document object; the match
        has narrowed from v1''s close to related because the v2 action is structurally thinner than our
        Certificate concept.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#PrintCertificateAction",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["eu-reg-2016-1191", "iccs-convention-16", "iccs-convention-26", "iccs-convention-33",
        "iccs-convention-34", "un-vital-stats-rev3"]'
  CivilStatusAnnotation:
    class_uri: publicschema:CivilStatusAnnotation
    title: Civil Status Annotation
    description: 'A marginal annotation (mention marginale) added to a civil status record to reflect
      a later vital event or administrative change. Examples include a marriage noted on the birth record
      of a spouse, a divorce noted on a marriage record, or a court-ordered correction. The annotation
      mechanism is how civil-law registries maintain a coherent civil identity over time without rewriting
      the original acte.

      '
    slots:
    - civil_status_record
    - triggering_vital_event
    - annotation_date
    - annotating_authority
    - annotation_type
    - annotation_text
    status: bibo:draft
    annotations:
      label_es: Anotación de estado civil
      label_fr: Annotation d'état civil
      description_es: 'Una anotación marginal añadida a un acta de estado civil para reflejar un evento
        vital posterior o un cambio administrativo. Entre los ejemplos se encuentran: un matrimonio anotado
        en el acta de nacimiento de un cónyuge, un divorcio anotado en un acta de matrimonio o una corrección
        ordenada por un tribunal. El mecanismo de anotaciones es la forma en que los registros de derecho
        civil mantienen una identidad civil coherente en el tiempo sin reescribir el acta original.'
      description_fr: 'Une mention marginale ajoutée à un acte d''état civil pour refléter un événement
        d''état civil ultérieur ou une modification administrative. Exemples: un mariage indiqué sur l''acte
        de naissance d''un conjoint, un divorce indiqué sur un acte de mariage, ou une correction ordonnée
        par le tribunal. C''est par ce mécanisme des mentions que les registres d''état civil maintiennent
        une identité civile cohérente dans le temps sans réécrire l''acte original.'
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        has no reified marginal-annotation type. Corrections flow through the correction action sequence
        (REQUEST_CORRECTION/APPROVE_CORRECTION) recorded in the action log, which is a trail of actions
        rather than a typed annotation with its own authority and triggering event.", "vocabulary": "OpenCRVS
        v2 event service", "vocabulary_id": "opencrvs"}]'
  CivilStatusDocument:
    class_uri: publicschema:CivilStatusDocument
    title: Civil Status Document
    description: 'An administrative document that records civil-status facts about one or more persons.
      Distinct from the concepts (Birth, Marriage, Death, etc.) that describe the underlying events themselves:
      those are the occurrences; CivilStatusDocument is the paper or electronic artefact that attests
      to or summarises them. Examples include a birth certificate, a marriage certificate, and a family
      register (livret de famille, koseki, hukou).

      '
    slots:
    - issuing_authority
    - issue_date
    status: bibo:draft
    annotations:
      label_es: Documento de estado civil
      label_fr: Document d'état civil
      description_es: 'Un documento administrativo que registra hechos del estado civil de una o más personas.
        Distinto de los conceptos (Nacimiento, Matrimonio, Defunción, etc.) que describen los propios
        eventos subyacentes: esos son las ocurrencias; CivilStatusDocument es el artefacto en papel o
        electrónico que los acredita o resume. Ejemplos: certificado de nacimiento, certificado de matrimonio,
        registro familiar (livret de famille, koseki, hukou).'
      description_fr: 'Un document administratif qui consigne des faits d''état civil concernant une ou
        plusieurs personnes. Distinct des concepts (Naissance, Mariage, Décès, etc.) qui décrivent les
        événements sous-jacents eux-mêmes : ceux-ci sont les faits; CivilStatusDocument est la pièce papier
        ou électronique qui en atteste ou les résume. Exemples: certificat de naissance, certificat de
        mariage, registre de famille (livret de famille, koseki, hukou).'
      source_domain: crvs
      external_alignments_json: '[{"label": "No direct equivalent", "match": "none", "note": "OpenCRVS
        v2 models Certificate separately from registration records and has no family-register concept.
        A shared document supertype has no counterpart.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id":
        "opencrvs"}]'
    abstract: true
  CivilStatusRecord:
    class_uri: publicschema:CivilStatusRecord
    title: Civil Status Record
    description: 'The official written record (acte) held by a civil registration authority that attests
      to a vital event. In civil-law traditions, this is the persistent legal document that accumulates
      marginal annotations over time and from which certificates are issued. Distinct from the vital event
      itself (the underlying occurrence) and from certificates (the documents produced from the record
      on demand).

      '
    slots:
    - identifiers
    - record_type
    - originating_event
    - annotations
    - person
    - issuing_authority_location
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#RegisterAction
    annotations:
      label_es: Registro de estado civil
      label_fr: Registre d'état civil
      description_es: El registro oficial escrito (acta) que conserva una autoridad de registro civil
        y que acredita un evento vital. En las tradiciones de derecho civil, es el documento jurídico
        permanente que acumula anotaciones marginales a lo largo del tiempo y a partir del cual se emiten
        los certificados. Distinto del evento vital en sí (el suceso subyacente) y de los certificados
        (los documentos que se producen a partir del acta a solicitud).
      description_fr: L'acte officiel conservé par une autorité d'état civil qui atteste d'un événement
        d'état civil. Dans les traditions de droit civil, il s'agit du document juridique pérenne qui
        accumule des mentions marginales au fil du temps et à partir duquel les certificats sont délivrés.
        Distinct de l'événement d'état civil lui-même (l'occurrence sous-jacente) et des certificats (les
        documents produits à partir de l'acte à la demande).
      source_domain: crvs
      external_alignments_json: '[{"label": "RegisterAction", "match": "related", "note": "RegisterAction
        is an ActionDocument variant (type=REGISTER) that carries the registrationNumber. This is the
        closest v2 core equivalent to CivilStatusRecord: the act of registration produces a legal identifier.
        However, RegisterAction is an action within an EventDocument, not a standalone record; the structural
        roles differ.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#RegisterAction",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["iccs-convention-26", "iccs-convention-33", "un-vital-stats-rev3"]'
  Death:
    class_uri: publicschema:Death
    title: Death
    description: 'The permanent disappearance of all evidence of life at any time after a live birth has
      taken place. Captures the deceased person, the cause and manner of death, the method used to ascertain
      cause, and the medical certifier. Aligned with the WHO definition and the ICD structure for cause-of-death
      classification.

      '
    is_a: VitalEvent
    slots:
    - deceased
    - place_type
    - cause_of_death
    - cause_of_death_code
    - cause_of_death_coding_system
    - manner_of_death
    - cause_of_death_method
    - medical_certifier
    status: bibo:status/forthcoming
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent
    annotations:
      label_es: Defunción
      label_fr: Décès
      description_es: La desaparición permanente de toda manifestación de vida en cualquier momento tras
        haber ocurrido un nacimiento vivo. Recoge a la persona fallecida, la causa y la manera de la defunción,
        el método utilizado para determinar la causa y el certificador médico. Alineado con la definición
        de la OMS y la estructura CIE para la clasificación de causas de defunción.
      description_fr: La disparition permanente de toute trace de vie à un moment quelconque après la
        naissance vivante. Recueille les données relatives à la personne décédée, à la cause et à la manière
        du décès, à la méthode utilisée pour déterminer la cause et au certificateur médical. Conforme
        à la définition de l'OMS et à la structure de la CIM pour la classification des causes de décès.
      featured: true
      source_domain: crvs
      external_alignments_json: '[{"label": "EventDocument (type=''death'', country-configured)", "match":
        "broad", "note": "In v2 core, a death is an EventDocument whose type string is the country-configured
        death event id. All death-specific fields (deceased name, cause of death, manner of death, medical
        certifier) live in EventConfig.declaration. Farajaland''s deathEvent defines the reference implementation.",
        "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "icd-10", "icd-11", "un-vital-stats-rev3", "who-icd-manner-of-death",
        "who-medical-cert-death", "who-verbal-autopsy-2022"]'
  Event:
    class_uri: publicschema:Event
    title: Event
    description: 'Something that happens at a specific time or over a bounded period within a delivery
      system. Event is the shared supertype for records that capture occurrences (assessments, decisions,
      payments, deliveries, referrals, etc.), as distinct from standing entities like persons, groups,
      or programs.

      '
    slots:
    - identifiers
    status: bibo:status/published
    annotations:
      label_es: Evento
      label_fr: Événement
      description_es: Algo que ocurre en un momento específico o durante un período delimitado dentro
        de un sistema de prestación. Event es el supertipo compartido para los registros que capturan
        ocurrencias (evaluaciones, decisiones, pagos, entregas, derivaciones, etc.), distintos de las
        entidades permanentes como personas, grupos o programas.
      description_fr: Quelque chose qui se produit à un moment précis ou sur une période délimitée au
        sein d'un système de prestation. Event est le supertype partagé pour les enregistrements qui capturent
        des occurrences (évaluations, décisions, paiements, remises de prestations, orientations, etc.),
        distincts des entités permanentes comme les personnes, les groupes ou les programmes.
      external_alignments_json: '[{"label": "N/A", "match": "none", "note": "SEMIC Core Vocabularies do
        not define a generic event supertype. Domain-specific events are modeled directly.", "vocabulary":
        "Core Vocabularies", "vocabulary_id": "semic"}, {"label": "N/A", "match": "none", "note": "DCI
        does not define a generic event supertype. Timestamped occurrences are modeled as properties on
        domain entities.", "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"notes": "Event is a PublicSchema abstract supertype; no mapped system exposes
        an event supertype by that name, so system_count is reported as 0/6 per the convention stated
        in design-principles.md section 3. All six systems nonetheless model timestamped occurrence records
        (payments, assessments, decisions, referrals) that map to concrete Event subtypes, and those subtypes
        carry their own convergence evidence.\n", "system_count": 0, "total_systems": 6}'
      bibliography_refs: '["schema-org", "semic-core-public-event"]'
    abstract: true
  FamilyRegister:
    class_uri: publicschema:FamilyRegister
    title: Family Register
    description: 'A record that tracks a family unit over time, centered on a head of household. Members
      are reached through the linked Family, which exposes GroupMembership entries for each person with
      their role (head, spouse, child, etc.) and entry or exit dates. Distinct from the event-based acte
      tradition: family registers (koseki in Japan, hukou in China, livret de famille in France) maintain
      a running view of the family as vital events occur. Status captures whether the register is active,
      closed, split, or merged.

      '
    is_a: CivilStatusDocument
    slots:
    - family
    - head_of_household
    - register_number
    - register_authority
    - creation_date
    - family_register_status
    status: bibo:draft
    annotations:
      label_es: Registro de familia
      label_fr: Registre de famille
      description_es: 'Un registro que da seguimiento a una unidad familiar a lo largo del tiempo, centrado
        en una jefatura de hogar. Se accede a los miembros a través de la Familia vinculada, que expone
        las entradas de GroupMembership de cada persona con su rol (jefe de hogar, cónyuge, hijo, etc.)
        y las fechas de entrada o salida. Distinto de la tradición de actas por evento: los registros
        familiares (koseki en Japón, hukou en China, libro de familia en Francia) mantienen una visión
        continua de la familia a medida que ocurren los eventos vitales. El estado indica si el registro
        está activo, cerrado, dividido o fusionado.'
      description_fr: 'Un registre qui suit une unité familiale dans le temps, centré sur un chef de famille.
        Les membres sont accessibles via la Famille liée, qui expose les GroupMembership de chaque personne
        avec son rôle (chef de famille, conjoint, enfant, etc.) et ses dates d''entrée ou de sortie. Distinct
        de la tradition des actes par événement: les registres familiaux (koseki au Japon, hukou en Chine,
        livret de famille en France) maintiennent une vue continue de la famille à mesure que surviennent
        les événements d''état civil. Le statut indique si le registre est actif, clôturé, scindé ou fusionné.'
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        is event-record centric and has no concept of a family register (livret de famille, koseki, hukou).
        Families are not modelled as a tracked unit.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id":
        "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  FetalDeath:
    class_uri: publicschema:FetalDeath
    title: Fetal Death
    description: 'Death prior to the complete expulsion or extraction of a product of conception from
      its mother, irrespective of the duration of pregnancy. Distinct from live Birth followed by Death,
      and from miscarriages below viability thresholds set by national law. Captures gestational age,
      weight, and coded cause of fetal death using ICD-PM where available.

      '
    is_a: VitalEvent
    slots:
    - parents
    - place_type
    - attendant_at_birth
    - gestational_age
    - weight
    - cause_of_fetal_death
    - cause_of_fetal_death_code
    - cause_of_fetal_death_coding_system
    - medical_certifier
    status: bibo:draft
    annotations:
      label_es: Muerte fetal
      label_fr: Mort fœtale
      description_es: Defunción ocurrida antes de la expulsión o extracción completa del producto de la
        concepción del cuerpo de la madre, con independencia de la duración del embarazo. Distinta de
        un nacimiento vivo seguido de defunción, y de los abortos espontáneos por debajo de los umbrales
        de viabilidad fijados por la ley nacional. Captura la edad gestacional, el peso y la causa codificada
        de muerte fetal utilizando la CIE-PM cuando esté disponible.
      description_fr: Décès survenu avant l'expulsion ou l'extraction complète du produit de la conception
        hors du corps de la mère, indépendamment de la durée de la grossesse. Distinct d'une naissance
        vivante suivie d'un décès, et des fausses couches en deçà des seuils de viabilité fixés par la
        loi nationale. Recueille l'âge gestationnel, le poids et la cause codée de décès fœtal, en utilisant
        la CIM-PM lorsqu'elle est disponible.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        does not model fetal death as a distinct event. The field BirthRegistration.foetalDeathsToMother
        is a statistical count on the mother''s birth record, not a registration of the fetal death itself.",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-bfdr", "fhir-vrdr", "icd-pm", "un-vital-stats-rev3", "who-cert-perinatal-death",
        "who-preterm-lbw-care-2022"]'
  Legitimation:
    class_uri: publicschema:Legitimation
    title: Legitimation
    description: 'The act by which a child previously born outside marriage acquires the legal status
      of a child born within marriage, typically following the subsequent marriage of the biological parents.
      Relevant in jurisdictions where the status of the child still varies by marital context.

      '
    is_a: VitalEvent
    slots:
    - child
    - parents
    - birth_ref
    - judgment_date
    - judgment_reference
    - court
    status: bibo:draft
    annotations:
      label_es: Legitimación
      label_fr: Légitimation
      description_es: El acto por el cual un hijo o hija nacido previamente fuera del matrimonio adquiere
        el estatus jurídico de hijo o hija nacido dentro del matrimonio, generalmente tras el matrimonio
        posterior de los progenitores biológicos. Relevante en jurisdicciones en las que la condición
        jurídica del menor aún varía según el contexto marital.
      description_fr: L'acte par lequel un enfant précédemment né hors mariage acquiert le statut juridique
        d'enfant né dans le mariage, généralement à la suite du mariage ultérieur des parents biologiques.
        Pertinent dans les juridictions où le statut de l'enfant varie encore selon la situation matrimoniale
        des parents.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "Legitimation
        is not modelled in OpenCRVS v2 core. Like paternity recognition, it would be handled operationally
        as a correction on an existing birth record rather than as a distinct event type.", "vocabulary":
        "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  MarriageTermination:
    class_uri: publicschema:MarriageTermination
    title: Marriage Termination
    description: 'The legal end of a marriage while both parties are alive, whether by divorce (dissolution
      of a valid marriage) or annulment (declaration that the marriage was invalid from the outset). The
      termination_type property distinguishes the two. Death of a spouse ends the marriage but is recorded
      as a Death, not a MarriageTermination.

      '
    is_a: VitalEvent
    slots:
    - party_1
    - party_2
    - marriage_ref
    - termination_type
    - judgment_date
    - judgment_reference
    - court
    status: bibo:status/forthcoming
    annotations:
      label_es: Disolución del matrimonio
      label_fr: Dissolution du mariage
      description_es: El fin jurídico de un matrimonio cuando ambas partes están vivas, ya sea por divorcio
        (disolución de un matrimonio válido) o por anulación (declaración de que el matrimonio era nulo
        desde el origen). La propiedad termination_type distingue ambos casos. La defunción de un cónyuge
        pone fin al matrimonio pero se registra como una Defunción, no como una MarriageTermination.
      description_fr: La fin juridique d'un mariage du vivant des deux parties, que ce soit par divorce
        (dissolution d'un mariage valide) ou par annulation (déclaration que le mariage était nul dès
        l'origine). La propriété termination_type distingue les deux cas. Le décès d'un conjoint met fin
        au mariage mais est enregistré comme un Décès, pas comme une MarriageTermination.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "Neither divorce
        nor annulment is modelled in OpenCRVS v2 core, so this concept has no counterpart.", "vocabulary":
        "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  Marriage:
    class_uri: publicschema:Marriage
    title: Marriage
    description: 'The legal union of two persons under the applicable law. Captures the two parties, witnesses,
      and the type of marriage (civil, religious, customary, common law). Treated as a vital event rather
      than a standing relationship, since what is being registered is the occurrence that creates legal
      spousal status.

      '
    is_a: VitalEvent
    slots:
    - party_1
    - party_2
    - witnesses
    - type_of_marriage
    status: bibo:status/forthcoming
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Matrimonio
      label_fr: Mariage
      description_es: La unión legal de dos personas según la ley aplicable. Captura a las dos partes,
        los testigos y el tipo de matrimonio (civil, religioso, consuetudinario, de hecho). Tratada como
        un evento vital y no como una relación permanente, ya que lo que se registra es el suceso que
        crea el estatus jurídico de cónyuge.
      description_fr: L'union légale de deux personnes selon la loi applicable. Saisit les deux parties,
        les témoins et le type de mariage (civil, religieux, coutumier, de fait). Traité comme un événement
        d'état civil plutôt que comme une relation permanente, car ce qui est enregistré est l'événement
        qui crée le statut juridique de conjoint.
      featured: true
      source_domain: crvs
      external_alignments_json: '[{"label": "EventDocument (type=''marriage'', country-configured)", "match":
        "broad", "note": "In v2 core, a marriage is an EventDocument whose type string is the country-configured
        marriage event id (Farajaland Event enum defines Event.Marriage=''marriage''). All marriage-specific
        fields live in EventConfig.declaration. No full marriage EventConfig is present in the Farajaland
        reference clone; the Event enum confirms the convention.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  CrvsPerson:
    class_uri: publicschema:crvs/Person
    title: Person
    description: "A temporal snapshot of a Person as observed at the time of a vital event. Carries the
      same demographic properties as Person, but frozen at event time rather than reflecting current values.
      Used wherever a vital event needs to record who a person was (occupation, residence, education, etc.)
      at the moment the event occurred.\n"
    slots:
    - person
    - nationality
    - occupation
    - education_level
    - marital_status
    - literacy
    - religion
    - ethnic_group
    - employment_status
    - status_in_employment
    - industry
    - place_of_usual_residence
    - age_at_event
    status: bibo:status/forthcoming
    annotations:
      label_es: Persona
      label_fr: Personne
      description_es: "Una instantánea temporal de una Persona tal como se observó en el momento de un
        evento vital. Lleva las mismas propiedades demográficas que Persona, pero fijadas en el momento
        del evento, en lugar de reflejar los valores actuales. Se utiliza siempre que un evento vital
        necesite registrar quién era una persona (ocupación, residencia, educación, etc.) en el momento
        en que ocurrió el evento.\n"
      description_fr: "Un instantané temporel d'une Personne telle qu'observée au moment d'un événement
        d'état civil. Porte les mêmes propriétés démographiques que Personne, mais figées au moment de
        l'événement plutôt que de refléter les valeurs actuelles. Utilisé partout où un événement d'état
        civil doit enregistrer qui était une personne (profession, résidence, éducation, etc.) au moment
        où l'événement s'est produit.\n"
      featured: true
      source_domain: crvs
      property_groups_json: '[{"category": "other", "properties": ["person"]}, {"category": "demographics",
        "properties": ["nationality", "marital_status", "religion", "ethnic_group", "age_at_event"]}, {"category":
        "education", "properties": ["education_level", "literacy"]}, {"category": "employment", "properties":
        ["occupation", "employment_status", "status_in_employment", "industry"]}, {"category": "location",
        "properties": ["place_of_usual_residence"]}]'
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        has no temporal-snapshot concept. Demographic fields (occupation, education, marital status) sit
        directly on the Person type and are implicitly current-at-registration.", "vocabulary": "OpenCRVS
        v2 event service", "vocabulary_id": "opencrvs"}]'
  Parent:
    class_uri: publicschema:Parent
    title: Parent
    description: 'A crvs/Person subtype that captures a parental role alongside the inherited person-of-record
      properties. Used on Birth, Adoption, PaternityRecognition, and Legitimation so that biological and
      legal parentage can be captured explicitly rather than collapsed into a single parent slot.

      A Parent instance is scoped to a single event context: the parental_role, establishment_basis, and
      certificate_label recorded here are the values asserted at the time of that event. Reusing the same
      Parent instance across multiple events would break snapshot semantics because the role or establishment
      basis may differ. The canonical way to assert parenthood across contexts is via Relationship records
      between Person instances, while Parent captures a point-in-time declaration tied to an event.

      The parental_role property carries the role-nature (biological, gestational, legal, or adoptive),
      decoupled from gender. The establishment_basis property captures the legal route by which parentage
      was established (for example, marital presumption, voluntary recognition, or adoption order). The
      certificate_label property is a free-text field for the jurisdiction-specific label that must appear
      on the printed certificate.

      '
    is_a: CrvsPerson
    slots:
    - parental_role
    - establishment_basis
    - certificate_label
    status: bibo:draft
    annotations:
      label_es: Progenitor
      label_fr: Parent
      description_es: 'Un subtipo de crvs/Person que porta un rol parental junto con las propiedades heredadas
        de persona objeto del registro. Se utiliza en Nacimiento, Adopción, Reconocimiento de paternidad
        y Legitimación para que la filiación biológica y la jurídica puedan representarse de forma explícita
        en lugar de reducirse a un único campo de progenitor.

        Una instancia de Parent está delimitada a un único contexto de evento: el parental_role, el establishment_basis
        y el certificate_label registrados aquí son los valores declarados en el momento de ese evento.
        Reutilizar la misma instancia de Parent en múltiples eventos rompería la semántica de la instantánea,
        ya que el rol o la base de establecimiento pueden diferir. La forma canónica de afirmar la parentalidad
        en distintos contextos es mediante registros Relationship entre instancias de Person, mientras
        que Parent captura una declaración puntual vinculada a un evento.

        La propiedad parental_role lleva la naturaleza del rol (biológico, gestacional, legal o adoptivo),
        desacoplada del género. La propiedad establishment_basis captura la vía legal por la que se estableció
        la parentalidad (por ejemplo, presunción matrimonial, reconocimiento voluntario o resolución de
        adopción). La propiedad certificate_label es un campo de texto libre para la etiqueta específica
        de la jurisdicción que debe aparecer en el certificado impreso.'
      description_fr: 'Un sous-type de crvs/Person qui porte un rôle parental à côté des propriétés de
        personne concernée héritées. Utilisé dans les actes de Naissance, d''Adoption, de Reconnaissance
        de paternité et de Légitimation afin que les filiations biologique et juridique puissent être
        saisies de manière explicite plutôt que fusionnées dans un seul champ parent.

        Une instance de Parent est délimitée à un seul contexte d''événement : le parental_role, l''establishment_basis
        et le certificate_label consignés ici sont les valeurs déclarées au moment de cet événement. Réutiliser
        la même instance de Parent dans plusieurs événements romprait la sémantique de l''instantané,
        car le rôle ou le fondement de l''établissement peut différer. La manière canonique d''affirmer
        la parenté dans différents contextes est d''utiliser des enregistrements Relationship entre des
        instances de Person, tandis que Parent capture une déclaration ponctuelle liée à un événement.

        La propriété parental_role porte la nature du rôle (biologique, gestationnel, légal ou adoptif),
        découplée du genre. La propriété establishment_basis capture la voie juridique par laquelle la
        parenté a été établie (par exemple, présomption maritale, reconnaissance volontaire ou jugement
        d''adoption). La propriété certificate_label est un champ de texte libre pour l''étiquette spécifique
        à la juridiction qui doit figurer sur le certificat imprimé.'
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        uses declaration field-key conventions (e.g. mother.*, father.*) with roles implicit in field
        names rather than a reified link entity. Adoptive, legal, and gestational roles are not representable
        in v1.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-v3-role-code", "hague-intercountry-adoption"]'
  PaternityRecognition:
    class_uri: publicschema:PaternityRecognition
    title: Paternity Recognition
    description: 'A formal act in which a parent, typically a father, establishes legal parentage for
      a child born outside marriage. Takes place before a registrar, notary, or court and is often annotated
      on the child''s original birth record. Distinct from Legitimation, which additionally establishes
      the child as born within marriage.

      '
    is_a: VitalEvent
    slots:
    - recognizing_parent
    - child
    - mother
    - birth_ref
    - judgment_date
    - judgment_reference
    - court
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#RequestedCorrectionAction
    annotations:
      label_es: Reconocimiento de paternidad
      label_fr: Reconnaissance de paternité
      description_es: Un acto formal mediante el cual un progenitor, habitualmente el padre, establece
        la filiación jurídica de un hijo o hija nacido fuera del matrimonio. Se efectúa ante un oficial
        del registro civil, un notario o un tribunal, y se suele anotar al margen del acta de nacimiento
        original del menor. Distinto de la Legitimación, que además establece al menor como nacido dentro
        del matrimonio.
      description_fr: Un acte formel par lequel un parent, généralement le père, établit la filiation
        juridique d'un enfant né hors mariage. Reçu par un officier d'état civil, un notaire ou un tribunal,
        et souvent consigné en mention marginale sur l'acte de naissance de l'enfant. Distinct de la Légitimation,
        qui établit en outre l'enfant comme né dans le cadre du mariage.
      source_domain: crvs
      external_alignments_json: '[{"label": "RequestedCorrectionAction / ApprovedCorrectionAction", "match":
        "related", "note": "PaternityRecognition has no first-class event type in v2. The correction workflow
        (ActionType.REQUEST_CORRECTION followed by ActionType.APPROVE_CORRECTION) is the operational mechanism
        for amending a birth record to add or change parentage. The match is related because the target
        is a workflow action pair, not an event type.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#RequestedCorrectionAction",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  VitalEvent:
    class_uri: publicschema:VitalEvent
    title: Vital Event
    description: 'An event of legal and statistical importance that marks a change in a person''s civil
      status, such as birth, death, fetal death, marriage, divorce, annulment, adoption, paternity recognition,
      or legitimation. VitalEvent is an abstract supertype that groups shared properties (when and where
      the event occurred, who registered it, and the registration lifecycle). Aligned with the UN Principles
      and Recommendations for Vital Statistics.

      '
    is_a: Event
    slots:
    - event_date
    - event_date_estimated
    - event_location
    - registration_date
    - registration_location
    - registration_type
    - registrar
    - informant
    - registration_status
    status: bibo:status/forthcoming
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventDocument.ts#EventDocument
    annotations:
      label_es: Evento vital
      label_fr: Événement d'état civil
      description_es: Un evento de relevancia jurídica y estadística que marca un cambio en el estado
        civil de una persona, como un nacimiento, una defunción, una muerte fetal, un matrimonio, un divorcio,
        una anulación, una adopción, un reconocimiento de paternidad o una legitimación. VitalEvent es
        un supertipo abstracto que agrupa las propiedades comunes (cuándo y dónde ocurrió el evento, quién
        lo registró y el ciclo de vida del registro). Alineado con los Principios y Recomendaciones de
        las Naciones Unidas para un Sistema de Estadísticas Vitales.
      description_fr: Un événement d'importance juridique et statistique qui marque un changement dans
        l'état civil d'une personne, tel qu'une naissance, un décès, une mortinaissance, un mariage, un
        divorce, une annulation, une adoption, une reconnaissance de paternité ou une légitimation. VitalEvent
        est un supertype abstrait qui regroupe les propriétés communes (quand et où l'événement s'est
        produit, qui l'a enregistré et le cycle de vie de l'enregistrement). Aligné sur les Principes
        et Recommandations des Nations Unies en matière de statistiques de l'état civil.
      featured: true
      source_domain: crvs
      external_alignments_json: '[{"label": "EventDocument", "match": "close", "note": "EventDocument
        is the generic event envelope in v2 (id, type, trackingId, createdAt, updatedAt, actions). VitalEvent
        and EventDocument share the role of the occurrence entity; the correspondence is close but EventDocument
        carries no domain fields at the core level.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventDocument.ts#EventDocument",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
    abstract: true
slots:
  adoptee:
    slot_uri: publicschema:adoptee
    title: Adoptee
    description: The person being adopted in an adoption event. Typically a minor, but adult adoption
      exists in some jurisdictions.
    range: CrvsPerson
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Adoptado
      label_fr: Adopté
      description_es: La persona que es adoptada en un evento de adopción. Generalmente un menor, aunque
        la adopción de personas adultas existe en algunas jurisdicciones.
      description_fr: La personne adoptée dans le cadre d'une adoption. Généralement un mineur, bien que
        l'adoption de majeurs existe dans certaines juridictions.
      domain_override: crvs
  adoption_type:
    slot_uri: publicschema:adoption_type
    title: Adoption type
    description: Whether the adoption is full (biological filiation is entirely replaced) or simple (biological
      filiation is preserved alongside the new parental link). Key distinction in civil-law traditions.
    range: AdoptionType
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tipo de adopción
      label_fr: Type d'adoption
      description_es: Indica si la adopción es plena (la filiación biológica queda totalmente sustituida)
        o simple (la filiación biológica se conserva junto al nuevo vínculo parental). Distinción clave
        en las tradiciones de derecho civil.
      description_fr: Indique si l'adoption est plénière (la filiation biologique est entièrement remplacée)
        ou simple (la filiation biologique est conservée parallèlement au nouveau lien parental). Distinction
        clé dans les traditions de droit civil.
      domain_override: crvs
      bibliography_refs: '["hague-intercountry-adoption"]'
  adoptive_parents:
    slot_uri: publicschema:adoptive_parents
    title: Adoptive parents
    description: The parents who acquire parental rights through the adoption, each captured as a Parent
      link entity with parental_role set to adoptive.
    range: Parent
    multivalued: true
    status: bibo:draft
    annotations:
      label_es: Padres adoptivos
      label_fr: Parents adoptifs
      description_es: Los progenitores que adquieren derechos parentales mediante la adopción, cada uno
        representado como una entidad de enlace Parent con parental_role establecido en adoptivo.
      description_fr: Les parents qui acquièrent les droits parentaux par l'adoption, chacun représenté
        par une entité de lien Parent dont le parental_role est défini sur adoptif.
      domain_override: crvs
  annotating_authority:
    slot_uri: publicschema:annotating_authority
    title: Annotating authority
    description: The civil registration office that added the annotation to the record. May differ from
      the office that issued the original record if the person has moved.
    range: Location
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Autoridad anotante
      label_fr: Autorité d'annotation
      description_es: La oficina de registro civil que añadió la anotación al acta. Puede diferir de la
        oficina que emitió el acta original si la persona se ha trasladado.
      description_fr: Le bureau d'état civil qui a ajouté la mention à l'acte. Peut différer du bureau
        qui a délivré l'acte original si la personne a déménagé.
      domain_override: crvs
  annotation_date:
    slot_uri: publicschema:annotation_date
    title: Annotation date
    description: The date on which the annotation was added to the civil status record. Typically after
      the originating record was created, reflecting a later vital event.
    range: date
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha de anotación
      label_fr: Date de la mention
      description_es: La fecha en que se añadió la anotación al acta de estado civil. Generalmente posterior
        a la creación del acta original, reflejando un evento vital posterior.
      description_fr: La date à laquelle la mention a été ajoutée à l'acte d'état civil. Généralement
        postérieure à la création de l'acte d'origine, reflétant un événement d'état civil ultérieur.
      domain_override: crvs
  annotation_text:
    slot_uri: publicschema:annotation_text
    title: Annotation text
    description: The full text of the marginal annotation as recorded on the civil status record. Preserves
      the exact wording used by the registration authority.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Texto de la anotación
      label_fr: Texte de la mention
      description_es: El texto íntegro de la anotación marginal tal como figura en el acta de estado civil.
        Conserva la redacción exacta utilizada por la autoridad de registro.
      description_fr: Le texte intégral de la mention marginale tel qu'il figure sur l'acte d'état civil.
        Conserve la formulation exacte utilisée par l'autorité d'enregistrement.
      domain_override: crvs
  annotation_type:
    slot_uri: publicschema:annotation_type
    title: Annotation type
    description: 'The category of annotation: a court-ordered correction, a nationality change, or similar
      administrative modifications to the record''s meaning.'
    range: AnnotationType
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Tipo de anotación
      label_fr: Type de mention
      description_es: 'La categoría de anotación: corrección ordenada por tribunal, cambio de nacionalidad
        u otras modificaciones administrativas que afectan el contenido o significado del acta.'
      description_fr: 'La catégorie de mention : correction ordonnée par un tribunal, changement de nationalité,
        ou autres modifications administratives touchant à la teneur de l''acte.'
      domain_override: crvs
  annotations:
    slot_uri: publicschema:annotations
    title: Annotations
    description: Marginal annotations (mentions marginales) added to a civil status record over time as
      subsequent vital events occur, such as a marriage noted on a birth record.
    range: CivilStatusAnnotation
    multivalued: true
    status: bibo:draft
    annotations:
      label_es: Anotaciones marginales
      label_fr: Mentions marginales
      description_es: Anotaciones marginales añadidas a un acta de estado civil a lo largo del tiempo
        a medida que ocurren eventos vitales posteriores, como la nota de un matrimonio consignada al
        margen de un acta de nacimiento.
      description_fr: Mentions marginales ajoutées à un acte d'état civil au fil du temps à mesure que
        surviennent des événements ultérieurs, par exemple l'indication d'un mariage en marge d'un acte
        de naissance.
      domain_override: crvs
  attendant_at_birth:
    slot_uri: publicschema:attendant_at_birth
    title: Attendant at birth
    description: The type of person who attended the delivery (physician, midwife, nurse, traditional
      birth attendant, other, or none). Used as a proxy for safe delivery in health statistics.
    range: BirthAttendant
    multivalued: false
    status: bibo:draft
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent
    annotations:
      label_es: Asistente en el parto
      label_fr: Personnel présent à la naissance
      description_es: El tipo de persona que atendió el parto (médico, partera profesional, enfermero/a,
        partera tradicional, otro o ninguno). Utilizado como indicador de parto seguro en las estadísticas
        de salud.
      description_fr: Le type de personne ayant assisté à l'accouchement (médecin, sage-femme, infirmier,
        accoucheuse traditionnelle, autre ou aucune). Utilisé comme indicateur d'accouchement en sécurité
        dans les statistiques de santé.
      domain_override: crvs
      external_alignments_json: '[{"label": "Attendant at birth declaration field (country-configured)",
        "match": "close", "note": "In v2 there is no core attendantAtBirth field. The field is a country-configured
        SELECT in EventConfig.declaration. Our birth-attendant vocabulary recommends a canonical set of
