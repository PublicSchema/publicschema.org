  food_security_level:
    slot_uri: publicschema:food_security_level
    title: Food security level
    description: 'A coarse current-state summary of the household''s food insecurity, used by operational
      systems for targeting and referral queries. This is NOT the raw output of a specific food-security
      assessment instrument: item-level responses (FCS, rCSI, LCS, HDDS, FIES, HHS, MDD-W, MAHFP) belong
      on a dedicated food-security profile published in a sibling schema (see ADR-011). Populate food_security_level
      from a Profile only by citing the instrument and cutoff rule that produced the band via a ScoringEvent;
      otherwise treat it as a self-declared or enumerator-judged summary.'
    range: FoodSecurityLevel
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Nivel de seguridad alimentaria
      label_fr: Niveau de sécurité alimentaire
      description_es: 'Un resumen grueso del estado actual de inseguridad alimentaria del hogar, usado
        por sistemas operativos para consultas de focalización y derivación. Esto NO es la salida cruda
        de un instrumento específico de evaluación: las respuestas a nivel de ítem (FCS, rCSI, LCS, HDDS,
        FIES, HHS, MDD-W, MAHFP) pertenecen a un perfil de seguridad alimentaria dedicado publicado en
        un esquema hermano (véase ADR-011). Complete food_security_level a partir de un Profile solo citando
        el instrumento y la regla de corte que produjo la banda mediante un ScoringEvent; de lo contrario
        trátelo como un resumen autodeclarado o juzgado por el encuestador.'
      description_fr: 'Un résumé grossier de l''état actuel d''insécurité alimentaire du ménage, utilisé
        par les systèmes opérationnels pour les requêtes de ciblage et d''orientation. Ce n''est PAS le
        résultat brut d''un instrument d''évaluation spécifique : les réponses au niveau des items (FCS,
        rCSI, LCS, HDDS, FIES, HHS, MDD-W, MAHFP) appartiennent à un profil de sécurité alimentaire dédié
        publié dans un schéma frère (voir ADR-011). Renseignez food_security_level à partir d''un Profile
        uniquement en citant l''instrument et la règle de seuil qui a produit la bande via un ScoringEvent
        ; sinon, considérez-le comme un résumé auto-déclaré ou jugé par l''enquêteur.'
      category: food_security
      bibliography_refs: '["fao-fies"]'
