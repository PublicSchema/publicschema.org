  RegistrationOffice:
    class_uri: publicschema:RegistrationOffice
    title: Registration Office
    description: 'A service point where civil or administrative registration services are delivered, such
      as a civil registration office, a district branch, a mobile registration unit, a refugee registration
      center, or an identity enrollment center. RegistrationOffice specializes ServicePoint for the registration
      and identity domain and carries additional properties for the functional category of the office
      and for the jurisdictional coverage of the office. RegistrationOffice is domain-agnostic at the
      root level: it covers civil registration (birth, death, marriage), refugee and asylum registration,
      and national identity enrollment, which cuts across social protection, CRVS, and humanitarian workflows.
      It is distinct from the Organization that operates it (captured via managed_by) and from its administrative
      location (captured via located_at). The CRVS domain uses RegistrationOffice as the physical facility
      where civil registrars operate; the same concept serves humanitarian identity programs and social
      protection enrollment offices.

      '
    is_a: ServicePoint
    slots:
    - registration_office_type
    - jurisdiction
    status: bibo:draft
    close_mappings:
    - schema:GovernmentOffice
    annotations:
      label_es: Oficina de registro
      label_fr: Bureau d'enregistrement
      description_es: 'Un punto de servicio donde se prestan servicios de registro civil o administrativo,
        como una oficina de registro civil, una sucursal de distrito, una unidad de registro móvil, un
        centro de registro de refugiados o un centro de enrolamiento de identidad. RegistrationOffice
        especializa ServicePoint para el dominio del registro y la identidad y lleva propiedades adicionales
        para la categoría funcional de la oficina y para la cobertura jurisdiccional de la oficina. RegistrationOffice
        es independiente del dominio en el nivel raíz: abarca el registro civil (nacimientos, defunciones,
        matrimonios), el registro de refugiados y solicitantes de asilo, y el enrolamiento de identidad
        nacional, lo que atraviesa los flujos de trabajo de protección social, CRVS y humanitarios. Es
        distinto de la Organization que lo opera (capturada mediante managed_by) y de su ubicación administrativa
        (capturada mediante located_at). El dominio CRVS utiliza RegistrationOffice como el establecimiento
        físico donde operan los registradores civiles; el mismo concepto sirve a los programas humanitarios
        de identidad y a las oficinas de enrolamiento de protección social.'
      description_fr: 'Un point de service où sont fournis des services d''enregistrement civil ou administratif,
        tel qu''un bureau d''état civil, une branche de district, une unité d''enregistrement mobile,
        un centre d''enregistrement des réfugiés ou un centre d''enrôlement d''identité. RegistrationOffice
        spécialise ServicePoint pour le domaine de l''enregistrement et de l''identité et porte des propriétés
        supplémentaires pour la catégorie fonctionnelle du bureau et pour la couverture juridictionnelle
        du bureau. RegistrationOffice est indépendant du domaine au niveau racine : il couvre l''enregistrement
        civil (naissances, décès, mariages), l''enregistrement des réfugiés et des demandeurs d''asile,
        et l''enrôlement d''identité nationale, ce qui traverse les flux de travail de la protection sociale,
        de l''état civil et de l''action humanitaire. Il est distinct de l''Organization qui l''exploite
        (capturée via managed_by) et de sa localisation administrative (capturée via located_at). Le domaine
        CRVS utilise RegistrationOffice comme l''établissement physique où opèrent les officiers d''état
        civil ; le même concept s''applique aux programmes humanitaires d''identité et aux bureaux d''enrôlement
        de la protection sociale.'
      external_alignments_json: '[{"label": "GovernmentOffice", "match": "close", "note": "schema.org
        GovernmentOffice is a subtype of LocalBusiness and Place, covering government offices broadly.
        PublicSchema RegistrationOffice is narrower (only registration and identity services) and is modelled
        as a ServicePoint (physical facility) rather than as an organization. The overlap on government
        registration premises is close; the organizational side and the WASH/distribution scopes diverge.",
        "uri": "https://schema.org/GovernmentOffice", "vocabulary": "schema.org", "vocabulary_id": "schema-org"}]'
      convergence_json: '{"notes": "RegistrationOffice is informed primarily by the OpenCRVS office and
        location management model, which distinguishes CRVS_OFFICE (a civil registration facility) from
        ADMIN_STRUCTURE (an administrative location). No other v1 convergence system carries a first-class
        RegistrationOffice concept at this level of specification, though UNHCR refugee registration operational
        frameworks and national civil registration systems manage equivalent entities. A broader convergence
        pass including UNHCR ProGres and national CRVS platform data is expected to raise the system_count.\n",
        "system_count": 1, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers"]}, {"category":
        "classification", "properties": ["service_point_type", "registration_office_type", "operational_status"]},
        {"category": "location", "properties": ["located_at", "jurisdiction"]}, {"category": "governance",
        "properties": ["managed_by"]}]'
      bibliography_refs: '["schema-org"]'
  Relationship:
    class_uri: publicschema:Relationship
    title: Relationship
    description: 'A link defining the social, legal, or administrative connection between an individual
      and another person or group. Three broad types exist: kinship (biological or legal ties), administrative
      (grantee, caregiver, payment proxy), and economic (dependent, survivor).

      '
    slots:
    - subject_person
    - object_person
    - relationship_type
    - start_date
    - end_date
    status: bibo:status/forthcoming
    close_mappings:
    - dci:data/RelatedPerson
    annotations:
      label_es: Relación
      label_fr: Relation
      description_es: 'Un vínculo que define la relación social, legal o administrativa entre un individuo
        y otra persona o grupo. Existen tres tipos generales: parentesco (vínculos biológicos o legales),
        administrativo (beneficiario, cuidador, apoderado de pago) y económico (dependiente, sobreviviente).'
      description_fr: 'Un lien définissant la connexion sociale, légale ou administrative entre un individu
        et une autre personne ou un groupe. Trois grands types existent : la parenté (liens biologiques
        ou juridiques), les liens administratifs (ayant droit, soignant, mandataire de paiement) et les
        liens économiques (personne à charge, survivant).'
      external_alignments_json: '[{"label": "RelatedPerson", "match": "close", "note": "Same concept;
        DCI has relationship_type and related_member while PublicSchema adds explicit subject/object persons
        and temporal bounds (start_date, end_date)", "uri": "https://schema.spdci.org/core/v1/data/RelatedPerson",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"system_count": 6, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["subject_person", "object_person",
        "relationship_type"]}, {"category": "administrative", "properties": ["start_date", "end_date"]}]'
      bibliography_refs: '["fhir-v3-role-code", "spdci-common-standards"]'
  School:
    class_uri: publicschema:School
    title: School
    description: 'A service point where formal or non-formal education is delivered, such as a primary
      school, secondary school, vocational training center, or early childhood education center. School
      specializes ServicePoint for the education sector and carries additional properties for the ISCED
      education level(s) served and the management type of the school (public, private, faith-based, or
      community), per UNESCO UIS classification. School is distinct from the Organization that manages
      it (captured via managed_by) and from its administrative location (captured via located_at). A single
      school campus may serve multiple ISCED levels (e.g., a combined primary-and-lower-secondary school).

      '
    is_a: ServicePoint
    slots:
    - school_level_served
    - school_type
    status: bibo:draft
    close_mappings:
    - schema:School
    annotations:
      label_es: Escuela
      label_fr: École
      description_es: Un punto de servicio donde se imparte educación formal o no formal, como una escuela
        primaria, un colegio secundario, un centro de formación profesional o un centro de educación en
        la primera infancia. School especializa ServicePoint para el sector educativo y lleva propiedades
        adicionales para el o los niveles educativos ISCED atendidos y el tipo de gestión de la escuela
        (pública, privada, confesional o comunitaria), según la clasificación del Instituto de Estadística
        de la UNESCO. School es distinto de la Organization que lo gestiona (capturada mediante managed_by)
        y de su ubicación administrativa (capturada mediante located_at). Un mismo establecimiento puede
        atender varios niveles ISCED (por ejemplo, una escuela que combina primaria y secundaria baja).
      description_fr: Un point de service où est dispensée une éducation formelle ou non formelle, tel
        qu'une école primaire, un collège ou lycée, un centre de formation professionnelle ou un centre
        d'éducation de la petite enfance. School spécialise ServicePoint pour le secteur éducatif et porte
        des propriétés supplémentaires pour le ou les niveaux d'éducation ISCED desservis et le type de
        gestion de l'école (publique, privée, confessionnelle ou communautaire), selon la classification
        de l'Institut de statistique de l'UNESCO. School est distinct de l'Organization qui le gère (capturée
        via managed_by) et de sa localisation administrative (capturée via located_at). Un même établissement
        peut desservir plusieurs niveaux ISCED (par exemple, une école combinant le primaire et le secondaire
        inférieur).
      external_alignments_json: '[{"label": "School", "match": "close", "note": "schema.org School is
        a subtype of EducationalOrganization, which conflates the organization and the physical facility.
        PublicSchema School is a subtype of ServicePoint (the physical facility), with the operating organization
        referenced separately via managed_by. The physical-facility semantics align closely; the organizational
        side diverges.", "uri": "https://schema.org/School", "vocabulary": "schema.org", "vocabulary_id":
        "schema-org"}]'
      convergence_json: '{"notes": "School is newly introduced in PublicSchema as a signal of cross-sector
        extensibility for the ServicePoint hierarchy. No direct School concept has been mapped in the
        six v1 convergence systems. Education management information systems (EMIS) and UNESCO UIS education
        facility registries are the natural candidates for a future convergence pass.\n", "system_count":
        0, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers"]}, {"category":
        "classification", "properties": ["service_point_type", "school_type", "school_level_served", "operational_status"]},
        {"category": "location", "properties": ["located_at"]}, {"category": "governance", "properties":
        ["managed_by"]}]'
      bibliography_refs: '["schema-org"]'
  ServicePoint:
    class_uri: publicschema:ServicePoint
    title: Service Point
    description: 'A named physical point where an organization delivers a public service. ServicePoint
      is domain-agnostic: it covers health facilities, schools, water points, sanitation blocks, distribution
      sites, protection desks, civil registration offices, community centers, markets, libraries, and
      post offices. A ServicePoint is distinct from a Location (a named administrative or geographic area
      where the service point sits) and from the Organization that operates it. Location answers "where
      on the map or in the admin hierarchy?"; Organization answers "who runs it?"; ServicePoint answers
      "what is the operational facility?" and carries service category, operational status, and the link
      back to the managing organization.

      '
    slots:
    - name
    - identifiers
    - service_point_type
    - located_at
    - managed_by
    - operational_status
    status: bibo:draft
    close_mappings:
    - schema:Place
    annotations:
      label_es: Punto de servicio
      label_fr: Point de service
      description_es: 'Un punto físico con nombre donde una organización presta un servicio público. ServicePoint
        es independiente del dominio: abarca establecimientos de salud, escuelas, puntos de agua, bloques
        sanitarios, sitios de distribución, mostradores de protección, oficinas de registro civil, centros
        comunitarios, mercados, bibliotecas y oficinas de correos. Un ServicePoint es distinto de una
        Location (un área administrativa o geográfica con nombre donde se sitúa el punto de servicio)
        y de la Organization que lo opera. Location responde a «¿dónde en el mapa o en la jerarquía administrativa?»;
        Organization responde a «¿quién lo gestiona?»; ServicePoint responde a «¿cuál es el establecimiento
        operativo?» y lleva la categoría de servicio, el estado operativo y el vínculo con la organización
        gestora.'
      description_fr: 'Un point physique nommé où une organisation fournit un service public. ServicePoint
        est indépendant du domaine : il couvre les établissements de santé, les écoles, les points d''eau,
        les blocs sanitaires, les sites de distribution, les guichets de protection, les bureaux d''état
        civil, les centres communautaires, les marchés, les bibliothèques et les bureaux de poste. Un
        ServicePoint est distinct d''une Location (une zone administrative ou géographique nommée où se
        situe le point de service) et de l''Organization qui l''exploite. Location répond à la question
        « où sur la carte ou dans la hiérarchie administrative ? » ; Organization répond à « qui le gère
        ? » ; ServicePoint répond à « quel est l''établissement opérationnel ? » et porte la catégorie
        de service, le statut opérationnel et le lien vers l''organisation gestionnaire.'
      featured: true
      external_alignments_json: '[{"label": "Place", "match": "broad", "note": "schema.org Place is a
        geometric entity (any spatial thing with a geo location), whereas PS ServicePoint is a functional/operational
        entity (a named site where a public service is delivered with a service category, operational
        status, and managing organization). Every ServicePoint is a Place, but most Places are not ServicePoints.",
        "uri": "https://schema.org/Place", "vocabulary": "schema.org", "vocabulary_id": "schema-org"}]'
      convergence_json: '{"notes": "ServicePoint is newly introduced in PublicSchema and has not yet been
        mapped against the v1 convergence systems. No mapped social-protection or CRVS delivery system
        carries a first-class ServicePoint concept today; facility-like data appears as free-text site
        names or as administrative location entries. Adjacent systems that do model the concept (WHO HeRAMS,
        EMIS education registries, WASH facility registries, humanitarian logistics service-delivery-point
        registries) will be surveyed in a follow-up convergence pass, at which point the system_count
        and external_equivalents are expected to grow.\n", "system_count": 0, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers"]}, {"category":
        "classification", "properties": ["service_point_type", "operational_status"]}, {"category": "location",
        "properties": ["located_at"]}, {"category": "governance", "properties": ["managed_by"]}]'
      bibliography_refs: '["schema-org", "who-herams"]'
  SocioEconomicProfile:
    class_uri: publicschema:SocioEconomicProfile
    title: Socio-Economic Profile
    description: 'A point-in-time record of socio-economic and living-conditions data about a household
      or person, collected through a registration survey or questionnaire. Covers dwelling characteristics,
      water and sanitation service, energy access, household assets, ICT access, income source, settlement
      type, and a high-level food_security_level summary. Typical instruments are a social registry registration
      form, a proxy means test (PMT) questionnaire, a multidimensional poverty module, or a household
      economy survey. The housing and WASH properties (dwelling_type, wall_material, floor_material, roof_material,
      water_source, sanitation_facility, electricity_access) may also appear on shelter-damage assessment
      profiles published in a sibling schema (see ADR-011); the baseline reading here describes the dwelling''s
      usual characteristics. When a program collects item-level food security data (FCS, rCSI, LCS, HDDS,
      FIES, HHS, MDD-W, MAHFP), those responses belong on a dedicated food-security profile in that sibling
      schema rather than on this profile; SocioEconomicProfile retains only the derived food_security_level
      summary.

      '
    is_a: Profile
    slots:
    - dwelling_type
    - floor_material
    - wall_material
    - roof_material
    - water_source
    - water_service_level
    - water_collection_time_minutes
    - sanitation_facility
    - sanitation_service_level
    - sanitation_shared_households
    - cooking_fuel
    - electricity_access
    - household_assets
    - ict_access
    - income_source
    - settlement_type
    - food_security_level
    status: bibo:status/forthcoming
    close_mappings:
    - https://schema.spdci.org/extensions/social-registries/v1/data/SocioEconomicProfile
    annotations:
      label_es: Perfil socioeconómico
      label_fr: Profil socio-économique
      description_es: Un registro puntual de datos socioeconómicos y de condiciones de vida de un hogar
        o persona, recopilados mediante una encuesta de registro o cuestionario. Cubre características
        de la vivienda, servicio de agua y saneamiento, acceso a la energía, bienes del hogar, acceso
        a TIC, fuente de ingresos, tipo de asentamiento y un resumen de alto nivel food_security_level.
        Los instrumentos típicos son un formulario de registro al registro social, un cuestionario de
        prueba proxy de medios de vida (PMT), un módulo de pobreza multidimensional o una encuesta de
        economía del hogar. Las propiedades de vivienda y WASH (dwelling_type, wall_material, floor_material,
        roof_material, water_source, sanitation_facility, electricity_access) también pueden aparecer
        en perfiles de evaluación de daños a refugios publicados en un esquema hermano (véase ADR-011);
        la lectura de base aquí describe las características habituales de la vivienda. Cuando un programa
        recopila datos de seguridad alimentaria a nivel de ítems (FCS, rCSI, LCS, HDDS, FIES, HHS, MDD-W,
        MAHFP), esas respuestas pertenecen a un perfil de seguridad alimentaria dedicado en ese esquema
        hermano en lugar de a este perfil; SocioEconomicProfile conserva solo el resumen food_security_level
        derivado.
      description_fr: Un enregistrement ponctuel de données socio-économiques et de conditions de vie
        concernant un ménage ou une personne, collectées au moyen d'une enquête d'enregistrement ou d'un
        questionnaire. Couvre les caractéristiques du logement, le service d'eau et d'assainissement,
        l'accès à l'énergie, les biens du ménage, l'accès aux TIC, la source de revenus, le type d'établissement
        humain et un résumé de haut niveau food_security_level. Les instruments typiques sont un formulaire
        d'enregistrement au registre social, un questionnaire de test de substitution des ressources (PMT),
        un module de pauvreté multidimensionnelle ou une enquête sur l'économie des ménages. Les propriétés
        de logement et WASH (dwelling_type, wall_material, floor_material, roof_material, water_source,
        sanitation_facility, electricity_access) peuvent aussi figurer sur des profils d'évaluation de
        dommages aux abris publiés dans un schéma frère (voir ADR-011) ; le relevé de base décrit ici
        les caractéristiques habituelles du logement. Lorsqu'un programme collecte des données de sécurité
        alimentaire au niveau des items (FCS, rCSI, LCS, HDDS, FIES, HHS, MDD-W, MAHFP), ces réponses
        appartiennent à un profil de sécurité alimentaire dédié dans ce schéma frère plutôt qu'à ce profil
        ; SocioEconomicProfile ne conserve que le résumé food_security_level dérivé.
      featured: true
      external_alignments_json: '[{"label": "SocioEconomicProfile", "match": "close", "note": "Direct
        peer; DCI defines a socio-economic profile as a typed addition on the social registry side", "uri":
        "https://schema.spdci.org/extensions/social-registries/v1/data/SocioEconomicProfile", "vocabulary":
        "DCI Social Registry", "vocabulary_id": "dci"}]'
      convergence_json: '{"notes": "DCI Social Registry is the only v1 system that names this concept
        directly. OpenSPP, OpenCRVS, and openIMIS do not carry socio-economic survey data in core; where
        national deployments collect it (Cadastro Unico, Listahanan, Kenya SR-NIS, Indonesia DTKS, Turkiye
        ISAS), it lives in a separate registration-survey module whose shape matches this concept even
        when the name differs. FHIR can serialize these as a QuestionnaireResponse for a PMT or registration
        questionnaire. Household retains food_security_level as a current-state summary; survey-collected
        dwelling, WASH, energy, assets, ICT, income, and settlement data belong here.\n", "system_count":
        1, "total_systems": 6}'
      property_groups_json: '[{"category": "administrative", "properties": ["identifiers", "subject",
