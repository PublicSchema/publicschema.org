classes:
  Address:
    class_uri: publicschema:Address
    title: Address
    description: 'A structured physical or postal location used to reach a person, household, or organization.
      Addresses combine spatial and administrative components such as street, settlement, district, and
      postal code.

      '
    slots:
    - full_address
    - street_address
    - house_number
    - building_name
    - address_area
    - city
    - administrative_area
    - postal_code
    - country
    - location
    status: bibo:status/published
    exact_mappings:
    - locn:Address
    close_mappings:
    - dci:data/Address
    annotations:
      label_es: Dirección
      label_fr: Adresse
      description_es: Una ubicación física o postal estructurada utilizada para contactar a una persona,
        hogar u organización. Las direcciones combinan componentes espaciales y administrativos como calle,
        localidad, distrito y código postal.
      description_fr: Un emplacement physique ou postal structuré, utilisé pour joindre une personne,
        un ménage ou une organisation. Les adresses combinent des composantes spatiales et administratives
        telles que la rue, la localité, le district et le code postal.
      external_alignments_json: '[{"label": "Address", "match": "exact", "uri": "http://www.w3.org/ns/locn#Address",
        "vocabulary": "Core Location", "vocabulary_id": "semic"}, {"label": "Address", "match": "close",
        "note": "Same concept, different property decomposition; DCI uses address_line_1/2 while PublicSchema
        decomposes into street, house number, and building name", "uri": "https://schema.spdci.org/core/v1/data/Address",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}, {"confidence": "high", "label": "Address",
        "match": "exact", "note": "PublicSchema Address represents a structured address compatible with
        locn:Address for exchange.", "predicate": "http://www.w3.org/2004/02/skos/core#exactMatch", "review_status":
        "accepted", "source_id": "semic-core-location", "source_version": "2.1.1", "uri": "http://www.w3.org/ns/locn#Address",
        "vocabulary": "SEMIC Core Location alignments"}]'
      convergence_json: '{"notes": "Present in 5 of 6 mapped systems. EBSI PID and PDA1 schemas informed
        additional decomposition properties (house_number, building_name) not present in the original
        convergence systems.\n", "system_count": 5, "total_systems": 6}'
      property_groups_json: '[{"category": "location", "properties": ["full_address", "street_address",
        "house_number", "building_name"]}, {"category": "administrative", "properties": ["address_area",
        "city", "administrative_area", "postal_code", "country", "location"]}]'
      bibliography_refs: '["ebsi-eidas-pid", "schema-org", "semic-core-location", "spdci-common-standards"]'
  Person:
    class_uri: publicschema:Person
    title: Person
    description: 'The unique individual human being who is a subject of record within a social protection
      system. Person is the persistent, indivisible unit of identity in registries; operational statuses
      such as Registrant, Applicant, or Beneficiary are transient roles defined by the person''s relationship
      to a specific Program, not properties of the person themselves.

      '
    is_a: Party
    mixins:
    - Agent
    slots:
    - date_of_birth
    - date_of_death
    - country_of_birth
    - given_name
    - family_name
    - family_name_at_birth
    - given_name_at_birth
    - preferred_name
    - patronymic_name
    - matronymic_name
    - gender
    - nationality
    - sex
    - marital_status
    - number_of_spouses
    - education_level
    - preferred_language
    - occupation
    - literacy
    - religion
    - ethnic_group
    - employment_status
    - status_in_employment
    - industry
    - phone_number
    - email_address
    - domicile
    - group_memberships
    - biometric_samples
    - pregnancy_status
    - displacement_status
    - functioning_status
    - nutrition_status
    status: bibo:status/forthcoming
    exact_mappings:
    - person:Person
    close_mappings:
    - dci:data/Person
    annotations:
      label_es: Persona
      label_fr: Personne
      description_es: El individuo único que es sujeto de registro en un sistema de protección social.
        La persona es la unidad indivisible y persistente de identidad en los registros; los estados operacionales
        como inscrito, solicitante o beneficiario son roles transitorios definidos por la relación de
        la persona con un programa específico.
      description_fr: L'individu unique qui fait l'objet d'un enregistrement dans un système de protection
        sociale. La personne est l'unité indivisible et persistante d'identité dans les registres. Les
        statuts opérationnels tels que Registrant, demandeur ou bénéficiaire sont des rôles transitoires
        définis par la relation de la personne à un programme spécifique.
      featured: true
      external_alignments_json: '[{"label": "Person", "match": "exact", "uri": "http://www.w3.org/ns/person#Person",
        "vocabulary": "Core Person", "vocabulary_id": "semic"}, {"label": "Person", "match": "close",
        "note": "DCI Person carries only basic demographics (name, sex, birth/death dates, contact); attributes
        like marital status, education, and occupation live on DCI Member instead", "uri": "https://schema.spdci.org/core/v1/data/Person",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}, {"confidence": "high", "label": "Person", "match":
        "exact", "note": "PublicSchema Person represents the same natural-person class for PublicSchema''s
        social-protection scope.", "predicate": "http://www.w3.org/2004/02/skos/core#exactMatch", "review_status":
        "accepted", "source_id": "semic-core-person", "source_version": "2.1.1", "uri": "http://www.w3.org/ns/person#Person",
        "vocabulary": "SEMIC Core Person alignments"}]'
      convergence_json: '{"notes": "Universal across all 6 mapped systems. The most consistently represented
        concept in social protection delivery systems. All systems maintain a person-level record as the
        primary unit of identity. Detailed point-in-time functioning observations live on FunctioningProfile
        records; anthropometric observations live on dedicated profile types in a sibling schema (see
        ADR-011). Person keeps only a coarse current-state summary (functioning_status, nutrition_status)
        for targeting and reporting workflows. Practitioner review confirmed this hybrid matches operational
        systems such as UNHCR proGres Specific Needs, Brazil Cadastro Unico, and Philippines Listahanan.\n",
        "system_count": 6, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers", "identity_documents",
        "given_name", "family_name", "given_name_at_birth", "family_name_at_birth", "preferred_name",
        "patronymic_name", "matronymic_name"]}, {"category": "demographics", "properties": ["date_of_birth",
        "date_of_death", "country_of_birth", "sex", "gender", "nationality", "marital_status", "number_of_spouses",
        "religion", "ethnic_group", "pregnancy_status", "displacement_status", "functioning_status", "nutrition_status"]},
        {"category": "education", "properties": ["education_level", "literacy"]}, {"category": "employment",
        "properties": ["occupation", "employment_status", "status_in_employment", "industry"]}, {"category":
        "contact", "properties": ["preferred_language", "phone_number", "email_address", "domicile"]},
        {"category": "other", "properties": ["group_memberships", "biometric_samples"]}]'
      bibliography_refs: '["barca-2017-integrating-data", "barca-2021-inclusive-information-systems",
        "dhs-recode7", "ebsi-eidas-pid", "egriss-iris", "loinc-pregnancy-status", "mics6", "mosip-identity-schema",
        "schema-org", "semic-core-person", "spdci-common-standards", "un-vital-stats-rev3", "washington-group-cfm",
        "who-muac-cutoffs"]'
  Family:
    class_uri: publicschema:Family
    title: Family
    description: 'A kinship network of persons connected by blood, marriage, or adoption. A family is
      defined by relational ties, not by co-residence or shared budget: members may live across multiple
      households or geographic areas. Kinship links between members are represented as Relationship records
      between Person instances. Systems that use "family" to mean the co-residential unit should set group_type:
      family on their Household record for interoperability.

      '
    is_a: Group
    status: bibo:status/forthcoming
    annotations:
      label_es: Familia
      label_fr: Famille
      description_es: 'Una red de parentesco formada por personas unidas por lazos de sangre, matrimonio
        o adopción. La familia se define por los vínculos relacionales, no por la corresidencia ni el
        presupuesto compartido: los miembros pueden residir en varios hogares o áreas geográficas distintas.
        Los vínculos de parentesco entre miembros se representan como registros Relationship entre instancias
        Person. Los sistemas que usan "familia" para referirse a la unidad corresidente deben establecer
        group_type: family en su registro Household a efectos de interoperabilidad.'
      description_fr: 'Un réseau de parenté composé de personnes liées par le sang, le mariage ou l''adoption.
        La famille est définie par les liens relationnels, et non par la corésidence ou le budget commun
        : les membres peuvent résider dans plusieurs ménages ou zones géographiques distinctes. Les liens
        de parenté entre membres sont représentés par des enregistrements Relationship entre instances
        Person. Les systèmes qui utilisent « famille » pour désigner l''unité corésidente doivent définir
        group_type: family sur leur enregistrement Household à des fins d''interopérabilité.'
      convergence_json: '{"notes": "No OpenCRVS equivalent. OpenIMIS uses ''family'' where other systems
        use ''household''. Family currently carries no local properties: kinship, marriage, and adoption
        ties named in the definition are represented via Relationship records between Person instances
        rather than as dedicated properties on Family. The group_type: family code on Household provides
        an interoperability bridge for systems that model co-residential units under the \"family\" label.\n",
        "system_count": 5, "total_systems": 6}'
      bibliography_refs: '["un-census-rev3"]'
  Group:
    class_uri: publicschema:Group
    title: Group
    description: 'An abstract collection of persons that serves as the base for concrete group types such
      as Household, Family, and Farm. Groups are linked to their members via membership links. In native
      PublicSchema modeling, the concrete subtype carries the authoritative semantics; group_type is kept
      as an interoperability classifier for systems that exchange groups through a flatter category field.

      '
    is_a: Party
    slots:
    - group_type
    - formation_date
    - member_count
    - memberships
    status: bibo:status/published
    close_mappings:
    - dci:data/Group
    annotations:
      label_es: Grupo
      label_fr: Groupe
      description_es: Una colección abstracta de personas que sirve como base para tipos de grupos concretos
        como Hogar, Familia y Explotación Agrícola. Los grupos se vinculan a sus miembros a través de
        relaciones de pertenencia. En el modelado nativo de PublicSchema, el subtipo concreto lleva la
        semántica autorizada; group_type se conserva como clasificador de interoperabilidad para sistemas
        que intercambian grupos mediante un campo de categoría más plano.
      description_fr: Un regroupement abstrait de personnes qui sert de base aux types de groupes concrets
        tels que Ménage, Famille et Exploitation agricole. Les groupes sont liés à leurs membres via des
        liens d'appartenance. Dans la modélisation native de PublicSchema, le sous-type concret porte
        la sémantique faisant autorité; group_type est conservé comme classificateur d'interopérabilité
        pour les systèmes qui échangent les groupes au moyen d'un champ de catégorie plus plat.
      featured: true
      external_alignments_json: '[{"label": "Group", "match": "close", "note": "DCI Group embeds member
        lists and poverty scoring directly; PublicSchema separates membership into GroupMembership records
        and scoring into ScoringEvent", "uri": "https://schema.spdci.org/core/v1/data/Group", "vocabulary":
        "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"system_count": 5, "total_systems": 6}'
      bibliography_refs: '["spdci-common-standards"]'
    abstract: true
  HealthFacility:
    class_uri: publicschema:HealthFacility
    title: Health Facility
    description: 'A service point where clinical or preventive health services are delivered, such as
      a hospital, health center, health post, dispensary, specialty clinic, pharmacy, or diagnostic laboratory.
      HealthFacility specializes ServicePoint for the health sector and carries additional properties
      for facility type (SARA/HHFA category) and facility level (primary / secondary / tertiary / quaternary
      tier of care). HealthFacility is distinct from the Organization that owns or manages it (captured
      via managed_by) and from its administrative site (captured via located_at): the organization can
      change without the physical facility moving, and a facility can serve several administrative Locations.
      Facility typology references the WHO Service Availability and Readiness Assessment (SARA) and the
      Harmonized Health Facility Assessment (HHFA) taxonomies.

      '
    is_a: ServicePoint
    slots:
    - facility_type
    - facility_level
    status: bibo:draft
    close_mappings:
    - schema:MedicalOrganization
    annotations:
      label_es: Establecimiento de salud
      label_fr: Établissement de santé
      description_es: 'Un punto de servicio donde se prestan servicios de salud clínicos o preventivos,
        como un hospital, centro de salud, puesto de salud, dispensario, clínica especializada, farmacia
        o laboratorio diagnóstico. HealthFacility especializa ServicePoint para el sector salud y lleva
        propiedades adicionales para el tipo de establecimiento (categoría SARA/HHFA) y el nivel de establecimiento
        (primaria / secundaria / terciaria / cuaternaria). HealthFacility es distinto de la Organization
        que lo posee o gestiona (capturada mediante managed_by) y de su sitio administrativo (capturado
        mediante located_at): la organización puede cambiar sin que el establecimiento físico se mueva,
        y un establecimiento puede atender varias Locations administrativas. La tipología de establecimientos
        se apoya en la Evaluación de la disponibilidad y capacidad operativa de los servicios (SARA) de
        la OMS y en la Evaluación Armonizada de Establecimientos de Salud (HHFA).'
      description_fr: 'Un point de service où sont fournis des soins cliniques ou préventifs, tels qu''un
        hôpital, un centre de santé, un poste de santé, un dispensaire, une clinique spécialisée, une
        pharmacie ou un laboratoire de diagnostic. HealthFacility spécialise ServicePoint pour le secteur
        de la santé et porte des propriétés supplémentaires pour le type d''établissement (catégorie SARA/HHFA)
        et le niveau d''établissement (primaire / secondaire / tertiaire / quaternaire). HealthFacility
        est distinct de l''Organization qui le possède ou le gère (capturée via managed_by) et de son
        site administratif (capturé via located_at) : l''organisation peut changer sans que l''établissement
        physique ne bouge, et un établissement peut desservir plusieurs Locations administratives. La
        typologie des établissements s''appuie sur l''Évaluation de la disponibilité et de la capacité
        opérationnelle des services (SARA) de l''OMS et sur l''Évaluation harmonisée des établissements
        de santé (HHFA).'
      featured: true
      external_alignments_json: '[{"label": "MedicalOrganization", "match": "close", "note": "schema.org
        MedicalOrganization conflates the medical organization and the physical place where care is delivered
        into a single class. PublicSchema separates them: HealthFacility is the physical facility (subtype
        of ServicePoint), and the operating Organization is referenced via managed_by. The overlap is
        close on the facility-level concept and partial on the organizational side.", "uri": "https://schema.org/MedicalOrganization",
        "vocabulary": "schema.org", "vocabulary_id": "schema-org"}]'
      convergence_json: '{"notes": "HealthFacility is informed primarily by two WHO-maintained non-PublicSchema
        systems: the Service Availability and Readiness Assessment (SARA) Reference Manual, which defines
        the canonical facility-type taxonomy, and the Harmonized Health Facility Assessment (HHFA), which
        consolidates and extends SARA alongside the Service Delivery Indicators (SDI) into a unified assessment
        framework. Neither of the six v1 convergence systems (OpenCRVS, openIMIS, OpenSPP, DHIS2, DCI,
        SEMIC) carries a first-class HealthFacility concept at this level of specification, though DHIS2
        organisation units and openIMIS health facility records cover adjacent responsibilities. A broader
        convergence pass including HeRAMS and national health facility registries is expected to raise
        the system_count.\n", "system_count": 2, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers"]}, {"category":
        "classification", "properties": ["service_point_type", "facility_type", "facility_level", "operational_status"]},
        {"category": "location", "properties": ["located_at"]}, {"category": "governance", "properties":
        ["managed_by"]}]'
      bibliography_refs: '["schema-org", "who-health-systems", "who-herams", "who-sara"]'
  Household:
    class_uri: publicschema:Household
    title: Household
    description: 'A social and economic unit of one or more persons who share food and other essentials
      for living. The operational definition varies across countries and programs, combining criteria
      of co-residence, shared budget, shared cooking, kinship, and administrative registration.

      '
    is_a: Group
    slots:
    - address
    - location
    - food_security_level
    - pregnant_or_lactating_count
    - chronic_illness_in_household
    status: bibo:status/forthcoming
    annotations:
      label_es: Hogar
      label_fr: Ménage
      description_es: Una unidad social y económica de una o más personas que comparten alimentos y otros
        elementos esenciales para la vida. La definición operacional varía según los países y programas,
        combinando criterios de corresidencia, presupuesto compartido, cocina común, parentesco y registro
        administrativo.
      description_fr: Une unité sociale et économique d'une ou plusieurs personnes qui partagent la nourriture
        et d'autres biens essentiels à la vie. La définition opérationnelle varie selon les pays et les
        programmes, combinant des critères de corésidence, de budget partagé, de cuisine commune, de parenté
        et d'enregistrement administratif.
      featured: true
      external_alignments_json: '[{"label": "N/A", "match": "none", "note": "SEMIC Core Person does not
        define a household concept. Residence-related data attaches to Person via address.", "vocabulary":
        "Core Person", "vocabulary_id": "semic"}, {"label": "N/A", "match": "none", "note": "DCI does
        not define a standalone household entity. Household-like grouping is handled through Group with
        role-based membership.", "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"notes": "No OpenCRVS or standalone OpenIMIS match. Detailed point-in-time socio-economic
        and living-conditions data (dwelling, WASH, energy, assets, ICT, income source, settlement type)
        lives on SocioEconomicProfile records; Household keeps only identity, location, and a coarse food_security_level
        current-state summary. Practitioner review confirmed that operational social registries commonly
        read a current-state food-security flag off the household record even when the survey evidence
        is stored separately.\n", "system_count": 4, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["name", "identifiers", "identity_documents"]},
        {"category": "administrative", "properties": ["group_type", "formation_date", "member_count",
        "memberships"]}, {"category": "demographics", "properties": ["pregnant_or_lactating_count"]},
        {"category": "location", "properties": ["address", "location"]}, {"category": "food_security",
        "properties": ["food_security_level"]}, {"category": "other", "properties": ["chronic_illness_in_household"]}]'
      bibliography_refs: '["barca-2017-integrating-data", "dhs-recode7", "fao-fies", "itu-core-ict", "mics6",
        "spdci-common-standards", "un-census-rev3", "un-degurba", "who-household-energy", "who-unicef-jmp"]'
  Identifier:
    class_uri: publicschema:Identifier
    title: Identifier
    description: 'A coded value assigned to an entity within an identification scheme. Identifiers disambiguate
      entities such as persons, groups, locations, administrative areas, or records within a specific
      registry or catalog. The identifier is the value and its scheme; documents that carry identifiers
      (passports, national ID cards, beneficiary cards) are modeled separately as IdentityDocument.

      '
    slots:
    - identifier_value
    - identifier_scheme_id
    - identifier_scheme_name
    - identifier_type
    status: bibo:status/published
    exact_mappings:
    - adms:Identifier
    - dci:data/Identifier
    annotations:
      label_es: Identificador
      label_fr: Identifiant
      description_es: Un valor codificado asignado a una entidad dentro de un esquema de identificación.
        Los identificadores distinguen entidades como personas, grupos, ubicaciones, áreas administrativas
        o registros dentro de un registro o catálogo específico. El identificador es el valor y su esquema;
        los documentos que portan identificadores (pasaportes, tarjetas de identidad nacional, tarjetas
        de beneficiario) se modelan separadamente como IdentityDocument.
      description_fr: Une valeur codée attribuée à une entité au sein d'un schéma d'identification. Les
        identifiants lèvent l'ambiguïté sur des entités telles que des personnes, des groupes, des lieux,
        des zones administratives ou des enregistrements dans un registre ou catalogue spécifique. L'identifiant
        est la valeur et son schéma; les documents qui portent des identifiants (passeports, cartes d'identité
        nationale, cartes de bénéficiaire) sont modélisés séparément comme IdentityDocument.
      featured: true
      external_alignments_json: '[{"label": "Identifier", "match": "exact", "note": "ADMS Identifier is
        a generic notation-plus-scheme value, aligning with this Identifier. Document-level lifecycle
        metadata (issuer, issue date) is carried on IdentityDocument.", "uri": "http://www.w3.org/ns/adms#Identifier",
        "vocabulary": "ADMS", "vocabulary_id": "semic"}, {"label": "Identifier", "match": "exact", "note":
        "DCI Identifier is also a (type, value) pair without document lifecycle fields.", "uri": "https://schema.spdci.org/core/v1/data/Identifier",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"notes": "All mapped systems carry coded values identifying persons, groups,
        or administrative areas, though most conflate the value with document metadata. After the split,
        Identifier covers only the value and scheme; the lifecycle concerns live on IdentityDocument.\n",
        "system_count": 6, "total_systems": 6}'
      property_groups_json: '[{"category": "identity", "properties": ["identifier_value", "identifier_type"]},
        {"category": "administrative", "properties": ["identifier_scheme_id", "identifier_scheme_name"]}]'
      bibliography_refs: '["barca-2017-integrating-data", "ebsi-eidas-pid", "fhir-identifier-type-v2-0203",
        "icao-doc-9303", "mosip-identity-schema", "semic-adms", "semic-core-person", "spdci-common-standards"]'
  Organization:
    class_uri: publicschema:Organization
    title: Organization
    description: 'A legally or administratively identifiable body that can act within a public delivery
      process: a government agency, ministry, NGO, UN agency, statistical office, health facility, civil
      registration office, court, or standards publisher. Organizations are the institutional actors that
      administer instruments, publish methodologies, evaluate submissions, issue certificates, and operate
      programs. An Organization''s location refers to its own registered or primary site, not to the place
      where an action it performed happened. Event-level place remains a property of the event record.

      '
    is_a: Agent
    slots:
    - name
    - identifiers
    - location
    status: bibo:status/forthcoming
    exact_mappings:
    - foaf:Organization
    - prov:Organization
    - schema:Organization
    close_mappings:
    - cpov:PublicOrganisation
    - fhir:Organization
    - legal:LegalEntity
    annotations:
      label_es: Organización
      label_fr: Organisation
      description_es: 'Un organismo identificable jurídica o administrativamente capaz de actuar en un
        proceso de prestación pública: una agencia gubernamental, un ministerio, una ONG, una agencia
        de las Naciones Unidas, una oficina estadística, un establecimiento de salud, una oficina de registro
        civil, un tribunal o un editor de normas. Las organizaciones son los actores institucionales que
        administran instrumentos, publican metodologías, evalúan expedientes, emiten certificados y operan
        programas. La ubicación de una Organization se refiere a su propio sitio registrado o principal,
        no al lugar donde ocurrió una acción que realizó. La ubicación a nivel de evento sigue siendo
        una propiedad del registro del evento.'
      description_fr: 'Un organisme identifiable juridiquement ou administrativement capable d''agir dans
        un processus de prestation publique : agence gouvernementale, ministère, ONG, agence des Nations
        unies, office statistique, établissement de santé, office d''état civil, tribunal ou éditeur de
        normes. Les organisations sont les acteurs institutionnels qui administrent des instruments, publient
        des méthodologies, évaluent des dossiers, délivrent des certificats et opèrent des programmes.
        La localisation d''une Organization désigne son propre site enregistré ou principal, et non le
        lieu où une action qu''elle a accomplie s''est déroulée. La localisation d''un événement reste
        une propriété du registre de l''événement.'
      external_alignments_json: '[{"label": "Organization", "match": "exact", "note": "foaf:Organization
        is the direct equivalent: a kind of agent corresponding to social institutions such as companies,
        societies, and so on.", "uri": "http://xmlns.com/foaf/0.1/Organization", "vocabulary": "FOAF",
        "vocabulary_id": "foaf"}, {"label": "Public Organisation", "match": "close", "note": "SEMIC CPOV
        defines PublicOrganisation as a formally recognised public-sector body with classification, legal
        status, and spatial jurisdiction slots. Our Organization covers the broader set of institutional
        actors in public delivery (government agencies and ministries, but also NGOs, UN agencies, health
        facilities, and standards publishers). The overlap is exact for public bodies and partial for
        the rest. CPOV''s richer shape (jurisdiction, legal status, purpose, contact point) is a natural
        target if Organization is later extended.", "uri": "http://data.europa.eu/m8g/PublicOrganisation",
        "vocabulary": "CPOV", "vocabulary_id": "semic"}, {"label": "Organization", "match": "exact", "note":
        "schema.org Organization is the direct equivalent, sibling to schema:Person under schema:Thing.
        Richer subtypes (GovernmentOrganization, NGO, MedicalOrganization) are available in schema.org
        but not yet mirrored here.", "uri": "https://schema.org/Organization", "vocabulary": "schema.org",
        "vocabulary_id": "schema-org"}, {"label": "Organization", "match": "exact", "note": "prov:Organization
        is the PROV-O equivalent: an agent that is a social institution. Sibling to prov:Person and prov:SoftwareAgent
        under prov:Agent.", "uri": "http://www.w3.org/ns/prov#Organization", "vocabulary": "PROV-O", "vocabulary_id":
        "prov"}, {"label": "Organization", "match": "close", "note": "FHIR Organization covers formally
        or informally recognised groupings of people or organizations formed for the purpose of achieving
        some form of collective action. Our Organization starts with a minimum property set (name, identifiers,
        location); FHIR adds contact points, active flag, and type categorization that may be added in
