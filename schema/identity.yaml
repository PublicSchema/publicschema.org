        "fhir"}, {"confidence": "medium", "label": "LegalEntity", "match": "close", "note": "PublicSchema
        Organization covers public and private organizations; Core Business LegalEntity is a close legal-identity
        alignment.", "predicate": "http://www.w3.org/2004/02/skos/core#closeMatch", "review_status": "accepted",
        "source_id": "semic-core-business", "source_version": "2.2.0", "uri": "http://www.w3.org/ns/legal#LegalEntity",
        "vocabulary": "SEMIC Core Business alignments"}]'
      convergence_json: '{"notes": "No mapped delivery system carries a first-class Organization concept.
        In practice, organizations appear as free-text publisher names on instruments, as implicit issuers
        on certificates, and as unmodelled administrative context around program operations. Standards
        bodies are consistent: FOAF, schema.org, PROV-O, and FHIR all have a named Organization concept.
        Minimum property set (name, identifiers, location) is pragmatic; richer modelling (parent_organization,
