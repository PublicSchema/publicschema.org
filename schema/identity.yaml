  nutrition_status:
    slot_uri: publicschema:nutrition_status
    title: Nutrition status
    description: 'A coarse current-state summary of the person''s acute malnutrition status, used by operational
      systems for targeting and referral queries. This is NOT a z-score classification on a specific measurement:
      band classifications depend on a growth reference, an age at measurement, and oedema status captured
      on a dedicated anthropometric profile published in a sibling schema (see ADR-011). Populate nutrition_status
      from an anthropometric profile only by citing the cutoff rule alongside.'
