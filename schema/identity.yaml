    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Estado nutricional
      label_fr: Statut nutritionnel
      description_es: 'Un resumen grueso del estado actual de desnutrición aguda de la persona, usado
        por sistemas operativos para consultas de focalización y derivación. Esto NO es una clasificación
        por puntaje z sobre una medición específica: las clasificaciones por bandas dependen de una referencia
        de crecimiento, una edad al momento de medición y un estado de edema consignados en un perfil
        antropométrico dedicado publicado en un esquema hermano (véase ADR-011). Complete nutrition_status
        a partir de un perfil antropométrico solo citando la regla de corte.'
      description_fr: 'Un résumé grossier de l''état actuel de malnutrition aiguë de la personne, utilisé
        par les systèmes opérationnels pour les requêtes de ciblage et d''orientation. Ce n''est PAS une
        classification par score z sur une mesure donnée : les classifications en bandes dépendent d''une
        référence de croissance, d''un âge à la mesure et d''un statut œdémateux consignés sur un profil
        anthropométrique dédié publié dans un schéma frère (voir ADR-011). Renseignez nutrition_status
        à partir d''un profil anthropométrique uniquement en citant la règle de seuil utilisée.'
      sensitivity: sensitive
      bibliography_refs: '["who-child-growth-standards"]'
