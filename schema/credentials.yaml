classes:
  Credential:
    class_uri: publicschema:Credential
    title: Credential
    description: Abstract supertype for PublicSchema verifiable credential descriptors. Each subclass
      declares a subject_concept and an optional list of included_concepts via annotations.
    abstract: true
    status: bibo:draft
  EnrollmentCredential:
    class_uri: publicschema:EnrollmentCredential
    is_a: Credential
    description: A verifiable credential proving that a person is enrolled in a social protection program,
      including enrollment status, dates, and program reference.
    status: bibo:draft
    annotations:
      description_es: Una credencial verificable que demuestra que una persona esta inscrita en un programa
        de proteccion social, incluyendo el estado de inscripcion, fechas y referencia del programa.
      description_fr: Un justificatif verifiable prouvant qu'une personne est inscrite dans un programme
        de protection sociale, incluant le statut d'inscription, les dates et la reference du programme.
      subject_concept: Person
      included_concepts_json: '["Enrollment"]'
  IdentityCredential:
    class_uri: publicschema:IdentityCredential
    is_a: Credential
    description: A verifiable credential asserting core identity attributes of a person, suitable for
      cross-program identification and deduplication.
    status: bibo:draft
    annotations:
      description_es: Una credencial verificable que afirma los atributos de identidad fundamentales de
        una persona, adecuada para la identificacion y deduplicacion entre programas.
      description_fr: Un justificatif verifiable attestant des attributs d'identite fondamentaux d'une
        personne, adapte a l'identification et a la deduplication inter-programmes.
      subject_concept: Person
  PaymentCredential:
    class_uri: publicschema:PaymentCredential
    is_a: Credential
    description: A verifiable credential recording a payment event to a beneficiary, including amount,
      date, delivery channel, and transaction reference.
    status: bibo:draft
    annotations:
      description_es: Una credencial verificable que registra un evento de pago a un beneficiario, incluyendo
        el monto, la fecha, el canal de entrega y la referencia de transaccion.
      description_fr: Un justificatif verifiable enregistrant un evenement de paiement a un beneficiaire,
        incluant le montant, la date, le canal de versement et la reference de transaction.
      subject_concept: Person
      included_concepts_json: '["PaymentEvent"]'
