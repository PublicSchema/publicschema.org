note: "SARA is the canonical WHO-maintained reference for national health facility assessments, providing the facility-type taxonomy (hospital, health center, health post, dispensary, clinic, pharmacy, laboratory, mobile clinic) and service-area readiness indicators. The Harmonized Health Facility Assessment (HHFA, 2022) consolidates SARA with the Service Delivery Indicators and extends it; the SARA facility typology remains the anchor."

