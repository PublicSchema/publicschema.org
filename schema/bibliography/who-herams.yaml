note: "HeRAMS is the WHO-maintained monitoring framework for tracking the availability of health resources and services, particularly in emergency and humanitarian contexts. HeRAMS facility reporting distinguishes fully functioning, partially functioning, and non-functioning facilities alongside the reasons for any service disruption; this informs the PublicSchema facility-operational-status vocabulary used by ServicePoint and HealthFacility."

