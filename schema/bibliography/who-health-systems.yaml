note: "WHO uses the primary / secondary / tertiary tier terminology as the common descriptive framework for national health-system organisation. Many countries extend this with a quaternary tier for national referral or research hospitals. There is no single canonical URL listing the tiers as coded values; this entry anchors the tier vocabulary to the WHO health-systems strengthening body of work."

