id: semic-core-person
name: SEMIC Core Person Vocabulary
custodian: European Commission, SEMIC
kind: rdf_profile
status: active
version: 2.1.1
version_status: recommendation
homepage: https://github.com/SEMICeu/Core-Person-Vocabulary
reference_url: https://semiceu.github.io/Core-Person-Vocabulary/releases/2.1.1/
license:
  id: CC-BY-4.0
  uri: https://creativecommons.org/licenses/by/4.0/
  attribution_required: true
  attribution_text: Contains information from SEMIC Core Vocabularies, licensed under CC BY 4.0.
  redistribution: embed-with-attribution
allowed_hosts:
  - github.com
  - raw.githubusercontent.com
  - semiceu.github.io
artifacts:
  - url: https://raw.githubusercontent.com/SEMICeu/Core-Person-Vocabulary/v2.1.1/releases/2.1.1/voc/core-person-voc.ttl
    media_type: text/turtle
    sha256: 98d8439aa3a21b797d3f7f1b6f63b87228f52ab7540de7c4b93e9f07f33db392
    retrieved_at: "2026-05-07T00:00:00Z"
  - url: https://raw.githubusercontent.com/SEMICeu/Core-Person-Vocabulary/v2.1.1/releases/2.1.1/shacl/core-person-ap-SHACL.ttl
    media_type: text/turtle
    sha256: 335602c4ad6d71274b6dec48f433e3a8f809b600c82b5cbe0d23e528c6fe874b
    retrieved_at: "2026-05-07T00:00:00Z"
  - url: https://raw.githubusercontent.com/SEMICeu/Core-Person-Vocabulary/v2.1.1/releases/2.1.1/context/core-person-ap.jsonld
    media_type: application/ld+json
    sha256: 02fc822da4ec9f438b20825708843859a4df804a70c45900a0191cbb33f3458c
    retrieved_at: "2026-05-07T00:00:00Z"
prefixes:
  adms: http://www.w3.org/ns/adms#
  cv: http://data.europa.eu/m8g/
  dct: http://purl.org/dc/terms/
  foaf: http://xmlns.com/foaf/0.1/
  locn: http://www.w3.org/ns/locn#
  person: http://www.w3.org/ns/person#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#
parser:
  adapter: semic-rdf-shacl
  version: 1
refresh_procedure:
  cadence: manual-per-upstream-release
  steps:
    - Verify the latest SEMIC Core Person release tag and version page.
    - Download the vocabulary TTL, SHACL TTL, and JSON-LD context from the pinned release tag.
    - Run `shasum -a 256 core-person-voc.ttl core-person-ap-SHACL.ttl core-person-ap.jsonld`.
    - Update `version`, `reference_url`, artifact URLs, hashes, and `retrieved_at` in one commit.
    - Run `uv run pytest tests/test_reference_alignments.py -q`.
  expected_artifacts:
    - releases/{version}/voc/core-person-voc.ttl
    - releases/{version}/shacl/core-person-ap-SHACL.ttl
    - releases/{version}/context/core-person-ap.jsonld
notes: >
  PublicSchema treats SEMIC Core Person as an external reference source.
  The term IRIs discovered through this source are not necessarily owned by
  SEMIC; for example, Person uses the W3C person namespace.
