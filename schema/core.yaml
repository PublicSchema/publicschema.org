classes:
  Agent:
    class_uri: publicschema:Agent
    title: Agent
    description: 'An entity that can act within a public delivery process: a person, an organization,
      or a software system. Agent is the shared supertype for actors that perform, publish, evaluate,
      decide, or execute. Actor-side references such as performed_by, evaluator, and publisher accept
      any Agent, letting the schema name the accountable party whether it is a named individual, an administrative
      body, or a piece of software. Agent is distinct from Party, which groups the entities that receive
      services (Person and Group). Person is the only concept that belongs to both hierarchies: a person
      can both receive services and perform them.

      '
    status: bibo:status/published
    exact_mappings:
    - foaf:Agent
    - prov:Agent
    close_mappings:
    - fhir:Practitioner
    - schema:Thing
    annotations:
      label_es: Agente
      label_fr: Agent
      description_es: 'Una entidad capaz de actuar en un proceso de prestación pública: una persona, una
        organización o un sistema de software. Agent es el supertipo compartido de los actores que ejecutan,
        publican, evalúan, deciden o realizan. Las referencias del lado del actor como performed_by, evaluator
        y publisher aceptan cualquier Agent, lo que permite al esquema nombrar a la parte responsable,
        ya sea una persona con nombre, un organismo administrativo o un programa informático. Agent es
        distinto de Party, que agrupa a las entidades que reciben servicios (Person y Group). Person es
        el único concepto que pertenece a ambas jerarquías: una persona puede tanto recibir servicios
        como ejecutarlos.'
      description_fr: 'Une entité capable d''agir dans un processus de prestation publique : une personne,
        une organisation ou un système logiciel. Agent est le supertype partagé des acteurs qui exécutent,
        publient, évaluent, décident ou réalisent. Les références côté acteur telles que performed_by,
        evaluator et publisher acceptent tout Agent, ce qui permet au schéma de désigner la partie responsable,
        qu''il s''agisse d''une personne nommée, d''un organisme administratif ou d''un logiciel. Agent
        est distinct de Party, qui regroupe les entités qui reçoivent des services (Person et Group).
        Person est le seul concept appartenant aux deux hiérarchies : une personne peut à la fois recevoir
        des services et en exécuter.'
      external_alignments_json: '[{"label": "Agent", "match": "exact", "note": "W3C PROV-O prov:Agent
        is the direct equivalent: an entity that bears some form of responsibility for an activity. PROV''s
        subtypes prov:Person, prov:Organization, and prov:SoftwareAgent align one-to-one with ours.",
        "uri": "http://www.w3.org/ns/prov#Agent", "vocabulary": "PROV-O", "vocabulary_id": "prov"}, {"label":
        "Agent", "match": "exact", "note": "foaf:Agent is the canonical broad supertype for persons, organisations,
        and software. Our Agent hierarchy matches FOAF''s structure.", "uri": "http://xmlns.com/foaf/0.1/Agent",
        "vocabulary": "FOAF", "vocabulary_id": "foaf"}, {"label": "Person and Organization (sibling pattern)",
        "match": "related", "note": "schema.org has no single Agent supertype; instead Person and Organization
        are sibling subtypes of Thing, and properties that accept either name both in their range. Our
        Agent captures the same intent under a named abstract.", "uri": "https://schema.org/Thing", "vocabulary":
        "schema.org", "vocabulary_id": "schema-org"}, {"label": "Practitioner, Organization, Device (actor
        split)", "match": "related", "note": "FHIR splits actors across Practitioner, Organization, and
        Device (plus PractitionerRole for role-qualified assignments). Our Agent is the supertype that
        covers the same ground; PractitionerRole-style reification is deferred.", "uri": "http://hl7.org/fhir/Practitioner",
        "vocabulary": "FHIR R4", "vocabulary_id": "fhir"}]'
      convergence_json: '{"notes": "No mapped delivery system carries an Agent supertype directly. The
        convergence case comes from standards bodies: W3C PROV-O, FOAF, schema.org, and FHIR all split
        the actor role across persons, organizations, and (in PROV and FHIR) software or devices. Agent
        gives those actor-side references a single honest range in the schema so that performed_by, evaluator,
        and publisher no longer have to sit on Party, which is reserved for receivers of services.\n",
        "system_count": 0, "total_systems": 6}'
      bibliography_refs: '["fhir-r4", "foaf", "schema-org", "w3c-prov-o"]'
    abstract: true
  Party:
    class_uri: publicschema:Party
    title: Party
    description: 'A person or organized group of persons that can be identified, enrolled in programs,
      and receive benefits or services. Party is the shared supertype for Person and Group, enabling references
      that accept either.

      '
    slots:
    - name
    - identifiers
    - identity_documents
    status: bibo:status/published
    close_mappings:
    - person:Person
    annotations:
      label_es: Parte
      label_fr: Partie
      description_es: Una persona o grupo organizado de personas que puede ser identificado, inscrito
        en programas y recibir beneficios o servicios. Party es el supertipo compartido para Person y
        Group, que permite referencias que acepten cualquiera de los dos.
      description_fr: Une personne ou un groupe organisé de personnes pouvant être identifié, inscrit
        dans des programmes et recevoir des prestations ou des services. Party est le supertype commun
        de Person et Group, permettant de les désigner indifféremment dans une référence.
      external_alignments_json: '[{"label": "Person (Core Person)", "match": "related", "note": "SEMIC
        Core Person covers the individual human. Party is the beneficiary-side supertype for persons and
        organized groups of persons (Household, Family, Farm) that can be enrolled in programs and receive
        services. The broader SEMIC/foaf:Agent vocabulary for acting entities maps to our Agent concept,
        not to Party.", "uri": "http://www.w3.org/ns/person#Person", "vocabulary": "Core Person", "vocabulary_id":
        "semic"}]'
      convergence_json: '{"notes": "Party is a PublicSchema abstract supertype; no mapped system exposes
        a party supertype by that name, so system_count is reported as 0/6 per the convention stated in
        design-principles.md section 3. All six systems do distinguish between individual and group-level
        records and share common identification and naming properties across both, with OpenSPP modelling
        the split explicitly as \"Registrant\"; that evidence accrues to the concrete Party subtypes (Person,
        Household, Family, Farm), not to the supertype itself.\n", "system_count": 0, "total_systems":
        6}'
      bibliography_refs: '["schema-org", "semic-core-person"]'
    abstract: true
slots:
  identity_documents:
    slot_uri: publicschema:identity_documents
    title: Identity documents
    description: Identity documents held by this party, such as passports, national identity cards, civil
      registration certificates, and program-issued beneficiary cards.
    range: IdentityDocument
    multivalued: true
    status: bibo:draft
    annotations:
      label_es: Documentos de identidad
      label_fr: Documents d'identité
      description_es: Documentos de identidad que posee esta parte, como pasaportes, tarjetas de identidad
        nacional, actas de registro civil y tarjetas de beneficiario emitidas por programas.
      description_fr: Documents d'identité détenus par cette partie, tels que passeports, cartes d'identité
        nationale, actes d'état civil et cartes de bénéficiaire délivrées par des programmes.
      category: identity
