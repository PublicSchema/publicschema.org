classes:
  Farm:
    class_uri: publicschema:Farm
    title: Farm
    description: 'An economic unit of agricultural production under single management, comprising all
      livestock kept and all land used wholly or partly for agricultural production, without regard to
      title, legal form, or size. Aligns with the FAO "agricultural holding" (World Census of Agriculture
      2020). Farm records appear across agricultural registries, land administration, social protection,
      and climate adaptation programs.

      '
    is_a: Group
    slots:
    - farm_area_hectares
    - primary_crop
    - livestock_type
    - land_tenure
    - location
    status: bibo:draft
    annotations:
      label_es: Finca
      label_fr: Exploitation agricole
      description_es: Una unidad económica de producción agrícola bajo gestión única, que comprende todo
        el ganado que se posee y toda la tierra utilizada total o parcialmente para la producción agrícola,
        sin consideración del título, la forma jurídica o el tamaño. Equivale a la "explotación agrícola"
        de la FAO (Censo Agropecuario Mundial 2020). Los registros de explotaciones agrícolas aparecen
        en registros agrícolas, administración de tierras, protección social y programas de adaptación
        climática.
      description_fr: Une unité économique de production agricole sous gestion unique, comprenant tout
        le cheptel détenu et toutes les terres utilisées en tout ou en partie à des fins de production
        agricole, sans tenir compte du titre, de la forme juridique ou de la taille. Équivaut à l'"exploitation
        agricole" de la FAO (Recensement mondial de l'agriculture 2020). Les données sur les exploitations
        agricoles apparaissent dans les registres agricoles, l'administration foncière, la protection
        sociale et les programmes d'adaptation climatique.
      convergence_json: '{"notes": "Low coverage. Only DHIS2 (workaround) and OpenSPP have farm data models.",
        "system_count": 2, "total_systems": 6}'
      bibliography_refs: '["fao-vggt", "fao-wca-2020-vol1", "lsms-isa"]'
  GroupMembership:
    class_uri: publicschema:GroupMembership
    title: Group Membership
    description: 'The link between a Person and a Group, carrying the role the person plays within that
      group membership (such as head, spouse, child, owner, operator, or worker). Applicable role values
      depend on the kind of group. This link allows a person to belong to multiple groups at the same
      time.

      '
    slots:
    - person
    - group
    - role
    - start_date
    - end_date
    - is_active
    status: bibo:status/published
    close_mappings:
    - dci:data/Member
    annotations:
      label_es: Membresía de grupo
      label_fr: Appartenance à un groupe
      description_es: El vínculo entre una persona y un grupo, que indica el rol que la persona desempeña
        dentro de esa membresía de grupo (como jefe, cónyuge, hijo, propietario, operador o trabajador).
        Los valores de rol aplicables dependen del tipo de grupo. Este vínculo permite que una persona
        pertenezca a varios grupos al mismo tiempo.
      description_fr: Le lien entre une personne et un groupe, indiquant le rôle que la personne joue
        dans cette appartenance au groupe (tel que chef, conjoint, enfant, propriétaire, exploitant ou
        travailleur). Les valeurs de rôle applicables dépendent du type de groupe. Ce lien permet à une
        personne d'appartenir à plusieurs groupes simultanément.
      external_alignments_json: '[{"label": "Member", "match": "broad", "note": "DCI Member conflates
        group membership with an extended person profile (demographics, disability, employment); PublicSchema
        separates the join (GroupMembership) from the person record (Person)", "uri": "https://schema.spdci.org/core/v1/data/Member",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"system_count": 5, "total_systems": 6}'
      bibliography_refs: '["spdci-common-standards", "un-census-rev3"]'
  HazardEvent:
    class_uri: publicschema:HazardEvent
    title: Hazard Event
    description: 'An event or condition that may disrupt the delivery of public services or affect the
      well-being of a population. Covers natural hazards (floods, droughts, earthquakes), health emergencies,
      conflict, and economic shocks. Aligned with the Sendai Framework''s broad definition of hazard,
      and mappable to OASIS CAP v1.2 for alert interoperability.

      '
    is_a: Event
    slots:
    - hazard_type
    - severity
    - certainty
    - description
    - start_date
    - end_date
    - affected_locations
    - affected_programs
    - data_sources
    status: bibo:draft
    annotations:
      label_es: Evento de peligro
      label_fr: Événement dangereux
      description_es: Un evento o condición que puede interrumpir la prestación de servicios públicos
        o afectar el bienestar de una población. Cubre riesgos naturales (inundaciones, sequías, terremotos),
        emergencias sanitarias, conflictos y choques económicos. Alineado con la definición amplia del
        Marco de Sendai y compatible con OASIS CAP v1.2 para la interoperabilidad de alertas.
      description_fr: Un événement ou une condition pouvant perturber la prestation de services publics
        ou affecter le bien-être d'une population. Couvre les risques naturels (inondations, sécheresses,
        tremblements de terre), les urgences sanitaires, les conflits et les chocs économiques. Conforme
        à la définition élargie du Cadre de Sendai et compatible avec OASIS CAP v1.2 pour l'interopérabilité
        des alertes.
      bibliography_refs: '["oasis-cap-v1-2", "rfc-7946"]'
  InKindDelivery:
    class_uri: publicschema:InKindDelivery
    title: In-Kind Delivery
    description: 'A record of a direct physical distribution of goods or services from a program to a
      beneficiary, with no financial instrument involved. Covers food distribution, supply kits, agricultural
      inputs, school feeding, and direct service provision. Multiple in-kind deliveries may fulfill a
      single entitlement.

      '
    is_a: Event
    slots:
    - entitlement_ref
    - enrollment_ref
    - recipient
    - items
    - delivery_date
    - delivery_location
    - delivery_status
    status: bibo:draft
    annotations:
      label_es: Prestación en especie
      label_fr: Prestation en nature
      description_es: Un registro de una distribución física directa de bienes o servicios de un programa
        a un beneficiario, sin instrumento financiero involucrado. Cubre la distribución de alimentos,
        kits de suministros, insumos agrícolas, alimentación escolar y prestación directa de servicios.
        Varias entregas en especie pueden cumplir un solo derecho.
      description_fr: Un enregistrement d'une distribution physique directe de biens ou de services d'un
        programme vers un bénéficiaire, sans recours à un instrument financier. Couvre la distribution
        alimentaire, les kits de fournitures, les intrants agricoles, l'alimentation scolaire et la prestation
        directe de services. Plusieurs livraisons en nature peuvent s'acquitter d'un seul droit.
      convergence_json: '{"notes": "No direct analog in the six mapped SP systems. In-kind distribution
        tracking is common in humanitarian programs (WFP General Food Distribution, UNICEF supply programs)
        but these are not among the currently mapped targets.\n", "system_count": 0, "total_systems":
        6}'
  Instrument:
    class_uri: publicschema:Instrument
    title: Instrument
    description: 'A defined tool used to collect information about a subject: a survey form, questionnaire,
      screening protocol, or measurement procedure. Instruments are the catalog entries that Profile records
      reference to declare which tool was administered. Examples include the Washington Group Short Set
      on Functioning (WG-SS), the UNICEF Child Functioning Module (CFM 2-4, CFM 5-17), a proxy means test
      questionnaire, the SMART anthropometry protocol, and a national social registry registration form.
      Instrument entries are persistent registry records, not administration events; a single instrument
      is typically administered many times.

      '
    slots:
    - name
    - version
    - publisher
    - publication_url
    - item_set
    - language_of_administration
    status: bibo:draft
    close_mappings:
    - fhir:Questionnaire
    annotations:
      label_es: Instrumento
      label_fr: Instrument
      description_es: 'Una herramienta definida utilizada para recopilar información sobre un sujeto:
        formulario de encuesta, cuestionario, protocolo de detección o procedimiento de medición. Los
        instrumentos son las entradas de registro que los registros Profile referencian para declarar
        qué herramienta se administró. Los ejemplos incluyen el conjunto corto del Washington Group sobre
        funcionamiento (WG-SS), el Módulo de Funcionamiento Infantil de UNICEF (CFM 2-4, CFM 5-17), un
        cuestionario de prueba proxy de medios de vida, el protocolo de antropometría SMART y un formulario
        nacional de registro al registro social. Las entradas de instrumento son registros persistentes,
        no eventos de administración; un mismo instrumento se administra generalmente muchas veces.'
      description_fr: 'Un outil défini utilisé pour collecter des informations sur un sujet : formulaire
        d''enquête, questionnaire, protocole de dépistage ou procédure de mesure. Les instruments sont
        les entrées de registre que les enregistrements Profile référencent pour déclarer quel outil a
        été administré. Les exemples incluent l''ensemble court du Washington Group sur le fonctionnement
        (WG-SS), le Module de fonctionnement de l''enfant de l''UNICEF (CFM 2-4, CFM 5-17), un questionnaire
        de test de substitution des ressources, le protocole d''anthropométrie SMART et un formulaire
        national d''enregistrement au registre social. Les entrées d''instrument sont des enregistrements
        de registre persistants, pas des événements d''administration ; un même instrument est généralement
        administré de nombreuses fois.'
      external_alignments_json: '[{"label": "Questionnaire", "match": "close", "note": "FHIR Questionnaire
        is the canonical peer for a data-collection instrument; our Instrument also covers measurement
        protocols and screening forms beyond survey questionnaires", "uri": "http://hl7.org/fhir/Questionnaire",
        "vocabulary": "FHIR R4", "vocabulary_id": "fhir"}]'
      convergence_json: '{"notes": "Only FHIR carries a first-class instrument registry (Questionnaire).
        DHIS2, OpenCRVS, OpenSPP, openIMIS, and DCI Core do not catalog instruments. In practice, standards
        bodies publish the instruments themselves (Washington Group, UNICEF MICS, WHO, SMART), and adopters
        reference them by name and version. This concept gives those references a citable home so Profile
        records can declare exactly which tool and version produced them.\n", "system_count": 1, "total_systems":
        6}'
      bibliography_refs: '["fhir-r4"]'
  Location:
    class_uri: publicschema:Location
    title: Location
    description: 'A named geographic or administrative area, such as a region, district, commune, or village.
      Location captures where a household or event is situated within an administrative hierarchy, distinct
      from a street address.

      '
    slots:
    - location_name
    - latitude
    - longitude
    - geometry
    - administrative_level
    - level_name
    - parent_location
    - geocodes
    status: bibo:status/published
    close_mappings:
    - cpov:AdminUnit
    - dci:data/Place
    - dct:Location
    annotations:
      label_es: Ubicación
      label_fr: Localisation
      description_es: Un área geográfica o administrativa con nombre, como una región, distrito, municipio
        o aldea. La ubicación indica dónde se sitúa un hogar o evento dentro de una jerarquía administrativa,
        distinta de una dirección postal.
      description_fr: Une zone géographique ou administrative nommée, telle qu'une région, un district,
        une commune ou un village. La localisation précise où se situe un ménage ou un événement dans
        une hiérarchie administrative, distincte d'une adresse postale.
      featured: true
      external_alignments_json: '[{"label": "Location", "match": "close", "note": "SEMIC dc:Location is
        a generic spatial thing; ours is a hierarchical administrative node with level and parent", "uri":
        "http://purl.org/dc/terms/Location", "vocabulary": "Core Location", "vocabulary_id": "semic"},
        {"label": "Administrative Unit", "match": "broad", "note": "SEMIC AdminUnit is strictly an administrative
        hierarchy node; ours also covers non-administrative boundaries like flood zones and program coverage
        areas", "uri": "http://data.europa.eu/m8g/AdminUnit", "vocabulary": "Core Location", "vocabulary_id":
        "semic-adminunit"}, {"label": "Place", "match": "close", "note": "Both are hierarchical named
        locations with coordinates; DCI uses contained_in_place/contains_place for hierarchy while PublicSchema
        uses parent_location and administrative_level", "uri": "https://schema.spdci.org/core/v1/data/Place",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"system_count": 6, "total_systems": 6}'
      property_groups_json: '[{"category": "location", "properties": ["location_name", "latitude", "longitude",
        "geometry"]}, {"category": "administrative", "properties": ["administrative_level", "level_name",
        "parent_location", "geocodes"]}]'
      bibliography_refs: '["hdx-p-codes", "rfc-7946", "schema-org", "semic-core-location", "spdci-common-standards"]'
  PaymentEvent:
    class_uri: publicschema:PaymentEvent
    title: Payment Event
    description: 'A record of a direct monetary transfer from a program to a beneficiary. Covers bank
      transfer, mobile money, cash, agent network, and prepaid card channels. Multiple payment events
      may fulfill a single entitlement (e.g., split payments, multi-tranche disbursements, or retries
      after failure).

      '
    is_a: Event
    slots:
    - entitlement_ref
    - enrollment_ref
    - recipient
    - payment_amount
    - payment_currency
    - payment_date
    - payment_status
    - delivery_channel
    - failure_reason
    - is_reconciled
    status: bibo:status/forthcoming
    annotations:
      label_es: Evento de pago
      label_fr: Événement de paiement
      description_es: Un registro de una transferencia monetaria directa de un programa a un beneficiario.
        Cubre los canales de transferencia bancaria, dinero móvil, efectivo, red de agentes y tarjeta
        prepaga. Varios eventos de pago pueden cumplir un solo derecho (por ej., pagos fraccionados, desembolsos
        en múltiples cuotas o reintentos tras un error).
      description_fr: 'Un enregistrement d''un transfert monétaire direct d''un programme vers un bénéficiaire.
        Couvre les canaux suivants : virement bancaire, argent mobile, espèces, réseau d''agents et carte
        prépayée. Plusieurs événements de paiement peuvent honorer un seul droit (par ex., paiements fractionnés,
        versements à tranches multiples ou nouvelles tentatives après échec).'
      featured: true
      external_alignments_json: '[{"label": "N/A", "match": "none", "note": "DCI does not define a standalone
        payment event entity. Payment data is tracked as properties on Beneficiary (disbursement history).",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}]'
      convergence_json: '{"system_count": 6, "total_systems": 6}'
      bibliography_refs: '["govstack-payments", "gsma-mobile-money", "mojaloop-fspiop", "wb-sp-delivery-framework"]'
  PrivacyNotice:
    class_uri: publicschema:PrivacyNotice
    title: Privacy Notice
    description: 'PrivacyNotice is the artefact presented to a data subject describing which personal
      data will be processed, by whom, for what purposes, under which legal basis, and with what rights.
      It bounds the scope of each ConsentRecord anchored to it: a record''s processing scope must fall
      within the notice''s declared scope, or the notice must be updated and re-consent obtained. Notice
      versioning is deliberate; a substantive change (new purposes, new recipients, new data categories)
      triggers re-consent, while editorial changes (typos, translation fixes, contact refresh) do not.

      '
    slots:
    - identifier
    - identifiers
    - name
    - version
    - schema_version
    - conforms_to
    - created_at
    - supersedes_ref
    - controllers
    - dpo_contact
    - complaint_authority_contact
    - purposes
    - personal_data_categories
    - processing_operations
    - legal_basis
    - special_category_basis
    - recipient_categories
    - recipients_described
    - available_languages
    - transfer_description
    - automated_decision_description
    - rights_description
    - source_of_data
    - withdrawal_description
    - retention_description
    - storage_duration_days
    - effective_date
    - expiry_date
    - jurisdiction
    status: bibo:draft
    exact_mappings:
    - dpv:PrivacyNotice
    close_mappings:
    - dpv:ConsentNotice
    annotations:
      label_es: Aviso de privacidad
      label_fr: Notice d'information
      description_es: 'PrivacyNotice es el artefacto presentado al interesado que describe qué datos personales
        se tratarán, por quién, con qué fines, bajo qué base jurídica y con qué derechos. Delimita el
        alcance de cada ConsentRecord que lo referencia: el alcance de tratamiento de un registro debe
        permanecer dentro del declarado por el aviso; de lo contrario, el aviso debe actualizarse y obtenerse
        un nuevo consentimiento. El versionado del aviso es deliberado; un cambio sustantivo (nuevas finalidades,
        nuevos destinatarios, nuevas categorías de datos) desencadena un nuevo consentimiento, mientras
        que un cambio editorial (correcciones, traducciones, datos de contacto) no lo hace.'
      description_fr: 'PrivacyNotice est l''artefact présenté à une personne concernée décrivant quelles
        données personnelles seront traitées, par qui, à quelles fins, sur quelle base juridique et avec
        quels droits. Elle délimite le périmètre de chaque ConsentRecord qui y est rattaché: le périmètre
        de traitement d''un enregistrement doit rester dans celui déclaré par l''avis, sinon l''avis doit
        être mis à jour et un nouveau consentement recueilli. Le versionnage de l''avis est délibéré;
        un changement substantiel (nouvelles finalités, nouveaux destinataires, nouvelles catégories de
        données) déclenche un nouveau consentement, alors qu''un changement rédactionnel (corrections,
        traductions, coordonnées) ne le déclenche pas.'
      external_alignments_json: '[{"label": "Privacy Notice", "match": "exact", "note": "W3C DPV 2.0 defines
        dpv:PrivacyNotice as a notice of privacy practices. When legal_basis includes consent, the notice
        is also a dpv:ConsentNotice (same class, narrower role).", "uri": "https://w3id.org/dpv#PrivacyNotice",
        "vocabulary": "W3C DPV v2", "vocabulary_id": "dpv"}, {"label": "Consent Notice", "match": "related",
        "note": "dpv:ConsentNotice is the consent-focused specialisation of dpv:PrivacyNotice. Our PrivacyNotice
        is the supertype; records with legal_basis = consent are anchored against notices that also satisfy
        the ConsentNotice specialisation.", "uri": "https://w3id.org/dpv#ConsentNotice", "vocabulary":
        "W3C DPV v2", "vocabulary_id": "dpv-consent-notice"}]'
      convergence_json: '{"notes": "PrivacyNotice as a first-class artefact is less widespread than ConsentRecord.
        ISO/IEC 29184 specifies notice structure; W3C DPV models it as dpv:PrivacyNotice. Most delivery
        systems handle notice text as prose in program documentation rather than as a structured record.
        This concept exists so adopters can version notices alongside records, trace re-consent triggers,
        and generate jurisdiction-aware notice text from structured inputs.\n", "system_count": 2, "total_systems":
        6}'
      property_groups_json: '[{"category": "administrative", "properties": ["identifier", "identifiers",
        "name", "version", "schema_version", "conforms_to", "created_at"]}, {"category": "consent_parties",
        "properties": ["controllers", "dpo_contact", "complaint_authority_contact", "recipient_categories",
        "recipients_described"]}, {"category": "consent_processing", "properties": ["purposes", "personal_data_categories",
        "processing_operations", "legal_basis", "special_category_basis"]}, {"category": "consent_notice",
        "properties": ["supersedes_ref", "available_languages", "transfer_description", "automated_decision_description",
        "rights_description", "source_of_data"]}, {"category": "consent_validity", "properties": ["effective_date",
        "expiry_date", "jurisdiction"]}, {"category": "consent_lifecycle", "properties": ["withdrawal_description"]},
        {"category": "consent_retention", "properties": ["retention_description", "storage_duration_days"]}]'
      bibliography_refs: '["iso-29184", "kantara-ancr", "w3c-dpv"]'
  ScoringEvent:
    class_uri: publicschema:ScoringEvent
    title: Scoring Event
    description: 'A discrete event in which a scoring rule is applied to inputs about a subject to produce
      a score or a band. Inputs may be one or more Profile records (a functioning profile scored against
      a Washington Group cutoff, an anthropometric profile scored against WHO thresholds, a socio-economic
      profile scored with a PMT formula) or inline data packaged for the scoring run. A scoring event
      is distinct from the instrument administration that produced its inputs: scoring can be re-done
      against a different rule without collecting new data.

      '
    is_a: Event
    slots:
    - subject
    - rule_applied
    - evaluation_date
    - evaluator
    - software_used
    - inputs
    - raw_score
    - assessment_band
    status: bibo:draft
    annotations:
      label_es: Evento de puntuación
      label_fr: Événement de notation
      description_es: 'Un evento discreto en el que se aplica una regla de puntuación a datos de entrada
        sobre un sujeto para producir una puntuación o banda. Las entradas pueden ser uno o más registros
        Profile (un perfil de funcionamiento puntuado con un corte del Washington Group, un perfil antropométrico
        puntuado con los umbrales de la OMS, un perfil socioeconómico puntuado con una fórmula PMT) o
        datos en línea preparados para la ejecución de la puntuación. Un evento de puntuación es distinto
        de la administración del instrumento que produjo sus entradas: la puntuación puede rehacerse con
        una regla diferente sin recolectar nuevos datos.'
      description_fr: 'Un événement discret au cours duquel une règle de notation est appliquée à des
        données d''entrée concernant un sujet pour produire un score ou une bande. Les entrées peuvent
        être un ou plusieurs enregistrements Profile (un profil de fonctionnement scoré selon un seuil
        du Washington Group, un profil anthropométrique scoré selon les seuils de l''OMS, un profil socio-économique
        scoré par une formule PMT) ou des données en ligne préparées pour l''exécution de la notation.
        Un événement de notation est distinct de l''administration d''instrument qui a produit ses entrées
        : la notation peut être refaite selon une règle différente sans recollecter de données.'
      convergence_json: '{"notes": "Three of six v1 systems represent a scoring run as a first-class record:
        OpenSPP (proxy means test evaluation), DCI IBR (assessment event linked to a framework), and FHIR
        (RiskAssessment). DHIS2, OpenCRVS, and openIMIS do not carry a distinct scoring event in core
        and rely on computed fields on the subject record. Separating the scoring event from the instrument
        administration lets a single Profile be re-scored against different rules without new data collection.\n",
        "system_count": 3, "total_systems": 6}'
      bibliography_refs: '["barca-2017-integrating-data", "barca-2021-inclusive-information-systems",
        "dhs-recode7"]'
  ScoringRule:
    class_uri: publicschema:ScoringRule
    title: Scoring Rule
    description: 'A persistent set of rules, formulas, or cutoffs used to turn input data into a score
      or a band. Scoring rules include proxy means test (PMT) formulas, the Progress out of Poverty Index
      (PPI), multidimensional poverty indices, Washington Group disability cutoffs (cutoff 3, cutoff 4,
      domain-specific), and WHO anthropometric band thresholds. Scoring rules are registry entries: they
      exist independently of any particular administration and can be applied to data collected through
      different instruments.

      '
    slots:
    - name
    - scoring_method
    - data_sources
    - cutoff_score
    - publication_url
    status: bibo:draft
    close_mappings:
    - cpov:ReferenceFramework
    annotations:
      label_es: Regla de puntuación
      label_fr: Règle de notation
      description_es: 'Un conjunto persistente de reglas, fórmulas o cortes utilizados para transformar
        datos de entrada en una puntuación o banda. Las reglas de puntuación incluyen las fórmulas de
        prueba proxy de medios de vida (PMT), el Índice de Progreso fuera de la Pobreza (PPI), los índices
        de pobreza multidimensional, los cortes de discapacidad del Washington Group (corte 3, corte 4,
        específicos por dominio) y los umbrales de bandas antropométricas de la OMS. Las reglas de puntuación
        son entradas de registro: existen con independencia de cualquier administración particular y pueden
        aplicarse a datos recolectados mediante distintos instrumentos.'
      description_fr: 'Un ensemble persistant de règles, formules ou seuils utilisés pour transformer
        des données d''entrée en un score ou une bande. Les règles de notation incluent les formules de
        test de substitution des ressources (PMT), l''indice de progression hors de la pauvreté (PPI),
        les indices de pauvreté multidimensionnelle, les seuils d''incapacité du Washington Group (seuil
        3, seuil 4, spécifique à un domaine) et les seuils des bandes anthropométriques de l''OMS. Les
        règles de notation sont des entrées de registre : elles existent indépendamment de toute administration
        particulière et peuvent être appliquées à des données collectées via différents instruments.'
      external_alignments_json: '[{"label": "Reference Framework", "match": "close", "note": "SEMIC ReferenceFramework
        is legislation or policy from which requirements derive; ours is narrower: a scoring methodology
        (PMT, WG cutoff, growth-standard thresholds)", "uri": "http://data.europa.eu/m8g/ReferenceFramework",
        "vocabulary": "CCCEV", "vocabulary_id": "semic"}]'
      convergence_json: '{"notes": "Four of six v1 systems (DHIS2, FHIR via RiskAssessment reference frameworks,
        OpenSPP, DCI IBR) carry a concept that plays the ScoringRule role: a persistent methodology definition
        referenced by per-subject scoring runs. OpenCRVS and openIMIS do not model scoring rules directly,
        relying on out-of-band documentation. SEMIC CCCEV ReferenceFramework is the broader upstream peer
        covering any policy or legislation from which requirements derive; our ScoringRule is the narrower
        subset used for scoring.\n", "system_count": 4, "total_systems": 6}'
      bibliography_refs: '["barca-2017-integrating-data", "semic-cccev"]'
  SoftwareAgent:
    class_uri: publicschema:SoftwareAgent
    title: Software Agent
    description: 'A software product or system that performed a step in a delivery process, such as a
      scoring engine that computed a proxy means test score or a rule engine that evaluated eligibility.
      SoftwareAgent records the identity and version of the software so that a result can be reproduced
      or audited later. SoftwareAgent is a subtype of Agent, alongside Person and Organization. It is
      distinct from the Person or Organization accountable for the action (recorded in properties such
      as performed_by or evaluator) and from an Instrument (the questionnaire or measurement tool administered
      to a subject).

      '
    is_a: Agent
    slots:
    - name
    - version
    - publisher
    - publication_url
    status: bibo:draft
    exact_mappings:
    - prov:SoftwareAgent
    close_mappings:
    - foaf:Agent
    annotations:
      label_es: Agente de software
      label_fr: Agent logiciel
      description_es: Un producto o sistema de software que realizó un paso en un proceso de prestación,
        por ejemplo un motor de puntuación que calculó una puntuación de prueba proxy de medios de vida
        o un motor de reglas que evaluó la elegibilidad. SoftwareAgent registra la identidad y la versión
        del software para que un resultado pueda reproducirse o auditarse posteriormente. SoftwareAgent
        es un subtipo de Agent, junto con Person y Organization. Es distinto de la Person u Organization
        responsable de la acción (registrada en propiedades como performed_by o evaluator) y de un Instrument
        (el cuestionario o la herramienta de medición administrada a un sujeto).
      description_fr: Un produit ou système logiciel ayant effectué une étape dans un processus de prestation,
        par exemple un moteur de notation qui a calculé un score de test de substitution des ressources
        ou un moteur de règles qui a évalué l'admissibilité. SoftwareAgent enregistre l'identité et la
        version du logiciel afin qu'un résultat puisse être reproduit ou audité ultérieurement. SoftwareAgent
        est un sous-type d'Agent, au même titre que Person et Organization. Il est distinct de la Person
        ou de l'Organization responsable de l'action (consignée dans des propriétés comme performed_by
        ou evaluator) et d'un Instrument (le questionnaire ou l'outil de mesure administré à un sujet).
      external_alignments_json: '[{"label": "SoftwareAgent", "match": "exact", "note": "Direct W3C PROV-O
        equivalent: a software agent that played a role in an activity. Our SoftwareAgent is scoped to
        recording the software that acted within a public delivery process.", "uri": "http://www.w3.org/ns/prov#SoftwareAgent",
        "vocabulary": "PROV-O", "vocabulary_id": "prov"}, {"label": "Agent", "match": "broad", "note":
        "foaf:Agent is the broad supertype covering persons, organisations, and software. SoftwareAgent
        is narrower: software specifically. Our Agent concept is the local peer for foaf:Agent and is
        the shared supertype of Person, Organization, and SoftwareAgent.", "uri": "http://xmlns.com/foaf/0.1/Agent",
        "vocabulary": "FOAF", "vocabulary_id": "foaf"}]'
      convergence_json: '{"notes": "No mapped system currently models scoring engines or rule engines
        as structured entities. Software identity is typically left implicit or stored as a free-text
        log entry, which makes audit and reproducibility difficult.\n", "system_count": 0, "total_systems":
        6}'
      bibliography_refs: '["foaf", "w3c-prov-o"]'
  VoucherRedemption:
    class_uri: publicschema:VoucherRedemption
    title: Voucher Redemption
    description: 'A record of a single redemption transaction against a voucher. Each VoucherRedemption
      captures one visit to a vendor or agent where part or all of a voucher''s value or entitled commodities
      were collected. For single-use vouchers, there is one VoucherRedemption. For incremental redemption
      (common in WFP value voucher programs), multiple VoucherRedemption records track each visit.

      '
    is_a: Event
    slots:
    - voucher_ref
    - redemption_date
    - redeemed_by
    - redemption_agent
    - amount
    - currency
    - items
    status: bibo:draft
    annotations:
      label_es: Canje de vale
      label_fr: Échange de bon
      description_es: Un registro de una transacción de canje única contra un vale. Cada VoucherRedemption
        captura una visita a un vendedor o agente donde se recogió parte o la totalidad del valor del
        vale o de los productos a los que da derecho. Para vales de uso único, hay un solo VoucherRedemption.
        Para el canje incremental (común en los programas de vales de valor del PMA), múltiples registros
        VoucherRedemption rastrean cada visita.
      description_fr: Un enregistrement d'une transaction d'échange unique contre un bon. Chaque VoucherRedemption
        enregistre une visite chez un vendeur ou un agent, lors de laquelle une partie ou la totalité
        de la valeur du bon ou des produits auxquels il donne droit a été collectée. Pour les bons à usage
        unique, il y a un seul VoucherRedemption. Pour l'échange incrémental (fréquent dans les programmes
        de bons de valeur du PAM), plusieurs enregistrements VoucherRedemption suivent chaque visite.
      convergence_json: '{"notes": "No direct analog in the six mapped SP systems. The GovStack Payments
        Building Block models voucher redemption as an API operation but not as a standalone entity. WFP
        SCOPE tracks individual vendor transactions against value vouchers, which is the closest real-world
        pattern.\n", "system_count": 0, "total_systems": 6}'
  Voucher:
    class_uri: publicschema:Voucher
    title: Voucher
    description: 'A redeemable instrument issued to a beneficiary as fulfillment of a benefit entitlement.
      A voucher has a distinct lifecycle: creation, issuance, redemption, expiry, or cancellation. It
      may be electronic (digital code, SMS, QR) or paper. Multiple vouchers may fulfill a single entitlement,
      and a voucher''s face value may differ from the entitlement amount.

      '
    slots:
    - entitlement_ref
    - issued_to
    - redeemable_by
    - serial_number
    - amount
    - currency
    - voucher_status
    - voucher_format
    - issue_date
    - expiry_date
    - redemption_date
    - redeemed_by
    - redemption_agent
    - items
    status: bibo:draft
    annotations:
      label_es: Vale
      label_fr: Bon
      description_es: 'Un instrumento canjeable emitido a un beneficiario como cumplimiento de un derecho
        a prestación. Un vale tiene un ciclo de vida distinto: creación, emisión, canje, vencimiento o
        cancelación. Puede ser electrónico (código digital, SMS, QR) o en papel. Varios vales pueden cumplir
        un solo derecho, y el valor nominal de un vale puede diferir del monto del derecho.'
      description_fr: 'Un instrument échangeable délivré à un bénéficiaire en exécution d''un droit à
        prestation. Un bon a un cycle de vie propre : création, émission, échange, expiration ou annulation.
        Il peut être électronique (code numérique, SMS, QR) ou papier. Plusieurs bons peuvent honorer
        un seul droit, et la valeur nominale d''un bon peut différer du montant du droit.'
      convergence_json: '{"notes": "None of the six currently mapped SP systems model vouchers as standalone
        entities. GovStack Payments Building Block (a specification, not a mapped system) models vouchers
        as first-class entities with a full lifecycle API. Voucher-based delivery is common in humanitarian
        programs (WFP SCOPE, UNICEF RapidPro). Expect gap-heavy SSSOM mappings initially.\n", "system_count":
        0, "total_systems": 6}'
      bibliography_refs: '["govstack-payments"]'
