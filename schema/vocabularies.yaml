          label_es: Orden superior
          label_fr: Ordre supérieur
          description_es: Seis o más niños nacidos en el mismo evento de parto.
          description_fr: Six enfants ou plus lors du même accouchement.
    annotations:
      label_es: Tipo de nacimiento
      label_fr: Type de naissance
      description_es: El número de niños nacidos en un mismo evento de parto.
      description_fr: Le nombre d'enfants nés lors d'un même accouchement.
      source_domain: crvs
      external_alignments_json: '[{"label": "BirthRegistration.birthType (country-configured)", "match":
        "none", "note": "The field is an untyped String; values are defined at country-deployment time
        (e.g. Farajaland uses SINGLE/TWIN/TRIPLET/QUADRUPLET/HIGHER_MULTIPLE_DELIVERY).", "vocabulary":
        "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  CauseOfDeathMethod:
    enum_uri: publicschema:CauseOfDeathMethod
    title: Cause of Death Method
    description: The method used to determine the cause of death. In many low-income settings, cause of
      death is ascertained by verbal autopsy rather than physician certification; consumers need to know
      how a reported cause was derived.
    status: bibo:draft
    permissible_values:
      physician_certified:
        meaning: publicschema:CauseOfDeathMethod/physician_certified
        title: Physician certified
        description: A licensed physician determined the cause of death, typically using a medical certificate.
        annotations:
          label_es: Certificado por un médico
          label_fr: Certifié par un médecin
          description_es: Un médico titulado determinó la causa de la muerte, típicamente mediante un
            certificado médico.
          description_fr: Un médecin diplômé a déterminé la cause du décès, généralement au moyen d'un
            certificat médical.
      verbal_autopsy:
        meaning: publicschema:CauseOfDeathMethod/verbal_autopsy
        title: Verbal autopsy
        description: The cause of death was inferred from a structured interview with family or caregivers
          about the circumstances and symptoms preceding death.
        annotations:
          label_es: Autopsia verbal
          label_fr: Autopsie verbale
          description_es: La causa de la muerte se infirió a partir de una entrevista estructurada con
            familiares o cuidadores sobre las circunstancias y los síntomas previos a la muerte.
          description_fr: La cause du décès a été déduite d'un entretien structuré avec la famille ou
            les aidants sur les circonstances et les symptômes précédant le décès.
      coroner:
        meaning: publicschema:CauseOfDeathMethod/coroner
        title: Coroner
        description: A coroner or medical examiner determined the cause of death, often through post-mortem
          examination.
        annotations:
          label_es: Forense
          label_fr: Coroner
          description_es: Un forense o médico examinador determinó la causa de la muerte, a menudo mediante
            examen post-mortem.
          description_fr: Un coroner ou un médecin légiste a déterminé la cause du décès, souvent par
            examen post-mortem.
      lay_reporting:
        meaning: publicschema:CauseOfDeathMethod/lay_reporting
        title: Lay reporting
        description: The cause was reported by a lay informant without clinical or forensic expertise.
        annotations:
          label_es: Declaración no profesional
          label_fr: Déclaration non professionnelle
          description_es: La causa fue declarada por un informante no profesional, sin experiencia clínica
            ni forense.
          description_fr: La cause a été rapportée par un déclarant non professionnel, sans expertise
            clinique ou médico-légale.
      other:
        meaning: publicschema:CauseOfDeathMethod/other
        title: Other
        description: The cause was determined by another method not covered above.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: La causa se determinó por otro método no cubierto arriba.
          description_fr: La cause a été déterminée par une autre méthode non couverte ci-dessus.
    annotations:
      label_es: Método de causa de defunción
      label_fr: Méthode de détermination de la cause du décès
      description_es: El método utilizado para determinar la causa de la muerte. En muchos contextos de
        bajos ingresos, la causa de muerte se determina por autopsia verbal en lugar de certificación
        médica; los usuarios de los datos deben conocer el método por el que se estableció la causa declarada.
      description_fr: La méthode utilisée pour déterminer la cause du décès. Dans de nombreux contextes
        à ressources limitées, la cause du décès est établie par autopsie verbale plutôt que par certification
        médicale; les utilisateurs doivent savoir comment une cause déclarée a été déterminée.
      source_domain: crvs
      external_alignments_json: '[{"label": "DeathRegistration.causeOfDeathMethod (country-configured)",
        "match": "none", "note": "The field is an untyped String; values are defined at country-deployment
        time (e.g. Farajaland uses PHYSICIAN/LAY_REPORTED/VERBAL_AUTOPSY/MEDICALLY_CERTIFIED, which partially
        overlaps our vocabulary).", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-vrdr", "who-verbal-autopsy-2022"]'
  CertificateDocumentType:
    enum_uri: publicschema:CertificateDocumentType
    title: Certificate Document Type
    description: The type of vital event that a certificate attests to. Describes what the document is
      about; orthogonal to the format of the certificate (full copy vs. extract).
    status: bibo:draft
    permissible_values:
      birth_certificate:
        meaning: publicschema:CertificateDocumentType/birth_certificate
        title: Birth certificate
        description: A certificate attesting to a birth event.
        annotations:
          label_es: Certificado de nacimiento
          label_fr: Certificat de naissance
          description_es: Un certificado que acredita un evento de nacimiento.
          description_fr: Un certificat attestant d'un événement de naissance.
      death_certificate:
        meaning: publicschema:CertificateDocumentType/death_certificate
        title: Death certificate
        description: A certificate attesting to a death event.
        annotations:
          label_es: Certificado de defunción
          label_fr: Certificat de décès
          description_es: Un certificado que acredita un evento de defunción.
          description_fr: Un certificat attestant d'un événement de décès.
      marriage_certificate:
        meaning: publicschema:CertificateDocumentType/marriage_certificate
        title: Marriage certificate
        description: A certificate attesting to a marriage event.
        annotations:
          label_es: Certificado de matrimonio
          label_fr: Certificat de mariage
          description_es: Un certificado que acredita un evento de matrimonio.
          description_fr: Un certificat attestant d'un événement de mariage.
      divorce_certificate:
        meaning: publicschema:CertificateDocumentType/divorce_certificate
        title: Divorce certificate
        description: A certificate attesting to a divorce.
        annotations:
          label_es: Certificado de divorcio
          label_fr: Certificat de divorce
          description_es: Un certificado que acredita un divorcio.
          description_fr: Un certificat attestant d'un divorce.
      adoption_certificate:
        meaning: publicschema:CertificateDocumentType/adoption_certificate
        title: Adoption certificate
        description: A certificate attesting to an adoption.
        annotations:
          label_es: Certificado de adopción
          label_fr: Certificat d'adoption
          description_es: Un certificado que acredita una adopción.
          description_fr: Un certificat attestant d'une adoption.
      annulment_certificate:
        meaning: publicschema:CertificateDocumentType/annulment_certificate
        title: Annulment certificate
        description: A certificate attesting to the annulment of a marriage.
        annotations:
          label_es: Certificado de anulación
          label_fr: Certificat d'annulation
          description_es: Un certificado que acredita la anulación de un matrimonio.
          description_fr: Un certificat attestant de l'annulation d'un mariage.
    annotations:
      label_es: Tipo de documento de certificado
      label_fr: Type de document de certificat
      description_es: El tipo de evento vital que certifica un certificado. Describe de qué trata el documento;
        ortogonal al formato del certificado (copia íntegra o extracto).
      description_fr: Le type d'événement d'état civil attesté par un certificat. Décrit l'objet du document;
        orthogonal au format du certificat (copie intégrale ou extrait).
      source_domain: crvs
      external_alignments_json: '[{"label": "Certificate.certificateTemplateId (country-configured)",
        "match": "none", "note": "OpenCRVS v1 uses a free String template identifier rather than a typed
        document type; the mapping from template ID to document type is decided at country-deployment
        time.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  CertificateFormat:
    enum_uri: publicschema:CertificateFormat
    title: Certificate Format
    description: 'The format of a civil status certificate document. Distinct from the type of event it
      attests to: a full copy reproduces the entire acte including its marginal annotations, an extract
      contains only a summary.'
    status: bibo:draft
    permissible_values:
      full_copy:
        meaning: publicschema:CertificateFormat/full_copy
        title: Full copy
        description: A complete reproduction of the acte, including all marginal annotations that have
          accumulated over time.
        annotations:
          label_es: Copia íntegra
          label_fr: Copie intégrale
          description_es: Una reproducción completa del acta, incluyendo todas las anotaciones marginales
            acumuladas a lo largo del tiempo.
          description_fr: Une reproduction complète de l'acte, y compris toutes les mentions marginales
            accumulées au fil du temps.
      extract:
        meaning: publicschema:CertificateFormat/extract
        title: Extract
        description: A summary extract of the acte containing only essential information, without the
          full text of annotations.
        annotations:
          label_es: Extracto
          label_fr: Extrait
          description_es: Un extracto resumido del acta que contiene solo la información esencial, sin
            el texto completo de las anotaciones.
          description_fr: Un extrait résumé de l'acte contenant uniquement les informations essentielles,
            sans le texte complet des mentions.
      multilingual_extract:
        meaning: publicschema:CertificateFormat/multilingual_extract
        title: Multilingual extract
        description: A standardized extract formatted in multiple languages, often issued for international
          use under ICCS/CIEC conventions.
        annotations:
          label_es: Extracto multilingüe
          label_fr: Extrait plurilingue
          description_es: Un extracto estandarizado presentado en varios idiomas, frecuentemente emitido
            para uso internacional bajo las convenciones CIEC.
          description_fr: Un extrait standardisé présenté en plusieurs langues, souvent délivré pour un
            usage international dans le cadre des conventions CIEC.
    annotations:
      label_es: Formato de certificado
      label_fr: Format de certificat
      description_es: 'El formato de un documento de certificado de estado civil. Distinto del tipo de
        evento que acredita: una copia íntegra reproduce toda el acta incluyendo sus anotaciones marginales,
        un extracto contiene solo un resumen.'
      description_fr: 'Le format d''un document de certificat d''état civil. Distinct du type d''événement
        qu''il atteste: une copie intégrale reproduit l''acte entier y compris ses mentions marginales,
        un extrait n''en contient qu''un résumé.'
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "V2 makes no
        core-level distinction between full copy, extract, and multilingual extract; any such distinction
        would live inside the certificate template definition itself.", "vocabulary": "OpenCRVS v2 event
        service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["iccs-convention-16", "iccs-convention-26", "iccs-convention-33", "iccs-convention-34"]'
  CivilStatusRecordType:
    enum_uri: publicschema:CivilStatusRecordType
    title: Civil Status Record Type
    description: The type of acte represented by a civil status record. Covers the standard vital event
      actes and court-ordered substitutes used when original records are missing or were never created.
    status: bibo:draft
    permissible_values:
      birth:
        meaning: publicschema:CivilStatusRecordType/birth
        title: Birth
        description: A birth acte recording the birth of a person.
        annotations:
          label_es: Nacimiento
          label_fr: Naissance
          description_es: Un acta de nacimiento que registra el nacimiento de una persona.
          description_fr: Un acte de naissance enregistrant la naissance d'une personne.
        exact_mappings:
        - opencrvs:OpencrvsEventDocumentTypeCountryConfiguredString/birth
      marriage:
        meaning: publicschema:CivilStatusRecordType/marriage
        title: Marriage
        description: A marriage acte recording a marriage between two parties.
        annotations:
          label_es: Matrimonio
          label_fr: Mariage
          description_es: Un acta de matrimonio que registra un matrimonio entre dos partes.
          description_fr: Un acte de mariage enregistrant un mariage entre deux parties.
        exact_mappings:
        - opencrvs:OpencrvsEventDocumentTypeCountryConfiguredString/marriage
      death:
        meaning: publicschema:CivilStatusRecordType/death
        title: Death
        description: A death acte recording the death of a person.
        annotations:
          label_es: Defunción
          label_fr: Décès
          description_es: Un acta de defunción que registra la muerte de una persona.
          description_fr: Un acte de décès enregistrant le décès d'une personne.
        exact_mappings:
        - opencrvs:OpencrvsEventDocumentTypeCountryConfiguredString/death
      paternity_recognition:
        meaning: publicschema:CivilStatusRecordType/paternity_recognition
        title: Paternity recognition
        description: An acte recording a parent's legal recognition of paternity or parentage for a child,
          most often outside of marriage.
        annotations:
          label_es: Reconocimiento de paternidad
          label_fr: Reconnaissance de paternité
          description_es: Un acta que registra el reconocimiento legal de paternidad o parentalidad por
            parte de un progenitor hacia un niño, con mayor frecuencia fuera del matrimonio.
          description_fr: Un acte enregistrant la reconnaissance légale de paternité ou de parentalité
            d'un parent envers un enfant, le plus souvent hors mariage.
      supplementary_judgment:
        meaning: publicschema:CivilStatusRecordType/supplementary_judgment
        title: Supplementary judgment
        description: A court judgment issued in place of a missing original acte, typically used in civil
          law systems when a birth was never registered or the record was lost.
        annotations:
          label_es: Sentencia supletoria
          label_fr: Jugement supplétif
          description_es: Una sentencia judicial emitida en lugar de un acta original ausente, típicamente
            utilizada en los sistemas de derecho civil cuando un nacimiento nunca fue registrado o el
            registro se perdió.
          description_fr: Un jugement rendu en remplacement d'un acte original manquant, généralement
            utilisé dans les systèmes de droit civil lorsqu'une naissance n'a jamais été enregistrée ou
            que l'acte a été perdu.
      court_ordered_substitute:
        meaning: publicschema:CivilStatusRecordType/court_ordered_substitute
        title: Court ordered substitute
        description: A record created by court order to substitute for an original acte that cannot be
          produced, in jurisdictions using a mechanism similar to the jugement supplétif.
        annotations:
          label_es: Sustituto ordenado por el tribunal
          label_fr: Substitut ordonné par le tribunal
          description_es: Un registro creado por orden judicial para sustituir un acta original que no
            puede ser presentada, en jurisdicciones que utilizan un mecanismo similar a la sentencia supletoria.
          description_fr: Un acte créé par décision judiciaire pour remplacer un acte original qui ne
            peut être produit, dans les juridictions utilisant un mécanisme similaire au jugement supplétif.
    close_mappings:
    - https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event
    annotations:
      label_es: Tipo de registro de estado civil
      label_fr: Type de registre d'état civil
      description_es: El tipo de acta representado por un registro de estado civil. Cubre las actas estándar
        de eventos vitales y los sustitutos ordenados por el tribunal utilizados cuando las actas originales
        están ausentes o nunca fueron creadas.
      description_fr: Le type d'acte représenté par un registre d'état civil. Couvre les actes standard
        des événements d'état civil et les substituts judiciaires utilisés lorsque les actes originaux
        sont manquants ou n'ont jamais été établis.
      source_domain: crvs
      external_alignments_json: '[{"label": "EventDocument.type (country-configured string)", "match":
        "narrow", "note": "In v2 EventDocument.type is a country-configured string; Farajaland defines
        birth/death/marriage as event type values. PublicSchema models six record types; the three shared
        values align and the v2 set is a subset of ours.", "uri": "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event",
        "vocabulary": "OpenCRVS v2 country config (Farajaland)", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["un-vital-stats-rev3"]'
  FamilyRegisterStatus:
    enum_uri: publicschema:FamilyRegisterStatus
    title: Family Register Status
    description: Lifecycle status of a family register. Captures whether the register is currently active,
      has been closed, or was split into or merged with other registers following vital events.
    status: bibo:draft
    permissible_values:
      active:
        meaning: publicschema:FamilyRegisterStatus/active
        title: Active
        description: The register is currently active and tracks a family unit with at least one living
          member.
        annotations:
          label_es: Activo
          label_fr: Actif
          description_es: El registro está actualmente activo y registra una unidad familiar con al menos
            un miembro vivo.
          description_fr: Le registre est actuellement actif et suit une unité familiale comptant au moins
            un membre vivant.
      closed:
        meaning: publicschema:FamilyRegisterStatus/closed
        title: Closed
        description: The register has been closed, typically because all members have died or left.
        annotations:
          label_es: Cerrado
          label_fr: Clôturé
          description_es: El registro ha sido cerrado, típicamente porque todos los miembros han fallecido
            o se han ido.
          description_fr: Le registre a été clôturé, généralement parce que tous ses membres sont décédés
            ou ont quitté l'unité familiale.
      split:
        meaning: publicschema:FamilyRegisterStatus/split
        title: Split
        description: The register was split into multiple registers, for example when a family member
          marries and creates a new family unit.
        annotations:
          label_es: Dividido
          label_fr: Scindé
          description_es: El registro fue dividido en múltiples registros, por ejemplo, cuando un miembro
            de la familia contrae matrimonio y crea una nueva unidad familiar.
          description_fr: Le registre a été scindé en plusieurs registres, par exemple lorsqu'un membre
            de la famille se marie et crée une nouvelle unité familiale.
      merged:
        meaning: publicschema:FamilyRegisterStatus/merged
        title: Merged
        description: The register was merged with another register, for example following a marriage that
          joined two families into one register.
        annotations:
          label_es: Fusionado
          label_fr: Fusionné
          description_es: El registro fue fusionado con otro registro, por ejemplo, tras un matrimonio
            que unió dos familias en un solo registro.
          description_fr: Le registre a été fusionné avec un autre registre, par exemple à la suite d'un
            mariage ayant réuni deux familles en un seul registre.
    annotations:
      label_es: Estado del registro de familia
      label_fr: Statut du registre de famille
      description_es: Estado del ciclo de vida de un registro familiar. Registra si el registro está actualmente
        activo, ha sido cerrado, o fue dividido o fusionado con otros registros tras eventos de estado
        civil.
      description_fr: Statut du cycle de vie d'un registre familial. Indique si le registre est actuellement
        actif, a été clôturé, ou a été scindé ou fusionné avec d'autres registres suite à des événements
        d'état civil.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v1
        has no family-register construct; it is event-record centric and does not track families as a
        registered unit.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  MannerOfDeath:
    enum_uri: publicschema:MannerOfDeath
    title: Manner of Death
    description: How a death occurred, as distinct from its underlying medical cause. Aligned with WHO/ICD
      Manner of Death classification.
    status: bibo:draft
    permissible_values:
      natural:
        meaning: publicschema:MannerOfDeath/natural
        title: Natural
        description: Death due to disease or the natural aging process, without external intervention.
        annotations:
          label_es: Natural
          label_fr: Naturelle
          description_es: Muerte debida a enfermedad o al proceso natural de envejecimiento, sin intervención
            externa.
          description_fr: Décès dû à une maladie ou au processus naturel de vieillissement, sans intervention
            extérieure.
      accident:
        meaning: publicschema:MannerOfDeath/accident
        title: Accident
        description: Death caused by an unintentional external event.
        annotations:
          label_es: Accidente
          label_fr: Accident
          description_es: Muerte causada por un evento externo no intencional.
          description_fr: Décès causé par un événement extérieur non intentionnel.
      intentional_self_harm:
        meaning: publicschema:MannerOfDeath/intentional_self_harm
        title: Intentional self-harm
        description: Death resulting from an act intentionally inflicted by the deceased on themselves
          (suicide).
        annotations:
          label_es: Lesiones autoinfligidas intencionalmente
          label_fr: Lésions auto-infligées
          description_es: Muerte que resulta de un acto intencionalmente infligido por el fallecido a
            sí mismo (suicidio).
          description_fr: Décès résultant d'un acte intentionnellement infligé par le défunt à lui-même
            (suicide).
      assault:
        meaning: publicschema:MannerOfDeath/assault
        title: Assault
        description: Death caused by the intentional act of another person (homicide).
        annotations:
          label_es: Agresión
          label_fr: Agression
          description_es: Muerte causada por el acto intencional de otra persona (homicidio).
          description_fr: Décès causé par l'acte intentionnel d'une autre personne (homicide).
      legal_intervention:
        meaning: publicschema:MannerOfDeath/legal_intervention
        title: Legal intervention
        description: Death caused by law enforcement or other legally authorized action.
        annotations:
          label_es: Intervención legal
          label_fr: Intervention légale
          description_es: Muerte causada por una acción policial u otra acción legalmente autorizada.
          description_fr: Décès causé par une action policière ou une autre action légalement autorisée.
      war:
        meaning: publicschema:MannerOfDeath/war
        title: War
        description: Death caused by acts of war or armed conflict.
        annotations:
          label_es: Guerra
          label_fr: Guerre
          description_es: Muerte causada por actos de guerra o conflicto armado.
          description_fr: Décès causé par des actes de guerre ou un conflit armé.
      pending_investigation:
        meaning: publicschema:MannerOfDeath/pending_investigation
        title: Pending investigation
        description: The manner of death has not yet been determined because an investigation is ongoing.
        annotations:
          label_es: Pendiente de investigación
          label_fr: Enquête en cours
          description_es: La manera de la muerte aún no se ha determinado porque una investigación está
            en curso.
          description_fr: La manière du décès n'a pas encore été établie, une enquête étant en cours.
      could_not_be_determined:
        meaning: publicschema:MannerOfDeath/could_not_be_determined
        title: Could not be determined
        description: After investigation, the manner of death could not be established.
        annotations:
          label_es: No se pudo determinar
          label_fr: N'a pas pu être déterminée
          description_es: Tras la investigación, no se pudo establecer la manera de la muerte.
          description_fr: Après enquête, la manière du décès n'a pas pu être établie.
    annotations:
      label_es: Circunstancias de la defunción
      label_fr: Circonstances du décès
      description_es: La manera en que ocurrió una muerte, distinta de su causa médica subyacente. Alineado
        con la clasificación OMS/CIE de la manera de la muerte.
      description_fr: La manière dont un décès est survenu, distincte de sa cause médicale sous-jacente.
        Aligné sur la classification OMS/CIM de la manière du décès.
      source_domain: crvs
      external_alignments_json: '[{"label": "DeathRegistration.mannerOfDeath (country-configured)", "match":
        "none", "note": "The field is an untyped String; values are defined at country-deployment time
        (e.g. Farajaland uses NATURAL_CAUSES/ACCIDENT/SUICIDE/HOMICIDE/MANNER_UNDETERMINED, which collapses
        several WHO/ICD categories).", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      standard_json: '{"name": "WHO/ICD Manner of Death classification", "notes": "Category labels follow
        civil-registration convention, which diverges from the WHO/ICD death-certificate term of art in
        two places. (1) The WHO medical-certificate guidance uses \"disease\" for the category this vocabulary
        codes as `natural`; the WHO running prose pairs them (\"an entry of ''disease'' as the manner
        of death corresponds to a natural death\"), and CRVS systems (OpenCRVS, national registrars) use
        \"natural\" as the published label. The code''s definition names both. (2) The WHO list includes
        \"unknown\"; this vocabulary uses `could_not_be_determined` (post investigation) and `pending_investigation`
        (investigation ongoing) for the same semantic ground. Adopters are expected to map WHO \"unknown\"
        to `could_not_be_determined`.\n", "uri": "https://www.who.int/standards/classifications/classification-of-diseases"}'
      bibliography_refs: '["fhir-vrdr", "un-vital-stats-rev3", "who-icd-manner-of-death"]'
  MarriageTerminationType:
    enum_uri: publicschema:MarriageTerminationType
    title: Marriage Termination Type
    description: Whether the marriage was ended by divorce (dissolution of a valid marriage) or annulment
      (declaration that the marriage was invalid from its inception).
    status: bibo:draft
    permissible_values:
      divorce:
        meaning: publicschema:MarriageTerminationType/divorce
        title: Divorce
        description: The dissolution of a valid marriage by judicial or administrative decree.
        annotations:
          label_es: Divorcio
          label_fr: Divorce
          description_es: La disolución de un matrimonio válido mediante sentencia judicial o resolución
            administrativa.
          description_fr: La dissolution d'un mariage valide par décision judiciaire ou administrative.
      annulment:
        meaning: publicschema:MarriageTerminationType/annulment
        title: Annulment
        description: A judicial declaration that a marriage was invalid from its inception, typically
          because a legal impediment existed at the time of the ceremony (such as lack of consent, existing
          marriage, or prohibited degree of kinship).
        annotations:
          label_es: Anulación
          label_fr: Annulation
          description_es: Una declaración judicial de que un matrimonio era nulo desde su origen, generalmente
            porque existía un impedimento legal al momento de la celebración (falta de consentimiento,
            matrimonio preexistente o grado de parentesco prohibido).
          description_fr: Une déclaration judiciaire selon laquelle un mariage était nul dès son origine,
            généralement parce qu'un empêchement légal existait au moment de la célébration (absence de
            consentement, mariage existant ou degré de parenté prohibé).
    annotations:
      label_es: Tipo de disolución del matrimonio
      label_fr: Type de dissolution du mariage
      description_es: Indica si el matrimonio terminó por divorcio (disolución de un matrimonio válido)
        o por anulación (declaración de que el matrimonio era nulo desde su origen).
      description_fr: Indique si le mariage a pris fin par divorce (dissolution d'un mariage valide) ou
        par annulation (déclaration que le mariage était nul dès son origine).
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "Neither divorce
        nor annulment is modelled in OpenCRVS v1 core, so this vocabulary has no counterpart.", "vocabulary":
        "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  MarriageType:
    enum_uri: publicschema:MarriageType
    title: Marriage Type
    description: The legal or traditional framework under which a marriage was contracted.
    status: bibo:draft
    permissible_values:
      civil:
        meaning: publicschema:MarriageType/civil
        title: Civil
        description: Marriage contracted before a civil registration officer under secular law.
        annotations:
          label_es: Civil
          label_fr: Civil
          description_es: Matrimonio contraído ante un oficial del registro civil bajo derecho secular.
          description_fr: Mariage contracté devant un officier de l'état civil sous le régime du droit
            civil.
      religious:
        meaning: publicschema:MarriageType/religious
        title: Religious
        description: Marriage contracted under religious rites (e.g., church, mosque, synagogue, temple).
        annotations:
          label_es: Religioso
          label_fr: Religieux
          description_es: Matrimonio contraído bajo ritos religiosos (por ej., iglesia, mezquita, sinagoga,
            templo).
          description_fr: Mariage contracté selon des rites religieux (par ex., église, mosquée, synagogue,
            temple).
      customary:
        meaning: publicschema:MarriageType/customary
        title: Customary
        description: Marriage contracted under customary or traditional law, typically recognized by local
          authorities.
        annotations:
          label_es: Consuetudinario
          label_fr: Coutumier
          description_es: Matrimonio contraído bajo derecho consuetudinario o tradicional, típicamente
            reconocido por las autoridades locales.
          description_fr: Mariage contracté selon le droit coutumier ou traditionnel, généralement reconnu
            par les autorités locales.
      common_law:
        meaning: publicschema:MarriageType/common_law
        title: Common law
        description: A relationship recognized as a marriage through long-term cohabitation without a
          formal ceremony, where the jurisdiction permits.
        annotations:
          label_es: Unión de hecho
          label_fr: Union de fait
          description_es: Una relación reconocida como matrimonio mediante cohabitación prolongada sin
            ceremonia formal, cuando la jurisdicción lo permite.
          description_fr: Une relation reconnue comme mariage par la cohabitation prolongée sans cérémonie
            formelle, lorsque la juridiction le permet.
    annotations:
      label_es: Tipo de matrimonio
      label_fr: Type de mariage
      description_es: El marco legal o tradicional bajo el cual se contrajo un matrimonio.
      description_fr: Le cadre juridique ou traditionnel dans lequel un mariage a été contracté.
      source_domain: crvs
      external_alignments_json: '[{"label": "MarriageRegistration.typeOfMarriage (country-configured)",
        "match": "none", "note": "The field is an untyped String; values are defined at country-deployment
        time. Farajaland uses MONOGAMY/POLYGAMY.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id":
        "opencrvs"}]'
  ParentEstablishmentBasis:
    enum_uri: publicschema:ParentEstablishmentBasis
    title: Parent Establishment Basis
    description: The legal route by which parentage was established for a given Parent record. Distinguishes
      automatic legal presumptions from voluntary acts, court orders, and adoption or surrogacy orders.
    status: bibo:draft
    permissible_values:
      marital_presumption:
        meaning: publicschema:ParentEstablishmentBasis/marital_presumption
        title: Marital presumption
        description: Parentage established automatically by operation of law because the parent was married
          to the other parent at the time of birth or within a specified period beforehand. No separate
          declaration or court order is required.
        annotations:
          label_es: Presunción matrimonial
          label_fr: Présomption de paternité maritale
          description_es: Parentalidad establecida automáticamente por ministerio de la ley porque el
            progenitor estaba casado con el otro progenitor en el momento del nacimiento o en un período
            determinado anterior. No se requiere ninguna declaración ni resolución judicial por separado.
          description_fr: Parenté établie automatiquement par effet de la loi parce que le parent était
            marié à l'autre parent au moment de la naissance ou dans un délai spécifié avant celle-ci.
            Aucune déclaration ou décision judiciaire distincte n'est requise.
      voluntary_recognition:
        meaning: publicschema:ParentEstablishmentBasis/voluntary_recognition
        title: Voluntary recognition
        description: Parentage established by a formal declaration made voluntarily by the parent, typically
          before a civil registrar or notary. Common for establishing paternity outside marriage.
        annotations:
          label_es: Reconocimiento voluntario
          label_fr: Reconnaissance volontaire
          description_es: Parentalidad establecida mediante una declaración formal realizada voluntariamente
            por el progenitor, generalmente ante un oficial del registro civil o notario. Habitual para
            establecer la paternidad fuera del matrimonio.
          description_fr: Parenté établie par une déclaration formelle faite volontairement par le parent,
            généralement devant un officier d'état civil ou un notaire. Courant pour établir la paternité
            hors mariage.
      judicial_declaration:
        meaning: publicschema:ParentEstablishmentBasis/judicial_declaration
        title: Judicial declaration
        description: Parentage established by a court order, for example following a contested paternity
          action, a legitimation proceeding, or a court-ordered parentage test.
        annotations:
          label_es: Declaración judicial
          label_fr: Déclaration judiciaire
          description_es: Parentalidad establecida por resolución judicial, por ejemplo, tras una acción
            de paternidad impugnada, un procedimiento de legitimación o una prueba de parentalidad ordenada
            judicialmente.
          description_fr: Parenté établie par une décision judiciaire, par exemple à la suite d'une action
            en recherche de paternité contestée, d'une procédure de légitimation ou d'un test de parenté
            ordonné par le tribunal.
      adoption_order:
        meaning: publicschema:ParentEstablishmentBasis/adoption_order
        title: Adoption order
        description: Parentage established through a formal adoption order issued by a competent authority.
          Applies to both domestic adoption and intercountry adoption under the Hague Convention on Intercountry
          Adoption (HCCH 1993).
        annotations:
          label_es: Resolución de adopción
          label_fr: Jugement d'adoption
          description_es: Parentalidad establecida mediante una resolución formal de adopción emitida
            por una autoridad competente. Se aplica tanto a la adopción nacional como a la adopción internacional
            en virtud del Convenio de La Haya sobre Adopción Internacional (HCCH 1993).
          description_fr: Parenté établie par une décision formelle d'adoption émise par une autorité
            compétente. S'applique à l'adoption nationale et à l'adoption internationale dans le cadre
            de la Convention de La Haye sur l'adoption internationale (HCCH 1993).
      surrogacy_order:
        meaning: publicschema:ParentEstablishmentBasis/surrogacy_order
        title: Surrogacy order
        description: Parentage established by a court or administrative order recognizing the intended
          parent or parents following a surrogacy arrangement. The form and availability of such orders
          varies significantly across jurisdictions.
        annotations:
          label_es: Resolución de gestación subrogada
          label_fr: Jugement de gestation pour autrui
          description_es: Parentalidad establecida por una resolución judicial o administrativa que reconoce
            al progenitor o progenitores de intención tras un acuerdo de gestación subrogada. La forma
            y disponibilidad de dichas resoluciones varía considerablemente entre jurisdicciones.
          description_fr: Parenté établie par une décision judiciaire ou administrative reconnaissant
            le ou les parents d'intention à la suite d'un accord de gestation pour autrui. La forme et
            la disponibilité de telles décisions varient considérablement selon les juridictions.
    annotations:
      label_es: Base de establecimiento de la parentalidad
      label_fr: Fondement de l'établissement de la parenté
      description_es: La vía legal por la que se estableció la parentalidad para un registro Parent determinado.
        Distingue las presunciones legales automáticas de los actos voluntarios, las resoluciones judiciales
        y las órdenes de adopción o gestación subrogada.
      description_fr: Le fondement juridique par lequel la parenté a été établie pour un enregistrement
        Parent donné. Distingue les présomptions légales automatiques des actes volontaires, des décisions
        judiciaires et des ordonnances d'adoption ou de gestation pour autrui.
      source_domain: crvs
      bibliography_refs: '["hague-intercountry-adoption"]'
  ParentalRole:
    enum_uri: publicschema:ParentalRole
    title: Parental Role
    description: The role-nature of the parent relationship in the context of a vital event. Describes
      how parentage arose (biological, gestational, legal, adoptive) independently of the parent's gender.
      Gender of the parent is modeled via Person.sex; a jurisdiction-specific label for the printed certificate
      is carried on certificate_label.
    status: bibo:draft
    permissible_values:
      biological:
        meaning: publicschema:ParentalRole/biological
        title: Biological
        description: The person who is the genetic origin of the child, without regard to who carried
          the pregnancy or who holds legal parentage. Covers cases where genetics and gestation coincide
          in one person, as well as sperm or egg donors whose genetic contribution is legally recognized
          as parenthood.
        annotations:
          label_es: Biológico
          label_fr: Biologique
          description_es: La persona que es el origen genético del niño o niña, independientemente de
            quién llevó el embarazo o quién ostenta la filiación legal. Abarca los casos en que genética
            y gestación coinciden en una misma persona, así como donantes de gametos cuya contribución
            genética es legalmente reconocida como parentalidad.
          description_fr: La personne qui est l'origine génétique de l'enfant, indépendamment de qui a
            porté la grossesse ou de qui détient la parenté légale. Couvre les cas où génétique et gestation
            coïncident chez une même personne, ainsi que les donneurs de gamètes dont la contribution
            génétique est légalement reconnue comme parenté.
      gestational:
        meaning: publicschema:ParentalRole/gestational
        title: Gestational
        description: The person who carried and gave birth to the child, regardless of genetic relationship
          or legal status. Used when gestation and genetic parenthood are held by different people (surrogacy),
          but may also be used when they coincide. Fills a gap in FHIR RoleCode, which provides GESTM
          (gestational mother, female-coded) but no gender-neutral gestational code.
        annotations:
          label_es: Gestacional
          label_fr: Gestationnel
          description_es: La persona que gestó y dio a luz al niño o niña, independientemente de la relación
            genética o el estatus legal. Se utiliza cuando la gestación y la parentalidad genética corresponden
            a personas distintas (gestación subrogada), pero también puede usarse cuando coinciden. Cubre
            una laguna en el RoleCode de FHIR, que proporciona GESTM (madre gestante, codificado femenino)
            pero ningún código gestacional neutro en cuanto al género.
          description_fr: La personne qui a porté et donné naissance à l'enfant, indépendamment du lien
            génétique ou du statut légal. Utilisé lorsque la gestation et la parenté génétique appartiennent
            à des personnes différentes (gestation pour autrui), mais peut également être utilisé quand
            elles coïncident. Comble un manque dans le RoleCode FHIR, qui fournit GESTM (mère gestationnelle,
            codée féminin) mais aucun code gestationnel neutre du point de vue du genre.
      legal:
        meaning: publicschema:ParentalRole/legal
        title: Legal
        description: A person recognized by law as a parent of the child, whether or not they are the
          biological or gestational parent. Established by operation of law (for example, marital presumption),
          judicial declaration, or voluntary recognition. Use establishment_basis to record the specific
          legal route.
        annotations:
          label_es: Legal
          label_fr: Légal
          description_es: Una persona reconocida por la ley como progenitor del niño o niña, sea o no
            el progenitor biológico o gestacional. Establecida por ministerio de la ley (por ejemplo,
            presunción matrimonial), declaración judicial o reconocimiento voluntario. Use establishment_basis
            para registrar la vía legal específica.
          description_fr: Une personne reconnue par la loi comme parent de l'enfant, qu'elle soit ou non
            le parent biologique ou gestationnel. Établie par effet de la loi (par exemple, présomption
            de parenté fondée sur le mariage), décision judiciaire ou reconnaissance volontaire. Utilisez
            establishment_basis pour consigner le fondement juridique spécifique.
      adoptive:
        meaning: publicschema:ParentalRole/adoptive
        title: Adoptive
        description: A person who has acquired parental rights and responsibilities through a formal adoption
          order. Applicable in both domestic and intercountry adoption.
        annotations:
          label_es: Adoptivo
          label_fr: Adoptif
          description_es: Una persona que ha adquirido derechos y responsabilidades parentales mediante
            una resolución formal de adopción. Aplicable tanto en la adopción nacional como en la internacional.
          description_fr: Une personne qui a acquis les droits et responsabilités parentaux par une décision
            formelle d'adoption. Applicable à l'adoption nationale et internationale.
    annotations:
      label_es: Rol parental
      label_fr: Rôle parental
      description_es: La naturaleza del rol parental en el contexto de un evento vital. Describe cómo
        se originó la parentalidad (biológica, gestacional, legal, adoptiva) con independencia del género
        del progenitor. El género del progenitor se modela a través de Person.sex; una etiqueta específica
        de la jurisdicción para el certificado impreso se indica en certificate_label.
      description_fr: La nature du rôle parental dans le contexte d'un événement d'état civil. Décrit
        comment la parenté est établie (biologique, gestationnelle, légale, adoptive) indépendamment du
        genre du parent. Le genre du parent est modélisé via Person.sex ; une étiquette spécifique à la
        juridiction pour le certificat imprimé est portée par certificate_label.
      source_domain: crvs
      external_alignments_json: '[{"label": "Parental roles (country-configured)", "match": "none", "note":
        "OpenCRVS uses named field slots (mother, father) rather than an enumeration; RelatedPerson.relationship
        is a free String, and adoptive, legal, and gestational roles are not representable in v2 core.",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["fhir-v3-role-code"]'
  PlaceType:
    enum_uri: publicschema:PlaceType
    title: Place Type
    description: 'The category of place where a vital event occurred (birth or death). Distinct from the
      specific Location: this captures the type (health facility, home, etc.) rather than the named place.'
    status: bibo:draft
    permissible_values:
      health_facility:
        meaning: publicschema:PlaceType/health_facility
        title: Health facility
        description: The event occurred in a hospital, clinic, or other health facility.
        annotations:
          label_es: Establecimiento de salud
          label_fr: Établissement de santé
          description_es: El evento ocurrió en un hospital, clínica u otro establecimiento de salud.
          description_fr: L'événement s'est produit dans un hôpital, une clinique ou un autre établissement
            de santé.
      home:
        meaning: publicschema:PlaceType/home
        title: Home
        description: The event occurred in a residential setting.
        annotations:
          label_es: Hogar
          label_fr: Domicile
          description_es: El evento ocurrió en un entorno residencial.
          description_fr: L'événement s'est produit dans un cadre résidentiel.
      en_route:
        meaning: publicschema:PlaceType/en_route
        title: En route
        description: The event occurred while the person was being transported to a place of care.
        annotations:
          label_es: En camino
          label_fr: En chemin
          description_es: El evento ocurrió mientras la persona estaba siendo trasladada a un lugar de
            atención.
          description_fr: L'événement s'est produit pendant que la personne était transportée vers un
            lieu de soins.
      other:
        meaning: publicschema:PlaceType/other
        title: Other
        description: The event occurred at another type of place not covered above.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: El evento ocurrió en otro tipo de lugar no cubierto arriba.
          description_fr: L'événement s'est produit dans un autre type de lieu non couvert ci-dessus.
      unknown:
        meaning: publicschema:PlaceType/unknown
        title: Unknown
        description: The type of place where the event occurred is not known.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El tipo de lugar donde ocurrió el evento no se conoce.
          description_fr: Le type de lieu où l'événement s'est produit n'est pas connu.
    annotations:
      label_es: Tipo de lugar
      label_fr: Type de lieu
      description_es: 'La categoría de lugar donde ocurrió un evento vital (nacimiento o defunción). Distinto
        del lugar específico: recoge el tipo (establecimiento de salud, hogar, etc.) en lugar del lugar
        nombrado.'
      description_fr: 'La catégorie de lieu où un événement d''état civil (naissance ou décès) s''est
        produit. Distinct du lieu spécifique: indique le type (établissement de santé, domicile, etc.)
        plutôt que le lieu nommé.'
      source_domain: crvs
      external_alignments_json: '[{"label": "Location.type (country-configured)", "match": "none", "note":
        "OpenCRVS eventLocation is typed as a Location entity rather than a coded place-type; Location.type
        is an untyped String defined at country-deployment time, not a core enum.", "vocabulary": "OpenCRVS
        v2 event service", "vocabulary_id": "opencrvs"}]'
  RegistrationStatus:
    enum_uri: publicschema:RegistrationStatus
    title: Registration Status
    description: Lifecycle states of the registration of a vital event, from initial declaration through
      validation, archival, or cancellation.
    status: bibo:draft
    permissible_values:
      declared:
        meaning: publicschema:RegistrationStatus/declared
        title: Declared
        description: The event has been reported to the registrar but has not yet been validated.
        annotations:
          label_es: Declarado
          label_fr: Déclaré
          description_es: El evento ha sido declarado ante el registrador pero aún no ha sido validado.
          description_fr: L'événement a été signalé à l'officier d'état civil mais n'a pas encore été
            validé.
        exact_mappings:
        - opencrvs:OpencrvsEventStatus/declared
      pending_validation:
        meaning: publicschema:RegistrationStatus/pending_validation
        title: Pending validation
        description: The declaration is under review by the registration authority prior to being entered
          into the register.
        annotations:
          label_es: Pendiente de validación
          label_fr: En attente de validation
          description_es: La declaración está en revisión por parte de la autoridad de registro antes
            de ser inscrita en el registro.
          description_fr: La déclaration est en cours d'examen par l'autorité d'enregistrement avant d'être
            inscrite au registre.
      registered:
        meaning: publicschema:RegistrationStatus/registered
        title: Registered
        description: The event has been entered into the register and is legally effective.
        annotations:
          label_es: Registrado
          label_fr: Enregistré
          description_es: El evento ha sido inscrito en el registro y tiene efecto jurídico.
          description_fr: L'événement a été inscrit au registre et a effet juridique.
        exact_mappings:
        - opencrvs:OpencrvsEventStatus/registered
      rejected:
        meaning: publicschema:RegistrationStatus/rejected
        title: Rejected
        description: The registration authority has refused to register the event (e.g., insufficient
          evidence, duplicate).
        annotations:
          label_es: Rechazado
          label_fr: Rejeté
          description_es: La autoridad de registro ha rechazado registrar el evento (por ejemplo, pruebas
            insuficientes, duplicado).
          description_fr: L'autorité d'enregistrement a refusé d'enregistrer l'événement (par exemple,
            preuves insuffisantes, doublon).
      cancelled:
        meaning: publicschema:RegistrationStatus/cancelled
        title: Cancelled
        description: A previously registered event has been cancelled, typically following a court judgment.
        annotations:
          label_es: Cancelado
          label_fr: Annulé
          description_es: Un evento previamente registrado ha sido cancelado, típicamente tras una sentencia
            judicial.
          description_fr: Un événement précédemment enregistré a été annulé, généralement à la suite d'un
            jugement.
      corrected:
        meaning: publicschema:RegistrationStatus/corrected
        title: Corrected
        description: The registration has been modified to correct an error in the original record.
        annotations:
          label_es: Corregido
          label_fr: Corrigé
          description_es: El registro ha sido modificado para corregir un error en el acta original.
          description_fr: L'enregistrement a été modifié pour corriger une erreur dans l'acte original.
      archived:
        meaning: publicschema:RegistrationStatus/archived
        title: Archived
        description: The registration has been moved to long-term archival storage; no further routine
          operations expected.
        annotations:
          label_es: Archivado
          label_fr: Archivé
          description_es: El registro ha sido trasladado al almacenamiento de archivo a largo plazo; no
            se esperan más operaciones rutinarias.
          description_fr: L'enregistrement a été transféré vers un archivage à long terme; aucune opération
            courante n'est attendue.
        exact_mappings:
        - opencrvs:OpencrvsEventStatus/archived
    close_mappings:
    - https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventStatus
    annotations:
      label_es: Estado de registro
      label_fr: Statut d'enregistrement
      description_es: Estados del ciclo de vida del registro de un evento vital, desde la declaración
        inicial hasta la validación, archivo o cancelación.
      description_fr: États du cycle de vie de l'enregistrement d'un événement d'état civil, de la déclaration
        initiale à la validation, l'archivage ou l'annulation.
      source_domain: crvs
      external_alignments_json: '[{"label": "EventStatus", "match": "close", "note": "EventStatus is a
        5-value enum (CREATED, NOTIFIED, DECLARED, REGISTERED, ARCHIVED); a cleaner semantic fit than
        v1 RegStatus. See system_mappings for value-level detail; cancelled, corrected, pending_validation,
        and rejected have no EventStatus equivalent.", "uri": "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventStatus",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
  RegistrationType:
    enum_uri: publicschema:RegistrationType
    title: Registration Type
    description: Categories describing whether the registration of a vital event occurred within the legal
      time limit, after it, or through a special procedure.
    status: bibo:draft
    permissible_values:
      current:
        meaning: publicschema:RegistrationType/current
        title: Current
        description: Registration took place within the legal time limit set by the jurisdiction.
        annotations:
          label_es: Corriente
          label_fr: Courant
          description_es: El registro se realizó dentro del plazo legal establecido por la jurisdicción.
          description_fr: L'enregistrement a eu lieu dans le délai légal fixé par la juridiction.
      late:
        meaning: publicschema:RegistrationType/late
        title: Late
        description: Registration took place after the legal time limit but through the standard administrative
          process.
        annotations:
          label_es: Tardío
          label_fr: Tardif
          description_es: El registro se realizó después del plazo legal, pero mediante el procedimiento
            administrativo estándar.
          description_fr: L'enregistrement a eu lieu après le délai légal, mais par la procédure administrative
            standard.
      court_ordered:
        meaning: publicschema:RegistrationType/court_ordered
        title: Court ordered
        description: Registration was effected by court order, typically because the standard administrative
          route was no longer available.
        annotations:
          label_es: Ordenado por el tribunal
          label_fr: Ordonné par le tribunal
          description_es: El registro se efectuó por orden judicial, típicamente porque la vía administrativa
            estándar ya no estaba disponible.
          description_fr: L'enregistrement a été effectué par décision judiciaire, généralement parce
            que la voie administrative standard n'était plus disponible.
      reconstruction:
        meaning: publicschema:RegistrationType/reconstruction
        title: Reconstruction
        description: The record was reconstructed from other evidence because the original register was
          lost, destroyed, or never existed.
        annotations:
          label_es: Reconstrucción
          label_fr: Reconstitution
          description_es: El registro fue reconstruido a partir de otras pruebas porque el registro original
            se perdió, fue destruido o nunca existió.
          description_fr: L'acte a été reconstitué à partir d'autres éléments de preuve parce que le registre
            original a été perdu, détruit ou n'a jamais existé.
    annotations:
      label_es: Tipo de registro
      label_fr: Type d'enregistrement
      description_es: Categorías que describen si el registro de un evento vital ocurrió dentro del plazo
        legal, después de este, o mediante un procedimiento especial.
      description_fr: Catégories décrivant si l'enregistrement d'un événement d'état civil a eu lieu dans
        le délai légal, après celui-ci ou par une procédure particulière.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent (semantic mismatch)", "match": "none", "note":
        "OpenCRVS RegistrationType describes which event is being registered (BIRTH, DEATH, MARRIAGE),
        which maps to our civil-status-record-type; our registration-type describes timing and procedural
        route (current, late, court_ordered, reconstruction), a dimension that OpenCRVS does not model.",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
