      grandchild:
        meaning: publicschema:RelationshipType/grandchild
        title: Grandchild
        description: A child of a person's child.
        annotations:
          label_es: Nieto/a
          label_fr: Petit-enfant
          description_es: Un hijo o hija del hijo o hija de una persona.
          description_fr: Un enfant de l'enfant d'une personne.
        exact_mappings:
