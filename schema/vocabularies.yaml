enums:
  AcuteMalnutritionSeverity:
    enum_uri: publicschema:AcuteMalnutritionSeverity
    title: Acute Malnutrition Severity
    description: The severity band of a person's acute malnutrition, expressed as adequate, moderate,
      or severe. The band is a classification layer used across age groups and reference systems; the
      raw cutoffs that produce it differ by age (MUAC thresholds for children 6-59 months, weight-for-height
      z-score for under-5s, BMI-for-age for school-age children and adolescents, adult BMI for adults,
      pregnant/lactating cutoffs for women of reproductive age). Programs applying this vocabulary on
      an AnthropometricProfile must cite the muac_cutoff_rule that produced the band.
    status: bibo:status/forthcoming
    permissible_values:
      adequate:
        meaning: publicschema:AcuteMalnutritionSeverity/adequate
        title: Adequate
        description: 'No acute malnutrition detected under the cutoff rule applied. Reference thresholds
          by age: MUAC >= 125mm for children 6-59 months; WHZ >= -2 SD for under-5s; BMI-for-age z-score
          >= -2 SD for school-age and adolescents; BMI >= 18.5 for adults.'
        annotations:
          label_es: Adecuado
          label_fr: Adéquat
          description_es: 'No se detecta desnutrición aguda según la regla de corte aplicada. Umbrales
            de referencia por edad: perímetro braquial >= 125mm para niños de 6 a 59 meses; puntaje z
            peso-para-talla >= -2 SD para menores de 5 años; IMC-para-edad z-score >= -2 SD para niños
            en edad escolar y adolescentes; IMC >= 18,5 para adultos.'
          description_fr: 'Aucune malnutrition aiguë détectée selon la règle de seuil appliquée. Seuils
            de référence par âge : périmètre brachial >= 125mm pour les enfants de 6 à 59 mois ; score
            z poids-pour-taille >= -2 SD pour les moins de 5 ans ; IMC-pour-âge z-score >= -2 SD pour
            les enfants d''âge scolaire et adolescents ; IMC >= 18,5 pour les adultes.'
      moderate_acute_malnutrition:
        meaning: publicschema:AcuteMalnutritionSeverity/moderate_acute_malnutrition
        title: Moderate acute malnutrition (MAM)
        description: 'Moderate acute malnutrition under the cutoff rule applied. Reference thresholds
          by age: MUAC 115-124mm for children 6-59 months; WHZ -3 to <-2 SD for under-5s; BMI-for-age
          z-score -3 to <-2 SD for school-age and adolescents; BMI 16-18.4 for adults. Typically requires
          supplementary feeding.'
        annotations:
          label_es: Desnutrición aguda moderada (MAM)
          label_fr: Malnutrition aiguë modérée (MAM)
          description_es: 'Desnutrición aguda moderada según la regla de corte aplicada. Umbrales de referencia
            por edad: perímetro braquial de 115 a 124mm para niños de 6 a 59 meses; puntaje z peso-para-talla
            -3 a <-2 SD para menores de 5 años; IMC-para-edad z-score -3 a <-2 SD para niños en edad escolar
            y adolescentes; IMC 16 a 18,4 para adultos. Generalmente requiere alimentación suplementaria.'
          description_fr: 'Malnutrition aiguë modérée selon la règle de seuil appliquée. Seuils de référence
            par âge : périmètre brachial de 115 à 124mm pour les enfants de 6 à 59 mois ; score z poids-pour-taille
            -3 à <-2 SD pour les moins de 5 ans ; IMC-pour-âge z-score -3 à <-2 SD pour les enfants d''âge
            scolaire et adolescents ; IMC 16 à 18,4 pour les adultes. Nécessite généralement une alimentation
            supplémentaire.'
      severe_acute_malnutrition:
        meaning: publicschema:AcuteMalnutritionSeverity/severe_acute_malnutrition
        title: Severe acute malnutrition (SAM)
        description: 'Severe acute malnutrition under the cutoff rule applied, or presence of bilateral
          pitting oedema. Reference thresholds by age: MUAC < 115mm for children 6-59 months; WHZ < -3
          SD for under-5s; BMI-for-age z-score < -3 SD for school-age and adolescents; BMI < 16 for adults.
          Requires therapeutic treatment.'
        annotations:
          label_es: Desnutrición aguda grave (DAG)
          label_fr: Malnutrition aiguë sévère (MAS)
          description_es: 'Desnutrición aguda grave según la regla de corte aplicada, o presencia de edema
            bilateral con fóvea. Umbrales de referencia por edad: perímetro braquial < 115mm para niños
            de 6 a 59 meses; puntaje z peso-para-talla < -3 SD para menores de 5 años; IMC-para-edad z-score
            < -3 SD para niños en edad escolar y adolescentes; IMC < 16 para adultos. Requiere tratamiento
            terapéutico.'
          description_fr: 'Malnutrition aiguë sévère selon la règle de seuil appliquée, ou présence d''œdèmes
            bilatéraux prenant le godet. Seuils de référence par âge : périmètre brachial < 115mm pour
            les enfants de 6 à 59 mois ; score z poids-pour-taille < -3 SD pour les moins de 5 ans ; IMC-pour-âge
            z-score < -3 SD pour les enfants d''âge scolaire et adolescents ; IMC < 16 pour les adultes.
            Nécessite un traitement thérapeutique.'
    annotations:
      label_es: Gravedad de la desnutrición aguda
      label_fr: Sévérité de la malnutrition aiguë
      description_es: La banda de gravedad de la desnutrición aguda de una persona, expresada como adecuada,
        moderada o grave. La banda es una capa de clasificación utilizada en todos los grupos de edad
        y sistemas de referencia; los puntos de corte crudos que la producen difieren según la edad (umbrales
        de perímetro braquial para niños de 6 a 59 meses, puntaje z peso-para-talla para menores de 5
        años, IMC-para-edad para niños en edad escolar y adolescentes, IMC adulto para adultos, umbrales
        para mujeres embarazadas/lactantes). Los programas que apliquen este vocabulario sobre un AnthropometricProfile
        deben citar el muac_cutoff_rule que produjo la banda.
      description_fr: La bande de sévérité de la malnutrition aiguë d'une personne, exprimée comme adéquate,
        modérée ou sévère. La bande est une couche de classification utilisée pour tous les groupes d'âge
        et systèmes de référence ; les seuils bruts qui la produisent diffèrent selon l'âge (seuils de
        périmètre brachial pour les enfants de 6 à 59 mois, score z poids-pour-taille pour les moins de
        5 ans, IMC-pour-âge pour les enfants d'âge scolaire et adolescents, IMC adulte pour les adultes,
        seuils femmes enceintes/allaitantes). Les programmes appliquant ce vocabulaire sur un AnthropometricProfile
        doivent citer le muac_cutoff_rule ayant produit la bande.
      standard_json: '{"name": "WHO/UNICEF Joint Statement: WHO child growth standards and the identification
        of severe acute malnutrition in infants and children (2009)", "notes": "The 2009 WHO/UNICEF joint
        statement is the normative source for the MUAC < 115mm SAM cutoff in children 6-59 months. It
        supersedes the earlier 2007 WHO/WFP/SCN/UNICEF Joint Statement on Community-based Management of
        Severe Acute Malnutrition, which originally specified MUAC < 110mm and addressed only SAM. The
        three-band classification (adequate / MAM / SAM) used by this vocabulary is operationalized by
        subsequent consolidated guidance rather than by either joint statement. Reference cutoffs by age
        group: children 6-59 months, MUAC with SAM < 115mm, MAM 115-124mm, adequate >= 125mm, or WHZ bands
        SAM < -3 SD, MAM -3 to < -2 SD (WHO Child Growth Standards 2006); school-age / adolescents, BMI-for-age
        z-score thresholds from WHO 2007 Growth Reference; adults, BMI < 16 severe, 16-18.4 moderate,
        >= 18.5 adequate; pregnant and lactating women, MUAC cutoff (commonly < 210mm or < 230mm per protocol).
        Programs choose the rule appropriate to the subject and cite it on the AnthropometricProfile.",
        "uri": "https://www.who.int/publications/i/item/9789241598163"}'
      bibliography_refs: '["who-child-growth-standards", "who-muac-cutoffs"]'
  AdministrationMode:
    enum_uri: publicschema:AdministrationMode
    title: Administration Mode
    description: 'How an instrument is administered to a subject: self-reported, proxy-reported (a caregiver
      or household member answers about the subject), assisted (the subject answers with help from another
      person), or mixed (some items self, some proxy).'
    status: bibo:draft
    permissible_values:
      self_:
        meaning: publicschema:AdministrationMode/self_
        title: Self-report
        description: The subject answered the items about themselves. Preferred mode for WG-SS and WG-ES.
        annotations:
          label_es: Autoinforme
          label_fr: Auto-déclaration
          description_es: El sujeto respondió los ítems sobre sí mismo. Modo preferido para WG-SS y WG-ES.
          description_fr: Le sujet a répondu aux items à son propre sujet. Mode privilégié pour WG-SS
            et WG-ES.
      proxy:
        meaning: publicschema:AdministrationMode/proxy
        title: Proxy-report
        description: Another person (caregiver, parent, spouse, household member) answered the items about
          the subject. Always the mode for the UNICEF Child Functioning Module, because the child is not
          the respondent.
        annotations:
          label_es: Informe por terceros
          label_fr: Déclaration par procuration
          description_es: Otra persona (cuidador, padre, cónyuge, miembro del hogar) respondió los ítems
            sobre el sujeto. Siempre el modo del Módulo de Funcionamiento Infantil de UNICEF, porque el
            niño no es el respondiente.
          description_fr: Une autre personne (aidant, parent, conjoint, membre du ménage) a répondu aux
            items au sujet du sujet. Toujours le mode du Module de fonctionnement de l'enfant de l'UNICEF,
            car l'enfant n'est pas le répondant.
      assisted:
        meaning: publicschema:AdministrationMode/assisted
        title: Assisted
        description: 'The subject answered the items but received help from another person (for reading,
          translation, or comprehension). Distinct from proxy: the subject is still the respondent.'
        annotations:
          label_es: Asistido
          label_fr: Assisté
          description_es: 'El sujeto respondió los ítems pero recibió ayuda de otra persona (para lectura,
            traducción o comprensión). Distinto del informe por terceros: el sujeto sigue siendo el respondiente.'
          description_fr: 'Le sujet a répondu aux items mais a reçu l''aide d''une autre personne (lecture,
            traduction ou compréhension). Distinct de la procuration : le sujet reste le répondant.'
      mixed:
        meaning: publicschema:AdministrationMode/mixed
        title: Mixed
        description: Some items were answered by the subject and others by a proxy. Use when the administration
          crossed modes within one session, for example because the subject tired or could not answer
          certain items.
        annotations:
          label_es: Mixto
          label_fr: Mixte
          description_es: Algunos ítems fueron respondidos por el sujeto y otros por un tercero. Utilice
            cuando la administración cruzó modos en una misma sesión, por ejemplo porque el sujeto se
            cansó o no pudo responder ciertos ítems.
          description_fr: Certains items ont été répondus par le sujet et d'autres par procuration. À
            utiliser lorsque l'administration a croisé les modes au cours d'une même séance, par exemple
            parce que le sujet s'est fatigué ou ne pouvait pas répondre à certains items.
    annotations:
      label_es: Modo de administración
      label_fr: Mode d'administration
      description_es: 'Cómo se administra un instrumento a un sujeto: autoinforme, informe por terceros
        (un cuidador o miembro del hogar responde sobre el sujeto), asistido (el sujeto responde con ayuda
        de otra persona) o mixto (algunos ítems autoinformados, otros por terceros).'
      description_fr: 'Comment un instrument est administré à un sujet : auto-déclaré, déclaré par procuration
        (un aidant ou membre du ménage répond au sujet du sujet), assisté (le sujet répond avec l''aide
        d''une autre personne) ou mixte (certains items en auto-déclaration, d''autres par procuration).'
      standard_json: '{"name": "Washington Group Analytic Guidelines for the Creation of Disability Identifiers",
        "notes": "The WG analytic guidelines recommend recording the administration mode because proxy
        responses systematically underreport difficulty relative to self-report, and prevalence should
        be disaggregated by mode when both are present in a sample.", "uri": "https://www.washingtongroup-disability.com/analytic-guidelines/"}'
      bibliography_refs: '["washington-group-ss"]'
  AidUseFrequency:
    enum_uri: publicschema:AidUseFrequency
    title: Aid Use Frequency
    description: A four-point frequency scale for how often a person uses an assistive device, used in
      the Washington Group Extended Set on Functioning (WG-ES) for hearing aid use.
    status: bibo:draft
    permissible_values:
      all_of_the_time:
        meaning: publicschema:AidUseFrequency/all_of_the_time
        title: All of the time
        description: The person uses the aid all of the time.
        annotations:
          label_es: Todo el tiempo
          label_fr: Tout le temps
          description_es: La persona usa la ayuda todo el tiempo.
          description_fr: La personne utilise l'aide tout le temps.
      some_of_the_time:
        meaning: publicschema:AidUseFrequency/some_of_the_time
        title: Some of the time
        description: The person uses the aid some of the time.
        annotations:
          label_es: Parte del tiempo
          label_fr: Une partie du temps
          description_es: La persona usa la ayuda parte del tiempo.
          description_fr: La personne utilise l'aide une partie du temps.
      rarely:
        meaning: publicschema:AidUseFrequency/rarely
        title: Rarely
        description: The person rarely uses the aid.
        annotations:
          label_es: Raramente
          label_fr: Rarement
          description_es: La persona raramente usa la ayuda.
          description_fr: La personne utilise rarement l'aide.
      never:
        meaning: publicschema:AidUseFrequency/never
        title: Never
        description: The person never uses the aid.
        annotations:
          label_es: Nunca
          label_fr: Jamais
          description_es: La persona nunca usa la ayuda.
          description_fr: La personne n'utilise jamais l'aide.
    annotations:
      label_es: Frecuencia de uso de la ayuda
      label_fr: Fréquence d'utilisation de l'aide
      description_es: Una escala de frecuencia de cuatro niveles para la frecuencia con la que una persona
        usa un dispositivo de asistencia, utilizada en el Conjunto Extendido del Grupo de Washington sobre
        Funcionamiento (WG-ES) para el uso de audífonos.
      description_fr: Une échelle de fréquence à quatre niveaux pour la fréquence d'utilisation d'un dispositif
        d'assistance, utilisée dans l'Ensemble étendu du Groupe de Washington sur le fonctionnement (WG-ES)
        pour l'utilisation d'un appareil auditif.
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Used
        on WG-ES item HEAR_3 (hearing aid use frequency, OPTIONAL) per the 11 October 2022 PDF.", "uri":
        "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  BiometricExceptionReason:
    enum_uri: publicschema:BiometricExceptionReason
    title: Biometric Exception Reason
    description: The reason a biometric sample could not be captured. Used on BiometricSample records
      where exception_reason is non-null, indicating the record documents a capture failure rather than
      holding actual biometric data.
    status: bibo:draft
    permissible_values:
      amputated:
        meaning: publicschema:BiometricExceptionReason/amputated
        title: Amputated
        description: The body part has been amputated.
        annotations:
          label_es: Amputado
          label_fr: Amputé
          description_es: La parte del cuerpo ha sido amputada.
          description_fr: La partie du corps a été amputée.
      bandaged:
        meaning: publicschema:BiometricExceptionReason/bandaged
        title: Bandaged
        description: The body part is bandaged and cannot be scanned.
        annotations:
          label_es: Vendado
          label_fr: Bandé
          description_es: La parte del cuerpo está vendada y no se puede escanear.
          description_fr: La partie du corps est bandée et ne peut pas être scannée.
      damaged:
        meaning: publicschema:BiometricExceptionReason/damaged
        title: Damaged
        description: The body part is damaged (scarring, skin condition) preventing capture.
        annotations:
          label_es: Dañado
          label_fr: Endommagé
          description_es: La parte del cuerpo está dañada (cicatrices, afección cutánea) lo que impide
            la captura.
          description_fr: La partie du corps est endommagée (cicatrice, affection cutanée) empêchant la
            capture.
      unable_to_capture:
        meaning: publicschema:BiometricExceptionReason/unable_to_capture
        title: Unable to capture
        description: The biometric could not be captured for another reason (device failure, subject unable
          to cooperate).
        annotations:
          label_es: Imposible de capturar
          label_fr: Impossible de capturer
          description_es: El biométrico no pudo ser capturado por otra razón (fallo del dispositivo, sujeto
            incapaz de cooperar).
          description_fr: Le biométrique n'a pas pu être capturé pour une autre raison (panne de dispositif,
            sujet incapable de coopérer).
    annotations:
      label_es: Razón de excepción biométrica
      label_fr: Raison d'exception biométrique
      description_es: La razón por la cual no se pudo capturar una muestra biométrica. Se utiliza en registros
        BiometricSample donde exception_reason no es nulo, indicando que el registro documenta un fallo
        de captura en lugar de contener datos biométricos reales.
      description_fr: La raison pour laquelle un échantillon biométrique n'a pas pu être capturé. Utilisé
        sur les enregistrements BiometricSample où exception_reason n'est pas nul, indiquant que l'enregistrement
        documente un échec de capture plutôt que de contenir des données biométriques réelles.
      vocab_references_json: '[{"machine_readable": false, "name": "OSIA MissingType Enum", "notes": "OSIA
        MissingType presence enum: AMPUTATED, BANDAGED, DAMAGED. unable_to_capture added as a catch-all.",
        "relationship": "subset", "uri": "https://secureidentityalliance.github.io/osia/"}]'
  BiometricModality:
    enum_uri: publicschema:BiometricModality
    title: Biometric Modality
    description: The type of biometric measurement captured, such as fingerprint, face, or iris.
    status: bibo:draft
    permissible_values:
      face:
        meaning: publicschema:BiometricModality/face
        title: Face
        description: A facial image capture.
        annotations:
          label_es: Rostro
          label_fr: Visage
          description_es: Una captura de imagen facial.
          description_fr: Une capture d'image faciale.
          standard_code: '2'
      fingerprint:
        meaning: publicschema:BiometricModality/fingerprint
        title: Fingerprint
        description: A fingerprint image capture.
        annotations:
          label_es: Huella dactilar
          label_fr: Empreinte digitale
          description_es: Una captura de imagen de huella dactilar.
          description_fr: Une capture d'image d'empreinte digitale.
          standard_code: '4'
      iris:
        meaning: publicschema:BiometricModality/iris
        title: Iris
        description: An iris image capture.
        annotations:
          label_es: Iris
          label_fr: Iris
          description_es: Una captura de imagen del iris.
          description_fr: Une capture d'image de l'iris.
          standard_code: '5'
      signature:
        meaning: publicschema:BiometricModality/signature
        title: Signature
        description: A handwritten signature capture (not a cryptographic signature).
        annotations:
          label_es: Firma
          label_fr: Signature
          description_es: Una captura de firma manuscrita (no una firma criptográfica).
          description_fr: Une capture de signature manuscrite (non une signature cryptographique).
          standard_code: '8'
      voice:
        meaning: publicschema:BiometricModality/voice
        title: Voice
        description: A voice recording capture.
        annotations:
          label_es: Voz
          label_fr: Voix
          description_es: Una captura de grabación de voz.
          description_fr: Une capture d'enregistrement vocal.
          standard_code: '3'
    annotations:
      label_es: Modalidad biométrica
      label_fr: Modalité biométrique
      description_es: El tipo de medición biométrica capturada, como huella dactilar, rostro o iris.
      description_fr: Le type de mesure biométrique capturée, tel qu'empreinte digitale, visage ou iris.
      vocab_references_json: '[{"machine_readable": false, "name": "ISO/IEC 19785 (CBEFF) Biometric Type
        Registry", "notes": "CBEFF type codes: face (2), voice (3), fingerprint (4), iris (5), signature
        (8).", "relationship": "subset", "uri": "https://www.iso.org/standard/41047.html"}, {"machine_readable":
        false, "name": "OSIA Biometric Data Model", "notes": "OSIA BiometricType enum covers the same
        modalities.", "relationship": "partial_overlap", "uri": "https://secureidentityalliance.github.io/osia/"}]'
      bibliography_refs: '["osia-itu-x1281"]'
  BiometricSubtype:
    enum_uri: publicschema:BiometricSubtype
    title: Biometric Subtype
    description: 'The specific body part or position within a biometric modality. Values must be consistent
      with the biometric_modality property: finger codes with fingerprint, eye codes with iris, portrait
      with face.'
    status: bibo:draft
    permissible_values:
      right_thumb:
        meaning: publicschema:BiometricSubtype/right_thumb
        title: Right thumb
        description: The thumb of the right hand.
        annotations:
          label_es: Pulgar derecho
          label_fr: Pouce droit
          description_es: El pulgar de la mano derecha.
          description_fr: Le pouce de la main droite.
          standard_code: '1'
      right_index:
        meaning: publicschema:BiometricSubtype/right_index
        title: Right index finger
        description: The index finger of the right hand.
        annotations:
          label_es: Índice derecho
          label_fr: Index droit
          description_es: El dedo índice de la mano derecha.
          description_fr: L'index de la main droite.
          standard_code: '2'
      right_middle:
        meaning: publicschema:BiometricSubtype/right_middle
        title: Right middle finger
        description: The middle finger of the right hand.
        annotations:
          label_es: Medio derecho
          label_fr: Majeur droit
          description_es: El dedo medio de la mano derecha.
          description_fr: Le majeur de la main droite.
          standard_code: '3'
      right_ring:
        meaning: publicschema:BiometricSubtype/right_ring
        title: Right ring finger
        description: The ring finger of the right hand.
        annotations:
          label_es: Anular derecho
          label_fr: Annulaire droit
          description_es: El dedo anular de la mano derecha.
          description_fr: L'annulaire de la main droite.
          standard_code: '4'
      right_little:
        meaning: publicschema:BiometricSubtype/right_little
        title: Right little finger
        description: The little finger of the right hand.
        annotations:
          label_es: Meñique derecho
          label_fr: Auriculaire droit
          description_es: El dedo meñique de la mano derecha.
          description_fr: L'auriculaire de la main droite.
          standard_code: '5'
      left_thumb:
