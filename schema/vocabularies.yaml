  AdoptionType:
    enum_uri: publicschema:AdoptionType
    title: Adoption Type
    description: Whether an adoption fully replaces the relationship to the biological family (full adoption)
      or preserves some legal ties to it (simple or limited adoption). This distinction carries significant
      civil status implications in civil law systems.
    status: bibo:draft
    permissible_values:
      full:
        meaning: publicschema:AdoptionType/full
        title: Full
        description: Adoption that fully severs legal ties to the biological family and establishes a
          complete new legal parent-child relationship. Known as adoption plenière in French civil law.
        annotations:
          label_es: Plena
          label_fr: Plénière
          description_es: Adopción que rompe por completo los vínculos legales con la familia biológica
            y establece una nueva relación legal de padre-hijo. Conocida como adopción plena.
          description_fr: Adoption qui rompt entièrement les liens juridiques avec la famille biologique
            et établit une nouvelle relation parent-enfant juridiquement complète. Connue sous le nom
            d'adoption plénière en droit civil français.
      simple:
        meaning: publicschema:AdoptionType/simple
        title: Simple
        description: Adoption that preserves some legal ties to the biological family, for example for
          inheritance purposes. Known as adoption simple in French civil law.
        annotations:
          label_es: Simple
          label_fr: Simple
          description_es: Adopción que preserva algunos vínculos legales con la familia biológica, por
            ejemplo, para fines de herencia. Conocida como adopción simple.
          description_fr: Adoption qui préserve certains liens juridiques avec la famille biologique,
            par exemple à des fins successorales. Connue sous le nom d'adoption simple en droit civil
            français.
    annotations:
      label_es: Tipo de adopción
      label_fr: Type d'adoption
      description_es: Si una adopción reemplaza completamente la relación con la familia biológica (adopción
        plena) o preserva algunos lazos legales con ella (adopción simple o limitada). Esta distinción
        tiene implicaciones importantes en el estado civil en los sistemas de derecho civil.
      description_fr: Si une adoption remplace entièrement la relation avec la famille biologique (adoption
        plénière) ou préserve certains liens légaux avec elle (adoption simple ou limitée). Cette distinction
        a des implications importantes sur l'état civil dans les systèmes de droit civil.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "Adoption is
        not a v1 event type; an OpenCRVS deployment supporting adoption would define this vocabulary in
        country configuration.", "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["hague-intercountry-adoption"]'
  AnnotationType:
    enum_uri: publicschema:AnnotationType
    title: Annotation Type
    description: The category of a marginal annotation (mention marginale) added to a civil status record
      when the annotation is not derivable from a triggering vital event. Event-triggered annotations
      (e.g., annotating a birth acte with a marriage) carry their annotation type implicitly through the
      triggering event and are not listed here.
    status: bibo:draft
    permissible_values:
      court_ordered_correction:
        meaning: publicschema:AnnotationType/court_ordered_correction
        title: Court ordered correction
        description: An annotation reflecting a judicial correction of a prior entry in the civil status
          record (e.g., rectification of a name or date).
        annotations:
          label_es: Corrección ordenada por el tribunal
          label_fr: Correction ordonnée par le tribunal
          description_es: Una anotación que refleja una corrección judicial de una inscripción previa
            en el acta de estado civil (por ej., rectificación de un nombre o fecha).
          description_fr: Une mention reflétant une correction judiciaire d'une inscription antérieure
            dans l'acte d'état civil (par ex., rectification d'un nom ou d'une date).
      nationality_change:
        meaning: publicschema:AnnotationType/nationality_change
        title: Nationality change
        description: An annotation reflecting a change in the person's nationality, for example through
          naturalization or loss of citizenship.
        annotations:
          label_es: Cambio de nacionalidad
          label_fr: Changement de nationalité
          description_es: Una anotación que refleja un cambio en la nacionalidad de la persona, por ejemplo,
            a través de naturalización o pérdida de ciudadanía.
          description_fr: Une mention reflétant un changement de nationalité de la personne, par exemple
            par naturalisation ou perte de citoyenneté.
      name_change:
        meaning: publicschema:AnnotationType/name_change
        title: Name change
        description: An annotation reflecting an administrative or judicial change of the person's name
          that does not itself constitute a vital event.
        annotations:
          label_es: Cambio de nombre
          label_fr: Changement de nom
          description_es: Una anotación que refleja un cambio administrativo o judicial del nombre de
            la persona que no constituye en sí mismo un evento vital.
          description_fr: Une mention reflétant un changement de nom de la personne, par voie administrative
            ou judiciaire, qui ne constitue pas en lui-même un événement d'état civil.
      gender_marker_change:
        meaning: publicschema:AnnotationType/gender_marker_change
        title: Gender marker change
        description: An annotation reflecting a change to the gender marker recorded on the person's civil
          status record, issued by an administrative or judicial authority.
        annotations:
          label_es: Cambio de mención de sexo
          label_fr: Changement de mention de sexe
          description_es: Una anotación que refleja un cambio de la mención de sexo inscrita en el acta
            de estado civil de la persona, dictado por una autoridad administrativa o judicial.
          description_fr: Une mention reflétant un changement de la mention de sexe portée sur l'acte
            d'état civil de la personne, prononcé par une autorité administrative ou judiciaire.
    annotations:
      label_es: Tipo de anotación
      label_fr: Type d'annotation
      description_es: La categoría de una anotación marginal (mention marginale) añadida a un acta de
        estado civil cuando la anotación no se deriva de un evento de estado civil desencadenante. Las
        anotaciones desencadenadas por un evento (por ej., anotar un matrimonio en un acta de nacimiento)
        llevan su tipo de forma implícita a través del evento desencadenante y no se listan aquí.
      description_fr: La catégorie d'une mention marginale ajoutée à un acte d'état civil lorsque la mention
        n'est pas déductible d'un événement d'état civil déclencheur. Les mentions déclenchées par un
        événement (par ex., mentionner un mariage sur un acte de naissance) portent leur type implicitement
        à travers l'événement déclencheur et ne sont pas listées ici.
      source_domain: crvs
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v1
        core has no annotation concept; corrections flow through the RegAction workflow recorded in History,
        which is an audit trail rather than a typed marginal annotation.", "vocabulary": "OpenCRVS v2
        event service", "vocabulary_id": "opencrvs"}]'
  BirthAttendant:
    enum_uri: publicschema:BirthAttendant
    title: Birth Attendant
    description: The category of person who attended the birth. Used to track skilled birth attendance,
      a core indicator of maternal and newborn health.
    status: bibo:draft
    permissible_values:
      physician:
        meaning: publicschema:BirthAttendant/physician
        title: Physician
        description: A licensed medical doctor attended the birth.
        annotations:
          label_es: Médico
          label_fr: Médecin
          description_es: Un médico titulado asistió al parto.
          description_fr: Un médecin diplômé a assisté à l'accouchement.
      midwife:
        meaning: publicschema:BirthAttendant/midwife
        title: Midwife
        description: A professionally trained midwife attended the birth.
        annotations:
          label_es: Partera
          label_fr: Sage-femme
          description_es: Una partera profesional asistió al parto.
          description_fr: Une sage-femme qualifiée a assisté à l'accouchement.
      nurse:
        meaning: publicschema:BirthAttendant/nurse
        title: Nurse
        description: A nurse attended the birth.
        annotations:
          label_es: Enfermero/a
          label_fr: Infirmier/ère
          description_es: Un enfermero o enfermera asistió al parto.
          description_fr: Un infirmier ou une infirmière a assisté à l'accouchement.
      traditional_birth_attendant:
        meaning: publicschema:BirthAttendant/traditional_birth_attendant
        title: Traditional birth attendant
        description: A community member or traditional practitioner who provides birth assistance, typically
          without formal medical training.
        annotations:
          label_es: Partera tradicional
          label_fr: Accoucheuse traditionnelle
          description_es: Un miembro de la comunidad o practicante tradicional que brinda asistencia al
            parto, típicamente sin formación médica formal.
          description_fr: Un membre de la communauté ou un praticien traditionnel qui apporte une assistance
            à l'accouchement, généralement sans formation médicale formelle.
      other:
        meaning: publicschema:BirthAttendant/other
        title: Other
        description: Another category of attendant not covered above (e.g., family member, self).
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Otra categoría de asistente no cubierta arriba (por ejemplo, familiar, la propia
            persona).
          description_fr: Une autre catégorie d'assistant non couverte ci-dessus (par exemple, membre
            de la famille, soi-même).
      none:
        meaning: publicschema:BirthAttendant/none
        title: None
        description: No attendant was present during the birth.
        annotations:
          label_es: Ninguno
          label_fr: Aucun
          description_es: No hubo ningún asistente presente durante el parto.
          description_fr: Aucun assistant n'était présent lors de l'accouchement.
    annotations:
      label_es: Asistente al parto
      label_fr: Assistant à la naissance
      description_es: La categoría de persona que asistió al parto. Se utiliza para hacer seguimiento
        a la asistencia calificada al parto, un indicador clave de la salud materna y neonatal.
      description_fr: La catégorie de personne ayant assisté à l'accouchement. Utilisé pour suivre l'assistance
        qualifiée à l'accouchement, un indicateur clé de la santé maternelle et néonatale.
      source_domain: crvs
      external_alignments_json: '[{"label": "BirthRegistration.attendantAtBirth (country-configured)",
        "match": "none", "note": "The field is an untyped String; values are defined at country-deployment
        time (e.g. Farajaland uses PHYSICIAN/NURSE/MIDWIFE/OTHER_PARAMEDICAL_PERSONNEL/LAYPERSON/TRADITIONAL_BIRTH_ATTENDANT/NONE).",
        "vocabulary": "OpenCRVS v2 event service", "vocabulary_id": "opencrvs"}]'
      bibliography_refs: '["who-skilled-birth-attendants-2018"]'
