          label_fr: Ruches
          description_es: Colonias de abejas mantenidas en colmenas para la producción de miel.
          description_fr: Colonies d'abeilles maintenues dans des ruches pour la production de miel.
      other_livestock:
        meaning: publicschema:LivestockType/other_livestock
        title: Other livestock
