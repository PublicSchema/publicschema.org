          label_fr: Ânes/mulets
          description_es: Asnos, mulas y burdéganos domesticados.
          description_fr: Ânes, mulets et bardots domestiqués.
      camels:
        meaning: publicschema:LivestockType/camels
        title: Camels
        description: Domesticated camels (dromedary and Bactrian).
        annotations:
          label_es: Camellos
          label_fr: Chameaux
          description_es: Camellos domesticados (dromedarios y camellos bactrianos).
          description_fr: Chameaux domestiqués (dromadaires et chameaux de Bactriane).
      rabbits:
        meaning: publicschema:LivestockType/rabbits
        title: Rabbits
        description: Domesticated rabbits raised for meat, fur, or other products.
        annotations:
          label_es: Conejos
          label_fr: Lapins
          description_es: Conejos domesticados criados para carne, piel u otros productos.
          description_fr: Lapins domestiqués élevés pour la viande, la fourrure ou d'autres produits.
      beehives:
        meaning: publicschema:LivestockType/beehives
