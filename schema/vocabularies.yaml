        annotations:
          label_es: Otro ganado
          label_fr: Autre bétail
          description_es: Especies de ganado no cubiertas por las otras categorías.
          description_fr: Espèces de bétail non couvertes par les autres catégories.
    annotations:
      label_es: Tipo de ganado
      label_fr: Type de bétail
      description_es: Tipos de ganado criados por la explotación agrícola, clasificados según el Programa
        Mundial del Censo Agropecuario de la FAO.
      description_fr: Types de bétail élevés par l'exploitation agricole, classifiés selon le Programme
        mondial du recensement de l'agriculture de la FAO.
      standard_json: '{"name": "FAO World Programme for the Census of Agriculture 2020", "notes": "FAO
        defines livestock categories for agricultural censuses. The list below covers the main species
        relevant to social protection targeting.", "uri": "https://www.fao.org/world-census-agriculture/wcarounds/wca2020/en/"}'
