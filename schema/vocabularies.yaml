        this vocabulary uses 14 covering social protection and national ID use cases.", "relationship":
        "partial_overlap", "uri": "https://secureidentityalliance.github.io/osia/"}]'
      bibliography_refs: '["osia-itu-x1281"]'
  CareProviderType:
    enum_uri: publicschema:CareProviderType
    title: Care Provider Type
    description: 'The type of care provider or facility from which a caregiver sought advice or treatment
      for a child''s illness episode. Used for diarrhea, ARI, and fever care-seeking questions in ChildHealthProfile,
      and shared by MaternalNewbornHealthProfile and ReproductiveHealthProfile. Multi-select: a single
      illness episode may involve more than one provider type.'
    status: bibo:draft
    permissible_values:
      public_hospital:
        meaning: publicschema:CareProviderType/public_hospital
        title: Public hospital
        description: A government-operated hospital providing inpatient and outpatient services.
        annotations:
          label_es: Hospital público
          label_fr: Hôpital public
          description_es: Un hospital operado por el gobierno que proporciona servicios hospitalarios
            y ambulatorios.
          description_fr: Un hôpital géré par l'État fournissant des services hospitaliers et ambulatoires.
      public_clinic:
        meaning: publicschema:CareProviderType/public_clinic
        title: Public health clinic or health centre
        description: A government-operated outpatient clinic or health centre below hospital level.
        annotations:
          label_es: Clínica de salud pública o centro de salud
          label_fr: Clinique de santé publique ou centre de santé
          description_es: Una clínica ambulatoria o centro de salud operado por el gobierno, de nivel
            inferior al hospital.
          description_fr: Une clinique ambulatoire ou un centre de santé géré par l'État, de niveau inférieur
            à l'hôpital.
      health_post:
        meaning: publicschema:CareProviderType/health_post
        title: Health post or dispensary
        description: A small public facility at community level, often staffed by a nurse or community
          health worker, providing basic preventive and curative services.
        annotations:
          label_es: Puesto de salud o dispensario
          label_fr: Poste de santé ou dispensaire
          description_es: Una instalación pública pequeña a nivel comunitario, a menudo dotada de un enfermero
            o agente de salud comunitaria, que proporciona servicios básicos preventivos y curativos.
          description_fr: Un petit établissement public au niveau communautaire, souvent doté d'un infirmier
            ou d'un agent de santé communautaire, fournissant des services de base préventifs et curatifs.
      private_hospital:
        meaning: publicschema:CareProviderType/private_hospital
        title: Private hospital
        description: A privately operated hospital providing inpatient and outpatient services, including
          faith-based or NGO-operated hospitals.
        annotations:
          label_es: Hospital privado
          label_fr: Hôpital privé
          description_es: Un hospital privado que proporciona servicios hospitalarios y ambulatorios,
            incluidos hospitales confesionales o gestionados por ONG.
          description_fr: Un hôpital privé fournissant des services hospitaliers et ambulatoires, y compris
            les hôpitaux confessionnels ou gérés par des ONG.
      private_clinic:
        meaning: publicschema:CareProviderType/private_clinic
        title: Private clinic or private doctor
        description: A privately operated outpatient clinic or solo practitioner, including NGO medical
          clinics.
        annotations:
          label_es: Clínica privada o médico privado
          label_fr: Clinique privée ou médecin privé
          description_es: Una clínica ambulatoria privada o un médico particular, incluidas las clínicas
            médicas de ONG.
          description_fr: Une clinique ambulatoire privée ou un praticien indépendant, y compris les cliniques
            médicales d'ONG.
      pharmacy:
        meaning: publicschema:CareProviderType/pharmacy
        title: Pharmacy or drug store
        description: A licensed pharmacy or drug retailer where medicines are purchased without a clinical
          consultation.
        annotations:
          label_es: Farmacia o droguería
          label_fr: Pharmacie ou droguerie
          description_es: Una farmacia autorizada o minorista de medicamentos donde se adquieren medicamentos
            sin consulta clínica.
          description_fr: Une pharmacie agréée ou un revendeur de médicaments où des médicaments sont
            achetés sans consultation clinique.
        exact_mappings:
        - dhs8:Dhs8DHSH12H23H32ProviderCodesCountryAdapted/pharmacy
      community_health_worker:
        meaning: publicschema:CareProviderType/community_health_worker
        title: Community health worker
        description: A lay health worker deployed in the community to provide basic health education,
          referrals, and selected treatments (e.g., oral rehydration, malaria RDT).
        annotations:
          label_es: Agente de salud comunitaria
          label_fr: Agent de santé communautaire
          description_es: Un trabajador de salud comunitario desplegado en la comunidad para proporcionar
            educación sanitaria básica, referencias y tratamientos seleccionados (p. ej., rehidratación
            oral, TDR de malaria).
          description_fr: Un agent de santé bénévole déployé dans la communauté pour fournir une éducation
            sanitaire de base, des orientations et des traitements sélectionnés (par exemple, réhydratation
            orale, TDR paludisme).
      traditional_healer:
        meaning: publicschema:CareProviderType/traditional_healer
        title: Traditional healer or traditional practitioner
        description: A practitioner of traditional or indigenous medicine, including herbalists, faith
          healers, and traditional birth attendants not formally trained in biomedical care.
        annotations:
          label_es: Curandero tradicional o practicante tradicional
          label_fr: Guérisseur traditionnel ou praticien traditionnel
          description_es: Un practicante de medicina tradicional o indígena, incluidos herbolarios, curanderos
            religiosos y parteras tradicionales sin formación formal en atención biomédica.
          description_fr: Un praticien de la médecine traditionnelle ou autochtone, notamment les herboristes,
            les guérisseurs religieux et les accoucheuses traditionnelles non formellement formées aux
            soins biomédicaux.
      home:
        meaning: publicschema:CareProviderType/home
        title: Home treatment only
        description: The caregiver treated the child at home without seeking care from any external provider.
        annotations:
          label_es: Tratamiento domiciliario únicamente
          label_fr: Traitement à domicile uniquement
          description_es: El cuidador trató al niño en casa sin buscar atención de ningún proveedor externo.
          description_fr: Le soignant a traité l'enfant à domicile sans recourir à un prestataire externe.
      other:
        meaning: publicschema:CareProviderType/other
        title: Other provider
        description: Any provider type not captured by the codes above, including itinerant drug sellers,
          shops, or providers specific to a country context.
        annotations:
          label_es: Otro proveedor
          label_fr: Autre prestataire
          description_es: Cualquier tipo de proveedor no cubierto por los códigos anteriores, incluidos
            vendedores ambulantes de medicamentos, tiendas o proveedores específicos de un contexto nacional.
          description_fr: Tout type de prestataire non couvert par les codes ci-dessus, notamment les
            vendeurs itinérants de médicaments, les boutiques ou les prestataires propres à un contexte
            national.
        exact_mappings:
        - dhs8:Dhs8DHSH12H23H32ProviderCodesCountryAdapted/other
      no_care_sought:
        meaning: publicschema:CareProviderType/no_care_sought
        title: No care sought
        description: The caregiver did not seek care from any provider for this illness episode.
        annotations:
          label_es: No se buscó atención
          label_fr: Aucun soin recherché
          description_es: El cuidador no buscó atención de ningún proveedor para este episodio de enfermedad.
          description_fr: Le soignant n'a recherché de soins auprès d'aucun prestataire pour cet épisode
            de maladie.
    annotations:
      label_es: Tipo de proveedor de atención
      label_fr: Type de prestataire de soins
      description_es: 'El tipo de proveedor de atención o establecimiento al que un cuidador acudió en
        busca de consejo o tratamiento para un episodio de enfermedad del niño. Usado en las preguntas
        de búsqueda de atención para diarrea, IRA y fiebre en ChildHealthProfile, y compartido por MaternalNewbornHealthProfile
        y ReproductiveHealthProfile. Selección múltiple: un solo episodio de enfermedad puede involucrar
        más de un tipo de proveedor.'
      description_fr: 'Le type de prestataire de soins ou d''établissement auprès duquel un soignant a
        cherché des conseils ou un traitement pour un épisode de maladie de l''enfant. Utilisé pour les
        questions de recours aux soins pour la diarrhée, l''IRA et la fièvre dans le ChildHealthProfile,
        et partagé par le MaternalNewbornHealthProfile et le ReproductiveHealthProfile. Sélection multiple
        : un seul épisode de maladie peut impliquer plusieurs types de prestataires.'
