        Les valeurs doivent être cohérentes avec la propriété biometric_modality: les codes de doigt avec
        empreinte digitale, les codes oculaires avec iris, portrait avec visage.'
      vocab_references_json: '[{"machine_readable": false, "name": "ISO 19794-2 Finger Position Codes",
        "notes": "Finger positions 1-10 mapped to named codes.", "relationship": "subset", "uri": "https://www.iso.org/standard/50864.html"},
