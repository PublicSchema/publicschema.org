      standard_json: '{"name": "UNSD Principles and Recommendations for Population and Housing Censuses,
        Rev.3", "notes": "Para 2.202: binary classification of literacy.", "uri": "https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf"}'
      bibliography_refs: '["dhs-recode7", "mics6", "un-census-rev3"]'
