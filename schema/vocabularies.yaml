  CollectionMedium:
    enum_uri: publicschema:CollectionMedium
    title: Collection Medium
    description: The physical or digital medium through which a consent indication was communicated and
      recorded. Orthogonal to consent-expression (which captures how the agreement was indicated) and
      to personal_data_categories (which describes what data is being processed). A biometric opt-in can
      be captured on an electronic medium; a signed opt-in can be captured on paper; the two axes do not
      collapse.
    status: bibo:draft
    permissible_values:
      paper:
        meaning: publicschema:CollectionMedium/paper
        title: Paper
        description: Consent was indicated on a physical paper form, such as a printed notice with a signature
          field, a thumbprint box, or an X-mark field. Evidence is typically a scanned document or photograph
          referenced via evidence_ref. Common in community intake sessions and any context without reliable
          digital infrastructure.
        annotations:
          label_es: Papel
          label_fr: Papier
          description_es: El consentimiento fue indicado en un formulario de papel físico, como un aviso
            impreso con un campo de firma, una casilla de huella dactilar o un campo de marca X. La evidencia
            es típicamente un documento escaneado o una fotografía referenciada a través de evidence_ref.
            Común en sesiones de ingesta comunitaria y en cualquier contexto sin infraestructura digital
            confiable.
          description_fr: Le consentement a été indiqué sur un formulaire papier physique, tel qu'une
            notice imprimée avec un champ de signature, une case d'empreinte digitale ou un champ de marquage.
            La preuve est généralement un document numérisé ou une photographie référencé via evidence_ref.
            Courant lors des sessions de collecte communautaire et dans tout contexte sans infrastructure
            numérique fiable.
      electronic:
        meaning: publicschema:CollectionMedium/electronic
        title: Electronic
        description: Consent was indicated through a digital interface, such as a web form, a tablet application,
          a mobile application, or an SMS/USSD interaction. The digital system creates the record directly.
          Includes both fully digital workflows and paper-to-digital workflows where a field worker enters
          data immediately on a device.
        annotations:
          label_es: Electrónico
          label_fr: Électronique
          description_es: El consentimiento fue indicado a través de una interfaz digital, como un formulario
            web, una aplicación de tableta, una aplicación móvil o una interacción por SMS/USSD. El sistema
            digital crea el registro directamente. Incluye tanto flujos de trabajo totalmente digitales
            como flujos de trabajo papel-digital donde un agente de campo introduce los datos inmediatamente
            en un dispositivo.
          description_fr: Le consentement a été indiqué via une interface numérique, telle qu'un formulaire
            web, une application sur tablette, une application mobile ou une interaction par SMS/USSD.
            Le système numérique crée directement l'enregistrement. Comprend à la fois les flux entièrement
            numériques et les flux papier-numérique où un agent de terrain saisit immédiatement les données
            sur un appareil.
      verbal:
        meaning: publicschema:CollectionMedium/verbal
        title: Verbal
        description: Consent was communicated orally by the data subject without a written or biometric
          record being created at that moment. Verbal consent requires witnesses (populate witnessed_by)
          for audit purposes. The program's standard operating procedures should specify who may act as
          a witness and how the verbal consent is subsequently documented. Common when data subjects are
          illiterate or when community norms make written forms inappropriate.
        annotations:
          label_es: Verbal
          label_fr: Verbal
          description_es: El consentimiento fue comunicado verbalmente por el interesado sin que se creara
            un registro escrito o biométrico en ese momento. El consentimiento verbal requiere testigos
            (rellenar witnessed_by) para fines de auditoría. Los procedimientos operativos estándar del
            programa deben especificar quién puede actuar como testigo y cómo se documenta posteriormente
            el consentimiento verbal. Común cuando los interesados son analfabetos o cuando las normas
            comunitarias hacen inapropiados los formularios escritos.
          description_fr: Le consentement a été communiqué oralement par la personne concernée sans qu'un
            enregistrement écrit ou biométrique soit créé à ce moment. Le consentement verbal nécessite
            des témoins (renseigner witnessed_by) à des fins d'audit. Les procédures opérationnelles standard
            du programme doivent préciser qui peut agir comme témoin et comment le consentement verbal
            est ensuite documenté. Courant lorsque les personnes concernées sont analphabètes ou lorsque
            les normes communautaires rendent les formulaires écrits inappropriés.
      mixed:
        meaning: publicschema:CollectionMedium/mixed
        title: Mixed
        description: Consent was collected using a combination of media, for example a verbal explanation
          with a paper signature, or a paper form later digitised and supplemented with an electronic
          acknowledgement. Use this value when a single medium code would not accurately describe the
          intake process. Document the combination in evidence_ref or in a linked intake note.
        annotations:
          label_es: Mixto
          label_fr: Mixte
          description_es: El consentimiento fue recopilado usando una combinación de medios, por ejemplo
            una explicación verbal con una firma en papel, o un formulario en papel posteriormente digitalizado
            y complementado con un acuse de recibo electrónico. Use este valor cuando un solo código de
            medio no describiría con precisión el proceso de ingesta. Documente la combinación en evidence_ref
            o en una nota de ingesta vinculada.
          description_fr: Le consentement a été recueilli en utilisant une combinaison de supports, par
            exemple une explication verbale avec une signature papier, ou un formulaire papier ultérieurement
            numérisé et complété par un accusé de réception électronique. Utilisez cette valeur lorsqu'un
            seul code de support ne décrirait pas avec précision le processus de collecte. Documentez
            la combinaison dans evidence_ref ou dans une note de collecte liée.
    annotations:
      label_es: Medio de recolección
      label_fr: Support de collecte
      description_es: El medio físico o digital a través del cual se comunicó y registró una indicación
        de consentimiento. Ortogonal a consent-expression (que captura cómo se indicó el acuerdo) y a
        personal_data_categories (que describe los datos que se están procesando). Un consentimiento biométrico
        puede recogerse en medio electrónico; un consentimiento firmado puede recogerse en papel; los
        dos ejes no se fusionan.
      description_fr: Le support physique ou numérique par lequel une indication de consentement a été
        communiquée et enregistrée. Orthogonal à consent-expression (qui capture la façon dont l'accord
        a été indiqué) et à personal_data_categories (qui décrit les données traitées). Un consentement
        biométrique peut être recueilli sur support électronique; un consentement signé peut être recueilli
        sur papier; les deux axes ne se confondent pas.
      vocab_references_json: '[{"machine_readable": false, "name": "ISO/IEC TS 27560:2023 - Privacy technologies:
        Consent record information structure", "notes": "ISO/IEC TS 27560 Section 6.3 identifies collection
        medium as a required field for paper-first workflows. This vocabulary aligns with its four-value
        enumeration.", "relationship": "structural_pattern", "uri": "https://www.iso.org/standard/80392.html"}]'
  ComparativeBehaviourScale:
    enum_uri: publicschema:ComparativeBehaviourScale
    title: Comparative Behaviour Scale
    description: A three-point scale comparing a child's behaviour to other children of the same age,
      used in the WG/UNICEF Child Functioning Module (CFM) for the behaviour domain.
    status: bibo:draft
    permissible_values:
      not_at_all:
        meaning: publicschema:ComparativeBehaviourScale/not_at_all
        title: Not at all
        description: The child does not exhibit the behaviour at all.
        annotations:
          label_es: En absoluto
          label_fr: Pas du tout
          description_es: El niño no presenta el comportamiento en absoluto.
          description_fr: L'enfant ne présente pas du tout ce comportement.
      same_or_less:
        meaning: publicschema:ComparativeBehaviourScale/same_or_less
        title: The same or less than other children
        description: The child's behaviour is the same as or less than that of other children of the same
          age.
        annotations:
          label_es: Igual o menos que otros niños
          label_fr: Pareil ou moins que les autres enfants
          description_es: El comportamiento del niño es igual o menos pronunciado que el de otros niños
            de la misma edad.
          description_fr: Le comportement de l'enfant est identique ou moins prononcé que celui des autres
            enfants du même âge.
      more:
        meaning: publicschema:ComparativeBehaviourScale/more
        title: More than other children
        description: The child's behaviour is more than that of other children of the same age.
        annotations:
          label_es: Más que otros niños
          label_fr: Plus que les autres enfants
          description_es: El comportamiento del niño es más pronunciado que el de otros niños de la misma
            edad.
          description_fr: Le comportement de l'enfant est plus prononcé que celui des autres enfants du
            même âge.
      a_lot_more:
        meaning: publicschema:ComparativeBehaviourScale/a_lot_more
        title: A lot more than other children
        description: The child's behaviour is a lot more than that of other children of the same age.
        annotations:
          label_es: Mucho más que otros niños
          label_fr: Beaucoup plus que les autres enfants
          description_es: El comportamiento del niño es mucho más pronunciado que el de otros niños de
            la misma edad.
          description_fr: Le comportement de l'enfant est beaucoup plus prononcé que celui des autres
            enfants du même âge.
    annotations:
      label_es: Escala comparativa de comportamiento
      label_fr: Échelle comparative du comportement
      description_es: Una escala de tres niveles que compara el comportamiento de un niño con el de otros
        niños de la misma edad, utilizada en el Módulo de Funcionamiento Infantil (CFM) del WG/UNICEF
        para el dominio conductual.
      description_fr: Une échelle à trois niveaux comparant le comportement d'un enfant à celui d'autres
        enfants du même âge, utilisée dans le Module sur le fonctionnement de l'enfant (CFM) du WG/UNICEF
        pour le domaine comportemental.
      standard_json: '{"name": "WG/UNICEF Child Functioning Module (CFM)", "notes": "Joint product of
        the Washington Group on Disability Statistics and UNICEF. Used for the controlling behaviour domain
        in the CFM 2-4 age module only (CF16, kick/bite/hit wording). The CFM 5-17 controlling behaviour
        item (CF21) uses the standard functional-difficulty-severity scale with general behaviour-control
        wording, not this scale.", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-unicef-child-functioning-module-cfm/"}'
      bibliography_refs: '["mics6", "washington-group-cfm"]'
  ConsentExpression:
    enum_uri: publicschema:ConsentExpression
    title: Consent Expression
    description: How the data subject indicated their agreement or non-objection. Orthogonal to collection-medium
      (paper, electronic, verbal, mixed), which describes the physical or digital channel used. Orthogonal
      to personal_data_categories, which describes what data is being processed. A biometric expression
      (opt-in-biometric) means the subject used a biometric gesture as their signature; it does not imply
      that biometric data is being processed as subject matter. Whether biometric data is being processed
      is expressed via personal_data_categories.
    status: bibo:draft
    permissible_values:
      opt_in_explicit:
        meaning: publicschema:ConsentExpression/opt_in_explicit
        title: Explicit opt-in
        description: The data subject made a clear affirmative act, such as ticking a box, pressing a
          confirm button, or verbally stating agreement, with full awareness of what they were agreeing
          to. No ambiguity is permitted. The standard for opt-in where no signature or biometric is required.
        annotations:
          label_es: Consentimiento activo explícito
          label_fr: Consentement explicite actif
          description_es: El interesado realizó un acto afirmativo claro, como marcar una casilla, presionar
            un botón de confirmación o declarar verbalmente su acuerdo, con plena conciencia de lo que
            estaba aceptando. No se permite ninguna ambigüedad. El estándar para el consentimiento activo
            cuando no se requiere firma ni biometría.
          description_fr: La personne concernée a accompli un acte affirmatif clair, comme cocher une
            case, appuyer sur un bouton de confirmation ou déclarer verbalement son accord, en étant pleinement
            consciente de ce à quoi elle consentait. Aucune ambiguïté n'est permise. La norme pour le
            consentement actif sans signature ni biométrie.
      opt_in_signed:
        meaning: publicschema:ConsentExpression/opt_in_signed
        title: Signed opt-in
        description: The data subject signed a consent form, either physically on paper or with a digital
          signature. The signature is the primary evidence of agreement. Signed consent is typically used
          when legal requirements demand a written record, such as for the processing of special-category
          data or for minor guardianship consent.
        annotations:
          label_es: Consentimiento firmado
          label_fr: Consentement signé
          description_es: El interesado firmó un formulario de consentimiento, ya sea físicamente en papel
            o con una firma digital. La firma es la evidencia principal del acuerdo. El consentimiento
            firmado se usa típicamente cuando los requisitos legales exigen un registro escrito, como
            para el tratamiento de datos de categoría especial o para el consentimiento de tutela de menores.
          description_fr: La personne concernée a signé un formulaire de consentement, soit physiquement
            sur papier, soit avec une signature numérique. La signature est la preuve principale de l'accord.
            Le consentement signé est généralement utilisé lorsque des exigences légales imposent un enregistrement
            écrit, par exemple pour le traitement de données de catégorie spéciale ou pour le consentement
            de tutelle d'un mineur.
      opt_in_witnessed:
        meaning: publicschema:ConsentExpression/opt_in_witnessed
        title: Witnessed opt-in
        description: The data subject indicated agreement verbally or by gesture and one or more witnesses
          were present and recorded. Used when the data subject cannot or does not write. Programs using
          this expression must populate witnessed_by. Witnessing requirements (minimum number of witnesses,
          witness eligibility) are set by the program's operating procedures and applicable law, not by
          this schema.
        annotations:
          label_es: Consentimiento presenciado
          label_fr: Consentement avec témoin
          description_es: El interesado indicó acuerdo verbalmente o por gesto y uno o más testigos estuvieron
            presentes y fueron registrados. Se usa cuando el interesado no puede o no escribe. Los programas
            que usan esta expresión deben rellenar witnessed_by. Los requisitos de testimonio (número
            mínimo de testigos, elegibilidad de testigos) son establecidos por los procedimientos operativos
            del programa y la ley aplicable, no por este esquema.
          description_fr: La personne concernée a indiqué son accord verbalement ou par geste et un ou
            plusieurs témoins étaient présents et ont été enregistrés. Utilisé lorsque la personne concernée
            ne peut pas ou ne souhaite pas écrire. Les programmes utilisant cette expression doivent renseigner
            witnessed_by. Les exigences de témoignage (nombre minimal de témoins, éligibilité des témoins)
            sont déterminées par les procédures opérationnelles du programme et par le droit applicable,
            et non par ce schéma.
      opt_in_biometric:
        meaning: publicschema:ConsentExpression/opt_in_biometric
        title: Biometric opt-in
        description: Consent indicated by a biometric capture serving as the signature, for example a
          thumbprint on a paper form or on a tablet screen. This is the method of capturing consent (analogous
          to signing with a pen), not a decision to process biometric data as subject matter. Whether
          biometric data is being collected and stored for program purposes is a separate question expressed
          via personal_data_categories. A thumbprint used only as a consent signature does not, by itself,
          mean that biometric data is being processed under this consent record.
        annotations:
          label_es: Consentimiento biométrico
          label_fr: Consentement biométrique
          description_es: Consentimiento indicado mediante una captura biométrica que sirve como firma,
            por ejemplo una huella dactilar en un formulario de papel o en la pantalla de una tableta.
            Este es el método de captura del consentimiento (análogamente a firmar con un bolígrafo),
            no una decisión de procesar datos biométricos como materia. Si se recopilan y almacenan datos
            biométricos para los fines del programa es una pregunta separada expresada a través de personal_data_categories.
            Una huella dactilar utilizada solo como firma de consentimiento no significa, por sí misma,
            que se estén procesando datos biométricos bajo este registro de consentimiento.
          description_fr: Consentement indiqué par une capture biométrique servant de signature, par exemple
            une empreinte digitale sur un formulaire papier ou sur écran de tablette. Il s'agit de la
            méthode de capture du consentement (analogue à une signature au stylo), non d'une décision
            de traiter des données biométriques comme objet du traitement. La question de savoir si des
            données biométriques sont collectées et stockées à des fins de programme est une question
            distincte exprimée via personal_data_categories. Une empreinte digitale utilisée uniquement
            comme signature de consentement ne signifie pas, en soi, que des données biométriques sont
            traitées dans le cadre de cet enregistrement de consentement.
      opt_out:
        meaning: publicschema:ConsentExpression/opt_out
        title: Opt-out
        description: The data subject was notified of the processing and did not object within the given
          period or through the given mechanism. Opt-out processing is legitimate only where a legal basis
          other than consent exists (legal obligation, public interest). Programs using opt-out must ensure
          the notice clearly explains the processing and provides a genuine, easy mechanism for objection.
        annotations:
          label_es: Exclusión voluntaria
          label_fr: Désinscription
          description_es: El interesado fue notificado del tratamiento y no objetó en el período dado
            o a través del mecanismo indicado. El tratamiento por exclusión voluntaria solo es legítimo
            cuando existe una base jurídica distinta al consentimiento (obligación legal, interés público).
            Los programas que usan la exclusión voluntaria deben asegurarse de que el aviso explique claramente
            el tratamiento y proporcione un mecanismo de objeción genuino y fácil.
          description_fr: La personne concernée a été informée du traitement et n'a pas exprimé d'objection
            dans le délai imparti ou via le mécanisme indiqué. Le traitement par désinscription n'est
            légitime que lorsqu'une base juridique autre que le consentement existe (obligation légale,
            intérêt public). Les programmes utilisant la désinscription doivent s'assurer que la notice
            explique clairement le traitement et fournit un mécanisme d'objection véritable et accessible.
      implied:
        meaning: publicschema:ConsentExpression/implied
        title: Implied
        description: Agreement is inferred from the data subject's behaviour or circumstances, without
          an explicit act of consent or formal notification of opt-out. Implied consent is legally thin
          and should be used only where specifically permitted by applicable law. Programs relying on
          implied consent should document the legal basis and the inference logic in legal_basis_reference.
        annotations:
          label_es: Implícito
          label_fr: Implicite
          description_es: El acuerdo se infiere del comportamiento o las circunstancias del interesado,
            sin un acto explícito de consentimiento ni notificación formal de exclusión. El consentimiento
            implícito es jurídicamente débil y debe usarse solo cuando la ley aplicable lo permita específicamente.
            Los programas que se basan en el consentimiento implícito deben documentar la base jurídica
            y la lógica de inferencia en legal_basis_reference.
          description_fr: L'accord est inféré du comportement ou des circonstances de la personne concernée,
            sans acte explicite de consentement ni notification formelle de désinscription. Le consentement
            implicite est juridiquement fragile et ne doit être utilisé que dans les cas spécifiquement
            autorisés par la loi applicable. Les programmes s'appuyant sur le consentement implicite doivent
            documenter la base juridique et la logique d'inférence dans legal_basis_reference.
    annotations:
      label_es: Expresión del consentimiento
      label_fr: Expression du consentement
      description_es: Cómo el interesado indicó su acuerdo o no objeción. Ortogonal a collection-medium
        (papel, electrónico, verbal, mixto), que describe el canal físico o digital utilizado. Ortogonal
        a personal_data_categories, que describe los datos que se están procesando. Una expresión biométrica
        (opt-in-biometric) significa que el sujeto utilizó un gesto biométrico como firma; no implica
        que se estén procesando datos biométricos como materia. Si se procesan datos biométricos se expresa
        a través de personal_data_categories.
      description_fr: Comment la personne concernée a indiqué son accord ou sa non-objection. Orthogonal
        à collection-medium (papier, électronique, verbal, mixte), qui décrit le canal physique ou numérique
        utilisé. Orthogonal à personal_data_categories, qui décrit les données traitées. Une expression
        biométrique (opt-in-biometric) signifie que la personne a utilisé un geste biométrique comme signature;
        cela n'implique pas que des données biométriques sont traitées en tant qu'objet. Le fait que des
        données biométriques soient traitées est exprimé via personal_data_categories.
      vocab_references_json: '[{"machine_readable": false, "name": "ISO/IEC 29184:2020 - Online privacy
        notices and consent, Annex A", "notes": "Annex A of ISO/IEC 29184 defines consent expression types
        including opt-in, opt-out, and implied. This vocabulary extends that framework to cover witnessed
        and biometric expressions common in field intake.", "relationship": "structural_pattern", "uri":
        "https://www.iso.org/standard/70331.html"}]'
  ConsentRecordType:
    enum_uri: publicschema:ConsentRecordType
    title: Consent Record Type
    description: Distinguishes the two roles a consent record can serve according to ISO/IEC TS 27560:2023,
      a controller's internal working record and a receipt issued to the data subject.
    status: bibo:draft
    permissible_values:
      internal_record:
        meaning: publicschema:ConsentRecordType/internal_record
        title: Internal record
        description: The controller's authoritative record of the lawful basis for processing. It is maintained
          internally and is not required to be shared with the data subject. Supports compliance audits
          and lifecycle management.
        annotations:
          label_es: Registro interno
          label_fr: Enregistrement interne
          description_es: El registro autoritativo del responsable del tratamiento sobre la base jurídica
            del tratamiento. Se conserva internamente y no es necesario compartirlo con el interesado.
            Respalda las auditorías de cumplimiento y la gestión del ciclo de vida.
          description_fr: L'enregistrement faisant autorité du responsable du traitement concernant la
            base juridique du traitement. Il est conservé en interne et n'a pas à être communiqué à la
            personne concernée. Il soutient les audits de conformité et la gestion du cycle de vie.
      receipt:
        meaning: publicschema:ConsentRecordType/receipt
        title: Receipt
        description: An artefact derived from the internal record and delivered to the data subject as
          proof of what was agreed. The receipt is a snapshot of the terms at the time of agreement and
          is the basis for the Consent Receipt Verifiable Credential pattern. It must remain readable
          to the data subject even after the underlying record is updated.
        annotations:
          label_es: Recibo
          label_fr: Reçu
          description_es: Un artefacto derivado del registro interno y entregado al interesado como prueba
            de lo acordado. El recibo es una instantánea de las condiciones en el momento del acuerdo
            y es la base del patrón de credencial verificable de recibo de consentimiento. Debe permanecer
            legible para el interesado incluso después de que se actualice el registro subyacente.
          description_fr: Un artefact dérivé de l'enregistrement interne et remis à la personne concernée
            comme preuve de ce qui a été convenu. Le reçu est un instantané des conditions au moment de
            l'accord et constitue la base du modèle de justificatif vérifiable de reçu de consentement.
            Il doit rester lisible par la personne concernée même après la mise à jour de l'enregistrement
            sous-jacent.
    annotations:
      label_es: Tipo de registro de consentimiento
      label_fr: Type d'enregistrement de consentement
      description_es: Distingue los dos roles que puede desempeñar un registro de consentimiento según
        la norma ISO/IEC TS 27560:2023, el registro de trabajo interno del responsable del tratamiento
        y el recibo emitido al interesado.
      description_fr: Distingue les deux rôles qu'un enregistrement de consentement peut jouer selon la
        norme ISO/IEC TS 27560:2023, à savoir l'enregistrement de travail interne du responsable du traitement
        et le reçu remis à la personne concernée.
      vocab_references_json: '[{"machine_readable": false, "name": "ISO/IEC TS 27560:2023 - Privacy technologies:
        Consent record information structure", "notes": "Section 6 of ISO/IEC TS 27560 defines the distinction
        between controller-held records and receipts delivered to data subjects.", "relationship": "superset",
        "uri": "https://www.iso.org/standard/80392.html"}]'
      bibliography_refs: '["kantara-ancr", "kantara-consent-receipt"]'
  ConsentStatus:
    enum_uri: publicschema:ConsentStatus
    title: Consent Status
    description: The current lifecycle state of a consent record. Values are ordered roughly along the
      record lifecycle from initial request through active use to termination. Programs that perform bulk
      intake should initialise records at given rather than requested.
    status: bibo:status/forthcoming
    permissible_values:
      requested:
        meaning: publicschema:ConsentStatus/requested
        title: Requested
        description: The record has been created and the consent request has been communicated to the
          data subject, but no indication of agreement or refusal has been received yet. Used primarily
          in digital workflows where a notice is sent and a response is awaited. Bulk and in-person intake
          programs typically skip this state and go directly to given or refused.
        annotations:
          label_es: Solicitado
          label_fr: Demandé
          description_es: El registro ha sido creado y la solicitud de consentimiento ha sido comunicada
            al interesado, pero aún no se ha recibido ninguna indicación de acuerdo o rechazo. Se utiliza
            principalmente en flujos de trabajo digitales donde se envía un aviso y se espera una respuesta.
            Los programas de ingesta masiva y presencial generalmente omiten este estado y van directamente
            a given o refused.
          description_fr: L'enregistrement a été créé et la demande de consentement a été communiquée
            à la personne concernée, mais aucune indication d'accord ou de refus n'a encore été reçue.
            Utilisé principalement dans les flux numériques où une notice est envoyée et une réponse est
            attendue. Les programmes de collecte en masse ou en personne ignorent généralement cet état
            et vont directement à given ou refused.
      given:
        meaning: publicschema:ConsentStatus/given
        title: Given
        description: The data subject has indicated agreement to the stated terms for the first time.
          This is the active state for a record that has never been withdrawn, revoked, or expired. Terms-fields
          (purposes, recipients, legal basis, etc.) are immutable from this point forward. Distinct from
          renewed, which applies when a previously withdrawn or expired consent is re-activated.
        annotations:
          label_es: Otorgado
          label_fr: Donné
          description_es: El interesado ha indicado acuerdo con los términos establecidos por primera
            vez. Este es el estado activo para un registro que nunca ha sido retirado, revocado o expirado.
            Los campos de términos (propósitos, destinatarios, base jurídica, etc.) son inmutables desde
            este punto. Distinto de renewed, que se aplica cuando se reactiva un consentimiento previamente
            retirado o expirado.
          description_fr: La personne concernée a indiqué son accord avec les conditions stipulées pour
            la première fois. C'est l'état actif d'un enregistrement qui n'a jamais été retiré, révoqué
            ou expiré. Les champs de conditions (finalités, destinataires, base juridique, etc.) sont
            immuables à partir de ce moment. Distinct de renewed, qui s'applique lorsqu'un consentement
            précédemment retiré ou expiré est renouvelé.
      renewed:
        meaning: publicschema:ConsentStatus/renewed
        title: Renewed
        description: The data subject has re-indicated agreement after a prior consent was withdrawn,
          revoked, or expired. Renewal typically occurs because the underlying notice was updated in a
          substantive way (new purposes or new recipients) and a fresh agreement was sought. Distinct
          from given, which marks the first-time agreement. A new consent record is created for the renewal;
          the prior record retains its terminal status.
        annotations:
          label_es: Renovado
          label_fr: Renouvelé
          description_es: El interesado ha vuelto a indicar acuerdo después de que un consentimiento anterior
            fue retirado, revocado o expirado. La renovación ocurre típicamente porque el aviso subyacente
            fue actualizado de manera sustancial (nuevos propósitos o nuevos destinatarios) y se buscó
            un nuevo acuerdo. Distinto de given, que marca el acuerdo por primera vez. Se crea un nuevo
            registro de consentimiento para la renovación; el registro anterior conserva su estado terminal.
          description_fr: La personne concernée a réindiqué son accord après qu'un consentement précédent
            a été retiré, révoqué ou expiré. Le renouvellement survient généralement parce que la notice
            sous-jacente a été mise à jour de manière substantielle (nouvelles finalités ou nouveaux destinataires)
            et qu'un nouvel accord a été recherché. Distinct de given, qui marque l'accord pour la première
            fois. Un nouvel enregistrement de consentement est créé pour le renouvellement; l'enregistrement
            précédent conserve son statut terminal.
      refused:
        meaning: publicschema:ConsentStatus/refused
        title: Refused
        description: The data subject was asked and explicitly declined to give consent or to accept the
          stated terms. The record documents the fact of refusal for audit and lifecycle purposes. A refused
          record is closed; processing on the refused basis must not proceed. If the data subject later
          changes their mind, a new record is created with status given.
        annotations:
          label_es: Rechazado
          label_fr: Refusé
          description_es: El interesado fue consultado y declinó explícitamente dar consentimiento o aceptar
            los términos establecidos. El registro documenta el hecho del rechazo para fines de auditoría
            y ciclo de vida. Un registro rechazado está cerrado; el tratamiento sobre la base rechazada
            no debe continuar. Si el interesado cambia de opinión posteriormente, se crea un nuevo registro
            con estado given.
          description_fr: La personne concernée a été interrogée et a explicitement refusé de donner son
            consentement ou d'accepter les conditions stipulées. L'enregistrement documente le fait du
            refus à des fins d'audit et de cycle de vie. Un enregistrement refusé est clos; le traitement
            sur la base refusée ne doit pas se poursuivre. Si la personne concernée change d'avis ultérieurement,
            un nouvel enregistrement est créé avec le statut given.
      withdrawn:
        meaning: publicschema:ConsentStatus/withdrawn
        title: Withdrawn
        description: The data subject has exercised their right to withdraw consent previously given.
          Withdrawal is subject-initiated and must be as easy as giving consent. The record transitions
          to this state and withdrawal_channel is populated. Withdrawal is not retroactive (processing
          performed under the prior given or renewed record was lawful at the time), but must stop from
          the moment of withdrawal. Distinct from revoked, which is controller-initiated.
        annotations:
          label_es: Retirado
          label_fr: Retiré
          description_es: El interesado ha ejercido su derecho a retirar el consentimiento previamente
            otorgado. La retirada es iniciada por el interesado y debe ser tan fácil como otorgar el consentimiento.
            El registro pasa a este estado y se rellena withdrawal_channel. La retirada no es retroactiva
            (el tratamiento realizado bajo el registro given o renewed anterior era lícito en su momento),
            pero debe detenerse desde el momento de la retirada. Distinto de revoked, que es iniciado
            por el responsable del tratamiento.
          description_fr: La personne concernée a exercé son droit de retirer le consentement précédemment
            donné. Le retrait est initié par la personne concernée et doit être aussi facile que de donner
            le consentement. L'enregistrement passe à cet état et withdrawal_channel est renseigné. Le
            retrait n'est pas rétroactif (le traitement effectué sous l'enregistrement given ou renewed
            précédent était licite à l'époque), mais doit cesser à partir du moment du retrait. Distinct
            de revoked, qui est initié par le responsable du traitement.
      revoked:
        meaning: publicschema:ConsentStatus/revoked
        title: Revoked
        description: The controller has administratively invalidated the consent record, for example because
          the data subject is deceased, a court order has been issued, or program eligibility has changed
          in a way that makes continuation unlawful. Revocation is controller-initiated, in contrast to
          withdrawn which is subject-initiated. Records are moved to this status only when there is a
          controller-side cause; it should not be used as a synonym for withdrawn.
        annotations:
          label_es: Revocado
          label_fr: Révoqué
          description_es: El responsable del tratamiento ha invalidado administrativamente el registro
            de consentimiento, por ejemplo porque el interesado ha fallecido, se ha emitido una orden
            judicial, o la elegibilidad al programa ha cambiado de forma que la continuación resulte ilícita.
            La revocación es iniciada por el responsable del tratamiento, a diferencia de withdrawn que
            es iniciada por el interesado. Los registros pasan a este estado solo cuando existe una causa
            del lado del responsable; no debe usarse como sinónimo de withdrawn.
          description_fr: Le responsable du traitement a invalidé administrativement l'enregistrement
            de consentement, par exemple parce que la personne concernée est décédée, qu'une ordonnance
            judiciaire a été rendue, ou que l'éligibilité au programme a changé de manière à rendre la
            continuation illicite. La révocation est initiée par le responsable du traitement, contrairement
            à withdrawn qui est initiée par la personne concernée. Les enregistrements ne passent à ce
            statut que lorsqu'il existe une cause côté responsable du traitement; il ne doit pas être
            utilisé comme synonyme de withdrawn.
      expired:
        meaning: publicschema:ConsentStatus/expired
        title: Expired
        description: The record has reached its expiry_date and is no longer valid for authorising processing.
          Expiry is time-based and automatic; no action by subject or controller is required. Programs
          must not process data under an expired consent record. If continued processing is needed and
          the legal basis remains valid, a renewal record must be created. Common for parental consents
          set to expire at the child's age of majority.
        annotations:
          label_es: Expirado
          label_fr: Expiré
          description_es: El registro ha alcanzado su fecha de expiración y ya no es válido para autorizar
            el tratamiento. La expiración es automática y basada en el tiempo; no se requiere ninguna
            acción del interesado ni del responsable del tratamiento. Los programas no deben tratar datos
            bajo un registro de consentimiento expirado. Si se necesita tratamiento continuo y la base
            jurídica sigue siendo válida, se debe crear un registro de renovación. Común para consentimientos
            parentales establecidos para expirar en la mayoría de edad del menor.
          description_fr: L'enregistrement a atteint sa date d'expiration et n'est plus valide pour autoriser
            un traitement. L'expiration est automatique et basée sur le temps; aucune action de la personne
            concernée ou du responsable du traitement n'est requise. Les programmes ne doivent pas traiter
            des données sous un enregistrement de consentement expiré. Si un traitement continu est nécessaire
            et que la base juridique reste valide, un enregistrement de renouvellement doit être créé.
            Courant pour les consentements parentaux définis pour expirer à la majorité de l'enfant.
      invalidated:
        meaning: publicschema:ConsentStatus/invalidated
        title: Invalidated
        description: The record has been determined to be legally or technically invalid after the fact,
          for example because the notice shown was defective, the delegation claimed was not legally authorised,
          or a court ruling has voided the consent. Distinct from revoked (which is an administrative
          controller decision) and withdrawn (which is a subject right). Records in this state must not
          be used as the basis for processing; remediation (obtaining a fresh valid record or relying
          on an alternative legal basis) is required.
        annotations:
          label_es: Invalidado
          label_fr: Invalidé
          description_es: El registro ha sido determinado como jurídica o técnicamente inválido a posteriori,
            por ejemplo porque el aviso mostrado era defectuoso, la delegación reclamada no estaba legalmente
            autorizada, o una resolución judicial ha anulado el consentimiento. Distinto de revoked (decisión
            administrativa del responsable) y withdrawn (derecho del interesado). Los registros en este
            estado no pueden usarse como base para el tratamiento; se requiere remediación.
          description_fr: L'enregistrement a été jugé invalide sur le plan juridique ou technique après
            coup, par exemple parce que la notice présentée était défectueuse, la délégation invoquée
            n'était pas juridiquement autorisée, ou une décision de justice a annulé le consentement.
            Distinct de revoked (décision administrative du responsable du traitement) et withdrawn (droit
            de la personne concernée). Les enregistrements dans cet état ne peuvent pas être utilisés
            comme base de traitement; une remédiation est nécessaire.
      unknown:
        meaning: publicschema:ConsentStatus/unknown
        title: Unknown
        description: The consent state cannot be determined, typically because the record was migrated
          from a legacy system that did not track status explicitly. Use this value only for imported
          historical records where the original status is genuinely unrecoverable. Do not use it for new
          records. Programs should treat unknown-status records as unauthorised until status can be confirmed.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El estado del consentimiento no puede determinarse, típicamente porque el registro
            fue migrado desde un sistema heredado que no rastreaba el estado explícitamente. Use este
            valor solo para registros históricos importados donde el estado original es genuinamente irrecuperable.
            No lo use para nuevos registros. Los programas deben tratar los registros de estado desconocido
            como no autorizados hasta que el estado pueda confirmarse.
          description_fr: L'état du consentement ne peut pas être déterminé, généralement parce que l'enregistrement
            a été migré depuis un système ancien qui ne suivait pas explicitement le statut. Utilisez
            cette valeur uniquement pour les enregistrements historiques importés où le statut d'origine
            est véritablement irrécupérable. Ne pas l'utiliser pour les nouveaux enregistrements. Les
            programmes doivent traiter les enregistrements de statut inconnu comme non autorisés jusqu'à
            ce que le statut puisse être confirmé.
    annotations:
      label_es: Estado del consentimiento
      label_fr: Statut du consentement
      description_es: El estado actual del ciclo de vida de un registro de consentimiento. Los valores
        están ordenados aproximadamente a lo largo del ciclo de vida del registro, desde la solicitud
        inicial hasta la terminación. Los programas que realizan una ingesta masiva deben inicializar
        los registros en given en lugar de requested.
      description_fr: L'état actuel du cycle de vie d'un enregistrement de consentement. Les valeurs sont
        ordonnées approximativement le long du cycle de vie de l'enregistrement, de la demande initiale
        jusqu'à la résiliation. Les programmes qui effectuent une collecte en masse devraient initialiser
        les enregistrements à given plutôt qu'à requested.
      vocab_references_json: '[{"machine_readable": true, "name": "W3C Data Privacy Vocabulary (DPV) v2
        - Consent Status classes", "notes": "DPV v2 defines a two-tier consent status hierarchy under
        dpv:ConsentStatus. This vocabulary aligns with DPV''s distinction between active states (given,
        renewed), withdrawn, refused, revoked, expired, and unknown.", "relationship": "structural_pattern",
        "uri": "https://w3id.org/dpv#ConsentStatus"}]'
      bibliography_refs: '["iso-27560"]'
  CookingFuel:
    enum_uri: publicschema:CookingFuel
    title: Cooking Fuel
    description: The primary fuel used by the household for cooking, classified according to the WHO Household
      Energy categories.
    status: bibo:status/forthcoming
    permissible_values:
      electricity:
        meaning: publicschema:CookingFuel/electricity
        title: Electricity
        description: Cooking using electric stoves, induction cooktops, or other electrically powered
          cooking appliances.
        annotations:
          label_es: Electricidad
          label_fr: Électricité
          description_es: Cocción con cocinas eléctricas, placas de inducción u otros electrodomésticos
            de cocina eléctricos.
          description_fr: Cuisson au moyen de cuisinières électriques, plaques à induction ou autres appareils
            de cuisson électriques.
      lpg_natural_gas:
        meaning: publicschema:CookingFuel/lpg_natural_gas
        title: LPG/natural gas
        description: Cooking using liquefied petroleum gas (LPG), natural gas, or biogas piped or from
          cylinders.
        annotations:
          label_es: GLP/gas natural
          label_fr: GPL/gaz naturel
          description_es: Cocción con gas licuado de petróleo (GLP), gas natural o biogás distribuido
            por tubería o en cilindros.
          description_fr: Cuisson au gaz de pétrole liquéfié (GPL), au gaz naturel ou au biogaz distribué
            par canalisation ou en bouteilles.
      biogas:
        meaning: publicschema:CookingFuel/biogas
        title: Biogas
        description: Cooking using gas produced from anaerobic digestion of organic matter (animal dung,
          crop residue, food waste).
        annotations:
          label_es: Biogás
          label_fr: Biogaz
          description_es: Cocción con gas producido por digestión anaeróbica de materia orgánica (estiércol,
            residuos de cultivos, desechos alimentarios).
          description_fr: Cuisson au gaz produit par digestion anaérobie de matières organiques (fumier,
            résidus de cultures, déchets alimentaires).
      kerosene:
        meaning: publicschema:CookingFuel/kerosene
        title: Kerosene
        description: Cooking using kerosene (paraffin) as fuel in stoves or lamps.
        annotations:
          label_es: Queroseno
          label_fr: Pétrole lampant
          description_es: Cocción con queroseno (parafina) como combustible en estufas o lámparas.
          description_fr: Cuisson au pétrole lampant (paraffine) dans des réchauds ou lampes.
      coal_lignite:
        meaning: publicschema:CookingFuel/coal_lignite
        title: Coal/lignite
        description: Cooking using coal, lignite, or charcoal briquettes made from coal.
        annotations:
          label_es: Carbón/lignito
          label_fr: Charbon/lignite
          description_es: Cocción con carbón, lignito o briquetas de carbón.
          description_fr: Cuisson au charbon, au lignite ou aux briquettes de charbon.
      charcoal:
        meaning: publicschema:CookingFuel/charcoal
        title: Charcoal
        description: Cooking using charcoal produced from wood or other biomass through pyrolysis.
        annotations:
          label_es: Carbón vegetal
          label_fr: Charbon de bois
          description_es: Cocción con carbón vegetal producido por pirólisis de madera u otra biomasa.
          description_fr: Cuisson au charbon de bois produit par pyrolyse du bois ou d'autres biomasses.
      wood:
        meaning: publicschema:CookingFuel/wood
        title: Wood
        description: Cooking using firewood, wood chips, or sawdust.
        annotations:
          label_es: Leña
          label_fr: Bois
          description_es: Cocción con leña, astillas de madera o aserrín.
          description_fr: Cuisson au bois de feu, aux copeaux de bois ou à la sciure.
      straw_shrubs_grass:
        meaning: publicschema:CookingFuel/straw_shrubs_grass
        title: Straw/shrubs/grass
        description: Cooking using straw, shrubs, grass, or other light plant materials.
        annotations:
          label_es: Paja/arbustos/hierba
          label_fr: Paille/broussailles/herbe
          description_es: Cocción con paja, arbustos, hierba u otros materiales vegetales ligeros.
          description_fr: Cuisson à la paille, aux broussailles, à l'herbe ou à d'autres matières végétales
            légères.
      agricultural_crop_waste:
        meaning: publicschema:CookingFuel/agricultural_crop_waste
        title: Agricultural crop waste
        description: Cooking using crop residues such as husks, stalks, cobs, or bagasse.
        annotations:
          label_es: Residuos de cultivos agrícolas
          label_fr: Résidus agricoles
          description_es: Cocción con residuos de cultivos como cáscaras, tallos, mazorcas o bagazo.
          description_fr: Cuisson aux résidus de cultures tels que les balles, tiges, épis ou bagasse.
      animal_dung:
        meaning: publicschema:CookingFuel/animal_dung
        title: Animal dung
        description: Cooking using dried animal dung cakes or pellets.
        annotations:
          label_es: Estiércol animal
          label_fr: Bouse animale
          description_es: Cocción con tortas o pellets de estiércol animal seco.
          description_fr: Cuisson aux galettes ou granulés de bouse animale séchée.
      no_food_cooked:
        meaning: publicschema:CookingFuel/no_food_cooked
        title: No food cooked in household
        description: The household does not cook food (eats out, receives prepared meals, or uses only
          cold food).
        annotations:
          label_es: No se cocina en el hogar
          label_fr: Aucun aliment cuisiné dans le ménage
          description_es: El hogar no cocina (come fuera, recibe comidas preparadas o consume solo alimentos
            fríos).
          description_fr: Le ménage ne cuisine pas (mange à l'extérieur, reçoit des repas préparés ou
            consomme uniquement des aliments froids).
      other:
        meaning: publicschema:CookingFuel/other
        title: Other
        description: A cooking fuel not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un combustible para cocinar no cubierto por las otras categorías.
          description_fr: Un combustible de cuisson non couvert par les autres catégories.
    annotations:
      label_es: Combustible para cocinar
      label_fr: Combustible de cuisson
      description_es: El combustible principal utilizado por el hogar para cocinar, clasificado según
        las categorías de energía doméstica de la OMS.
      description_fr: Le combustible principal utilisé par le ménage pour la cuisine, classifié selon
        les catégories d'énergie domestique de l'OMS.
      standard_json: '{"name": "WHO Household Energy Database", "notes": "WHO classification of household
        cooking fuels for monitoring clean energy access (SDG 7.1.2).", "uri": "https://www.who.int/data/gho/data/themes/air-pollution/household-air-pollution"}'
      bibliography_refs: '["dhs-recode7", "mics6", "who-household-energy"]'
