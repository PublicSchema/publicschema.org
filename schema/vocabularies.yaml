  OrganizationType:
    enum_uri: publicschema:OrganizationType
    title: Organization Type
    description: A broad classification of organisations by their institutional nature and sector. Used
      on consent records to describe the categories of recipients to whom data may be shared, and on the
      Organization concept to classify the entity itself. Values reflect the types of organisations commonly
      involved in public program delivery as data controllers, processors, or sharing partners.
    status: bibo:draft
    permissible_values:
      government_agency:
        meaning: publicschema:OrganizationType/government_agency
        title: Government agency
        description: A government body at the national, regional, or local level that is not a ministry,
          such as a social protection agency, a statistics office, or a civil registration authority.
          Typically has its own legal mandate and budget.
        annotations:
          label_es: Agencia gubernamental
          label_fr: Agence gouvernementale
          description_es: Un organismo gubernamental a nivel nacional, regional o local que no es un ministerio,
            como una agencia de protección social, una oficina de estadística o una autoridad de registro
            civil. Típicamente tiene su propio mandato legal y presupuesto.
          description_fr: Un organisme gouvernemental aux niveaux national, régional ou local qui n'est
            pas un ministère, tel qu'une agence de protection sociale, un bureau des statistiques ou une
            autorité d'état civil. Dispose généralement de son propre mandat et budget.
      ministry:
        meaning: publicschema:OrganizationType/ministry
        title: Ministry
        description: A central government ministry or department headed by a minister, responsible for
          a policy domain such as social welfare, health, education, or interior affairs.
        annotations:
          label_es: Ministerio
          label_fr: Ministère
          description_es: Un ministerio o departamento del gobierno central encabezado por un ministro,
            responsable de un dominio de política como bienestar social, salud, educación o asuntos interiores.
          description_fr: Un ministère ou département gouvernemental central dirigé par un ministre, responsable
            d'un domaine politique tel que le bien-être social, la santé, l'éducation ou l'intérieur.
      ngo:
        meaning: publicschema:OrganizationType/ngo
        title: Non-governmental organisation
        description: A non-profit, non-governmental organisation, including international and local NGOs,
          that is involved in program delivery, data collection, or service provision. Includes civil-society
          organisations and community-based organisations when they act as data processors or implementing
          partners.
        annotations:
          label_es: Organizacion no gubernamental
          label_fr: Organisation non gouvernementale
          description_es: Una organización sin fines de lucro, no gubernamental, incluidas las ONG internacionales
            y locales, que participa en la ejecución de programas, la recopilación de datos o la prestación
            de servicios. Incluye organizaciones de la sociedad civil y organizaciones comunitarias cuando
            actúan como encargados del tratamiento o socios ejecutores.
          description_fr: Une organisation non gouvernementale sans but lucratif, y compris les ONG internationales
            et locales, impliquée dans la mise en œuvre de programmes, la collecte de données ou la prestation
            de services. Comprend les organisations de la société civile et les organisations communautaires
            lorsqu'elles agissent en tant que sous-traitants ou partenaires de mise en œuvre.
      un_agency:
        meaning: publicschema:OrganizationType/un_agency
        title: UN agency
        description: A United Nations agency, fund, or programme, such as UNHCR, UNICEF, WFP, WHO, or
          UNDP. UN agencies often act as implementing partners or coordinators in multi-party program
          delivery arrangements.
        annotations:
          label_es: Agencia de la ONU
          label_fr: Agence des Nations Unies
          description_es: Una agencia, fondo o programa de las Naciones Unidas, como ACNUR, UNICEF, PMA,
            OMS o PNUD. Las agencias de la ONU actúan frecuentemente como socios ejecutores o coordinadores
            en acuerdos de prestación de programas con múltiples partes.
          description_fr: Une agence, un fonds ou un programme des Nations Unies, tel que le HCR, l'UNICEF,
            le PAM, l'OMS ou le PNUD. Les agences des Nations Unies agissent souvent en tant que partenaires
            de mise en œuvre ou coordinateurs dans des arrangements multipartites.
      bank:
        meaning: publicschema:OrganizationType/bank
        title: Bank
        description: A licensed commercial, development, or microfinance bank involved in program delivery,
          such as disbursing cash transfers or providing accounts for beneficiaries. Banks act as processors
          or independent controllers depending on the scope of the data they receive.
        annotations:
          label_es: Banco
          label_fr: Banque
          description_es: Un banco comercial, de desarrollo o de microcrédito con licencia involucrado
            en la ejecución del programa, como el desembolso de transferencias en efectivo o la provisión
            de cuentas para beneficiarios. Los bancos actúan como encargados o responsables independientes
            según el alcance de los datos que reciben.
          description_fr: Une banque commerciale, de développement ou de microfinance agréée impliquée
            dans la mise en œuvre du programme, par exemple pour le versement de transferts en espèces
            ou la fourniture de comptes aux bénéficiaires. Les banques agissent en tant que sous-traitants
            ou responsables indépendants selon l'étendue des données qu'elles reçoivent.
      mobile_money_operator:
        meaning: publicschema:OrganizationType/mobile_money_operator
        title: Mobile money operator
        description: A provider of mobile payment and transfer services, such as M-Pesa, MTN Mobile Money,
          or similar platforms. Mobile money operators are common last-mile delivery channels for cash
          transfers in low- and middle-income countries.
        annotations:
          label_es: Operador de dinero móvil
          label_fr: Opérateur de monnaie mobile
          description_es: Un proveedor de servicios de pago y transferencia móvil, como M-Pesa, MTN Mobile
            Money o plataformas similares. Los operadores de dinero móvil son canales de distribución
            de último kilómetro comunes para transferencias de efectivo en países de ingresos bajos y
            medios.
          description_fr: Un fournisseur de services de paiement et de transfert mobiles, tel que M-Pesa,
            MTN Mobile Money ou des plateformes similaires. Les opérateurs de monnaie mobile sont des
            canaux de distribution courants pour les transferts en espèces dans les pays à revenu faible
            et intermédiaire.
      implementing_partner:
        meaning: publicschema:OrganizationType/implementing_partner
        title: Implementing partner
        description: An organisation contracted to deliver specific program activities on behalf of the
          primary controller, which may be a government or UN agency. Includes prime contractors, sub-contractors,
          and consortium members in multi-partner program delivery. Use when none of the more specific
          categories (ngo, bank, un-agency) precisely apply.
        annotations:
          label_es: Socio ejecutor
          label_fr: Partenaire de mise en œuvre
          description_es: Una organización contratada para llevar a cabo actividades específicas del programa
            en nombre del responsable principal, que puede ser un gobierno o una agencia de la ONU. Incluye
            contratistas principales, subcontratistas y miembros de consorcios en la ejecución de programas
            con varios socios. Use cuando ninguna de las categorías más específicas (ngo, bank, un-agency)
            aplique con precisión.
          description_fr: Une organisation sous contrat pour exécuter des activités de programme spécifiques
            au nom du responsable principal, qui peut être un gouvernement ou une agence des Nations Unies.
            Comprend les entrepreneurs principaux, les sous-traitants et les membres d'un consortium dans
            la mise en œuvre de programmes multipartenaires. À utiliser lorsqu'aucune des catégories plus
            spécifiques (ngo, bank, un-agency) ne s'applique précisément.
      research_institution:
        meaning: publicschema:OrganizationType/research_institution
        title: Research institution
        description: A university, research institute, or think tank that receives program data for evaluation,
          research, or monitoring and evaluation purposes. Research institutions typically receive anonymised
          or pseudonymised data; when they receive identifiable data, the legal basis and data sharing
          agreement should be documented carefully.
        annotations:
          label_es: Institución de investigación
          label_fr: Institution de recherche
          description_es: Una universidad, instituto de investigación o grupo de reflexión que recibe
            datos del programa para evaluación, investigación o fines de seguimiento y evaluación. Las
            instituciones de investigación típicamente reciben datos anonimizados o pseudonimizados; cuando
            reciben datos identificables, la base jurídica y el acuerdo de intercambio de datos deben
            documentarse cuidadosamente.
          description_fr: Une université, un institut de recherche ou un groupe de réflexion qui reçoit
            des données de programme à des fins d'évaluation, de recherche ou de suivi et évaluation.
            Les institutions de recherche reçoivent généralement des données anonymisées ou pseudonymisées;
            lorsqu'elles reçoivent des données identifiables, la base juridique et l'accord de partage
            de données doivent être soigneusement documentés.
      other:
        meaning: publicschema:OrganizationType/other
        title: Other
        description: An organisation type not covered by the other values. Document the specific type
          in a note or in the related consent record to support future vocabulary additions.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de organización no cubierto por los otros valores. Documente el tipo
            específico en una nota o en el registro de consentimiento relacionado para facilitar futuras
            ampliaciones del vocabulario.
          description_fr: Un type d'organisation non couvert par les autres valeurs. Documentez le type
            spécifique dans une note ou dans l'enregistrement de consentement associé pour faciliter de
            futures extensions du vocabulaire.
    annotations:
      label_es: Tipo de organización
      label_fr: Type d'organisation
      description_es: Una clasificación amplia de organizaciones por su naturaleza institucional y sector.
        Se usa en registros de consentimiento para describir las categorías de destinatarios con quienes
        se pueden compartir datos, y en el concepto Organization para clasificar la entidad en sí. Los
        valores reflejan los tipos de organizaciones habitualmente involucradas en la prestación de programas
        públicos como responsables del tratamiento, encargados o socios de intercambio.
      description_fr: Une classification générale des organisations selon leur nature institutionnelle
        et leur secteur. Utilisé sur les enregistrements de consentement pour décrire les catégories de
        destinataires auxquels des données peuvent être partagées, et sur le concept Organisation pour
        classifier l'entité elle-même. Les valeurs reflètent les types d'organisations couramment impliquées
        dans la prestation de programmes publics en tant que responsables du traitement, sous-traitants
        ou partenaires de partage.
  PaymentStatus:
    enum_uri: publicschema:PaymentStatus
    title: Payment Status
    description: The processing states of a payment event in the disbursement cycle.
    status: bibo:status/published
    permissible_values:
      pending:
        meaning: publicschema:PaymentStatus/pending
        title: Pending
        description: The payment has been scheduled or initiated but has not yet been transmitted or confirmed.
        annotations:
          label_es: Pendiente
          label_fr: En attente
          description_es: El pago ha sido programado o iniciado pero aún no ha sido transmitido o confirmado.
          description_fr: Le paiement a été planifié ou initié mais n'a pas encore été transmis ou confirmé.
      processing:
        meaning: publicschema:PaymentStatus/processing
        title: Processing
        description: The payment instruction has been accepted by the financial intermediary and is being
          executed.
        annotations:
          label_es: En procesamiento
          label_fr: En traitement
          description_es: La instrucción de pago ha sido aceptada por el intermediario financiero y está
            siendo ejecutada.
          description_fr: L'instruction de paiement a été acceptée par l'intermédiaire financier et est
            en cours d'exécution.
      partial:
        meaning: publicschema:PaymentStatus/partial
        title: Partial
        description: Part of the payment amount has been transmitted but the full amount has not yet been
          delivered.
        annotations:
          label_es: Parcial
          label_fr: Partiel
          description_es: Parte del monto del pago ha sido transmitida pero el monto total aún no ha sido
            entregado.
          description_fr: Une partie du montant du paiement a été transmise mais le montant total n'a
            pas encore été versé.
        exact_mappings:
        - opencrvs:OpencrvsPaymentOutcomeType/partial
      paid:
        meaning: publicschema:PaymentStatus/paid
        title: Paid
        description: The payment has been successfully transmitted and received by the beneficiary.
        annotations:
          label_es: Pagado
          label_fr: Payé
          description_es: El pago ha sido transmitido con éxito y recibido por el beneficiario.
          description_fr: Le paiement a été transmis avec succès et reçu par le bénéficiaire.
        exact_mappings:
        - openspp:OpensppPaymentStatus/paid
        - fhir-r4:FhirR4PaymentStatusCodes/paid
      failed:
        meaning: publicschema:PaymentStatus/failed
        title: Failed
        description: The payment attempt did not complete successfully due to a technical or account-level
          error.
        annotations:
          label_es: Fallido
          label_fr: Échoué
          description_es: El intento de pago no se completó con éxito debido a un error técnico o a nivel
            de cuenta.
          description_fr: La tentative de paiement n'a pas abouti en raison d'une erreur technique ou
            au niveau du compte.
        exact_mappings:
        - openspp:OpensppPaymentStatus/failed
        - govstack-payments:GovstackPaymentsBatchTransactionStatusImplied/failed
      returned:
        meaning: publicschema:PaymentStatus/returned
        title: Returned
        description: The payment was transmitted but subsequently returned by the receiving institution
          or agent.
        annotations:
          label_es: Devuelto
          label_fr: Retourné
          description_es: El pago fue transmitido pero posteriormente devuelto por la institución o agente
            receptor.
          description_fr: Le paiement a été transmis mais a ensuite été retourné par l'institution ou
            l'agent récepteur.
      rejected:
        meaning: publicschema:PaymentStatus/rejected
        title: Rejected
        description: The payment was evaluated and denied based on a business or policy decision, such
          as a failed eligibility check or a disputed claim.
        annotations:
          label_es: Rechazado
          label_fr: Rejeté
          description_es: El pago fue evaluado y denegado en base a una decisión comercial o de política,
            como una verificación de elegibilidad fallida o una reclamación disputada.
          description_fr: Le paiement a été évalué et refusé sur la base d'une décision institutionnelle
            ou réglementaire, telle qu'un contrôle d'admissibilité non satisfait ou une réclamation contestée.
        exact_mappings:
        - openimis:OpenimisBenefitConsumptionStatus/rejected
      cancelled:
        meaning: publicschema:PaymentStatus/cancelled
        title: Cancelled
        description: The payment was cancelled before transmission, typically due to eligibility changes
          or administrative decision.
        annotations:
          label_es: Cancelado
          label_fr: Annulé
          description_es: El pago fue cancelado antes de la transmisión, generalmente debido a cambios
            de elegibilidad o decisión administrativa.
          description_fr: Le paiement a été annulé avant la transmission, généralement en raison de changements
            d'admissibilité ou d'une décision administrative.
    annotations:
      label_es: Estado de pago
      label_fr: Statut de paiement
      description_es: Los estados de procesamiento de un evento de pago en el ciclo de desembolso.
      description_fr: Les états de traitement d'un événement de paiement dans le cycle de versement.
      vocab_references_json: '[{"machine_readable": true, "name": "ISO 20022 ExternalPaymentTransactionStatus1Code",
        "notes": "ISO 20022 defines granular interbank processing states. This vocabulary is a deliberate
        high-level simplification.", "relationship": "superset", "uri": "https://www.iso20022.org/catalogue-messages/additional-content-messages/external-code-sets"},
        {"machine_readable": true, "name": "Mojaloop FSPIOP TransferState", "relationship": "partial_overlap",
        "uri": "https://docs.mojaloop.io/technical/api/fspiop/logical-data-model.html"}]'
      bibliography_refs: '["govstack-payments", "iso-20022-payment-status", "mojaloop-fspiop"]'
  PregnancyStatus:
    enum_uri: publicschema:PregnancyStatus
    title: Pregnancy Status
    description: The current pregnancy status of a person. Aligned with the LOINC LL4129-4 answer list
      (pregnant, not pregnant, unknown), with an additional postpartum value for social-protection programs
      that target postpartum or lactating women separately.
    status: bibo:draft
    permissible_values:
      not_pregnant:
        meaning: publicschema:PregnancyStatus/not_pregnant
        title: Not pregnant
        description: The person is not currently pregnant.
        annotations:
          label_es: No embarazada
          label_fr: Pas enceinte
          description_es: La persona no está actualmente embarazada.
          description_fr: La personne n'est pas actuellement enceinte.
      pregnant:
        meaning: publicschema:PregnancyStatus/pregnant
        title: Pregnant
        description: The person is currently pregnant.
        annotations:
          label_es: Embarazada
          label_fr: Enceinte
          description_es: La persona está actualmente embarazada.
          description_fr: La personne est actuellement enceinte.
      postpartum:
        meaning: publicschema:PregnancyStatus/postpartum
        title: Postpartum
        description: The person has recently given birth and is in the postpartum period. This value is
          a PublicSchema extension for social protection use; FHIR handles postpartum via a separate observation.
        annotations:
          label_es: Posparto
          label_fr: Post-partum
          description_es: La persona ha dado a luz recientemente y se encuentra en el período posparto.
            Este valor es una extensión de PublicSchema para uso en protección social; FHIR gestiona el
            posparto mediante una observación separada.
          description_fr: La personne a récemment accouché et se trouve en période post-partum. Cette
            valeur est une extension PublicSchema pour les programmes de protection sociale; FHIR gère
            le post-partum via une observation séparée.
      unknown:
        meaning: publicschema:PregnancyStatus/unknown
        title: Unknown
        description: The pregnancy status is not known or was not ascertained.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El estado de embarazo no se conoce o no fue determinado.
          description_fr: Le statut de grossesse n'est pas connu ou n'a pas été établi.
    annotations:
      label_es: Estado de embarazo
      label_fr: Statut de grossesse
      description_es: El estado de embarazo actual de una persona. Alineado con la lista de respuestas
        LOINC LL4129-4 (embarazada, no embarazada, desconocido), con un valor posparto adicional para
        los programas de protección social que se dirigen por separado a mujeres posparto o lactantes.
      description_fr: Le statut de grossesse actuel d'une personne. Aligné sur la liste de réponses LOINC
        LL4129-4 (enceinte, pas enceinte, inconnu), avec une valeur supplémentaire post-partum pour les
        programmes de protection sociale qui ciblent séparément les femmes en post-partum ou allaitantes.
      standard_json: '{"name": "LOINC LL4129-4 Pregnancy Status", "notes": "LOINC answer list LL4129-4
        (for LOINC observation code 82810-3) defines three values: Pregnant, Not pregnant, Unknown. This
        vocabulary carries those three verbatim and adds `postpartum` as a PublicSchema extension. Note
        that the FHIR R4 International Patient Summary pregnancy-status pattern uses SNOMED CT codes for
        the observation value, not the LOINC answer list; implementations that need FHIR IPS conformance
        should map through SNOMED CT rather than treat this vocabulary as a drop-in.\n", "uri": "https://loinc.org/LL4129-4/"}'
      bibliography_refs: '["dhs-recode7", "loinc-pregnancy-status", "mics6"]'
  RecipientRole:
    enum_uri: publicschema:RecipientRole
    title: Recipient Role
    description: The legal relationship between the data controller and a recipient organisation, which
      determines the obligations each party carries under data protection law. The distinction between
      processor, joint-controller, independent-controller, and sub-processor is legally material and affects
      which contracts are required, who bears accountability for the processing, and what rights the data
      subject can exercise against each party.
    status: bibo:draft
    permissible_values:
      processor:
        meaning: publicschema:RecipientRole/processor
        title: Processor
        description: An organisation that processes personal data on behalf of and under the instructions
          of the controller. The controller retains accountability for the processing; the processor acts
          only on documented instructions. A data processing agreement is required. DPV mapping, dpv:DataProcessor,
          URI, https://w3id.org/dpv#DataProcessor.
        annotations:
          label_es: Encargado del tratamiento
          label_fr: Sous-traitant
          description_es: Una organización que trata datos personales en nombre y siguiendo las instrucciones
            del responsable del tratamiento. El responsable del tratamiento conserva la responsabilidad
            del tratamiento; el encargado actúa solo en base a instrucciones documentadas. Se requiere
            un contrato de tratamiento de datos. Correspondencia DPV, dpv:DataProcessor, URI, https://w3id.org/dpv#DataProcessor.
          description_fr: Une organisation qui traite des données à caractère personnel pour le compte
            et selon les instructions du responsable du traitement. Le responsable du traitement conserve
            la responsabilité du traitement; le sous-traitant n'agit que sur instructions documentées.
            Un contrat de traitement des données est requis. Correspondance DPV, dpv:DataProcessor, URI,
            https://w3id.org/dpv#DataProcessor.
          note: 'DPV: dpv:DataProcessor, URI: https://w3id.org/dpv#DataProcessor'
      joint_controller:
        meaning: publicschema:RecipientRole/joint_controller
        title: Joint controller
        description: An organisation that jointly determines the purposes and means of processing with
          the primary controller. Joint controllership triggers GDPR Article 26 obligations including
          a documented arrangement defining each party's responsibilities. Both controllers are jointly
          and severally accountable to data subjects. Reference the arrangement document in joint_controller_arrangement_ref.
          DPV mapping, dpv:JointDataControllers (class representing the pair or group), URI, https://w3id.org/dpv#JointDataControllers.
        annotations:
          label_es: Corresponsable del tratamiento
          label_fr: Coresponsable du traitement
          description_es: Una organización que determina conjuntamente con el responsable principal los
            fines y medios del tratamiento. La corresponsabilidad activa las obligaciones del artículo
            26 del RGPD, incluyendo un acuerdo documentado que define las responsabilidades de cada parte.
            Ambos responsables son solidariamente responsables ante los interesados. Referencie el documento
            de acuerdo en joint_controller_arrangement_ref. Correspondencia DPV, dpv:JointDataControllers,
            URI, https://w3id.org/dpv#JointDataControllers.
          description_fr: Une organisation qui détermine conjointement avec le responsable principal les
            finalités et les moyens du traitement. La coresponsabilité déclenche les obligations de l'article
            26 du RGPD, notamment un accord documenté définissant les responsabilités de chaque partie.
            Les deux responsables sont solidairement responsables envers les personnes concernées. Référencez
            le document d'accord dans joint_controller_arrangement_ref. Correspondance DPV, dpv:JointDataControllers,
            URI, https://w3id.org/dpv#JointDataControllers.
          note: 'DPV: dpv:JointDataControllers (plural class; represents the pair or group of joint controllers),
            URI: https://w3id.org/dpv#JointDataControllers'
      independent_controller:
        meaning: publicschema:RecipientRole/independent_controller
        title: Independent controller
        description: An organisation that receives personal data and processes it for its own, independently
          determined purposes. The originating controller is responsible only for the transfer itself
          (ensuring a lawful transfer mechanism); the receiving organisation is independently responsible
          for its own processing. No data processing agreement is required, though a data sharing agreement
          is typically good practice. DPV mapping, dpv:DataController, URI, https://w3id.org/dpv#DataController.
        annotations:
          label_es: Responsable independiente
          label_fr: Responsable indépendant
          description_es: Una organización que recibe datos personales y los trata para sus propios fines
            determinados de forma independiente. El responsable del tratamiento de origen solo es responsable
            de la propia transferencia (garantizar un mecanismo de transferencia lícito); la organización
            receptora es independientemente responsable de su propio tratamiento. No se requiere contrato
            de tratamiento de datos, aunque un acuerdo de intercambio de datos es generalmente una buena
            práctica. Correspondencia DPV, dpv:DataController, URI, https://w3id.org/dpv#DataController.
          description_fr: Une organisation qui reçoit des données à caractère personnel et les traite
            pour ses propres finalités déterminées de manière indépendante. Le responsable du traitement
            d'origine n'est responsable que du transfert lui-même (garantir un mécanisme de transfert
            licite); l'organisation réceptrice est indépendamment responsable de son propre traitement.
            Aucun contrat de traitement des données n'est requis, bien qu'un accord de partage des données
            soit généralement recommandé. Correspondance DPV, dpv:DataController, URI, https://w3id.org/dpv#DataController.
          note: 'DPV: dpv:DataController, URI: https://w3id.org/dpv#DataController'
      sub_processor:
        meaning: publicschema:RecipientRole/sub_processor
        title: Sub-processor
        description: An organisation engaged by a processor (not the controller directly) to carry out
          specific processing activities on behalf of the controller. The original processor is responsible
          for ensuring the sub-processor is bound by equivalent obligations. GDPR Article 28(4) requires
          the processor to obtain prior written authorisation from the controller before engaging a sub-processor.
          DPV mapping, dpv:DataSubProcessor (a subclass of dpv:DataProcessor), URI, https://w3id.org/dpv#DataSubProcessor.
        annotations:
          label_es: Subencargado del tratamiento
          label_fr: Sous-traitant ultérieur
          description_es: Una organización contratada por un encargado del tratamiento (no por el responsable
            directamente) para llevar a cabo actividades de tratamiento específicas en nombre del responsable.
            El encargado original es responsable de garantizar que el subencargado esté sujeto a obligaciones
            equivalentes. El artículo 28, apartado 4, del RGPD exige que el encargado obtenga autorización
            escrita previa del responsable antes de contratar a un subencargado. Correspondencia DPV,
            dpv:DataSubProcessor (subclase de dpv:DataProcessor), URI, https://w3id.org/dpv#DataSubProcessor.
          description_fr: Une organisation engagée par un sous-traitant (et non par le responsable du
            traitement directement) pour effectuer des activités de traitement spécifiques au nom du responsable
            du traitement. Le sous-traitant initial est responsable de s'assurer que le sous-traitant
            ultérieur est lié par des obligations équivalentes. L'article 28, paragraphe 4, du RGPD exige
            que le sous-traitant obtienne une autorisation écrite préalable du responsable du traitement
            avant d'engager un sous-traitant ultérieur. Correspondance DPV, dpv:DataSubProcessor (sous-classe
            de dpv:DataProcessor), URI, https://w3id.org/dpv#DataSubProcessor.
          note: 'DPV: dpv:DataSubProcessor (subclass of dpv:DataProcessor), URI: https://w3id.org/dpv#DataSubProcessor'
    close_mappings:
    - 'dpv:'
    annotations:
      label_es: Rol del destinatario
      label_fr: Rôle du destinataire
      description_es: La relación jurídica entre el responsable del tratamiento y una organización destinataria,
        que determina las obligaciones de cada parte en virtud de la legislación de protección de datos.
        La distinción entre encargado, corresponsable, responsable independiente y subencargado es jurídicamente
        relevante y afecta a los contratos requeridos, quién asume la responsabilidad del tratamiento
        y qué derechos puede ejercer el interesado frente a cada parte.
      description_fr: La relation juridique entre le responsable du traitement et une organisation destinataire,
        qui détermine les obligations de chaque partie en vertu de la législation sur la protection des
        données. La distinction entre sous-traitant, coresponsable, responsable indépendant et sous-traitant
        ultérieur est juridiquement significative et influe sur les contrats requis, les responsabilités
        de chaque partie et les droits que la personne concernée peut exercer contre chacun.
      external_alignments_json: '[{"label": "DPV v2 data processing roles", "match": "close", "note":
        "Each value maps to a DPV v2 class: processor to dpv:DataProcessor, joint_controller to dpv:JointDataControllers,
        independent_controller to dpv:DataController, sub_processor to dpv:DataSubProcessor. The match
        is close (not exact) because dpv:DataController is broader than independent_controller; DPV does
        not carry a dedicated class for a controller-to-controller recipient relationship.", "uri": "https://w3id.org/dpv#",
        "vocabulary": "DPV v2", "vocabulary_id": "dpv"}]'
      bibliography_refs: '["w3c-dpv"]'
