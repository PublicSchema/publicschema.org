          label_fr: Tuteur/Tutrice
          description_es: Una persona con responsabilidad legal del cuidado y gestión de otra, generalmente
            un menor o un adulto incapacitado.
          description_fr: Une personne ayant la responsabilité légale de la prise en charge d'une autre
            personne, généralement un mineur ou un adulte incapable.
      caregiver:
        meaning: publicschema:RelationshipType/caregiver
        title: Caregiver
        description: A person who provides ongoing care or assistance, whether or not they hold legal
          guardianship.
        annotations:
          label_es: Cuidador/a
          label_fr: Soignant(e)
          description_es: Una persona que proporciona cuidado o asistencia continua, tenga o no la tutela
            legal.
          description_fr: Une personne qui fournit des soins ou une assistance continue, qu'elle détienne
            ou non la tutelle légale.
      dependent:
        meaning: publicschema:RelationshipType/dependent
        title: Dependent
        description: A person who relies on another for financial support or daily living needs.
        annotations:
          label_es: Dependiente
          label_fr: Personne à charge
          description_es: Una persona que depende de otra para su sustento financiero o necesidades diarias.
          description_fr: Une personne qui dépend d'une autre pour son soutien financier ou ses besoins
            quotidiens.
      in_law:
        meaning: publicschema:RelationshipType/in_law
        title: In-law
        description: A person related through marriage rather than by blood, such as a parent-in-law,
          child-in-law, or sibling-in-law.
        annotations:
          label_es: Pariente político
          label_fr: Par alliance
          description_es: Una persona relacionada por matrimonio en lugar de por sangre, como un suegro/a,
            yerno/nuera o cuñado/a.
          description_fr: Une personne liée par le mariage plutôt que par le sang, comme un beau-parent,
            un gendre/belle-fille ou un beau-frère/belle-sœur.
      extended_family:
        meaning: publicschema:RelationshipType/extended_family
        title: Extended family
        description: A family member beyond the immediate kinship categories (e.g. aunt, uncle, cousin,
          niece, nephew) where the specific type is not recorded.
        annotations:
          label_es: Familia extendida
          label_fr: Famille élargie
          description_es: Un miembro de la familia más allá de las categorías de parentesco inmediato
            (p. ej. tía, tío, primo, sobrina, sobrino) cuyo tipo específico no está registrado.
          description_fr: Un membre de la famille au-delà des catégories de parenté immédiate (p. ex.
            tante, oncle, cousin, nièce, neveu) dont le type spécifique n'est pas enregistré.
      payment_proxy:
        meaning: publicschema:RelationshipType/payment_proxy
        title: Payment proxy
        description: A person authorized to collect benefits on behalf of another, often used when the
          beneficiary cannot collect in person.
        annotations:
          label_es: Apoderado de pago
          label_fr: Mandataire de paiement
          description_es: Una persona autorizada para cobrar beneficios en nombre de otra, utilizada frecuentemente
            cuando el beneficiario no puede cobrar en persona.
          description_fr: Une personne autorisée à collecter des prestations au nom d'une autre, souvent
            utilisée lorsque le bénéficiaire ne peut pas collecter en personne.
          source_domain: sp
      survivor:
        meaning: publicschema:RelationshipType/survivor
        title: Survivor
        description: A person entitled to continued or transferred benefits following the death of the
          primary beneficiary.
        annotations:
          label_es: Sobreviviente
          label_fr: Survivant(e)
          description_es: Una persona con derecho a la continuación o transferencia de beneficios tras
            el fallecimiento del beneficiario principal.
          description_fr: Une personne ayant droit à la continuation ou au transfert des prestations suite
            au décès du bénéficiaire principal.
          source_domain: sp
      non_relative:
        meaning: publicschema:RelationshipType/non_relative
        title: Non-relative
        description: A person known to the household or group who has no kinship or legal tie to the reference
          person.
        annotations:
          label_es: No pariente
          label_fr: Non-parent
          description_es: Una persona conocida del hogar o grupo que no tiene vínculo de parentesco ni
            legal con la persona de referencia.
          description_fr: Une personne connue du ménage ou du groupe qui n'a aucun lien de parenté ou
            juridique avec la personne de référence.
        exact_mappings:
        - openspp:OpensppRelationshipType/non_relative
      other:
        meaning: publicschema:RelationshipType/other
        title: Other
        description: A relationship type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de relación no cubierto por las otras categorías.
          description_fr: Un type de relation non couvert par les autres catégories.
        exact_mappings:
        - fhir-r4:FhirR4PatientRelationshipType/other
    annotations:
      label_es: Tipo de relación
      label_fr: Type de relation
      description_es: Categorías que describen la naturaleza de la conexión entre dos personas, abarcando
        relaciones de parentesco, administrativas y económicas.
      description_fr: Catégories décrivant la nature du lien entre deux personnes, couvrant les relations
        de parenté, administratives et économiques.
      vocab_references_json: '[{"machine_readable": true, "name": "HL7 v3 RoleCode (PersonalRelationshipRoleType)",
        "notes": "HL7 defines granular kinship codes (70+). This vocabulary uses broader categories.",
        "relationship": "superset", "uri": "https://terminology.hl7.org/3.0.0/ValueSet-v3-PersonalRelationshipRoleType.html"}]'
      see_also_json: '[{"note": "relationship-type describes connections between two persons (person-to-person);
        group-role describes a person''s role within a group (person-to-group). Values like ''spouse''
        and ''child'' appear in both but answer different questions.", "vocabulary": "group-role"}]'
      bibliography_refs: '["fhir-v3-role-code", "un-census-rev3"]'
  RoofMaterial:
    enum_uri: publicschema:RoofMaterial
    title: Roof Material
    description: The primary material of the roof in the household's dwelling.
    status: bibo:status/forthcoming
    permissible_values:
      no_roof:
        meaning: publicschema:RoofMaterial/no_roof
        title: No roof
        description: Dwelling has no roof covering.
        annotations:
          label_es: Sin techo
          label_fr: Sans toit
          description_es: La vivienda no tiene cubierta de techo.
          description_fr: Le logement ne dispose pas de couverture de toit.
      thatch_palm_leaf:
        meaning: publicschema:RoofMaterial/thatch_palm_leaf
        title: Thatch or palm leaf
        description: Roof made of dried grass, straw, reeds, or palm leaves bundled into thatch.
        annotations:
          label_es: Paja o hoja de palma
          label_fr: Chaume ou feuille de palme
          description_es: Techo de hierba seca, paja, cañas u hojas de palma agrupadas en paja.
          description_fr: Toit en herbe séchée, paille, roseaux ou feuilles de palme assemblés en chaume.
      sod_grass:
        meaning: publicschema:RoofMaterial/sod_grass
        title: Sod or grass
        description: Roof covered with living or dried sod, turf, or loose grass.
        annotations:
          label_es: Césped o hierba
          label_fr: Gazon ou herbe
          description_es: Techo cubierto con césped vivo o seco, turba o hierba suelta.
          description_fr: Toit recouvert de gazon vivant ou séché, de tourbe ou d'herbe libre.
      rustic_mat:
        meaning: publicschema:RoofMaterial/rustic_mat
        title: Rustic mat
        description: Roof covered with woven plant-fiber mats (e.g., reed or rush mats).
        annotations:
          label_es: Estera rústica
          label_fr: Natte rudimentaire
          description_es: Techo cubierto con esteras tejidas de fibra vegetal (por ejemplo, esteras de
            junco o caña).
          description_fr: Toit recouvert de nattes tressées en fibres végétales (par ex. nattes de roseaux).
      palm_bamboo:
        meaning: publicschema:RoofMaterial/palm_bamboo
        title: Palm or bamboo
        description: Roof structure made of palm fronds or split bamboo.
        annotations:
          label_es: Palma o bambú
          label_fr: Palme ou bambou
          description_es: Estructura de techo de hojas de palma o bambú dividido.
          description_fr: Structure de toit en feuilles de palme ou en lattes de bambou.
      wood_planks:
        meaning: publicschema:RoofMaterial/wood_planks
        title: Wood planks
        description: Roof made of unfinished wood planks or boards.
        annotations:
          label_es: Tablones de madera
          label_fr: Planches de bois
          description_es: Techo de tablones o tablas de madera sin acabar.
          description_fr: Toit en planches ou madriers de bois non finis.
      cardboard:
        meaning: publicschema:RoofMaterial/cardboard
        title: Cardboard
        description: Roof covered with cardboard or similar paper-based material.
        annotations:
          label_es: Cartón
          label_fr: Carton
          description_es: Techo cubierto con cartón u otro material similar a base de papel.
          description_fr: Toit recouvert de carton ou de matériau similaire à base de papier.
      metal:
        meaning: publicschema:RoofMaterial/metal
        title: Metal or tin sheets
        description: Roof made of corrugated iron, galvanized steel, aluminum, or other metal sheets.
        annotations:
          label_es: Láminas metálicas
          label_fr: Tôle métallique
          description_es: Techo de hierro corrugado, acero galvanizado, aluminio u otras láminas metálicas.
          description_fr: Toit en tôle ondulée, acier galvanisé, aluminium ou autres feuilles métalliques.
      wood:
        meaning: publicschema:RoofMaterial/wood
        title: Wood
        description: Roof made of finished or milled wooden boards.
        annotations:
          label_es: Madera
          label_fr: Bois
          description_es: Techo de tablas de madera acabadas o aserradas.
          description_fr: Toit en planches de bois finies ou sciées.
      calamine_cement_fiber:
        meaning: publicschema:RoofMaterial/calamine_cement_fiber
        title: Calamine or cement fiber
        description: Roof made of corrugated calamine sheeting or fiber-cement (e.g., Eternit) panels.
        annotations:
          label_es: Calamina o fibrocemento
          label_fr: Calamine ou fibrociment
          description_es: Techo de láminas de calamina corrugada o paneles de fibrocemento (por ejemplo,
            Eternit).
          description_fr: Toit en tôle de calamine ondulée ou en panneaux de fibrociment (par ex. Eternit).
      ceramic_tiles:
        meaning: publicschema:RoofMaterial/ceramic_tiles
        title: Ceramic tiles
        description: Roof covered with fired clay or ceramic tiles.
        annotations:
          label_es: Tejas cerámicas
          label_fr: Tuiles céramiques
          description_es: Techo cubierto con tejas de arcilla cocida o cerámica.
          description_fr: Toit recouvert de tuiles en argile cuite ou en céramique.
      cement:
        meaning: publicschema:RoofMaterial/cement
        title: Cement
        description: Flat or sloped roof made of poured concrete or reinforced cement slab.
        annotations:
          label_es: Cemento
          label_fr: Ciment
          description_es: Techo plano o inclinado de hormigón vertido o losa de cemento armado.
          description_fr: Toit plat ou incliné en béton coulé ou en dalle de ciment armé.
      roofing_shingles:
        meaning: publicschema:RoofMaterial/roofing_shingles
        title: Roofing shingles
        description: Roof covered with asphalt, fiberglass, or wooden shingles.
        annotations:
          label_es: Tejas de pizarra
          label_fr: Bardeaux de toiture
          description_es: Techo cubierto con tejas de asfalto, fibra de vidrio o madera.
          description_fr: Toit recouvert de bardeaux en asphalte, en fibre de verre ou en bois.
      other:
        meaning: publicschema:RoofMaterial/other
        title: Other
        description: Roof material not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Material de techo no cubierto por las otras categorías.
          description_fr: Matériau de toit non couvert par les autres catégories.
    annotations:
      label_es: Material del techo
      label_fr: Matériau du toit
      description_es: El material principal del techo en la vivienda del hogar.
      description_fr: Le matériau principal du toit dans le logement du ménage.
      standard_json: '{"name": "DHS/MICS Harmonized Housing Codes", "notes": "Shared classification used
        by DHS (hv215) and MICS (HC4). No standalone international standard exists for roof materials;
        the survey programs are the de facto standard."}'
      bibliography_refs: '["dhs-recode7", "mics6"]'
  SanitationFacility:
    enum_uri: publicschema:SanitationFacility
    title: Sanitation Facility
    description: The type of toilet or latrine facility used by the household, classified according to
      the WHO/UNICEF Joint Monitoring Programme (JMP).
    status: bibo:status/forthcoming
    permissible_values:
      flush_to_piped_sewer:
        meaning: publicschema:SanitationFacility/flush_to_piped_sewer
        title: Flush to piped sewer system
        description: A flush or pour-flush toilet connected to a municipal or communal piped sewer network.
        annotations:
          label_es: Descarga a red de alcantarillado
          label_fr: Chasse vers réseau d'égout canalisé
          description_es: Inodoro de descarga o vertido conectado a una red de alcantarillado canalizado
            municipal o comunitario.
          description_fr: Toilettes à chasse ou à versement connectées à un réseau d'égout canalisé municipal
            ou communautaire.
      flush_to_septic_tank:
        meaning: publicschema:SanitationFacility/flush_to_septic_tank
        title: Flush to septic tank
        description: A flush or pour-flush toilet connected to an on-site septic tank.
        annotations:
          label_es: Descarga a fosa séptica
          label_fr: Chasse vers fosse septique
          description_es: Inodoro de descarga o vertido conectado a una fosa séptica en el sitio.
          description_fr: Toilettes à chasse ou à versement connectées à une fosse septique sur site.
      flush_to_pit_latrine:
        meaning: publicschema:SanitationFacility/flush_to_pit_latrine
        title: Flush to pit latrine
        description: A flush or pour-flush toilet where waste is directed to a pit below or nearby.
        annotations:
          label_es: Descarga a letrina de fosa
          label_fr: Chasse vers fosse
          description_es: Inodoro de descarga o vertido donde los desechos se dirigen a una fosa debajo
            o cercana.
          description_fr: Toilettes à chasse ou à versement où les déchets sont dirigés vers une fosse
            en dessous ou à proximité.
      flush_to_open_drain:
        meaning: publicschema:SanitationFacility/flush_to_open_drain
        title: Flush to open drain
        description: A flush or pour-flush toilet where waste is discharged into an open drain or ditch.
        annotations:
          label_es: Descarga a canal abierto
          label_fr: Chasse vers caniveau ouvert
          description_es: Inodoro de descarga o vertido donde los desechos se vierten a un canal o acequia
            abiertos.
          description_fr: Toilettes à chasse ou à versement où les déchets sont déversés dans un caniveau
            ou un fossé ouvert.
      flush_to_unknown:
        meaning: publicschema:SanitationFacility/flush_to_unknown
        title: Flush to unknown place / don't know where
        description: A flush or pour-flush toilet where the destination of waste is unknown or the respondent
          does not know.
        annotations:
          label_es: Descarga a lugar desconocido / no sabe adónde
          label_fr: Chasse vers destination inconnue / ne sait pas
          description_es: Inodoro de descarga o vertido cuyo destino de los desechos es desconocido o
            el encuestado no lo sabe.
          description_fr: Toilettes à chasse ou à versement dont la destination des déchets est inconnue
            ou que le répondant ignore.
      ventilated_improved_pit:
        meaning: publicschema:SanitationFacility/ventilated_improved_pit
        title: Ventilated improved pit latrine (VIP)
        description: A pit latrine fitted with a ventilation pipe and a fly screen, which reduces odours
          and fly breeding.
        annotations:
          label_es: Letrina de fosa mejorada ventilada (VIP)
          label_fr: Latrine à fosse améliorée ventilée (VIP)
          description_es: Letrina de fosa equipada con tubo de ventilación y malla antimoscas, que reduce
            olores y la cría de moscas.
          description_fr: Latrine à fosse équipée d'un tuyau de ventilation et d'une moustiquaire anti-mouches,
            réduisant les odeurs et la prolifération des mouches.
      pit_latrine_with_slab:
        meaning: publicschema:SanitationFacility/pit_latrine_with_slab
        title: Pit latrine with slab
        description: A pit latrine with a concrete or other solid slab covering the pit, reducing contamination
          risk.
        annotations:
          label_es: Letrina de fosa con losa
          label_fr: Latrine à fosse avec dalle
          description_es: Letrina de fosa con losa de concreto u otro material sólido que cubre la fosa,
            reduciendo el riesgo de contaminación.
          description_fr: Latrine à fosse avec une dalle en béton ou autre matériau solide couvrant la
            fosse, réduisant le risque de contamination.
      pit_latrine_without_slab:
        meaning: publicschema:SanitationFacility/pit_latrine_without_slab
        title: Pit latrine without slab / open pit
        description: A pit latrine with no covering slab, leaving the pit directly exposed.
        annotations:
          label_es: Letrina de fosa sin losa / fosa abierta
          label_fr: Latrine à fosse sans dalle / fosse ouverte
          description_es: Letrina de fosa sin losa de cobertura, dejando la fosa directamente expuesta.
          description_fr: Latrine à fosse sans dalle de couverture, laissant la fosse directement exposée.
      composting_toilet:
        meaning: publicschema:SanitationFacility/composting_toilet
        title: Composting toilet
        description: A dry toilet that treats human waste through aerobic decomposition, producing compost.
        annotations:
          label_es: Inodoro de compostaje
          label_fr: Toilettes à compostage
          description_es: Inodoro seco que trata los residuos humanos mediante descomposición aeróbica,
            produciendo compost.
          description_fr: Toilettes sèches qui traitent les déchets humains par décomposition aérobie,
            produisant du compost.
      bucket_latrine:
        meaning: publicschema:SanitationFacility/bucket_latrine
        title: Bucket latrine
        description: A toilet or latrine in which waste is collected in a bucket or container for later
          removal.
        annotations:
          label_es: Letrina de cubo
          label_fr: Latrine à seau
          description_es: Inodoro o letrina en que los desechos se recogen en un cubo o recipiente para
            su retirada posterior.
          description_fr: Toilettes ou latrine dans laquelle les déchets sont collectés dans un seau ou
            récipient pour enlèvement ultérieur.
      hanging_toilet:
        meaning: publicschema:SanitationFacility/hanging_toilet
        title: Hanging toilet / hanging latrine
        description: A toilet or latrine built over water or open ground where waste falls directly below
          without containment.
        annotations:
          label_es: Inodoro colgante / letrina colgante
          label_fr: Toilettes suspendues / latrine suspendue
          description_es: Inodoro o letrina construido sobre agua o terreno abierto donde los desechos
            caen directamente abajo sin contención.
          description_fr: Toilettes ou latrine construites au-dessus de l'eau ou d'un sol ouvert où les
            déchets tombent directement en dessous sans confinement.
      open_defecation:
        meaning: publicschema:SanitationFacility/open_defecation
        title: No facility / bush / field (open defecation)
        description: No toilet or latrine is used; defecation takes place in the open, in fields, forests,
          bodies of water, or other open spaces.
        annotations:
          label_es: Sin instalación / campo / monte (defecación al aire libre)
          label_fr: Aucune installation / brousse / champ (défécation à l'air libre)
          description_es: No se usa ningún inodoro ni letrina; la defecación ocurre al aire libre, en
            campos, bosques, cuerpos de agua u otros espacios abiertos.
          description_fr: Aucune toilette ni latrine n'est utilisée; la défécation a lieu en plein air,
            dans des champs, forêts, plans d'eau ou autres espaces ouverts.
      other:
        meaning: publicschema:SanitationFacility/other
        title: Other
        description: A sanitation facility not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Una instalación sanitaria no cubierta por las otras categorías.
          description_fr: Une installation sanitaire non couverte par les autres catégories.
    annotations:
      label_es: Instalación sanitaria
      label_fr: Installation sanitaire
      description_es: El tipo de instalación sanitaria o letrina utilizada por el hogar, clasificada según
        el Programa de Monitoreo Conjunto OMS/UNICEF (JMP).
      description_fr: Le type de toilettes ou de latrine utilisé par le ménage, classifié selon le Programme
        conjoint de surveillance OMS/UNICEF (JMP).
      standard_json: '{"name": "WHO/UNICEF Joint Monitoring Programme (JMP)", "notes": "Canonical facility
        type classification for SDG 6.2 sanitation monitoring.", "uri": "https://washdata.org/monitoring/sanitation"}'
      bibliography_refs: '["dhs-recode7", "mics6", "who-unicef-jmp"]'
  SanitationServiceLevel:
    enum_uri: publicschema:SanitationServiceLevel
    title: Sanitation Service Level
    description: The WHO/UNICEF JMP classification of sanitation service quality, ranging from safely
      managed to open defecation.
    status: bibo:status/forthcoming
    permissible_values:
      safely_managed:
        meaning: publicschema:SanitationServiceLevel/safely_managed
        title: Safely managed
        description: Use of an improved facility that is not shared with other households and where excreta
          are safely disposed of in situ or transported and treated off-site.
        annotations:
          label_es: Gestión segura
          label_fr: Gestion sécurisée
          description_es: Uso de una instalación mejorada no compartida con otros hogares y donde los
            excrementos son eliminados de forma segura in situ o transportados y tratados fuera del sitio.
          description_fr: Utilisation d'une installation améliorée non partagée avec d'autres ménages,
            et où les excréta sont éliminés de façon sécurisée sur place ou transportés et traités hors
            site.
      basic:
        meaning: publicschema:SanitationServiceLevel/basic
        title: Basic
        description: Use of an improved facility that is not shared with other households.
        annotations:
          label_es: Básico
          label_fr: De base
          description_es: Uso de una instalación mejorada no compartida con otros hogares.
          description_fr: Utilisation d'une installation améliorée non partagée avec d'autres ménages.
      limited:
        meaning: publicschema:SanitationServiceLevel/limited
        title: Limited
        description: Use of an improved facility that is shared between two or more households.
        annotations:
          label_es: Limitado
          label_fr: Limité
          description_es: Uso de una instalación mejorada compartida entre dos o más hogares.
          description_fr: Utilisation d'une installation améliorée partagée entre deux ménages ou plus.
      unimproved:
        meaning: publicschema:SanitationServiceLevel/unimproved
        title: Unimproved
        description: Use of pit latrines without a slab or platform, hanging latrines, or bucket latrines.
        annotations:
          label_es: No mejorado
          label_fr: Non amélioré
          description_es: Uso de letrinas de fosa sin losa ni plataforma, letrinas colgantes o letrinas
            de cubo.
          description_fr: Utilisation de latrines à fosse sans dalle ni plateforme, de latrines suspendues
            ou de latrines à seau.
      open_defecation:
        meaning: publicschema:SanitationServiceLevel/open_defecation
        title: Open defecation
        description: Disposal of human faeces in fields, forests, bodies of water, or other open spaces,
          or with solid waste. No facility of any kind is used.
        annotations:
          label_es: Defecación al aire libre
          label_fr: Défécation à l'air libre
          description_es: Eliminación de excrementos humanos en campos, bosques, cuerpos de agua u otros
            espacios abiertos, o con residuos sólidos. No se usa ninguna instalación.
          description_fr: Élimination des excréments humains dans des champs, forêts, plans d'eau ou autres
            espaces ouverts, ou avec les déchets solides. Aucune installation d'aucun type n'est utilisée.
    annotations:
      label_es: Nivel de servicio de saneamiento
      label_fr: Niveau de service d'assainissement
      description_es: La clasificación JMP OMS/UNICEF de la calidad del servicio de saneamiento, que va
        desde la gestión segura hasta la defecación al aire libre.
      description_fr: La classification JMP OMS/UNICEF de la qualité des services d'assainissement, allant
        de la gestion sécurisée à la défécation à l'air libre.
      standard_json: '{"name": "WHO/UNICEF JMP Service Ladder (SDG 6.2.1)", "notes": "The JMP service
        ladder classifies sanitation access for SDG 6.2.1 reporting. Levels are derived from facility
        type and sharing status, not directly observed.", "uri": "https://washdata.org/monitoring/sanitation"}'
      bibliography_refs: '["who-unicef-jmp"]'
  SchoolLevel:
    enum_uri: publicschema:SchoolLevel
    title: School Level
    description: The ISCED 2011 level of education served by a school, covering early childhood through
      post-secondary non-tertiary education. This is a subset of the full ISCED 2011 level range (0-8);
      tertiary levels (5-8) are excluded because institutions at those levels are universities and other
      higher-education bodies rather than schools.
    status: bibo:draft
    permissible_values:
      isced_0:
        meaning: publicschema:SchoolLevel/isced_0
        title: Early childhood education (ISCED 0)
        description: Programs providing holistic early childhood development and education for children
          below the age of entry into primary education, typically ages 0-5. Includes crèches, nurseries,
          kindergartens, and pre-schools.
        annotations:
          label_es: Educación en la primera infancia (ISCED 0)
          label_fr: Éducation de la petite enfance (ISCED 0)
          description_es: Programas de desarrollo y educación integral en la primera infancia para niños
            menores de la edad de ingreso a la educación primaria, típicamente entre 0 y 5 años. Incluye
            guarderías, jardines de infantes y preescuelas.
          description_fr: Programmes d'éveil et d'éducation de la petite enfance pour les enfants en dessous
            de l'âge d'entrée à l'école primaire, généralement de 0 à 5 ans. Comprend les crèches, pouponnières,
            jardins d'enfants et pré-écoles.
      isced_1:
        meaning: publicschema:SchoolLevel/isced_1
        title: Primary education (ISCED 1)
        description: Programs designed to give students a sound basic education in reading, writing, and
          mathematics, along with an elementary understanding of other subjects. Typically ages 6-11,
          duration of 4-6 years.
        annotations:
          label_es: Educación primaria (ISCED 1)
          label_fr: Enseignement primaire (ISCED 1)
          description_es: Programas diseñados para dar a los estudiantes una educación básica sólida en
            lectura, escritura y matemáticas, junto con una comprensión elemental de otras materias. Típicamente
            de 6 a 11 años, con una duración de 4 a 6 años.
          description_fr: Programmes destinés à donner aux élèves une solide éducation de base en lecture,
            écriture et mathématiques, ainsi qu'une compréhension élémentaire d'autres matières. Généralement
            de 6 à 11 ans, d'une durée de 4 à 6 ans.
      isced_2:
        meaning: publicschema:SchoolLevel/isced_2
        title: Lower secondary education (ISCED 2)
        description: Programs completing the lower phase of secondary education, building on primary education
          and preparing for upper secondary or vocational pathways. Typically ages 12-14.
        annotations:
          label_es: Educación secundaria baja (ISCED 2)
          label_fr: Enseignement secondaire inférieur (ISCED 2)
          description_es: Programas que completan la fase inferior de la educación secundaria, construyendo
            sobre la educación primaria y preparando para las vías de secundaria superior o vocacional.
            Típicamente de 12 a 14 años.
          description_fr: Programmes complétant la phase inférieure de l'enseignement secondaire, construisant
            sur l'enseignement primaire et préparant aux voies secondaires supérieures ou professionnelles.
            Généralement de 12 à 14 ans.
      isced_3:
        meaning: publicschema:SchoolLevel/isced_3
        title: Upper secondary education (ISCED 3)
        description: Programs providing more subject- or skill-specific instruction than lower secondary,
          often leading to tertiary education or direct entry to employment. Typically ages 15-17.
        annotations:
          label_es: Educación secundaria alta (ISCED 3)
          label_fr: Enseignement secondaire supérieur (ISCED 3)
          description_es: Programas que ofrecen instrucción más específica por materia o habilidad que
            la secundaria baja, a menudo conduciendo a la educación terciaria o a la inserción laboral
            directa. Típicamente de 15 a 17 años.
          description_fr: Programmes offrant un enseignement plus spécialisé par matière ou compétence
            que le secondaire inférieur, menant souvent à l'enseignement tertiaire ou à l'insertion directe
            dans l'emploi. Généralement de 15 à 17 ans.
      isced_4:
        meaning: publicschema:SchoolLevel/isced_4
        title: Post-secondary non-tertiary education (ISCED 4)
        description: Programs positioned between upper secondary and tertiary education, providing knowledge
          and skills below degree level. Includes vocational preparation programs and bridging courses.
          Typically delivered at technical colleges or vocational centers rather than universities.
        annotations:
          label_es: Educación postsecundaria no terciaria (ISCED 4)
          label_fr: Enseignement post-secondaire non tertiaire (ISCED 4)
          description_es: Programas situados entre la educación secundaria alta y la educación terciaria,
            que brindan conocimientos y habilidades por debajo del nivel de grado. Incluye programas de
            preparación vocacional y cursos de nivelación. Generalmente impartidos en institutos técnicos
            o centros vocacionales en lugar de universidades.
          description_fr: Programmes situés entre l'enseignement secondaire supérieur et l'enseignement
            tertiaire, fournissant des connaissances et des compétences inférieures au niveau du diplôme.
            Comprend les programmes de préparation professionnelle et les cours de rattrapage. Généralement
            dispensés dans des collèges techniques ou des centres de formation professionnelle plutôt
            qu'à l'université.
    annotations:
      label_es: Nivel escolar
      label_fr: Niveau scolaire
      description_es: El nivel educativo ISCED 2011 atendido por una escuela, cubriendo desde la educación
        en la primera infancia hasta la educación postsecundaria no terciaria. Este es un subconjunto
        del rango completo de niveles ISCED 2011 (0-8); los niveles terciarios (5-8) se excluyen porque
        las instituciones en esos niveles son universidades y otros organismos de educación superior,
        no escuelas.
      description_fr: Le niveau d'éducation ISCED 2011 desservi par une école, couvrant l'éducation de
        la petite enfance jusqu'au post-secondaire non tertiaire. Il s'agit d'un sous-ensemble de la gamme
        complète des niveaux ISCED 2011 (0-8) ; les niveaux tertiaires (5-8) sont exclus car les établissements
        à ces niveaux sont des universités et autres établissements d'enseignement supérieur plutôt que
        des écoles.
      standard_json: '{"name": "UNESCO International Standard Classification of Education (ISCED) 2011",
        "notes": "ISCED 2011 is the authoritative international framework for classifying education levels.
        Codes here are the ISCED level integers 0-4. Many national school systems map directly to these
        levels (e.g., primary = ISCED 1, lower secondary = ISCED 2, upper secondary = ISCED 3). Tertiary
        levels 5-8 are outside the scope of this vocabulary.", "uri": "https://uis.unesco.org/en/topic/international-standard-classification-education-isced"}'
      bibliography_refs: '["isced-2011"]'
  SchoolType:
    enum_uri: publicschema:SchoolType
    title: School Type
    description: The management and funding classification of a school, distinguishing public schools
      managed by government authorities from private, faith-based, and community-managed institutions.
      Based on UNESCO UIS categories for private/public school classification in the ISCED framework.
    status: bibo:draft
    permissible_values:
      public:
        meaning: publicschema:SchoolType/public
        title: Public school
        description: School managed and primarily funded by a government authority (national, regional,
          or local). Follows public education curricula and standards.
        annotations:
          label_es: Escuela pública
          label_fr: École publique
          description_es: Escuela gestionada y financiada principalmente por una autoridad gubernamental
            (nacional, regional o local). Sigue los planes de estudio y normas de la educación pública.
          description_fr: École gérée et principalement financée par une autorité gouvernementale (nationale,
            régionale ou locale). Suit les programmes et normes de l'éducation publique.
      private:
        meaning: publicschema:SchoolType/private
        title: Private school
        description: School managed by a non-government body (individual owner, company, or non-profit
          foundation), operating independently of direct government management. May receive partial government
          funding.
        annotations:
          label_es: Escuela privada
          label_fr: École privée
          description_es: Escuela gestionada por un organismo no gubernamental (propietario individual,
            empresa o fundación sin fines de lucro), que opera de forma independiente de la gestión gubernamental
            directa. Puede recibir financiamiento gubernamental parcial.
          description_fr: École gérée par un organisme non gouvernemental (propriétaire individuel, entreprise
            ou fondation à but non lucratif), fonctionnant indépendamment de la gestion directe du gouvernement.
            Peut recevoir un financement partiel du gouvernement.
      faith_based:
        meaning: publicschema:SchoolType/faith_based
        title: Faith-based school
        description: School established and operated by a religious organization (church, mosque, temple,
          or similar body), which may also deliver religious instruction as part of its curriculum.
        annotations:
          label_es: Escuela confesional
          label_fr: École confessionnelle
          description_es: Escuela establecida y operada por una organización religiosa (iglesia, mezquita,
            templo u organismo similar), que también puede impartir instrucción religiosa como parte de
            su plan de estudios.
          description_fr: École établie et gérée par une organisation religieuse (église, mosquée, temple
            ou organisme similaire), qui peut également dispenser un enseignement religieux dans le cadre
            de son programme.
      community:
        meaning: publicschema:SchoolType/community
        title: Community school
        description: School established and managed by a local community or parent group, typically in
          areas where government or private provision is absent or insufficient. Common in humanitarian
          and fragile-state contexts.
        annotations:
          label_es: Escuela comunitaria
          label_fr: École communautaire
          description_es: Escuela establecida y gestionada por una comunidad local o un grupo de padres,
            típicamente en áreas donde la provisión gubernamental o privada está ausente o es insuficiente.
            Común en contextos humanitarios y de estados frágiles.
          description_fr: École établie et gérée par une communauté locale ou un groupe de parents, généralement
            dans des zones où l'offre publique ou privée est absente ou insuffisante. Fréquente dans les
            contextes humanitaires et d'États fragiles.
      other:
        meaning: publicschema:SchoolType/other
        title: Other
        description: A school management type not covered by the other categories, such as international
          schools or joint government-private partnership schools.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de gestión escolar no cubierto por las otras categorías, como escuelas
            internacionales o escuelas en régimen de asociación público-privada.
          description_fr: Un type de gestion d'école non couvert par les autres catégories, tel que les
            écoles internationales ou les écoles en partenariat public-privé.
    annotations:
      label_es: Tipo de escuela
      label_fr: Type d'école
      description_es: La clasificación de gestión y financiamiento de una escuela, que distingue las escuelas
        públicas gestionadas por autoridades gubernamentales de las instituciones privadas, confesionales
        y gestionadas por la comunidad. Basado en las categorías del Instituto de Estadística de la UNESCO
        para la clasificación de escuelas privadas/públicas en el marco ISCED.
      description_fr: La classification de gestion et de financement d'une école, distinguant les écoles
        publiques gérées par les autorités gouvernementales des institutions privées, confessionnelles
        et gérées par la communauté. Basé sur les catégories de l'Institut de statistique de l'UNESCO
        pour la classification des écoles privées/publiques dans le cadre ISCED.
      standard_json: '{"name": "UNESCO UIS ISCED 2011 — Operational Manual (Chapter 4, Management and
        Funding)", "notes": "UNESCO UIS distinguishes government-managed, government-aided private, independent
        private, and international institutions in the ISCED operational manual. This vocabulary maps
        to those categories at the school level. The ''faith-based'' and ''community'' codes are commonly
        used in humanitarian and development contexts (e.g. Education Cluster 4W reporting) and correspond
        broadly to the UIS independent private / non-government categories.", "uri": "https://uis.unesco.org/en/topic/international-standard-classification-education-isced"}'
      bibliography_refs: '["isced-2011"]'
