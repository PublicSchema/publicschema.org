  ServicePointType:
    enum_uri: publicschema:ServicePointType
    title: Service Point Type
    description: The category of service delivered at a service point, covering health, education, distribution,
      WASH, protection, civil registration, community services, and markets.
    status: bibo:draft
    permissible_values:
      health_facility:
        meaning: publicschema:ServicePointType/health_facility
        title: Health facility
        description: Service point delivering clinical or preventive health care (hospital, health center,
          health post, dispensary, pharmacy, laboratory).
        annotations:
          label_es: Establecimiento de salud
          label_fr: Établissement de santé
          description_es: Punto de servicio que presta atención sanitaria clínica o preventiva (hospital,
            centro de salud, puesto de salud, dispensario, farmacia, laboratorio).
          description_fr: Point de service fournissant des soins de santé cliniques ou préventifs (hôpital,
            centre de santé, poste de santé, dispensaire, pharmacie, laboratoire).
      education_facility:
        meaning: publicschema:ServicePointType/education_facility
        title: Education facility
        description: Service point delivering formal or non-formal education, such as a school, learning
          center, or vocational training center.
        annotations:
          label_es: Establecimiento educativo
          label_fr: Établissement éducatif
          description_es: Punto de servicio que presta educación formal o no formal, como una escuela,
            un centro de aprendizaje o un centro de formación profesional.
          description_fr: Point de service fournissant une éducation formelle ou non formelle, tel qu'une
            école, un centre d'apprentissage ou un centre de formation professionnelle.
      distribution_point:
        meaning: publicschema:ServicePointType/distribution_point
        title: Distribution point
        description: Site where relief, cash, or in-kind aid is distributed to recipients.
        annotations:
          label_es: Punto de distribución
          label_fr: Point de distribution
          description_es: Sitio donde se distribuye ayuda de socorro, en efectivo o en especie, a los
            beneficiarios.
          description_fr: Site où l'aide d'urgence, en espèces ou en nature, est distribuée aux bénéficiaires.
      water_point:
        meaning: publicschema:ServicePointType/water_point
        title: Water point
        description: Public water access point such as a tap, borehole, hand pump, or water kiosk.
        annotations:
          label_es: Punto de agua
          label_fr: Point d'eau
          description_es: Punto público de acceso al agua como un grifo, un pozo, una bomba manual o un
            quiosco de agua.
          description_fr: Point d'accès public à l'eau tel qu'un robinet, un forage, une pompe manuelle
            ou une borne-fontaine.
      sanitation_facility:
        meaning: publicschema:ServicePointType/sanitation_facility
        title: Sanitation facility
        description: Public latrine, bathing block, handwashing station, or solid-waste collection point.
        annotations:
          label_es: Instalación sanitaria
          label_fr: Installation sanitaire
          description_es: Letrinas públicas, bloque de baños, estación de lavado de manos o punto de recolección
            de residuos sólidos.
          description_fr: Latrines publiques, bloc sanitaire, point de lavage des mains ou point de collecte
            des déchets solides.
      protection_service_point:
        meaning: publicschema:ServicePointType/protection_service_point
        title: Protection service point
        description: Women's or child-friendly space, protection desk, safe space, or other site offering
          protection services.
        annotations:
          label_es: Punto de servicios de protección
          label_fr: Point de services de protection
          description_es: Espacio amigable para mujeres o niños, mostrador de protección, espacio seguro
            u otro sitio que ofrece servicios de protección.
          description_fr: Espace ami des femmes ou des enfants, guichet de protection, espace sûr ou autre
            site offrant des services de protection.
      registration_center:
        meaning: publicschema:ServicePointType/registration_center
        title: Registration center
        description: Civil registration office, refugee registration site, or identity enrollment center.
        annotations:
          label_es: Centro de registro
          label_fr: Centre d'enregistrement
          description_es: Oficina de registro civil, sitio de registro de refugiados o centro de enrolamiento
            de identidad.
          description_fr: Bureau d'état civil, site d'enregistrement des réfugiés ou centre d'enrôlement
            d'identité.
      community_center:
        meaning: publicschema:ServicePointType/community_center
        title: Community center
        description: Multi-purpose community hall, meeting point, or youth center serving as a gathering
          space for local services.
        annotations:
          label_es: Centro comunitario
          label_fr: Centre communautaire
          description_es: Sala comunitaria polivalente, punto de encuentro o centro juvenil que sirve
            como espacio de reunión para los servicios locales.
          description_fr: Salle communautaire polyvalente, point de rencontre ou centre de jeunesse servant
            d'espace de rassemblement pour les services locaux.
      market:
        meaning: publicschema:ServicePointType/market
        title: Market
        description: Physical marketplace or local trading venue (permanent or periodic) where vendors
          supply food, non-food items, or services to a surrounding population. Used for market-functionality
          and price-monitoring assessments.
        annotations:
          label_es: Mercado
          label_fr: Marché
          description_es: Mercado físico o lugar de comercio local (permanente o periódico) donde los
            vendedores suministran alimentos, artículos no alimentarios o servicios a una población circundante.
            Utilizado para evaluaciones de funcionalidad de mercados y seguimiento de precios.
          description_fr: Marché physique ou lieu de commerce local (permanent ou périodique) où les vendeurs
            fournissent des denrées alimentaires, des articles non alimentaires ou des services à une
            population environnante. Utilisé pour les évaluations de fonctionnalité des marchés et de
            suivi des prix.
      other:
        meaning: publicschema:ServicePointType/other
        title: Other
        description: A service point type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de punto de servicio no cubierto por las otras categorías.
          description_fr: Un type de point de service non couvert par les autres catégories.
    annotations:
      label_es: Tipo de punto de servicio
      label_fr: Type de point de service
      description_es: La categoría de servicio prestado en un punto de servicio, que abarca salud, educación,
        distribución, agua y saneamiento, protección, registro civil, servicios comunitarios y mercados.
      description_fr: La catégorie de service fournie à un point de service, couvrant la santé, l'éducation,
        la distribution, l'eau et l'assainissement, la protection, l'enregistrement civil, les services
        communautaires et les marchés.
      vocab_references_json: '[{"machine_readable": false, "name": "OCHA Humanitarian Data Exchange (HDX)
        Common Operational Datasets", "notes": "No single cross-sector standard defines service-point
        categories. This vocabulary is a cross-domain enumeration harmonized from common humanitarian
        operational datasets, civic-tech service registries, and sector-specific typologies (e.g. WHO
        SARA for health, JMP for WASH, cluster 4W reporting for distributions).", "relationship": "prose_guidance",
        "uri": "https://data.humdata.org/"}]'
  SettlementType:
    enum_uri: publicschema:SettlementType
    title: Settlement Type
    description: The classification of the area where a household is located by degree of urbanization,
      based on the UN Degree of Urbanisation (DEGURBA) framework.
    status: bibo:draft
    permissible_values:
      urban:
        meaning: publicschema:SettlementType/urban
        title: Urban
        description: Cities and densely populated areas (DEGURBA class 1). Population >= 50,000 in contiguous
          high-density grid cells.
        annotations:
          label_es: Urbano
          label_fr: Urbain
          description_es: Ciudades y áreas densamente pobladas (clase DEGURBA 1). Población >= 50.000
            en celdas de cuadrícula de alta densidad contiguas.
          description_fr: Villes et zones densément peuplées (classe DEGURBA 1). Population >= 50 000
            dans des cellules de grille à haute densité contiguës.
      semi_urban:
        meaning: publicschema:SettlementType/semi_urban
        title: Semi-urban
        description: Towns and semi-dense areas (DEGURBA class 2). Population >= 5,000 in contiguous moderate-density
          grid cells, not classified as urban.
        annotations:
          label_es: Semiurbano
          label_fr: Semi-urbain
          description_es: Ciudades pequeñas y áreas semidensas (clase DEGURBA 2). Población >= 5.000 en
            celdas de cuadrícula de densidad moderada contiguas, no clasificadas como urbanas.
          description_fr: Villes et zones semi-denses (classe DEGURBA 2). Population >= 5 000 dans des
            cellules de grille à densité modérée contiguës, non classifiées comme urbaines.
      rural:
        meaning: publicschema:SettlementType/rural
        title: Rural
        description: Rural and thinly populated areas (DEGURBA class 3). Areas not classified as urban
          or semi-urban.
        annotations:
          label_es: Rural
          label_fr: Rural
          description_es: Zonas rurales y escasamente pobladas (clase DEGURBA 3). Áreas no clasificadas
            como urbanas o semiurbanas.
          description_fr: Zones rurales et peu peuplées (classe DEGURBA 3). Zones non classifiées comme
            urbaines ou semi-urbaines.
    annotations:
      label_es: Tipo de asentamiento
      label_fr: Type de localité
      description_es: La clasificación del área donde se ubica un hogar según el grado de urbanización,
        basada en el marco DEGURBA de las Naciones Unidas.
      description_fr: La classification de la zone où se trouve un ménage selon le degré d'urbanisation,
        basée sur le cadre DEGURBA des Nations Unies.
      standard_json: '{"name": "UN Degree of Urbanisation (DEGURBA)", "notes": "Adopted by the UN Statistical
        Commission in 2020. Developed by EU, FAO, ILO, OECD, UN-Habitat, and World Bank. Provides a methodology-based
        framework for classifying areas by population density and contiguity.", "uri": "https://unstats.un.org/unsd/demographic-social/census/documents/degurba/"}'
      bibliography_refs: '["dhs-recode7", "mics6", "un-degurba"]'
  Sex:
    enum_uri: publicschema:Sex
    title: Sex
    description: The biological sex of a person as recorded in an official register or identity document,
      following ISO/IEC 5218.
    status: bibo:status/published
    permissible_values:
      not_known:
        meaning: publicschema:Sex/not_known
        title: Not known
        description: Sex has not been recorded or is not known.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El sexo no ha sido registrado o no se conoce.
          description_fr: Le sexe n'a pas été enregistré ou n'est pas connu.
          standard_code: '0'
      male:
        meaning: publicschema:Sex/male
        title: Male
        description: Male sex.
        annotations:
          label_es: Masculino
          label_fr: Masculin
          description_es: Sexo masculino.
          description_fr: Sexe masculin.
          standard_code: '1'
        exact_mappings:
        - dci:DciSexCategoryEnum/male
        - opencrvs:OpencrvsGender/male
        - fhir-r4:FhirR4AdministrativeGender/male
        - semic:SemicEUHumanSexNAL/male
      female:
        meaning: publicschema:Sex/female
        title: Female
        description: Female sex.
        annotations:
          label_es: Femenino
          label_fr: Féminin
          description_es: Sexo femenino.
          description_fr: Sexe féminin.
          standard_code: '2'
        exact_mappings:
        - dci:DciSexCategoryEnum/female
        - opencrvs:OpencrvsGender/female
        - fhir-r4:FhirR4AdministrativeGender/female
        - semic:SemicEUHumanSexNAL/female
      not_applicable:
        meaning: publicschema:Sex/not_applicable
        title: Not applicable
        description: Sex is not applicable in this context (e.g., legal entities).
        annotations:
          label_es: No aplica
          label_fr: Non applicable
          description_es: El sexo no es aplicable en este contexto (por ej., entidades jurídicas).
          description_fr: Le sexe n'est pas applicable dans ce contexte (par ex., entités juridiques).
          standard_code: '9'
    close_mappings:
    - http://publications.europa.eu/resource/authority/human-sex
    annotations:
      label_es: Sexo
      label_fr: Sexe
      description_es: El sexo biológico de una persona tal como se registra en un registro oficial o documento
        de identidad, según la norma ISO/IEC 5218.
      description_fr: Le sexe biologique d'une personne tel qu'enregistré dans un registre officiel ou
        un document d'identité, selon la norme ISO/IEC 5218.
      external_alignments_json: '[{"label": "Human Sex", "match": "close", "note": "EU Named Authority
        List for human sex, based on ISO/IEC 5218. The NAL carries 5 non-deprecated concepts (MALE, FEMALE,
        NKN, NAP, NST); PublicSchema has 4. NST (not stated) distinguishes disclosure refusal from unknown
        status and has no counterpart here.", "uri": "http://publications.europa.eu/resource/authority/human-sex",
        "vocabulary": "Core Person", "vocabulary_id": "semic"}]'
      standard_json: '{"name": "ISO/IEC 5218:2022", "notes": "Codes for the representation of human sexes,
        per ISO/IEC 5218:2022 (which supersedes the withdrawn ISO/IEC 5218:2004). The 2022 revision retains
        the same four code points (0, 1, 2, 9) with the same semantics. Numeric codes mapped to readable
        identifiers. EBSI PID schemas extend ISO 5218 with additional codes: 3 (other), 4 (inter), 5 (diverse),
        6 (open). PublicSchema follows the base ISO standard. Systems using those extension values should
        leave them unmapped here or use a local extension rather than collapsing them into ISO 5218 ''not
        applicable''.", "uri": "https://www.iso.org/standard/81682.html"}'
      bibliography_refs: '["barca-2021-inclusive-information-systems", "iso-5218", "semic-core-person"]'
  ShelterSituationType:
    enum_uri: publicschema:ShelterSituationType
    title: Shelter Situation Type
    description: The type of shelter arrangement currently occupied by the household, particularly relevant
      when the original dwelling is damaged or unavailable. Complements dwelling_type (which records the
      household's usual dwelling) by recording what the household is actually living in at the moment
      of assessment.
    status: bibo:draft
    permissible_values:
      original_home:
        meaning: publicschema:ShelterSituationType/original_home
        title: Original home
        description: Household remains in its usual dwelling.
        annotations:
          label_es: Vivienda original
          label_fr: Logement d'origine
          description_es: El hogar permanece en su vivienda habitual.
          description_fr: Le ménage demeure dans son logement habituel.
      original_home_repaired:
        meaning: publicschema:ShelterSituationType/original_home_repaired
        title: Original home, partially repaired
        description: Household is back in its usual dwelling after undertaking partial repairs.
        annotations:
          label_es: Vivienda original, parcialmente reparada
          label_fr: Logement d'origine, partiellement réparé
          description_es: El hogar ha regresado a su vivienda habitual tras realizar reparaciones parciales.
          description_fr: Le ménage est retourné dans son logement habituel après avoir effectué des réparations
            partielles.
      tent_or_emergency_shelter:
        meaning: publicschema:ShelterSituationType/tent_or_emergency_shelter
        title: Tent or emergency shelter
        description: Household is living in an emergency tent, plastic-sheeting shelter, or similar emergency
          structure.
        annotations:
          label_es: Tienda o refugio de emergencia
          label_fr: Tente ou abri d'urgence
          description_es: El hogar vive en una tienda de emergencia, un refugio de láminas plásticas o
            estructura de emergencia similar.
          description_fr: Le ménage vit dans une tente d'urgence, un abri en bâches plastiques ou une
            structure d'urgence similaire.
      transitional_shelter:
        meaning: publicschema:ShelterSituationType/transitional_shelter
        title: Transitional shelter
        description: Household is living in a transitional shelter unit provided by a humanitarian agency
          or government, intended as a bridge to permanent reconstruction.
        annotations:
          label_es: Refugio transicional
          label_fr: Abri transitionnel
          description_es: El hogar vive en una unidad de refugio transicional proporcionada por una agencia
            humanitaria o gobierno, concebida como puente hacia la reconstrucción permanente.
          description_fr: Le ménage vit dans une unité d'abri transitionnel fournie par une agence humanitaire
            ou un gouvernement, conçue comme passerelle vers la reconstruction permanente.
      collective_center:
        meaning: publicschema:ShelterSituationType/collective_center
        title: Collective centre
        description: Household is sheltering in a collective centre such as a school, public hall, or
          place of worship being used as temporary accommodation.
        annotations:
          label_es: Centro colectivo
          label_fr: Centre collectif
          description_es: El hogar se alberga en un centro colectivo como una escuela, salón público o
            lugar de culto usado como alojamiento temporal.
          description_fr: Le ménage est abrité dans un centre collectif tel qu'une école, une salle publique
            ou un lieu de culte utilisé comme hébergement temporaire.
      host_family:
        meaning: publicschema:ShelterSituationType/host_family
        title: Hosted by another family
        description: Household is staying with a host family (relatives, friends, or other hosts).
        annotations:
          label_es: Alojado por otra familia
          label_fr: Hébergé par une autre famille
          description_es: El hogar se aloja con una familia anfitriona (familiares, amigos u otros).
          description_fr: Le ménage séjourne chez une famille d'accueil (parents, amis ou autres hôtes).
      rented_accommodation:
        meaning: publicschema:ShelterSituationType/rented_accommodation
        title: Rented accommodation
        description: Household has rented a separate dwelling as temporary or continuing accommodation
          after the shock.
        annotations:
          label_es: Alojamiento alquilado
          label_fr: Logement loué
          description_es: El hogar ha alquilado una vivienda separada como alojamiento temporal o continuo
            tras el choque.
          description_fr: Le ménage a loué un logement séparé comme hébergement temporaire ou continu
            après le choc.
      displacement_site:
        meaning: publicschema:ShelterSituationType/displacement_site
        title: Displacement site or camp
        description: Household is in a managed displacement site or camp.
        annotations:
          label_es: Sitio de desplazamiento o campamento
          label_fr: Site de déplacement ou camp
          description_es: El hogar se encuentra en un sitio de desplazamiento o campamento gestionado.
          description_fr: Le ménage se trouve dans un site de déplacement ou camp géré.
      unsheltered:
        meaning: publicschema:ShelterSituationType/unsheltered
        title: Unsheltered / open air
        description: Household is without shelter (sleeping outside, under tarpaulin strung between trees,
          or in vehicles).
        annotations:
          label_es: Sin refugio / a la intemperie
          label_fr: Sans abri / à l'air libre
          description_es: El hogar está sin refugio (duerme a la intemperie, bajo una lona tendida entre
            árboles, o en vehículos).
          description_fr: Le ménage est sans abri (dort dehors, sous une bâche tendue entre des arbres
            ou dans des véhicules).
      camp_planned:
        meaning: publicschema:ShelterSituationType/camp_planned
        title: Planned or managed camp
        description: Household is living in an official displacement camp or settlement managed by a government,
          UN agency, or NGO with designated administration. Equivalent to IOM DTM site classification
          'planned/managed camp'. Distinct from spontaneous_settlement.
        annotations:
          label_es: Campamento planificado o gestionado
          label_fr: Camp planifié ou géré
          description_es: El hogar vive en un campamento o asentamiento de desplazamiento oficial administrado
            por un gobierno, agencia de la ONU u ONG con administración designada. Equivalente a la clasificación
            de sitio IOM DTM 'campamento planificado/gestionado'. Distinto de spontaneous_settlement.
          description_fr: Le ménage vit dans un camp ou site de déplacement officiel géré par un gouvernement,
            une agence de l'ONU ou une ONG avec une administration désignée. Équivalent à la classification
            de site DTM de l'OIM 'camp planifié/géré'. Distinct de spontaneous_settlement.
      spontaneous_settlement:
        meaning: publicschema:ShelterSituationType/spontaneous_settlement
        title: Spontaneous or informal settlement
        description: Household is living in an unplanned settlement that emerged organically, often on
          public or private land without official sanction or management. Equivalent to IOM DTM site classification
          'informal/spontaneous settlement'.
        annotations:
          label_es: Asentamiento espontáneo o informal
          label_fr: Établissement spontané ou informel
          description_es: El hogar vive en un asentamiento no planificado que surgió de forma orgánica,
            frecuentemente en tierras públicas o privadas sin sanción ni gestión oficial. Equivalente
            a la clasificación de sitio IOM DTM 'asentamiento informal/espontáneo'.
          description_fr: Le ménage vit dans un établissement non planifié qui s'est développé de manière
            organique, souvent sur des terres publiques ou privées sans autorisation ni gestion officielle.
            Équivalent à la classification de site DTM de l'OIM 'établissement informel/spontané'.
    annotations:
      label_es: Tipo de situación de refugio
      label_fr: Type de situation d'abri
      description_es: El tipo de arreglo de refugio actualmente ocupado por el hogar, particularmente
        relevante cuando la vivienda original está dañada o no disponible. Complementa dwelling_type (que
        consigna la vivienda habitual del hogar) al registrar dónde vive realmente el hogar al momento
        de la evaluación.
      description_fr: Le type d'arrangement d'abri actuellement occupé par le ménage, particulièrement
        pertinent lorsque le logement d'origine est endommagé ou indisponible. Complète dwelling_type
        (qui consigne le logement habituel du ménage) en consignant où le ménage vit réellement au moment
        de l'évaluation.
      standard_json: '{"name": "Global Shelter Cluster post-disaster shelter situation categories", "uri":
        "https://sheltercluster.org/"}'
      bibliography_refs: '["global-shelter-cluster"]'
  BenefitFrequency:
    enum_uri: publicschema:BenefitFrequency
    title: Benefit Frequency
    description: The schedule on which a benefit or transfer is provided to a recipient, ranging from
      one-time payments to recurring disbursements at fixed intervals.
    status: bibo:draft
    permissible_values:
      one_time:
        meaning: publicschema:BenefitFrequency/one_time
        title: One-time
        description: A single, non-recurring transfer or benefit.
        annotations:
          label_es: Único
          label_fr: Ponctuel
          description_es: Una transferencia o prestación única, no recurrente.
          description_fr: Un transfert ou une prestation unique, non récurrent.
      daily:
        meaning: publicschema:BenefitFrequency/daily
        title: Daily
        description: Benefit provided every day.
        annotations:
          label_es: Diario
          label_fr: Quotidien
          description_es: Prestación proporcionada cada día.
          description_fr: Prestation fournie chaque jour.
        exact_mappings:
        - semic:SemicEUFrequencyNAL/daily
      weekly:
        meaning: publicschema:BenefitFrequency/weekly
        title: Weekly
        description: Benefit provided once per week.
        annotations:
          label_es: Semanal
          label_fr: Hebdomadaire
          description_es: Prestación proporcionada una vez por semana.
          description_fr: Prestation fournie une fois par semaine.
        exact_mappings:
        - semic:SemicEUFrequencyNAL/weekly
      every_two_weeks:
        meaning: publicschema:BenefitFrequency/every_two_weeks
        title: Every two weeks
        description: Benefit provided every two weeks.
        annotations:
          label_es: Cada dos semanas
          label_fr: Toutes les deux semaines
          description_es: Prestación proporcionada cada dos semanas.
          description_fr: Prestation fournie toutes les deux semaines.
      monthly:
        meaning: publicschema:BenefitFrequency/monthly
        title: Monthly
        description: Benefit provided once per month.
        annotations:
          label_es: Mensual
          label_fr: Mensuel
          description_es: Prestación proporcionada una vez al mes.
          description_fr: Prestation fournie une fois par mois.
        exact_mappings:
        - semic:SemicEUFrequencyNAL/monthly
      quarterly:
        meaning: publicschema:BenefitFrequency/quarterly
        title: Quarterly
        description: Benefit provided once every three months.
        annotations:
          label_es: Trimestral
          label_fr: Trimestriel
          description_es: Prestación proporcionada una vez cada tres meses.
          description_fr: Prestation fournie une fois tous les trois mois.
        exact_mappings:
        - semic:SemicEUFrequencyNAL/quarterly
      semi_annually:
        meaning: publicschema:BenefitFrequency/semi_annually
        title: Semi-annually
        description: Benefit provided twice per year (every six months).
        annotations:
          label_es: Semestral
          label_fr: Semestriel
          description_es: Prestación proporcionada dos veces al año (cada seis meses).
          description_fr: Prestation fournie deux fois par an (tous les six mois).
      annually:
        meaning: publicschema:BenefitFrequency/annually
        title: Annually
        description: Benefit provided once per year.
        annotations:
          label_es: Anual
          label_fr: Annuel
          description_es: Prestación proporcionada una vez al año.
          description_fr: Prestation fournie une fois par an.
      as_needed:
        meaning: publicschema:BenefitFrequency/as_needed
        title: As needed
        description: Benefit provided on demand or as circumstances require, without a fixed schedule.
        annotations:
          label_es: Según necesidad
          label_fr: Selon les besoins
          description_es: Prestación proporcionada a demanda o según las circunstancias lo requieran,
            sin un calendario fijo.
          description_fr: Prestation fournie à la demande ou selon les circonstances, sans calendrier
            fixe.
      custom:
        meaning: publicschema:BenefitFrequency/custom
        title: Custom
        description: A recurrence schedule not covered by the predefined frequencies, specified as an
          iCalendar RRULE (RFC 5545) in the frequency_rule property.
        annotations:
          label_es: Personalizado
          label_fr: Personnalisé
          description_es: Un calendario de recurrencia no cubierto por las frecuencias predefinidas, especificado
            como una RRULE de iCalendar (RFC 5545) en la propiedad frequency_rule.
          description_fr: Un calendrier de récurrence non couvert par les fréquences prédéfinies, spécifié
            sous forme de RRULE iCalendar (RFC 5545) dans la propriété frequency_rule.
    annotations:
      label_es: Frecuencia de prestaciones
      label_fr: Fréquence des prestations
      description_es: El calendario con el que se otorga una prestación o transferencia a un beneficiario,
        desde pagos únicos hasta desembolsos recurrentes a intervalos fijos.
      description_fr: Le calendrier selon lequel une prestation ou un transfert est fourni à un bénéficiaire,
        allant des paiements uniques aux versements récurrents à intervalles fixes.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": true, "name": "ISO 20022 EventFrequency1Code", "notes":
        "ISO 20022 frequency codes map to monthly, quarterly, semi_annually, annually. This vocabulary
        includes additional values not in ISO 20022.", "relationship": "partial_overlap", "uri": "https://www.iso20022.org/catalogue-messages/additional-content-messages/external-code-sets"},
        {"machine_readable": true, "name": "RFC 5545 - iCalendar RRULE", "notes": "The ''custom'' code
        uses RRULE format.", "relationship": "structural_pattern", "uri": "https://datatracker.ietf.org/doc/html/rfc5545#section-3.3.10"}]'
      bibliography_refs: '["iso-20022-frequency", "rfc-5545"]'
  BenefitModality:
    enum_uri: publicschema:BenefitModality
    title: Benefit Modality
    description: The form in which a benefit or entitlement is delivered to a beneficiary.
    status: bibo:status/published
    permissible_values:
      cash:
        meaning: publicschema:BenefitModality/cash
        title: Cash
        description: A direct monetary transfer to the beneficiary, delivered as physical currency or
          electronic funds.
        annotations:
          label_es: Efectivo
          label_fr: Espèces
          description_es: Una transferencia monetaria directa al beneficiario, entregada como moneda física
            o fondos electrónicos.
          description_fr: Un transfert monétaire direct au bénéficiaire, sous forme d'espèces physiques
            ou de fonds électroniques.
        exact_mappings:
        - openspp:OpensppBenefitModality/cash
      voucher:
        meaning: publicschema:BenefitModality/voucher
        title: Voucher
        description: A redeemable document or code that entitles the holder to obtain goods or services
          from a designated provider.
        annotations:
          label_es: Vale
          label_fr: Bon
          description_es: Un documento o código canjeable que da derecho al titular a obtener bienes o
            servicios de un proveedor designado.
          description_fr: Un document ou code échangeable qui donne droit au titulaire d'obtenir des biens
            ou services auprès d'un prestataire désigné.
      in_kind:
        meaning: publicschema:BenefitModality/in_kind
        title: In-kind
        description: Physical goods (food, clothing, agricultural inputs, etc.) provided directly rather
          than as a monetary equivalent.
        annotations:
          label_es: En especie
          label_fr: En nature
          description_es: Bienes físicos (alimentos, ropa, insumos agrícolas, etc.) proporcionados directamente
            en lugar de como equivalente monetario.
          description_fr: Biens physiques (nourriture, vêtements, intrants agricoles, etc.) fournis directement
            plutôt que sous forme d'équivalent monétaire.
      service:
        meaning: publicschema:BenefitModality/service
        title: Service
        description: Access to a social service such as healthcare, education, childcare, or skills training
          provided as the benefit.
        annotations:
          label_es: Servicio
          label_fr: Service
          description_es: Acceso a un servicio social como atención médica, educación, cuidado infantil
            o formación profesional, proporcionado como prestación.
          description_fr: Accès à un service social tel que les soins de santé, l'éducation, la garde
            d'enfants ou la formation professionnelle fourni comme prestation.
      fee_waiver:
        meaning: publicschema:BenefitModality/fee_waiver
        title: Fee waiver
        description: An exemption from a fee or charge that would otherwise apply, such as school fees,
          health co-payments, or utility costs.
        annotations:
          label_es: Exención de tarifa
          label_fr: Exonération de frais
          description_es: Una exención de una tarifa o cargo que de otro modo se aplicaría, como cuotas
            escolares, copagos de salud o costos de servicios públicos.
          description_fr: Une exonération d'une redevance ou d'un frais qui s'appliquerait autrement,
            comme les frais de scolarité, les co-paiements de santé ou les coûts des services publics.
      insurance:
        meaning: publicschema:BenefitModality/insurance
        title: Insurance
        description: Enrollment in or subsidization of an insurance scheme (health, crop, social) as the
          benefit provided to the beneficiary.
        annotations:
          label_es: Seguro
          label_fr: Assurance
          description_es: Inscripción en un régimen de seguro o subvención del mismo (salud, cosechas,
            social) como prestación proporcionada al beneficiario.
          description_fr: Inscription à un régime d'assurance ou subvention de celui-ci (santé, récolte,
            social) comme prestation fournie au bénéficiaire.
    annotations:
      label_es: Modalidad de prestación
      label_fr: Modalité de prestation
      description_es: La forma en que se entrega una prestación o derecho a un beneficiario.
      description_fr: La forme sous laquelle une prestation ou un droit est remis à un bénéficiaire.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": false, "name": "CaLP Network Glossary", "relationship":
        "partial_overlap", "uri": "https://www.calpnetwork.org/resources/glossary-of-terms/"}, {"machine_readable":
        false, "name": "WFP Transfer Modality Framework", "relationship": "partial_overlap", "uri": "https://executiveboard.wfp.org/document_download/WFP-0000148946"}]'
      see_also_json: '[{"note": "benefit-modality describes what form the benefit takes (cash, voucher,
        in-kind); delivery-channel describes how it reaches the beneficiary (bank transfer, mobile money,
        agent). The two are orthogonal: a voucher (modality) can be delivered as e-voucher or paper voucher
        (channels).", "vocabulary": "delivery-channel"}]'
      bibliography_refs: '["calp-glossary", "wfp-transfer-modality"]'
  ConditionalityType:
    enum_uri: publicschema:ConditionalityType
    title: Conditionality Type
    description: Categories describing whether and how a social protection program requires beneficiaries
      to meet behavioral conditions to receive or continue receiving benefits.
    status: bibo:draft
    permissible_values:
      unconditional:
        meaning: publicschema:ConditionalityType/unconditional
        title: Unconditional
        description: Benefits are provided without requiring the beneficiary to fulfill any behavioral
          conditions.
        annotations:
          label_es: Incondicional
          label_fr: Inconditionnel
          description_es: Las prestaciones se proporcionan sin exigir que el beneficiario cumpla condiciones
            de comportamiento.
          description_fr: Les prestations sont accordées sans exiger que le bénéficiaire satisfasse à
            des conditions comportementales.
      conditional:
        meaning: publicschema:ConditionalityType/conditional
        title: Conditional
        description: Benefits require the beneficiary to meet specified behavioral conditions, such as
          school attendance, health checkups, or participation in training.
        annotations:
          label_es: Condicional
          label_fr: Conditionnel
          description_es: Las prestaciones requieren que el beneficiario cumpla condiciones de comportamiento
            especificadas, como asistencia escolar, controles de salud o participación en capacitación.
          description_fr: Les prestations sont soumises à la satisfaction, par le bénéficiaire, de conditions
            comportementales définies, telles que la fréquentation scolaire, les bilans de santé ou la
            participation à des formations.
      soft_conditional:
        meaning: publicschema:ConditionalityType/soft_conditional
        title: Soft conditional
        description: Conditions are encouraged and monitored but non-compliance does not result in benefit
          suspension or termination.
        annotations:
          label_es: Condicional flexible
          label_fr: Conditionnel souple
          description_es: Las condiciones se fomentan y se supervisan, pero el incumplimiento no da lugar
            a la suspensión o terminación de las prestaciones.
          description_fr: Les conditions sont encouragées et suivies mais le non-respect n'entraîne pas
            la suspension ou la fin des prestations.
      labelled:
        meaning: publicschema:ConditionalityType/labelled
        title: Labelled
        description: Benefits are designated for a specific purpose (e.g., food, education) but spending
          is not strictly enforced or verified.
        annotations:
          label_es: Etiquetado
          label_fr: À usage désigné
          description_es: Las prestaciones se destinan a un propósito específico (p. ej., alimentación,
            educación), pero el gasto no se aplica ni verifica de manera estricta.
          description_fr: Les prestations sont affectées à un usage précis (par ex., alimentation, éducation)
            mais les dépenses ne sont pas strictement contrôlées ni vérifiées.
    annotations:
      label_es: Tipo de condicionalidad
      label_fr: Type de conditionnalité
      description_es: Categorías que describen si y cómo un programa de protección social requiere que
        los beneficiarios cumplan condiciones de comportamiento para recibir o continuar recibiendo beneficios.
      description_fr: Catégories décrivant si et comment un programme de protection sociale exige des
        bénéficiaires qu'ils satisfassent à des conditions comportementales pour recevoir ou continuer
        à recevoir des prestations.
      source_domain: sp
  EligibilityStatus:
    enum_uri: publicschema:EligibilityStatus
    title: Eligibility Status
    description: The possible outcomes of a formal eligibility determination for a program or service.
    status: bibo:draft
    permissible_values:
      eligible:
        meaning: publicschema:EligibilityStatus/eligible
        title: Eligible
        description: The subject meets the program's criteria and is approved to receive benefits.
        annotations:
          label_es: Elegible
          label_fr: Admissible
          description_es: El sujeto cumple los criterios del programa y está aprobado para recibir beneficios.
          description_fr: Le sujet satisfait aux critères du programme et est admis à recevoir des prestations.
      ineligible:
        meaning: publicschema:EligibilityStatus/ineligible
        title: Ineligible
        description: The subject does not meet the program's criteria and is not approved for benefits.
        annotations:
          label_es: No elegible
          label_fr: Non admissible
          description_es: El sujeto no cumple los criterios del programa y no está aprobado para recibir
            beneficios.
          description_fr: Le sujet ne satisfait pas aux critères du programme et n'est pas admis à recevoir
            des prestations.
      pending:
        meaning: publicschema:EligibilityStatus/pending
        title: Pending
        description: The eligibility determination is in progress and a final decision has not yet been
          issued.
        annotations:
          label_es: Pendiente
          label_fr: En attente
          description_es: La determinación de elegibilidad está en curso y aún no se ha emitido una decisión
            final.
          description_fr: La détermination de l'admissibilité est en cours et une décision finale n'a
            pas encore été rendue.
      under_review:
        meaning: publicschema:EligibilityStatus/under_review
        title: Under review
        description: The eligibility assessment is actively being evaluated by a case worker or review
          body.
        annotations:
          label_es: En revisión
          label_fr: En cours d'examen
          description_es: La evaluación de elegibilidad está siendo evaluada activamente por un trabajador
            social o un órgano de revisión.
          description_fr: L'évaluation de l'admissibilité est activement conduite par un agent de terrain
            ou un organe d'examen.
      conditional:
        meaning: publicschema:EligibilityStatus/conditional
        title: Conditional
        description: The subject is eligible provided they meet additional conditions, such as school
          attendance or health check-ups.
        annotations:
          label_es: Condicional
          label_fr: Conditionnel
          description_es: El sujeto es elegible siempre que cumpla condiciones adicionales, como asistencia
            escolar o chequeos de salud.
          description_fr: Le sujet est admissible à condition de satisfaire à des conditions supplémentaires,
            telles que la fréquentation scolaire ou les examens médicaux.
    annotations:
      label_es: Estado de elegibilidad
      label_fr: Statut d'éligibilité
      description_es: Los posibles resultados de una determinación formal de elegibilidad para un programa
        o servicio.
      description_fr: Les résultats possibles d'une détermination formelle d'admissibilité à un programme
        ou service.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": true, "name": "HL7 FHIR CoverageEligibilityResponse",
        "notes": "FHIR separates eligibility outcome from processing status. This vocabulary keeps both
        in a single lifecycle.", "relationship": "structural_pattern", "uri": "https://build.fhir.org/coverageeligibilityresponse-definitions.html"}]'
      vc_guidance_json: '"For Verifiable Credential use, only terminal states (eligible, ineligible, conditional)
        should appear in credentials. Process states (pending, under_review) are transient and should
        not be attested in a credential.\n"'
      bibliography_refs: '["barca-2017-integrating-data", "fhir-coverage-eligibility", "w3c-vc-data-model-2"]'
  EnrollmentExitReason:
    enum_uri: publicschema:EnrollmentExitReason
    title: Enrollment Exit Reason
    description: The reason an enrollment was permanently closed. Applies when enrollment status is closed,
      not when graduated.
    status: bibo:draft
    permissible_values:
      voluntary_withdrawal:
        meaning: publicschema:EnrollmentExitReason/voluntary_withdrawal
        title: Voluntary withdrawal
        description: The beneficiary chose to leave the program.
        annotations:
          label_es: Retiro voluntario
          label_fr: Retrait volontaire
          description_es: El beneficiario eligió abandonar el programa.
          description_fr: Le bénéficiaire a choisi de quitter le programme.
      non_compliance:
        meaning: publicschema:EnrollmentExitReason/non_compliance
        title: Non-compliance
        description: The beneficiary did not meet ongoing program conditions.
        annotations:
          label_es: Incumplimiento
          label_fr: Non-respect des conditions
          description_es: El beneficiario no cumplió con las condiciones continuas del programa.
          description_fr: Le bénéficiaire n'a pas satisfait aux conditions continues du programme.
      ineligibility:
        meaning: publicschema:EnrollmentExitReason/ineligibility
        title: Ineligibility
        description: The beneficiary was determined to be no longer eligible due to a change in circumstances
          such as income, age, or residency.
        annotations:
          label_es: Inelegibilidad
          label_fr: Non-admissibilité
          description_es: Se determinó que el beneficiario ya no es elegible debido a un cambio de circunstancias
            como ingresos, edad o residencia.
          description_fr: Le bénéficiaire a été reconnu comme n'étant plus admissible en raison d'un changement
            de circonstances, tel que le revenu, l'âge ou la résidence.
      death:
        meaning: publicschema:EnrollmentExitReason/death
        title: Death
        description: The beneficiary died.
        annotations:
          label_es: Fallecimiento
          label_fr: Décès
          description_es: El beneficiario falleció.
          description_fr: Le bénéficiaire est décédé.
      program_end:
        meaning: publicschema:EnrollmentExitReason/program_end
        title: Program end
        description: The program itself ended or the funding cycle closed.
        annotations:
          label_es: Fin del programa
          label_fr: Fin du programme
          description_es: El programa en sí terminó o el ciclo de financiamiento se cerró.
          description_fr: Le programme lui-même s'est terminé ou le cycle de financement a pris fin.
      relocation:
        meaning: publicschema:EnrollmentExitReason/relocation
        title: Relocation
        description: The beneficiary moved out of the program's coverage area.
        annotations:
          label_es: Reubicación
          label_fr: Déménagement
          description_es: El beneficiario se mudó fuera del área de cobertura del programa.
          description_fr: Le bénéficiaire a déménagé hors de la zone de couverture du programme.
      duplicate:
        meaning: publicschema:EnrollmentExitReason/duplicate
        title: Duplicate
        description: The enrollment was identified as a duplicate of another record.
        annotations:
          label_es: Duplicado
          label_fr: Doublon
          description_es: La inscripción fue identificada como un duplicado de otro registro.
          description_fr: L'inscription a été identifiée comme un doublon d'un autre dossier.
      administrative:
        meaning: publicschema:EnrollmentExitReason/administrative
        title: Administrative
        description: Closed for administrative reasons not covered by other codes.
        annotations:
          label_es: Administrativo
          label_fr: Administratif
          description_es: Cerrado por razones administrativas no cubiertas por los otros códigos.
          description_fr: Clôturé pour des raisons administratives non couvertes par les autres codes.
    annotations:
      label_es: Motivo de salida de inscripción
      label_fr: Motif de sortie d'inscription
      description_es: La razón por la cual una inscripción fue cerrada permanentemente. Se aplica cuando
        el estado de inscripción es cerrado, no cuando es graduado.
      description_fr: La raison pour laquelle une inscription a été définitivement clôturée. S'applique
        lorsque le statut d'inscription est clos, et non lorsqu'il est gradué.
      source_domain: sp
  EnrollmentStatus:
    enum_uri: publicschema:EnrollmentStatus
    title: Enrollment Status
    description: The lifecycle states of an enrollment in a program.
    status: bibo:status/published
    permissible_values:
      pending_verification:
        meaning: publicschema:EnrollmentStatus/pending_verification
        title: Pending verification
        description: The enrollment has been initiated but cannot become active until required eligibility,
          identity, or document checks are completed.
        annotations:
          label_es: Verificación pendiente
          label_fr: Vérification en attente
          description_es: La inscripción ha sido iniciada pero no puede volverse activa hasta que se completen
            las verificaciones requeridas de elegibilidad, identidad o documentos.
          description_fr: L'inscription a été initiée mais ne peut pas devenir active tant que les vérifications
            requises d'admissibilité, d'identité ou de documents ne sont pas terminées.
      waitlisted:
        meaning: publicschema:EnrollmentStatus/waitlisted
        title: Waitlisted
        description: The applicant has been verified as eligible but is awaiting an available program
          slot due to capacity or budget constraints.
        annotations:
          label_es: En lista de espera
          label_fr: En liste d'attente
          description_es: El solicitante ha sido verificado como elegible pero está esperando un lugar
            disponible en el programa debido a restricciones de capacidad o presupuesto.
          description_fr: Le demandeur a été reconnu admissible mais attend une place disponible dans
            le programme en raison de contraintes de capacité ou de budget.
      active:
        meaning: publicschema:EnrollmentStatus/active
        title: Active
        description: The enrollment is current and benefits are being delivered.
        annotations:
          label_es: Activo
          label_fr: Actif
          description_es: La inscripción está vigente y las prestaciones se están entregando.
          description_fr: L'inscription est en cours et les prestations sont délivrées.
        exact_mappings:
        - dhis2:Dhis2EnrollmentStatus/active
        - openimis:OpenimisBeneficiaryStatus/active
      suspended:
        meaning: publicschema:EnrollmentStatus/suspended
        title: Suspended
        description: The enrollment has been temporarily paused, typically due to a compliance issue,
          administrative hold, or temporary ineligibility.
        annotations:
          label_es: Suspendido
          label_fr: Suspendu
          description_es: La inscripción ha sido temporalmente suspendida, generalmente debido a un problema
            de cumplimiento, una retención administrativa o una inelegibilidad temporal.
          description_fr: L'inscription a été temporairement suspendue, généralement en raison d'un problème
            de conformité, d'un gel administratif ou d'une inéligibilité temporaire.
        exact_mappings:
        - openimis:OpenimisBeneficiaryStatus/suspended
      closed:
        meaning: publicschema:EnrollmentStatus/closed
        title: Closed
        description: The enrollment has been permanently ended.
        annotations:
          label_es: Cerrado
          label_fr: Clos
          description_es: La inscripción ha sido terminada de forma permanente.
          description_fr: L'inscription a été définitivement clôturée.
      graduated:
        meaning: publicschema:EnrollmentStatus/graduated
        title: Graduated
        description: The beneficiary has successfully exited the program through program-defined graduation
          criteria.
        annotations:
          label_es: Graduado
          label_fr: Sorti avec succès
          description_es: El beneficiario ha salido exitosamente del programa a través de los criterios
            de graduación definidos por el programa.
          description_fr: Le bénéficiaire a quitté le programme avec succès selon les critères de sortie
            définis par le programme.
          source_domain: sp
        exact_mappings:
        - openimis:OpenimisBeneficiaryStatus/graduated
    annotations:
      label_es: Estado de inscripción
      label_fr: Statut d'inscription
      description_es: Los estados del ciclo de vida de una inscripción en un programa.
      description_fr: Les états du cycle de vie d'une inscription dans un programme.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": true, "name": "HL7 FHIR EpisodeOfCare.status", "notes":
        "FHIR''s episode lifecycle informed the structure.", "relationship": "structural_pattern", "uri":
        "https://build.fhir.org/codesystem-episode-of-care-status.json.html"}, {"machine_readable": false,
        "name": "World Bank Social Protection Delivery Systems Framework", "relationship": "prose_guidance",
        "uri": "https://thedocs.worldbank.org/en/doc/147511529959939838-0160022017/original/11amMarch9DeliverySystemsFrameworkCORECOURSEWITHCLICKERSSENT8March2017.pdf"}]'
      bibliography_refs: '["barca-2017-integrating-data", "fhir-episode-of-care-status", "wb-sp-delivery-framework"]'
  EntitlementStatus:
    enum_uri: publicschema:EntitlementStatus
    title: Entitlement Status
    description: The lifecycle states of a benefit entitlement instance, from creation through fulfillment
      or termination.
    status: bibo:status/published
    permissible_values:
      pending:
        meaning: publicschema:EntitlementStatus/pending
        title: Pending
        description: The entitlement has been created but has not yet been confirmed through validation
          or approval.
        annotations:
          label_es: Pendiente
          label_fr: En attente
          description_es: El derecho ha sido creado pero aún no ha sido confirmado mediante validación
            o aprobación.
          description_fr: Le droit a été créé mais n'a pas encore été confirmé par validation ou approbation.
      approved:
        meaning: publicschema:EntitlementStatus/approved
        title: Approved
        description: The entitlement has been confirmed and is ready for fulfillment, but no delivery
          has yet been recorded.
        annotations:
          label_es: Aprobado
          label_fr: Approuvé
          description_es: El derecho ha sido confirmado y está listo para su cumplimiento, pero todavía
            no se ha registrado ninguna entrega.
          description_fr: Le droit a été confirmé et est prêt à être exécuté, mais aucune livraison n'a
            encore été enregistrée.
        exact_mappings:
        - openspp:OpensppEntitlementState/approved
      suspended:
        meaning: publicschema:EntitlementStatus/suspended
        title: Suspended
        description: The entitlement has been temporarily put on hold after approval, for example due
          to a failed conditionality check, an administrative hold, or a temporary dispute.
        annotations:
          label_es: Suspendido
          label_fr: Suspendu
          description_es: El derecho ha sido suspendido temporalmente después de la aprobación, por ejemplo
            debido a una verificación de condicionalidad fallida, una retención administrativa o una disputa
            temporal.
          description_fr: Le droit a été temporairement suspendu après approbation, par exemple en raison
            d'un contrôle de conditionnalité échoué, d'un gel administratif ou d'un litige temporaire.
      rejected:
        meaning: publicschema:EntitlementStatus/rejected
        title: Rejected
        description: The entitlement was evaluated and denied. Unlike cancellation, rejection means the
          entitlement was never valid.
        annotations:
          label_es: Rechazado
          label_fr: Rejeté
          description_es: El derecho fue evaluado y denegado. A diferencia de la cancelación, el rechazo
            significa que el derecho nunca fue válido.
          description_fr: Le droit a été évalué et refusé. Contrairement à l'annulation, le rejet signifie
            que le droit n'a jamais été valide.
      cancelled:
        meaning: publicschema:EntitlementStatus/cancelled
        title: Cancelled
        description: The entitlement has been withdrawn and will not be fulfilled.
        annotations:
          label_es: Cancelado
          label_fr: Annulé
          description_es: El derecho ha sido retirado y no será cumplido.
          description_fr: Le droit a été retiré et ne sera pas exécuté.
        exact_mappings:
        - openspp:OpensppEntitlementState/cancelled
      expired:
        meaning: publicschema:EntitlementStatus/expired
        title: Expired
        description: The entitlement's validity period has passed without fulfillment. Unlike cancellation,
          no one actively withdrew the entitlement; it lapsed.
        annotations:
          label_es: Expirado
          label_fr: Expiré
          description_es: El período de validez del derecho ha pasado sin cumplimiento. A diferencia de
            la cancelación, nadie retiró activamente el derecho; caducó.
          description_fr: La période de validité du droit a expiré sans exécution. Contrairement à l'annulation,
            personne n'a activement retiré le droit; il a simplement échu.
        exact_mappings:
        - openspp:OpensppEntitlementState/expired
      partially_fulfilled:
        meaning: publicschema:EntitlementStatus/partially_fulfilled
        title: Partially fulfilled
        description: Some but not all of the entitled amount has been delivered, for example one tranche
          of a multi-tranche payment or a voucher issued but not yet redeemed.
        annotations:
          label_es: Parcialmente cumplido
          label_fr: Partiellement exécuté
          description_es: Se ha entregado parte pero no la totalidad del monto del derecho, por ejemplo
            una cuota de un pago en múltiples cuotas o un vale emitido pero aún no canjeado.
          description_fr: Une partie mais pas la totalité du montant du droit a été versée, par exemple
            une tranche d'un paiement à tranches multiples ou un bon émis mais pas encore échangé.
      fulfilled:
        meaning: publicschema:EntitlementStatus/fulfilled
        title: Fulfilled
        description: The full entitled amount has been delivered to the beneficiary.
        annotations:
          label_es: Cumplido
          label_fr: Exécuté
          description_es: El monto total del derecho ha sido entregado al beneficiario.
          description_fr: Le montant total du droit a été versé au bénéficiaire.
    annotations:
      label_es: Estado del derecho
      label_fr: Statut du droit
      description_es: Los estados del ciclo de vida de una instancia de derecho a prestación, desde la
        creación hasta el cumplimiento o la terminación.
      description_fr: Les états du cycle de vie d'une instance de droit à prestation, de la création à
        l'exécution ou à la clôture.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": true, "name": "HL7 FHIR R4 Financial Resource Status
        Codes (fm-status)", "notes": "FHIR''s financial status lifecycle (active, cancelled, draft, entered-in-error)
        informed the pre-approval and terminal states.", "relationship": "structural_pattern", "uri":
        "https://hl7.org/fhir/R4/codesystem-fm-status.html"}]'
      bibliography_refs: '["fhir-fm-status"]'
  GrievanceStatus:
    enum_uri: publicschema:GrievanceStatus
    title: Grievance Status
    description: The lifecycle states of a grievance record in a program or service.
    status: bibo:status/published
    permissible_values:
      submitted:
        meaning: publicschema:GrievanceStatus/submitted
        title: Submitted
        description: The grievance has been formally received and registered in the system, awaiting assignment.
        annotations:
          label_es: Presentado
          label_fr: Soumis
          description_es: La queja ha sido recibida formalmente y registrada en el sistema, a la espera
            de asignación.
          description_fr: Le grief a été formellement reçu et enregistré dans le système, en attente d'affectation.
      under_review:
        meaning: publicschema:GrievanceStatus/under_review
        title: Under review
        description: The grievance is being actively investigated or assessed by a case worker or review
          body.
        annotations:
          label_es: En revisión
          label_fr: En cours d'examen
          description_es: La queja está siendo investigada o evaluada activamente por un trabajador social
            o un órgano de revisión.
          description_fr: Le grief est en cours d'investigation ou d'évaluation active par un agent de
            terrain ou un organe d'examen.
      resolved:
        meaning: publicschema:GrievanceStatus/resolved
        title: Resolved
        description: A decision or remedy has been issued and communicated to the complainant.
        annotations:
          label_es: Resuelto
          label_fr: Résolu
          description_es: Se ha emitido y comunicado al reclamante una decisión o remedio.
          description_fr: Une décision ou un remède a été émis et communiqué au plaignant.
        exact_mappings:
        - openspp:OpensppGrievanceStatus/resolved
      closed:
        meaning: publicschema:GrievanceStatus/closed
        title: Closed
        description: The grievance process is complete and the record is archived, either after resolution
          or withdrawal.
        annotations:
          label_es: Cerrado
          label_fr: Clos
          description_es: El proceso de la queja está completo y el registro está archivado, ya sea después
            de la resolución o del retiro.
          description_fr: Le processus de grief est terminé et le dossier est archivé, que ce soit après
            résolution ou retrait.
        exact_mappings:
        - openspp:OpensppGrievanceStatus/closed
      escalated:
        meaning: publicschema:GrievanceStatus/escalated
        title: Escalated
        description: The grievance has been referred to a higher authority or external body because it
          could not be resolved at the first level.
        annotations:
          label_es: Escalado
          label_fr: Transmis à une instance supérieure
          description_es: La queja ha sido remitida a una autoridad superior u organismo externo porque
            no pudo resolverse en el primer nivel.
          description_fr: Le grief a été transmis à une autorité supérieure ou à un organisme externe,
            n'ayant pas pu être résolu au premier niveau.
        exact_mappings:
        - openspp:OpensppGrievanceStatus/escalated
      rejected:
        meaning: publicschema:GrievanceStatus/rejected
        title: Rejected
        description: The grievance was found to be invalid, outside program scope, or a duplicate, and
          was not accepted for processing.
        annotations:
          label_es: Rechazado
          label_fr: Rejeté
          description_es: La queja fue considerada inválida, fuera del alcance del programa o duplicada,
            y no fue aceptada para su tramitación.
          description_fr: Le grief a été jugé invalide, hors du champ du programme ou en double, et n'a
            pas été accepté pour traitement.
      withdrawn:
        meaning: publicschema:GrievanceStatus/withdrawn
        title: Withdrawn
        description: The complainant has voluntarily withdrawn the grievance before resolution.
        annotations:
          label_es: Retirado
          label_fr: Retiré
          description_es: El reclamante ha retirado voluntariamente la queja antes de la resolución.
          description_fr: Le plaignant a volontairement retiré le grief avant la résolution.
    annotations:
      label_es: Estado de la reclamación
      label_fr: Statut de la réclamation
      description_es: Los estados del ciclo de vida de un registro de queja en un programa o servicio.
      description_fr: Les états du cycle de vie d'un dossier de grief dans un programme ou service.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": false, "name": "ISO 10002 - Quality management, Complaints
        handling", "relationship": "prose_guidance", "uri": "https://www.iso.org/standard/71580.html"},
        {"machine_readable": false, "name": "World Bank Grievance Redress Mechanism (GRM) Guidance", "relationship":
        "prose_guidance", "uri": "https://openknowledge.worldbank.org/bitstreams/b4a57d20-24bf-518a-93b1-1a5db3bdbae1/download"}]'
      bibliography_refs: '["iso-10002", "wb-grm-guidance"]'
  GrievanceType:
    enum_uri: publicschema:GrievanceType
    title: Grievance Type
    description: Categories describing the primary issue raised in a grievance record handled through
      a program's redress mechanism.
    status: bibo:status/published
    permissible_values:
      exclusion_error:
        meaning: publicschema:GrievanceType/exclusion_error
        title: Exclusion error
        description: A complaint that an eligible person or household was wrongly excluded from a program,
          benefit, or service.
        annotations:
          label_es: Error de exclusión
          label_fr: Erreur d'exclusion
          description_es: Una queja de que una persona u hogar elegible fue injustamente excluido de un
            programa, beneficio o servicio.
          description_fr: Une plainte indiquant qu'une personne ou un ménage admissible a été injustement
            exclu d'un programme, d'une prestation ou d'un service.
      inclusion_error:
        meaning: publicschema:GrievanceType/inclusion_error
        title: Inclusion error
        description: A report that an ineligible person or household is receiving benefits or services
          they should not be entitled to.
        annotations:
          label_es: Error de inclusión
          label_fr: Erreur d'inclusion
          description_es: Un reporte de que una persona u hogar inelegible está recibiendo beneficios
            o servicios a los que no debería tener derecho.
          description_fr: Un signalement indiquant qu'une personne ou un ménage non admissible reçoit
            des prestations ou services auxquels il ne devrait pas avoir droit.
      payment_complaint:
        meaning: publicschema:GrievanceType/payment_complaint
        title: Payment complaint
        description: A complaint about delayed, missing, incorrect, or incomplete benefit payments.
        annotations:
          label_es: Queja de pago
          label_fr: Plainte de paiement
          description_es: Una queja sobre pagos de beneficios retrasados, faltantes, incorrectos o incompletos.
          description_fr: Une plainte concernant des paiements de prestations retardés, manquants, incorrects
            ou incomplets.
      data_correction:
        meaning: publicschema:GrievanceType/data_correction
        title: Data correction
        description: A grievance seeking correction of inaccurate or outdated program data, such as a
          misspelled name, wrong date of birth, or incorrect disability status.
        annotations:
          label_es: Corrección de datos
          label_fr: Correction de données
          description_es: Una reclamación que solicita corregir datos inexactos u obsoletos en poder del
            programa, como un nombre mal escrito, una fecha de nacimiento incorrecta o un estado de discapacidad
            incorrecto.
          description_fr: Une réclamation demandant la correction de données inexactes ou obsolètes détenues
            par le programme, comme un nom mal orthographié, une date de naissance erronée ou un statut
            de handicap incorrect.
      appeal:
        meaning: publicschema:GrievanceType/appeal
        title: Appeal
        description: A formal request to review an administrative decision, such as an eligibility determination,
          benefit calculation, or exit decision.
        annotations:
          label_es: Recurso
          label_fr: Appel
          description_es: Una solicitud formal para revisar una decisión administrativa, como una determinación
            de elegibilidad, un cálculo de beneficio o una decisión de salida.
          description_fr: Une demande formelle de révision d'une décision administrative, telle qu'une
            détermination d'admissibilité, un calcul de prestation ou une décision de sortie.
      service_quality:
        meaning: publicschema:GrievanceType/service_quality
        title: Service quality
        description: A complaint about the quality, accessibility, or timeliness of services provided
          by the program or its agents.
        annotations:
          label_es: Calidad de servicio
          label_fr: Qualité de service
          description_es: Una queja sobre la calidad, accesibilidad o oportunidad de los servicios proporcionados
            por el programa o sus agentes.
          description_fr: Une plainte concernant la qualité, l'accessibilité ou la rapidité des services
            fournis par le programme ou ses agents.
      misconduct:
        meaning: publicschema:GrievanceType/misconduct
        title: Misconduct
        description: An allegation of fraud, corruption, exploitation, abuse, harassment, or other improper
          behavior by program staff or agents.
        annotations:
          label_es: Mala conducta
          label_fr: Manquement professionnel
          description_es: Una alegación de fraude, corrupción, explotación, abuso, acoso u otro comportamiento
            impropio por parte del personal o agentes del programa.
          description_fr: Une allégation de fraude, corruption, exploitation, abus, harcèlement ou autre
            comportement inapproprié de la part du personnel ou des agents du programme.
      other:
        meaning: publicschema:GrievanceType/other
        title: Other
        description: A grievance whose primary issue does not fit the named categories, or has not yet
          been classified.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Una reclamación cuyo problema principal no encaja en las categorías definidas,
            o aún no ha sido clasificado.
          description_fr: Une réclamation dont le problème principal ne correspond pas aux catégories
            nommées, ou n'a pas encore été classé.
    annotations:
      label_es: Tipo de reclamación
      label_fr: Type de réclamation
      description_es: Categorías que describen el problema principal planteado en un registro de queja
        o reclamación tramitado por el mecanismo de reclamaciones de un programa.
      description_fr: Catégories décrivant le principal problème soulevé dans un dossier de réclamation
        traité par le mécanisme de recours d'un programme.
      source_domain: sp
      vocab_references_json: '[{"machine_readable": false, "name": "World Bank Sourcebook on the Foundations
        of Social Protection Delivery Systems, Chapter 8", "notes": "Chapter 8 covers grievance redress
        mechanisms in social protection delivery, organizing grievance types along delivery chain phases.",
        "relationship": "prose_guidance", "uri": "https://openknowledge.worldbank.org/entities/publication/17e749c6-3586-5908-b836-16d988ebabee"},
        {"machine_readable": false, "name": "World Bank Grievance Redress Mechanisms Guidance Note", "notes":
        "Distinguishes formal grievance handling from broader inquiry and feedback channels. This vocabulary
        covers the issue category once a case is treated as a grievance.", "relationship": "prose_guidance",
        "uri": "https://openknowledge.worldbank.org/bitstreams/b4a57d20-24bf-518a-93b1-1a5db3bdbae1/download"},
        {"machine_readable": false, "name": "ISO 10002 - Quality management, Complaints handling", "relationship":
        "prose_guidance", "uri": "https://www.iso.org/standard/71580.html"}]'
      bibliography_refs: '["iso-10002", "wb-grm-guidance", "wb-sourcebook-ch8"]'
  ReferralStatus:
    enum_uri: publicschema:ReferralStatus
    title: Referral Status
    description: The lifecycle states of a referral between programs or services.
    status: bibo:draft
    permissible_values:
      pending:
        meaning: publicschema:ReferralStatus/pending
        title: Pending
        description: The referral has been created and sent to the receiving program but has not yet been
          acted upon.
        annotations:
          label_es: Pendiente
          label_fr: En attente
          description_es: La derivación ha sido creada y enviada al programa receptor pero aún no ha sido
            procesada.
          description_fr: L'orientation a été créée et envoyée au programme récepteur mais n'a pas encore
            été traitée.
      accepted:
        meaning: publicschema:ReferralStatus/accepted
        title: Accepted
        description: The receiving program has acknowledged the referral and agreed to serve the referred
          person.
        annotations:
          label_es: Aceptada
          label_fr: Acceptée
          description_es: El programa receptor ha reconocido la derivación y ha aceptado atender a la
            persona derivada.
          description_fr: Le programme récepteur a accusé réception de l'orientation et a accepté de prendre
            en charge la personne orientée.
      declined:
        meaning: publicschema:ReferralStatus/declined
        title: Declined
        description: The receiving program has reviewed but declined to accept the referral, typically
          due to ineligibility or capacity constraints.
        annotations:
          label_es: Rechazada
          label_fr: Refusée
          description_es: El programa receptor ha revisado pero rechazado la derivación, generalmente
            por inelegibilidad o restricciones de capacidad.
          description_fr: Le programme récepteur a examiné mais refusé l'orientation, généralement en
            raison d'inéligibilité ou de contraintes de capacité.
      completed:
        meaning: publicschema:ReferralStatus/completed
        title: Completed
        description: The referred person has been enrolled or served by the receiving program, and the
          referral process is finished.
        annotations:
          label_es: Completada
          label_fr: Terminée
          description_es: La persona derivada ha sido inscrita o atendida por el programa receptor, y
            el proceso de derivación ha finalizado.
          description_fr: La personne orientée a été inscrite ou prise en charge par le programme récepteur,
            et le processus d'orientation est terminé.
      cancelled:
        meaning: publicschema:ReferralStatus/cancelled
        title: Cancelled
        description: The referral was withdrawn by the referring program or the referred person before
          the receiving program acted on it.
        annotations:
          label_es: Cancelada
          label_fr: Annulée
          description_es: La derivación fue retirada por el programa referente o la persona derivada antes
            de que el programa receptor actuara.
          description_fr: L'orientation a été retirée par le programme référent ou la personne orientée
            avant que le programme récepteur n'agisse.
      expired:
        meaning: publicschema:ReferralStatus/expired
        title: Expired
        description: The referral was not acted upon within the expected timeframe and is no longer valid.
        annotations:
          label_es: Expirada
          label_fr: Expirée
          description_es: La derivación no fue procesada dentro del plazo esperado y ya no es válida.
          description_fr: L'orientation n'a pas été traitée dans le délai prévu et n'est plus valide.
    annotations:
      label_es: Estado de la derivación
      label_fr: Statut de l'orientation
      description_es: Los estados del ciclo de vida de una derivación entre programas o servicios.
      description_fr: Les états du cycle de vie d'une orientation entre programmes ou services.
      source_domain: sp
  TargetingApproach:
    enum_uri: publicschema:TargetingApproach
    title: Targeting Approach
    description: The methods used to identify and select eligible beneficiaries for a social protection
      program.
    status: bibo:draft
    permissible_values:
      means_tested:
        meaning: publicschema:TargetingApproach/means_tested
        title: Means tested
        description: Eligibility based on verified income or asset assessment.
        annotations:
          label_es: Con verificación de medios
          label_fr: Sous condition de ressources
          description_es: Elegibilidad basada en una evaluación verificada de ingresos o activos.
          description_fr: Admissibilité fondée sur une évaluation vérifiée des revenus ou des actifs.
      proxy_means_tested:
        meaning: publicschema:TargetingApproach/proxy_means_tested
        title: Proxy means tested
        description: Eligibility based on a statistical model predicting welfare from observable household
          characteristics.
        annotations:
          label_es: Prueba de medios por aproximación
          label_fr: Test par approximation du niveau de vie
          description_es: Elegibilidad basada en un modelo estadístico que predice el bienestar a partir
            de características observables del hogar.
          description_fr: Admissibilité fondée sur un modèle statistique prédisant le niveau de vie à
            partir de caractéristiques observables du ménage.
      categorical:
        meaning: publicschema:TargetingApproach/categorical
        title: Categorical
        description: Eligibility based on demographic category such as age, disability, pregnancy, or
          orphanhood.
        annotations:
          label_es: Categórico
          label_fr: Catégoriel
          description_es: Elegibilidad basada en una categoría demográfica como edad, discapacidad, embarazo
            o orfandad.
          description_fr: Admissibilité fondée sur une catégorie démographique telle que l'âge, le handicap,
            la grossesse ou la situation d'orphelin.
      geographic:
        meaning: publicschema:TargetingApproach/geographic
        title: Geographic
        description: Eligibility based on residence in a defined geographic area.
        annotations:
          label_es: Geográfico
          label_fr: Géographique
          description_es: Elegibilidad basada en la residencia en un área geográfica definida.
          description_fr: Admissibilité fondée sur la résidence dans une zone géographique définie.
      universal:
        meaning: publicschema:TargetingApproach/universal
        title: Universal
        description: Available to all individuals within a defined population, regardless of income or
          other characteristics.
        annotations:
          label_es: Universal
          label_fr: Universel
          description_es: Disponible para todos los individuos dentro de una población definida, independientemente
            de los ingresos u otras características.
          description_fr: Accessible à tous les individus au sein d'une population définie, indépendamment
            du revenu ou d'autres caractéristiques.
      community_based:
        meaning: publicschema:TargetingApproach/community_based
        title: Community based
        description: The community selects beneficiaries based on local knowledge of relative welfare.
        annotations:
          label_es: Basado en la comunidad
          label_fr: Ciblage communautaire
          description_es: La comunidad selecciona a los beneficiarios basándose en el conocimiento local
            del bienestar relativo.
          description_fr: La communauté sélectionne les bénéficiaires en s'appuyant sur la connaissance
            locale du bien-être relatif.
      self_targeting:
        meaning: publicschema:TargetingApproach/self_targeting
        title: Self targeting
        description: Program design deters non-poor participation, typically by setting wages below market
          rate or requiring time-intensive participation.
        annotations:
          label_es: Auto-focalización
          label_fr: Auto-ciblage
          description_es: El diseño del programa desincentiva la participación de los no pobres, típicamente
            fijando salarios por debajo de la tasa de mercado o exigiendo una participación que requiere
            mucho tiempo.
          description_fr: La conception du programme décourage la participation des non-pauvres, généralement
            en fixant des rémunérations inférieures au taux du marché ou en exigeant une participation
            intensive en temps.
    annotations:
      label_es: Enfoque de focalización
      label_fr: Approche de ciblage
      description_es: Los métodos utilizados para identificar y seleccionar a los beneficiarios elegibles
        de un programa de protección social.
      description_fr: Les méthodes utilisées pour identifier et sélectionner les bénéficiaires admissibles
        à un programme de protection sociale.
      source_domain: sp
      bibliography_refs: '["barca-2017-integrating-data"]'
  SpecialCategoryBasis:
    enum_uri: publicschema:SpecialCategoryBasis
    title: Special Category Basis
    description: The explicit legal ground for processing special-category personal data (sensitive categories
      such as health, biometric, or ethnic-origin data) under GDPR Article 9(2) and equivalent national
      provisions. Processing special-category data requires both a standard legal basis from legal-basis
      and one of these additional grounds. Ten values correspond to GDPR Article 9(2)(a) through (j).
    status: bibo:status/published
    permissible_values:
      explicit_consent:
        meaning: publicschema:SpecialCategoryBasis/explicit_consent
        title: Explicit consent
        description: The data subject has given explicit consent to the processing of their special-category
          data for one or more specific purposes. Explicit consent requires more than a general tick-box;
          it must be a clear affirmative act, written or biometric, specifically addressing the special-category
          data. DPV GDPR mapping, GDPR Article 9(2)(a), dpv-gdpr:A9-2-a.
        annotations:
          label_es: Consentimiento explícito
          label_fr: Consentement explicite
          description_es: El interesado ha dado su consentimiento explícito para el tratamiento de sus
            datos de categoría especial con uno o varios fines específicos. El consentimiento explícito
            requiere más que una casilla de verificación genérica; debe ser un acto afirmativo claro,
            escrito o biométrico, que aborde específicamente los datos de categoría especial. Correspondencia
            DPV RGPD, artículo 9, apartado 2, letra a, dpv-gdpr:A9-2-a.
          description_fr: La personne concernée a donné son consentement explicite au traitement de ses
            données de catégorie particulière pour une ou plusieurs finalités spécifiques. Le consentement
            explicite requiert plus qu'une simple case cochée générique; il doit s'agir d'un acte affirmatif
            clair, écrit ou biométrique, portant spécifiquement sur les données de catégorie particulière.
            Correspondance DPV RGPD, article 9, paragraphe 2, point a, dpv-gdpr:A9-2-a.
          note: 'DPV GDPR: dpv-gdpr:A9-2-a, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-a'
      employment_social_security:
        meaning: publicschema:SpecialCategoryBasis/employment_social_security
        title: Employment and social security
        description: Processing is necessary for obligations and rights in employment, social security,
          or social protection law, to the extent authorised by national law providing appropriate safeguards.
          Applies when a national social protection law explicitly authorises the processing of, for example,
          disability or health data for benefit determination. DPV GDPR mapping, GDPR Article 9(2)(b),
          dpv-gdpr:A9-2-b.
        annotations:
          label_es: Empleo y seguridad social
          label_fr: Emploi et sécurité sociale
          description_es: El tratamiento es necesario para el cumplimiento de obligaciones y el ejercicio
            de derechos en derecho laboral, de seguridad social o protección social, en la medida en que
            esté autorizado por el derecho nacional con las salvaguardias adecuadas. Se aplica cuando
            una ley nacional de protección social autoriza explícitamente el tratamiento de, por ejemplo,
            datos de discapacidad o salud para determinar prestaciones. Correspondencia DPV RGPD, artículo
            9, apartado 2, letra b, dpv-gdpr:A9-2-b.
          description_fr: Le traitement est nécessaire pour l'exécution d'obligations et de droits en
            droit du travail, de la sécurité sociale ou de la protection sociale, dans la mesure autorisée
            par le droit national prévoyant des garanties appropriées. S'applique lorsqu'une loi nationale
            de protection sociale autorise explicitement le traitement, par exemple, de données relatives
            au handicap ou à la santé pour la détermination des prestations. Correspondance DPV RGPD,
            article 9, paragraphe 2, point b, dpv-gdpr:A9-2-b.
          note: 'DPV GDPR: dpv-gdpr:A9-2-b, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-b'
      vital_interests:
        meaning: publicschema:SpecialCategoryBasis/vital_interests
        title: Vital interests
        description: Processing is necessary to protect the vital interests of the data subject or another
          person where the subject is physically or legally incapable of giving consent, such as in humanitarian
          emergency response. The scope is narrow; it does not apply to routine program delivery. DPV
          GDPR mapping, GDPR Article 9(2)(c), dpv-gdpr:A9-2-c.
        annotations:
          label_es: Intereses vitales
          label_fr: Intérêts vitaux
          description_es: El tratamiento es necesario para proteger los intereses vitales del interesado
            o de otra persona, cuando el interesado no está físicamente o legalmente en condiciones de
            dar su consentimiento, como en la respuesta humanitaria de emergencia. El alcance es estrecho
            y no se aplica a la prestación rutinaria de programas. Correspondencia DPV RGPD, artículo
            9, apartado 2, letra c, dpv-gdpr:A9-2-c.
          description_fr: Le traitement est nécessaire pour protéger les intérêts vitaux de la personne
            concernée ou d'une autre personne, lorsque la personne concernée est physiquement ou juridiquement
            dans l'incapacité de donner son consentement, par exemple lors d'une réponse humanitaire d'urgence.
            La portée est étroite et ne s'applique pas à la prestation ordinaire du programme. Correspondance
            DPV RGPD, article 9, paragraphe 2, point c, dpv-gdpr:A9-2-c.
          note: 'DPV GDPR: dpv-gdpr:A9-2-c, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-c'
      non_profit_body:
        meaning: publicschema:SpecialCategoryBasis/non_profit_body
        title: Non-profit body
        description: Processing is carried out in the course of legitimate activities by a foundation,
          association, or other not-for-profit body with a political, philosophical, religious, or trade-union
          aim, and the processing relates solely to members or former members, or persons in regular contact
          in connection with those purposes. DPV GDPR mapping, GDPR Article 9(2)(d), dpv-gdpr:A9-2-d.
        annotations:
          label_es: Organismo sin fines de lucro
          label_fr: Organisme sans but lucratif
          description_es: El tratamiento es realizado en el curso de las actividades legítimas de una
            fundación, asociación u otro organismo sin ánimo de lucro con un objetivo político, filosófico,
            religioso o sindical, y el tratamiento se refiere únicamente a sus miembros o ex miembros,
            o a personas que tienen contacto regular en relación con esos fines. Correspondencia DPV RGPD,
            artículo 9, apartado 2, letra d, dpv-gdpr:A9-2-d.
          description_fr: Le traitement est effectué dans le cadre des activités légitimes d'une fondation,
            d'une association ou de tout autre organisme sans but lucratif poursuivant un but politique,
            philosophique, religieux ou syndical, et porte uniquement sur les membres ou anciens membres,
            ou les personnes entretenant des contacts réguliers en lien avec ces finalités. Correspondance
            DPV RGPD, article 9, paragraphe 2, point d, dpv-gdpr:A9-2-d.
          note: 'DPV GDPR: dpv-gdpr:A9-2-d, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-d'
      publicly_disclosed:
        meaning: publicschema:SpecialCategoryBasis/publicly_disclosed
        title: Manifestly made public
        description: Processing relates to data that has been manifestly made public by the data subject
          themselves. Only applies when the subject themselves chose to make the data public; it does
          not apply when data was disclosed by a third party or collected from a public source. DPV GDPR
          mapping, GDPR Article 9(2)(e), dpv-gdpr:A9-2-e.
        annotations:
          label_es: Manifestamente hecho público
          label_fr: Données manifestement rendues publiques
          description_es: El tratamiento se refiere a datos que han sido manifiestamente hechos públicos
            por el propio interesado. Solo se aplica cuando el interesado ha decidido hacer pública la
            información; no se aplica cuando los datos fueron divulgados por un tercero o recopilados
            de una fuente pública. Correspondencia DPV RGPD, artículo 9, apartado 2, letra e, dpv-gdpr:A9-2-e.
          description_fr: Le traitement porte sur des données manifestement rendues publiques par la personne
            concernée elle-même. S'applique uniquement lorsque la personne concernée a elle-même choisi
            de rendre les données publiques; ne s'applique pas lorsque les données ont été divulguées
            par un tiers ou collectées auprès d'une source publique. Correspondance DPV RGPD, article
            9, paragraphe 2, point e, dpv-gdpr:A9-2-e.
          note: 'DPV GDPR: dpv-gdpr:A9-2-e, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-e'
      legal_claims:
        meaning: publicschema:SpecialCategoryBasis/legal_claims
        title: Legal claims
        description: Processing is necessary for the establishment, exercise, or defence of legal claims,
          or when courts act in their judicial capacity. Applies when a program must process special-category
          data to defend itself in a legal dispute or to enforce a legal obligation. DPV GDPR mapping,
          GDPR Article 9(2)(f), dpv-gdpr:A9-2-f.
        annotations:
          label_es: Reclamaciones jurídicas
          label_fr: Actions en justice
          description_es: El tratamiento es necesario para la formulación, el ejercicio o la defensa de
            reclamaciones o cuando los tribunales actúan en el ejercicio de su función judicial. Se aplica
            cuando un programa debe tratar datos de categoría especial para defenderse en una disputa
            legal o hacer cumplir una obligación legal. Correspondencia DPV RGPD, artículo 9, apartado
            2, letra f, dpv-gdpr:A9-2-f.
          description_fr: Le traitement est nécessaire à la constatation, à l'exercice ou à la défense
            de droits en justice, ou chaque fois que des juridictions agissent dans l'exercice de leur
            fonction juridictionnelle. S'applique lorsqu'un programme doit traiter des données de catégorie
            particulière pour se défendre dans un litige ou faire respecter une obligation légale. Correspondance
            DPV RGPD, article 9, paragraphe 2, point f, dpv-gdpr:A9-2-f.
          note: 'DPV GDPR: dpv-gdpr:A9-2-f, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-f'
      substantial_public_interest:
        meaning: publicschema:SpecialCategoryBasis/substantial_public_interest
        title: Substantial public interest
        description: Processing is necessary for reasons of substantial public interest, on the basis
          of a specific national or EU law, with appropriate safeguards. Used for social protection programs
          where national law explicitly authorises processing of sensitive data such as disability status
          or ethnic origin for targeting or inclusion. DPV GDPR mapping, GDPR Article 9(2)(g), dpv-gdpr:A9-2-g.
        annotations:
          label_es: Interés público sustancial
          label_fr: Intérêt public important
          description_es: El tratamiento es necesario por razones de interés público sustancial, sobre
            la base de una ley nacional o de la UE específica, con las salvaguardias adecuadas. Se utiliza
            para programas de protección social donde la ley nacional autoriza expresamente el tratamiento
            de datos sensibles como la discapacidad o el origen étnico para la focalización o inclusión.
            Correspondencia DPV RGPD, artículo 9, apartado 2, letra g, dpv-gdpr:A9-2-g.
          description_fr: Le traitement est nécessaire pour des motifs d'intérêt public important, sur
            la base d'une loi nationale ou européenne spécifique, avec des garanties appropriées. Utilisé
            pour les programmes de protection sociale où la loi nationale autorise explicitement le traitement
            de données sensibles telles que le statut de handicap ou l'origine ethnique à des fins de
            ciblage ou d'inclusion. Correspondance DPV RGPD, article 9, paragraphe 2, point g, dpv-gdpr:A9-2-g.
          note: 'DPV GDPR: dpv-gdpr:A9-2-g, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-g'
      preventive_health:
        meaning: publicschema:SpecialCategoryBasis/preventive_health
        title: Preventive or occupational medicine
        description: Processing is necessary for the purposes of preventive or occupational medicine,
          assessment of the working capacity of the employee, medical diagnosis, provision of health or
          social care, or management of health or social care systems. Requires a health professional
          bound by professional secrecy or equivalent obligation. DPV GDPR mapping, GDPR Article 9(2)(h),
          dpv-gdpr:A9-2-h.
        annotations:
          label_es: Medicina preventiva u ocupacional
          label_fr: Médecine préventive ou du travail
          description_es: El tratamiento es necesario con fines de medicina preventiva o laboral, evaluación
            de la capacidad laboral del trabajador, diagnóstico médico, prestación de asistencia sanitaria
            o social, o gestión de los sistemas y servicios de asistencia sanitaria o social. Requiere
            un profesional de la salud sujeto a secreto profesional o a una obligación equivalente. Correspondencia
            DPV RGPD, artículo 9, apartado 2, letra h, dpv-gdpr:A9-2-h.
          description_fr: Le traitement est nécessaire à des fins de médecine préventive ou du travail,
            d'évaluation de la capacité de travail du salarié, de diagnostic médical, de prise en charge
            sanitaire ou sociale, ou de gestion des systèmes de soins de santé ou de protection sociale.
            Nécessite un professionnel de santé soumis au secret professionnel ou à une obligation équivalente.
            Correspondance DPV RGPD, article 9, paragraphe 2, point h, dpv-gdpr:A9-2-h.
          note: 'DPV GDPR: dpv-gdpr:A9-2-h, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-h'
      public_health:
        meaning: publicschema:SpecialCategoryBasis/public_health
        title: Public health
        description: Processing is necessary for reasons of public interest in the area of public health,
          such as protection against serious cross-border health threats or ensuring high standards of
          quality and safety of health care and medicinal products, on the basis of national law providing
          appropriate safeguards. DPV GDPR mapping, GDPR Article 9(2)(i), dpv-gdpr:A9-2-i.
        annotations:
          label_es: Salud pública
          label_fr: Santé publique
          description_es: El tratamiento es necesario por razones de interés público en el ámbito de la
            salud pública, como la protección frente a amenazas transfronterizas graves para la salud
            o el aseguramiento de elevados niveles de calidad y seguridad de la asistencia sanitaria y
            de los medicamentos, sobre la base de una ley nacional con las salvaguardias adecuadas. Correspondencia
            DPV RGPD, artículo 9, apartado 2, letra i, dpv-gdpr:A9-2-i.
          description_fr: Le traitement est nécessaire pour des motifs d'intérêt public dans le domaine
            de la santé publique, tels que la protection contre les menaces transfrontalières graves pour
            la santé ou la garantie de normes élevées de qualité et de sécurité des soins de santé et
            des médicaments, sur la base d'une loi nationale prévoyant des garanties appropriées. Correspondance
            DPV RGPD, article 9, paragraphe 2, point i, dpv-gdpr:A9-2-i.
          note: 'DPV GDPR: dpv-gdpr:A9-2-i, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-i'
      archiving_research:
        meaning: publicschema:SpecialCategoryBasis/archiving_research
        title: Archiving, research, or statistics
        description: Processing is necessary for archiving purposes in the public interest, scientific
          or historical research purposes, or statistical purposes, in accordance with national law subject
          to appropriate safeguards for the rights and freedoms of the data subject. Used for program
          evaluations, longitudinal studies, and anonymised reporting. DPV GDPR mapping, GDPR Article
          9(2)(j), dpv-gdpr:A9-2-j.
        annotations:
          label_es: Archivo, investigación o estadísticas
          label_fr: Archivage, recherche ou statistiques
          description_es: El tratamiento es necesario con fines de archivo en interés público, fines de
            investigación científica o histórica, o fines estadísticos, de conformidad con el derecho
            nacional sujeto a las salvaguardias adecuadas para los derechos y libertades del interesado.
            Se utiliza para evaluaciones de programas, estudios longitudinales e informes anonimizados.
            Correspondencia DPV RGPD, artículo 9, apartado 2, letra j, dpv-gdpr:A9-2-j.
          description_fr: Le traitement est nécessaire à des fins d'archivage dans l'intérêt public, à
            des fins de recherche scientifique ou historique, ou à des fins statistiques, conformément
            au droit national, sous réserve de garanties appropriées pour les droits et libertés de la
            personne concernée. Utilisé pour les évaluations de programmes, les études longitudinales
            et les rapports anonymisés. Correspondance DPV RGPD, article 9, paragraphe 2, point j, dpv-gdpr:A9-2-j.
          note: 'DPV GDPR: dpv-gdpr:A9-2-j, URI: https://w3id.org/dpv/legal/eu/gdpr#A9-2-j'
    annotations:
      label_es: Base de categoría especial
      label_fr: Base pour catégories particulières
      description_es: El fundamento jurídico explícito para tratar datos personales de categoría especial
        (categorías sensibles como datos de salud, biométricos o de origen étnico) con arreglo al artículo
        9, apartado 2, del RGPD y disposiciones nacionales equivalentes. El tratamiento de datos de categoría
        especial requiere tanto una base jurídica estándar de legal-basis como uno de estos fundamentos
        adicionales. Los diez valores corresponden al artículo 9, apartado 2, letras a a j, del RGPD.
      description_fr: Le fondement juridique explicite pour traiter des données à caractère personnel
        de catégorie particulière (catégories sensibles telles que les données de santé, biométriques
        ou relatives à l'origine ethnique) en vertu de l'article 9, paragraphe 2, du RGPD et des dispositions
        nationales équivalentes. Le traitement de données de catégorie particulière nécessite à la fois
        une base juridique standard tirée de legal-basis et l'un de ces fondements supplémentaires. Les
        dix valeurs correspondent aux points a à j de l'article 9, paragraphe 2, du RGPD.
      external_alignments_json: '[{"label": "GDPR Article 9 - Processing of special categories of personal
        data", "match": "exact", "note": "The ten values of this vocabulary map one-to-one to GDPR Article
        9(2)(a) through Article 9(2)(j). See individual value notes for per-value URIs.", "uri": "https://w3id.org/dpv/legal/eu/gdpr#A9",
        "vocabulary": "DPV GDPR extension v2", "vocabulary_id": "dpv-gdpr"}]'
      vocab_references_json: '[{"machine_readable": false, "name": "GDPR Article 9 - Processing of special
        categories of personal data", "notes": "Article 9(2)(a) through (j) define the ten grounds. Equivalent
        provisions exist in Kenya DPA 2019 s.45(1), South Africa POPIA s.27(1), Brazil LGPD Art.11.",
        "relationship": "superset", "uri": "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32016R0679#d1e2066-1-1"}]'
      bibliography_refs: '["w3c-dpv"]'
  StatusInEmployment:
    enum_uri: publicschema:StatusInEmployment
    title: Status in Employment
    description: The type of employment relationship a person has, classified according to the ILO International
      Classification of Status in Employment (ICSE-18).
    status: bibo:status/forthcoming
    permissible_values:
      employee:
        meaning: publicschema:StatusInEmployment/employee
        title: Employee
        description: A worker who holds an explicit or implicit employment contract giving them basic
          remuneration not directly dependent on the revenue of the employer.
        annotations:
          label_es: Empleado asalariado
          label_fr: Salarié
          description_es: Un trabajador que tiene un contrato de trabajo explícito o implícito que le
            otorga una remuneración básica no dependiente directamente de los ingresos del empleador.
          description_fr: Un travailleur titulaire d'un contrat de travail explicite ou implicite lui
            garantissant une rémunération de base non directement dépendante du revenu de l'employeur.
      employer:
        meaning: publicschema:StatusInEmployment/employer
        title: Employer
        description: An independent worker who, on a continuous basis, engages one or more persons to
          work for them as employees.
        annotations:
          label_es: Empleador
          label_fr: Employeur
          description_es: Un trabajador independiente que, de manera continua, contrata a una o más personas
            para que trabajen como empleados.
          description_fr: Un travailleur indépendant qui, de manière continue, engage une ou plusieurs
            personnes pour travailler pour lui en tant que salariés.
      own_account_worker:
        meaning: publicschema:StatusInEmployment/own_account_worker
        title: Own-account worker
        description: An independent worker who does not engage employees on a continuous basis.
        annotations:
          label_es: Trabajador por cuenta propia
          label_fr: Travailleur à son propre compte
          description_es: Un trabajador independiente que no contrata empleados de manera continua.
          description_fr: Un travailleur indépendant qui n'engage pas de salariés de manière continue.
      dependent_contractor:
        meaning: publicschema:StatusInEmployment/dependent_contractor
        title: Dependent contractor
        description: A worker engaged on a contractual basis to produce goods or provide services for
          another economic unit, who is not treated as an employee but depends on that unit for the organisation
          of work, access to work, or access to markets. Introduced as a distinct category in ICSE-18
          to capture workers such as platform-based gig workers.
        annotations:
          label_es: Contratista dependiente
          label_fr: Travailleur sous contrat dépendant
          description_es: Un trabajador contratado para producir bienes o prestar servicios a otra unidad
            económica, que no es tratado como empleado pero depende de esa unidad para la organización
            del trabajo, el acceso al trabajo o el acceso a los mercados. Categoría distinta introducida
            en la CISE-18 para capturar, entre otros, a los trabajadores de plataformas digitales.
          description_fr: Un travailleur engagé sur une base contractuelle pour produire des biens ou
            fournir des services à une autre unité économique, qui n'est pas traité comme salarié mais
            dépend de cette unité pour l'organisation du travail, l'accès au travail ou l'accès aux marchés.
            Catégorie distincte introduite par la CISE-18 pour saisir notamment les travailleurs des plateformes
            numériques.
      contributing_family_worker:
        meaning: publicschema:StatusInEmployment/contributing_family_worker
        title: Contributing family worker
        description: A person who works without pay in an economic enterprise operated by a related person
          living in the same household.
        annotations:
          label_es: Trabajador familiar auxiliar
          label_fr: Aide familial
          description_es: Una persona que trabaja sin remuneración en una empresa económica dirigida por
            un familiar que vive en el mismo hogar.
          description_fr: Une personne qui travaille sans rémunération dans une entreprise économique
            dirigée par un membre de sa famille vivant dans le même ménage.
      cooperative_member:
        meaning: publicschema:StatusInEmployment/cooperative_member
        title: Member of a producers' cooperative
        description: A worker who holds a self-employment job in a cooperative that produces goods or
          services, in which each member takes part on an equal footing in organizing production and other
          activities.
        annotations:
          label_es: Miembro de una cooperativa de productores
          label_fr: Membre d'une coopérative de producteurs
          description_es: Un trabajador que tiene un empleo independiente en una cooperativa que produce
            bienes o servicios, en la cual cada miembro participa en igualdad de condiciones en la organización
            de la producción y otras actividades.
          description_fr: Un travailleur qui occupe un emploi indépendant dans une coopérative qui produit
            des biens ou des services, dans laquelle chaque membre participe sur un pied d'égalité à l'organisation
            de la production et des autres activités.
    annotations:
      label_es: Situación en el empleo
      label_fr: Statut dans l'emploi
      description_es: El tipo de relación de empleo de una persona, clasificado según la Clasificación
        Internacional de la Situación en el Empleo (CISE-18) de la OIT.
      description_fr: Le type de relation d'emploi d'une personne, classé selon la Classification internationale
        de la situation dans l'emploi (CISE-18) de l'OIT.
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        does not include a status-in-employment field or vocabulary.", "vocabulary": "OpenCRVS v2 event
        service", "vocabulary_id": "opencrvs"}]'
      standard_json: '{"name": "ILO ICSE-18 (20th ICLS, 2018)", "notes": "International Classification
        of Status in Employment. ICSE-18 defines 7 aggregated and 10 detailed categories organised by
        two dichotomies (type of authority, type of economic risk). This vocabulary enumerates six high-level
        values most commonly used in social-protection registries: employer, own-account worker, dependent
        contractor, employee, contributing family worker, cooperative member. Implementers requiring the
        full ICSE-18 structure should extend or refine this list.", "uri": "https://www.ilo.org/media/209766/download"}'
      bibliography_refs: '["ilo-20th-icls-2018"]'
  SymptomChronicity:
    enum_uri: publicschema:SymptomChronicity
    title: Symptom Chronicity
    description: A three-point scale describing how pervasive a cognitive symptom is, used in the Washington
      Group Extended Set on Functioning (WG-ES) for remembering difficulty.
    status: bibo:draft
    permissible_values:
      sometimes:
        meaning: publicschema:SymptomChronicity/sometimes
        title: Sometimes
        description: The symptom occurs sometimes.
        annotations:
          label_es: A veces
          label_fr: Parfois
          description_es: El síntoma ocurre a veces.
          description_fr: Le symptôme se manifeste parfois.
      often:
        meaning: publicschema:SymptomChronicity/often
        title: Often
        description: The symptom occurs often.
        annotations:
          label_es: A menudo
          label_fr: Souvent
          description_es: El síntoma ocurre a menudo.
          description_fr: Le symptôme se manifeste souvent.
      all_of_the_time:
        meaning: publicschema:SymptomChronicity/all_of_the_time
        title: All of the time
        description: The symptom occurs all of the time.
        annotations:
          label_es: Todo el tiempo
          label_fr: Tout le temps
          description_es: El síntoma ocurre todo el tiempo.
          description_fr: Le symptôme se manifeste tout le temps.
    annotations:
      label_es: Cronicidad del síntoma
      label_fr: Chronicité du symptôme
      description_es: Una escala de tres niveles que describe qué tan generalizado es un síntoma cognitivo,
        utilizada en el Conjunto Extendido del Grupo de Washington sobre Funcionamiento (WG-ES) para dificultades
        de memoria.
      description_fr: Une échelle à trois niveaux décrivant à quel point un symptôme cognitif est omniprésent,
        utilisée dans l'Ensemble étendu du Groupe de Washington sur le fonctionnement (WG-ES) pour les
        difficultés de mémoire.
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Used
        on WG-ES item COG_3 per the 11 October 2022 PDF.", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  SymptomPeriodFrequency:
    enum_uri: publicschema:SymptomPeriodFrequency
    title: Past 3 Months Frequency
    description: A four-point frequency scale used in the Washington Group Extended Set on Functioning
      (WG-ES) for reporting how often a bodily symptom (pain, fatigue) occurred during the past 3 months.
    status: bibo:draft
    permissible_values:
      never:
        meaning: publicschema:SymptomPeriodFrequency/never
        title: Never
        description: The symptom did not occur during the past 3 months.
        annotations:
          label_es: Nunca
          label_fr: Jamais
          description_es: El síntoma no ocurrió durante los últimos 3 meses.
          description_fr: Le symptôme ne s'est pas manifesté au cours des 3 derniers mois.
      some_days:
        meaning: publicschema:SymptomPeriodFrequency/some_days
        title: Some days
        description: The symptom occurred on some days during the past 3 months.
        annotations:
          label_es: Algunos días
          label_fr: Certains jours
          description_es: El síntoma ocurrió algunos días durante los últimos 3 meses.
          description_fr: Le symptôme s'est manifesté certains jours au cours des 3 derniers mois.
      most_days:
        meaning: publicschema:SymptomPeriodFrequency/most_days
        title: Most days
        description: The symptom occurred on most days during the past 3 months.
        annotations:
          label_es: La mayoría de los días
          label_fr: La plupart des jours
          description_es: El síntoma ocurrió la mayoría de los días durante los últimos 3 meses.
          description_fr: Le symptôme s'est manifesté la plupart des jours au cours des 3 derniers mois.
      every_day:
        meaning: publicschema:SymptomPeriodFrequency/every_day
        title: Every day
        description: The symptom occurred every day during the past 3 months.
        annotations:
          label_es: Todos los días
          label_fr: Tous les jours
          description_es: El síntoma ocurrió todos los días durante los últimos 3 meses.
          description_fr: Le symptôme s'est manifesté tous les jours au cours des 3 derniers mois.
    annotations:
      label_es: Frecuencia en los últimos 3 meses
      label_fr: Fréquence au cours des 3 derniers mois
      description_es: Una escala de frecuencia de cuatro niveles utilizada en el Conjunto Extendido del
        Grupo de Washington sobre Funcionamiento (WG-ES) para reportar la frecuencia con la que ocurrió
        un síntoma corporal (dolor, fatiga) durante los últimos 3 meses.
      description_fr: Une échelle de fréquence à quatre niveaux utilisée dans l'Ensemble étendu du Groupe
        de Washington sur le fonctionnement (WG-ES) pour rapporter la fréquence d'un symptôme corporel
        (douleur, fatigue) au cours des 3 derniers mois.
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Used
        on WG-ES items PAIN_1 (pain frequency) and TIRED_1 (fatigue frequency) per the 11 October 2022
        PDF.", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  UnitOfMeasure:
    enum_uri: publicschema:UnitOfMeasure
    title: Unit of Measure
    description: Units of measure for quantities of goods distributed or redeemable through benefit programs.
    status: bibo:draft
    permissible_values:
      kg:
        meaning: publicschema:UnitOfMeasure/kg
        title: Kilogram
        description: Unit of mass equal to 1,000 grams.
        annotations:
          label_es: Kilogramo
          label_fr: Kilogramme
          description_es: Unidad de masa igual a 1.000 gramos.
          description_fr: Unité de masse égale à 1 000 grammes.
      g:
        meaning: publicschema:UnitOfMeasure/g
        title: Gram
        description: Unit of mass equal to one thousandth of a kilogram.
        annotations:
          label_es: Gramo
          label_fr: Gramme
          description_es: Unidad de masa igual a una milésima de kilogramo.
          description_fr: Unité de masse égale à un millième de kilogramme.
      l:
        meaning: publicschema:UnitOfMeasure/l
        title: Litre
        description: Unit of volume equal to 1,000 cubic centimetres.
        annotations:
          label_es: Litro
          label_fr: Litre
          description_es: Unidad de volumen igual a 1.000 centímetros cúbicos.
          description_fr: Unité de volume égale à 1 000 centimètres cubes.
      ml:
        meaning: publicschema:UnitOfMeasure/ml
        title: Millilitre
        description: Unit of volume equal to one thousandth of a litre.
        annotations:
          label_es: Mililitro
          label_fr: Millilitre
          description_es: Unidad de volumen igual a una milésima de litro.
          description_fr: Unité de volume égale à un millième de litre.
      unit:
        meaning: publicschema:UnitOfMeasure/unit
        title: Unit
        description: A discrete countable item (e.g., one textbook, one seed packet).
        annotations:
          label_es: Unidad
          label_fr: Unité
          description_es: Un artículo contable discreto (por ej., un libro de texto, un paquete de semillas).
          description_fr: Un article dénombrable discret (par ex., un manuel, un paquet de semences).
      kit:
        meaning: publicschema:UnitOfMeasure/kit
        title: Kit
        description: A pre-assembled package of multiple items (e.g., hygiene kit, education kit).
        annotations:
          label_es: Kit
          label_fr: Kit
          description_es: Un paquete preensamblado de múltiples artículos (por ej., kit de higiene, kit
            educativo).
          description_fr: Un ensemble pré-assemblé de plusieurs articles (par ex., kit d'hygiène, kit
            éducatif).
      meal:
        meaning: publicschema:UnitOfMeasure/meal
        title: Meal
        description: A single prepared meal serving (used in school feeding and institutional programs).
        annotations:
          label_es: Comida
          label_fr: Repas
          description_es: Una porción de comida preparada (utilizada en programas de alimentación escolar
            e institucionales).
          description_fr: Une portion de repas préparé (utilisée dans les programmes d'alimentation scolaire
            et institutionnels).
      mt:
        meaning: publicschema:UnitOfMeasure/mt
        title: Metric ton
        description: Unit of mass equal to 1,000 kilograms. Used for bulk commodity tracking.
        annotations:
          label_es: Tonelada métrica
          label_fr: Tonne métrique
          description_es: Unidad de masa igual a 1.000 kilogramos. Utilizada para el seguimiento de productos
            a granel.
          description_fr: Unité de masse égale à 1 000 kilogrammes. Utilisée pour le suivi des produits
            en vrac.
    annotations:
      label_es: Unidad de medida
      label_fr: Unité de mesure
      description_es: Unidades de medida para las cantidades de bienes distribuidos o canjeables a través
        de programas de beneficios.
      description_fr: Unités de mesure pour les quantités de biens distribués ou échangeables dans les
        programmes de prestations.
      vocab_references_json: '[{"machine_readable": true, "name": "UN/CEFACT Recommendation 20 - Codes
        for Units of Measure", "notes": "UN/CEFACT Rec 20 is the authoritative standard for trade units.
        This vocabulary is a small subset covering common humanitarian and social protection commodities.",
        "relationship": "superset", "uri": "https://unece.org/trade/uncefact/cl-recommendations"}]'
      bibliography_refs: '["un-cefact-rec20"]'
  VoucherFormat:
    enum_uri: publicschema:VoucherFormat
    title: Voucher Format
    description: The physical or digital form of a voucher.
    status: bibo:draft
    permissible_values:
      electronic:
        meaning: publicschema:VoucherFormat/electronic
        title: Electronic
        description: A digital code or token delivered via SMS, mobile application, QR code, or other
          electronic means.
        annotations:
          label_es: Electrónico
          label_fr: Électronique
          description_es: Un código o token digital entregado por SMS, aplicación móvil, código QR u otro
            medio electrónico.
          description_fr: Un code ou jeton numérique délivré par SMS, application mobile, code QR ou autre
            moyen électronique.
      paper:
        meaning: publicschema:VoucherFormat/paper
        title: Paper
        description: A printed document that the beneficiary presents physically at a vendor or distribution
          point.
        annotations:
          label_es: Papel
          label_fr: Papier
          description_es: Un documento impreso que el beneficiario presenta físicamente en un vendedor
            o punto de distribución.
          description_fr: Un document imprimé que le bénéficiaire présente physiquement chez un vendeur
            ou un point de distribution.
    annotations:
      label_es: Formato de vale
      label_fr: Format de bon
      description_es: La forma física o digital de un vale.
      description_fr: La forme physique ou numérique d'un bon.
  VoucherStatus:
    enum_uri: publicschema:VoucherStatus
    title: Voucher Status
    description: The lifecycle states of a voucher instrument, from creation through redemption or expiry.
    status: bibo:draft
    permissible_values:
      created:
        meaning: publicschema:VoucherStatus/created
        title: Created
        description: The voucher has been generated but not yet distributed to the beneficiary.
        annotations:
          label_es: Creado
          label_fr: Créé
          description_es: El vale ha sido generado pero aún no ha sido distribuido al beneficiario.
          description_fr: Le bon a été généré mais n'a pas encore été distribué au bénéficiaire.
      issued:
        meaning: publicschema:VoucherStatus/issued
        title: Issued
        description: The voucher has been distributed to the beneficiary or their authorized representative.
        annotations:
          label_es: Emitido
          label_fr: Émis
          description_es: El vale ha sido distribuido al beneficiario o su representante autorizado.
          description_fr: Le bon a été distribué au bénéficiaire ou à son représentant autorisé.
      suspended:
        meaning: publicschema:VoucherStatus/suspended
        title: Suspended
        description: The voucher has been temporarily deactivated and cannot be redeemed until reactivated.
          Reasons include suspected fraud, verification checks, or administrative holds.
        annotations:
          label_es: Suspendido
          label_fr: Suspendu
          description_es: El vale ha sido temporalmente desactivado y no puede ser canjeado hasta su reactivación.
            Las razones incluyen sospecha de fraude, verificaciones o bloqueos administrativos.
          description_fr: Le bon a été temporairement désactivé et ne peut pas être échangé jusqu'à sa
            réactivation. Les raisons incluent une suspicion de fraude, des vérifications ou des blocages
            administratifs.
      partially_redeemed:
        meaning: publicschema:VoucherStatus/partially_redeemed
        title: Partially redeemed
        description: Some but not all of the voucher's value or entitled commodities have been redeemed.
          The voucher remains active for further use until fully redeemed or expired.
        annotations:
          label_es: Parcialmente canjeado
          label_fr: Partiellement échangé
          description_es: Se ha canjeado parte pero no la totalidad del valor del vale o de los productos
            a los que da derecho. El vale permanece activo para uso posterior hasta el canje completo
            o vencimiento.
          description_fr: Une partie mais pas la totalité de la valeur du bon ou des produits auxquels
            il donne droit a été échangée. Le bon reste actif pour une utilisation ultérieure jusqu'à
            échange complet ou expiration.
      redeemed:
        meaning: publicschema:VoucherStatus/redeemed
        title: Redeemed
        description: The voucher has been fully used at a vendor or agent.
        annotations:
          label_es: Canjeado
          label_fr: Échangé
          description_es: El vale ha sido completamente utilizado en un vendedor o agente.
          description_fr: Le bon a été entièrement utilisé auprès d'un vendeur ou d'un agent.
      expired:
        meaning: publicschema:VoucherStatus/expired
        title: Expired
        description: The voucher's validity period has passed without redemption.
        annotations:
          label_es: Vencido
          label_fr: Expiré
          description_es: El período de validez del vale ha pasado sin canje.
          description_fr: La période de validité du bon est passée sans échange.
      cancelled:
        meaning: publicschema:VoucherStatus/cancelled
        title: Cancelled
        description: The voucher has been voided by the program before redemption.
        annotations:
          label_es: Cancelado
          label_fr: Annulé
          description_es: El vale ha sido anulado por el programa antes del canje.
          description_fr: Le bon a été annulé par le programme avant l'échange.
    annotations:
      label_es: Estado del vale
      label_fr: Statut du bon
      description_es: Los estados del ciclo de vida de un instrumento de vale, desde la creación hasta
        el canje o vencimiento.
      description_fr: Les états du cycle de vie d'un instrument de bon, de la création à l'échange ou
        à l'expiration.
      vocab_references_json: '[{"machine_readable": false, "name": "GovStack Payments Building Block -
        Voucher APIs", "notes": "GovStack BB defines a voucher state machine with pre-activation, activation,
        redemption, and cancellation states.", "relationship": "structural_pattern", "uri": "https://specs.govstack.global/payments/2-description"}]'
      bibliography_refs: '["govstack-payments"]'
  WallMaterial:
    enum_uri: publicschema:WallMaterial
    title: Wall Material
    description: The primary material of the exterior walls in the household's dwelling.
    status: bibo:status/forthcoming
    permissible_values:
      no_walls:
        meaning: publicschema:WallMaterial/no_walls
        title: No walls
        description: Dwelling has no exterior walls (open structure).
        annotations:
          label_es: Sin paredes
          label_fr: Sans murs
          description_es: La vivienda no tiene paredes exteriores (estructura abierta).
          description_fr: Le logement ne dispose pas de murs extérieurs (structure ouverte).
      cane_palm_trunks:
        meaning: publicschema:WallMaterial/cane_palm_trunks
        title: Cane, palm, or trunks
        description: Walls made of natural cane, palm fronds, or tree trunks without additional finishing.
        annotations:
          label_es: Caña, palma o troncos
          label_fr: Cannes, palmes ou troncs
          description_es: Paredes de caña natural, hojas de palma o troncos de árbol sin acabado adicional.
          description_fr: Murs en cannes naturelles, feuilles de palme ou troncs d'arbres sans finition
            supplémentaire.
      dirt:
        meaning: publicschema:WallMaterial/dirt
        title: Dirt
        description: Walls made of packed dirt or mud without any structural reinforcement.
        annotations:
          label_es: Tierra
          label_fr: Terre
          description_es: Paredes de tierra compactada o barro sin refuerzo estructural.
          description_fr: Murs en terre tassée ou boue sans renforcement structurel.
      bamboo_with_mud:
        meaning: publicschema:WallMaterial/bamboo_with_mud
        title: Bamboo with mud
        description: Bamboo frame walls plastered or filled with mud.
        annotations:
          label_es: Bambú con barro
          label_fr: Bambou avec boue
          description_es: Paredes de estructura de bambú enlucidas o rellenas con barro.
          description_fr: Murs à ossature en bambou enduits ou remplis de boue.
      stone_with_mud:
        meaning: publicschema:WallMaterial/stone_with_mud
        title: Stone with mud
        description: Stone walls bonded with mud rather than mortar or cement.
        annotations:
          label_es: Piedra con barro
          label_fr: Pierre avec boue
          description_es: Paredes de piedra unidas con barro en lugar de mortero o cemento.
          description_fr: Murs en pierre liés à la boue plutôt qu'au mortier ou au ciment.
      uncovered_adobe:
        meaning: publicschema:WallMaterial/uncovered_adobe
        title: Uncovered adobe
        description: Sun-dried mud brick (adobe) walls without an exterior plaster or render coating.
        annotations:
          label_es: Adobe sin revestir
          label_fr: Adobe non revêtu
          description_es: Paredes de adobe (ladrillo de barro secado al sol) sin revestimiento exterior
            ni enlucido.
          description_fr: Murs en briques de boue séchées au soleil (adobe) sans enduit extérieur ni badigeon.
      plywood:
        meaning: publicschema:WallMaterial/plywood
        title: Plywood
        description: Walls made of plywood sheets.
        annotations:
          label_es: Contrachapado
          label_fr: Contreplaqué
          description_es: Paredes de láminas de contrachapado.
          description_fr: Murs en feuilles de contreplaqué.
      cardboard:
        meaning: publicschema:WallMaterial/cardboard
        title: Cardboard
        description: Walls made of cardboard or similar paper-based material.
        annotations:
          label_es: Cartón
          label_fr: Carton
          description_es: Paredes de cartón u otro material similar a base de papel.
          description_fr: Murs en carton ou matériau similaire à base de papier.
      reused_wood:
        meaning: publicschema:WallMaterial/reused_wood
        title: Reused wood
        description: Walls built from salvaged or reused wooden boards and planks.
        annotations:
          label_es: Madera reutilizada
          label_fr: Bois récupéré
          description_es: Paredes construidas con tablas y tablones de madera recuperada o reutilizada.
          description_fr: Murs construits avec des planches et madriers en bois récupérés ou réutilisés.
      cement:
        meaning: publicschema:WallMaterial/cement
        title: Cement
        description: Walls made of poured concrete or cement render on a structural frame.
        annotations:
          label_es: Cemento
          label_fr: Ciment
          description_es: Paredes de hormigón vertido o revoque de cemento sobre estructura.
          description_fr: Murs en béton coulé ou en crépi de ciment sur une ossature structurelle.
      stone_with_lime_cement:
        meaning: publicschema:WallMaterial/stone_with_lime_cement
        title: Stone with lime or cement
        description: Stone walls bonded with lime or cement mortar.
        annotations:
          label_es: Piedra con cal o cemento
          label_fr: Pierre avec chaux ou ciment
          description_es: Paredes de piedra unidas con mortero de cal o cemento.
          description_fr: Murs en pierre liés au mortier de chaux ou de ciment.
      bricks:
        meaning: publicschema:WallMaterial/bricks
        title: Bricks
        description: Walls made of fired clay bricks.
        annotations:
          label_es: Ladrillos
          label_fr: Briques
          description_es: Paredes de ladrillos de arcilla cocida.
          description_fr: Murs en briques de terre cuite.
      cement_blocks:
        meaning: publicschema:WallMaterial/cement_blocks
        title: Cement blocks
        description: Walls made of concrete masonry units (hollow or solid cement blocks).
        annotations:
          label_es: Bloques de cemento
          label_fr: Parpaings
          description_es: Paredes de bloques de mampostería de hormigón (huecos o macizos).
          description_fr: Murs en parpaings ou blocs de béton (creux ou pleins).
      covered_adobe:
        meaning: publicschema:WallMaterial/covered_adobe
        title: Covered adobe
        description: Adobe (sun-dried mud brick) walls with an exterior plaster or render coating.
        annotations:
          label_es: Adobe revestido
          label_fr: Adobe revêtu
          description_es: Paredes de adobe (ladrillo de barro secado al sol) con revestimiento exterior
            de enlucido.
          description_fr: Murs en adobe (briques de boue séchées au soleil) avec un enduit ou badigeon
            extérieur.
      wood_planks_shingles:
        meaning: publicschema:WallMaterial/wood_planks_shingles
        title: Wood planks or shingles
        description: Walls clad with milled wood planks or wooden shingles.
        annotations:
          label_es: Tablones o tejas de madera
          label_fr: Planches ou bardeaux de bois
          description_es: Paredes revestidas de tablones de madera aserrada o tejas de madera.
          description_fr: Murs revêtus de planches de bois sciées ou de bardeaux en bois.
      other:
        meaning: publicschema:WallMaterial/other
        title: Other
        description: Wall material not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Material de pared no cubierto por las otras categorías.
          description_fr: Matériau de mur non couvert par les autres catégories.
    annotations:
      label_es: Material de las paredes
      label_fr: Matériau des murs
      description_es: El material principal de las paredes exteriores en la vivienda del hogar.
      description_fr: Le matériau principal des murs extérieurs dans le logement du ménage.
      standard_json: '{"name": "DHS/MICS Harmonized Housing Codes", "notes": "Shared classification used
        by DHS (hv214) and MICS (HC5). No standalone international standard exists for wall materials;
        the survey programs are the de facto standard."}'
      bibliography_refs: '["dhs-recode7", "mics6"]'
  WaterPointType:
    enum_uri: publicschema:WaterPointType
    title: Water Point Type
    description: The physical type of a water access point, classified per the WHO/UNICEF JMP improved-source
      typology. The type of water point is the primary determinant of whether a source is classified as
      improved or unimproved on the JMP drinking water service ladder.
    status: bibo:draft
    permissible_values:
      piped_into_dwelling:
        meaning: publicschema:WaterPointType/piped_into_dwelling
        title: Piped water into dwelling
        description: Piped water supply connected directly into the dwelling, yard, or plot (tap on premises).
          JMP improved source.
        annotations:
          label_es: Agua corriente en la vivienda
          label_fr: Eau courante dans le logement
          description_es: Suministro de agua entubada conectada directamente a la vivienda, patio o parcela
            (grifo en las instalaciones). Fuente mejorada JMP.
          description_fr: Alimentation en eau courante connectée directement au logement, à la cour ou
            à la parcelle (robinet sur place). Source améliorée JMP.
      public_tap_standpipe:
        meaning: publicschema:WaterPointType/public_tap_standpipe
        title: Public tap / standpipe
        description: Community standpipe or public tap from a piped distribution system shared by several
          households. JMP improved source.
        annotations:
          label_es: Grifo público / surtidor
          label_fr: Robinet public / borne-fontaine
          description_es: Surtidor comunitario o grifo público de un sistema de distribución entubado
            compartido por varios hogares. Fuente mejorada JMP.
          description_fr: Borne-fontaine communautaire ou robinet public d'un réseau de distribution par
            canalisation partagé par plusieurs ménages. Source améliorée JMP.
      borehole_tubewell:
        meaning: publicschema:WaterPointType/borehole_tubewell
        title: Borehole / tubewell
        description: Borehole or tubewell equipped with a pump (hand pump or motorized). JMP improved
          source.
        annotations:
          label_es: Perforación / pozo tubular
          label_fr: Forage / puits tubulaire
          description_es: Perforación o pozo tubular equipado con una bomba (manual o motorizada). Fuente
            mejorada JMP.
          description_fr: Forage ou puits tubulaire équipé d'une pompe (manuelle ou motorisée). Source
            améliorée JMP.
      protected_dug_well:
        meaning: publicschema:WaterPointType/protected_dug_well
        title: Protected dug well
        description: Dug well with a lining, cover, and protected opening that prevents surface-water
          contamination. JMP improved source.
        annotations:
          label_es: Pozo excavado protegido
          label_fr: Puits creusé protégé
          description_es: Pozo excavado con revestimiento, tapa y abertura protegida que evita la contaminación
            por aguas superficiales. Fuente mejorada JMP.
          description_fr: Puits creusé avec un revêtement, un couvercle et une ouverture protégée qui
            empêche la contamination par les eaux de surface. Source améliorée JMP.
      protected_spring:
        meaning: publicschema:WaterPointType/protected_spring
        title: Protected spring
        description: Spring with a protected catchment structure preventing surface water from entering
          the supply. JMP improved source.
        annotations:
          label_es: Manantial protegido
          label_fr: Source protégée
          description_es: Manantial con una estructura de captación protegida que impide la entrada de
            agua superficial en el suministro. Fuente mejorada JMP.
          description_fr: Source avec une structure de captage protégée empêchant l'eau de surface d'entrer
            dans l'alimentation. Source améliorée JMP.
      rainwater_collection:
        meaning: publicschema:WaterPointType/rainwater_collection
        title: Rainwater collection
        description: Rainwater harvesting system with a collection surface, gutters, and a covered storage
          tank. JMP improved source.
        annotations:
          label_es: Recolección de agua de lluvia
          label_fr: Collecte des eaux de pluie
          description_es: Sistema de recolección de agua de lluvia con superficie de captación, canalones
            y un tanque de almacenamiento cubierto. Fuente mejorada JMP.
          description_fr: Système de collecte des eaux de pluie avec une surface de collecte, des gouttières
            et un réservoir de stockage couvert. Source améliorée JMP.
      water_kiosk:
        meaning: publicschema:WaterPointType/water_kiosk
        title: Water kiosk / vendor
        description: Packaged or vendor-supplied water sold at a designated point (water kiosk, sachet
          vendor, refill station). JMP improved source when water quality meets standards.
        annotations:
          label_es: Quiosco de agua / vendedor
          label_fr: Borne-fontaine / vendeur d'eau
          description_es: Agua envasada o suministrada por un vendedor en un punto designado (quiosco
            de agua, vendedor de bolsas, estación de recarga). Fuente mejorada JMP cuando la calidad del
            agua cumple las normas.
          description_fr: Eau en bouteille ou fournie par un vendeur vendue à un point désigné (borne-fontaine,
            vendeur de sachets, station de remplissage). Source améliorée JMP lorsque la qualité de l'eau
            répond aux normes.
      unprotected_dug_well:
        meaning: publicschema:WaterPointType/unprotected_dug_well
        title: Unprotected dug well
        description: Dug well without a lining, cover, or protective structure, susceptible to surface-water
          contamination. JMP unimproved source.
        annotations:
          label_es: Pozo excavado no protegido
          label_fr: Puits creusé non protégé
          description_es: Pozo excavado sin revestimiento, tapa ni estructura de protección, susceptible
            a la contaminación por aguas superficiales. Fuente no mejorada JMP.
          description_fr: Puits creusé sans revêtement, couverture ni structure de protection, susceptible
            d'être contaminé par les eaux de surface. Source non améliorée JMP.
      unprotected_spring:
        meaning: publicschema:WaterPointType/unprotected_spring
        title: Unprotected spring
        description: Spring without a catchment structure, open to contamination from surrounding surface
          water or soil. JMP unimproved source.
        annotations:
          label_es: Manantial no protegido
          label_fr: Source non protégée
          description_es: Manantial sin estructura de captación, expuesto a la contaminación por aguas
            superficiales o suelos circundantes. Fuente no mejorada JMP.
          description_fr: Source sans structure de captage, ouverte à la contamination par les eaux de
            surface ou le sol environnant. Source non améliorée JMP.
      surface_water:
        meaning: publicschema:WaterPointType/surface_water
        title: Surface water
        description: Water collected directly from a river, lake, dam, pond, stream, canal, or irrigation
          channel. JMP no-service source.
        annotations:
          label_es: Agua superficial
          label_fr: Eau de surface
          description_es: Agua recolectada directamente de un río, lago, embalse, estanque, arroyo, canal
            o canal de riego. Fuente sin servicio JMP.
          description_fr: Eau collectée directement dans une rivière, un lac, un barrage, un étang, un
            ruisseau, un canal ou un canal d'irrigation. Source sans service JMP.
      other:
        meaning: publicschema:WaterPointType/other
        title: Other
        description: A water point type not covered by the other categories, such as a tanker truck delivery
          point or emergency bladder tank.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de punto de agua no cubierto por las otras categorías, como un punto
            de entrega por camión cisterna o un tanque de vejiga de emergencia.
          description_fr: Un type de point d'eau non couvert par les autres catégories, tel qu'un point
            de livraison par camion-citerne ou un réservoir à vessie d'urgence.
    annotations:
      label_es: Tipo de punto de agua
      label_fr: Type de point d'eau
      description_es: El tipo físico de un punto de acceso al agua, clasificado según la tipología de
        fuentes mejoradas del JMP OMS/UNICEF. El tipo de punto de agua es el principal determinante de
        si una fuente se clasifica como mejorada o no mejorada en la escala del servicio de agua potable
        del JMP.
      description_fr: Le type physique d'un point d'accès à l'eau, classé selon la typologie des sources
        améliorées JMP OMS/UNICEF. Le type de point d'eau est le principal déterminant pour savoir si
        une source est classée améliorée ou non améliorée sur l'échelle des services d'eau potable JMP.
      standard_json: '{"name": "WHO/UNICEF JMP Core Questions on Drinking Water and Sanitation for Household
        Surveys", "notes": "JMP defines improved and unimproved water sources based on source type. Improved
        sources: piped water, boreholes/tubewells, protected dug wells, protected springs, rainwater collection,
        packaged/delivered water. Unimproved: unprotected dug wells, unprotected springs, surface water,
        tanker trucks (in some contexts). This vocabulary follows the JMP source type list used in household
        surveys and facility assessments.", "uri": "https://washdata.org/monitoring/drinking-water"}'
      bibliography_refs: '["who-unicef-jmp"]'
  WaterServiceLevel:
    enum_uri: publicschema:WaterServiceLevel
    title: Water Service Level
    description: The WHO/UNICEF JMP classification of drinking water service quality, ranging from safely
      managed to no service.
    status: bibo:status/forthcoming
    permissible_values:
      safely_managed:
        meaning: publicschema:WaterServiceLevel/safely_managed
        title: Safely managed
        description: Drinking water from an improved source located on premises, available when needed,
          and free from faecal and priority chemical contamination.
        annotations:
          label_es: Gestión segura
          label_fr: Gestion sécurisée
          description_es: Agua potable de una fuente mejorada ubicada en las instalaciones, disponible
            cuando se necesita y libre de contaminación fecal y química prioritaria.
          description_fr: Eau potable provenant d'une source améliorée située sur les lieux, disponible
            au besoin et exempte de contamination fécale et chimique prioritaire.
      basic:
        meaning: publicschema:WaterServiceLevel/basic
        title: Basic
        description: Drinking water from an improved source where collection time is not more than 30
          minutes for a round trip, including queuing.
        annotations:
          label_es: Básico
          label_fr: De base
          description_es: Agua potable de una fuente mejorada donde el tiempo de recolección de ida y
            vuelta, incluida la espera, no supera los 30 minutos.
          description_fr: Eau potable provenant d'une source améliorée dont le temps de collecte aller-retour,
            file d'attente incluse, ne dépasse pas 30 minutes.
      limited:
        meaning: publicschema:WaterServiceLevel/limited
        title: Limited
        description: Drinking water from an improved source where collection time exceeds 30 minutes for
          a round trip, including queuing.
        annotations:
          label_es: Limitado
          label_fr: Limité
          description_es: Agua potable de una fuente mejorada donde el tiempo de recolección de ida y
            vuelta, incluida la espera, supera los 30 minutos.
          description_fr: Eau potable provenant d'une source améliorée dont le temps de collecte aller-retour,
            file d'attente incluse, dépasse 30 minutes.
      unimproved:
        meaning: publicschema:WaterServiceLevel/unimproved
        title: Unimproved
        description: Drinking water from an unprotected dug well or unprotected spring.
        annotations:
          label_es: No mejorado
          label_fr: Non amélioré
          description_es: Agua potable de un pozo excavado sin protección o manantial sin protección.
          description_fr: Eau potable provenant d'un puits creusé non protégé ou d'une source non protégée.
      no_service:
        meaning: publicschema:WaterServiceLevel/no_service
        title: No service / surface water
        description: Drinking water collected directly from a river, dam, lake, pond, stream, canal, or
          irrigation channel.
        annotations:
          label_es: Sin servicio / agua superficial
          label_fr: Aucun service / eau de surface
          description_es: Agua potable recogida directamente de un río, embalse, lago, estanque, arroyo,
            canal o canal de riego.
          description_fr: Eau potable collectée directement dans une rivière, un barrage, un lac, un étang,
            un ruisseau, un canal ou un canal d'irrigation.
    annotations:
      label_es: Nivel de servicio de agua
      label_fr: Niveau de service en eau
      description_es: La clasificación JMP OMS/UNICEF de la calidad del servicio de agua potable, que
        va desde la gestión segura hasta la ausencia de servicio.
      description_fr: La classification JMP OMS/UNICEF de la qualité du service d'eau potable, allant
        de la gestion sécurisée à l'absence de service.
      standard_json: '{"name": "WHO/UNICEF JMP Service Ladder (SDG 6.1.1)", "notes": "The JMP service
        ladder classifies drinking water access for SDG 6.1.1 reporting. Levels are derived from source
        type and collection time, not directly observed.", "uri": "https://washdata.org/monitoring/drinking-water"}'
      bibliography_refs: '["who-unicef-jmp"]'
  WaterSource:
    enum_uri: publicschema:WaterSource
    title: Water Source
    description: The main source of drinking water used by the household, classified according to the
      WHO/UNICEF Joint Monitoring Programme (JMP) facility types.
    status: bibo:status/forthcoming
    permissible_values:
      piped_into_dwelling:
        meaning: publicschema:WaterSource/piped_into_dwelling
        title: Piped into dwelling
        description: Water piped directly into the dwelling, yard, or plot through a household connection.
        annotations:
          label_es: Agua por tubería en la vivienda
          label_fr: Eau courante dans le logement
          description_es: Agua canalizada directamente a la vivienda, patio o parcela mediante una conexión
            domiciliaria.
          description_fr: Eau acheminée directement dans le logement, la cour ou la parcelle par un branchement
            domestique.
      piped_to_yard:
        meaning: publicschema:WaterSource/piped_to_yard
        title: Piped to yard/plot
        description: Water piped to the yard or plot outside the dwelling but within the household's controlled
          space.
        annotations:
          label_es: Agua por tubería en el patio/parcela
          label_fr: Eau courante dans la cour/parcelle
          description_es: Agua canalizada al patio o parcela fuera de la vivienda pero dentro del espacio
            controlado del hogar.
          description_fr: Eau acheminée dans la cour ou la parcelle à l'extérieur du logement mais dans
            l'espace contrôlé du ménage.
      piped_to_neighbor:
        meaning: publicschema:WaterSource/piped_to_neighbor
        title: Piped to neighbor
        description: Water obtained from a neighbor's piped household connection.
        annotations:
          label_es: Agua por tubería en casa del vecino
          label_fr: Eau courante chez un voisin
          description_es: Agua obtenida de la conexión domiciliaria canalizada de un vecino.
          description_fr: Eau obtenue à partir du branchement domestique canalisé d'un voisin.
      public_tap_standpipe:
        meaning: publicschema:WaterSource/public_tap_standpipe
        title: Public tap/standpipe
        description: A communal tap or standpipe that supplies water to multiple households in a public
          area.
        annotations:
          label_es: Grifo público/surtidor
          label_fr: Robinet public/borne-fontaine
          description_es: Grifo comunitario o surtidor que suministra agua a varios hogares en un área
            pública.
          description_fr: Robinet communautaire ou borne-fontaine alimentant plusieurs ménages dans un
            espace public.
      tube_well_borehole:
        meaning: publicschema:WaterSource/tube_well_borehole
        title: Tube well or borehole
        description: A narrow-diameter well drilled into the ground and fitted with a hand pump or motorized
          pump to extract groundwater.
        annotations:
          label_es: Pozo entubado o perforación
          label_fr: Puits tubulaire ou forage
          description_es: Pozo de pequeño diámetro perforado en el suelo y equipado con bomba manual o
            motorizada para extraer agua subterránea.
          description_fr: Puits de petit diamètre foré dans le sol et équipé d'une pompe à main ou motorisée
            pour extraire l'eau souterraine.
      protected_well:
        meaning: publicschema:WaterSource/protected_well
        title: Protected dug well
        description: A dug well protected from runoff and surface contamination by a lining, cover, and
          apron.
        annotations:
          label_es: Pozo excavado protegido
          label_fr: Puits creusé protégé
          description_es: Pozo excavado protegido del escurrimiento y la contaminación superficial mediante
            revestimiento, cubierta y delantal.
          description_fr: Puits creusé protégé du ruissellement et de la contamination de surface par
            un revêtement, un couvercle et un tablier.
      unprotected_well:
        meaning: publicschema:WaterSource/unprotected_well
        title: Unprotected dug well
        description: A dug well without a protective lining or cover, exposed to potential surface contamination.
        annotations:
          label_es: Pozo excavado sin protección
          label_fr: Puits creusé non protégé
          description_es: Pozo excavado sin revestimiento ni cubierta protectora, expuesto a posible contaminación
            superficial.
          description_fr: Puits creusé sans revêtement ni couvercle protecteur, exposé à une éventuelle
            contamination de surface.
      protected_spring:
        meaning: publicschema:WaterSource/protected_spring
        title: Protected spring
        description: A natural spring protected from runoff and surface contamination by a spring box
          or similar structure.
        annotations:
          label_es: Manantial protegido
          label_fr: Source protégée
          description_es: Manantial natural protegido del escurrimiento y la contaminación superficial
            mediante una cámara de captación o estructura similar.
          description_fr: Source naturelle protégée du ruissellement et de la contamination de surface
            par un captage ou une structure similaire.
      unprotected_spring:
        meaning: publicschema:WaterSource/unprotected_spring
        title: Unprotected spring
        description: A natural spring without any protection structure, exposed to potential surface contamination.
        annotations:
          label_es: Manantial sin protección
          label_fr: Source non protégée
          description_es: Manantial natural sin estructura de protección, expuesto a posible contaminación
            superficial.
          description_fr: Source naturelle sans structure de protection, exposée à une éventuelle contamination
            de surface.
      rainwater:
        meaning: publicschema:WaterSource/rainwater
        title: Rainwater collection
        description: Water collected from rooftops or other surfaces and stored in a tank or container.
        annotations:
          label_es: Recolección de agua de lluvia
          label_fr: Collecte d'eau de pluie
          description_es: Agua recogida de tejados u otras superficies y almacenada en un depósito o recipiente.
          description_fr: Eau collectée sur des toitures ou d'autres surfaces et stockée dans un réservoir
            ou un récipient.
      tanker_truck:
        meaning: publicschema:WaterSource/tanker_truck
        title: Tanker truck
        description: Water delivered by a motorized tanker truck or tanker.
        annotations:
          label_es: Camión cisterna
          label_fr: Camion-citerne
          description_es: Agua entregada por un camión cisterna motorizado.
          description_fr: Eau livrée par un camion-citerne motorisé.
      cart_with_small_tank:
        meaning: publicschema:WaterSource/cart_with_small_tank
        title: Cart with small tank/drum
        description: Water delivered by a cart, donkey, or other non-motorized transport carrying a small
          tank or drum.
        annotations:
          label_es: Carreta con depósito pequeño/bidón
          label_fr: Charrette avec petit réservoir/bidon
          description_es: Agua entregada por una carreta, burro u otro transporte no motorizado que lleva
            un pequeño depósito o bidón.
          description_fr: Eau livrée par une charrette, un âne ou autre transport non motorisé portant
            un petit réservoir ou bidon.
      surface_water:
        meaning: publicschema:WaterSource/surface_water
        title: Surface water
        description: Water drawn directly from a river, dam, lake, pond, stream, canal, or irrigation
          channel without any treatment or protection.
        annotations:
          label_es: Agua superficial
          label_fr: Eau de surface
          description_es: Agua extraída directamente de un río, embalse, lago, estanque, arroyo, canal
            o canal de riego sin ningún tratamiento ni protección.
          description_fr: Eau puisée directement dans une rivière, un barrage, un lac, un étang, un ruisseau,
            un canal ou un canal d'irrigation sans traitement ni protection.
      bottled_water:
        meaning: publicschema:WaterSource/bottled_water
        title: Bottled water
        description: Commercially packaged water sold in sealed bottles, typically treated or purified.
        annotations:
          label_es: Agua embotellada
          label_fr: Eau en bouteille
          description_es: Agua envasada comercialmente vendida en botellas selladas, generalmente tratada
            o purificada.
          description_fr: Eau commercialement conditionnée vendue en bouteilles hermétiques, généralement
            traitée ou purifiée.
      packaged_water:
        meaning: publicschema:WaterSource/packaged_water
        title: Sachet/packaged water
        description: Commercially packaged water sold in sealed sachets or other small disposable containers.
        annotations:
          label_es: Agua en bolsa/envasada
          label_fr: Eau en sachet/conditionnée
          description_es: Agua envasada comercialmente vendida en bolsas selladas u otros pequeños envases
            desechables.
          description_fr: Eau commercialement conditionnée vendue en sachets hermétiques ou autres petits
            contenants jetables.
      other:
        meaning: publicschema:WaterSource/other
        title: Other
        description: A drinking water source not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Una fuente de agua potable no cubierta por las otras categorías.
          description_fr: Une source d'eau potable non couverte par les autres catégories.
    annotations:
      label_es: Fuente de agua
      label_fr: Source d'eau
      description_es: La principal fuente de agua potable utilizada por el hogar, clasificada según los
        tipos de instalaciones del Programa de Monitoreo Conjunto OMS/UNICEF (JMP).
      description_fr: La principale source d'eau potable utilisée par le ménage, classifiée selon les
        types d'installations du Programme conjoint de surveillance OMS/UNICEF (JMP).
      standard_json: '{"name": "WHO/UNICEF Joint Monitoring Programme (JMP)", "notes": "Canonical source
        for SDG 6.1 drinking water monitoring. Facility type categories.", "uri": "https://washdata.org/monitoring/drinking-water"}'
      bibliography_refs: '["dhs-recode7", "mics6", "who-unicef-jmp"]'
  WgSsDomain:
    enum_uri: publicschema:WgSsDomain
    title: WG-SS Functioning Domain
    description: The six core functioning domains of the Washington Group Short Set on Functioning (WG-SS).
      Used to identify which domains triggered a disability identifier.
    status: bibo:status/forthcoming
    permissible_values:
      seeing:
        meaning: publicschema:WgSsDomain/seeing
        title: Seeing
        description: Difficulty seeing, even when wearing glasses.
        annotations:
          label_es: Visión
          label_fr: Vision
          description_es: Dificultad para ver, incluso usando lentes.
          description_fr: Difficulté à voir, même en portant des lunettes.
      hearing:
        meaning: publicschema:WgSsDomain/hearing
        title: Hearing
        description: Difficulty hearing, even when using a hearing aid.
        annotations:
          label_es: Audición
          label_fr: Audition
          description_es: Dificultad para oír, incluso usando un audífono.
          description_fr: Difficulté à entendre, même en utilisant un appareil auditif.
      walking:
        meaning: publicschema:WgSsDomain/walking
        title: Walking
        description: Difficulty walking or climbing steps.
        annotations:
          label_es: Caminar
          label_fr: Marche
          description_es: Dificultad para caminar o subir escalones.
          description_fr: Difficulté à marcher ou monter des marches.
      cognition:
        meaning: publicschema:WgSsDomain/cognition
        title: Cognition
        description: Difficulty remembering or concentrating.
        annotations:
          label_es: Cognición
          label_fr: Cognition
          description_es: Dificultad para recordar o concentrarse.
          description_fr: Difficulté à se souvenir ou à se concentrer.
      self_care:
        meaning: publicschema:WgSsDomain/self_care
        title: Self-care
        description: Difficulty with self-care, such as washing all over or dressing.
        annotations:
          label_es: Cuidado personal
          label_fr: Soins personnels
          description_es: Dificultad con el cuidado personal, como bañarse completamente o vestirse.
          description_fr: Difficulté avec les soins personnels, comme se laver entièrement ou s'habiller.
      communication:
        meaning: publicschema:WgSsDomain/communication
        title: Communication
        description: Difficulty communicating, for example understanding or being understood.
        annotations:
          label_es: Comunicación
          label_fr: Communication
          description_es: Dificultad para comunicarse, por ejemplo comprender o ser comprendido.
          description_fr: Difficulté à communiquer, par exemple comprendre ou être compris.
    annotations:
      label_es: Dominio de funcionamiento WG-SS
      label_fr: Domaine de fonctionnement WG-SS
      description_es: Los seis dominios principales de funcionamiento del conjunto corto del Washington
        Group sobre funcionamiento (WG-SS). Se utiliza para identificar qué dominios activaron un identificador
        de discapacidad.
      description_fr: Les six domaines fondamentaux de fonctionnement de l'ensemble court du Washington
        Group sur le fonctionnement (WG-SS). Utilisé pour identifier quels domaines ont déclenché un identifiant
        de handicap.
      standard_json: '{"name": "Washington Group Short Set on Functioning (WG-SS), 2006/2016", "notes":
        "Six core domains, each assessed with a single question on a four-level response scale (no difficulty,
        some difficulty, a lot of difficulty, cannot do at all).", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-short-set-on-functioning-wg-ss/"}'
      bibliography_refs: '["washington-group-ss"]'
  WithdrawalChannel:
    enum_uri: publicschema:WithdrawalChannel
    title: Withdrawal Channel
    description: The channel through which a data subject exercised their right to withdraw consent. This
      field is populated when the consent record transitions to withdrawn status. Programs must accept
      withdrawal through channels appropriate to how consent was originally given; programs that accept
      only digital withdrawal from beneficiaries who gave consent on paper may not be complying with the
      principle that withdrawal must be as easy as giving consent.
    status: bibo:draft
    permissible_values:
      web:
        meaning: publicschema:WithdrawalChannel/web
        title: Web
        description: The data subject used a web browser (desktop or mobile) to submit a withdrawal request
          via a form or account interface.
        annotations:
          label_es: Web
          label_fr: Web
          description_es: El interesado utilizó un navegador web (escritorio o móvil) para enviar una
            solicitud de retiro a través de un formulario o interfaz de cuenta.
          description_fr: La personne concernée a utilisé un navigateur web (ordinateur ou mobile) pour
            soumettre une demande de retrait via un formulaire ou une interface de compte.
      mobile:
        meaning: publicschema:WithdrawalChannel/mobile
        title: Mobile application
        description: The data subject used a mobile application to submit a withdrawal request. Includes
          USSD and SMS-based withdrawal flows specifically designed in a mobile application context.
        annotations:
          label_es: Aplicación móvil
          label_fr: Application mobile
          description_es: El interesado utilizó una aplicación móvil para enviar una solicitud de retiro.
            Incluye flujos de retiro por USSD y SMS específicamente diseñados en el contexto de una aplicación
            móvil.
          description_fr: La personne concernée a utilisé une application mobile pour soumettre une demande
            de retrait. Comprend les flux de retrait par USSD et SMS spécifiquement conçus dans le cadre
            d'une application mobile.
      api:
        meaning: publicschema:WithdrawalChannel/api
        title: API
        description: A withdrawal was submitted programmatically via an application programming interface,
          typically by a system acting on behalf of the data subject (for example, a partner system relaying
          a withdrawal it received). Records which external system submitted the withdrawal in evidence_ref
          or withdrawal_reason when traceability is needed.
        annotations:
          label_es: API
          label_fr: API
          description_es: Se envió un retiro programáticamente a través de una interfaz de programación
            de aplicaciones, típicamente por un sistema que actúa en nombre del interesado (por ejemplo,
            un sistema asociado que transmite un retiro que recibió). Registre en evidence_ref o withdrawal_reason
            qué sistema externo envió el retiro cuando se necesita trazabilidad.
          description_fr: Un retrait a été soumis par voie programmatique via une interface de programmation
            applicative, généralement par un système agissant au nom de la personne concernée (par exemple,
            un système partenaire transmettant un retrait qu'il a reçu). Enregistrez dans evidence_ref
            ou withdrawal_reason le système externe qui a soumis le retrait lorsque la traçabilité est
            requise.
      paper:
        meaning: publicschema:WithdrawalChannel/paper
        title: Paper form
        description: The data subject submitted a written withdrawal request on paper, such as a signed
          letter or a pre-printed withdrawal form. The paper form should be scanned or photographed and
          referenced in evidence_ref.
        annotations:
          label_es: Formulario impreso
          label_fr: Formulaire papier
          description_es: El interesado presentó una solicitud de retiro escrita en papel, como una carta
            firmada o un formulario de retiro preimpreso. El formulario de papel debe escanearse o fotografiarse
            y referenciarse en evidence_ref.
          description_fr: La personne concernée a soumis une demande de retrait écrite sur papier, telle
            qu'une lettre signée ou un formulaire de retrait pré-imprimé. Le formulaire papier doit être
            numérisé ou photographié et référencé dans evidence_ref.
      verbal:
        meaning: publicschema:WithdrawalChannel/verbal
        title: Verbal
        description: The data subject communicated withdrawal verbally. Requires a witness or a staff
          member present to record the withdrawal. The staff member who received the verbal withdrawal
          should be noted in evidence_ref or withdrawal_reason, along with the date and circumstances.
          Programs should define an operating procedure for handling verbal withdrawal requests.
        annotations:
          label_es: Verbal
          label_fr: Verbal
          description_es: El interesado comunicó la retirada verbalmente. Requiere un testigo o un miembro
            del personal presente para registrar la retirada. El miembro del personal que recibió la retirada
            verbal debe anotarse en evidence_ref o withdrawal_reason, junto con la fecha y las circunstancias.
            Los programas deben definir un procedimiento operativo para manejar las solicitudes de retirada
            verbal.
          description_fr: La personne concernée a communiqué le retrait verbalement. Nécessite un témoin
            ou un membre du personnel présent pour enregistrer le retrait. Le membre du personnel qui
            a reçu le retrait verbal doit être noté dans evidence_ref ou withdrawal_reason, avec la date
            et les circonstances. Les programmes doivent définir une procédure opérationnelle pour traiter
            les demandes de retrait verbal.
      in_person_office:
        meaning: publicschema:WithdrawalChannel/in_person_office
        title: In-person at office
        description: The data subject visited a program office or service point in person and submitted
          a withdrawal request there, whether verbally or in writing. The staff member handling the request
          should be recorded. Distinct from community-worker, which covers field-based withdrawal.
        annotations:
          label_es: En persona en la oficina
          label_fr: En personne au bureau
          description_es: El interesado visitó en persona una oficina o punto de servicio del programa
            y allí presentó una solicitud de retiro, ya sea verbalmente o por escrito. El miembro del
            personal que manejó la solicitud debe registrarse. Distinto de community-worker, que cubre
            la retirada en el campo.
          description_fr: La personne concernée s'est rendue en personne dans un bureau ou un point de
            service du programme et y a soumis une demande de retrait, oralement ou par écrit. Le membre
            du personnel traitant la demande doit être enregistré. Distinct de community-worker, qui couvre
            le retrait sur le terrain.
      community_worker:
        meaning: publicschema:WithdrawalChannel/community_worker
        title: Community worker
        description: A community-level agent (community health worker, social worker, program field agent)
          received and recorded the withdrawal on behalf of the program. Common in programs that use community
          workers for outreach; particularly important when beneficiaries cannot travel to an office or
          do not use digital channels. The community worker's identity should be documented in evidence_ref
          or withdrawal_reason.
        annotations:
          label_es: Agente comunitario
          label_fr: Agent communautaire
          description_es: Un agente a nivel comunitario (agente de salud comunitaria, trabajador social,
            agente de campo del programa) recibió y registró la retirada en nombre del programa. Común
            en programas que utilizan agentes comunitarios para la divulgación; especialmente importante
            cuando los beneficiarios no pueden ir a una oficina o no usan canales digitales. La identidad
            del agente comunitario debe documentarse en evidence_ref o withdrawal_reason.
          description_fr: Un agent de niveau communautaire (agent de santé communautaire, travailleur
            social, agent de terrain du programme) a reçu et enregistré le retrait au nom du programme.
            Courant dans les programmes utilisant des agents communautaires pour la sensibilisation; particulièrement
            important lorsque les bénéficiaires ne peuvent pas se déplacer dans un bureau ou n'utilisent
            pas les canaux numériques. L'identité de l'agent communautaire doit être documentée dans evidence_ref
            ou withdrawal_reason.
      other:
        meaning: publicschema:WithdrawalChannel/other
        title: Other
        description: The withdrawal was received through a channel not covered by the other values. Document
          the specific channel in withdrawal_reason so that patterns can be identified for future vocabulary
          additions.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: La retirada fue recibida a través de un canal no cubierto por los otros valores.
            Documente el canal específico en withdrawal_reason para que se puedan identificar patrones
            para futuras ampliaciones del vocabulario.
          description_fr: Le retrait a été reçu par un canal non couvert par les autres valeurs. Documentez
            le canal spécifique dans withdrawal_reason afin que les tendances puissent être identifiées
            pour de futures extensions du vocabulaire.
    annotations:
      label_es: Canal de retiro
      label_fr: Canal de retrait
      description_es: El canal a través del cual un interesado ejerció su derecho a retirar el consentimiento.
        Este campo se rellena cuando el registro de consentimiento pasa al estado withdrawn. Los programas
        deben aceptar la retirada a través de canales apropiados a cómo se otorgó el consentimiento originalmente;
        los programas que solo aceptan la retirada digital de beneficiarios que dieron su consentimiento
        en papel podrían no cumplir con el principio de que la retirada debe ser tan fácil como otorgar
        el consentimiento.
      description_fr: Le canal par lequel une personne concernée a exercé son droit de retirer le consentement.
        Ce champ est renseigné lorsque l'enregistrement de consentement passe au statut withdrawn. Les
        programmes doivent accepter le retrait par des canaux appropriés au mode selon lequel le consentement
        a été initialement donné; les programmes qui n'acceptent que le retrait numérique de bénéficiaires
        ayant donné leur consentement sur papier pourraient ne pas respecter le principe selon lequel
        le retrait doit être aussi facile que de donner le consentement.
