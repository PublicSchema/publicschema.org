  DailyDuration:
    enum_uri: publicschema:DailyDuration
    title: Daily Duration
    description: A three-point scale describing how much of the day a condition or feeling persists, used
      in the Washington Group Extended Set on Functioning (WG-ES) for fatigue.
    status: bibo:draft
    permissible_values:
      some_of_the_day:
        meaning: publicschema:DailyDuration/some_of_the_day
        title: Some of the day
        description: The condition persisted during some of the day.
        annotations:
          label_es: Parte del día
          label_fr: Une partie de la journée
          description_es: La condición persistió durante parte del día.
          description_fr: La condition a persisté pendant une partie de la journée.
      most_of_the_day:
        meaning: publicschema:DailyDuration/most_of_the_day
        title: Most of the day
        description: The condition persisted during most of the day.
        annotations:
          label_es: La mayor parte del día
          label_fr: La plupart de la journée
          description_es: La condición persistió durante la mayor parte del día.
          description_fr: La condition a persisté pendant la plupart de la journée.
      all_of_the_day:
        meaning: publicschema:DailyDuration/all_of_the_day
        title: All of the day
        description: The condition persisted throughout the entire day.
        annotations:
          label_es: Todo el día
          label_fr: Toute la journée
          description_es: La condición persistió durante todo el día.
          description_fr: La condition a persisté toute la journée.
    annotations:
      label_es: Duración diaria
      label_fr: Durée quotidienne
      description_es: Una escala de tres niveles que describe qué tanto del día persiste una condición
        o sentimiento, utilizada en el Conjunto Extendido del Grupo de Washington sobre Funcionamiento
        (WG-ES) para la fatiga.
      description_fr: Une échelle à trois niveaux décrivant la durée quotidienne d'une condition ou d'un
        ressenti, utilisée dans l'Ensemble étendu du Groupe de Washington sur le fonctionnement (WG-ES)
        pour la fatigue.
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Used
        on WG-ES item TIRED_2 (how much of the day the person felt tired or exhausted) per the 11 October
        2022 PDF.", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  DelegationType:
    enum_uri: publicschema:DelegationType
    title: Delegation Type
    description: Who indicated consent on behalf of the data subject and under what legal authority. The
      value self means the data subject indicated consent directly for themselves. All other values indicate
      that a third party gave consent on behalf of a data subject who lacked or delegated legal capacity.
      The applicable delegation authority should be documented in evidence_ref.
    status: bibo:draft
    permissible_values:
      self_:
        meaning: publicschema:DelegationType/self_
        title: Self
        description: The data subject indicated consent on their own behalf with full legal capacity.
          The most common value for adult program participants who are legally competent. No delegation
          document is required.
        annotations:
          label_es: Uno mismo
          label_fr: Soi-même
          description_es: El interesado indicó el consentimiento en su propio nombre con plena capacidad
            jurídica. El valor más común para los participantes adultos del programa con plena capacidad
            jurídica. No se requiere ningún documento de delegación.
          description_fr: La personne concernée a indiqué le consentement en son propre nom avec pleine
            capacité juridique. La valeur la plus courante pour les participants adultes ayant pleine
            capacité juridique. Aucun document de délégation n'est requis.
      legal_guardian:
        meaning: publicschema:DelegationType/legal_guardian
        title: Legal guardian
        description: A person appointed by a court or authority to make legal decisions on behalf of the
          data subject, typically because the subject is a minor or has been determined to lack legal
          capacity for decision-making. The guardianship order or equivalent document should be referenced
          in evidence_ref.
        annotations:
          label_es: Tutor legal
          label_fr: Tuteur légal
          description_es: Una persona nombrada por un tribunal o autoridad para tomar decisiones jurídicas
            en nombre del interesado, típicamente porque el interesado es menor de edad o ha sido determinado
            que carece de capacidad jurídica para tomar decisiones. La orden de tutela o documento equivalente
            debe referenciarse en evidence_ref.
          description_fr: Une personne désignée par un tribunal ou une autorité pour prendre des décisions
            juridiques au nom de la personne concernée, généralement parce que la personne concernée est
            mineure ou a été jugée incapable de prendre des décisions de manière autonome. L'ordonnance
            de tutelle ou le document équivalent doit être référencé dans evidence_ref.
      parent:
        meaning: publicschema:DelegationType/parent
        title: Parent
        description: A biological or adoptive parent who provides consent for a minor child under parental
          authority, as recognised by applicable family law. Distinct from legal_guardian in that no court
          appointment is required; the parental relationship itself is the authority. Parental authority
          typically ends at the age of majority, at which point the record should be flagged for re-consent.
        annotations:
          label_es: Progenitor
          label_fr: Parent
          description_es: Un padre o madre biológico o adoptivo que proporciona consentimiento para un
            hijo menor bajo autoridad parental, según lo reconocido por el derecho de familia aplicable.
            Distinto de legal_guardian en que no se requiere nombramiento judicial; la relación parental
            en sí misma es la autoridad. La autoridad parental típicamente termina con la mayoría de edad,
            momento en que el registro debe marcarse para renovación del consentimiento.
          description_fr: Un parent biologique ou adoptif qui donne le consentement pour un enfant mineur
            dans le cadre de l'autorité parentale, telle que reconnue par le droit de la famille applicable.
            Distinct de legal_guardian en ce qu'aucune nomination judiciaire n'est requise; la relation
            parentale elle-même est l'autorité. L'autorité parentale prend généralement fin à la majorité,
            après quoi l'enregistrement doit être marqué pour renouvellement du consentement.
      power_of_attorney:
        meaning: publicschema:DelegationType/power_of_attorney
        title: Power of attorney
        description: A person authorised by a formal written instrument (a power of attorney) to act on
          behalf of the data subject in legal matters. The data subject had legal capacity at the time
          the power was granted. The power-of-attorney document should be referenced in evidence_ref and
          its scope should cover data processing decisions.
        annotations:
          label_es: Poder notarial
          label_fr: Procuration
          description_es: Una persona autorizada por un instrumento escrito formal (un poder notarial)
            para actuar en nombre del interesado en asuntos legales. El interesado tenía capacidad jurídica
            en el momento en que se otorgó el poder. El documento de poder notarial debe referenciarse
            en evidence_ref y su alcance debe cubrir las decisiones de tratamiento de datos.
          description_fr: Une personne autorisée par un instrument écrit formel (une procuration) à agir
            au nom de la personne concernée dans des affaires juridiques. La personne concernée avait
            la capacité juridique au moment de l'octroi du pouvoir. La procuration doit être référencée
            dans evidence_ref et sa portée doit couvrir les décisions de traitement des données.
      authorised_representative:
        meaning: publicschema:DelegationType/authorised_representative
        title: Authorised representative
        description: A person or organisation formally designated to represent the data subject in administrative
          or program contexts, without a full power of attorney. The authorisation may be a program-specific
          form, a community-leader designation, or a written authority from the subject. The specific
          type of authorisation should be documented in evidence_ref.
        annotations:
          label_es: Representante autorizado
          label_fr: Représentant autorisé
          description_es: Una persona u organización formalmente designada para representar al interesado
            en contextos administrativos o del programa, sin un poder notarial completo. La autorización
            puede ser un formulario específico del programa, una designación de líder comunitario o una
            autoridad escrita del interesado. El tipo específico de autorización debe documentarse en
            evidence_ref.
          description_fr: Une personne ou organisation formellement désignée pour représenter la personne
            concernée dans des contextes administratifs ou de programme, sans procuration complète. L'autorisation
            peut être un formulaire spécifique au programme, une désignation de chef communautaire ou
            une autorité écrite de la personne concernée. Le type spécifique d'autorisation doit être
            documenté dans evidence_ref.
      institutional_representative:
        meaning: publicschema:DelegationType/institutional_representative
        title: Institutional representative
        description: An institution, such as a hospital, care facility, or government body, acting as
          the legal decision-maker for a data subject who lacks capacity and has no individual guardian,
          parent, or attorney. Examples include a public trustee or a care facility acting under a court
          appointment. The institutional authority should be documented in evidence_ref.
        annotations:
          label_es: Representante institucional
          label_fr: Représentant institutionnel
          description_es: Una institución, como un hospital, un centro de atención o un organismo gubernamental,
            que actúa como tomador de decisiones legal para un interesado que carece de capacidad y no
            tiene tutor individual, progenitor ni apoderado. Ejemplos incluyen un administrador público
            o un centro de atención que actúa bajo nombramiento judicial. La autoridad institucional debe
            documentarse en evidence_ref.
          description_fr: Une institution, telle qu'un hôpital, un établissement de soins ou un organisme
            gouvernemental, agissant en tant que décideur légal pour une personne concernée qui manque
            de capacité et n'a pas de tuteur individuel, de parent ou de mandataire. Il peut s'agir par
            exemple d'un curateur public ou d'un établissement de soins agissant en vertu d'une nomination
            judiciaire. L'autorité institutionnelle doit être documentée dans evidence_ref.
    annotations:
      label_es: Tipo de delegación
      label_fr: Type de délégation
      description_es: Quién indicó el consentimiento en nombre del interesado y bajo qué autoridad legal.
        El valor self significa que el interesado indicó el consentimiento directamente por sí mismo.
        Todos los demás valores indican que un tercero otorgó el consentimiento en nombre de un interesado
        que carecía o había delegado la capacidad jurídica. La autoridad de delegación aplicable debe
        documentarse en evidence_ref.
      description_fr: Qui a indiqué le consentement au nom de la personne concernée et en vertu de quelle
        autorité juridique. La valeur self signifie que la personne concernée a indiqué le consentement
        directement pour elle-même. Toutes les autres valeurs indiquent qu'un tiers a donné le consentement
        au nom d'une personne concernée qui manquait ou avait délégué la capacité juridique. L'autorité
        de délégation applicable doit être documentée dans evidence_ref.
  DeliveryChannel:
    enum_uri: publicschema:DeliveryChannel
    title: Delivery Channel
    description: The mechanisms through which benefit transfers reach beneficiaries.
    status: bibo:status/forthcoming
    permissible_values:
      bank_transfer:
        meaning: publicschema:DeliveryChannel/bank_transfer
        title: Bank transfer
        description: Payment credited directly to a beneficiary's bank account via electronic funds transfer.
        annotations:
          label_es: Transferencia bancaria
          label_fr: Virement bancaire
          description_es: Pago acreditado directamente en la cuenta bancaria de un beneficiario mediante
            transferencia electrónica de fondos.
          description_fr: Paiement crédité directement sur le compte bancaire d'un bénéficiaire par virement
            électronique.
      mobile_money:
        meaning: publicschema:DeliveryChannel/mobile_money
        title: Mobile money
        description: Payment transmitted to a beneficiary's registered mobile money account (e.g., M-Pesa,
          Orange Money).
        annotations:
          label_es: Dinero móvil
          label_fr: Monnaie mobile
          description_es: Pago transmitido a la cuenta de dinero móvil registrada de un beneficiario (p.
            ej., M-Pesa, Orange Money).
          description_fr: Paiement transmis au compte de monnaie mobile enregistré d'un bénéficiaire (ex.
            M-Pesa, Orange Money).
      cash:
        meaning: publicschema:DeliveryChannel/cash
        title: Cash
        description: Physical currency handed directly to the beneficiary, typically at a distribution
          point.
        annotations:
          label_es: Efectivo
          label_fr: Espèces
          description_es: Moneda física entregada directamente al beneficiario, generalmente en un punto
            de distribución.
          description_fr: Monnaie physique remise directement au bénéficiaire, généralement à un point
            de distribution.
      agent_network:
        meaning: publicschema:DeliveryChannel/agent_network
        title: Agent network
        description: Payment disbursed through a network of authorised retail agents acting on behalf
          of a financial institution.
        annotations:
          label_es: Red de agentes
          label_fr: Réseau d'agents
          description_es: Pago desembolsado a través de una red de agentes minoristas autorizados que
            actúan en nombre de una institución financiera.
          description_fr: Paiement versé par un réseau d'agents de détail autorisés agissant pour le compte
            d'une institution financière.
      prepaid_card:
        meaning: publicschema:DeliveryChannel/prepaid_card
        title: Prepaid card
        description: Funds loaded onto a physical or virtual prepaid card that the beneficiary uses to
          make purchases or withdraw cash.
        annotations:
          label_es: Tarjeta prepaga
          label_fr: Carte prépayée
          description_es: Fondos cargados en una tarjeta prepaga física o virtual que el beneficiario
            utiliza para realizar compras o retirar efectivo.
          description_fr: Fonds chargés sur une carte prépayée physique ou virtuelle que le bénéficiaire
            utilise pour effectuer des achats ou retirer de l'argent.
      service_point:
        meaning: publicschema:DeliveryChannel/service_point
        title: Service point
        description: Benefits accessed at a designated service facility, such as a health clinic or community
          centre.
        annotations:
          label_es: Punto de servicio
          label_fr: Point de service
          description_es: Beneficios a los que se accede en una instalación de servicio designada, como
            una clínica de salud o un centro comunitario.
          description_fr: Prestations accessibles dans un établissement de service désigné, tel qu'une
            clinique de santé ou un centre communautaire.
      other:
        meaning: publicschema:DeliveryChannel/other
        title: Other
        description: A delivery channel not covered by the other defined values.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un canal de entrega no cubierto por los demás valores definidos.
          description_fr: Un canal de livraison non couvert par les autres valeurs définies.
    annotations:
      label_es: Canal de entrega
      label_fr: Canal de prestation
      description_es: Los mecanismos a través de los cuales las transferencias de beneficios llegan a
        los beneficiarios.
      description_fr: Les mécanismes par lesquels les transferts de prestations parviennent aux bénéficiaires.
      vocab_references_json: '[{"machine_readable": false, "name": "GovStack Payments Building Block",
        "notes": "GovStack distinguishes origin channel from delivery instrument. This vocabulary focuses
        on delivery instrument only.", "relationship": "structural_pattern", "uri": "https://specs.govstack.global/payments/2-description"},
        {"machine_readable": true, "name": "GSMA Mobile Money API", "relationship": "partial_overlap",
        "uri": "https://developer.mobilemoneyapi.io/"}]'
      see_also_json: '[{"note": "delivery-channel describes how a benefit reaches the beneficiary (the
        mechanism); benefit-modality describes what form the benefit takes (cash, voucher, in-kind). A
        cash benefit (modality) can be delivered via bank transfer, mobile money, or cash (channels).",
        "vocabulary": "benefit-modality"}]'
      bibliography_refs: '["govstack-payments", "gsma-mobile-money"]'
  DisplacementStatus:
    enum_uri: publicschema:DisplacementStatus
    title: Displacement Status
    description: The legal, administrative, or protection status of a person with respect to displacement
      and migration, drawing from international frameworks for displaced and stateless populations.
    status: bibo:draft
    permissible_values:
      resident:
        meaning: publicschema:DisplacementStatus/resident
        title: Resident
        description: A person living in their habitual place of residence who has not been displaced.
          Corresponds to 'host community' member in humanitarian contexts.
        annotations:
          label_es: Residente
          label_fr: Résident
          description_es: Una persona que vive en su lugar habitual de residencia y que no ha sido desplazada.
            Corresponde al miembro de la comunidad de acogida en contextos humanitarios.
          description_fr: Une personne vivant dans son lieu de résidence habituel qui n'a pas été déplacée.
            Correspond au membre de la communauté d'accueil dans les contextes humanitaires.
      idp:
        meaning: publicschema:DisplacementStatus/idp
        title: Internally displaced person
        description: A person who has been forced or obliged to flee or leave their home or habitual residence,
          in particular as a result of armed conflict, violence, human rights violations, or disasters,
          and who has not crossed an internationally recognized state border.
        annotations:
          label_es: Desplazado interno
          label_fr: Déplacé interne
          description_es: Una persona que ha sido obligada o forzada a huir o abandonar su hogar o lugar
            habitual de residencia, en particular como resultado de un conflicto armado, violencia, violaciones
            de derechos humanos o desastres, y que no ha cruzado una frontera estatal internacionalmente
            reconocida.
          description_fr: Une personne qui a été forcée ou contrainte de fuir ou quitter son domicile
            ou sa résidence habituelle, notamment en raison d'un conflit armé, de violence, de violations
            des droits humains ou de catastrophes, et qui n'a pas franchi une frontière étatique internationalement
            reconnue.
      idp_returnee:
        meaning: publicschema:DisplacementStatus/idp_returnee
        title: IDP returnee
        description: A formerly internally displaced person who has returned to their area of origin but
          for whom a durable solution has not yet been confirmed.
        annotations:
          label_es: Desplazado interno retornado
          label_fr: Déplacé interne retourné
          description_es: Un antiguo desplazado interno que ha regresado a su zona de origen pero para
            quien aún no se ha confirmado una solución duradera.
          description_fr: Un ancien déplacé interne qui est retourné dans sa zone d'origine mais pour
            lequel une solution durable n'a pas encore été confirmée.
      refugee:
        meaning: publicschema:DisplacementStatus/refugee
        title: Refugee
        description: A person who, owing to a well-founded fear of persecution, has crossed an international
          border and been granted refugee status under the 1951 Convention, the 1969 OAU Convention, or
          the 1984 Cartagena Declaration.
        annotations:
          label_es: Refugiado
          label_fr: Réfugié
          description_es: Una persona que, debido a un temor fundado de persecución, ha cruzado una frontera
            internacional y ha obtenido el estatuto de refugiado conforme a la Convención de 1951, la
            Convención de la OUA de 1969, o la Declaración de Cartagena de 1984.
          description_fr: Une personne qui, craignant avec raison d'être persécutée, a franchi une frontière
            internationale et s'est vu accorder le statut de réfugié en vertu de la Convention de 1951,
            de la Convention de l'OUA de 1969, ou de la Déclaration de Cartagène de 1984.
      asylum_seeker:
        meaning: publicschema:DisplacementStatus/asylum_seeker
        title: Asylum seeker
        description: A person who has sought international protection and whose claim for refugee status
          has not yet been determined.
        annotations:
          label_es: Solicitante de asilo
          label_fr: Demandeur d'asile
          description_es: Una persona que ha solicitado protección internacional y cuya solicitud de estatuto
            de refugiado aún no ha sido resuelta.
          description_fr: Une personne qui a demandé une protection internationale et dont la demande
            de statut de réfugié n'a pas encore été examinée.
      returnee_from_abroad:
        meaning: publicschema:DisplacementStatus/returnee_from_abroad
        title: Returnee from abroad
        description: A person who previously sought international protection and has returned to their
          country of origin, whether voluntarily or involuntarily.
        annotations:
          label_es: Retornado del exterior
          label_fr: Rapatrié
          description_es: Una persona que previamente solicitó protección internacional y ha regresado
            a su país de origen, de manera voluntaria o involuntaria.
          description_fr: Une personne qui a précédemment demandé une protection internationale et est
            retournée dans son pays d'origine, de manière volontaire ou non.
      international_migrant:
        meaning: publicschema:DisplacementStatus/international_migrant
        title: International migrant
        description: A person who is living outside their country of origin for reasons other than international
          protection (e.g., employment, education, family reunification).
        annotations:
          label_es: Migrante internacional
          label_fr: Migrant international
          description_es: Una persona que vive fuera de su país de origen por razones distintas a la protección
            internacional (empleo, educación, reunificación familiar, etc.).
          description_fr: Une personne qui vit hors de son pays d'origine pour des raisons autres que
            la protection internationale (emploi, éducation, regroupement familial, etc.).
      stateless:
        meaning: publicschema:DisplacementStatus/stateless
        title: Stateless person
        description: A person who is not considered as a national by any state under the operation of
          its law, as defined by the 1954 Convention Relating to the Status of Stateless Persons.
        annotations:
          label_es: Apátrida
          label_fr: Apatride
          description_es: Una persona que ningún Estado considera como nacional suyo en virtud de su legislación,
            conforme a la Convención de 1954 sobre el Estatuto de los Apátridas.
          description_fr: Une personne qu'aucun État ne considère comme son ressortissant par application
            de sa législation, conformément à la Convention de 1954 relative au statut des apatrides.
    annotations:
      label_es: Estado de desplazamiento
      label_fr: Statut de déplacement
      description_es: El estado jurídico, administrativo o de protección de una persona en relación con
        el desplazamiento y la migración, basado en los marcos internacionales para poblaciones desplazadas
        y apátridas.
      description_fr: Le statut juridique, administratif ou de protection d'une personne en matière de
        déplacement et de migration, fondé sur les cadres internationaux pour les populations déplacées
        et apatrides.
      standard_json: '{"name": "EGRISS International Recommendations on IDP Statistics (IRIS)", "notes":
        "Endorsed by the UN Statistical Commission in 2020. Complements EGRISS IRRS (2018) for refugee
        statistics. Values also draw from IOM International Migration Law Glossary and the 1951 Refugee
        Convention / 1954 Statelessness Convention.", "uri": "https://egrisstats.org/recommendations/international-recommendations-on-idp-statistics-iris/"}'
      bibliography_refs: '["egriss-iris"]'
  DocumentStatus:
    enum_uri: publicschema:DocumentStatus
    title: Document Status
    description: The availability and condition of an identity or civil documentation document held by
      a household member. Captures displacement-specific loss and confiscation states absent from standard
      document registries. Complements the PS document-type vocabulary.
    status: bibo:status/forthcoming
    permissible_values:
      valid:
        meaning: publicschema:DocumentStatus/valid
        title: Valid and available
        description: Document is current, has not expired, and is in the holder's possession.
        annotations:
          label_es: Válido y disponible
          label_fr: Valide et disponible
          description_es: El documento está vigente, no ha expirado y está en posesión del titular.
          description_fr: Le document est à jour, n'a pas expiré et est en possession de son titulaire.
      expired:
        meaning: publicschema:DocumentStatus/expired
        title: Expired
        description: Document exists but its validity period has lapsed and has not been renewed.
        annotations:
          label_es: Vencido
          label_fr: Expiré
          description_es: El documento existe pero su período de validez ha vencido y no ha sido renovado.
          description_fr: Le document existe mais sa période de validité a expiré et n'a pas été renouvelée.
      lost_during_displacement:
        meaning: publicschema:DocumentStatus/lost_during_displacement
        title: Lost during displacement
        description: Document existed but was lost, left behind, or destroyed during the displacement
          event.
        annotations:
          label_es: Perdido durante el desplazamiento
          label_fr: Perdu lors du déplacement
          description_es: El documento existía pero se perdió, se dejó atrás o fue destruido durante el
            evento de desplazamiento.
          description_fr: Le document existait mais a été perdu, laissé derrière ou détruit lors de l'événement
            de déplacement.
      confiscated:
        meaning: publicschema:DocumentStatus/confiscated
        title: Confiscated
        description: 'Document was seized by authorities, armed actors, or employers. Note: this status
          may indicate persecution or trafficking; properties using this code carry sensitivity: sensitive.'
        annotations:
          label_es: Confiscado
          label_fr: Confisqué
          description_es: El documento fue incautado por autoridades, actores armados o empleadores.
          description_fr: Le document a été saisi par les autorités, des acteurs armés ou des employeurs.
      never_had:
        meaning: publicschema:DocumentStatus/never_had
        title: Never had a document
        description: Person has never been issued this type of document.
        annotations:
          label_es: Nunca tuvo un documento
          label_fr: N'a jamais eu de document
          description_es: La persona nunca ha recibido este tipo de documento.
          description_fr: La personne n'a jamais reçu ce type de document.
      in_process:
        meaning: publicschema:DocumentStatus/in_process
        title: In process
        description: Application for a new or replacement document is underway.
        annotations:
          label_es: En proceso
          label_fr: En cours d'obtention
          description_es: Una solicitud de documento nuevo o de reemplazo está en curso.
          description_fr: Une demande de nouveau document ou de remplacement est en cours.
    annotations:
      label_es: Estado del documento
      label_fr: Statut du document
      description_es: La disponibilidad y el estado de un documento de identidad o de registro civil en
        posesión de un miembro del hogar. Captura los estados de pérdida y confiscación específicos del
        desplazamiento ausentes en los registros documentales estándar. Complementa el vocabulario document-type
        del PS.
      description_fr: La disponibilité et l'état d'un document d'identité ou d'état civil détenu par un
        membre du ménage. Capture les états de perte et de confiscation spécifiques au déplacement absents
        des registres documentaires standard. Complète le vocabulaire document-type du PS.
      standard_json: '{"name": "IOM Displacement Tracking Matrix (DTM) documentation indicator", "uri":
        "https://dtm.iom.int/"}'
      bibliography_refs: '["iom-dtm"]'
  DocumentType:
    enum_uri: publicschema:DocumentType
    title: Document Type
    description: Categories of identity documents that carry one or more identifiers about a party, such
      as passports, national identity cards, civil registration certificates, and program-issued beneficiary
      cards.
    status: bibo:status/forthcoming
    permissible_values:
      passport:
        meaning: publicschema:DocumentType/passport
        title: Passport
        description: A government-issued travel document that also serves as a proof of identity and nationality.
        annotations:
          label_es: Pasaporte
          label_fr: Passeport
          description_es: Un documento de viaje emitido por el gobierno que también sirve como prueba
            de identidad y nacionalidad.
          description_fr: Un document de voyage délivré par le gouvernement servant également de preuve
            d'identité et de nationalité.
      national_id_card:
        meaning: publicschema:DocumentType/national_id_card
        title: National ID card
        description: A government-issued card attesting national identity, typically carrying a national
          identification number.
        annotations:
          label_es: Tarjeta de identidad nacional
          label_fr: Carte d'identité nationale
          description_es: Una tarjeta emitida por el gobierno que acredita la identidad nacional, que
            normalmente incluye un número de identificación nacional.
          description_fr: Une carte délivrée par le gouvernement attestant l'identité nationale, portant
            généralement un numéro d'identification national.
      drivers_license:
        meaning: publicschema:DocumentType/drivers_license
        title: Driver's license
        description: A government-issued permit to operate motor vehicles, commonly used as identification.
        annotations:
          label_es: Licencia de conducir
          label_fr: Permis de conduire
          description_es: Un permiso emitido por el gobierno para operar vehículos motorizados, comúnmente
            utilizado como identificación.
          description_fr: Un permis délivré par le gouvernement pour conduire des véhicules à moteur,
            couramment utilisé comme pièce d'identité.
      voter_id_card:
        meaning: publicschema:DocumentType/voter_id_card
        title: Voter ID card
        description: An identity document issued for electoral registration purposes.
        annotations:
          label_es: Tarjeta de votante
          label_fr: Carte d'électeur
          description_es: Un documento de identidad emitido con fines de registro electoral.
          description_fr: Un document d'identité délivré à des fins d'inscription électorale.
      digital_identity_credential:
        meaning: publicschema:DocumentType/digital_identity_credential
        title: Digital identity credential
        description: A digital document, such as a Verifiable Credential, that attests identity attributes
          about a party without a physical counterpart.
        annotations:
          label_es: Credencial de identidad digital
          label_fr: Attestation d'identité numérique
          description_es: Un documento digital, como una credencial verificable, que acredita atributos
            de identidad de una parte sin contraparte física.
          description_fr: Un document numérique, tel qu'une attestation vérifiable, qui atteste les attributs
            d'identité d'une partie sans équivalent physique.
      birth_certificate:
        meaning: publicschema:DocumentType/birth_certificate
        title: Birth certificate
        description: An official record of a person's birth issued by a civil registry.
        annotations:
          label_es: Certificado de nacimiento
          label_fr: Acte de naissance
          description_es: Un registro oficial de nacimiento emitido por un registro civil.
          description_fr: Un document officiel de naissance délivré par un registre d'état civil.
      marriage_certificate:
        meaning: publicschema:DocumentType/marriage_certificate
        title: Marriage certificate
        description: An official record of a marriage issued by a civil registry or religious authority.
        annotations:
          label_es: Certificado de matrimonio
          label_fr: Acte de mariage
          description_es: Un registro oficial de matrimonio emitido por un registro civil o una autoridad
            religiosa.
          description_fr: Un document officiel de mariage délivré par un registre d'état civil ou une
            autorité religieuse.
      death_certificate:
        meaning: publicschema:DocumentType/death_certificate
        title: Death certificate
        description: An official record of a death issued by a civil registry or health authority.
        annotations:
          label_es: Certificado de defunción
          label_fr: Acte de décès
          description_es: Un registro oficial de defunción emitido por un registro civil o una autoridad
            sanitaria.
          description_fr: Un document officiel de décès délivré par un registre d'état civil ou une autorité
            sanitaire.
      program_beneficiary_card:
        meaning: publicschema:DocumentType/program_beneficiary_card
        title: Program beneficiary card
        description: A card issued by a social protection or service delivery program to identify enrolled
          beneficiaries, sometimes also used at delivery points for authentication.
        annotations:
          label_es: Tarjeta de beneficiario
          label_fr: Carte de bénéficiaire
          description_es: Una tarjeta emitida por un programa de protección social o de prestación de
            servicios para identificar a los beneficiarios inscritos, utilizada a veces en los puntos
            de entrega para la autenticación.
          description_fr: Une carte délivrée par un programme de protection sociale ou de prestation de
            services pour identifier les bénéficiaires inscrits, parfois utilisée aux points de prestation
            pour l'authentification.
      other:
        meaning: publicschema:DocumentType/other
        title: Other
        description: A document type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de documento no cubierto por las otras categorías.
          description_fr: Un type de document non couvert par les autres catégories.
    annotations:
      label_es: Tipo de documento
      label_fr: Type de document
      description_es: Categorías de documentos de identidad que portan uno o más identificadores sobre
        una parte, como pasaportes, tarjetas de identidad nacional, actas de registro civil y tarjetas
        de beneficiario emitidas por programas.
      description_fr: Catégories de documents d'identité portant un ou plusieurs identifiants concernant
        une partie, tels que les passeports, les cartes d'identité nationale, les actes d'état civil et
        les cartes de bénéficiaire délivrées par un programme.
      vocab_references_json: '[{"machine_readable": false, "name": "ICAO Doc 9303 - Machine Readable Travel
        Documents", "notes": "Covers passport, visa, and card document classes.", "relationship": "partial_overlap",
        "uri": "https://www.icao.int/publications/pages/publication.aspx?docnum=9303"}, {"machine_readable":
        true, "name": "MOSIP Identity Schema", "notes": "Country-configurable document categories. This
        vocabulary provides a base set; implementations extend per country.", "relationship": "structural_pattern",
        "uri": "https://docs.mosip.io/1.2.0/id-lifecycle-management/identity-management/id-schema"}]'
      vc_guidance_json: '"Document type classifies the physical or digital document being described, distinct
        from the Verifiable Credential envelope type (e.g. IdentityCredential). A Verifiable Credential
        may attest to an IdentityDocument of a given document_type without the credential itself becoming
        the document.\n"'
      see_also_json: '[{"note": "Use identifier-type to classify the coded values carried by the document;
        use document-type to classify the document itself.", "vocabulary": "identifier-type"}]'
      bibliography_refs: '["w3c-vc-data-model-2"]'
  DwellingType:
    enum_uri: publicschema:DwellingType
    title: Dwelling Type
    description: The type of living quarters occupied by the household, classified according to the UN
      Principles and Recommendations for Population and Housing Censuses.
    status: bibo:status/forthcoming
    permissible_values:
      permanent:
        meaning: publicschema:DwellingType/permanent
        title: Permanent structure
        description: Built with durable materials such as concrete, brick, stone, or metal framing, expected
          to last 20 or more years.
        annotations:
          label_es: Estructura permanente
          label_fr: Construction permanente
          description_es: Construida con materiales duraderos como concreto, ladrillo, piedra o estructura
            metálica, con una vida útil esperada de 20 años o más.
          description_fr: Construite avec des matériaux durables tels que le béton, la brique, la pierre
            ou la charpente métallique, prévue pour durer 20 ans ou plus.
      semi_permanent:
        meaning: publicschema:DwellingType/semi_permanent
        title: Semi-permanent structure
        description: Mix of durable and non-durable materials, such as mud walls with a metal roof.
        annotations:
          label_es: Estructura semipermanente
          label_fr: Construction semi-permanente
          description_es: Mezcla de materiales duraderos y no duraderos, como paredes de barro con techo
            de metal.
          description_fr: Mélange de matériaux durables et non durables, comme des murs en terre avec
            un toit en métal.
      temporary:
        meaning: publicschema:DwellingType/temporary
        title: Temporary structure
        description: Built with non-durable materials such as thatch, bamboo, or unfired mud.
        annotations:
          label_es: Estructura temporal
          label_fr: Construction temporaire
          description_es: Construida con materiales no duraderos como paja, bambú o barro sin cocer.
          description_fr: Construite avec des matériaux non durables tels que le chaume, le bambou ou
            la terre crue non cuite.
      improvised:
        meaning: publicschema:DwellingType/improvised
        title: Improvised dwelling
        description: Makeshift shelter made from waste materials, plastic sheeting, or scrap; includes
          shacks in informal settlements.
        annotations:
          label_es: Vivienda improvisada
          label_fr: Logement de fortune
          description_es: Refugio improvisado hecho de materiales de desecho, plástico o chatarra, incluidas
            las chabolas en asentamientos informales.
          description_fr: Abri de fortune construit avec des matériaux de récupération, des bâches en
            plastique ou des débris, y compris les bidonvilles dans les quartiers informels.
      collective:
        meaning: publicschema:DwellingType/collective
        title: Collective living quarters
        description: Dormitories, barracks, institutions, refugee camps, or hotels used as long-term housing.
        annotations:
          label_es: Vivienda colectiva
          label_fr: Logement collectif
          description_es: Dormitorios, cuarteles, instituciones, campamentos de refugiados u hoteles utilizados
            como vivienda a largo plazo.
          description_fr: Dortoirs, casernes, institutions, camps de réfugiés ou hôtels utilisés comme
            logement à long terme.
      mobile:
        meaning: publicschema:DwellingType/mobile
        title: Mobile housing unit
        description: Tents, caravans, houseboats, or other movable structures used as a primary residence.
        annotations:
          label_es: Vivienda móvil
          label_fr: Logement mobile
          description_es: Tiendas, caravanas, casas flotantes u otras estructuras móviles utilizadas como
            residencia principal.
          description_fr: Tentes, caravanes, bateaux-maisons ou autres structures mobiles utilisées comme
            résidence principale.
    annotations:
      label_es: Tipo de vivienda
      label_fr: Type de logement
      description_es: El tipo de vivienda ocupada por el hogar, clasificado según los Principios y Recomendaciones
        de las Naciones Unidas para los censos de población y vivienda.
      description_fr: Le type de logement occupé par le ménage, classifié selon les Principes et recommandations
        des Nations Unies pour les recensements de population et des logements.
      standard_json: '{"name": "UN Principles and Recommendations for Population and Housing Censuses,
        Rev. 3", "uri": "https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf"}'
      bibliography_refs: '["un-census-rev3"]'
  EducationLevel:
    enum_uri: publicschema:EducationLevel
    title: Education Level
    description: The highest level of education completed by a person, classified according to the International
      Standard Classification of Education (ISCED 2011).
    status: bibo:status/published
    permissible_values:
      none:
        meaning: publicschema:EducationLevel/none
        title: No formal education
        description: No formal education completed. Below ISCED level 0.
        annotations:
          label_es: Sin educación formal
          label_fr: Aucune éducation formelle
          description_es: Sin educación formal completada. Por debajo del nivel CINE 0.
          description_fr: Aucune éducation formelle achevée. En dessous du niveau CITE 0.
      early_childhood:
        meaning: publicschema:EducationLevel/early_childhood
        title: Early childhood education
        description: 'ISCED level 0: programmes for children below the age of entry into primary education.'
        annotations:
          label_es: Educación de la primera infancia
          label_fr: Éducation de la petite enfance
          description_es: 'CINE nivel 0: programas para niños menores de la edad de entrada en la educación
            primaria.'
          description_fr: 'CITE niveau 0 : programmes destinés aux enfants en dessous de l''âge d''entrée
            dans l''enseignement primaire.'
          standard_code: '0'
      primary:
        meaning: publicschema:EducationLevel/primary
        title: Primary education
        description: 'ISCED level 1: first stage of basic education, typically starting at age 5-7.'
        annotations:
          label_es: Educación primaria
          label_fr: Enseignement primaire
          description_es: 'CINE nivel 1: primera etapa de la educación básica, que comienza típicamente
            entre los 5 y 7 años.'
          description_fr: 'CITE niveau 1 : première étape de l''éducation de base, débutant généralement
            entre 5 et 7 ans.'
          standard_code: '1'
      lower_secondary:
        meaning: publicschema:EducationLevel/lower_secondary
        title: Lower secondary education
        description: 'ISCED level 2: second stage of basic education, building on primary.'
        annotations:
          label_es: Educación secundaria baja
          label_fr: Premier cycle de l'enseignement secondaire
          description_es: 'CINE nivel 2: segunda etapa de la educación básica, que continúa a partir de
            la primaria.'
          description_fr: 'CITE niveau 2 : deuxième étape de l''éducation de base, faisant suite à l''enseignement
            primaire.'
          standard_code: '2'
      upper_secondary:
        meaning: publicschema:EducationLevel/upper_secondary
        title: Upper secondary education
        description: 'ISCED level 3: final stage of secondary education, preparing for tertiary or employment.'
        annotations:
          label_es: Educación secundaria alta
          label_fr: Deuxième cycle de l'enseignement secondaire
          description_es: 'CINE nivel 3: etapa final de la educación secundaria, que prepara para la educación
            terciaria o el empleo.'
          description_fr: 'CITE niveau 3 : dernière étape de l''enseignement secondaire, préparant à l''enseignement
            supérieur ou à l''emploi.'
          standard_code: '3'
      post_secondary_non_tertiary:
        meaning: publicschema:EducationLevel/post_secondary_non_tertiary
        title: Post-secondary non-tertiary education
        description: 'ISCED level 4: programmes between upper secondary and tertiary that are not typically
          considered higher education.'
        annotations:
          label_es: Educación postsecundaria no terciaria
          label_fr: Enseignement post-secondaire non supérieur
          description_es: 'CINE nivel 4: programas entre la educación secundaria alta y la terciaria que
            no se consideran habitualmente educación superior.'
          description_fr: 'CITE niveau 4 : programmes situés entre le secondaire supérieur et le supérieur,
            non généralement considérés comme enseignement supérieur.'
          standard_code: '4'
      short_cycle_tertiary:
        meaning: publicschema:EducationLevel/short_cycle_tertiary
        title: Short-cycle tertiary education
        description: 'ISCED level 5: short practical or vocational programmes at the tertiary level.'
        annotations:
          label_es: Educación terciaria de ciclo corto
          label_fr: Enseignement supérieur de cycle court
          description_es: 'CINE nivel 5: programas cortos, prácticos o vocacionales a nivel terciario.'
          description_fr: 'CITE niveau 5 : programmes courts, pratiques ou professionnels au niveau de
            l''enseignement supérieur.'
          standard_code: '5'
      bachelor:
        meaning: publicschema:EducationLevel/bachelor
        title: Bachelor's or equivalent
        description: 'ISCED level 6: first degree or equivalent, typically 3-4 years.'
        annotations:
          label_es: Grado o equivalente
          label_fr: Licence ou équivalent
          description_es: 'CINE nivel 6: primer título o equivalente, típicamente de 3 a 4 años.'
          description_fr: 'CITE niveau 6 : premier diplôme ou équivalent, généralement 3 à 4 ans.'
          standard_code: '6'
      master:
        meaning: publicschema:EducationLevel/master
        title: Master's or equivalent
        description: 'ISCED level 7: second degree or equivalent, typically 1-2 years after bachelor''s.'
        annotations:
          label_es: Maestría o equivalente
          label_fr: Master ou équivalent
          description_es: 'CINE nivel 7: segundo título o equivalente, típicamente 1 a 2 años después
            del grado.'
          description_fr: 'CITE niveau 7 : deuxième diplôme ou équivalent, généralement 1 à 2 ans après
            la licence.'
          standard_code: '7'
      doctoral:
        meaning: publicschema:EducationLevel/doctoral
        title: Doctoral or equivalent
        description: 'ISCED level 8: highest level of education, involving original research.'
        annotations:
          label_es: Doctorado o equivalente
          label_fr: Doctorat ou équivalent
          description_es: 'CINE nivel 8: nivel más alto de educación, que implica investigación original.'
          description_fr: 'CITE niveau 8 : niveau d''éducation le plus élevé, impliquant une recherche
            originale.'
          standard_code: '8'
    annotations:
      label_es: Nivel de educación
      label_fr: Niveau d'éducation
      description_es: El nivel más alto de educación alcanzado por una persona, clasificado según la Clasificación
        Internacional Normalizada de la Educación (CINE 2011).
      description_fr: Le plus haut niveau d'éducation atteint par une personne, classé selon la Classification
        internationale type de l'éducation (CITE 2011).
      standard_json: '{"name": "ISCED 2011", "notes": "International Standard Classification of Education.
        Levels 0-8.", "uri": "https://isced.uis.unesco.org/en/isced-2011/"}'
      same_standard_systems_json: '["openspp"]'
      bibliography_refs: '["dhs-recode7", "isced-2011", "mics6"]'
  EmploymentStatus:
    enum_uri: publicschema:EmploymentStatus
    title: Employment Status
    description: The labour force participation status of a person, classified as employed, unemployed,
      or outside the labour force following the three-category labour-force status classification adopted
      under the ILO 19th International Conference of Labour Statisticians (2013).
    status: bibo:status/forthcoming
    permissible_values:
      employed:
        meaning: publicschema:EmploymentStatus/employed
        title: Employed
        description: Persons of working age who, during a short reference period, were engaged in any
          activity to produce goods or provide services for pay or profit.
        annotations:
          label_es: Empleado
          label_fr: Employé
          description_es: Personas en edad de trabajar que, durante un período de referencia corto, realizaron
            alguna actividad para producir bienes o prestar servicios a cambio de remuneración o beneficio.
          description_fr: Personnes en âge de travailler qui, pendant une courte période de référence,
            ont exercé une activité de production de biens ou de prestation de services moyennant rémunération
            ou profit.
      unemployed:
        meaning: publicschema:EmploymentStatus/unemployed
        title: Unemployed
        description: Persons of working age who were not in employment, carried out activities to seek
          employment, and were currently available to take up employment.
        annotations:
          label_es: Desempleado
          label_fr: Sans emploi
          description_es: Personas en edad de trabajar que no estaban empleadas, realizaron actividades
            de búsqueda de empleo y estaban actualmente disponibles para aceptar un empleo.
          description_fr: Personnes en âge de travailler qui n'étaient pas en emploi, qui ont mené des
            activités de recherche d'emploi et qui étaient disponibles pour prendre un emploi.
      outside_labour_force:
        meaning: publicschema:EmploymentStatus/outside_labour_force
        title: Outside the labour force
        description: Persons of working age who were neither employed nor unemployed during the reference
          period (e.g., students, retirees, homemakers, discouraged workers).
        annotations:
          label_es: Fuera de la fuerza laboral
          label_fr: Hors de la population active
          description_es: Personas en edad de trabajar que no estaban ni empleadas ni desempleadas durante
            el período de referencia (por ejemplo, estudiantes, jubilados, personas dedicadas al hogar,
            trabajadores desalentados).
          description_fr: Personnes en âge de travailler qui n'étaient ni en emploi ni au chômage pendant
            la période de référence (par exemple, étudiants, retraités, personnes au foyer, travailleurs
            découragés).
    annotations:
      label_es: Situación laboral
      label_fr: Statut d'emploi
      description_es: La situación de participación de una persona en la fuerza de trabajo, clasificada
        como ocupada, desempleada o fuera de la fuerza de trabajo según la clasificación en tres categorías
        de la situación en la fuerza de trabajo adoptada por la 19.ª Conferencia Internacional de Estadísticos
        del Trabajo (CIET, 2013) de la OIT.
      description_fr: Le statut de participation d'une personne à la population active, classé en emploi,
        au chômage ou hors de la population active selon la classification en trois catégories du statut
        d'activité adoptée par la 19e Conférence internationale des statisticiens du travail (CIST, 2013)
        de l'OIT.
      external_alignments_json: '[{"label": "No v1 equivalent", "match": "none", "note": "OpenCRVS v2
        does not include an employment status field or vocabulary.", "vocabulary": "OpenCRVS v2 event
        service", "vocabulary_id": "opencrvs"}]'
      standard_json: '{"name": "ILO 19th ICLS Resolution concerning statistics of work, employment, and
        labour underutilization", "notes": "Tripartite labour force classification: employed, unemployed,
        outside the labour force. Under the 19th ICLS, ''employed'' covers only work done for pay or profit;
        other productive activities (own-use production, unpaid trainee work, volunteer work) are separate
        forms of work and do not count as employment for this classification.", "uri": "https://ilostat.ilo.org/methods/concepts-and-definitions/description-work-statistics-icls19/"}'
      bibliography_refs: '["ilo-19th-icls-2013"]'
  EventCertainty:
    enum_uri: publicschema:EventCertainty
    title: Event Certainty
    description: The confidence that an event has occurred or will occur. Values are compatible with OASIS
      CAP v1.2 certainty codes.
    status: bibo:draft
    permissible_values:
      observed:
        meaning: publicschema:EventCertainty/observed
        title: Observed
        description: The event has been observed or confirmed.
        annotations:
          label_es: Observado
          label_fr: Observé
          description_es: El evento ha sido observado o confirmado.
          description_fr: L'événement a été observé ou confirmé.
      likely:
        meaning: publicschema:EventCertainty/likely
        title: Likely
        description: The event is likely to occur (probability greater than 50%).
        annotations:
          label_es: Probable
          label_fr: Probable
          description_es: Es probable que el evento ocurra (probabilidad superior al 50%).
          description_fr: L'événement est susceptible de se produire (probabilité supérieure à 50%).
      possible:
        meaning: publicschema:EventCertainty/possible
        title: Possible
        description: The event is possible but not likely (probability less than 50%).
        annotations:
          label_es: Posible
          label_fr: Possible
          description_es: El evento es posible pero poco probable (probabilidad inferior al 50%).
          description_fr: L'événement est possible mais peu probable (probabilité inférieure à 50%).
      unlikely:
        meaning: publicschema:EventCertainty/unlikely
        title: Unlikely
        description: The event is not expected to occur.
        annotations:
          label_es: Improbable
          label_fr: Peu probable
          description_es: No se espera que el evento ocurra.
          description_fr: L'événement n'est pas prévu.
      unknown:
        meaning: publicschema:EventCertainty/unknown
        title: Unknown
        description: Certainty is not yet determined.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: La certeza aún no se ha determinado.
          description_fr: La certitude n'est pas encore déterminée.
    annotations:
      label_es: Certeza del evento
      label_fr: Certitude de l'événement
      description_es: La confianza de que un evento ha ocurrido o ocurrirá. Los valores son compatibles
        con los códigos de certeza de OASIS CAP v1.2.
      description_fr: Le degré de certitude qu'un événement s'est produit ou se produira. Les valeurs
        sont compatibles avec les codes de certitude d'OASIS CAP v1.2.
      standard_json: '{"name": "OASIS CAP v1.2", "uri": "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"}'
      bibliography_refs: '["oasis-cap-v1-2"]'
  EventSeverity:
    enum_uri: publicschema:EventSeverity
    title: Event Severity
    description: The observed or expected severity of an event's impact. Values are compatible with OASIS
      CAP v1.2 severity codes.
    status: bibo:draft
    permissible_values:
      extreme:
        meaning: publicschema:EventSeverity/extreme
        title: Extreme
        description: Extraordinary threat to life or property.
        annotations:
          label_es: Extrema
          label_fr: Extrême
          description_es: Amenaza extraordinaria para la vida o la propiedad.
          description_fr: Menace extraordinaire pour la vie ou les biens.
      severe:
        meaning: publicschema:EventSeverity/severe
        title: Severe
        description: Significant threat to life or property.
        annotations:
          label_es: Grave
          label_fr: Grave
          description_es: Amenaza significativa para la vida o la propiedad.
          description_fr: Menace significative pour la vie ou les biens.
      moderate:
        meaning: publicschema:EventSeverity/moderate
        title: Moderate
        description: Possible threat to life or property.
        annotations:
          label_es: Moderada
          label_fr: Modérée
          description_es: Amenaza posible para la vida o la propiedad.
          description_fr: Menace possible pour la vie ou les biens.
      minor:
        meaning: publicschema:EventSeverity/minor
        title: Minor
        description: Minimal to no known threat to life or property.
        annotations:
          label_es: Menor
          label_fr: Mineure
          description_es: Amenaza mínima o nula para la vida o la propiedad.
          description_fr: Menace minimale voire nulle pour la vie ou les biens.
      unknown:
        meaning: publicschema:EventSeverity/unknown
        title: Unknown
        description: Severity is not yet determined.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: La gravedad aún no se ha determinado.
          description_fr: La gravité n'est pas encore déterminée.
    annotations:
      label_es: Gravedad del evento
      label_fr: Gravité de l'événement
      description_es: La gravedad observada o esperada del impacto de un evento. Los valores son compatibles
        con los códigos de gravedad de OASIS CAP v1.2.
      description_fr: La gravité observée ou attendue de l'impact d'un événement. Les valeurs sont compatibles
        avec les codes de gravité d'OASIS CAP v1.2.
      standard_json: '{"name": "OASIS CAP v1.2", "uri": "https://docs.oasis-open.org/emergency/cap/v1.2/CAP-v1.2.html"}'
      bibliography_refs: '["oasis-cap-v1-2"]'
  FacilityOperationalStatus:
    enum_uri: publicschema:FacilityOperationalStatus
    title: Facility Operational Status
    description: Whether a service point or health facility is currently operational, partially operational,
      temporarily or permanently closed, not yet opened, or of unknown status. Aligned with WHO HeRAMS
      operational-status reporting used in humanitarian health-facility monitoring.
    status: bibo:draft
    permissible_values:
      fully_operational:
        meaning: publicschema:FacilityOperationalStatus/fully_operational
        title: Fully operational
        description: The service point is open and delivering its full range of expected services.
        annotations:
          label_es: Plenamente operativo
          label_fr: Pleinement opérationnel
          description_es: El punto de servicio está abierto y presta la gama completa de servicios previstos.
          description_fr: Le point de service est ouvert et fournit la gamme complète de services attendus.
      partially_operational:
        meaning: publicschema:FacilityOperationalStatus/partially_operational
        title: Partially operational
        description: The service point is open but delivering a reduced range of services, reduced hours,
          or with significant constraints (staff, supplies, infrastructure, security).
        annotations:
          label_es: Parcialmente operativo
          label_fr: Partiellement opérationnel
          description_es: El punto de servicio está abierto pero presta una gama reducida de servicios,
            horarios reducidos o con limitaciones significativas (personal, suministros, infraestructura,
            seguridad).
          description_fr: Le point de service est ouvert mais fournit une gamme de services réduite, des
            horaires réduits ou avec des contraintes importantes (personnel, approvisionnements, infrastructure,
            sécurité).
      temporarily_closed:
        meaning: publicschema:FacilityOperationalStatus/temporarily_closed
        title: Temporarily closed
        description: The service point is not currently delivering services but is expected to resume
          operations.
        annotations:
          label_es: Temporalmente cerrado
          label_fr: Temporairement fermé
          description_es: El punto de servicio no está prestando servicios actualmente pero se espera
            que reanude sus operaciones.
          description_fr: Le point de service ne fournit pas actuellement de services mais devrait reprendre
            ses activités.
      permanently_closed:
        meaning: publicschema:FacilityOperationalStatus/permanently_closed
        title: Permanently closed
        description: The service point has ceased operations and is not expected to reopen.
        annotations:
          label_es: Permanentemente cerrado
          label_fr: Définitivement fermé
          description_es: El punto de servicio ha cesado sus operaciones y no se espera que vuelva a abrir.
          description_fr: Le point de service a cessé ses activités et n'est pas censé rouvrir.
      not_yet_opened:
        meaning: publicschema:FacilityOperationalStatus/not_yet_opened
        title: Not yet opened
        description: The service point is planned or under construction but has not yet started delivering
          services.
        annotations:
          label_es: Aún no abierto
          label_fr: Pas encore ouvert
          description_es: El punto de servicio está planificado o en construcción pero aún no ha comenzado
            a prestar servicios.
          description_fr: Le point de service est prévu ou en construction mais n'a pas encore commencé
            à fournir des services.
      unknown:
        meaning: publicschema:FacilityOperationalStatus/unknown
        title: Unknown
        description: The operational status of the service point is not known or not reported.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El estado operativo del punto de servicio es desconocido o no se ha reportado.
          description_fr: Le statut opérationnel du point de service est inconnu ou non signalé.
    annotations:
      label_es: Estado operativo del establecimiento
      label_fr: Statut opérationnel de l'établissement
      description_es: Indica si un punto de servicio o establecimiento de salud está actualmente operativo,
        parcialmente operativo, temporal o permanentemente cerrado, aún no abierto, o de estado desconocido.
        Alineado con el reporte de estado operativo HeRAMS de la OMS utilizado en el monitoreo humanitario
        de establecimientos de salud.
      description_fr: Indique si un point de service ou un établissement de santé est actuellement opérationnel,
        partiellement opérationnel, temporairement ou définitivement fermé, pas encore ouvert, ou d'un
        statut inconnu. Aligné avec les rapports sur le statut opérationnel HeRAMS de l'OMS utilisés dans
        le suivi humanitaire des établissements de santé.
      standard_json: '{"name": "WHO Health Resources and Services Availability Monitoring System (HeRAMS)",
        "notes": "HeRAMS is the WHO-maintained monitoring framework for tracking availability of health
        resources and services in emergencies. Its facility reporting distinguishes fully functioning,
        partially functioning, and non-functioning facilities and the reasons for disruption; these are
        summarized here in a compact status vocabulary suitable for non-emergency settings as well.",
        "uri": "https://www.who.int/initiatives/herams"}'
      bibliography_refs: '["who-herams"]'
  FloorMaterial:
    enum_uri: publicschema:FloorMaterial
    title: Floor Material
    description: The primary material of the floor in the household's dwelling.
    status: bibo:status/forthcoming
    permissible_values:
      earth_sand:
        meaning: publicschema:FloorMaterial/earth_sand
        title: Earth or sand
        description: Unpaved floor made of bare earth or sand.
        annotations:
          label_es: Tierra o arena
          label_fr: Terre ou sable
          description_es: Piso sin pavimentar de tierra o arena.
          description_fr: Sol non revêtu en terre battue ou en sable.
      dung:
        meaning: publicschema:FloorMaterial/dung
        title: Dung
        description: Floor finished with dung, a traditional material used in parts of sub-Saharan Africa
          and South Asia.
        annotations:
          label_es: Estiércol
          label_fr: Bouse
          description_es: Piso acabado con estiércol, material tradicional utilizado en partes del África
            subsahariana y Asia meridional.
          description_fr: Sol enduit de bouse, matériau traditionnel utilisé dans certaines régions d'Afrique
            subsaharienne et d'Asie du Sud.
      wood_planks:
        meaning: publicschema:FloorMaterial/wood_planks
        title: Wood planks
        description: Floor made of unpolished wood planks or boards.
        annotations:
          label_es: Tablones de madera
          label_fr: Planches de bois
          description_es: Piso de tablones o tablas de madera sin pulir.
          description_fr: Sol en planches ou madriers de bois non poli.
      palm_bamboo:
        meaning: publicschema:FloorMaterial/palm_bamboo
        title: Palm or bamboo
        description: Floor made of woven or split palm fronds or bamboo.
        annotations:
          label_es: Palma o bambú
          label_fr: Palme ou bambou
          description_es: Piso de hojas de palma tejidas o bambú dividido.
          description_fr: Sol en feuilles de palme tressées ou en lattes de bambou.
      parquet_polished_wood:
        meaning: publicschema:FloorMaterial/parquet_polished_wood
        title: Parquet or polished wood
        description: Floor made of finished hardwood, parquet blocks, or polished wood boards.
        annotations:
          label_es: Parquet o madera pulida
          label_fr: Parquet ou bois poli
          description_es: Piso de madera dura acabada, bloques de parquet o tablas de madera pulida.
          description_fr: Sol en bois dur fini, en dalles de parquet ou en planches de bois poli.
      vinyl_asphalt:
        meaning: publicschema:FloorMaterial/vinyl_asphalt
        title: Vinyl or asphalt strips
        description: Floor covered with vinyl tiles, linoleum, or asphalt strips.
        annotations:
          label_es: Vinilo o tiras de asfalto
          label_fr: Vinyle ou dalles en asphalte
          description_es: Piso cubierto con baldosas de vinilo, linóleo o tiras de asfalto.
          description_fr: Sol recouvert de dalles vinyle, de linoléum ou de bandes en asphalte.
      ceramic_tiles:
        meaning: publicschema:FloorMaterial/ceramic_tiles
        title: Ceramic tiles
        description: Floor covered with ceramic, porcelain, or similar fired clay tiles.
        annotations:
          label_es: Baldosas cerámicas
          label_fr: Carreaux céramique
          description_es: Piso cubierto con baldosas de cerámica, porcelana u arcilla cocida similar.
          description_fr: Sol recouvert de carreaux en céramique, en porcelaine ou en argile cuite similaire.
      cement:
        meaning: publicschema:FloorMaterial/cement
        title: Cement
        description: Floor made of poured or troweled cement or concrete.
        annotations:
          label_es: Cemento
          label_fr: Ciment
          description_es: Piso de cemento u hormigón vertido o alisado.
          description_fr: Sol en ciment ou béton coulé ou talochée.
      carpet:
        meaning: publicschema:FloorMaterial/carpet
        title: Carpet
        description: Floor covered with carpet or fitted rugs.
        annotations:
          label_es: Alfombra
          label_fr: Moquette
          description_es: Piso cubierto con alfombra o tapetes fijos.
          description_fr: Sol recouvert de moquette ou de tapis encastrés.
      other:
        meaning: publicschema:FloorMaterial/other
        title: Other
        description: Floor material not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Material de piso no cubierto por las otras categorías.
          description_fr: Matériau de sol non couvert par les autres catégories.
    annotations:
      label_es: Material del piso
      label_fr: Matériau du sol
      description_es: El material principal del piso en la vivienda del hogar.
      description_fr: Le matériau principal du sol dans le logement du ménage.
      standard_json: '{"name": "DHS/MICS Harmonized Housing Codes", "notes": "Shared classification used
        by DHS (hv213) and MICS (HC3). No standalone international standard exists for floor materials;
        the survey programs are the de facto standard."}'
      bibliography_refs: '["dhs-recode7", "mics6"]'
  FoodSecurityLevel:
    enum_uri: publicschema:FoodSecurityLevel
    title: Food Security Level
    description: The severity of food insecurity experienced by the household, classified according to
      the FAO Food Insecurity Experience Scale (FIES) severity levels.
    status: bibo:draft
    permissible_values:
      food_secure:
        meaning: publicschema:FoodSecurityLevel/food_secure
        title: Food secure
        description: The household has reliable access to sufficient, safe, and nutritious food. None
          of the FIES conditions are experienced.
        annotations:
          label_es: Seguridad alimentaria
          label_fr: Sécurité alimentaire
          description_es: El hogar tiene acceso fiable a alimentos suficientes, seguros y nutritivos.
            No se experimenta ninguna de las condiciones FIES.
          description_fr: Le ménage dispose d'un accès fiable à une alimentation suffisante, sûre et nutritive.
            Aucune des conditions FIES n'est vécue.
      mildly_insecure:
        meaning: publicschema:FoodSecurityLevel/mildly_insecure
        title: Mildly food insecure
        description: The household has experienced uncertainty about obtaining food or has been unable
          to eat healthy and nutritious food, but has not reduced quantity.
        annotations:
          label_es: Levemente inseguro en alimentos
          label_fr: Légèrement en insécurité alimentaire
          description_es: El hogar ha experimentado incertidumbre para obtener alimentos o ha sido incapaz
            de comer saludable y nutritivamente, pero no ha reducido la cantidad.
          description_fr: Le ménage a connu une incertitude quant à l'obtention d'aliments ou a été incapable
            de manger sainement et nutritionnellement, sans réduire les quantités.
      moderately_insecure:
        meaning: publicschema:FoodSecurityLevel/moderately_insecure
        title: Moderately food insecure
        description: The household has reduced the quality and/or quantity of food consumed. Adults may
          have skipped meals or gone without eating for a day.
        annotations:
          label_es: Moderadamente inseguro en alimentos
          label_fr: Modérément en insécurité alimentaire
          description_es: El hogar ha reducido la calidad y/o la cantidad de alimentos consumidos. Adultos
            pueden haber omitido comidas o pasado un día sin comer.
          description_fr: Le ménage a réduit la qualité et/ou la quantité des aliments consommés. Des
            adultes ont pu sauter des repas ou ne pas manger pendant une journée.
      severely_insecure:
        meaning: publicschema:FoodSecurityLevel/severely_insecure
        title: Severely food insecure
        description: The household has experienced hunger. Adults have gone without eating for a whole
          day or more due to lack of resources.
        annotations:
          label_es: Severamente inseguro en alimentos
          label_fr: Sévèrement en insécurité alimentaire
          description_es: El hogar ha sufrido hambre. Adultos han pasado un día entero o más sin comer
            por falta de recursos.
          description_fr: Le ménage a souffert de la faim. Des adultes ont passé toute une journée ou
            plus sans manger faute de ressources.
    annotations:
      label_es: Nivel de seguridad alimentaria
      label_fr: Niveau de sécurité alimentaire
      description_es: La gravedad de la inseguridad alimentaria del hogar, clasificada según los niveles
        de gravedad de la Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO.
      description_fr: La sévérité de l'insécurité alimentaire vécue par le ménage, classifiée selon les
        niveaux de gravité de l'Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO.
      standard_json: '{"name": "FAO Food Insecurity Experience Scale (FIES)", "notes": "Internationally
        standardized 8-question experience-based scale used by FAO for SDG 2.1.2 monitoring. The four
        severity levels below are derived from the raw FIES questionnaire responses.", "uri": "https://www.fao.org/in-action/voices-of-the-hungry/fies/en/"}'
      bibliography_refs: '["fao-fies"]'
  FunctionalDifficultySeverity:
    enum_uri: publicschema:FunctionalDifficultySeverity
    title: Functional Difficulty Severity
    description: The degree of difficulty a person experiences in a functional domain, based on the Washington
      Group Short Set on Functioning (WG-SS) four-point response scale.
    status: bibo:draft
    permissible_values:
      no_difficulty:
        meaning: publicschema:FunctionalDifficultySeverity/no_difficulty
        title: No difficulty
        description: The person reports no difficulty performing the function.
        annotations:
          label_es: Sin dificultad
          label_fr: Aucune difficulté
          description_es: La persona no reporta ninguna dificultad para realizar la función.
          description_fr: La personne ne signale aucune difficulté à accomplir la fonction.
      some_difficulty:
        meaning: publicschema:FunctionalDifficultySeverity/some_difficulty
        title: Some difficulty
        description: The person reports some difficulty but can perform the function.
        annotations:
          label_es: Alguna dificultad
          label_fr: Quelques difficultés
          description_es: La persona reporta alguna dificultad pero puede realizar la función.
          description_fr: La personne signale quelques difficultés mais peut accomplir la fonction.
      a_lot_of_difficulty:
        meaning: publicschema:FunctionalDifficultySeverity/a_lot_of_difficulty
        title: A lot of difficulty
        description: The person reports a lot of difficulty performing the function. This is the lower
          threshold for the WG recommended disability identifier.
        annotations:
          label_es: Mucha dificultad
          label_fr: Beaucoup de difficultés
          description_es: La persona reporta mucha dificultad para realizar la función. Este es el umbral
            inferior del identificador de discapacidad recomendado por el WG.
          description_fr: La personne signale beaucoup de difficultés à accomplir la fonction. Il s'agit
            du seuil inférieur de l'identifiant de handicap recommandé par le WG.
      cannot_do:
        meaning: publicschema:FunctionalDifficultySeverity/cannot_do
        title: Cannot do at all
        description: The person cannot perform the function at all.
        annotations:
          label_es: No puede hacerlo en absoluto
          label_fr: Ne peut pas du tout
          description_es: La persona no puede realizar la función en absoluto.
          description_fr: La personne ne peut pas du tout accomplir la fonction.
    annotations:
      label_es: Gravedad de la dificultad funcional
      label_fr: Sévérité de la difficulté fonctionnelle
      description_es: El grado de dificultad que experimenta una persona en un dominio funcional, según
        la escala de respuesta de cuatro niveles del Grupo de Washington sobre Estadísticas de Discapacidad
        (WG-SS).
      description_fr: Le degré de difficulté que ressent une personne dans un domaine fonctionnel, selon
        l'échelle de réponse en quatre niveaux du Groupe de Washington sur la statistique du handicap
        (WG-SS).
      standard_json: '{"name": "Washington Group Short Set on Functioning (WG-SS)", "notes": "Endorsed
        by the UN Statistical Commission. The standard survey instrument for disability measurement in
        censuses and surveys.", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-short-set-on-functioning-wg-ss/"}'
      bibliography_refs: '["dhs-recode7", "mics6", "washington-group-cfm", "washington-group-es", "washington-group-ss"]'
  FunctionalIntensity:
    enum_uri: publicschema:FunctionalIntensity
    title: Functional Intensity (3-point)
    description: A three-point intensity scale used in the Washington Group Extended Set on Functioning
      (WG-ES) for depth of feeling (anxiety, depression) and of bodily symptom (pain, fatigue).
    status: bibo:draft
    permissible_values:
      a_little:
        meaning: publicschema:FunctionalIntensity/a_little
        title: A little
        description: The symptom or feeling is experienced at a low intensity.
        annotations:
          label_es: Un poco
          label_fr: Un peu
          description_es: El síntoma o sentimiento se experimenta con baja intensidad.
          description_fr: Le symptôme ou le ressenti est vécu à faible intensité.
      somewhere_in_between:
        meaning: publicschema:FunctionalIntensity/somewhere_in_between
        title: Somewhere in between
        description: The symptom or feeling is experienced at a moderate intensity, between a little and
          a lot.
        annotations:
          label_es: En algún punto intermedio
          label_fr: Quelque part entre les deux
          description_es: El síntoma o sentimiento se experimenta con una intensidad moderada, entre un
            poco y mucho.
          description_fr: Le symptôme ou le ressenti est vécu à une intensité modérée, entre un peu et
            beaucoup.
      a_lot:
        meaning: publicschema:FunctionalIntensity/a_lot
        title: A lot
        description: The symptom or feeling is experienced at a high intensity.
        annotations:
          label_es: Mucho
          label_fr: Beaucoup
          description_es: El síntoma o sentimiento se experimenta con alta intensidad.
          description_fr: Le symptôme ou le ressenti est vécu à forte intensité.
    annotations:
      label_es: Intensidad funcional (3 niveles)
      label_fr: Intensité fonctionnelle (3 niveaux)
      description_es: Una escala de intensidad de tres niveles utilizada en el Conjunto Extendido del
        Grupo de Washington sobre Funcionamiento (WG-ES) para la profundidad de un sentimiento (ansiedad,
        depresión) o de un síntoma corporal (dolor, fatiga).
      description_fr: Une échelle d'intensité à trois niveaux utilisée dans l'Ensemble étendu du Groupe
        de Washington sur le fonctionnement (WG-ES) pour la profondeur d'un ressenti (anxiété, dépression)
        ou d'un symptôme corporel (douleur, fatigue).
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Endorsed
        by the UN Statistical Commission. Used on WG-ES items ANX_3 (anxiety intensity), DEP_3 (depression
        intensity), PAIN_2 (pain intensity), TIRED_3 (fatigue intensity) per the 11 October 2022 PDF.",
        "uri": "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  GenderType:
    enum_uri: publicschema:GenderType
    title: Gender Type
    description: The administrative gender of a person as recorded in a registry or identity system. Distinct
      from biological sex (see the sex vocabulary). No single international standard governs gender vocabulary;
      ISO/IEC 5218 explicitly covers biological sex only. This vocabulary provides a minimal common set
      based on what administrative systems actually record.
    status: bibo:status/published
    permissible_values:
      male:
        meaning: publicschema:GenderType/male
        title: Male
        description: Person identifies or is recorded as male.
        annotations:
          label_es: Masculino
          label_fr: Masculin
          description_es: La persona se identifica o está registrada como hombre.
          description_fr: La personne s'identifie ou est enregistrée comme homme.
        exact_mappings:
        - dhis2:Dhis2Gender/male
        - fhir-r4:FhirR4AdministrativeGender/male
        - opencrvs:OpencrvsGender/male
      female:
        meaning: publicschema:GenderType/female
        title: Female
        description: Person identifies or is recorded as female.
        annotations:
          label_es: Femenino
          label_fr: Féminin
          description_es: La persona se identifica o está registrada como mujer.
          description_fr: La personne s'identifie ou est enregistrée comme femme.
        exact_mappings:
        - dhis2:Dhis2Gender/female
        - fhir-r4:FhirR4AdministrativeGender/female
        - opencrvs:OpencrvsGender/female
      other:
        meaning: publicschema:GenderType/other
        title: Other
        description: A gender identity that is not exclusively male or female, including but not limited
          to non-binary, third gender, or gender-diverse identities as recognized by the recording system.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Una identidad de género que no es exclusivamente masculina o femenina, incluyendo
            pero no limitándose a identidades no binarias, de tercer género o de género diverso según
            lo reconocido por el sistema de registro.
          description_fr: Une identité de genre qui n'est pas exclusivement masculine ou féminine, y compris
            mais sans s'y limiter les identités non binaires, de troisième genre ou de genre diversifié
            telles que reconnues par le système d'enregistrement.
        exact_mappings:
        - fhir-r4:FhirR4AdministrativeGender/other
        - opencrvs:OpencrvsGender/other
      not_stated:
        meaning: publicschema:GenderType/not_stated
        title: Not stated
        description: Gender has not been recorded or the person declined to disclose.
        annotations:
          label_es: No declarado
          label_fr: Non déclaré
          description_es: El género no ha sido registrado o la persona se negó a divulgarlo.
          description_fr: Le genre n'a pas été enregistré ou la personne a refusé de le divulguer.
    close_mappings:
    - cpov:gender
    annotations:
      label_es: Tipo de género
      label_fr: Type de genre
      description_es: El género administrativo de una persona tal como se registra en un registro o sistema
        de identidad. Distinto del sexo biológico (ver el vocabulario sex). Ninguna norma internacional
        única rige el vocabulario de género. Este vocabulario proporciona un conjunto mínimo común basado
        en lo que los sistemas administrativos registran.
      description_fr: Le genre administratif d'une personne tel qu'enregistré dans un registre ou un système
        d'identité. Distinct du sexe biologique (voir le vocabulaire sex). Aucune norme internationale
        unique ne régit le vocabulaire du genre. Ce vocabulaire fournit un ensemble minimal commun basé
        sur ce que les systèmes administratifs enregistrent.
      external_alignments_json: '[{"label": "Gender", "match": "broad", "note": "SEMIC Core Person 2.1.1
        defines gender as a separate property from sex but mandates no controlled vocabulary, leaving
        the choice to implementers.", "uri": "http://data.europa.eu/m8g/gender", "vocabulary": "Core Person",
        "vocabulary_id": "semic"}]'
      vocab_references_json: '[{"machine_readable": true, "name": "FHIR R5 Gender Harmony Implementation
        Guide", "notes": "FHIR R5 separates sex from gender but does not mandate a controlled vocabulary
        for gender identity.", "relationship": "structural_pattern", "uri": "https://hl7.org/fhir/extensions/StructureDefinition-individual-genderIdentity.html"},
        {"machine_readable": false, "name": "SEMIC Core Person Vocabulary 2.1.1", "notes": "SEMIC defines
        gender as a separate property from sex but leaves vocabulary choice to implementers.", "relationship":
        "structural_pattern", "uri": "https://semiceu.github.io/Core-Person-Vocabulary/releases/2.1.1/"}]'
      bibliography_refs: '["barca-2021-inclusive-information-systems", "fhir-administrative-gender", "semic-core-person"]'
  GroupRole:
    enum_uri: publicschema:GroupRole
    title: Group Role
    description: The role a person plays within a group membership. Some values describe position within
      a kinship-based roster, often relative to a reference person, while others describe function within
      another group type such as a farm. Intended applicability is documented per value and is not enforced
      by schema validation.
    status: bibo:status/published
    permissible_values:
      head:
        meaning: publicschema:GroupRole/head
        title: Head
        description: The member recognized as the reference person or primary representative of the group
          for administrative purposes.
        annotations:
          label_es: Jefe/a
          label_fr: Chef
          description_es: El miembro reconocido como la persona de referencia o el representante principal
            del grupo para fines administrativos.
          description_fr: Le membre reconnu comme la personne de référence ou le représentant principal
            du groupe à des fins administratives.
          group_type_applicability_json: '["household", "family"]'
        exact_mappings:
        - openimis:OpenimisGroupIndividualRole/head
        - openspp:OpensppGroupMembershipType/head
      spouse:
        meaning: publicschema:GroupRole/spouse
        title: Spouse
        description: A member recorded as the spouse or legally recognized partner within the group's
          kinship roster.
        annotations:
          label_es: Cónyuge
          label_fr: Conjoint(e)
          description_es: Un miembro registrado como cónyuge o pareja legalmente reconocida dentro del
            registro de parentesco del grupo.
          description_fr: Un membre enregistré comme conjoint ou partenaire légalement reconnu dans la
            liste de parenté du groupe.
          group_type_applicability_json: '["household", "family"]'
        exact_mappings:
        - openimis:OpenimisGroupIndividualRole/spouse
      child:
        meaning: publicschema:GroupRole/child
        title: Child
        description: A member recorded as a child within the group's kinship roster, whether biological,
          adopted, step, or foster.
        annotations:
          label_es: Hijo/a
          label_fr: Enfant
          description_es: Un miembro registrado como hijo o hija dentro del registro de parentesco del
            grupo, ya sea biológico, adoptado, hijastro o en acogida.
          description_fr: Un membre enregistré comme enfant dans la liste de parenté du groupe, qu'il
            soit biologique, adopté, beau-enfant ou accueilli.
          group_type_applicability_json: '["household", "family"]'
      dependent:
        meaning: publicschema:GroupRole/dependent
        title: Dependent
        description: A member recorded as relying on the group or its principal members for financial
          support or daily living needs.
        annotations:
          label_es: Dependiente
          label_fr: Personne à charge
          description_es: Un miembro registrado como dependiente del grupo o de sus miembros principales
            para su sustento financiero o sus necesidades diarias.
          description_fr: Un membre enregistré comme dépendant du groupe ou de ses membres principaux
            pour son soutien financier ou ses besoins quotidiens.
          group_type_applicability_json: '["household", "family"]'
      parent:
        meaning: publicschema:GroupRole/parent
        title: Parent
        description: A member recorded as a parent within the group's kinship roster.
        annotations:
          label_es: Padre/Madre
          label_fr: Parent
          description_es: Un miembro registrado como padre o madre dentro del registro de parentesco del
            grupo.
          description_fr: Un membre enregistré comme parent dans la liste de parenté du groupe.
          group_type_applicability_json: '["household", "family"]'
      sibling:
        meaning: publicschema:GroupRole/sibling
        title: Sibling
        description: A member recorded as a sibling within the group's kinship roster.
        annotations:
          label_es: Hermano/a
          label_fr: Frère/Sœur
          description_es: Un miembro registrado como hermano o hermana dentro del registro de parentesco
            del grupo.
          description_fr: Un membre enregistré comme frère ou sœur dans la liste de parenté du groupe.
          group_type_applicability_json: '["household", "family"]'
      grandparent:
        meaning: publicschema:GroupRole/grandparent
        title: Grandparent
        description: A member recorded as a grandparent within the group's kinship roster.
        annotations:
          label_es: Abuelo/a
          label_fr: Grand-parent
          description_es: Un miembro registrado como abuelo o abuela dentro del registro de parentesco
            del grupo.
          description_fr: Un membre enregistré comme grand-parent dans la liste de parenté du groupe.
          group_type_applicability_json: '["household", "family"]'
      grandchild:
        meaning: publicschema:GroupRole/grandchild
        title: Grandchild
        description: A member recorded as a grandchild within the group's kinship roster.
        annotations:
          label_es: Nieto/a
          label_fr: Petit-enfant
          description_es: Un miembro registrado como nieto o nieta dentro del registro de parentesco del
            grupo.
          description_fr: Un membre enregistré comme petit-enfant dans la liste de parenté du groupe.
          group_type_applicability_json: '["household", "family"]'
      other_relative:
        meaning: publicschema:GroupRole/other_relative
        title: Other relative
        description: A member recorded as a relative who does not fit the other kinship categories.
        annotations:
          label_es: Otro pariente
          label_fr: Autre parent
          description_es: Un miembro registrado como pariente que no encaja en las otras categorías de
            parentesco.
          description_fr: Un membre enregistré comme parent qui ne correspond pas aux autres catégories
            de parenté.
          group_type_applicability_json: '["household", "family"]'
        exact_mappings:
        - openimis:OpenimisGroupIndividualRole/other_relative
      non_relative:
        meaning: publicschema:GroupRole/non_relative
        title: Non-relative
        description: A member recorded as having no kinship tie to the group's reference person or kinship
          roster.
        annotations:
          label_es: No pariente
          label_fr: Non-parent
          description_es: Un miembro registrado como no teniendo vínculo de parentesco con la persona
            de referencia o el registro de parentesco del grupo.
          description_fr: Un membre enregistré comme n'ayant aucun lien de parenté avec la personne de
            référence ou la liste de parenté du groupe.
          group_type_applicability_json: '["household"]'
      owner:
        meaning: publicschema:GroupRole/owner
        title: Owner
        description: The member who owns the farm or holds the principal ownership rights to it.
        annotations:
          label_es: Propietario/a
          label_fr: Propriétaire
          description_es: El miembro que posee la finca o tiene los principales derechos de propiedad
            sobre ella.
          description_fr: Le membre qui possède l'exploitation agricole ou en détient les principaux droits
            de propriété.
          group_type_applicability_json: '["farm"]'
      operator:
        meaning: publicschema:GroupRole/operator
        title: Operator
        description: The member responsible for running the farm and making day-to-day production or management
          decisions.
        annotations:
          label_es: Operador/a
          label_fr: Exploitant(e)
          description_es: El miembro responsable de dirigir la finca y de tomar las decisiones diarias
            de producción o gestión.
          description_fr: Le membre responsable de l'exploitation agricole et des décisions quotidiennes
            de production ou de gestion.
          group_type_applicability_json: '["farm"]'
      worker:
        meaning: publicschema:GroupRole/worker
        title: Worker
        description: A member who performs regular labor on the farm, whether paid, unpaid, seasonal,
          or family-based.
        annotations:
          label_es: Trabajador/a
          label_fr: Travailleur/Travailleuse
          description_es: Un miembro que realiza trabajo regular en la finca, ya sea remunerado, no remunerado,
            estacional o familiar.
          description_fr: Un membre qui effectue un travail régulier sur l'exploitation agricole, qu'il
            soit rémunéré, non rémunéré, saisonnier ou familial.
          group_type_applicability_json: '["farm"]'
    annotations:
      label_es: Rol en el grupo
      label_fr: Rôle dans le groupe
      description_es: El rol que una persona desempeña dentro de una membresía de grupo. Algunos valores
        describen la posición dentro de un registro basado en parentesco, a menudo en relación con una
        persona de referencia, mientras que otros describen una función dentro de otro tipo de grupo como
        una finca. La aplicabilidad prevista se documenta por valor y no se aplica mediante la validación
        del esquema.
      description_fr: Le rôle qu'une personne joue dans une appartenance à un groupe. Certaines valeurs
        décrivent une position dans une liste de parenté, souvent par rapport à une personne de référence,
        tandis que d'autres décrivent une fonction dans un autre type de groupe tel qu'une exploitation
        agricole. L'applicabilité prévue est documentée pour chaque valeur et n'est pas imposée par la
        validation du schéma.
      vocab_references_json: '[{"machine_readable": false, "name": "UN Principles and Recommendations
        for Population and Housing Censuses (Rev.3)", "notes": "UN census guidance defines household composition
        using a reference-person model.", "relationship": "partial_overlap", "uri": "https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf"},
        {"machine_readable": false, "name": "FAO World Programme for the Census of Agriculture 2020, Volume
        I", "notes": "FAO''s agricultural holding model informed the farm-specific roles.", "relationship":
        "partial_overlap", "uri": "https://www.fao.org/family-farming/detail/en/c/341884/"}]'
      see_also_json: '[{"note": "group-role describes a person''s role within a group (person-to-group);
        relationship-type describes connections between two persons (person-to-person). Values like ''spouse''
        and ''child'' appear in both but answer different questions.", "vocabulary": "relationship-type"}]'
      bibliography_refs: '["un-census-rev3"]'
  GroupType:
    enum_uri: publicschema:GroupType
    title: Group Type
    description: Categories used as an interoperability classifier for group records in external or flat
      data models. In native PublicSchema modeling, the concrete Group subtype remains authoritative;
      this vocabulary supports mapping and export.
    status: bibo:status/published
    permissible_values:
      household:
        meaning: publicschema:GroupType/household
        title: Household
        description: Classifier for group records that represent a household. Operational definitions
          vary across countries and programs, commonly combining co-residence, shared budget, shared cooking,
          kinship, and administrative registration.
        annotations:
          label_es: Hogar
          label_fr: Ménage
          description_es: Clasificador para registros de grupo que representan un hogar. Las definiciones
            operativas varían entre países y programas y suelen combinar corresidencia, presupuesto compartido,
            cocina compartida, parentesco y registro administrativo.
          description_fr: Classificateur pour les enregistrements de groupe qui représentent un ménage.
            Les définitions opérationnelles varient selon les pays et les programmes, combinant souvent
            corésidence, budget partagé, cuisine commune, parenté et enregistrement administratif.
        exact_mappings:
        - openspp:OpensppGroupType/household
      family:
        meaning: publicschema:GroupType/family
        title: Family
        description: Classifier for group records that represent a family or kinship unit, which may span
          multiple households.
        annotations:
          label_es: Familia
          label_fr: Famille
          description_es: Clasificador para registros de grupo que representan una familia o unidad de
            parentesco, que puede abarcar varios hogares.
          description_fr: Classificateur pour les enregistrements de groupe qui représentent une famille
            ou une unité de parenté, pouvant s'étendre sur plusieurs ménages.
        exact_mappings:
        - openspp:OpensppGroupType/family
      farm:
        meaning: publicschema:GroupType/farm
        title: Farm
        description: Classifier for group records that represent an agricultural production unit, often
          household-based, used in agricultural or social protection programs.
        annotations:
          label_es: Explotación Agrícola
          label_fr: Exploitation agricole
          description_es: Clasificador para registros de grupo que representan una unidad de producción
            agrícola, a menudo basada en el hogar, utilizada en programas agrícolas o de protección social.
          description_fr: Classificateur pour les enregistrements de groupe qui représentent une unité
            de production agricole, souvent basée sur le ménage, utilisée dans des programmes agricoles
            ou de protection sociale.
      other:
        meaning: publicschema:GroupType/other
        title: Other
        description: Classifier for a group record whose external category does not fit the other canonical
          group-type values.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Clasificador para un registro de grupo cuya categoría externa no encaja en los
            demás valores canónicos de tipo de grupo.
          description_fr: Classificateur pour un enregistrement de groupe dont la catégorie externe ne
            correspond pas aux autres valeurs canoniques de type de groupe.
    annotations:
      label_es: Tipo de grupo
      label_fr: Type de groupe
      description_es: Categorías utilizadas como clasificador de interoperabilidad para registros de grupo
        en modelos de datos externos o planos. En el modelado nativo de PublicSchema, el subtipo concreto
        de Group sigue siendo la referencia autorizada; este vocabulario sirve para mapeo y exportación.
      description_fr: Catégories utilisées comme classificateur d'interopérabilité pour les enregistrements
        de groupe dans des modèles de données externes ou plats. Dans la modélisation native de PublicSchema,
        le sous-type concret de Group reste faisant autorité; ce vocabulaire sert au mappage et à l'export.
      vocab_references_json: '[{"machine_readable": false, "name": "UN Principles and Recommendations
        for Population and Housing Censuses (Rev.3)", "notes": "Defines household and family as statistical
        units. No standard code system for group type classification exists.", "relationship": "prose_guidance",
        "uri": "https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf"}]'
      see_also_json: '[{"note": "group-type is an interoperability classifier for the kind of group record
        being exchanged (household, family, farm); group-role classifies a person''s position within a
        group membership. The concrete Group subtype is the authoritative native PublicSchema signal when
        known.", "vocabulary": "group-role"}]'
      bibliography_refs: '["un-census-rev3"]'
  HazardType:
    enum_uri: publicschema:HazardType
    title: Hazard Type
    description: The category of hazard or disruptive event, based on the Sendai Framework classification
      with extensions for social and economic shocks.
    status: bibo:status/forthcoming
    permissible_values:
      geophysical:
        meaning: publicschema:HazardType/geophysical
        title: Geophysical
        description: Earthquakes, landslides, tsunamis, or volcanic activity.
        annotations:
          label_es: Geofísico
          label_fr: Géophysique
          description_es: Terremotos, deslizamientos de tierra, tsunamis o actividad volcánica.
          description_fr: Tremblements de terre, glissements de terrain, tsunamis ou activité volcanique.
      meteorological:
        meaning: publicschema:HazardType/meteorological
        title: Meteorological
        description: Floods, storms, extreme temperatures, or drought.
        annotations:
          label_es: Meteorológico
          label_fr: Météorologique
          description_es: Inundaciones, tormentas, temperaturas extremas o sequía.
          description_fr: Inondations, tempêtes, températures extrêmes ou sécheresse.
      biological:
        meaning: publicschema:HazardType/biological
        title: Biological
        description: Disease outbreaks, epidemics, pest infestations, or biological contamination.
        annotations:
          label_es: Biológico
          label_fr: Biologique
          description_es: Brotes de enfermedades, epidemias, infestaciones de plagas o contaminación biológica.
          description_fr: Épidémies, infestations de ravageurs ou contamination biologique.
      environmental:
        meaning: publicschema:HazardType/environmental
        title: Environmental
        description: Pollution, deforestation, desertification, or ecological degradation.
        annotations:
          label_es: Ambiental
          label_fr: Environnemental
          description_es: Contaminación, deforestación, desertificación o degradación ecológica.
          description_fr: Pollution, déforestation, désertification ou dégradation écologique.
      technological:
        meaning: publicschema:HazardType/technological
        title: Technological
        description: Industrial accidents, infrastructure failures, or chemical spills.
        annotations:
          label_es: Tecnológico
          label_fr: Technologique
          description_es: Accidentes industriales, fallas de infraestructura o derrames químicos.
          description_fr: Accidents industriels, défaillances d'infrastructure ou déversements chimiques.
      conflict:
        meaning: publicschema:HazardType/conflict
        title: Conflict
        description: Armed conflict, civil unrest, or forced displacement.
        annotations:
          label_es: Conflicto
          label_fr: Conflit
          description_es: Conflicto armado, disturbios civiles o desplazamiento forzado.
          description_fr: Conflit armé, troubles civils ou déplacement forcé.
      economic:
        meaning: publicschema:HazardType/economic
        title: Economic
        description: Economic shocks such as price spikes, currency collapse, or market disruption.
        annotations:
          label_es: Económico
          label_fr: Économique
          description_es: Choques económicos como alzas de precios, colapso monetario o perturbación de
            mercados.
          description_fr: Chocs économiques tels que flambée des prix, effondrement monétaire ou perturbation
            des marchés.
      other:
        meaning: publicschema:HazardType/other
        title: Other
        description: Events not covered by any other category.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Eventos no cubiertos por ninguna otra categoría.
          description_fr: Événements non couverts par aucune autre catégorie.
    annotations:
      label_es: Tipo de peligro
      label_fr: Type de danger
      description_es: La categoría de peligro o evento perturbador, basada en la clasificación del Marco
        de Sendai con extensiones para choques sociales y económicos.
      description_fr: La catégorie de risque ou d'événement perturbateur, basée sur la classification
        du Cadre de Sendai avec des extensions pour les chocs sociaux et économiques.
      bibliography_refs: '["oasis-cap-v1-2"]'
  HealthFacilityLevel:
    enum_uri: publicschema:HealthFacilityLevel
    title: Health Facility Level
    description: The tier of care delivered by a health facility in a national or WHO health-system classification
      (primary, secondary, tertiary, quaternary), reflecting the scope of services and the referral position
      of the facility.
    status: bibo:draft
    permissible_values:
      primary:
        meaning: publicschema:HealthFacilityLevel/primary
        title: Primary
        description: First-level contact for primary care, typically health posts, health centers, and
          dispensaries providing basic curative, preventive, and promotive services.
        annotations:
          label_es: Primaria
          label_fr: Primaire
          description_es: Primer nivel de contacto para la atención primaria, generalmente puestos de
            salud, centros de salud y dispensarios que prestan servicios curativos, preventivos y promocionales
            básicos.
          description_fr: Premier niveau de contact pour les soins primaires, généralement les postes
            de santé, centres de santé et dispensaires fournissant des services curatifs, préventifs et
            promotionnels de base.
      secondary:
        meaning: publicschema:HealthFacilityLevel/secondary
        title: Secondary
        description: District-level referral care, typically general or district hospitals with inpatient
          wards, surgery, and basic specialty services.
        annotations:
          label_es: Secundaria
          label_fr: Secondaire
          description_es: Atención de referencia a nivel de distrito, generalmente hospitales generales
            o de distrito con salas de hospitalización, cirugía y servicios básicos de especialidad.
          description_fr: Soins de référence au niveau du district, généralement des hôpitaux généraux
            ou de district avec des services d'hospitalisation, de chirurgie et de spécialités de base.
      tertiary:
        meaning: publicschema:HealthFacilityLevel/tertiary
        title: Tertiary
        description: Specialized referral care at regional or national level, including regional hospitals,
          teaching hospitals, and specialty hospitals.
        annotations:
          label_es: Terciaria
          label_fr: Tertiaire
          description_es: Atención de referencia especializada a nivel regional o nacional, incluidos
            hospitales regionales, hospitales universitarios y hospitales especializados.
          description_fr: Soins de référence spécialisés au niveau régional ou national, y compris les
            hôpitaux régionaux, les hôpitaux universitaires et les hôpitaux spécialisés.
      quaternary:
        meaning: publicschema:HealthFacilityLevel/quaternary
        title: Quaternary
        description: Highly specialized care, typically a national referral center, research hospital,
          or supraregional center providing advanced sub-specialty services.
        annotations:
          label_es: Cuaternaria
          label_fr: Quaternaire
          description_es: Atención altamente especializada, generalmente un centro de referencia nacional,
            un hospital de investigación o un centro suprarregional que presta servicios de subespecialidad
            avanzados.
          description_fr: Soins hautement spécialisés, généralement un centre de référence national, un
            hôpital de recherche ou un centre suprarégional fournissant des services de sous-spécialité
            avancés.
      unknown:
        meaning: publicschema:HealthFacilityLevel/unknown
        title: Unknown
        description: Facility tier not known or not classified in the source system.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: Nivel del establecimiento desconocido o no clasificado en el sistema de origen.
          description_fr: Niveau de l'établissement inconnu ou non classé dans le système source.
    annotations:
      label_es: Nivel de establecimiento de salud
      label_fr: Niveau d'établissement de santé
      description_es: El nivel de atención prestado por un establecimiento de salud en una clasificación
        nacional o de la OMS (primaria, secundaria, terciaria, cuaternaria), que refleja el alcance de
        los servicios y la posición de referencia del establecimiento.
      description_fr: Le niveau de soins fourni par un établissement de santé dans une classification
        nationale ou de l'OMS (primaire, secondaire, tertiaire, quaternaire), reflétant l'étendue des
        services et la position de référence de l'établissement.
      standard_json: '{"name": "WHO Health Systems Strengthening Glossary", "notes": "WHO uses primary/secondary/tertiary
        tiers as the common descriptive framework for health-system organisation, with many countries
        adding a quaternary tier for national referral or research hospitals. There is no single canonical
        URL listing the tiers as coded values; national health-facility registries apply the same tiering
        with local naming.", "uri": "https://www.who.int/health-topics/health-systems-strengthening"}'
      bibliography_refs: '["who-health-systems"]'
  HealthFacilityType:
    enum_uri: publicschema:HealthFacilityType
    title: Health Facility Type
    description: The functional category of a health facility, such as hospital, health center, health
      post, dispensary, clinic, pharmacy, or laboratory. Codes follow the WHO Service Availability and
      Readiness Assessment (SARA) taxonomy, harmonized with the Harmonized Health Facility Assessment
      (HHFA).
    status: bibo:draft
    permissible_values:
      hospital:
        meaning: publicschema:HealthFacilityType/hospital
        title: Hospital
        description: Facility providing inpatient care, surgical services, and a range of specialized
          services; typically includes emergency care and diagnostic imaging.
        annotations:
          label_es: Hospital
          label_fr: Hôpital
          description_es: Establecimiento que presta atención hospitalaria, servicios quirúrgicos y una
            gama de servicios especializados; suele incluir atención de emergencia y diagnóstico por imágenes.
          description_fr: Établissement fournissant des soins hospitaliers, des services chirurgicaux
            et une gamme de services spécialisés; comprend généralement les soins d'urgence et l'imagerie
            diagnostique.
      health_center:
        meaning: publicschema:HealthFacilityType/health_center
        title: Health center
        description: Facility offering a range of primary care services, often with limited inpatient
          capacity for maternity or short-stay observation.
        annotations:
          label_es: Centro de salud
          label_fr: Centre de santé
          description_es: Establecimiento que ofrece una gama de servicios de atención primaria, a menudo
            con capacidad limitada de hospitalización para maternidad u observación de corta estancia.
          description_fr: Établissement offrant une gamme de services de soins primaires, souvent avec
            une capacité d'hospitalisation limitée pour la maternité ou l'observation de courte durée.
      health_post:
        meaning: publicschema:HealthFacilityType/health_post
        title: Health post
        description: Small primary-care facility, typically the first point of access at community level
          and often staffed by nurses or community health workers.
        annotations:
          label_es: Puesto de salud
          label_fr: Poste de santé
          description_es: Pequeño establecimiento de atención primaria, generalmente el primer punto de
            acceso a nivel comunitario y atendido a menudo por enfermeras o trabajadores de salud comunitarios.
          description_fr: Petit établissement de soins primaires, généralement le premier point d'accès
            au niveau communautaire et souvent dirigé par des infirmières ou des agents de santé communautaires.
      dispensary:
        meaning: publicschema:HealthFacilityType/dispensary
        title: Dispensary
        description: Outpatient-only facility providing basic curative care and dispensing medicines,
          without inpatient beds.
        annotations:
          label_es: Dispensario
          label_fr: Dispensaire
          description_es: Establecimiento exclusivamente ambulatorio que presta atención curativa básica
            y dispensa medicamentos, sin camas de hospitalización.
          description_fr: Établissement exclusivement ambulatoire fournissant des soins curatifs de base
            et distribuant des médicaments, sans lits d'hospitalisation.
      clinic:
        meaning: publicschema:HealthFacilityType/clinic
        title: Clinic
        description: Outpatient specialized clinic focused on a specific service area (maternity, maternal
          and child health, sexually transmitted infections, eye, dental, etc.).
        annotations:
          label_es: Clínica
          label_fr: Clinique
          description_es: Clínica especializada ambulatoria centrada en un área de servicio específica
            (maternidad, salud materno-infantil, infecciones de transmisión sexual, oftalmología, odontología,
            etc.).
          description_fr: Clinique spécialisée ambulatoire axée sur un domaine de service spécifique (maternité,
            santé maternelle et infantile, infections sexuellement transmissibles, ophtalmologie, dentaire,
            etc.).
      pharmacy:
        meaning: publicschema:HealthFacilityType/pharmacy
        title: Pharmacy
        description: Licensed retail or public pharmacy dispensing prescription and over-the-counter medicines.
        annotations:
          label_es: Farmacia
          label_fr: Pharmacie
          description_es: Farmacia autorizada, comercial o pública, que dispensa medicamentos con receta
            y de venta libre.
          description_fr: Pharmacie agréée, commerciale ou publique, délivrant des médicaments sur ordonnance
            et en vente libre.
      laboratory:
        meaning: publicschema:HealthFacilityType/laboratory
        title: Laboratory
        description: Standalone diagnostic laboratory providing clinical, microbiological, or public-health
          testing services.
        annotations:
          label_es: Laboratorio
          label_fr: Laboratoire
          description_es: Laboratorio de diagnóstico independiente que presta servicios de pruebas clínicas,
            microbiológicas o de salud pública.
          description_fr: Laboratoire de diagnostic autonome fournissant des services d'analyses cliniques,
            microbiologiques ou de santé publique.
      mobile_clinic:
        meaning: publicschema:HealthFacilityType/mobile_clinic
        title: Mobile clinic
        description: Mobile or outreach facility without a fixed physical structure, bringing clinical
          services to communities on a scheduled or emergency basis.
        annotations:
          label_es: Clínica móvil
          label_fr: Clinique mobile
          description_es: Establecimiento móvil o de extensión sin estructura física fija, que lleva servicios
            clínicos a las comunidades de forma programada o de emergencia.
          description_fr: Établissement mobile ou de proximité sans structure physique fixe, apportant
            des services cliniques aux communautés de manière programmée ou d'urgence.
      other:
        meaning: publicschema:HealthFacilityType/other
        title: Other
        description: A health facility type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de establecimiento de salud no cubierto por las otras categorías.
          description_fr: Un type d'établissement de santé non couvert par les autres catégories.
    annotations:
      label_es: Tipo de establecimiento de salud
      label_fr: Type d'établissement de santé
      description_es: La categoría funcional de un establecimiento de salud, como hospital, centro de
        salud, puesto de salud, dispensario, clínica, farmacia o laboratorio. Los códigos siguen la taxonomía
        de la Evaluación de la disponibilidad y capacidad operativa de los servicios (SARA) de la OMS,
        armonizada con la Evaluación Armonizada de Establecimientos de Salud (HHFA).
      description_fr: La catégorie fonctionnelle d'un établissement de santé, telle qu'hôpital, centre
        de santé, poste de santé, dispensaire, clinique, pharmacie ou laboratoire. Les codes suivent la
        taxonomie de l'Évaluation de la disponibilité et de la capacité opérationnelle des services (SARA)
        de l'OMS, harmonisée avec l'Évaluation harmonisée des établissements de santé (HHFA).
      standard_json: '{"name": "WHO Service Availability and Readiness Assessment (SARA) Reference Manual
        v2.2", "notes": "SARA provides the canonical categorization of health facility types used in national
        health facility assessments. The Harmonized Health Facility Assessment (HHFA) 2022 consolidates
        and extends SARA and the Service Delivery Indicators (SDI); its facility-type list maps cleanly
        onto SARA categories.", "uri": "https://www.who.int/publications/i/item/WHO-HIS-HSI-2014.5-Rev.1"}'
      bibliography_refs: '["who-sara"]'
  HouseholdAsset:
    enum_uri: publicschema:HouseholdAsset
    title: Household Asset
    description: Durable goods owned by at least one member of the household, used as wealth proxy indicators
      in targeting and proxy means testing.
    status: bibo:draft
    permissible_values:
      radio:
        meaning: publicschema:HouseholdAsset/radio
        title: Radio
        description: A functioning radio receiver.
        annotations:
          label_es: Radio
          label_fr: Radio
          description_es: Un receptor de radio en funcionamiento.
          description_fr: Un récepteur radio en état de marche.
      television:
        meaning: publicschema:HouseholdAsset/television
        title: Television
        description: A functioning television set.
        annotations:
          label_es: Televisión
          label_fr: Télévision
          description_es: Un televisor en funcionamiento.
          description_fr: Un téléviseur en état de marche.
      mobile_phone:
        meaning: publicschema:HouseholdAsset/mobile_phone
        title: Mobile phone
        description: A functioning mobile telephone (basic or smartphone).
        annotations:
          label_es: Teléfono móvil
          label_fr: Téléphone mobile
          description_es: Un teléfono móvil (básico o smartphone) en funcionamiento.
          description_fr: Un téléphone mobile (basique ou smartphone) en état de marche.
      landline_phone:
        meaning: publicschema:HouseholdAsset/landline_phone
        title: Landline telephone
        description: A functioning fixed-line telephone.
        annotations:
          label_es: Teléfono fijo
          label_fr: Téléphone fixe
          description_es: Un teléfono de línea fija en funcionamiento.
          description_fr: Un téléphone fixe en état de marche.
      computer_tablet:
        meaning: publicschema:HouseholdAsset/computer_tablet
        title: Computer/tablet
        description: A functioning desktop computer, laptop, or tablet device.
        annotations:
          label_es: Computadora/tableta
          label_fr: Ordinateur/tablette
          description_es: Una computadora de escritorio, portátil o tableta en funcionamiento.
          description_fr: Un ordinateur de bureau, un ordinateur portable ou une tablette en état de marche.
      refrigerator:
        meaning: publicschema:HouseholdAsset/refrigerator
        title: Refrigerator
        description: A functioning refrigerator or freezer.
        annotations:
          label_es: Refrigerador
          label_fr: Réfrigérateur
          description_es: Un refrigerador o congelador en funcionamiento.
          description_fr: Un réfrigérateur ou un congélateur en état de marche.
      bicycle:
        meaning: publicschema:HouseholdAsset/bicycle
        title: Bicycle
        description: A functioning bicycle.
        annotations:
          label_es: Bicicleta
          label_fr: Vélo
          description_es: Una bicicleta en funcionamiento.
          description_fr: Un vélo en état de marche.
      motorcycle_scooter:
        meaning: publicschema:HouseholdAsset/motorcycle_scooter
        title: Motorcycle/scooter
        description: A functioning motorcycle, motor scooter, or motorized two-wheeler.
        annotations:
          label_es: Motocicleta/scooter
          label_fr: Moto/scooter
          description_es: Una motocicleta, scooter o vehículo de dos ruedas motorizado en funcionamiento.
          description_fr: Une moto, un scooter ou un deux-roues motorisé en état de marche.
      car_truck:
        meaning: publicschema:HouseholdAsset/car_truck
        title: Car/truck
        description: A functioning car, truck, van, or other motorized four-wheeled vehicle.
        annotations:
          label_es: Automóvil/camión
          label_fr: Voiture/camion
          description_es: Un automóvil, camión, furgoneta u otro vehículo motorizado de cuatro ruedas
            en funcionamiento.
          description_fr: Une voiture, un camion, un van ou autre véhicule motorisé à quatre roues en
            état de marche.
      animal_drawn_cart:
        meaning: publicschema:HouseholdAsset/animal_drawn_cart
        title: Animal-drawn cart
        description: A functioning cart, wagon, or other vehicle drawn by animals.
        annotations:
          label_es: Carreta de tracción animal
          label_fr: Charrette attelée
          description_es: Una carreta, vagón u otro vehículo de tracción animal en funcionamiento.
          description_fr: Une charrette, un chariot ou autre véhicule tiré par des animaux en état de
            marche.
      motorized_boat:
        meaning: publicschema:HouseholdAsset/motorized_boat
        title: Motorized boat
        description: A functioning boat with a motor.
        annotations:
          label_es: Bote motorizado
          label_fr: Bateau à moteur
          description_es: Un bote con motor en funcionamiento.
          description_fr: Un bateau avec un moteur en état de marche.
      watch:
        meaning: publicschema:HouseholdAsset/watch
        title: Watch
        description: A functioning wristwatch or pocket watch.
        annotations:
          label_es: Reloj
          label_fr: Montre
          description_es: Un reloj de pulsera o de bolsillo en funcionamiento.
          description_fr: Une montre-bracelet ou une montre de poche en état de marche.
      bank_account:
        meaning: publicschema:HouseholdAsset/bank_account
        title: Bank account
        description: A bank account or mobile money account held by any household member.
        annotations:
          label_es: Cuenta bancaria
          label_fr: Compte bancaire
          description_es: Una cuenta bancaria o cuenta de dinero móvil de cualquier miembro del hogar.
          description_fr: Un compte bancaire ou un compte de monnaie mobile détenu par tout membre du
            ménage.
      other:
        meaning: publicschema:HouseholdAsset/other
        title: Other
        description: A durable good not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un bien duradero no cubierto por las otras categorías.
          description_fr: Un bien durable non couvert par les autres catégories.
    annotations:
      label_es: Bien del hogar
      label_fr: Bien du ménage
      description_es: Bienes duraderos poseídos por al menos un miembro del hogar, utilizados como indicadores
        sustitutos de riqueza en la focalización y las pruebas de medios indirectas.
      description_fr: Biens durables possédés par au moins un membre du ménage, utilisés comme indicateurs
        substituts de richesse dans le ciblage et les tests de ressources indirects.
      see_also_json: '[{"note": "Mobile phone, television, and radio appear in both vocabularies. household-asset
        captures wealth proxy indicators; ict-access captures information and communication access.",
        "vocabulary": "ict-access"}]'
      bibliography_refs: '["dhs-recode7", "mics6"]'
  IctAccess:
    enum_uri: publicschema:IctAccess
    title: ICT Access
    description: Information and communication technology devices and services accessible to the household,
      based on ITU Core ICT Indicators.
    status: bibo:draft
    permissible_values:
      mobile_phone:
        meaning: publicschema:IctAccess/mobile_phone
        title: Mobile phone
        description: Access to a mobile telephone (basic or smartphone) by any household member.
        annotations:
          label_es: Teléfono móvil
          label_fr: Téléphone mobile
          description_es: Acceso a un teléfono móvil (básico o smartphone) por cualquier miembro del hogar.
          description_fr: Accès à un téléphone mobile (basique ou smartphone) par tout membre du ménage.
      computer_tablet:
        meaning: publicschema:IctAccess/computer_tablet
        title: Computer/tablet
        description: Access to a desktop computer, laptop, or tablet device by any household member.
        annotations:
          label_es: Computadora/tableta
          label_fr: Ordinateur/tablette
          description_es: Acceso a una computadora de escritorio, portátil o tableta por cualquier miembro
            del hogar.
          description_fr: Accès à un ordinateur de bureau, un ordinateur portable ou une tablette par
            tout membre du ménage.
      internet:
        meaning: publicschema:IctAccess/internet
        title: Internet
        description: Access to the internet by any household member, from any device and any location.
        annotations:
          label_es: Internet
          label_fr: Internet
          description_es: Acceso a internet por cualquier miembro del hogar, desde cualquier dispositivo
            y cualquier lugar.
          description_fr: Accès à Internet par tout membre du ménage, depuis n'importe quel appareil et
            n'importe quel endroit.
      television:
        meaning: publicschema:IctAccess/television
        title: Television
        description: Access to a television set by the household.
        annotations:
          label_es: Televisión
          label_fr: Télévision
          description_es: Acceso a un televisor por el hogar.
          description_fr: Accès à un téléviseur par le ménage.
      radio:
        meaning: publicschema:IctAccess/radio
        title: Radio
        description: Access to a radio receiver by the household.
        annotations:
          label_es: Radio
          label_fr: Radio
          description_es: Acceso a un receptor de radio por el hogar.
          description_fr: Accès à un récepteur radio par le ménage.
    annotations:
      label_es: Acceso a las TIC
      label_fr: Accès aux TIC
      description_es: Dispositivos y servicios de tecnología de la información y la comunicación accesibles
        al hogar, basados en los indicadores básicos de TIC de la UIT.
      description_fr: Appareils et services de technologie de l'information et de la communication accessibles
        au ménage, basés sur les indicateurs essentiels des TIC de l'UIT.
      standard_json: '{"name": "ITU Core ICT Indicators", "notes": "ITU core household indicators for
        ICT access monitoring. The internet code aligns with SDG 17.8.1 (proportion of individuals using
        the Internet); the other codes cover the broader household ICT basket.", "uri": "https://www.itu.int/en/ITU-D/Statistics/Pages/coreindicators/default.aspx"}'
      see_also_json: '[{"note": "Mobile phone, television, and radio appear in both vocabularies. household-asset
        captures wealth proxy indicators; ict-access captures information and communication access.",
        "vocabulary": "household-asset"}]'
      bibliography_refs: '["dhs-recode7", "itu-core-ict", "mics6"]'
  IdentifierType:
    enum_uri: publicschema:IdentifierType
    title: Identifier Type
    description: Categories of identifier values used to distinguish entities within identification schemes.
      Covers coded values assigned to persons, groups, locations, and administrative areas across administrative,
      civil registration, and service delivery systems.
    status: bibo:status/published
    permissible_values:
      national_id_number:
        meaning: publicschema:IdentifierType/national_id_number
        title: National ID number
        description: A government-issued national identification number assigned to an individual.
        annotations:
          label_es: Número de identidad nacional
          label_fr: Numéro d'identité nationale
          description_es: Un número de identificación nacional emitido por el gobierno y asignado a una
            persona.
          description_fr: Un numéro d'identification national délivré par le gouvernement et attribué
            à une personne.
      social_security_number:
        meaning: publicschema:IdentifierType/social_security_number
        title: Social security number
        description: A number assigned by a social security or social insurance administration, distinct
          from a national identity number in many countries.
        annotations:
          label_es: Número de seguridad social
          label_fr: Numéro de sécurité sociale
          description_es: Un número asignado por una administración de seguridad social o seguro social,
            distinto del número de identidad nacional en muchos países.
          description_fr: Un numéro attribué par une administration de sécurité sociale ou d'assurance
            sociale, distinct du numéro d'identité nationale dans de nombreux pays.
      tax_id_number:
        meaning: publicschema:IdentifierType/tax_id_number
        title: Tax ID number
        description: A tax identification number assigned by a revenue or fiscal authority.
        annotations:
          label_es: Número de identificación fiscal
          label_fr: Numéro d'identification fiscale
          description_es: Un número de identificación fiscal asignado por una autoridad tributaria o fiscal.
          description_fr: Un numéro d'identification fiscale attribué par une autorité fiscale ou de recettes.
      program_id_number:
        meaning: publicschema:IdentifierType/program_id_number
        title: Program ID number
        description: A beneficiary identifier assigned by a specific program.
        annotations:
          label_es: Número de ID de programa
          label_fr: Numéro d'identifiant de programme
          description_es: Un identificador de beneficiario asignado por un programa específico.
          description_fr: Un identifiant de bénéficiaire attribué par un programme spécifique.
      household_id_number:
        meaning: publicschema:IdentifierType/household_id_number
        title: Household ID number
        description: An identifier assigned to a household rather than to an individual person.
        annotations:
          label_es: Número de ID de hogar
          label_fr: Numéro d'identifiant de ménage
          description_es: Un identificador asignado a un hogar en lugar de a una persona individual.
          description_fr: Un identifiant attribué à un ménage plutôt qu'à une personne individuelle.
      passport_number:
        meaning: publicschema:IdentifierType/passport_number
        title: Passport number
        description: The number printed in a passport that identifies the holder within the issuing country's
          travel document scheme.
        annotations:
          label_es: Número de pasaporte
          label_fr: Numéro de passeport
          description_es: El número impreso en un pasaporte que identifica al titular dentro del esquema
            de documentos de viaje del país emisor.
          description_fr: Le numéro imprimé dans un passeport qui identifie le titulaire au sein du schéma
            des documents de voyage du pays émetteur.
      drivers_license_number:
        meaning: publicschema:IdentifierType/drivers_license_number
        title: Driver's license number
        description: The number printed on a driver's license, assigned by the licensing authority.
        annotations:
          label_es: Número de licencia de conducir
          label_fr: Numéro de permis de conduire
          description_es: El número impreso en una licencia de conducir, asignado por la autoridad emisora.
          description_fr: Le numéro imprimé sur un permis de conduire, attribué par l'autorité de délivrance.
      voter_id_number:
        meaning: publicschema:IdentifierType/voter_id_number
        title: Voter ID number
        description: The number assigned to a voter by an electoral registration authority.
        annotations:
          label_es: Número de votante
          label_fr: Numéro d'électeur
          description_es: El número asignado a un votante por una autoridad de registro electoral.
          description_fr: Le numéro attribué à un électeur par une autorité d'inscription électorale.
      birth_registration_number:
        meaning: publicschema:IdentifierType/birth_registration_number
        title: Birth registration number
        description: The number assigned to a birth record by a civil registration authority.
        annotations:
          label_es: Número de registro de nacimiento
          label_fr: Numéro d'acte de naissance
          description_es: El número asignado a un acta de nacimiento por una autoridad de registro civil.
          description_fr: Le numéro attribué à un acte de naissance par une autorité d'état civil.
      marriage_registration_number:
        meaning: publicschema:IdentifierType/marriage_registration_number
        title: Marriage registration number
        description: The number assigned to a marriage record by a civil registration authority.
        annotations:
          label_es: Número de registro de matrimonio
          label_fr: Numéro d'acte de mariage
          description_es: El número asignado a un acta de matrimonio por una autoridad de registro civil.
          description_fr: Le numéro attribué à un acte de mariage par une autorité d'état civil.
      death_registration_number:
        meaning: publicschema:IdentifierType/death_registration_number
        title: Death registration number
        description: The number assigned to a death record by a civil registration authority.
        annotations:
          label_es: Número de registro de defunción
          label_fr: Numéro d'acte de décès
          description_es: El número asignado a un acta de defunción por una autoridad de registro civil.
          description_fr: Le numéro attribué à un acte de décès par une autorité d'état civil.
      country_code:
        meaning: publicschema:IdentifierType/country_code
        title: Country code
        description: A country identifier from an international classification such as ISO 3166-1.
        annotations:
          label_es: Código de país
          label_fr: Code de pays
          description_es: Un identificador de país de una clasificación internacional como ISO 3166-1.
          description_fr: Un identifiant de pays issu d'une classification internationale telle que l'ISO
            3166-1.
      subdivision_code:
        meaning: publicschema:IdentifierType/subdivision_code
        title: Subdivision code
        description: A sub-national administrative area identifier from an international classification
          such as ISO 3166-2.
        annotations:
          label_es: Código de subdivisión
          label_fr: Code de subdivision
          description_es: Un identificador de área administrativa sub-nacional de una clasificación internacional
            como ISO 3166-2.
          description_fr: Un identifiant de zone administrative sous-nationale issu d'une classification
            internationale telle que l'ISO 3166-2.
      postal_code:
        meaning: publicschema:IdentifierType/postal_code
        title: Postal code
        description: A code assigned by a postal authority to identify a delivery area.
        annotations:
          label_es: Código postal
          label_fr: Code postal
          description_es: Un código asignado por una autoridad postal para identificar un área de entrega.
          description_fr: Un code attribué par une autorité postale pour identifier une zone de distribution.
      p_code:
        meaning: publicschema:IdentifierType/p_code
        title: P-code
        description: A humanitarian place code, typically assigned by a national statistics office or
          by UN OCHA's HDX to identify administrative areas below the country level.
        annotations:
          label_es: P-code
          label_fr: P-code
          description_es: Un código humanitario de lugar, generalmente asignado por una oficina nacional
            de estadísticas o por HDX de OCHA para identificar áreas administrativas por debajo del nivel
            nacional.
          description_fr: Un code humanitaire de lieu, généralement attribué par un office national de
            statistiques ou par le HDX d'OCHA pour identifier des zones administratives en dessous du
            niveau national.
      fips_code:
        meaning: publicschema:IdentifierType/fips_code
        title: FIPS code
        description: A geographic code from the U.S. Federal Information Processing Standards, historically
          used to identify countries and sub-national areas.
        annotations:
          label_es: Código FIPS
          label_fr: Code FIPS
          description_es: Un código geográfico de los Federal Information Processing Standards de Estados
            Unidos, históricamente utilizado para identificar países y áreas subnacionales.
          description_fr: Un code géographique issu des Federal Information Processing Standards des États-Unis,
            historiquement utilisé pour identifier les pays et les zones sous-nationales.
      hasc_code:
        meaning: publicschema:IdentifierType/hasc_code
        title: HASC code
        description: A hierarchical administrative subdivision code (HASC), a community-maintained system
          for naming sub-national administrative areas.
        annotations:
          label_es: Código HASC
          label_fr: Code HASC
          description_es: Un código jerárquico de subdivisión administrativa (HASC), un sistema mantenido
            por la comunidad para nombrar áreas administrativas subnacionales.
          description_fr: Un code hiérarchique de subdivision administrative (HASC), un système maintenu
            par la communauté pour nommer les zones administratives sous-nationales.
      un_locode:
        meaning: publicschema:IdentifierType/un_locode
        title: UN/LOCODE
        description: A United Nations code for trade and transport locations, covering seaports, airports,
          and inland freight terminals.
        annotations:
          label_es: UN/LOCODE
          label_fr: UN/LOCODE
          description_es: Un código de las Naciones Unidas para ubicaciones de comercio y transporte,
            que abarca puertos marítimos, aeropuertos y terminales de carga interiores.
          description_fr: Un code des Nations Unies pour les lieux de commerce et de transport, couvrant
            les ports maritimes, aéroports et terminaux intérieurs de fret.
      transaction_reference:
        meaning: publicschema:IdentifierType/transaction_reference
        title: Transaction reference
        description: A reference code assigned to a payment transaction by the payment rail (for example,
          a mobile money operator, a bank, or an agent network). Used to trace or reconcile the payment
          with the rail that executed it.
        annotations:
          label_es: Referencia de transacción
          label_fr: Référence de transaction
          description_es: Un código de referencia asignado a una transacción de pago por el canal de pago
            (por ejemplo, un operador de dinero móvil, un banco o una red de agentes). Se utiliza para
            rastrear o conciliar el pago con el canal que lo ejecutó.
          description_fr: Un code de référence attribué à une transaction de paiement par le canal de
            paiement (par exemple, un opérateur d'argent mobile, une banque ou un réseau d'agents). Utilisé
            pour tracer ou rapprocher le paiement avec le canal qui l'a exécuté.
      other:
        meaning: publicschema:IdentifierType/other
        title: Other
        description: An identifier type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de identificador no cubierto por las otras categorías.
          description_fr: Un type d'identifiant non couvert par les autres catégories.
    annotations:
      label_es: Tipo de identificador
      label_fr: Type d'identifiant
      description_es: Categorías de valores de identificadores utilizados para distinguir entidades dentro
        de esquemas de identificación. Cubre los valores codificados asignados a personas, grupos, ubicaciones
        y áreas administrativas en los sistemas administrativos, de registro civil y de prestación de
        servicios.
      description_fr: Catégories de valeurs d'identifiants utilisées pour distinguer les entités au sein
        de schémas d'identification. Couvre les valeurs codées attribuées à des personnes, groupes, lieux
        et zones administratives dans les systèmes administratifs, d'état civil et de prestation de services.
      vocab_references_json: '[{"machine_readable": true, "name": "HL7 FHIR Identifier Type Codes (v2-0203)",
        "relationship": "partial_overlap", "uri": "https://build.fhir.org/valueset-identifier-type.html"},
        {"machine_readable": false, "name": "ICAO Doc 9303 - Machine Readable Travel Documents", "notes":
        "Defines passport and travel-document number formats.", "relationship": "partial_overlap", "uri":
        "https://www.icao.int/publications/pages/publication.aspx?docnum=9303"}, {"machine_readable":
        true, "name": "MOSIP Identity Schema", "notes": "Country-configurable identifier categories. This
        vocabulary provides a base set; implementations extend per country.", "relationship": "structural_pattern",
        "uri": "https://docs.mosip.io/1.2.0/id-lifecycle-management/identity-management/id-schema"}, {"machine_readable":
        true, "name": "ISO 3166 Country and Subdivision Codes", "notes": "Source for country_code (ISO
        3166-1) and subdivision_code (ISO 3166-2) entries.", "relationship": "partial_overlap", "uri":
        "https://www.iso.org/iso-3166-country-codes.html"}, {"machine_readable": true, "name": "UN OCHA
        HDX P-codes", "notes": "Humanitarian place codes for sub-national administrative areas.", "relationship":
        "partial_overlap", "uri": "https://data.humdata.org/dataset/p-codes"}]'
      vc_guidance_json: '"For Verifiable Credential use, the identifier type alone is insufficient. Credentials
        must also specify the issuing jurisdiction and identifier scheme.\n"'
      see_also_json: '[{"note": "Use document-type to classify the physical or digital document that carries
        an identifier; use identifier-type to classify the coded value itself.", "vocabulary": "document-type"}]'
      bibliography_refs: '["fhir-identifier-type-v2-0203", "hdx-p-codes", "icao-doc-9303", "iso-3166-1",
        "iso-3166-2", "mosip-identity-schema", "w3c-vc-data-model-2"]'
  ImpressionType:
    enum_uri: publicschema:ImpressionType
    title: Impression Type
    description: The method by which a fingerprint biometric was captured. Covers live-scan, non-live-scan,
      and latent capture methods. Applies to fingerprint captures; not relevant for iris or face modalities.
    status: bibo:draft
    permissible_values:
      live_scan_plain:
        meaning: publicschema:ImpressionType/live_scan_plain
        title: Live scan plain
        description: A fingerprint captured by pressing a finger flat against a live-scan sensor.
        annotations:
          label_es: Escaneo en vivo simple
          label_fr: Scan en direct simple
          description_es: Una huella capturada presionando un dedo plano contra un sensor de escaneo en
            vivo.
          description_fr: Une empreinte capturée en appuyant un doigt à plat sur un capteur de scan en
            direct.
      live_scan_rolled:
        meaning: publicschema:ImpressionType/live_scan_rolled
        title: Live scan rolled
        description: A fingerprint captured by rolling the finger from nail to nail across a live-scan
          sensor, producing a wider image.
        annotations:
          label_es: Escaneo en vivo rodado
          label_fr: Scan en direct roulé
          description_es: Una huella capturada rodando el dedo de un extremo de la uña al otro sobre un
            sensor de escaneo en vivo, produciendo una imagen más amplia.
          description_fr: Une empreinte capturée en roulant le doigt d'un bord de l'ongle à l'autre sur
            un capteur de scan en direct, produisant une image plus large.
      live_scan_swipe:
        meaning: publicschema:ImpressionType/live_scan_swipe
        title: Live scan swipe
        description: A fingerprint captured by swiping the finger across a narrow strip sensor.
        annotations:
          label_es: Escaneo en vivo por deslizamiento
          label_fr: Scan en direct par glissement
          description_es: Una huella capturada deslizando el dedo sobre un sensor de banda estrecha.
          description_fr: Une empreinte capturée en glissant le doigt sur un capteur à bande étroite.
      live_scan_vertical_roll:
        meaning: publicschema:ImpressionType/live_scan_vertical_roll
        title: Live scan vertical roll
        description: A fingerprint captured by rolling the finger vertically (tip to base) across a live-scan
          sensor.
        annotations:
          label_es: Escaneo en vivo rodado vertical
          label_fr: Scan en direct roulement vertical
          description_es: Una huella capturada rodando el dedo verticalmente (de la punta a la base) sobre
            un sensor de escaneo en vivo.
          description_fr: Une empreinte capturée en roulant le doigt verticalement (de la pointe à la
            base) sur un capteur de scan en direct.
      live_scan_palm:
        meaning: publicschema:ImpressionType/live_scan_palm
        title: Live scan palm
        description: A palm print captured using a live-scan sensor.
        annotations:
          label_es: Escaneo en vivo de la palma
          label_fr: Scan en direct de la paume
          description_es: Una impresión palmar capturada usando un sensor de escaneo en vivo.
          description_fr: Une empreinte palmaire capturée à l'aide d'un capteur de scan en direct.
      live_scan_optical_contactless_plain:
        meaning: publicschema:ImpressionType/live_scan_optical_contactless_plain
        title: Live scan optical contactless plain
        description: A fingerprint captured without physical contact using an optical sensor (e.g., camera-based
          capture).
        annotations:
          label_es: Escaneo en vivo óptico sin contacto simple
          label_fr: Scan en direct optique sans contact simple
          description_es: Una huella capturada sin contacto físico usando un sensor óptico (p. ej., captura
            por cámara).
          description_fr: Une empreinte capturée sans contact physique à l'aide d'un capteur optique (p.
            ex., capture par caméra).
      non_live_scan_plain:
        meaning: publicschema:ImpressionType/non_live_scan_plain
        title: Non-live scan plain
        description: A fingerprint captured from a pre-existing ink-on-paper impression using a scanner
          or camera.
        annotations:
          label_es: Escaneo no en vivo simple
          label_fr: Scan non direct simple
          description_es: Una huella capturada a partir de una impresión preexistente en tinta sobre papel
            usando un escáner o cámara.
          description_fr: Une empreinte capturée à partir d'une impression encre-sur-papier préexistante
            à l'aide d'un scanner ou d'une caméra.
      non_live_scan_rolled:
        meaning: publicschema:ImpressionType/non_live_scan_rolled
        title: Non-live scan rolled
        description: A rolled fingerprint captured from a pre-existing ink-on-paper impression using a
          scanner or camera.
        annotations:
          label_es: Escaneo no en vivo rodado
          label_fr: Scan non direct roulé
          description_es: Una huella rodada capturada a partir de una impresión preexistente en tinta
            sobre papel usando un escáner o cámara.
          description_fr: Une empreinte roulée capturée à partir d'une impression encre-sur-papier préexistante
            à l'aide d'un scanner ou d'une caméra.
      non_live_scan_palm:
        meaning: publicschema:ImpressionType/non_live_scan_palm
        title: Non-live scan palm
        description: A palm print captured from a pre-existing ink-on-paper impression using a scanner
          or camera.
        annotations:
          label_es: Escaneo no en vivo de la palma
          label_fr: Scan non direct de la paume
          description_es: Una impresión palmar capturada a partir de una impresión preexistante en tinta
            sobre papel usando un escáner o cámara.
          description_fr: Une empreinte palmaire capturée à partir d'une impression encre-sur-papier préexistante
            à l'aide d'un scanner ou d'une caméra.
      latent_impression:
        meaning: publicschema:ImpressionType/latent_impression
        title: Latent impression
        description: A fingerprint impression left unintentionally on a surface and recovered for identification.
        annotations:
          label_es: Impresión latente
          label_fr: Impression latente
          description_es: Una impresión dactilar dejada involuntariamente en una superficie y recuperada
            para identificación.
          description_fr: Une impression digitale laissée involontairement sur une surface et récupérée
            pour identification.
      latent_tracing:
        meaning: publicschema:ImpressionType/latent_tracing
        title: Latent tracing
        description: A latent fingerprint recovered by tracing over the impression on a transparent overlay.
        annotations:
          label_es: Trazado latente
          label_fr: Tracé latent
          description_es: Una huella latente recuperada trazando la impresión sobre una lámina transparente.
          description_fr: Une empreinte latente récupérée en traçant l'impression sur un support transparent.
      latent_photo:
        meaning: publicschema:ImpressionType/latent_photo
        title: Latent photo
        description: A latent fingerprint recovered by photographing the impression on a surface.
        annotations:
          label_es: Foto latente
          label_fr: Photo latente
          description_es: Una huella latente recuperada fotografiando la impresión sobre una superficie.
          description_fr: Une empreinte latente récupérée en photographiant l'impression sur une surface.
      latent_lift:
        meaning: publicschema:ImpressionType/latent_lift
        title: Latent lift
        description: A latent fingerprint recovered by lifting the impression from a surface using adhesive
          or chemical techniques.
        annotations:
          label_es: Levantamiento latente
          label_fr: Relevé latent
          description_es: Una huella latente recuperada levantando la impresión de una superficie usando
            técnicas adhesivas o químicas.
          description_fr: Une empreinte latente récupérée en relevant l'impression d'une surface à l'aide
            de techniques adhésives ou chimiques.
      latent_palm_impression:
        meaning: publicschema:ImpressionType/latent_palm_impression
        title: Latent palm impression
        description: A palm print impression left unintentionally on a surface and recovered for identification.
        annotations:
          label_es: Impresión latente de la palma
          label_fr: Impression latente de la paume
          description_es: Una impresión palmar dejada involuntariamente en una superficie y recuperada
            para identificación.
          description_fr: Une impression palmaire laissée involontairement sur une surface et récupérée
            pour identification.
      latent_palm_tracing:
        meaning: publicschema:ImpressionType/latent_palm_tracing
        title: Latent palm tracing
        description: A latent palm print recovered by tracing over the impression on a transparent overlay.
        annotations:
          label_es: Trazado latente de la palma
          label_fr: Tracé latent de la paume
          description_es: Una impresión palmar latente recuperada trazando la impresión sobre una lámina
            transparente.
          description_fr: Une empreinte palmaire latente récupérée en traçant l'impression sur un support
            transparent.
      latent_palm_photo:
        meaning: publicschema:ImpressionType/latent_palm_photo
        title: Latent palm photo
        description: A latent palm print recovered by photographing the impression on a surface.
        annotations:
          label_es: Foto latente de la palma
          label_fr: Photo latente de la paume
          description_es: Una impresión palmar latente recuperada fotografiando la impresión sobre una
            superficie.
          description_fr: Une empreinte palmaire latente récupérée en photographiant l'impression sur
            une surface.
      latent_palm_lift:
        meaning: publicschema:ImpressionType/latent_palm_lift
        title: Latent palm lift
        description: A latent palm print recovered by lifting the impression from a surface using adhesive
          or chemical techniques.
        annotations:
          label_es: Levantamiento latente de la palma
          label_fr: Relevé latent de la paume
          description_es: Una impresión palmar latente recuperada levantando la impresión de una superficie
            usando técnicas adhesivas o químicas.
          description_fr: Une empreinte palmaire latente récupérée en relevant l'impression d'une surface
            à l'aide de techniques adhésives ou chimiques.
      other:
        meaning: publicschema:ImpressionType/other
        title: Other
        description: A capture method not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un método de captura no cubierto por las otras categorías.
          description_fr: Une méthode de capture non couverte par les autres catégories.
      unknown:
        meaning: publicschema:ImpressionType/unknown
        title: Unknown
        description: The capture method is not known.
        annotations:
          label_es: Desconocido
          label_fr: Inconnu
          description_es: El método de captura no es conocido.
          description_fr: La méthode de capture n'est pas connue.
    annotations:
      label_es: Tipo de impresión
      label_fr: Type d'impression
      description_es: El método mediante el cual se capturó una huella dactilar biométrica. Cubre los
        métodos de captura por escaneo en vivo, escaneo no en vivo y captura latente. Se aplica a capturas
        de huellas dactilares; no es relevante para las modalidades de iris o rostro.
      description_fr: La méthode par laquelle une empreinte digitale biométrique a été capturée. Couvre
        les méthodes de capture par scan en direct, scan non direct et capture latente. S'applique aux
        captures d'empreintes digitales; non pertinent pour les modalités iris ou visage.
      vocab_references_json: '[{"machine_readable": false, "name": "OSIA ImpressionType Enum", "notes":
        "Full 19-value OSIA ImpressionType enumeration.", "relationship": "partial_overlap", "uri": "https://secureidentityalliance.github.io/osia/"}]'
      bibliography_refs: '["osia-itu-x1281"]'
  IncomeSource:
    enum_uri: publicschema:IncomeSource
    title: Income Source
    description: The source of income for a household, combining employment-derived categories (informed
      by ILO ICSE-18) with non-employment income types relevant to social protection targeting.
    status: bibo:draft
    permissible_values:
      wages_salary:
        meaning: publicschema:IncomeSource/wages_salary
        title: Wages/salary
        description: Income from paid employment as an employee earning regular wages or salary.
        annotations:
          label_es: Salarios/sueldos
          label_fr: Salaires/traitements
          description_es: Ingresos del empleo remunerado como asalariado que percibe salarios o sueldos
            regulares.
          description_fr: Revenus d'un emploi salarié en tant qu'employé percevant des salaires ou traitements
            réguliers.
      self_employment_non_farm:
        meaning: publicschema:IncomeSource/self_employment_non_farm
        title: Self-employment (non-farm)
        description: Income from non-agricultural self-employment, own-account work, or business ownership.
        annotations:
          label_es: Trabajo independiente (no agrícola)
          label_fr: Travail indépendant (non agricole)
          description_es: Ingresos del trabajo independiente no agrícola, trabajo por cuenta propia o
            propiedad de un negocio.
          description_fr: Revenus du travail indépendant non agricole, du travail à compte propre ou de
            la propriété d'une entreprise.
      farming:
        meaning: publicschema:IncomeSource/farming
        title: Farming
        description: Income from agricultural production including crop cultivation and animal husbandry.
        annotations:
          label_es: Agricultura
          label_fr: Agriculture
          description_es: Ingresos de la producción agrícola, incluidos el cultivo y la ganadería.
          description_fr: Revenus de la production agricole, notamment la culture et l'élevage.
      fishing:
        meaning: publicschema:IncomeSource/fishing
        title: Fishing
        description: Income from fishing, aquaculture, or related harvesting of aquatic resources.
        annotations:
          label_es: Pesca
          label_fr: Pêche
          description_es: Ingresos de la pesca, la acuicultura o la cosecha relacionada de recursos acuáticos.
          description_fr: Revenus de la pêche, de l'aquaculture ou de la récolte connexe de ressources
            aquatiques.
      remittances:
        meaning: publicschema:IncomeSource/remittances
        title: Remittances
        description: Income received as transfers from household members or relatives living elsewhere,
          including international remittances.
        annotations:
          label_es: Remesas
          label_fr: Envois de fonds
          description_es: Ingresos recibidos como transferencias de miembros del hogar o parientes que
            viven en otro lugar, incluidas las remesas internacionales.
          description_fr: Revenus reçus sous forme de transferts de membres du ménage ou de proches vivant
            ailleurs, y compris les envois de fonds internationaux.
      social_transfers:
        meaning: publicschema:IncomeSource/social_transfers
        title: Social transfers
        description: Income from government social protection programs including cash transfers, pensions,
          disability benefits, and social assistance.
        annotations:
          label_es: Transferencias sociales
          label_fr: Transferts sociaux
          description_es: Ingresos de los programas gubernamentales de protección social, incluidas las
            transferencias en efectivo, pensiones, prestaciones por discapacidad y asistencia social.
          description_fr: Revenus des programmes gouvernementaux de protection sociale, notamment les
            transferts monétaires, les pensions, les allocations d'invalidité et l'aide sociale.
      pension:
        meaning: publicschema:IncomeSource/pension
        title: Pension
        description: Income from occupational or private pension schemes (distinct from state social assistance).
        annotations:
          label_es: Pensión
          label_fr: Retraite
          description_es: Ingresos de planes de pensiones ocupacionales o privados (distintos de la asistencia
            social del Estado).
          description_fr: Revenus des régimes de retraite professionnels ou privés (distincts de l'aide
            sociale de l'État).
      rental_income:
        meaning: publicschema:IncomeSource/rental_income
        title: Rental income
        description: Income from renting out property, land, or other assets.
        annotations:
          label_es: Ingresos por alquiler
          label_fr: Revenus locatifs
          description_es: Ingresos del arrendamiento de propiedades, tierras u otros activos.
          description_fr: Revenus de la location de propriétés, de terres ou d'autres actifs.
      casual_labor:
        meaning: publicschema:IncomeSource/casual_labor
        title: Casual labor
        description: Income from irregular, short-term, or seasonal labor without a formal employment
          contract.
        annotations:
          label_es: Trabajo ocasional
          label_fr: Travail occasionnel
          description_es: Ingresos del trabajo irregular, a corto plazo o estacional sin contrato de trabajo
            formal.
          description_fr: Revenus du travail irrégulier, temporaire ou saisonnier sans contrat de travail
            formel.
      other:
        meaning: publicschema:IncomeSource/other
        title: Other
        description: An income source not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Una fuente de ingresos no cubierta por las otras categorías.
          description_fr: Une source de revenu non couverte par les autres catégories.
    annotations:
      label_es: Fuente de ingresos
      label_fr: Source de revenu
      description_es: La fuente de ingresos de un hogar, que combina categorías derivadas del empleo (basadas
        en la CISE-18 de la OIT) con tipos de ingresos no laborales relevantes para la focalización de
        la protección social.
      description_fr: La source de revenu d'un ménage, combinant des catégories dérivées de l'emploi (basées
        sur la CISE-18 de l'OIT) avec des types de revenus hors emploi pertinents pour le ciblage de la
        protection sociale.
  InstrumentCode:
    enum_uri: publicschema:InstrumentCode
    title: Instrument Identifier
    description: Canonical short identifiers for the data-collection instruments referenced by Profile
      records and by the valid_instruments metadata on item-level properties. Each code names a published
      questionnaire, screening form, or measurement protocol. Programs that deploy a national or program-specific
      instrument add a local code alongside the published ones.
    status: bibo:draft
    permissible_values:
      wg_ss:
        meaning: publicschema:InstrumentCode/wg_ss
        title: Washington Group Short Set on Functioning (WG-SS)
        description: Six-question survey for adults that screens for difficulty in seeing, hearing, walking,
          remembering, self-care, and communication. Designed for census and general-population surveys.
          See bibliography entry washington-group-ss.
        annotations:
          label_es: Conjunto corto del Washington Group sobre el funcionamiento (WG-SS)
          label_fr: Ensemble court du Washington Group sur le fonctionnement (WG-SS)
          description_es: Encuesta de seis preguntas para adultos que detecta dificultades para ver, oír,
            caminar, recordar, cuidarse a sí mismo y comunicarse. Diseñada para censos y encuestas de
            población general. Ver la entrada bibliográfica washington-group-ss.
          description_fr: Enquête de six questions pour les adultes qui dépiste les difficultés de vision,
            d'audition, de marche, de mémoire, de soins personnels et de communication. Conçue pour les
            recensements et les enquêtes en population générale. Voir l'entrée bibliographique washington-group-ss.
      wg_es:
        meaning: publicschema:InstrumentCode/wg_es
        title: Washington Group Extended Set on Functioning (WG-ES)
        description: Extended survey for adults that adds upper-body and fine-motor items, additional
          vision and hearing items with environment qualifiers, pain, fatigue, affect (anxiety and depression),
          and aid-use. Used when richer functioning data is needed than the short set provides. See bibliography
          entry washington-group-es.
        annotations:
          label_es: Conjunto extendido del Washington Group sobre el funcionamiento (WG-ES)
          label_fr: Ensemble étendu du Washington Group sur le fonctionnement (WG-ES)
          description_es: Encuesta extendida para adultos que añade ítems de la parte superior del cuerpo
            y motricidad fina, ítems adicionales de visión y audición con calificadores ambientales, dolor,
            fatiga, afecto (ansiedad y depresión) y uso de ayudas. Se utiliza cuando se necesitan datos
            de funcionamiento más ricos que los que proporciona el conjunto corto. Ver la entrada bibliográfica
            washington-group-es.
          description_fr: Enquête étendue pour adultes ajoutant des items du haut du corps et de motricité
            fine, des items de vision et d'audition avec qualificateurs environnementaux, douleur, fatigue,
            affect (anxiété et dépression) et utilisation d'aides. Utilisée lorsque des données de fonctionnement
            plus riches que l'ensemble court sont nécessaires. Voir l'entrée bibliographique washington-group-es.
      cfm_2_4:
        meaning: publicschema:InstrumentCode/cfm_2_4
        title: UNICEF Child Functioning Module, ages 2-4 (CFM 2-4)
        description: Caregiver-reported questionnaire on functioning for children aged 2 to 4 years. Always
          administered in proxy mode. Covers seeing, hearing, walking, fine motor, learning, communication,
          playing, and controlling behaviour. See bibliography entry washington-group-cfm.
        annotations:
          label_es: Módulo de Funcionamiento Infantil UNICEF, 2 a 4 años (CFM 2-4)
          label_fr: Module de fonctionnement de l'enfant UNICEF, 2 à 4 ans (CFM 2-4)
          description_es: Cuestionario informado por el cuidador sobre el funcionamiento de niños de 2
            a 4 años. Siempre se administra en modo por terceros. Cubre visión, audición, marcha, motricidad
            fina, aprendizaje, comunicación, juego y control del comportamiento. Ver la entrada bibliográfica
            washington-group-cfm.
          description_fr: Questionnaire déclaré par l'aidant sur le fonctionnement des enfants de 2 à
            4 ans. Toujours administré en mode procuration. Couvre la vision, l'audition, la marche, la
            motricité fine, l'apprentissage, la communication, le jeu et le contrôle du comportement.
            Voir l'entrée bibliographique washington-group-cfm.
      cfm_5_17:
        meaning: publicschema:InstrumentCode/cfm_5_17
        title: UNICEF Child Functioning Module, ages 5-17 (CFM 5-17)
        description: Caregiver-reported questionnaire on functioning for children and adolescents aged
          5 to 17 years. Always administered in proxy mode. Extends the 2-4 module with self-care, concentration,
          accepting change, making friends, anxiety, and depression. See bibliography entry washington-group-cfm.
        annotations:
          label_es: Módulo de Funcionamiento Infantil UNICEF, 5 a 17 años (CFM 5-17)
          label_fr: Module de fonctionnement de l'enfant UNICEF, 5 à 17 ans (CFM 5-17)
          description_es: Cuestionario informado por el cuidador sobre el funcionamiento de niños y adolescentes
            de 5 a 17 años. Siempre se administra en modo por terceros. Amplía el módulo 2-4 con cuidado
            personal, concentración, aceptar cambios, hacer amigos, ansiedad y depresión. Ver la entrada
            bibliográfica washington-group-cfm.
          description_fr: Questionnaire déclaré par l'aidant sur le fonctionnement des enfants et adolescents
            de 5 à 17 ans. Toujours administré en mode procuration. Étend le module 2-4 avec les soins
            personnels, la concentration, l'acceptation du changement, se faire des amis, l'anxiété et
            la dépression. Voir l'entrée bibliographique washington-group-cfm.
      smart:
        meaning: publicschema:InstrumentCode/smart
        title: SMART anthropometry protocol
        description: Standardized anthropometric measurement procedure used in humanitarian nutrition
          surveys. Captures weight, height or length, MUAC, and bilateral pitting oedema, with a declared
          growth reference and measurement type (recumbent or standing). See bibliography entry smart-methodology.
        annotations:
          label_es: Protocolo antropométrico SMART
          label_fr: Protocole anthropométrique SMART
          description_es: Procedimiento estandarizado de medición antropométrica utilizado en las encuestas
            humanitarias de nutrición. Captura el peso, la talla o longitud, el perímetro braquial y el
            edema bilateral con fóvea, con una referencia de crecimiento y un tipo de medición declarados
            (acostado o de pie). Ver la entrada bibliográfica smart-methodology.
          description_fr: Procédure standardisée de mesure anthropométrique utilisée dans les enquêtes
            humanitaires de nutrition. Capture le poids, la taille (couchée ou debout), le périmètre brachial
            et l'œdème bilatéral prenant le godet, avec une référence de croissance et un type de mesure
            déclarés (couché ou debout). Voir l'entrée bibliographique smart-methodology.
      wfp_fcs:
        meaning: publicschema:InstrumentCode/wfp_fcs
        title: WFP Food Consumption Score (FCS)
        description: Seven-day household dietary recall using eight scored food groups (staples, pulses,
          vegetables, fruit, meat/fish/eggs, dairy, fat/oil, sugar) plus a condiments screener, each scored
          by number of days consumed and weighted to produce a composite food consumption score. Published
          by WFP VAM; used to classify households as poor, borderline, or acceptable consumption. See
          bibliography entry wfp-fcs.
        annotations:
          label_es: Puntaje de Consumo de Alimentos del PMA (FCS)
          label_fr: Score de consommation alimentaire du PAM (FCS)
          description_es: Recordatorio dietético del hogar durante siete días utilizando ocho grupos alimentarios
            puntuados (alimentos básicos, legumbres, verduras, frutas, carne/pescado/huevos, lácteos,
            grasas, azúcar) más un ítem de detección para condimentos, cada uno puntuado por número de
            días consumidos y ponderado para producir una puntuación compuesta de consumo de alimentos.
            Publicado por VAM del PMA; usado para clasificar hogares como consumo pobre, limítrofe o aceptable.
            Ver la entrada bibliográfica wfp-fcs.
          description_fr: Rappel alimentaire du ménage sur sept jours utilisant huit groupes alimentaires
            notés (aliments de base, légumineuses, légumes, fruits, viande/poisson/œufs, produits laitiers,
            matières grasses, sucre) plus un item de dépistage pour les condiments, chacun noté par nombre
            de jours consommés et pondéré pour produire un score composite de consommation alimentaire.
            Publié par VAM du PAM ; utilisé pour classer les ménages en consommation pauvre, limite ou
            acceptable. Voir l'entrée bibliographique wfp-fcs.
      wfp_rcsi:
        meaning: publicschema:InstrumentCode/wfp_rcsi
        title: WFP Reduced Coping Strategies Index (rCSI)
        description: Seven-day recall of five food-related coping behaviours (eating less-preferred foods,
          borrowing food or relying on help, reducing meal size, reducing meal frequency, restricting
          adult consumption so children can eat), each counted in days and weighted by severity. Published
          by WFP and CARE as a comparable short form of the full CSI. See bibliography entry wfp-rcsi.
        annotations:
          label_es: Índice Reducido de Estrategias de Afrontamiento del PMA (rCSI)
          label_fr: Indice réduit des stratégies d'adaptation du PAM (rCSI)
          description_es: Recordatorio de siete días de cinco comportamientos de afrontamiento alimentario
            (consumir alimentos menos preferidos, pedir prestado alimentos o depender de ayuda, reducir
            el tamaño de las comidas, reducir la frecuencia de las comidas, restringir el consumo de adultos
            para que los niños coman), cada uno contado en días y ponderado por gravedad. Publicado por
            el PMA y CARE como forma corta comparable del CSI completo. Ver la entrada bibliográfica wfp-rcsi.
          description_fr: Rappel sur sept jours de cinq comportements d'adaptation alimentaire (consommer
            des aliments moins préférés, emprunter de la nourriture ou compter sur l'aide, réduire la
            taille des repas, réduire la fréquence des repas, restreindre la consommation des adultes
            pour que les enfants puissent manger), chacun compté en jours et pondéré par gravité. Publié
            par le PAM et CARE comme forme courte comparable du CSI complet. Voir l'entrée bibliographique
            wfp-rcsi.
      wfp_lcs:
        meaning: publicschema:InstrumentCode/wfp_lcs
        title: WFP Livelihood Coping Strategies (LCS)
        description: 'Thirty-day recall of twelve household coping strategies grouped into three severity
          tiers: stress (selling non-productive assets, spending savings), crisis (selling productive
          assets, withdrawing children from school), and emergency (selling house or land, migrating,
          begging). Each strategy is asked as a frequency (never, rarely, sometimes, often). Published
          by WFP VAM as part of the CARI framework. See bibliography entry wfp-lcs.'
        annotations:
          label_es: Estrategias de Afrontamiento de Medios de Vida del PMA (LCS)
          label_fr: Stratégies d'adaptation des moyens d'existence du PAM (LCS)
          description_es: 'Recordatorio de treinta días de doce estrategias de afrontamiento de los hogares
            agrupadas en tres niveles de gravedad: estrés (venta de activos no productivos, uso de ahorros),
            crisis (venta de activos productivos, retiro de niños de la escuela) y emergencia (venta de
            casa o tierra, migración, mendicidad). Cada estrategia se pregunta como frecuencia (nunca,
            rara vez, a veces, a menudo). Publicado por VAM del PMA como parte del marco CARI. Ver la
            entrada bibliográfica wfp-lcs.'
          description_fr: 'Rappel sur trente jours de douze stratégies d''adaptation des ménages regroupées
            en trois niveaux de gravité : stress (vente d''actifs non productifs, épargne), crise (vente
            d''actifs productifs, retrait des enfants de l''école) et urgence (vente de maison ou de terre,
            migration, mendicité). Chaque stratégie est interrogée en fréquence (jamais, rarement, parfois,
            souvent). Publié par VAM du PAM dans le cadre CARI. Voir l''entrée bibliographique wfp-lcs.'
      wfp_cari:
        meaning: publicschema:InstrumentCode/wfp_cari
        title: WFP Consolidated Approach for Reporting Indicators (CARI)
        description: Composite food security classification that combines FCS (current food consumption),
          rCSI (food-based coping), LCS (livelihood coping), and a food expenditure share indicator into
          a single four-tier index (food secure, marginally food secure, moderately food insecure, severely
          food insecure). Used as the umbrella instrument code when a household administration deploys
          the full CARI battery. See bibliography entry wfp-cari.
        annotations:
          label_es: Enfoque Consolidado para Reportar Indicadores (CARI) del PMA
          label_fr: Approche consolidée de rapport sur les indicateurs (CARI) du PAM
          description_es: Clasificación compuesta de seguridad alimentaria que combina FCS (consumo actual),
            rCSI (afrontamiento alimentario), LCS (afrontamiento de medios de vida) y un indicador de
            participación del gasto alimentario en un índice único de cuatro niveles (seguridad alimentaria,
            seguridad alimentaria marginal, inseguridad alimentaria moderada, inseguridad alimentaria
            severa). Usado como código instrumento general cuando una administración al hogar despliega
            la batería CARI completa. Ver la entrada bibliográfica wfp-cari.
          description_fr: Classification composite de sécurité alimentaire qui combine FCS (consommation
            alimentaire actuelle), rCSI (adaptation alimentaire), LCS (adaptation des moyens d'existence)
            et un indicateur de part des dépenses alimentaires en un indice unique à quatre niveaux (en
            sécurité alimentaire, sécurité alimentaire marginale, insécurité alimentaire modérée, insécurité
            alimentaire sévère). Utilisé comme code instrument générique lorsqu'une administration au
            ménage déploie la batterie CARI complète. Voir l'entrée bibliographique wfp-cari.
      fao_hdds:
        meaning: publicschema:InstrumentCode/fao_hdds
        title: FAO Household Dietary Diversity Score (HDDS)
        description: Twenty-four-hour recall of household consumption across twelve FAO food groups (cereals;
          roots and tubers; vegetables; fruit; meat, poultry, offal; eggs; fish and seafood; legumes,
          nuts, and seeds; milk and dairy; oils and fats; sweets; spices, condiments, and beverages).
          Each group is a yes/no item; the score is the count of groups consumed. Defined in FAO i1983e.
          See bibliography entry fao-hdds.
        annotations:
          label_es: Puntaje de Diversidad Dietética del Hogar (HDDS) de la FAO
          label_fr: Score de diversité alimentaire du ménage (HDDS) de la FAO
          description_es: Recordatorio de veinticuatro horas del consumo del hogar en doce grupos alimentarios
            FAO (cereales; raíces y tubérculos; verduras; frutas; carne, aves, vísceras; huevos; pescado
            y mariscos; legumbres, nueces y semillas; leche y lácteos; aceites y grasas; dulces; especias,
            condimentos y bebidas). Cada grupo es un ítem sí/no; el puntaje es el recuento de grupos consumidos.
            Definido en FAO i1983e. Ver la entrada bibliográfica fao-hdds.
          description_fr: Rappel sur vingt-quatre heures de la consommation du ménage dans douze groupes
            alimentaires FAO (céréales ; racines et tubercules ; légumes ; fruits ; viande, volaille,
            abats ; œufs ; poissons et fruits de mer ; légumineuses, noix et graines ; lait et produits
            laitiers ; huiles et matières grasses ; sucreries ; épices, condiments et boissons). Chaque
            groupe est un item oui/non ; le score est le nombre de groupes consommés. Défini dans FAO
            i1983e. Voir l'entrée bibliographique fao-hdds.
      fao_fies:
        meaning: publicschema:InstrumentCode/fao_fies
        title: FAO Food Insecurity Experience Scale (FIES)
        description: Eight-item experience-based scale (worried about food, unable to eat healthy, ate
          few foods, skipped a meal, ate less, ran out, hungry, went a whole day without). Each item is
          a yes/no for a declared reference period (commonly 12 months; 30-day variants exist). Used by
          FAO for SDG 2.1.2 monitoring. A FIES individual variant exists; the default FIES module is household-level.
          See bibliography entry fao-fies.
        annotations:
          label_es: Escala de Experiencia de Inseguridad Alimentaria (FIES) de la FAO
          label_fr: Échelle d'expérience de l'insécurité alimentaire (FIES) de la FAO
          description_es: Escala experiencial de ocho ítems (preocupación por los alimentos, incapacidad
            de comer saludablemente, comió pocos alimentos, omitió una comida, comió menos, se le acabó
            la comida, tuvo hambre, pasó un día entero sin comer). Cada ítem es sí/no para un período
            de referencia declarado (habitualmente 12 meses; existen variantes de 30 días). Usada por
            la FAO para el monitoreo del ODS 2.1.2. Existe una variante individual FIES; el módulo FIES
            por defecto es a nivel de hogar. Ver la entrada bibliográfica fao-fies.
          description_fr: Échelle expérientielle de huit items (inquiétude au sujet de la nourriture,
            incapacité de manger sainement, a mangé peu d'aliments, a sauté un repas, a mangé moins, a
            manqué de nourriture, a eu faim, a passé une journée entière sans manger). Chaque item est
            un oui/non pour une période de référence déclarée (généralement 12 mois ; des variantes à
            30 jours existent). Utilisée par la FAO pour le suivi de l'ODD 2.1.2. Une variante individuelle
            FIES existe ; le module FIES par défaut est au niveau du ménage. Voir l'entrée bibliographique
            fao-fies.
      fao_mahfp:
        meaning: publicschema:InstrumentCode/fao_mahfp
        title: FAO Months of Adequate Household Food Provisioning (MAHFP)
        description: Twelve-month recall indicator asking, for each of the past 12 months, whether the
          household had enough food to meet its needs. The output is an integer 0-12 representing the
          number of months of adequate provisioning. Used to detect seasonality in food access. Defined
          by FANTA for FAO. See bibliography entry fao-mahfp.
        annotations:
          label_es: Meses de Aprovisionamiento Alimentario Adecuado del Hogar (MAHFP) de la FAO
          label_fr: Mois d'approvisionnement alimentaire adéquat du ménage (MAHFP) de la FAO
          description_es: Indicador de recordatorio de doce meses que pregunta, para cada uno de los últimos
            doce meses, si el hogar tuvo suficiente comida para satisfacer sus necesidades. La salida
            es un entero 0-12 que representa el número de meses de aprovisionamiento adecuado. Usado para
            detectar la estacionalidad en el acceso a los alimentos. Definido por FANTA para la FAO. Ver
            la entrada bibliográfica fao-mahfp.
          description_fr: Indicateur à rappel sur douze mois demandant, pour chacun des douze derniers
            mois, si le ménage disposait de suffisamment de nourriture pour couvrir ses besoins. La sortie
            est un entier de 0 à 12 représentant le nombre de mois d'approvisionnement adéquat. Utilisé
            pour détecter la saisonnalité de l'accès alimentaire. Défini par FANTA pour la FAO. Voir l'entrée
            bibliographique fao-mahfp.
      fao_wdds:
        meaning: publicschema:InstrumentCode/fao_wdds
        title: FAO Minimum Dietary Diversity for Women (MDD-W)
        description: Twenty-four-hour recall of individual (woman of reproductive age) consumption across
          ten FAO food groups (grains; pulses; nuts and seeds; dairy; meat/poultry/fish; eggs; dark green
          leafy vegetables; other vitamin-A-rich fruits and vegetables; other vegetables; other fruits).
          Each group is a yes/no item; women consuming five or more groups are classified as having minimum
          dietary diversity. Replaces earlier WDDS. See bibliography entry fao-mdd-w.
        annotations:
          label_es: Diversidad Dietética Mínima para Mujeres (MDD-W) de la FAO
          label_fr: Diversité alimentaire minimale pour les femmes (MDD-W) de la FAO
          description_es: Recordatorio de veinticuatro horas del consumo individual (mujeres en edad reproductiva)
            en diez grupos alimentarios FAO (cereales; legumbres; nueces y semillas; lácteos; carne/aves/pescado;
            huevos; hortalizas de hoja verde oscuro; otras frutas y verduras ricas en vitamina A; otras
            verduras; otras frutas). Cada grupo es un ítem sí/no; las mujeres que consumen cinco o más
            grupos se clasifican como con diversidad dietética mínima. Reemplaza al WDDS anterior. Ver
            la entrada bibliográfica fao-mdd-w.
          description_fr: Rappel sur vingt-quatre heures de la consommation individuelle (femme en âge
            de procréer) dans dix groupes alimentaires FAO (céréales ; légumineuses ; noix et graines
            ; produits laitiers ; viande/volaille/poisson ; œufs ; légumes-feuilles vert foncé ; autres
            fruits et légumes riches en vitamine A ; autres légumes ; autres fruits). Chaque groupe est
            un item oui/non ; les femmes consommant cinq groupes ou plus sont classées comme ayant une
            diversité alimentaire minimale. Remplace le WDDS antérieur. Voir l'entrée bibliographique
            fao-mdd-w.
      fanta_hhs:
        meaning: publicschema:InstrumentCode/fanta_hhs
        title: FANTA Household Hunger Scale (HHS)
        description: Three-item scale asking, over the past 30 days, whether anyone in the household (i)
          had no food of any kind because of lack of resources, (ii) went to sleep hungry, and (iii) went
          a whole day and night without eating. Each item is asked as a frequency (never, rarely 1-2 times,
          sometimes 3-10 times, often more than 10 times). Used in severe food insecurity contexts. See
          bibliography entry fanta-hhs.
        annotations:
          label_es: Escala de Hambre del Hogar (HHS) de FANTA
          label_fr: Échelle de la faim du ménage (HHS) de FANTA
          description_es: Escala de tres ítems que pregunta, durante los últimos treinta días, si alguien
            en el hogar (i) no tuvo comida de ningún tipo por falta de recursos, (ii) se acostó con hambre,
            y (iii) pasó un día y una noche enteros sin comer. Cada ítem se pregunta como frecuencia (nunca,
            rara vez 1-2 veces, a veces 3-10 veces, a menudo más de 10 veces). Usada en contextos de inseguridad
            alimentaria severa. Ver la entrada bibliográfica fanta-hhs.
          description_fr: Échelle à trois items demandant, sur les trente derniers jours, si quelqu'un
            dans le ménage (i) n'a pas eu de nourriture d'aucune sorte faute de ressources, (ii) s'est
            couché affamé, et (iii) a passé une journée et une nuit entières sans manger. Chaque item
            est interrogé en fréquence (jamais, rarement 1-2 fois, parfois 3-10 fois, souvent plus de
            10 fois). Utilisée dans les contextes d'insécurité alimentaire sévère. Voir l'entrée bibliographique
            fanta-hhs.
      iasc_mira:
        meaning: publicschema:InstrumentCode/iasc_mira
        title: IASC Multi-Cluster/Sector Initial Rapid Assessment (MIRA)
        description: Inter-Agency Standing Committee multi-sector rapid assessment used in the first two
          weeks of a sudden-onset emergency to produce a joint humanitarian needs picture across shelter,
          WASH, health, nutrition, food security, and protection. Combines secondary data review with
          primary field observation at affected sites. Shelter-relevant items include observed damage,
          displacement, and service-disruption indicators. See bibliography entry iasc-mira.
        annotations:
          label_es: Evaluación Inicial Rápida Multi-Cluster/Sector (MIRA) del IASC
          label_fr: Évaluation initiale rapide multi-cluster/secteur (MIRA) de l'IASC
          description_es: Evaluación rápida multisectorial del Comité Permanente entre Organismos utilizada
            en las dos primeras semanas de una emergencia de aparición súbita para producir una imagen
            conjunta de necesidades humanitarias en los sectores refugio, WASH, salud, nutrición, seguridad
            alimentaria y protección. Combina revisión de datos secundarios con observación primaria de
            campo en sitios afectados. Los ítems pertinentes para refugio incluyen daños observados, desplazamiento
            e indicadores de interrupción de servicios. Ver la entrada bibliográfica iasc-mira.
          description_fr: Évaluation rapide multi-secteurs du Comité permanent inter-organisations utilisée
            durant les deux premières semaines d'une urgence à survenue rapide pour produire une image
            conjointe des besoins humanitaires dans les secteurs abri, WASH, santé, nutrition, sécurité
            alimentaire et protection. Combine une revue des données secondaires avec des observations
            primaires sur le terrain dans les sites affectés. Les items pertinents pour l'abri comprennent
            les dommages observés, le déplacement et les indicateurs de rupture de services. Voir l'entrée
            bibliographique iasc-mira.
      iom_dtm_household:
        meaning: publicschema:InstrumentCode/iom_dtm_household
        title: IOM Displacement Tracking Matrix household assessment
        description: Household-level questionnaire administered as part of IOM DTM site and flow monitoring
          in displacement contexts. Captures household composition, origin and movement history, current
          shelter arrangement, damage to original dwelling (where known), services available at the current
          site, and intentions to return, relocate, or integrate. Used in both sudden-onset and protracted
          displacement. See bibliography entry iom-dtm.
        annotations:
          label_es: Evaluación a nivel de hogar de la Matriz de Seguimiento de Desplazamientos (DTM) de
            la OIM
          label_fr: Évaluation ménage de la Matrice de suivi des déplacements (DTM) de l'OIM
          description_es: Cuestionario a nivel de hogar administrado como parte del seguimiento de sitios
            y flujos DTM de la OIM en contextos de desplazamiento. Captura la composición del hogar, el
            origen y la historia de movimiento, el arreglo de refugio actual, los daños a la vivienda
            original (cuando se conocen), los servicios disponibles en el sitio actual y las intenciones
            de retorno, relocalización o integración. Se utiliza tanto en desplazamientos de aparición
            súbita como prolongados. Ver la entrada bibliográfica iom-dtm.
          description_fr: Questionnaire au niveau du ménage administré dans le cadre du suivi des sites
            et des flux DTM de l'OIM dans les contextes de déplacement. Capture la composition du ménage,
            l'origine et l'historique de mouvement, l'arrangement d'abri actuel, les dommages au logement
            d'origine (lorsqu'ils sont connus), les services disponibles sur le site actuel et les intentions
            de retour, de relocalisation ou d'intégration. Utilisé dans les déplacements à survenue rapide
            comme prolongés. Voir l'entrée bibliographique iom-dtm.
      shelter_cluster_rna:
        meaning: publicschema:InstrumentCode/shelter_cluster_rna
        title: Shelter Cluster Rapid Needs Assessment (RNA)
        description: Sector-specific rapid needs assessment coordinated by the Global Shelter Cluster
          and country-level shelter clusters in the early phase of an emergency. Captures observed dwelling
          damage levels, current shelter arrangements, habitability, and priority needs for shelter and
          non-food items, to inform cluster response planning. See bibliography entry global-shelter-cluster.
        annotations:
          label_es: Evaluación Rápida de Necesidades (RNA) del Clúster de Refugio
          label_fr: Évaluation rapide des besoins (RNA) du Cluster Abri
          description_es: Evaluación rápida de necesidades específica del sector, coordinada por el Clúster
            de Refugio global y los clústeres de refugio a nivel de país en la fase temprana de una emergencia.
            Captura los niveles observados de daño a la vivienda, los arreglos de refugio actuales, la
            habitabilidad y las necesidades prioritarias de refugio y artículos no alimentarios, para
            orientar la planificación de la respuesta del clúster. Ver la entrada bibliográfica global-shelter-cluster.
          description_fr: Évaluation rapide des besoins spécifique au secteur, coordonnée par le Cluster
            Abri mondial et les clusters abri au niveau pays dans la phase précoce d'une urgence. Capture
            les niveaux observés de dommages au logement, les arrangements d'abri actuels, l'habitabilité
            et les besoins prioritaires en abri et articles non alimentaires, pour éclairer la planification
            de la réponse du cluster. Voir l'entrée bibliographique global-shelter-cluster.
      reach_msna:
        meaning: publicschema:InstrumentCode/reach_msna
        title: REACH Multi-Sector Needs Assessment (MSNA)
        description: Household survey coordinated by the REACH Initiative (IMPACT) to produce comparable
          multi-sector data across shelter, WASH, food security, health, education, and protection. Typically
          fielded annually within a Humanitarian Needs Overview cycle. Shelter-relevant modules capture
          dwelling type, damage, habitability, current shelter arrangement, and services functional status.
        annotations:
          label_es: Evaluación Multisectorial de Necesidades (MSNA) de REACH
          label_fr: Évaluation multisectorielle des besoins (MSNA) de REACH
          description_es: Encuesta de hogares coordinada por la Iniciativa REACH (IMPACT) para producir
            datos multisectoriales comparables entre refugio, WASH, seguridad alimentaria, salud, educación
            y protección. Generalmente se realiza anualmente dentro de un ciclo de Panorama de Necesidades
            Humanitarias. Los módulos pertinentes para refugio capturan el tipo de vivienda, los daños,
            la habitabilidad, el arreglo de refugio actual y el estado funcional de los servicios.
          description_fr: Enquête auprès des ménages coordonnée par l'Initiative REACH (IMPACT) pour produire
            des données multisectorielles comparables sur l'abri, WASH, la sécurité alimentaire, la santé,
            l'éducation et la protection. Généralement administrée annuellement dans un cycle d'Aperçu
            des besoins humanitaires. Les modules pertinents pour l'abri couvrent le type de logement,
            les dommages, l'habitabilité, l'arrangement d'abri actuel et l'état fonctionnel des services.
      pdna_housing:
        meaning: publicschema:InstrumentCode/pdna_housing
        title: Post-Disaster Needs Assessment (PDNA) housing sector module
        description: Housing sector component of the UNDP/EU/World Bank Post-Disaster Needs Assessment
          methodology. Applied in the recovery phase (typically weeks to months after the shock) to estimate
          damage, loss, and recovery needs at aggregate and household level. Captures damage level, habitability,
          and reconstruction intent to inform recovery grant design and programming. See bibliography
          entry undp-eu-wb-pdna.
        annotations:
          label_es: Módulo de vivienda de la Evaluación de Necesidades Post-Desastre (PDNA)
          label_fr: Module logement de l'Évaluation des besoins post-catastrophe (PDNA)
          description_es: Componente del sector vivienda de la metodología Evaluación de Necesidades Post-Desastre
            del PNUD/UE/Banco Mundial. Aplicada en la fase de recuperación (generalmente de semanas a
            meses después del choque) para estimar daños, pérdidas y necesidades de recuperación a nivel
            agregado y de hogar. Captura el nivel de daños, la habitabilidad y la intención de reconstrucción
            para orientar el diseño de subvenciones de recuperación y la programación. Ver la entrada
            bibliográfica undp-eu-wb-pdna.
          description_fr: Composante du secteur logement de la méthodologie Évaluation des besoins post-catastrophe
            du PNUD/UE/Banque mondiale. Appliquée dans la phase de relèvement (généralement des semaines
            à des mois après le choc) pour estimer les dommages, les pertes et les besoins de relèvement
            aux niveaux agrégé et ménage. Capture le niveau de dommages, l'habitabilité et l'intention
            de reconstruction pour éclairer la conception des subventions de relèvement et la programmation.
            Voir l'entrée bibliographique undp-eu-wb-pdna.
    annotations:
      label_es: Identificador de instrumento
      label_fr: Identifiant d'instrument
      description_es: Identificadores cortos canónicos para los instrumentos de recopilación de datos
        referenciados por los registros Profile y por los metadatos valid_instruments en las propiedades
        a nivel de ítem. Cada código nombra un cuestionario publicado, un formulario de detección o un
        protocolo de medición. Los programas que implementan un instrumento nacional o específico del
        programa añaden un código local junto a los códigos publicados.
      description_fr: Identifiants courts canoniques pour les instruments de collecte de données référencés
        par les enregistrements Profile et par les métadonnées valid_instruments des propriétés au niveau
        de l'item. Chaque code nomme un questionnaire publié, un formulaire de dépistage ou un protocole
        de mesure. Les programmes qui déploient un instrument national ou spécifique au programme ajoutent
        un code local aux côtés des codes publiés.
      bibliography_refs: '["fao-fies", "washington-group-cfm", "washington-group-es", "washington-group-ss"]'
  LandTenure:
    enum_uri: publicschema:LandTenure
    title: Land Tenure
    description: The legal or customary arrangement under which land is held, classified according to
      FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT) categories.
    status: bibo:draft
    permissible_values:
      owned_with_title:
        meaning: publicschema:LandTenure/owned_with_title
        title: Owned with title
        description: Land held with a formal, legally recognized title deed or certificate of ownership.
        annotations:
          label_es: Propiedad con título
          label_fr: Propriété titrée
          description_es: Tierra mantenida con un título de propiedad o certificado de propiedad formalmente
            reconocido legalmente.
          description_fr: Terre détenue avec un titre de propriété ou un certificat de propriété formellement
            reconnu par la loi.
      owned_without_title:
        meaning: publicschema:LandTenure/owned_without_title
        title: Owned without title
        description: Land held through customary or informal ownership without a formal title document.
        annotations:
          label_es: Propiedad sin título
          label_fr: Propriété sans titre
          description_es: Tierra mantenida mediante propiedad consuetudinaria o informal sin documento
            de título formal.
          description_fr: Terre détenue par possession coutumière ou informelle sans document de titre
            formel.
      rented:
        meaning: publicschema:LandTenure/rented
        title: Rented
        description: Land used under a rental or lease agreement with a landowner for a fixed payment.
        annotations:
          label_es: Arrendada
          label_fr: Louée
          description_es: Tierra utilizada bajo un contrato de arrendamiento con un propietario a cambio
            de un pago fijo.
          description_fr: Terre utilisée dans le cadre d'un contrat de location ou de bail avec un propriétaire
            foncier moyennant un paiement fixe.
      sharecropped:
        meaning: publicschema:LandTenure/sharecropped
        title: Sharecropped
        description: Land cultivated under an arrangement where the tenant pays the landowner a share
          of the harvest or proceeds.
        annotations:
          label_es: Aparcería
          label_fr: Métayage
          description_es: Tierra cultivada bajo un acuerdo en que el arrendatario paga al propietario
            una parte de la cosecha o los ingresos.
          description_fr: Terre cultivée dans le cadre d'un arrangement où le locataire verse au propriétaire
            une part de la récolte ou des revenus.
      communal:
        meaning: publicschema:LandTenure/communal
        title: Communal
        description: Land held collectively by a community, clan, or group under customary or statutory
          communal tenure.
        annotations:
          label_es: Comunal
          label_fr: Communautaire
          description_es: Tierra mantenida colectivamente por una comunidad, clan o grupo bajo tenencia
            comunal consuetudinaria o estatutaria.
          description_fr: Terre détenue collectivement par une communauté, un clan ou un groupe sous régime
            foncier communautaire coutumier ou légal.
      state_allocated:
        meaning: publicschema:LandTenure/state_allocated
        title: State-allocated
        description: Land allocated by the state or government authority for use, often without transfer
          of ownership.
        annotations:
          label_es: Asignación estatal
          label_fr: Attribution étatique
          description_es: Tierra asignada por el Estado o una autoridad gubernamental para su uso, generalmente
            sin transferencia de propiedad.
          description_fr: Terre attribuée par l'État ou une autorité gouvernementale pour usage, souvent
            sans transfert de propriété.
      informal:
        meaning: publicschema:LandTenure/informal
        title: Informal/squatting
        description: Land occupied and used without any formal or customary legal basis.
        annotations:
          label_es: Informal/ocupación ilegal
          label_fr: Occupation informelle/squat
          description_es: Tierra ocupada y utilizada sin ninguna base legal formal o consuetudinaria.
          description_fr: Terre occupée et utilisée sans aucune base juridique formelle ou coutumière.
      borrowed:
        meaning: publicschema:LandTenure/borrowed
        title: Borrowed
        description: Land used temporarily without payment, typically lent by a relative, friend, or community
          member.
        annotations:
          label_es: Prestada
          label_fr: Prêtée
          description_es: Tierra usada temporalmente sin pago, generalmente prestada por un pariente,
            amigo o miembro de la comunidad.
          description_fr: Terre utilisée temporairement sans paiement, généralement prêtée par un parent,
            un ami ou un membre de la communauté.
      other:
        meaning: publicschema:LandTenure/other
        title: Other
        description: A tenure arrangement not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un régimen de tenencia no cubierto por las otras categorías.
          description_fr: Un régime foncier non couvert par les autres catégories.
    annotations:
      label_es: Tenencia de la tierra
      label_fr: Régime foncier
      description_es: El régimen legal o consuetudinario bajo el cual se mantiene la tierra, clasificado
        según las categorías de las Directrices voluntarias de la FAO sobre la gobernanza responsable
        de la tenencia (VGGT).
      description_fr: Le régime légal ou coutumier sous lequel les terres sont détenues, classifié selon
        les catégories des Directives volontaires de la FAO sur la gouvernance responsable des régimes
        fonciers (VGGT).
      standard_json: '{"name": "FAO Voluntary Guidelines on the Responsible Governance of Tenure (VGGT)",
        "notes": "International framework for governance of tenure of land, fisheries, and forests. Provides
        the conceptual basis for tenure classification.", "uri": "https://www.fao.org/tenure/voluntary-guidelines/en/"}'
      bibliography_refs: '["fao-vggt", "lsms-isa"]'
