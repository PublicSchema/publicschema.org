  RegistrationOfficeType:
    enum_uri: publicschema:RegistrationOfficeType
    title: Registration Office Type
    description: The functional category of a civil or administrative registration office, distinguishing
      general civil registration offices from specialized sub-offices, mobile registration units, and
      refugee or IDP registration centers. Based on office-type patterns from OpenCRVS and UNHCR operational
      frameworks.
    status: bibo:draft
    permissible_values:
      civil_registration_office:
        meaning: publicschema:RegistrationOfficeType/civil_registration_office
        title: Civil registration office
        description: A government office with legal authority to register vital events (births, deaths,
          marriages, divorces) and issue civil registration certificates. The primary CRVS_OFFICE type
          in national civil registration systems.
        annotations:
          label_es: Oficina de registro civil
          label_fr: Bureau d'état civil
          description_es: Una oficina gubernamental con autoridad legal para registrar hechos vitales
            (nacimientos, defunciones, matrimonios, divorcios) y emitir certificados de registro civil.
            El tipo principal de CRVS_OFFICE en los sistemas nacionales de registro civil.
          description_fr: Un bureau gouvernemental ayant l'autorité légale pour enregistrer les faits
            d'état civil (naissances, décès, mariages, divorces) et délivrer des actes d'état civil. Le
            type CRVS_OFFICE principal dans les systèmes nationaux d'enregistrement des faits d'état civil.
      district_registration_office:
        meaning: publicschema:RegistrationOfficeType/district_registration_office
        title: District registration office
        description: A sub-national or district-level branch of the civil registration authority, operating
          under the authority of a national or provincial civil registrar and covering a defined administrative
          area.
        annotations:
          label_es: Oficina de registro de distrito
          label_fr: Bureau d'enregistrement de district
          description_es: Una sucursal sub-nacional o de nivel de distrito de la autoridad de registro
            civil, que opera bajo la autoridad de un registrador civil nacional o provincial y cubre un
            área administrativa definida.
          description_fr: Une branche sous-nationale ou de district de l'autorité d'enregistrement civil,
            opérant sous l'autorité d'un registraire civil national ou provincial et couvrant une zone
            administrative définie.
      mobile_registration_unit:
        meaning: publicschema:RegistrationOfficeType/mobile_registration_unit
        title: Mobile registration unit
        description: A non-fixed registration team or vehicle that travels to remote or underserved communities
          to deliver civil registration or identity enrollment services. Used in outreach campaigns and
          disaster-response contexts.
        annotations:
          label_es: Unidad de registro móvil
          label_fr: Unité d'enregistrement mobile
          description_es: Un equipo o vehículo de registro no fijo que viaja a comunidades remotas o con
            servicio insuficiente para prestar servicios de registro civil o enrolamiento de identidad.
            Se usa en campañas de alcance comunitario y contextos de respuesta a desastres.
          description_fr: Une équipe ou un véhicule d'enregistrement non fixe qui se déplace dans des
            communautés éloignées ou mal desservies pour fournir des services d'enregistrement civil ou
            d'enrôlement d'identité. Utilisé dans les campagnes de sensibilisation et les contextes de
            réponse aux catastrophes.
      refugee_registration_center:
        meaning: publicschema:RegistrationOfficeType/refugee_registration_center
        title: Refugee registration center
        description: An office where UNHCR or a national authority conducts refugee status determination
          and registration, issuing asylum-seeker or refugee identity documents. Typically operated in
          collaboration with national refugee agencies.
        annotations:
          label_es: Centro de registro de refugiados
          label_fr: Centre d'enregistrement des réfugiés
          description_es: Una oficina donde el ACNUR o una autoridad nacional realiza la determinación
            del estatuto de refugiado y el registro, emitiendo documentos de identidad para solicitantes
            de asilo o refugiados. Generalmente operada en colaboración con agencias nacionales de refugiados.
          description_fr: Un bureau où le HCR ou une autorité nationale conduit la détermination du statut
            de réfugié et l'enregistrement, délivrant des documents d'identité pour demandeurs d'asile
            ou réfugiés. Généralement opéré en collaboration avec les agences nationales pour les réfugiés.
      identity_enrollment_center:
        meaning: publicschema:RegistrationOfficeType/identity_enrollment_center
        title: Identity enrollment center
        description: A service point dedicated to biometric or documentary identity enrollment for a national
          ID, social protection, or voter registration program, distinct from civil registration of vital
          events.
        annotations:
          label_es: Centro de enrolamiento de identidad
          label_fr: Centre d'enrôlement d'identité
          description_es: Un punto de servicio dedicado al enrolamiento de identidad biométrico o documental
            para un programa de identificación nacional, protección social o registro electoral, distinto
            del registro civil de hechos vitales.
          description_fr: Un point de service dédié à l'enrôlement d'identité biométrique ou documentaire
            pour un programme de carte d'identité nationale, de protection sociale ou d'inscription sur
            les listes électorales, distinct de l'enregistrement civil des faits d'état civil.
      other:
        meaning: publicschema:RegistrationOfficeType/other
        title: Other
        description: A registration office type not covered by the other categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Un tipo de oficina de registro no cubierto por las otras categorías.
          description_fr: Un type de bureau d'enregistrement non couvert par les autres catégories.
    annotations:
      label_es: Tipo de oficina de registro
      label_fr: Type de bureau d'enregistrement
      description_es: La categoría funcional de una oficina de registro civil o administrativo, que distingue
        las oficinas de registro civil general de las sub-oficinas especializadas, las unidades de registro
        móvil y los centros de registro de refugiados o desplazados internos. Basado en los patrones de
        tipos de oficina de OpenCRVS y los marcos operacionales del ACNUR.
      description_fr: La catégorie fonctionnelle d'un bureau d'enregistrement civil ou administratif,
        distinguant les bureaux d'état civil généraux des sous-bureaux spécialisés, des unités d'enregistrement
        mobile et des centres d'enregistrement des réfugiés ou personnes déplacées. Basé sur les modèles
        de types de bureaux d'OpenCRVS et des cadres opérationnels du HCR.
      vocab_references_json: '[{"machine_readable": false, "name": "OpenCRVS Office and Location Management",
        "notes": "OpenCRVS models civil registration offices with a CRVS_OFFICE type distinct from administrative
        locations (ADMIN_STRUCTURE). This vocabulary follows the same conceptual split while adding humanitarian
        registration office types from UNHCR practice.", "relationship": "prose_guidance", "uri": "https://documentation.opencrvs.org"}]'
