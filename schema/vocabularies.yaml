  MaritalStatus:
    enum_uri: publicschema:MaritalStatus
    title: Marital Status
    description: Categories describing a person's marital or civil status as recorded in a registry or
      administrative system.
    status: bibo:status/published
    permissible_values:
      never_married:
        meaning: publicschema:MaritalStatus/never_married
        title: Never Married
        description: Person who has never been married.
        annotations:
          label_es: Nunca casado/a
          label_fr: Jamais marié(e)
          description_es: Persona que nunca ha estado casada.
          description_fr: Personne qui n'a jamais été mariée.
      married:
        meaning: publicschema:MaritalStatus/married
        title: Married
        description: Currently married.
        annotations:
          label_es: Casado/a
          label_fr: Marié(e)
          description_es: Actualmente casado/a.
          description_fr: Actuellement marié(e).
      widowed:
        meaning: publicschema:MaritalStatus/widowed
        title: Widowed
        description: Person whose spouse has died and who has not remarried.
        annotations:
          label_es: Viudo/a
          label_fr: Veuf/Veuve
          description_es: Persona cuyo cónyuge ha fallecido y que no se ha vuelto a casar.
          description_fr: Personne dont le conjoint est décédé et qui ne s'est pas remariée.
      divorced:
        meaning: publicschema:MaritalStatus/divorced
        title: Divorced
        description: Person whose marriage has been legally dissolved and who has not remarried.
        annotations:
          label_es: Divorciado/a
          label_fr: Divorcé(e)
          description_es: Persona cuyo matrimonio ha sido legalmente disuelto y que no se ha vuelto a
            casar.
          description_fr: Personne dont le mariage a été légalement dissous et qui ne s'est pas remariée.
      legally_separated:
        meaning: publicschema:MaritalStatus/legally_separated
        title: Legally Separated
        description: Person who is legally separated from their spouse. Corresponds to the UN P&R Rev.3
          category 'Married, but separated'.
        annotations:
          label_es: Separado/a legalmente
          label_fr: Séparé(e) légalement
          description_es: Persona legalmente separada de su cónyuge. Corresponde a la categoría 'Casado/a,
            pero separado/a' del P&R Rev.3 de las Naciones Unidas.
          description_fr: Personne légalement séparée de son conjoint. Correspond à la catégorie 'Marié(e),
            mais séparé(e)' du P&R Rév.3 des Nations Unies.
      consensual_union:
        meaning: publicschema:MaritalStatus/consensual_union
        title: Consensual Union
        description: Person living in a consensual union (cohabitation without formal marriage). Extension
          beyond the UN P&R Rev.3 minimum category set; included because most national registries and
          operational MIS systems represent consensual union as a distinct status.
        annotations:
          label_es: Unión consensual
          label_fr: Union consensuelle
          description_es: Persona que vive en unión consensual (cohabitación sin matrimonio formal). Extensión
            más allá del conjunto mínimo de categorías del P&R Rev.3 de las Naciones Unidas; incluida
            porque la mayoría de los registros nacionales y sistemas MIS operativos representan la unión
            consensual como un estado distinto.
          description_fr: Personne vivant en union consensuelle (cohabitation sans mariage formel). Extension
            au-delà de l'ensemble minimum des catégories du P&R Rév.3 des Nations Unies ; incluse car
            la plupart des registres nationaux et des systèmes MIS opérationnels représentent l'union
            consensuelle comme un statut distinct.
    annotations:
      label_es: Estado civil
      label_fr: Situation matrimoniale
      description_es: Categorías que describen el estado civil o matrimonial de una persona tal como se
        registra en un registro o sistema administrativo.
      description_fr: Catégories décrivant le statut matrimonial ou civil d'une personne tel qu'enregistré
        dans un registre ou un système administratif.
      standard_json: '{"name": "UN Principles and Recommendations for Population and Housing Censuses,
        Revision 3", "notes": "UN P&R Rev.3 (ST/ESA/STAT/SER.M/67/Rev.3, 2017) prescribes five minimum
        marital-status categories in paragraph 4.164: Single (never married), Married, Married but separated,
        Widowed and not remarried, Divorced and not remarried. UN P&R does not assign letter codes to
        these categories. The single-letter codes (S, M, W, D, L) that appear in the system_mappings below
        are provenance of HL7 v3 / FHIR R4 and OpenSPP, not of UN P&R. PublicSchema adds consensual_union
        as an extension beyond the UN P&R minimum because most national registries and operational MIS
        systems represent it as a distinct status; UN P&R itself discusses consensual union separately
        in paragraph 4.171 as a related but distinct variable.", "uri": "https://unstats.un.org/unsd/demographic-social/Standards-and-Methods/files/Principles_and_Recommendations/Population-and-Housing-Censuses/Series_M67rev3-E.pdf"}'
      bibliography_refs: '["fhir-v3-marital-status", "un-census-rev3", "un-census-rev4", "un-world-marriage-2019"]'
  MaternityCareProvider:
    enum_uri: publicschema:MaternityCareProvider
    title: Maternity Care Provider
    description: The category of health provider who delivered antenatal care (ANC), attended the delivery,
      or gave postnatal care (PNC). Used across ANC provider, delivery attendant, and PNC provider properties
      in MaternalNewbornHealthProfile. Reflects the DHS-8 m2, m3, and rh_pnc_wm_pv hierarchy. The 'skilled'
      subset (doctor, nurse_midwife, auxiliary_midwife) aligns with the WHO skilled birth attendance definition.
    status: bibo:draft
    permissible_values:
      doctor:
        meaning: publicschema:MaternityCareProvider/doctor
        title: Doctor / Physician
        description: A licensed medical doctor (general practitioner or specialist). DHS m2a / m3a = 1.
          Classified as skilled.
        annotations:
          label_es: Médico
          label_fr: Médecin
          description_es: Un médico titulado (médico general o especialista). DHS m2a / m3a = 1. Clasificado
            como calificado.
          description_fr: Un médecin diplômé (généraliste ou spécialiste). DHS m2a / m3a = 1. Classé comme
            qualifié.
      nurse_midwife:
        meaning: publicschema:MaternityCareProvider/nurse_midwife
        title: Nurse / Midwife
        description: A professionally trained nurse or midwife. DHS m2b / m3b = 1. Classified as skilled.
          In the DHS m2 series, m2b captures nurse/midwife as a combined category.
        annotations:
          label_es: Enfermera / Partera
          label_fr: Infirmière / Sage-femme
          description_es: Una enfermera o partera capacitada profesionalmente. DHS m2b / m3b = 1. Clasificada
            como calificada. En la serie DHS m2, m2b captura enfermera/partera como categoría combinada.
          description_fr: Une infirmière ou sage-femme formée professionnellement. DHS m2b / m3b = 1.
            Classée comme qualifiée. Dans la série DHS m2, m2b couvre les infirmières et sages-femmes
            comme catégorie combinée.
      auxiliary_midwife:
        meaning: publicschema:MaternityCareProvider/auxiliary_midwife
        title: Auxiliary Midwife / Auxiliary Nurse-Midwife
        description: A community-level auxiliary nurse-midwife or skilled birth attendant trained to conduct
          normal deliveries. Classified as skilled in many national skilled birth attendance definitions.
          DHS m2c / m3c = 1 in some country questionnaires.
        annotations:
          label_es: Partera auxiliar / Enfermera-partera auxiliar
          label_fr: Sage-femme auxiliaire / Infirmière-sage-femme auxiliaire
          description_es: Una enfermera-partera auxiliar a nivel comunitario o partera calificada capacitada
            para atender partos normales. Clasificada como calificada en muchas definiciones nacionales
            de asistencia calificada al parto.
          description_fr: Une infirmière-sage-femme auxiliaire ou une accoucheuse qualifiée communautaire
            formée pour mener des accouchements normaux. Classée comme qualifiée dans de nombreuses définitions
            nationales de l'assistance qualifiée à l'accouchement.
      community_health_worker:
        meaning: publicschema:MaternityCareProvider/community_health_worker
        title: Community Health Worker
        description: A trained community health worker, health extension worker, or village health volunteer
          who is not a formally qualified midwife. Not classified as skilled for SDG 3.1.2 purposes.
        annotations:
          label_es: Agente de salud comunitaria
          label_fr: Agent de santé communautaire
          description_es: Un agente de salud comunitaria, trabajador de extensión de salud o voluntario
            de salud de aldea que no es una partera formalmente calificada. No clasificado como calificado
            para los propósitos del ODS 3.1.2.
          description_fr: Un agent de santé communautaire, un agent de vulgarisation sanitaire ou un bénévole
            de santé villageois qui n'est pas une sage-femme officiellement qualifiée. Non classé comme
            qualifié aux fins de l'ODD 3.1.2.
      traditional_birth_attendant:
        meaning: publicschema:MaternityCareProvider/traditional_birth_attendant
        title: Traditional Birth Attendant
        description: A community member who assists with births based on traditional practice rather than
          formal medical training. DHS m3g = 1. Not classified as skilled.
        annotations:
          label_es: Partera tradicional
          label_fr: Accoucheuse traditionnelle
          description_es: Un miembro de la comunidad que asiste en partos basándose en prácticas tradicionales
            en lugar de formación médica formal. DHS m3g = 1. No clasificado como calificado.
          description_fr: Un membre de la communauté qui assiste aux accouchements sur la base de pratiques
            traditionnelles plutôt que d'une formation médicale formelle. DHS m3g = 1. Non classé comme
            qualifié.
      relative:
        meaning: publicschema:MaternityCareProvider/relative
        title: Relative or Friend
        description: A family member, friend, or neighbor who assisted without health training. DHS m3h
          = 1. Not classified as skilled.
        annotations:
          label_es: Familiar o amigo
          label_fr: Parent ou ami
          description_es: Un familiar, amigo o vecino que asistió sin capacitación en salud. DHS m3h =
            1. No clasificado como calificado.
          description_fr: Un membre de la famille, un ami ou un voisin qui a assisté sans formation médicale.
            DHS m3h = 1. Non classé comme qualifié.
      other:
        meaning: publicschema:MaternityCareProvider/other
        title: Other
        description: Another category of provider or attendant not covered by the codes above.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Otra categoría de proveedor o asistente no cubierta por los códigos anteriores.
          description_fr: Une autre catégorie de prestataire ou d'assistant non couverte par les codes
            ci-dessus.
      none:
        meaning: publicschema:MaternityCareProvider/none
        title: None / No attendant
        description: No provider or attendant was present. DHS m3n = 1. Unattended birth.
        annotations:
          label_es: Ninguno / Sin asistente
          label_fr: Aucun / Sans assistance
          description_es: No hubo proveedor o asistente presente. DHS m3n = 1. Parto sin asistencia.
          description_fr: Aucun prestataire ou assistant n'était présent. DHS m3n = 1. Accouchement sans
            assistance.
    annotations:
      label_es: Proveedor de atención de maternidad
      label_fr: Prestataire de soins de maternité
      description_es: La categoría del proveedor de salud que brindó atención prenatal (APN), asistió
        al parto o brindó atención posnatal (APN). Se utiliza en las propiedades de proveedor APN, asistente
        al parto y proveedor PPN en MaternalNewbornHealthProfile. Refleja la jerarquía DHS-8 m2, m3 y
        rh_pnc_wm_pv. El subconjunto 'calificado' (médico, enfermera-partera, partera auxiliar) se alinea
        con la definición de asistencia calificada al parto de la OMS.
      description_fr: La catégorie de prestataire de santé ayant assuré les soins prénataux (SPN), assisté
        à l'accouchement ou fourni des soins postnataux (SPN). Utilisée pour les propriétés de prestataire
        ANC, d'assistant à l'accouchement et de prestataire PNC dans le MaternalNewbornHealthProfile.
        Reflète la hiérarchie DHS-8 m2, m3 et rh_pnc_wm_pv. Le sous-ensemble « qualifié » (médecin, infirmière-sage-femme,
        sage-femme auxiliaire) s'aligne sur la définition OMS de l'assistance qualifiée à l'accouchement.
      standard_json: '{"name": "DHS-8 Woman''s Questionnaire, Chapter 9 (m2, m3, rh_pnc_wm_pv series)",
        "notes": "Codes aligned with DHS m2a–m2n (ANC provider) and m3a–m3n (delivery attendant) series.
        The PS CRVS birth-attendant vocabulary covers physician, midwife, nurse, traditional_birth_attendant,
        other, and none; this vocabulary extends that set with auxiliary_midwife, community_health_worker,
        and relative for field-survey use.", "uri": "https://dhsprogram.com/publications/publication-dhsq8-dhs-questionnaires-and-manuals.cfm"}'
      bibliography_refs: '["dhs-woman-questionnaire"]'
  MobilityAidType:
    enum_uri: publicschema:MobilityAidType
    title: Mobility Aid Type
    description: 'The type of mobility aid or assistance a person uses for getting around, drawn from
      the Washington Group Extended Set on Functioning (WG-ES) MOB_3 checklist. Multi-select: all applicable
      types should be recorded.'
    status: bibo:draft
    permissible_values:
      cane_or_walking_stick:
        meaning: publicschema:MobilityAidType/cane_or_walking_stick
        title: Cane or walking stick
        description: The person uses a cane or walking stick.
        annotations:
          label_es: Bastón o palo de caminar
          label_fr: Canne ou bâton de marche
          description_es: La persona usa un bastón o palo de caminar.
          description_fr: La personne utilise une canne ou un bâton de marche.
      walker_or_zimmer_frame:
        meaning: publicschema:MobilityAidType/walker_or_zimmer_frame
        title: Walker or Zimmer frame
        description: The person uses a walker or Zimmer frame.
        annotations:
          label_es: Andador o marco de deambulación
          label_fr: Déambulateur ou cadre de marche
          description_es: La persona usa un andador o marco de deambulación.
          description_fr: La personne utilise un déambulateur ou un cadre de marche.
      crutches:
        meaning: publicschema:MobilityAidType/crutches
        title: Crutches
        description: The person uses crutches.
        annotations:
          label_es: Muletas
          label_fr: Béquilles
          description_es: La persona usa muletas.
          description_fr: La personne utilise des béquilles.
      wheelchair_or_scooter:
        meaning: publicschema:MobilityAidType/wheelchair_or_scooter
        title: Wheelchair or scooter
        description: The person uses a wheelchair or mobility scooter.
        annotations:
          label_es: Silla de ruedas o scooter
          label_fr: Fauteuil roulant ou scooter
          description_es: La persona usa una silla de ruedas o scooter de movilidad.
          description_fr: La personne utilise un fauteuil roulant ou un scooter de mobilité.
      artificial_limb:
        meaning: publicschema:MobilityAidType/artificial_limb
        title: Artificial limb
        description: The person uses an artificial limb (leg or foot).
        annotations:
          label_es: Miembro artificial
          label_fr: Membre artificiel
          description_es: La persona usa un miembro artificial (pierna o pie).
          description_fr: La personne utilise un membre artificiel (jambe ou pied).
      personal_assistance:
        meaning: publicschema:MobilityAidType/personal_assistance
        title: Personal assistance
        description: The person receives assistance from another person for mobility.
        annotations:
          label_es: Asistencia personal
          label_fr: Assistance personnelle
          description_es: La persona recibe asistencia de otra persona para la movilidad.
          description_fr: La personne reçoit l'aide d'une autre personne pour se déplacer.
      other:
        meaning: publicschema:MobilityAidType/other
        title: Other
        description: The person uses another type of mobility aid not listed.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: La persona usa otro tipo de ayuda para la movilidad no enumerado.
          description_fr: La personne utilise un autre type d'aide à la mobilité non répertorié.
    annotations:
      label_es: Tipo de ayuda para la movilidad
      label_fr: Type d'aide à la mobilité
      description_es: 'El tipo de ayuda para la movilidad o asistencia que una persona usa para desplazarse,
        tomado de la lista de verificación MOB_3 del Conjunto Extendido del Grupo de Washington sobre
        Funcionamiento (WG-ES). Selección múltiple: se deben registrar todos los tipos aplicables.'
      description_fr: 'Le type d''aide à la mobilité ou d''assistance qu''une personne utilise pour se
        déplacer, tiré de la liste de contrôle MOB_3 de l''Ensemble étendu du Groupe de Washington sur
        le fonctionnement (WG-ES). Multi-sélection : tous les types applicables doivent être enregistrés.'
      standard_json: '{"name": "Washington Group Extended Set on Functioning (WG-ES)", "notes": "Used
        on WG-ES item MOB_3. Asked only of respondents who reported using equipment or receiving help
        for getting around (MOB_2 = Yes).", "uri": "https://www.washingtongroup-disability.com/question-sets/wg-extended-set-on-functioning-wg-es/"}'
      bibliography_refs: '["washington-group-es"]'
  OccupancyArrangement:
    enum_uri: publicschema:OccupancyArrangement
    title: Occupancy Arrangement
    description: The legal or social arrangement under which the household currently occupies its shelter.
      Captures ownership, rental, hosting, and informal occupation arrangements. Informs housing, land
      and property (HLP) protection analysis and Sphere Standard 6 security-of-tenure assessment.
    status: bibo:status/forthcoming
    permissible_values:
      owned:
        meaning: publicschema:OccupancyArrangement/owned
        title: Owned
        description: The household owns the shelter it currently occupies.
        annotations:
          label_es: Propiedad del hogar
          label_fr: Propriété du ménage
          description_es: El hogar es propietario del refugio que ocupa actualmente.
          description_fr: Le ménage est propriétaire de l'abri qu'il occupe actuellement.
      rented:
        meaning: publicschema:OccupancyArrangement/rented
        title: Rented
        description: The household rents the shelter from a landlord in exchange for regular payment.
        annotations:
          label_es: Alquilado
          label_fr: Loué
          description_es: El hogar alquila el refugio a un arrendador a cambio de un pago regular.
          description_fr: Le ménage loue l'abri d'un propriétaire en échange d'un paiement régulier.
      hosted_by_family:
        meaning: publicschema:OccupancyArrangement/hosted_by_family
        title: Hosted by family or relatives
        description: The household is hosted without payment by family members or relatives who own or
          rent the shelter.
        annotations:
          label_es: Alojado por familia o parientes
          label_fr: Hébergé par la famille ou des proches
          description_es: El hogar está alojado sin pago por miembros de la familia o parientes que son
            propietarios o arrendatarios del refugio.
          description_fr: Le ménage est hébergé sans paiement par des membres de la famille ou des proches
            qui sont propriétaires ou locataires de l'abri.
      hosted_by_non_family:
        meaning: publicschema:OccupancyArrangement/hosted_by_non_family
        title: Hosted by non-family
        description: The household is hosted without payment by community members or others who are not
          family or relatives.
        annotations:
          label_es: Alojado por no familiares
          label_fr: Hébergé par des non-membres de la famille
          description_es: El hogar está alojado sin pago por miembros de la comunidad u otras personas
            que no son familiares o parientes.
          description_fr: Le ménage est hébergé sans paiement par des membres de la communauté ou d'autres
            personnes qui ne sont pas des membres de la famille ou des proches.
      collective_centre:
        meaning: publicschema:OccupancyArrangement/collective_centre
        title: Collective centre
        description: The household resides in a managed collective centre such as a school, public hall,
          or community building used as temporary accommodation.
        annotations:
          label_es: Centro colectivo
          label_fr: Centre collectif
          description_es: El hogar reside en un centro colectivo gestionado como una escuela, salón público
            o edificio comunitario usado como alojamiento temporal.
          description_fr: Le ménage réside dans un centre collectif géré tel qu'une école, une salle publique
            ou un bâtiment communautaire utilisé comme hébergement temporaire.
      emergency_shelter_programme:
        meaning: publicschema:OccupancyArrangement/emergency_shelter_programme
        title: Emergency shelter programme allocation
        description: The household occupies shelter allocated to it through a humanitarian emergency shelter
          programme (tent, transitional shelter unit, etc.).
        annotations:
          label_es: Asignación de programa de refugio de emergencia
          label_fr: Attribution par programme d'abri d'urgence
          description_es: El hogar ocupa un refugio asignado a través de un programa humanitario de refugio
            de emergencia (tienda, unidad de refugio transicional, etc.).
          description_fr: Le ménage occupe un abri qui lui a été attribué par un programme humanitaire
            d'abri d'urgence (tente, unité d'abri transitionnel, etc.).
      squatting_informal:
        meaning: publicschema:OccupancyArrangement/squatting_informal
        title: Squatting or informal occupation
        description: The household occupies the shelter without the permission or knowledge of the owner
          or authority, with no legal basis for occupation.
        annotations:
          label_es: Ocupación informal o invasión
          label_fr: Occupation informelle ou squat
          description_es: El hogar ocupa el refugio sin el permiso o conocimiento del propietario o autoridad,
            sin base legal para la ocupación.
          description_fr: Le ménage occupe l'abri sans la permission ou la connaissance du propriétaire
            ou de l'autorité, sans base légale d'occupation.
      other:
        meaning: publicschema:OccupancyArrangement/other
        title: Other
        description: Occupancy arrangement not covered by the above categories.
        annotations:
          label_es: Otro
          label_fr: Autre
          description_es: Arreglo de ocupación no cubierto por las categorías anteriores.
          description_fr: Arrangement d'occupation non couvert par les catégories ci-dessus.
    annotations:
      label_es: Arreglo de ocupación
      label_fr: Arrangement d'occupation
      description_es: El arreglo legal o social bajo el cual el hogar ocupa actualmente su refugio. Abarca
        la propiedad, el arrendamiento, el alojamiento y los arreglos de ocupación informal. Informa el
        análisis de protección de vivienda, tierra y propiedad (VTP) y la evaluación de seguridad de tenencia
        de la Norma Esfera 6.
      description_fr: L'arrangement légal ou social sous lequel le ménage occupe actuellement son abri.
        Couvre la propriété, la location, l'hébergement et les arrangements d'occupation informelle. Informe
        l'analyse de protection du logement, des terres et de la propriété (LTP) et l'évaluation de la
        sécurité d'occupation de la Norme Sphère 6.
      standard_json: '{"name": "Sphere Handbook 2018, Standard 6 Security of Tenure; UNHCR HLP guidance",
        "uri": "https://spherestandards.org/handbook-2018/"}'
      bibliography_refs: '["sphere-2018"]'
