classes:
  FunctioningProfile:
    class_uri: publicschema:FunctioningProfile
    title: Functioning Profile
    description: 'A point-in-time record of functioning data collected about a person using a defined
      instrument from the Washington Group family: WG-SS (Short Set), WG-ES (Extended Set), CFM 2-4, or
      CFM 5-17. Captures the structured item responses (seeing, hearing, walking, cognition, self-care,
      communication, affect, pain, fatigue, behaviour, and related extended items) alongside the administration
      context (administration mode, respondent, instrument version). For WG-SS administrations, the profile
      carries the canonical disability identifier (recommended cutoff: at least one domain reports "a
      lot of difficulty" or "cannot do at all") and the domains that triggered it. This is a survey-based
      statistical identifier for population reporting, not a clinical disability determination. Alternate
      cutoffs are recorded via ScoringEvent. No equivalent derived identifier is yet defined for CFM or
      WG-ES administrations.

      '
    is_a: Profile
    slots:
    - difficulty_seeing
    - difficulty_hearing
    - difficulty_walking
    - difficulty_walking_100m
    - difficulty_walking_500m
    - difficulty_climbing_steps
    - difficulty_cognition
    - difficulty_self_care
    - difficulty_communication
    - uses_glasses
    - uses_hearing_aid
    - uses_mobility_aid
    - difficulty_learning
    - difficulty_dexterity
    - difficulty_playing
    - difficulty_remembering
    - difficulty_concentrating
    - difficulty_accepting_change
    - difficulty_making_friends
    - difficulty_controlling_behaviour
    - difficulty_disruptive_behaviour
    - difficulty_understanding_others
    - difficulty_being_understood
    - difficulty_being_understood_inside_household
    - difficulty_being_understood_outside_household
    - anxiety_frequency
    - anxiety_intensity
    - anxiety_medication
    - depression_frequency
    - depression_intensity
    - depression_medication
    - difficulty_upper_body_reach
    - difficulty_upper_body_fine_motor
    - uses_sign_language
    - mobility_aid_types
    - cognition_remembering_frequency
    - difficulty_seeing_face_across_room
    - difficulty_seeing_coin
    - hearing_aid_use_frequency
    - difficulty_hearing_quiet_room
    - difficulty_hearing_noisy_room
    - cognition_subdomain
    - remembering_frequency
    - remembering_extent
    - pain_frequency
    - pain_intensity
    - fatigue_frequency
    - fatigue_duration
    - fatigue_intensity
    - disability_identified
    - disability_domains_identified
    status: bibo:status/forthcoming
    close_mappings:
    - fhir:QuestionnaireResponse
    annotations:
      label_es: Perfil de funcionamiento
      label_fr: Profil de fonctionnement
      description_es: 'Un registro puntual de datos de funcionamiento recopilados sobre una persona mediante
        un instrumento definido de la familia Washington Group: WG-SS (conjunto corto), WG-ES (conjunto
        extendido), CFM 2-4 o CFM 5-17. Consigna las respuestas estructuradas a los ítems (visión, audición,
        caminar, cognición, cuidado personal, comunicación, afecto, dolor, fatiga, conducta e ítems extendidos
        relacionados) junto con el contexto de administración (modo de administración, respondiente, versión
        del instrumento). Para administraciones WG-SS, el perfil lleva el identificador canónico de discapacidad
        (corte recomendado: al menos un dominio reporta "mucha dificultad" o "no puede hacerlo") y los
        dominios que lo activaron. Es un identificador estadístico de encuesta para reporte poblacional,
        no una determinación clínica de discapacidad. Los cortes alternativos se registran mediante ScoringEvent.
        Aún no se define un identificador derivado equivalente para administraciones CFM o WG-ES.'
      description_fr: 'Un enregistrement ponctuel de données de fonctionnement collectées sur une personne
        à l''aide d''un instrument défini de la famille Washington Group : WG-SS (ensemble court), WG-ES
        (ensemble étendu), CFM 2-4 ou CFM 5-17. Consigne les réponses structurées aux items (vision, audition,
        marche, cognition, soins personnels, communication, affect, douleur, fatigue, comportement et
        items étendus associés) ainsi que le contexte d''administration (mode d''administration, répondant,
        version de l''instrument). Pour les administrations WG-SS, le profil porte l''identifiant canonique
        de handicap (seuil recommandé : au moins un domaine rapporte « beaucoup de difficulté » ou « ne
        peut pas du tout ») et les domaines qui l''ont déclenché. Il s''agit d''un identifiant statistique
        d''enquête pour le reporting de population, pas d''une détermination clinique du handicap. Les
        seuils alternatifs sont enregistrés via ScoringEvent. Aucun identifiant dérivé équivalent n''est
        encore défini pour les administrations CFM ou WG-ES.'
      external_alignments_json: '[{"label": "QuestionnaireResponse (WG panel)", "match": "close", "note":
        "WG and CFM administrations serialize naturally as a QuestionnaireResponse whose Questionnaire
        is the corresponding WG or CFM instrument definition", "uri": "http://hl7.org/fhir/QuestionnaireResponse",
        "vocabulary": "FHIR R4", "vocabulary_id": "fhir"}]'
      convergence_json: '{"notes": "Only FHIR directly represents a WG or CFM administration (as a QuestionnaireResponse).
        The other five v1 systems (DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI) carry a derived disability
        category on the Person record, not the item-level answers. The Washington Group analytic guidelines
        require the raw items to derive cutoff-based identifiers, and national surveys that feed disability
        statistics (DHS, MICS, census long forms) keep the items as separate survey records. This concept
        gives programs a standards-faithful home for those answers; Person retains a coarse functioning_status
        flag for operational queries.\n", "system_count": 1, "total_systems": 6}'
      property_groups_json: '[{"category": "administrative", "properties": ["identifiers", "subject",
        "observation_date", "performed_by", "instrument_used", "software_used", "administration_mode",
        "respondent", "respondent_relationship", "items_asked"]}, {"category": "functioning", "properties":
        ["difficulty_seeing", "difficulty_hearing", "difficulty_walking", "difficulty_walking_100m", "difficulty_walking_500m",
        "difficulty_climbing_steps", "difficulty_cognition", "difficulty_self_care", "difficulty_communication",
        "difficulty_dexterity", "uses_glasses", "uses_hearing_aid", "uses_mobility_aid", "anxiety_frequency",
        "anxiety_intensity", "anxiety_medication", "depression_frequency", "depression_intensity", "depression_medication",
        "difficulty_upper_body_reach", "difficulty_upper_body_fine_motor", "uses_sign_language", "mobility_aid_types",
        "cognition_remembering_frequency", "difficulty_seeing_face_across_room", "difficulty_seeing_coin",
        "hearing_aid_use_frequency", "difficulty_hearing_quiet_room", "difficulty_hearing_noisy_room",
        "cognition_subdomain", "remembering_frequency", "remembering_extent", "pain_frequency", "pain_intensity",
        "fatigue_frequency", "fatigue_duration", "fatigue_intensity", "disability_identified", "disability_domains_identified"]},
        {"category": "child_functioning", "properties": ["difficulty_learning", "difficulty_playing",
        "difficulty_remembering", "difficulty_concentrating", "difficulty_accepting_change", "difficulty_making_friends",
        "difficulty_controlling_behaviour", "difficulty_disruptive_behaviour", "difficulty_understanding_others",
        "difficulty_being_understood", "difficulty_being_understood_inside_household", "difficulty_being_understood_outside_household"]}]'
      bibliography_refs: '["barca-2021-inclusive-information-systems", "dhs-recode7", "fhir-r4", "mics6",
        "washington-group-es", "washington-group-ss"]'
  Profile:
    class_uri: publicschema:Profile
    title: Profile
    description: 'A point-in-time record of data collected about a subject using a defined instrument.
      Profile is the shared supertype for SocioEconomicProfile and FunctioningProfile within PublicSchema,
      and for additional profile subtypes published in a sibling schema (see ADR-011). Each profile captures
      who was observed, when, using which instrument, under which administration mode, and by whom. A
      profile records the structured responses from a single administration, and may also carry outputs
      derived from those responses by applying the canonical scoring rule for the instrument. Non-canonical
      scoring, alternate thresholds, a different rule version, or recomputation after the canonical rule
      is revised, is captured as a ScoringEvent rather than written back to the profile.

      '
    is_a: Event
    slots:
    - subject
    - observation_date
    - performed_by
    - instrument_used
    - software_used
    - administration_mode
    - respondent
    - respondent_relationship
    - items_asked
    status: bibo:status/forthcoming
    close_mappings:
    - fhir:QuestionnaireResponse
    annotations:
      label_es: Perfil
      label_fr: Profil
      description_es: Un registro puntual de datos recopilados sobre un sujeto mediante un instrumento
        definido. Profile es el supertipo compartido de SocioEconomicProfile y FunctioningProfile en PublicSchema,
        y de subtipos adicionales publicados en un esquema hermano (véase ADR-011). Cada perfil consigna
        quién fue observado, cuándo, con qué instrumento, bajo qué modo de administración y por quién.
        Un perfil registra las respuestas estructuradas de una administración única, y también puede llevar
        resultados derivados de esas respuestas aplicando la regla de puntuación canónica del instrumento.
        La puntuación no canónica, los umbrales alternativos, una versión diferente de la regla o el recálculo
        tras la revisión de la regla canónica se registran como un ScoringEvent en lugar de reescribirse
        en el perfil.
      description_fr: Un enregistrement ponctuel de données collectées sur un sujet à l'aide d'un instrument
        défini. Profile est le supertype partagé de SocioEconomicProfile et FunctioningProfile dans PublicSchema,
        et de sous-types supplémentaires publiés dans un schéma frère (voir ADR-011). Chaque profil consigne
        qui a été observé, quand, avec quel instrument, selon quel mode d'administration et par qui. Un
        profil enregistre les réponses structurées d'une administration unique et peut aussi porter les
        résultats dérivés de ces réponses en appliquant la règle de notation canonique de l'instrument.
        La notation non canonique, les seuils alternatifs, une version différente de la règle ou un recalcul
        après révision de la règle canonique sont consignés dans un ScoringEvent plutôt que réécrits sur
        le profil.
      external_alignments_json: '[{"label": "QuestionnaireResponse", "match": "close", "note": "FHIR QuestionnaireResponse
        is the canonical peer for a single administration of a data-collection instrument. Our Profile
        is abstract and splits by instrument family; FunctioningProfile and SocioEconomicProfile align
        most closely because they serialize as a single QuestionnaireResponse.", "uri": "http://hl7.org/fhir/QuestionnaireResponse",
        "vocabulary": "FHIR R4", "vocabulary_id": "fhir"}]'
      convergence_json: '{"notes": "Profile is a PublicSchema abstract supertype; no mapped system exposes
        a profile supertype by that name, so system_count is reported as 0/6 per the convention stated
        in design-principles.md section 3. FHIR models instrument administration as a first-class record
        (QuestionnaireResponse, Observation), which is the closest supertype-level analogue; the other
        five mapped cores (DHIS2, OpenCRVS, OpenSPP, openIMIS, DCI Core) flatten observation data into
        the subject record. The observation pattern is nonetheless how domain tools model this data outside
        MIS cores: DHS and MICS store responses as separate survey records, CommCare CMAM keeps nutrition
        measurements on a visit form, and Washington Group analytics tabulate from raw item responses,
        not Person flags. DCI''s SocioEconomicProfile is the closest peer in social protection and names
        the pattern explicitly. Convergence evidence for the abstract sits with the concrete Profile subtypes
        (FunctioningProfile, SocioEconomicProfile, and domain-specific extensions in sibling schemas).\n",
        "system_count": 0, "total_systems": 6}'
      bibliography_refs: '["fhir-r4", "spdci-social-registry"]'
    abstract: true
slots:
  administration_mode:
    slot_uri: publicschema:administration_mode
    title: Administration mode
    description: 'How the instrument was administered to the subject: self-report, proxy-report (someone
      else answering about the subject), assisted (the subject answering with help), or mixed. Washington
      Group analytical guidance recommends disaggregating prevalence by administration mode because proxy
      responses systematically underreport difficulty.'
    range: AdministrationMode
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Modo de administración
      label_fr: Mode d'administration
      description_es: 'Cómo se administró el instrumento al sujeto: autoinforme, informe por terceros
        (otra persona responde sobre el sujeto), asistido (el sujeto responde con ayuda) o mixto. Las
        directrices analíticas del Washington Group recomiendan desagregar la prevalencia por modo de
        administración, ya que las respuestas por terceros subestiman sistemáticamente la dificultad.'
      description_fr: 'Comment l''instrument a été administré au sujet : auto-déclaration, déclaration
        par procuration (quelqu''un d''autre répondant au sujet du sujet), assisté (le sujet répondant
        avec aide) ou mixte. Les lignes directrices analytiques du Washington Group recommandent de désagréger
        la prévalence par mode d''administration, car les réponses par procuration sous-déclarent systématiquement
        la difficulté.'
  anxiety_frequency:
    slot_uri: publicschema:anxiety_frequency
    title: Anxiety frequency
    description: How often the person feels worried, nervous, or anxious. Applies to adults (WG-ES ANX_1)
      and to children ages 5-17 (CFM CF23, phrased as 'seems very anxious, nervous, or worried').
    range: CfmSymptomFrequency
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Frecuencia de la ansiedad
      label_fr: Fréquence de l'anxiété
      description_es: Con qué frecuencia la persona se siente preocupada, nerviosa o ansiosa. Se aplica
        a adultos (WG-ES ANX_1) y a niños de 5 a 17 años (CFM CF23, formulado como 'parece muy ansioso,
        nervioso o preocupado').
      description_fr: À quelle fréquence la personne se sent inquiète, nerveuse ou anxieuse. S'applique
        aux adultes (WG-ES ANX_1) et aux enfants de 5 à 17 ans (CFM CF23, formulé comme 'semble très anxieux,
        nerveux ou inquiet').
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["cfm_5_17", "wg_es"]'
      age_applicability_json: '["adult", "child_5_17"]'
      bibliography_refs: '["fhir-r4", "mics6", "washington-group-cfm", "washington-group-es"]'
  anxiety_intensity:
    slot_uri: publicschema:anxiety_intensity
    title: Anxiety intensity
    description: The intensity of the person's last feeling of worry, nervousness, or anxiety. Applies
      to adults (WG-ES ANX_3). Asked of respondents who reported feeling anxious at least a few times
      a year.
    range: FunctionalIntensity
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Intensidad de la ansiedad
      label_fr: Intensité de l'anxiété
      description_es: La intensidad del último sentimiento de preocupación, nerviosismo o ansiedad de
        la persona. Se aplica a adultos (WG-ES ANX_3). Se pregunta a los encuestados que reportaron sentirse
        ansiosos al menos algunas veces al año.
      description_fr: L'intensité du dernier sentiment d'inquiétude, de nervosité ou d'anxiété de la personne.
        S'applique aux adultes (WG-ES ANX_3). Posée aux répondants ayant déclaré se sentir anxieux au
        moins quelques fois par an.
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["cfm_5_17", "wg_es"]'
      age_applicability_json: '["adult"]'
      bibliography_refs: '["fhir-r4", "washington-group-es"]'
  anxiety_medication:
    slot_uri: publicschema:anxiety_medication
    title: Anxiety medication
    description: Whether the person takes medication for anxiety or worry. Applies to adults (WG-ES ANX_2).
      This filter is used to interpret anxiety_frequency answers, which are asked about symptoms while
      on medication if the person takes any.
    range: boolean
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Medicación para la ansiedad
      label_fr: Médicament pour l'anxiété
      description_es: Si la persona toma medicación para la ansiedad o la preocupación. Se aplica a adultos
        (WG-ES ANX_2). Este filtro se usa para interpretar las respuestas de anxiety_frequency, que se
        formulan sobre los síntomas bajo medicación si la persona la toma.
      description_fr: Si la personne prend un traitement pour l'anxiété ou l'inquiétude. S'applique aux
        adultes (WG-ES ANX_2). Ce filtre sert à interpréter les réponses à anxiety_frequency, qui sont
        posées à propos des symptômes sous traitement si la personne en prend un.
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["wg_es"]'
      age_applicability_json: '["adult"]'
      bibliography_refs: '["fhir-r4", "washington-group-es"]'
  cognition_remembering_frequency:
    slot_uri: publicschema:cognition_remembering_frequency
    title: Frequency of difficulty remembering
    description: How often the person has difficulty remembering. Applies to adults (WG-ES COG_3). Asked
      only of respondents whose cognition difficulty includes remembering (COG_2 result is not concentrating_only).
    range: CognitionRememberingFrequency
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Frecuencia de dificultad para recordar
      label_fr: Fréquence des difficultés à se souvenir
      description_es: Con qué frecuencia la persona tiene dificultad para recordar. Se aplica a adultos
        (WG-ES COG_3). Se pregunta solo a los encuestados cuya dificultad cognitiva incluye recordar (el
        resultado COG_2 no es solo concentrarse).
      description_fr: À quelle fréquence la personne a des difficultés à se souvenir. S'applique aux adultes
        (WG-ES COG_3). Posée uniquement aux répondants dont la difficulté cognitive inclut la mémoire
        (le résultat COG_2 n'est pas concentration uniquement).
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["wg_es"]'
      age_applicability_json: '["adult"]'
  cognition_subdomain:
    slot_uri: publicschema:cognition_subdomain
    title: Cognition subdomain
    description: Whether the person's cognition difficulty is with remembering, concentrating, or both.
      Applies to adults (WG-ES COG_2). Asked of respondents who reported cognition difficulty.
    range: CognitionSubdomain
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Subdominio cognitivo
      label_fr: Sous-domaine cognitif
      description_es: Si la dificultad cognitiva de la persona es para recordar, concentrarse, o ambos.
        Se aplica a adultos (WG-ES COG_2). Se pregunta a los encuestados que reportaron dificultades cognitivas.
      description_fr: Si la difficulté cognitive de la personne concerne la mémoire, la concentration
        ou les deux. S'applique aux adultes (WG-ES COG_2). Posée aux répondants ayant déclaré des difficultés
        cognitives.
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["wg_es"]'
      age_applicability_json: '["adult"]'
      bibliography_refs: '["fhir-r4", "washington-group-es"]'
  depression_frequency:
    slot_uri: publicschema:depression_frequency
    title: Depression frequency
    description: How often the person feels depressed. Applies to adults (WG-ES DEP_1) and to children
      ages 5-17 (CFM CF24, phrased as 'seems very sad or depressed').
    range: CfmSymptomFrequency
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Frecuencia de la depresión
      label_fr: Fréquence de la dépression
      description_es: Con qué frecuencia la persona se siente deprimida. Se aplica a adultos (WG-ES DEP_1)
        y a niños de 5 a 17 años (CFM CF24, formulado como 'parece muy triste o deprimido').
      description_fr: À quelle fréquence la personne se sent déprimée. S'applique aux adultes (WG-ES DEP_1)
        et aux enfants de 5 à 17 ans (CFM CF24, formulé comme 'semble très triste ou déprimé').
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["cfm_5_17", "wg_es"]'
      age_applicability_json: '["adult", "child_5_17"]'
      bibliography_refs: '["fhir-r4", "mics6", "washington-group-cfm", "washington-group-es"]'
  depression_intensity:
    slot_uri: publicschema:depression_intensity
    title: Depression intensity
    description: The intensity of the person's last feeling of depression. Applies to adults (WG-ES DEP_3).
      Asked of respondents who reported feeling depressed at least a few times a year.
    range: FunctionalIntensity
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Intensidad de la depresión
      label_fr: Intensité de la dépression
      description_es: La intensidad del último sentimiento de depresión de la persona. Se aplica a adultos
        (WG-ES DEP_3). Se pregunta a los encuestados que reportaron sentirse deprimidos al menos algunas
        veces al año.
      description_fr: L'intensité du dernier sentiment de dépression de la personne. S'applique aux adultes
        (WG-ES DEP_3). Posée aux répondants ayant déclaré se sentir déprimés au moins quelques fois par
        an.
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["cfm_5_17", "wg_es"]'
      age_applicability_json: '["adult"]'
      bibliography_refs: '["fhir-r4", "washington-group-es"]'
  depression_medication:
    slot_uri: publicschema:depression_medication
    title: Depression medication
    description: Whether the person takes medication for depression. Applies to adults (WG-ES DEP_2).
      This filter is used to interpret depression_frequency answers, which are asked about symptoms while
      on medication if the person takes any.
    range: boolean
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Medicación para la depresión
      label_fr: Médicament contre la dépression
      description_es: Si la persona toma medicación para la depresión. Se aplica a adultos (WG-ES DEP_2).
        Este filtro se usa para interpretar las respuestas de depression_frequency, que se formulan sobre
        los síntomas bajo medicación si la persona la toma.
      description_fr: Si la personne prend un traitement pour la dépression. S'applique aux adultes (WG-ES
        DEP_2). Ce filtre sert à interpréter les réponses à depression_frequency, qui sont posées à propos
        des symptômes sous traitement si la personne en prend un.
      category: functioning
      sensitivity: sensitive
      valid_instruments_json: '["wg_es"]'
      age_applicability_json: '["adult"]'
      bibliography_refs: '["fhir-r4", "washington-group-es"]'
  difficulty_accepting_change:
    slot_uri: publicschema:difficulty_accepting_change
    title: Difficulty accepting change
    description: The degree of difficulty the child experiences accepting changes in routine. Applies
      to children ages 5-17 (CFM).
    range: FunctionalDifficultySeverity
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Dificultad para aceptar cambios
      label_fr: Difficulté à accepter le changement
      description_es: El grado de dificultad que el niño experimenta para aceptar cambios en la rutina.
        Se aplica a niños de 5 a 17 años (CFM).
      description_fr: Le degré de difficulté que l'enfant éprouve à accepter les changements de routine.
        S'applique aux enfants de 5 à 17 ans (CFM).
      category: child_functioning
