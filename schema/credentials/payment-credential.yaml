id: PaymentCredential
maturity: draft

definition:
  en: "A verifiable credential recording a payment event to a beneficiary, including amount, date, delivery channel, and transaction reference."
  fr: "Un justificatif verifiable enregistrant un evenement de paiement a un beneficiaire, incluant le montant, la date, le canal de versement et la reference de transaction."
  es: "Una credencial verificable que registra un evento de pago a un beneficiario, incluyendo el monto, la fecha, el canal de entrega y la referencia de transaccion."

subject_concept: Person
included_concepts:
  - PaymentEvent
