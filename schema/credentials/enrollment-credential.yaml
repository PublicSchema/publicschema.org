id: EnrollmentCredential
maturity: draft

definition:
  en: "A verifiable credential proving that a person is enrolled in a social protection program, including enrollment status, dates, and program reference."
  fr: "Un justificatif verifiable prouvant qu'une personne est inscrite dans un programme de protection sociale, incluant le statut d'inscription, les dates et la reference du programme."
  es: "Una credencial verificable que demuestra que una persona esta inscrita en un programa de proteccion social, incluyendo el estado de inscripcion, fechas y referencia del programa."

subject_concept: Person
included_concepts:
  - Enrollment
