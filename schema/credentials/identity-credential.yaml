id: IdentityCredential
maturity: draft

definition:
  en: "A verifiable credential asserting core identity attributes of a person, suitable for cross-program identification and deduplication."
  fr: "Un justificatif verifiable attestant des attributs d'identite fondamentaux d'une personne, adapte a l'identification et a la deduplication inter-programmes."
  es: "Una credencial verificable que afirma los atributos de identidad fundamentales de una persona, adecuada para la identificacion y deduplicacion entre programas."

