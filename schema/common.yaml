  storage_duration_days:
    slot_uri: publicschema:storage_duration_days
    title: Storage duration (days)
    description: 'Planned storage duration for the personal data covered by this record, expressed in
      days. Drives retention logic in downstream systems. Zero means: do not persist after processing.
      Null (unpopulated) means: duration is described in prose in the PrivacyNotice retention_description
      rather than coded.'
