id: https://publicschema.org/linkml/common
name: publicschema-common
title: PublicSchema common domain
license: CC-BY-4.0
default_prefix: publicschema
prefixes:
  publicschema: https://publicschema.org/
  linkml: https://w3id.org/linkml/
  xsd: http://www.w3.org/2001/XMLSchema#
  bibo: http://purl.org/ontology/bibo/
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  foaf: http://xmlns.com/foaf/0.1/
  prov: http://www.w3.org/ns/prov#
  fhir: http://hl7.org/fhir/
  cpov: http://data.europa.eu/m8g/
  dpv: https://w3id.org/dpv#
  dpv-gdpr: https://w3id.org/dpv/dpv-gdpr#
  dci: https://schema.spdci.org/core/v1/
  dhis2: https://dhis2.org/schemas/
  dhs: https://dhsprogram.com/data/recode7/
  dhs8: https://dhsprogram.com/data/recode8/
  fhir-r4: http://hl7.org/fhir/R4/
  fhir-r5: http://hl7.org/fhir/R5/
  govstack-payments: https://govstack.global/specs/payments/
  lsms-isa: https://www.worldbank.org/en/programs/lsms/initiatives/lsms-ISA/
  mics: https://mics.unicef.org/tools/
  ocha-cod-ab: https://data.humdata.org/dataset/cod-ab/
  opencrvs: https://documentation.opencrvs.org/technology/event-service-v2/
  openimis: https://openimis.atlassian.net/wiki/spaces/OP/
  openspp: https://docs.openspp.org/
  wg-es: https://www.washingtongroup-disability.com/question-sets/wg-extended-set/
  legal: http://www.w3.org/ns/legal#
  locn: http://www.w3.org/ns/locn#
  adms: http://www.w3.org/ns/adms#
  dct: http://purl.org/dc/terms/
  person: http://www.w3.org/ns/person#
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
imports:
- linkml:types
- publicschema-extensions
- core
- identity
- misc
- vocabularies
slots:
  amount:
    slot_uri: publicschema:amount
    title: Amount
    description: The monetary or quantitative value of the item being delivered, owed, or redeemed, expressed
      as a decimal number in the associated currency.
    range: decimal
    multivalued: false
    status: bibo:status/published
    annotations:
      label_es: Monto
      label_fr: Montant
      description_es: El valor monetario o cuantitativo del elemento entregado, adeudado o canjeado, expresado
        como un número decimal en la moneda asociada.
      description_fr: La valeur monétaire ou quantitative de l'élément livré, dû ou échangé, exprimée
        sous forme de nombre décimal dans la devise associée.
      convergence_json: '{"system_count": 3, "total_systems": 5}'
  conforms_to:
    slot_uri: publicschema:conforms_to
    title: Conforms to
    description: URIs of standards or specifications this record conforms to (ISO/IEC TS 27560, Kantara
      Consent Receipt, W3C DPV, etc.). Purely declarative; no validation is performed against the cited
      standards at schema level.
    range: uri
    multivalued: true
    status: bibo:draft
    annotations:
      label_es: Conforme a
      label_fr: Conforme à
      description_es: URIs de las normas o especificaciones con las que este registro es conforme (ISO/IEC
        TS 27560, Kantara Consent Receipt, W3C DPV, etc.). Puramente declarativo; no se realiza ninguna
        validación contra las normas citadas a nivel de esquema.
      description_fr: URI des normes ou spécifications auxquelles cet enregistrement est conforme (ISO/IEC
        TS 27560, Kantara Consent Receipt, W3C DPV, etc.). Purement déclaratif ; aucune validation n'est
        effectuée par rapport aux normes citées au niveau du schéma.
      category: administrative
      bibliography_refs: '["kantara-ancr"]'
  controllers:
    slot_uri: publicschema:controllers
    title: Controllers
    description: Organizations determining the purposes and means of processing. Cardinality multiple
      covers joint controllership (two or more organizations jointly responsible under GDPR Art 26 or
      equivalent national provisions); the normative case is one controller. See 'recipient_role' to distinguish
      processors from controllers among recipients.
    range: Organization
    multivalued: true
    status: bibo:draft
    close_mappings:
    - dpv:hasDataController
    annotations:
      label_es: Responsables del tratamiento
      label_fr: Responsables du traitement
      description_es: Organizaciones que determinan los fines y los medios del tratamiento. La cardinalidad
        múltiple cubre la corresponsabilidad (dos o más organizaciones conjuntamente responsables en virtud
        del Art. 26 del RGPD o disposiciones nacionales equivalentes); el caso normativo es un único responsable
        del tratamiento. Véase 'recipient_role' para distinguir los encargados del tratamiento de los
        responsables entre los destinatarios.
      description_fr: Organisations qui déterminent les finalités et les moyens du traitement. La cardinalité
        multiple couvre la responsabilité conjointe (deux organisations ou plus conjointement responsables
        au titre de l'article 26 du RGPD ou des dispositions nationales équivalentes) ; le cas normatif
        est un seul responsable du traitement. Voir 'recipient_role' pour distinguer les sous-traitants
        des responsables parmi les destinataires.
      category: consent_parties
      immutable_after_status: given
      external_alignments_json: '[{"label": "has data controller", "match": "close", "note": "DPV models
        this as a predicate (hasDataController) linking a record to a controller; we model it as a property
        on ConsentRecord. Semantically equivalent.", "uri": "https://w3id.org/dpv#hasDataController",
        "vocabulary": "DPV v2", "vocabulary_id": "dpv"}]'
      bibliography_refs: '["iso-27560", "iso-29184", "kantara-consent-receipt", "w3c-dpv"]'
  created_at:
    slot_uri: publicschema:created_at
    title: Created at
    description: System-generated timestamp marking when this record was persisted. This is the digitisation
      timestamp, not the consent-giving date. Distinct from 'signed_date' (the day the data subject indicated
      consent) and 'effective_date' (when the record becomes operative). For paper-first workflows the
      three timestamps may all differ.
    range: datetime
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Creado el
      label_fr: Créé le
      description_es: Marca de tiempo generada por el sistema que indica cuándo se almacenó este registro.
        Es la marca de tiempo de digitalización, no la fecha de otorgamiento del consentimiento. Distinta
        de 'signed_date' (el día en que la persona interesada indicó su consentimiento) y de 'effective_date'
        (cuando el registro entra en vigor). Para los flujos de trabajo en papel, las tres marcas de tiempo
        pueden diferir.
      description_fr: Horodatage généré par le système indiquant quand cet enregistrement a été conservé.
        Il s'agit de l'horodatage de numérisation, et non de la date de consentement. Distinct de 'signed_date'
        (le jour où la personne concernée a indiqué son consentement) et de 'effective_date' (quand l'enregistrement
        entre en vigueur). Pour les flux de travail papier, les trois horodatages peuvent tous différer.
      category: administrative
      bibliography_refs: '["iso-27560", "kantara-consent-receipt"]'
  currency:
    slot_uri: publicschema:currency
    title: Currency
    description: The ISO 4217 currency code for a monetary value.
    range: Currency
    multivalued: false
    status: bibo:status/published
    annotations:
      label_es: Moneda
      label_fr: Devise
      description_es: El código de moneda ISO 4217 para un valor monetario.
      description_fr: Le code de devise ISO 4217 pour une valeur monétaire.
      convergence_json: '{"system_count": 1, "total_systems": 5}'
      bibliography_refs: '["iso-4217"]'
  description:
    slot_uri: publicschema:description
    title: Description
    description: A free-text summary describing the event, situation, or record.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Descripción
      label_fr: Description
      description_es: Un resumen en texto libre que describe el evento, la situación o el registro.
      description_fr: Un résumé en texte libre décrivant l'événement, la situation ou l'enregistrement.
  effective_date:
    slot_uri: publicschema:effective_date
    title: Effective date
    description: The date on which this record or notice becomes operative. On a ConsentRecord, it may
      be later than signed_date (the day the data subject indicated consent) and later than created_at
      (the digitisation timestamp); for paper workflows, signed_date is the day of the paper signature
      and effective_date is typically the same day but may be delayed by program logic. On a PrivacyNotice,
      it is the date from which this notice version applies; records collected before this date reference
      the superseded version via supersedes_ref.
    range: date
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Fecha de vigencia
      label_fr: Date d'entrée en vigueur
      description_es: La fecha en que este registro o aviso se vuelve operativo. En un ConsentRecord,
        puede ser posterior a signed_date (el día en que la persona afectada indicó su consentimiento)
        y a created_at (la marca de tiempo de digitalización); en flujos en papel, signed_date es el día
        de la firma del formulario en papel y effective_date es normalmente el mismo día, pero puede retrasarse
        según la lógica del programa. En un PrivacyNotice, es la fecha a partir de la cual se aplica esta
        versión del aviso; los registros recogidos antes de esa fecha remiten a la versión anterior mediante
        supersedes_ref.
      description_fr: La date à laquelle cet enregistrement ou cet avis devient opérationnel. Sur un ConsentRecord,
        elle peut être postérieure à signed_date (le jour où la personne concernée a indiqué son consentement)
        et à created_at (l'horodatage de numérisation); pour les flux sur support papier, signed_date
        est le jour de la signature du formulaire papier et effective_date est généralement le même jour,
        mais peut être retardée par la logique du programme. Sur un PrivacyNotice, il s'agit de la date
        à partir de laquelle cette version de l'avis s'applique; les enregistrements recueillis avant
        cette date renvoient à la version antérieure via supersedes_ref.
      category: consent_validity
      immutable_after_status: given
      bibliography_refs: '["iso-27560", "w3c-dpv"]'
  end_date:
    slot_uri: publicschema:end_date
    title: End date
    description: The date on which this ceased to be effective.
    range: date
    multivalued: false
    status: bibo:status/published
    exact_mappings:
    - schema:endDate
    annotations:
      label_es: Fecha de fin
      label_fr: Date de fin
      description_es: La fecha en que esto dejó de ser efectivo.
      description_fr: La date à laquelle ceci a cessé d'être effectif.
      convergence_json: '{"system_count": 4, "total_systems": 6}'
      bibliography_refs: '["schema-org"]'
  enrollment_ref:
    slot_uri: publicschema:enrollment_ref
    title: Enrollment reference
    description: Reference to the enrollment to which this entitlement belongs.
    range: uri
    multivalued: false
    status: bibo:status/forthcoming
    annotations:
      label_es: Referencia de inscripción
      label_fr: Référence d'inscription
      description_es: Referencia a la inscripción a la que pertenece esta prestación.
      description_fr: Référence à l'inscription à laquelle cette prestation est rattachée.
      convergence_json: '{"system_count": 0, "total_systems": 5}'
  expiry_date:
    slot_uri: publicschema:expiry_date
    title: Expiry date
    description: The date on which this record or document expires or becomes invalid.
    range: date
    multivalued: false
    status: bibo:status/published
    annotations:
      label_es: Fecha de expiración
      label_fr: Date d'expiration
      description_es: La fecha en que este registro o documento expira o deja de ser válido.
      description_fr: La date à laquelle cet enregistrement ou document expire ou devient invalide.
      convergence_json: '{"notes": "Present in 1 of 5 mapped systems. Relevant for documents such as passports
        and national IDs with fixed validity periods.", "system_count": 1, "total_systems": 5}'
      bibliography_refs: '["w3c-dpv"]'
  identifier:
    slot_uri: publicschema:identifier
    title: Record identifier
    description: A unique identifier for this record (e.g., a ULID, UUID, or program-assigned ID). Scoped
      to the record's namespace; not necessarily globally unique.
    range: string
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Identificador del registro
      label_fr: Identifiant de l'enregistrement
      description_es: Un identificador único para este registro (por ejemplo, un ULID, UUID o ID asignado
        por el programa). Su alcance se limita al espacio de nombres del registro; no es necesariamente
        único a nivel global.
      description_fr: Un identifiant unique pour cet enregistrement (par exemple, un ULID, UUID ou identifiant
        attribué par le programme). La portée est limitée à l'espace de nommage de l'enregistrement ;
        il n'est pas nécessairement unique à l'échelle mondiale.
      category: administrative
      bibliography_refs: '["iso-27560", "kantara-consent-receipt"]'
  identifiers:
    slot_uri: publicschema:identifiers
    title: Identifiers
    description: Identifiers carried by this entity, such as national ID numbers, program IDs, or identifiers
      asserted by an identity document.
    range: Identifier
    multivalued: true
    status: bibo:status/published
    annotations:
      label_es: Identificadores
      label_fr: Identifiants
      description_es: Identificadores que porta esta entidad, como números de identidad nacional, ID de
        programa o identificadores acreditados por un documento de identidad.
      description_fr: Identifiants portés par cette entité, tels que numéros d'identité nationale, identifiants
        de programme ou identifiants attestés par un document d'identité.
      category: identity
      convergence_json: '{"notes": "Present in 5 of 6 mapped systems. Structural approaches vary: some
        embed identifiers inline on the person record, others maintain a separate identifier entity.",
        "system_count": 5, "total_systems": 6}'
      bibliography_refs: '["spdci-common-standards"]'
  issue_date:
    slot_uri: publicschema:issue_date
    title: Issue date
    description: The date on which this record or document was issued.
    range: date
    multivalued: false
    status: bibo:status/published
    exact_mappings:
    - dct:issued
    annotations:
      label_es: Fecha de emisión
      label_fr: Date de délivrance
      description_es: La fecha en que se emitió este registro o documento.
      description_fr: La date à laquelle cet enregistrement ou document a été délivré.
      external_alignments_json: '[{"label": "issued", "match": "exact", "uri": "http://purl.org/dc/terms/issued",
        "vocabulary": "Core Person", "vocabulary_id": "semic"}]'
      convergence_json: '{"notes": "Not found in any of the 5 mapped systems. Present in some civil registration
        systems but not typically carried in social protection delivery databases.", "system_count": 0,
        "total_systems": 5}'
      bibliography_refs: '["semic-core-person"]'
  issued_to:
    slot_uri: publicschema:issued_to
    title: Issued to
    description: The party (person, household, or group) to whom the document, voucher, or credential
      is issued.
    range: Party
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Emitido a
      label_fr: Délivré à
      description_es: La parte (persona, hogar o grupo) a la que se emite el documento, vale o credencial.
      description_fr: La partie (personne, ménage ou groupe) à laquelle le document, le bon ou l'attestation
        est délivré.
      convergence_json: '{"system_count": 0, "total_systems": 6}'
  issuing_authority:
    slot_uri: publicschema:issuing_authority
    title: Issuing authority
    description: The organization or government body that issued the document or credential.
    range: string
    multivalued: false
    status: bibo:status/published
    close_mappings:
    - dct:creator
    annotations:
      label_es: Autoridad emisora
      label_fr: Autorité émettrice
      description_es: La organización o entidad gubernamental que emitió el documento o la credencial.
      description_fr: L'organisation ou l'organe gouvernemental qui a délivré le document ou l'attestation.
      external_alignments_json: '[{"label": "creator", "match": "close", "note": "SEMIC uses dc:creator
        as an object property; ours is a string name of the issuing authority", "uri": "http://purl.org/dc/terms/creator",
        "vocabulary": "Core Person", "vocabulary_id": "semic"}]'
      convergence_json: '{"notes": "Not found in any of the 5 mapped systems. Considered best practice
        for identity verification but rarely captured in current social protection systems.", "system_count":
        0, "total_systems": 5}'
      bibliography_refs: '["semic-core-person"]'
  jurisdiction:
    slot_uri: publicschema:jurisdiction
    title: Jurisdiction
    description: 'ISO 3166-1 alpha-2 country code of the jurisdiction whose data protection law governs
      this record. Cardinality single: multi-jurisdictional records are the rare case; a follow-on ADR
      will lift cardinality if adopters hit it. Under joint controllership, this is the lead controller''s
      primary establishment jurisdiction.'
    range: Country
    multivalued: false
    status: bibo:draft
    annotations:
      label_es: Jurisdicción
      label_fr: Juridiction
      description_es: 'Código de país ISO 3166-1 alpha-2 de la jurisdicción cuya ley de protección de
        datos rige este registro. Cardinalidad simple: los registros multi-jurisdiccionales son el caso
        excepcional; un ADR posterior podrá ampliar la cardinalidad si los adoptantes lo necesitan. En
        caso de responsabilidad conjunta, corresponde a la jurisdicción de establecimiento principal del
        responsable principal.'
      description_fr: 'Code pays ISO 3166-1 alpha-2 de la juridiction dont la législation sur la protection
        des données régit cet enregistrement. Cardinalité simple: les enregistrements multi-juridictionnels
        sont rares; un ADR ultérieur lèvera la contrainte si les adoptants en ont besoin. En cas de responsabilité
        conjointe, il s''agit de la juridiction du siège principal du responsable chef de file.'
      category: consent_validity
      immutable_after_status: given
  legal_basis:
    slot_uri: publicschema:legal_basis
    title: Legal basis
    description: 'The legal basis under GDPR Art 6(1) (or equivalent law) authorizing the processing.
      Cardinality multiple because a single record may rely on more than one basis; normative usage on
      a ConsentRecord is one basis. On a PrivacyNotice, multiple bases may coexist if the notice covers
      multiple processing operations. Field-critical: populate even if your UI does not require it.'
    range: LegalBasis
    multivalued: true
    status: bibo:draft
    close_mappings:
    - dpv:hasLegalBasis
    annotations:
      label_es: Base legal
      label_fr: Base juridique
      description_es: 'La base legal conforme al Art 6(1) del RGPD (o ley equivalente) que autoriza el
        tratamiento. Cardinalidad múltiple porque un registro puede apoyarse en más de una base; el uso
        normativo en un ConsentRecord es una sola base. En un PrivacyNotice, múltiples bases pueden coexistir
        si el aviso cubre varias operaciones de tratamiento. Campo crítico: completar incluso si su interfaz
        no lo exige.'
      description_fr: 'La base juridique au sens de l''Art 6(1) du RGPD (ou équivalent national) autorisant
        le traitement. Cardinalité multiple car un enregistrement peut s''appuyer sur plus d''une base
        ; l''usage normatif sur un ConsentRecord est d''une base. Sur un PrivacyNotice, plusieurs bases
        peuvent coexister si l''avis couvre plusieurs opérations de traitement. Champ critique : à renseigner
        même si votre interface ne l''exige pas.'
      category: consent_processing
      immutable_after_status: given
      external_alignments_json: '[{"label": "has legal basis", "match": "close", "note": "DPV models this
        as a predicate linking a record to a legal basis class; we model it as a vocabulary-typed property
        carrying coded values aligned to GDPR Art 6(1).", "uri": "https://w3id.org/dpv#hasLegalBasis",
        "vocabulary": "DPV v2", "vocabulary_id": "dpv"}]'
      bibliography_refs: '["kantara-consent-receipt", "w3c-dpv"]'
  location:
    slot_uri: publicschema:location
    title: Location
    description: The geographic location of the subject of this record, captured as coordinates or administrative
      area.
    range: Location
    multivalued: false
    status: bibo:status/forthcoming
    annotations:
      label_es: Ubicación
      label_fr: Localisation
      description_es: La ubicación geográfica del sujeto de este registro, capturada como coordenadas
        o área administrativa.
      description_fr: La localisation géographique du sujet de cet enregistrement, capturée sous forme
        de coordonnées ou de zone administrative.
      category: location
      convergence_json: '{"notes": "OpenSPP and DCI map location. Distinct from address: location is the
        administrative area for targeting; address is the specific contact point.\n", "system_count":
        2, "total_systems": 4}'
  name:
    slot_uri: publicschema:name
    title: Name
    description: The full display name of the record. Depending on the concept, this is a person's or
      group's name, or the title of a program, instrument, scoring rule, or software product.
    range: string
    multivalued: false
    status: bibo:status/published
    exact_mappings:
    - foaf:name
    - schema:name
    close_mappings:
    - dci:data/name
    - legal:legalName
    annotations:
      label_es: Nombre
      label_fr: Nom
      description_es: El nombre de visualización completo del registro. Según el concepto, es el nombre
        de una persona o grupo, o el título de un programa, instrumento, regla de puntuación o producto
        de software.
      description_fr: Le nom d'affichage complet de l'enregistrement. Selon le concept, il s'agit du nom
        d'une personne ou d'un groupe, ou du titre d'un programme, d'un instrument, d'une règle de notation
        ou d'un produit logiciel.
      category: identity
      external_alignments_json: '[{"label": "name", "match": "exact", "uri": "http://xmlns.com/foaf/0.1/name",
        "vocabulary": "Core Person", "vocabulary_id": "semic"}, {"label": "name", "match": "close", "note":
        "PublicSchema ''name'' is a flat display string; DCI ''name'' is a structured Name object with
        surname, given_name, and other components", "uri": "https://schema.spdci.org/core/v1/data/name",
        "vocabulary": "DCI Core", "vocabulary_id": "dci"}, {"confidence": "medium", "label": "legalName",
        "match": "close", "note": "PublicSchema name can carry an organization label; legalName is the
        registered legal name when the organization is a legal entity.", "predicate": "http://www.w3.org/2004/02/skos/core#closeMatch",
        "review_status": "accepted", "source_id": "semic-core-business", "source_version": "2.2.0", "uri":
        "http://www.w3.org/ns/legal#legalName", "vocabulary": "SEMIC Core Business alignments"}]'
      convergence_json: '{"notes": "Universal across all 6 mapped systems. May be stored as a composite
        field or derived from given_name and family_name.", "system_count": 6, "total_systems": 6}'
      bibliography_refs: '["iso-29184", "schema-org", "semic-core-person", "spdci-common-standards"]'
  person:
    slot_uri: publicschema:person
    title: Person
    description: A reference to the individual Person this record relates to.
    range: Person
    multivalued: false
    status: bibo:status/forthcoming
    annotations:
      label_es: Persona
      label_fr: Personne
      description_es: Una referencia a la Persona individual a la que se refiere este registro.
      description_fr: Une référence à la Personne à laquelle cet enregistrement se rapporte.
      category: other
      sensitivity: sensitive
      convergence_json: '{"notes": "Present in 2 of 5 mapped systems as an explicit reference. Most systems
        co-locate person data with the membership record rather than using a typed reference.", "system_count":
        2, "total_systems": 5}'
  personal_data_categories:
    slot_uri: publicschema:personal_data_categories
    title: Personal data categories
    description: 'Values are W3C DPV URIs, normatively subclasses of `dpv:PersonalData` (from the DPV
      core; the DPV-PD extension defines finer taxa). Cross-reference: this is distinct from biometric
      capture method, which is `consent_expression = opt-in-biometric` on this record. Biometric data
      categories are values of this property (e.g., a URI for fingerprint, face image).'
    range: uri
    multivalued: true
    status: bibo:draft
    close_mappings:
    - dpv:hasPersonalData
    annotations:
      label_es: Categorías de datos personales
      label_fr: Catégories de données personnelles
      description_es: Los valores son URI W3C DPV, subclases normativas de `dpv:PersonalData` (del núcleo
        DPV; la extensión DPV-PD define taxones más específicos). No confundir con el método de captura
        biométrica, que es `consent_expression = opt-in-biometric` en este registro. Las categorías de
        datos biométricos son valores de esta propiedad (por ejemplo, un URI para huella dactilar, imagen
        facial).
      description_fr: Les valeurs sont des URI W3C DPV, sous-classes normatives de `dpv:PersonalData`
