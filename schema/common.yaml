        este registro, expresada en días. Dirige la lógica de retención en sistemas posteriores. Cero
        significa: no conservar tras el procesamiento. Nulo (no rellenado) significa: la duración se describe
        en prosa en el campo retention_description de la PrivacyNotice en lugar de codificarse.'
      description_fr: 'Durée de conservation prévue pour les données personnelles couvertes par cet enregistrement,
        exprimée en jours. Pilote la logique de rétention dans les systèmes en aval. Zéro signifie: ne
        pas conserver après le traitement. Null (non renseigné) signifie: la durée est décrite en prose
        dans le champ retention_description de la PrivacyNotice plutôt que codée.'
      category: consent_retention
