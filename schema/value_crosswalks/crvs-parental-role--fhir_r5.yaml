id: crvs-parental-role--fhir_r5
source_value_set:
  id: crvs/parental-role
  kind: vocabulary
  source_id: publicschema
target_value_set:
  id: v3 RoleCode (THO v7.0.1)
  source_id: fhir_r5
pairs:
- source_value: biological
  target_value: PRN
  quality: exact
  target_label: Parent
  note: PRN is the generic parent supertype; biological is the closest gender-neutral mapping. Used also for legal when no more specific code applies.
- source_value: gestational
  target_value: GESTM
  quality: exact
  target_label: Gestational Mother
  note: GESTM is female-coded; our gestational code is gender-neutral. The mapping is narrow.
- source_value: adoptive
  target_value: ADOPTP
  quality: exact
  target_label: Adoptive Parent
standard:
  source_id: fhir_r5
  uri: https://terminology.hl7.org/7.0.1/CodeSystem-v3-RoleCode.json
