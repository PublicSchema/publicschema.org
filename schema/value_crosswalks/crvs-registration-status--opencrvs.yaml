notes: EventStatus is a 5-value enum in v2. CREATED and NOTIFIED both map to declared as pre-registration draft states. The v1 granularity (WAITING_VALIDATION, VALIDATED, CERTIFIED, ISSUED, CORRECTION_REQUESTED) is no longer present; correction outcomes are expressed through action sequences rather than a terminal status.
