  target_value: CREATED
  quality: exact
  target_label: Created
  note: Draft event created; maps to declared as the earliest declared state.
- source_value: declared
  target_value: NOTIFIED
  quality: exact
  target_label: Notified
  note: Birth or death notified before formal declaration; maps to declared.
- source_value: declared
  target_value: DECLARED
  quality: exact
  target_label: Declared
- source_value: registered
  target_value: REGISTERED
  quality: exact
  target_label: Registered
- source_value: archived
  target_value: ARCHIVED
  quality: exact
  target_label: Archived
- source_value: cancelled
  target_value: null
  quality: unmapped
- source_value: corrected
  target_value: null
  quality: unmapped
- source_value: pending_validation
  target_value: null
  quality: unmapped
- source_value: rejected
  target_value: null
  quality: unmapped
