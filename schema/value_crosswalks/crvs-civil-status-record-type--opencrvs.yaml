notes: In v2, EventDocument.type is a free string set by the country config. Farajaland uses 'birth', 'death', 'marriage' as event type strings. The three shared values align; PublicSchema covers three additional types (paternity_recognition, supplementary_judgment, court_ordered_substitute) with no v2 core equivalent.
