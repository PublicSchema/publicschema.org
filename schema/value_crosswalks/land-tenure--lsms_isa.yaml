notes: This is an indicative cross-walk, not a direct mapping to a single LSMS-ISA variable. The LSMS Agricultural Survey Design reference questionnaire (Module 2, Parcel Details) carries 13 land-acquisition categories, and the World Bank harmonized panel dataset uses a binary plot_owned variable. The 8-code structure here collapses country-specific questionnaire codes into PublicSchema's canonical tenure categories. Adopters mapping from a specific country wave should consult that country's LSMS-ISA questionnaire directly.
