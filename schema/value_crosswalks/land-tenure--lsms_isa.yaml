- source_value: owned_with_title
  target_value: '1'
  quality: exact
  target_label: Owned (purchased/inherited)
  note: LSMS-ISA does not distinguish titled from untitled ownership in the harmonized variable. Mapped to owned_with_title as default; field context may indicate otherwise.
