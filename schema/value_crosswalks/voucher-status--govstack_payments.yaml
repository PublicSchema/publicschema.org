notes: The GovStack bb-payments OpenAPI spec (VoucherStatus.yml) describes status as an integer from 01 to 06 plus 9 for error, but does not publish a code-to-label table. The labels above for 01 and 02 follow state-machine convention; the labels for 03-06 are inferred. The rendered GovStack specification narrative also mentions 'Blocked' and 'Not Existing' states which have no assigned integer code in the public spec; implementers should confirm code-label assignments with their GovStack deployment.
