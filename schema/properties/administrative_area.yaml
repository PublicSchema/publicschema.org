id: administrative_area
maturity: candidate

definition:
  en: "The first-level administrative subdivision (province, state, region) containing the address."
  fr: "La première subdivision administrative (province, État, région) contenant l'adresse."
  es: "La primera subdivisión administrativa (provincia, estado, región) que contiene la dirección."

type: string
cardinality: single
vocabulary: null
references: null
schema_org_equivalent: "schema:addressRegion"

external_equivalents:
  semic:
    label: "adminUnitL2"
    uri: "http://www.w3.org/ns/locn#adminUnitL2"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC adminUnitL2 is specifically the second-level admin unit (region/state); ours is a general administrative area field"

  dci:
    label: "region_code"
    uri: "https://schema.spdci.org/core/v1/data/region_code"
    match: close
    vocabulary: "DCI Core"
    note: "Both capture the first-level subnational division; DCI uses a code, PublicSchema uses a name"
convergence:
  system_count: 2
  total_systems: 5
  notes: "Present in 2 of 5 mapped systems as an explicit field. Equivalent data is often captured via a linked Location reference rather than a free-text field."
