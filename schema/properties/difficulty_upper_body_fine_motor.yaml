id: difficulty_upper_body_fine_motor
maturity: draft
label:
  en: "Difficulty with fine motor tasks (hands and fingers)"
  fr: "Difficulté avec la motricité fine (mains et doigts)"
  es: "Dificultad con motricidad fina (manos y dedos)"

definition:
  en: "The degree of difficulty the person experiences using their hands and fingers, such as picking up small objects (for example, a button or pencil) or opening and closing containers or bottles. Applies to adults (WG-ES UB_2)."
  fr: "Le degré de difficulté que la personne éprouve à utiliser ses mains et ses doigts, par exemple pour ramasser de petits objets (comme un bouton ou un crayon) ou pour ouvrir et fermer des contenants ou des bouteilles. S'applique aux adultes (WG-ES UB_2)."
  es: "El grado de dificultad que la persona experimenta al usar sus manos y dedos, como recoger objetos pequeños (por ejemplo, un botón o un lápiz) o abrir y cerrar recipientes o botellas. Se aplica a adultos (WG-ES UB_2)."

type: string
cardinality: single
vocabulary: functional-difficulty-severity
references: null
category: functioning
sensitivity: sensitive
age_applicability:
  - adult
valid_instruments: [wg_es]
