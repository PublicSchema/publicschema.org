id: processing_operations
maturity: draft

definition:
  en: "Values are W3C DPV URIs, normatively subclasses of `dpv:Processing` (e.g., `dpv:Collect`, `dpv:Store`, `dpv:Share`). Describes the operations being consented to. Cross-reference GDPR Art 4(2) for the definition of 'processing'."
  fr: "Les valeurs sont des URI W3C DPV, sous-classes normatives de `dpv:Processing` (par exemple `dpv:Collect`, `dpv:Store`, `dpv:Share`). Décrit les opérations faisant l'objet du consentement. Référence : RGPD Art 4(2) pour la définition du terme 'traitement'."
  es: "Los valores son URI W3C DPV, subclases normativas de `dpv:Processing` (por ejemplo, `dpv:Collect`, `dpv:Store`, `dpv:Share`). Describe las operaciones para las que se otorga el consentimiento. Referencia: RGPD Art 4(2) para la definición de 'tratamiento'."

type: uri
cardinality: multiple
vocabulary: null
references: null
category: consent_processing
immutable_after_status: given

external_equivalents:
  dpv:
    label: "has processing"
    uri: "https://w3id.org/dpv#hasProcessing"
    match: close
    vocabulary: "DPV v2"
    note: "DPV models this as a predicate linking a record to a processing operation; we model it as a property on ConsentRecord carrying operation URIs."
