id: birth_order
maturity: draft
label:
  en: "Birth order"
  fr: "Rang de naissance"
  es: "Orden de nacimiento"

definition:
  en: "For multiple births, the sequence number of this infant among the siblings born in the same delivery (1 for first-born, 2 for second-born, etc.)."
  fr: "Pour les naissances multiples, le numéro d'ordre de ce nouveau-né parmi les frères et sœurs nés lors du même accouchement (1 pour le premier né, 2 pour le deuxième, etc.)."
  es: "Para partos múltiples, el número de orden de este recién nacido entre los hermanos nacidos en el mismo parto (1 para el primogénito, 2 para el segundo, etc.)."

type: integer
cardinality: single
vocabulary: null
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Person.multipleBirth"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#Person"
    match: close
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS carries this as an Int on the child's Person entity rather than on the registration itself."
