    match: close
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "Gendered-to-neutral mapping: our party_1 is gender-neutral, OpenCRVS uses gendered slots. Assignment is arbitrary (party_1 = bride); applied symmetrically with party_2 = groom so the structural correspondence is honest."
