id: certificate_number
maturity: draft
label:
  en: "Certificate number"
  fr: "Numéro de certificat"
  es: "Número de certificado"

definition:
  en: "The number printed on the issued certificate. Distinct from the registration number of the underlying event or record, since multiple certificates can be issued from the same record over time."
  fr: "Le numéro imprimé sur le certificat délivré. Distinct du numéro d'enregistrement de l'événement ou de l'acte sous-jacent, puisque plusieurs certificats peuvent être délivrés à partir du même acte au fil du temps."
  es: "El número impreso en el certificado emitido. Distinto del número de registro del evento o acta subyacente, dado que pueden emitirse varios certificados a partir del mismo acta a lo largo del tiempo."

type: string
cardinality: single
