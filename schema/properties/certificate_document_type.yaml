id: certificate_document_type
maturity: draft
label:
  en: "Certificate document type"
  fr: "Type de document du certificat"
  es: "Tipo de documento del certificado"

definition:
  en: "The type of event the certificate attests to (birth, death, marriage, divorce, adoption). Describes what the document is about, orthogonal to its format."
  fr: "Le type d'événement attesté par le certificat (naissance, décès, mariage, divorce, adoption). Décrit l'objet du document, indépendamment de son format."
  es: "El tipo de evento que acredita el certificado (nacimiento, defunción, matrimonio, divorcio, adopción). Describe de qué trata el documento, con independencia de su formato."

type: string
cardinality: single
vocabulary: crvs/certificate-document-type
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "PrintCertificateAction.content.templateId"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/ActionDocument.ts#PrintCertificateAction"
    match: broad
    vocabulary: "OpenCRVS v2 event service"
    note: "PrintCertificateAction carries an optional templateId string. The mapping from template ID to document type is country-configured; v2 core imposes no constraint on template identifier values."
