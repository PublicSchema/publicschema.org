id: building_name
maturity: normative

definition:
  en: "The name of a building, estate, or compound, used in contexts where locations are identified by name rather than street number."
  fr: "Le nom d'un bâtiment, d'un domaine ou d'un complexe, utilisé dans les contextes où les lieux sont identifiés par leur nom plutôt que par un numéro de rue."
  es: "El nombre de un edificio, finca o complejo, utilizado en contextos donde las ubicaciones se identifican por nombre en lugar de por número de calle."

