id: matronymic_name
maturity: trial-use

definition:
  en: "A name derived from the given name of the person's mother."
  fr: "Un nom dérivé du prénom de la mère de la personne."
  es: "Un nombre derivado del nombre de pila de la madre de la persona."

type: string
cardinality: single
vocabulary: null
references: null
schema_org_equivalent: null

external_equivalents:
  semic:
    label: "matronymicName"
    uri: "http://data.europa.eu/m8g/matronymicName"
    match: exact
    vocabulary: "Core Person"

  dci:
    label: "second_name"
    uri: "https://schema.spdci.org/core/v1/data/second_name"
    match: broad
    vocabulary: "DCI Core"
    note: "DCI 'second_name' covers middle names broadly; matronymics are a specific naming convention not modeled by DCI"