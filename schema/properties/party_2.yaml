id: party_2
maturity: draft

definition:
  en: "The second of the two parties to a marriage, divorce, or annulment. Ordering between party_1 and party_2 is arbitrary and does not imply a role or precedence."
  fr: "La seconde des deux parties à un mariage, un divorce ou une annulation. L'ordre entre party_1 et party_2 est arbitraire et n'implique ni rôle ni préséance."
  es: "La segunda de las dos partes de un matrimonio, divorcio o anulación. El orden entre party_1 y party_2 es arbitrario y no implica rol ni precedencia."

type: concept:CRVSPerson
cardinality: single
