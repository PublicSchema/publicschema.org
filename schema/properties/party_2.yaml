id: party_2
maturity: draft
label:
  en: "Party 2"
  fr: "Partie 2"
  es: "Parte 2"

definition:
  en: "The second of the two parties to a marriage, divorce, or annulment. Ordering between party_1 and party_2 is arbitrary and does not imply a role or precedence."
  fr: "La seconde des deux parties à un mariage, un divorce ou une annulation. L'ordre entre party_1 et party_2 est arbitraire et n'implique ni rôle ni préséance."
  es: "La segunda de las dos partes de un matrimonio, divorcio o anulación. El orden entre party_1 y party_2 es arbitrario y no implica rol ni precedencia."

type: concept:crvs/Person
cardinality: single
vocabulary: null
references: crvs/Person
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Marriage party_2 declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/utils/types.ts#Event"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there are no core gendered marriage party slots. Party data lives in country-configured EventConfig.declaration fields. The gender-neutral party_2 maps to the second spouse defined by the country config."
