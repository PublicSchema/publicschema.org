id: name
maturity: normative
label:
  en: "Name"
  fr: "Nom"
  es: "Nombre"

definition:
  en: "The full display name of the record. Depending on the concept, this is a person's or group's name, or the title of a program, instrument, scoring rule, or software product."
  fr: "Le nom d'affichage complet de l'enregistrement. Selon le concept, il s'agit du nom d'une personne ou d'un groupe, ou du titre d'un programme, d'un instrument, d'une règle de notation ou d'un produit logiciel."
  es: "El nombre de visualización completo del registro. Según el concepto, es el nombre de una persona o grupo, o el título de un programa, instrumento, regla de puntuación o producto de software."

type: string
cardinality: single
vocabulary: null
references: null
category: identity
schema_org_equivalent: "schema:name"

external_equivalents:
  semic:
    label: "name"
    uri: "http://xmlns.com/foaf/0.1/name"
    match: exact
    vocabulary: "Core Person"

  dci:
    label: "name"
    uri: "https://schema.spdci.org/core/v1/data/name"
    match: close
    vocabulary: "DCI Core"
    note: "PublicSchema 'name' is a flat display string; DCI 'name' is a structured Name object with surname, given_name, and other components"
convergence:
  system_count: 6
  total_systems: 6
  notes: "Universal across all 6 mapped systems. May be stored as a composite field or derived from given_name and family_name."
