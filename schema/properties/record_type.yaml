id: record_type
maturity: draft
label:
  en: "Record type"
  fr: "Type d'acte"
  es: "Tipo de acta"

definition:
  en: "The type of civil status record: birth, marriage, death, paternity recognition, supplementary judgment (jugement supplétif), or a court-ordered substitute record. Determines which original vital event the record attests to."
  fr: "Le type d'acte d'état civil: naissance, mariage, décès, reconnaissance de paternité, jugement supplétif, ou acte de substitution ordonné par tribunal. Détermine à quel événement d'état civil original l'acte se rattache."
  es: "El tipo de acta de estado civil: nacimiento, matrimonio, defunción, reconocimiento de paternidad, sentencia supletoria, o acta sustitutiva ordenada por tribunal. Determina a qué evento vital original acredita el acta."

type: string
cardinality: single
vocabulary: crvs/civil-status-record-type
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "EventDocument.type (country-configured string)"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventDocument.ts#EventDocument"
    match: close
    vocabulary: "OpenCRVS v2 event service"
    note: "In v2, EventDocument.type is a free string set by the country config (e.g. 'birth', 'death', 'marriage'). This is the closest v2 equivalent to our record_type property; the correspondence is close but the v2 field is a string rather than an enum."
