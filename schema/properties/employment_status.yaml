  en: "The labour force participation status of the person: whether they are employed, unemployed, or outside the labour force."
  fr: "Le statut de participation à la population active de la personne : si elle est employée, au chômage ou hors de la population active."
  es: "La situación laboral de la persona en cuanto a su participación en la fuerza de trabajo: si está empleada, desempleada o inactiva."

