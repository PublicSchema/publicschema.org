id: ethnic_group
maturity: draft

definition:
  en: "The ethnic or cultural group of the person, as self-identified. The UNSD recommends nationally defined categories based on self-identification; no international classification exists."
  fr: "Le groupe ethnique ou culturel de la personne, tel que déclaré par elle-même. L'ONU recommande des catégories définies au niveau national basées sur l'auto-identification; aucune classification internationale n'existe."
  es: "El grupo étnico o cultural de la persona, según autodeclaración. La ONU recomienda categorías definidas a nivel nacional basadas en la autoidentificación; no existe una clasificación internacional."

