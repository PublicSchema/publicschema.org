definition:
  en: "The people tracked by the family register, each captured as a GroupMembership so that roles (head, spouse, child, etc.) and entry or exit dates are explicit."
  fr: "Les personnes suivies par le registre familial, chacune représentée par un GroupMembership afin d'expliciter les rôles (chef de famille, conjoint, enfant, etc.) et les dates d'entrée ou de sortie."
  es: "Las personas incluidas en el registro familiar, cada una representada mediante un GroupMembership para que queden explícitos los roles (jefe de hogar, cónyuge, hijo, etc.) y las fechas de entrada o salida."

