id: record_id
maturity: trial-use

definition:
  en: "The identifier assigned to this record by the system that created it. Used to reference the record internally; distinct from any externally meaningful business reference (for example, a payment transaction number or a civil registration number) that may also be present."
  fr: "L'identifiant attribué à cet enregistrement par le système qui l'a créé. Utilisé pour référencer l'enregistrement en interne; distinct de toute référence métier externe (par exemple, un numéro de transaction de paiement ou un numéro d'enregistrement civil) qui peut également être présente."
  es: "El identificador asignado a este registro por el sistema que lo creó. Se utiliza para referenciar el registro internamente; distinto de cualquier referencia comercial de alcance externo (por ejemplo, un número de transacción de pago o un número de registro civil) que también pueda estar presente."

type: string
cardinality: single
vocabulary: null
references: null

convergence:
  system_count: 0
  total_systems: 6
  notes: "PublicSchema abstraction. Every system of record assigns an internal row identifier, but these are not semantically exchanged between systems and are not modeled as named schema fields in the six mapped systems. `record_id` exists to give integrators a canonical slot for the originating system's identifier, not to describe a shared cross-system vocabulary."

external_equivalents:
  opencrvs:
    label: "Registration.registrationNumber"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#Registration"
    match: close
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "Both represent the official registration number issued for the civil status record. OpenCRVS also carries a separate internal trackingId which has no PublicSchema equivalent."
