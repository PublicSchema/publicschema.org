id: difficulty_learning
maturity: draft

definition:
  en: "The degree of difficulty the child experiences learning to do things, compared to children of the same age. Applies to children ages 2-17 (CFM)."
  fr: "Le degré de difficulté que l'enfant éprouve à apprendre à faire des choses, par rapport aux enfants du même âge. S'applique aux enfants de 2 à 17 ans (CFM)."
  es: "El grado de dificultad que el niño experimenta para aprender a hacer cosas, en comparación con niños de la misma edad. Se aplica a niños de 2 a 17 años (CFM)."

