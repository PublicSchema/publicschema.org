id: triggering_event
maturity: draft

definition:
  en: "The event that caused or triggered this record. The referenced event may be a VitalEvent (CRVS annotations reference a later marriage, divorce, or death on a prior vital record), a HazardEvent (humanitarian post-shock records reference a flood, earthquake, cyclone, conflict event, or drought), or any other Event subtype. The consuming concept's definition names which subtype is expected in that context."
  fr: "L'événement qui a causé ou déclenché cet enregistrement. L'événement référencé peut être un VitalEvent (les mentions d'état civil référencent un mariage, un divorce ou un décès ultérieur sur un acte antérieur), un HazardEvent (les enregistrements humanitaires post-choc référencent une inondation, un séisme, un cyclone, un événement de conflit ou une sécheresse) ou tout autre sous-type d'Event. La définition du concept consommateur précise quel sous-type est attendu dans ce contexte."
  es: "El evento que causó o desencadenó este registro. El evento referenciado puede ser un VitalEvent (las anotaciones de estado civil referencian un matrimonio, divorcio o defunción posterior sobre un acta anterior), un HazardEvent (los registros humanitarios post-choque referencian una inundación, sismo, ciclón, evento de conflicto o sequía) o cualquier otro subtipo de Event. La definición del concepto consumidor indica qué subtipo se espera en ese contexto."

type: concept:Event
cardinality: single
vocabulary: null
references: Event
