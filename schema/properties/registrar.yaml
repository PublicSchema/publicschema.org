definition:
  en: "The civil registration officer who recorded the event. In many jurisdictions this is the officer whose signature appears on the acte."
  fr: "L'officier d'état civil qui a enregistré l'événement. Dans de nombreuses juridictions, il s'agit de l'officier dont la signature figure sur l'acte."
  es: "El funcionario de registro civil que registró el evento. En muchas jurisdicciones, es el funcionario cuya firma aparece en el acta."

