id: cause_of_death
maturity: draft
label:
  en: "Cause of death"
  fr: "Cause du décès"
  es: "Causa de defunción"

definition:
  en: "A free-text description of the underlying cause of death as stated on the death certificate. Captured alongside a coded cause_of_death_code when classification is available."
  fr: "Une description en texte libre de la cause sous-jacente du décès, telle qu'indiquée sur l'acte de décès. Renseigné conjointement avec cause_of_death_code lorsqu'une classification est disponible."
  es: "Una descripción en texto libre de la causa subyacente de la defunción tal como figura en el certificado de defunción. Se captura junto con un cause_of_death_code codificado cuando hay clasificación disponible."

type: string
cardinality: single
vocabulary: null
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Cause of death declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent"
    match: exact
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no core causeOfDeath field. The field is a country-configured text field in EventConfig.declaration. Free text on both sides."
