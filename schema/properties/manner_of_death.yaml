id: manner_of_death
maturity: draft
label:
  en: "Manner of death"
  fr: "Circonstances du décès"
  es: "Circunstancias de la defunción"

definition:
  en: "The circumstances under which the death occurred: natural, accident, intentional self-harm, assault, legal intervention, war, pending investigation, or could not be determined. Follows the WHO death certificate structure."
  fr: "Les circonstances dans lesquelles le décès s'est produit : naturel, accident, violence auto-infligée intentionnelle, agression, intervention légale, guerre, enquête en cours ou indéterminé. Suit la structure du certificat médical de cause de décès de l'OMS."
  es: "Las circunstancias en las que ocurrió la defunción: natural, accidente, lesión autoinfligida intencional, agresión, intervención legal, guerra, investigación pendiente o no determinada. Sigue la estructura del certificado de defunción de la OMS."

type: string
cardinality: single
vocabulary: crvs/manner-of-death
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Manner of death declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/index.ts#deathEvent"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no core mannerOfDeath field. The field is a country-configured SELECT in EventConfig.declaration. Our manner-of-death vocabulary recommends a canonical set."
