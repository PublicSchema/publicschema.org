id: judgment_date
maturity: draft

definition:
  en: "The date of the court judgment that granted a divorce, annulment, adoption, paternity recognition, or other court-ordered vital event. Distinct from the registration date."
  fr: "La date du jugement ayant prononcé un divorce, une annulation, une adoption, une reconnaissance de paternité ou un autre événement d'état civil ordonné par tribunal. Distincte de la date d'enregistrement."
  es: "La fecha de la sentencia judicial que otorgó un divorcio, anulación, adopción, reconocimiento de paternidad u otro evento vital ordenado por tribunal. Distinta de la fecha de registro."

