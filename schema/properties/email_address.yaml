id: email_address
maturity: candidate

definition:
  en: "An email address through which the person can be contacted."
  fr: "Une adresse électronique par laquelle la personne peut être contactée."
  es: "Una dirección de correo electrónico a través de la cual se puede contactar a la persona."

type: string
cardinality: single
vocabulary: null
references: null
category: contact
schema_org_equivalent: "schema:email"

external_equivalents:
  semic:
    label: "email"
    uri: "http://data.europa.eu/m8g/email"
    match: close
    vocabulary: "Core Person"
    note: "SEMIC places email on ContactPoint, not directly on Person"

  dci:
    label: "email"
    uri: "https://schema.spdci.org/core/v1/data/email"
    match: close
    vocabulary: "DCI Core"
    note: "Same concept; DCI uses 'email', PublicSchema uses 'email_address'"
