id: annotations
maturity: draft
label:
  en: "Annotations"
  fr: "Mentions marginales"
  es: "Anotaciones marginales"

definition:
  en: "Marginal annotations (mentions marginales) added to a civil status record over time as subsequent vital events occur, such as a marriage noted on a birth record."
  fr: "Mentions marginales ajoutées à un acte d'état civil au fil du temps à mesure que surviennent des événements ultérieurs, par exemple l'indication d'un mariage en marge d'un acte de naissance."
  es: "Anotaciones marginales añadidas a un acta de estado civil a lo largo del tiempo a medida que ocurren eventos vitales posteriores, como la nota de un matrimonio consignada al margen de un acta de nacimiento."

type: concept:crvs/CivilStatusAnnotation
cardinality: multiple
