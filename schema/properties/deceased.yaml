id: deceased
maturity: draft
label:
  en: "Deceased"
  fr: "Défunt"
  es: "Fallecido"

definition:
  en: "The person whose death is recorded. Remains a Person entity so that existing identifiers and attributes can still be referenced after death."
  fr: "La personne dont le décès est enregistré. Reste une entité Personne afin que les identifiants et attributs existants puissent toujours être référencés après le décès."
  es: "La persona cuyo fallecimiento se registra. Sigue siendo una entidad Persona para que los identificadores y atributos existentes puedan consultarse tras la defunción."

type: concept:crvs/Person
cardinality: single
vocabulary: null
references: crvs/Person
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Death declaration field group (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/death/forms/pages/eventDetails.ts"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no typed deceased field at the core level. Farajaland's death declaration form defines the deceased's data as field groups in EventConfig.declaration. The semantic role matches but the structure is country-configured."
