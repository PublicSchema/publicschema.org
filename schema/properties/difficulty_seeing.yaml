id: difficulty_seeing
maturity: draft

definition:
  en: "The degree of difficulty the person experiences seeing, even when wearing glasses or contact lenses. Applies to adults (WG-SS) and to children ages 2-17 (CFM)."
  fr: "Le degré de difficulté que la personne éprouve à voir, même en portant des lunettes ou des lentilles de contact. S'applique aux adultes (WG-SS) et aux enfants de 2 à 17 ans (CFM)."
  es: "El grado de dificultad que la persona experimenta para ver, incluso usando lentes o anteojos. Se aplica a adultos (WG-SS) y a niños de 2 a 17 años (CFM)."

