id: complainant
maturity: trial-use

definition:
  en: "The person who submitted the grievance. The complainant need not be the enrolled beneficiary; community members, rejected applicants, or caretakers may also file grievances."
  fr: "La personne qui a soumis le grief. Le plaignant n'est pas nécessairement le bénéficiaire inscrit; des membres de la communauté, des demandeurs rejetés ou des aidants peuvent également déposer des griefs."
  es: "La persona que presentó la queja. El reclamante no tiene que ser el beneficiario inscrito; miembros de la comunidad, solicitantes rechazados o cuidadores también pueden presentar quejas."

