id: birth_type
maturity: draft

definition:
  en: "Whether the birth was single, twin, triplet, or higher-order multiple. Captured at the level of the delivery, not per infant."
  fr: "Indique si la naissance est unique, gémellaire, triple ou d'un ordre plus élevé. Saisie au niveau de l'accouchement, et non par nouveau-né."
  es: "Indica si el parto fue simple, gemelar, triple o de orden mayor. Se captura al nivel del parto, no por cada recién nacido."

type: string
cardinality: single
vocabulary: crvs/birth-type
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "BirthRegistration.birthType"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#BirthRegistration"
    match: close
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS types this as a free String populated from country configuration; our birth-type vocabulary recommends a canonical set of values."
