id: birth_type
maturity: draft
label:
  en: "Birth type"
  fr: "Type de naissance"
  es: "Tipo de nacimiento"

definition:
  en: "Whether the birth was single, twin, triplet, or higher-order multiple. Captured at the level of the delivery, not per infant."
  fr: "Indique si la naissance est unique, gémellaire, triple ou d'un ordre plus élevé. La valeur est enregistrée au niveau de l'accouchement, et non par nouveau-né."
  es: "Indica si el parto fue simple, gemelar, triple o de orden mayor. Se captura al nivel del parto, no por cada recién nacido."

type: string
cardinality: single
vocabulary: crvs/birth-type
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Birth type declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no core birth-type field. The field is a country-configured SELECT in EventConfig.declaration. Our birth-type vocabulary recommends a canonical set of values."
