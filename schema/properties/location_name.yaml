id: location_name
maturity: trial-use

definition:
  en: "A human-readable place name for the location."
  fr: "Un nom de lieu lisible par un humain pour la localisation."
  es: "Un nombre de lugar legible para la ubicacion."

type: string
cardinality: single
vocabulary: null
references: null

external_equivalents:
  semic:
    label: "geographicName"
    uri: "http://www.w3.org/ns/locn#geographicName"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC geographicName is the official geographic name; ours is a general location display name"

  dci:
    label: "name"
    uri: "https://schema.spdci.org/core/v1/data/Place/name"
    match: close
    vocabulary: "DCI Core"
    note: "Both are human-readable location names; DCI uses Place.name"
convergence:
  system_count: 6
  total_systems: 6
  notes: "Universal across all 6 mapped systems. The most consistently captured location property."
