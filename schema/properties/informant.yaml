id: informant
maturity: draft
label:
  en: "Informant"
  fr: "Déclarant"
  es: "Declarante"

definition:
  en: "The person who declares the vital event to the civil registration authority. Typically a parent for births, a relative or medical professional for deaths, or the parties themselves for marriages."
  fr: "La personne qui déclare l'événement à l'autorité d'état civil. Habituellement un parent pour les naissances, un proche ou un professionnel de santé pour les décès, ou les parties elles-mêmes pour les mariages."
  es: "La persona que declara el evento vital ante la autoridad de registro civil. Típicamente un padre o madre en nacimientos, un familiar o profesional médico en defunciones, o las propias partes en matrimonios."

type: concept:crvs/Person
cardinality: single
vocabulary: null
references: crvs/Person
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Informant declaration field group (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/informant.ts"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2, informant data lives in country-configured EventConfig.declaration fields. Farajaland's birth declaration defines an informant field group. The semantic role matches but the structure is country-configured."
