id: difficulty_walking_100m
maturity: draft

definition:
  en: "The degree of difficulty the person experiences walking 100 metres (about the length of a football field) on level ground, without using any aid. Applies to adults (WG-ES MOB_4) and to children ages 5-17 (CFM CF8 / CF10, with and without aid variants; CF12 comparative). For children ages 2-4 the CFM uses a generic 'walking' stem; see difficulty_walking."
  fr: "Le degré de difficulté que la personne éprouve à marcher 100 mètres (environ la longueur d'un terrain de football) sur un sol plat, sans utiliser d'aide. S'applique aux adultes (WG-ES MOB_4) et aux enfants de 5 à 17 ans (CFM CF8 / CF10, avec ou sans aide; CF12 comparatif). Pour les enfants de 2 à 4 ans, le CFM utilise une question générique; voir difficulty_walking."
  es: "El grado de dificultad que la persona experimenta al caminar 100 metros (aproximadamente el largo de un campo de fútbol) sobre terreno plano, sin usar ningún tipo de ayuda. Se aplica a adultos (WG-ES MOB_4) y a niños de 5 a 17 años (CFM CF8 / CF10, con y sin ayuda; CF12 comparativo). Para niños de 2 a 4 años, el CFM utiliza una pregunta genérica; véase difficulty_walking."

