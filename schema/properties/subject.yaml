definition:
  en: "The person or group that the profile or scoring event is about. Ranged at Party (not Agent) because Profiles observe receivers: persons and organised groups of persons (Household, Family, Farm). Institutional actors (Organizations) are described through their own Organization records, not as subjects of a Profile."
  fr: "La personne ou le groupe sur lequel porte le profil ou l'événement de notation. Typé sur Party (et non Agent) parce que les Profiles observent des bénéficiaires : personnes et groupes organisés de personnes (Household, Family, Farm). Les acteurs institutionnels (Organizations) sont décrits par leurs propres enregistrements Organization, non comme sujets d'un Profile."
  es: "La persona o grupo sobre el que trata el perfil o evento de puntuación. Tipado como Party (no Agent) porque los Profile observan receptores: personas y grupos organizados de personas (Household, Family, Farm). Los actores institucionales (Organizations) se describen mediante sus propios registros Organization, no como sujetos de un Profile."

