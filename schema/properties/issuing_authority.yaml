id: issuing_authority
maturity: normative
label:
  en: "Issuing authority"
  fr: "Autorité émettrice"
  es: "Autoridad emisora"

definition:
  en: "The organization or government body that issued the document or credential, captured as a free-text name. For a structured Agent reference use issuer instead: Document records prefer issuer, and issuing_authority remains for cases where only a textual name is available."
  fr: "L'organisation ou l'organe gouvernemental qui a délivré le document ou l'attestation, consigné sous forme de nom en texte libre. Pour une référence structurée à un Agent, utilisez plutôt issuer : les enregistrements Document privilégient issuer, et issuing_authority reste utile lorsque seul un nom textuel est disponible."
  es: "La organización o entidad gubernamental que emitió el documento o la credencial, registrada como nombre en texto libre. Para una referencia estructurada a un Agent utilice issuer en su lugar: los registros Document prefieren issuer, e issuing_authority queda disponible cuando solo se dispone de un nombre textual."

type: string
cardinality: single
vocabulary: null
references: null

external_equivalents:
  semic:
    label: "creator"
    uri: "http://purl.org/dc/terms/creator"
    match: close
    vocabulary: "Core Person"
    note: "SEMIC uses dc:creator as an object property; ours is a string name of the issuing authority"

convergence:
  system_count: 0
  total_systems: 5
  notes: "Not found in any of the 5 mapped systems. Considered best practice for identity verification but rarely captured in current social protection systems."
