id: attendant_at_birth
maturity: draft
label:
  en: "Attendant at birth"
  fr: "Personnel présent à la naissance"
  es: "Asistente en el parto"

definition:
  en: "The type of person who attended the delivery (physician, midwife, nurse, traditional birth attendant, other, or none). Used as a proxy for safe delivery in health statistics."
  fr: "Le type de personne ayant assisté à l'accouchement (médecin, sage-femme, infirmier, accoucheuse traditionnelle, autre ou aucune). Utilisé comme indicateur d'accouchement en sécurité dans les statistiques de santé."
  es: "El tipo de persona que atendió el parto (médico, partera profesional, enfermero/a, partera tradicional, otro o ninguno). Utilizado como indicador de parto seguro en las estadísticas de salud."

type: string
cardinality: single
vocabulary: crvs/birth-attendant
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Attendant at birth declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/index.ts#birthEvent"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no core attendantAtBirth field. The field is a country-configured SELECT in EventConfig.declaration. Our birth-attendant vocabulary recommends a canonical set of values."
