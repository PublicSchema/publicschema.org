    label: "BirthRegistration.attendantAtBirth"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#BirthRegistration"
    match: close
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS types this as a free String populated from country configuration; our birth-attendant vocabulary recommends a canonical set of values."
