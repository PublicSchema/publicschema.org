id: weight
maturity: draft

definition:
  en: "The weight of the fetus at the time of a fetal death, recorded in grams. Combined with gestational age, used to classify viability and stillbirth type."
  fr: "Le poids du fœtus au moment de la mortinaissance, enregistré en grammes. Combiné à l'âge gestationnel, sert à classer la viabilité et le type de mortinaissance."
  es: "El peso del feto al momento de la muerte fetal, registrado en gramos. Combinado con la edad gestacional, se utiliza para clasificar la viabilidad y el tipo de mortinato."

