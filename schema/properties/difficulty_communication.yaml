id: difficulty_communication
maturity: draft

definition:
  en: "The degree of difficulty the person experiences communicating, for example understanding or being understood, using their usual language. Applies to adults (WG-SS / WG-ES collapsed item). For children the CFM splits this into separate receptive and expressive items per age band; see difficulty_understanding_others, difficulty_being_understood, difficulty_being_understood_inside_household, difficulty_being_understood_outside_household."
  fr: "Le degré de difficulté que la personne éprouve à communiquer, par exemple à comprendre ou à se faire comprendre, dans sa langue habituelle. S'applique aux adultes (item collapsé WG-SS / WG-ES). Pour les enfants, le CFM scinde cet item en éléments réceptifs et expressifs distincts selon l'âge; voir difficulty_understanding_others, difficulty_being_understood, difficulty_being_understood_inside_household, difficulty_being_understood_outside_household."
  es: "El grado de dificultad que la persona experimenta al comunicarse, por ejemplo al entender o al hacerse entender, en su idioma habitual. Se aplica a adultos (ítem agrupado WG-SS / WG-ES). Para niños, el CFM divide este ítem en elementos receptivos y expresivos por franja de edad; véase difficulty_understanding_others, difficulty_being_understood, difficulty_being_understood_inside_household, difficulty_being_understood_outside_household."

type: string
cardinality: single
