id: event_date
maturity: draft
label:
  en: "Event date"
  fr: "Date de l'événement"
  es: "Fecha del evento"

definition:
  en: "The date on which the vital event (birth, death, marriage, etc.) occurred. Distinct from the registration date, which is when the event was recorded by a registration authority."
  fr: "La date à laquelle l'événement d'état civil (naissance, décès, mariage, etc.) s'est produit. Distincte de la date d'enregistrement, qui est la date à laquelle l'événement a été consigné par une autorité d'enregistrement."
  es: "La fecha en que ocurrió el evento vital (nacimiento, defunción, matrimonio, etc.). Distinta de la fecha de registro, que es cuando el evento fue registrado por una autoridad de registro."

type: date
cardinality: single
vocabulary: null
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "EventMetadata.dateOfEvent (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata"
    match: related
    vocabulary: "OpenCRVS v2 event service"
    note: "In v2, EventMetadata.dateOfEvent is a nullable date field set from the country-configured declaration field referenced by EventConfig.dateOfEvent. For births, Farajaland uses the child's date of birth; for deaths, the date of death. No top-level event date exists at the v2 core level independent of country configuration."
