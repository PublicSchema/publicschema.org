id: depression_medication
maturity: draft

definition:
  en: "Whether the person takes medication for depression. Applies to adults (WG-ES DEP_2). This filter is used to interpret depression_frequency answers, which are asked about symptoms while on medication if the person takes any."
  fr: "Si la personne prend un traitement pour la dépression. S'applique aux adultes (WG-ES DEP_2). Ce filtre sert à interpréter les réponses à depression_frequency, qui sont posées à propos des symptômes sous traitement si la personne en prend un."
  es: "Si la persona toma medicación para la depresión. Se aplica a adultos (WG-ES DEP_2). Este filtro se usa para interpretar las respuestas de depression_frequency, que se formulan sobre los síntomas bajo medicación si la persona la toma."

