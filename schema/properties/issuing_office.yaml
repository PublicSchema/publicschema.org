id: issuing_office
maturity: draft
label:
  en: "Issuing office"
  fr: "bureau émetteur"
  es: "oficina emisora"

definition:
  en: "The civil registration or judicial office that issued the certificate. May differ from the office that holds the underlying record, for example when an embassy issues a certificate based on a record held elsewhere."
  fr: "Le bureau d'état civil ou l'office judiciaire qui a délivré le certificat. Peut différer du bureau qui conserve l'acte sous-jacent, par exemple lorsqu'une ambassade délivre un certificat sur la base d'un acte conservé ailleurs."
  es: "La oficina de registro civil o la oficina judicial que emitió el certificado. Puede diferir de la oficina que conserva el acta subyacente, por ejemplo cuando una embajada emite un certificado a partir de un acta conservada en otro lugar."

