id: registration_number
maturity: draft

definition:
  en: "The unique number assigned by the civil registration authority when the vital event is registered. Serves as the primary reference for retrieving the official record."
  fr: "Le numéro unique attribué par l'autorité d'état civil lors de l'enregistrement de l'événement. Sert de référence principale pour retrouver l'acte officiel."
  es: "El número único asignado por la autoridad de registro civil cuando se registra el evento vital. Sirve como referencia principal para recuperar el registro oficial."

type: concept:Identifier
cardinality: single
