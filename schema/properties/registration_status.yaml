id: registration_status
maturity: draft
label:
  en: "Registration status"
  fr: "Statut de l'enregistrement"
  es: "Estado del registro"

definition:
  en: "The lifecycle state of the registration process for this vital event: whether it is declared, pending validation, registered, rejected, cancelled, or has been corrected or archived."
  fr: "L'état du cycle de vie du processus d'enregistrement pour cet événement d'état civil: déclaré, en attente de validation, enregistré, rejeté, annulé, corrigé ou archivé."
  es: "El estado del ciclo de vida del proceso de registro para este evento vital: declarado, pendiente de validación, registrado, rechazado, cancelado, corregido o archivado."

type: string
cardinality: single
vocabulary: crvs/registration-status
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Registration.status[].type"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#RegStatus"
    match: related
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS tracks a full workflow as Registration.status (array of RegWorkflow entries); the current registration status is the type on the most recent entry. PublicSchema records only the current status, not the workflow history."
