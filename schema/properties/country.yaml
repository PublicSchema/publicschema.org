id: country
maturity: trial-use

definition:
  en: "The country, expressed as an ISO 3166-1 alpha-2 code where possible."
  fr: "Le pays, exprime sous forme de code ISO 3166-1 alpha-2 si possible."
  es: "El pais, expresado como codigo ISO 3166-1 alfa-2 cuando sea posible."

type: string
cardinality: single
vocabulary: country
references: null
schema_org_equivalent: "schema:addressCountry"

external_equivalents:
  semic:
    label: "adminUnitL1"
    uri: "http://www.w3.org/ns/locn#adminUnitL1"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC adminUnitL1 is the top-level admin unit (country); ours is explicitly a country field with ISO 3166 coding"

  dci:
    label: "country_code"
    uri: "https://schema.spdci.org/core/v1/data/country_code"
    match: close
    vocabulary: "DCI Core"
    note: "Both capture the country; DCI field is 'country_code'"
convergence:
  system_count: 3
  total_systems: 5
  notes: "Present in 3 of 5 mapped systems. Typically only relevant for systems operating across multiple countries or managing migrant populations."
