id: witnesses
maturity: draft

definition:
  en: "People who witnessed the vital event and attested to it at the time of registration. Witness requirements vary by jurisdiction and event type (marriages most commonly require them)."
  fr: "Personnes qui ont été témoins de l'événement d'état civil et qui l'ont attesté au moment de l'enregistrement. Les exigences en matière de témoins varient selon la juridiction et le type d'événement (les mariages en exigent le plus souvent)."
  es: "Personas que presenciaron el evento vital y lo atestiguaron al momento del registro. Los requisitos de testigos varían según la jurisdicción y el tipo de evento (los matrimonios los exigen con mayor frecuencia)."

type: concept:Person
cardinality: multiple
vocabulary: null
references: Person
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "MarriageRegistration.witnessOne + MarriageRegistration.witnessTwo"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#MarriageRegistration"
    match: broad
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS uses exactly two named slots (witnessOne, witnessTwo); our witnesses list has unlimited cardinality."
