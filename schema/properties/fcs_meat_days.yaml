id: fcs_meat_days
maturity: draft

definition:
  en: "Number of days in the past seven during which any member of the household consumed meat (beef, goat, poultry, pork, bushmeat). Part of the WFP Food Consumption Score (FCS)."
  fr: "Nombre de jours au cours des sept derniers jours pendant lesquels au moins un membre du ménage a consommé de la viande (bœuf, chèvre, volaille, porc, viande de brousse). Fait partie du Score de consommation alimentaire (FCS) du PAM."
  es: "Número de días en los últimos siete en que algún miembro del hogar consumió carne (res, cabra, aves, cerdo, carne de monte). Forma parte del Puntaje de Consumo de Alimentos (FCS) del PMA."

type: integer
cardinality: single
vocabulary: null
references: null
category: food_security
valid_instruments: [wfp_fcs, wfp_cari]
