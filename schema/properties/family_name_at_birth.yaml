id: family_name_at_birth
maturity: trial-use

definition:
  en: "The family name of the person at the time of birth, before any change due to marriage or other legal event."
  fr: "Le nom de famille de la personne au moment de la naissance, avant tout changement du a un mariage ou autre evenement juridique."
  es: "El apellido de la persona en el momento del nacimiento, antes de cualquier cambio debido a matrimonio u otro evento legal."

type: string
cardinality: single
vocabulary: null
references: null
schema_org_equivalent: null

external_equivalents:
  semic:
    label: "birthName"
    uri: "http://www.w3.org/ns/person#birthName"
    match: broad
    vocabulary: "Core Person"
    note: "SEMIC birthName is the full name at birth; ours is only the family name component"

  dci:
    label: "maiden_name"
    uri: "https://schema.spdci.org/core/v1/data/maiden_name"
    match: close
    vocabulary: "SPDCI Core"
    note: "DCI 'maiden_name' is a specific sub-case; PublicSchema 'family_name_at_birth' covers any legal name change"
convergence:
  system_count: 0
  total_systems: 6
  notes: "Not present in original convergence systems. Added based on EBSI PID/PDA1/ELM schema analysis."
