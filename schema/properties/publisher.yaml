id: publisher
maturity: draft
label:
  en: "Publisher"
  fr: "éditeur"
  es: "Editor"

definition:
  en: "The agent that publishes or maintains the specification: an instrument, scoring rule, benefit schedule, or a software agent record. Typically an Organization (for example, the Washington Group on Disability Statistics, UNICEF, the SMART initiative, the openIMIS Initiative, a national statistics office, or the government ministry that publishes a benefit schedule), but may be a named Person for standards methodologies and individual research publications. A SoftwareAgent is not expected to appear here: the publisher of a SoftwareAgent record is the Person or Organization that publishes the software, not another piece of software. The type system admits SoftwareAgent via the Agent supertype, but that case is excluded by convention."
  fr: "L'agent qui publie ou maintient la spécification : un instrument, une règle de notation, un calendrier des prestations ou un enregistrement d'agent logiciel. Généralement une Organization (par exemple, le Washington Group on Disability Statistics, l'UNICEF, l'initiative SMART, l'initiative openIMIS, un institut national de statistique ou le ministère qui publie un calendrier des prestations), mais peut être une Person nommée pour des méthodologies normatives ou des publications de recherche individuelles. Un SoftwareAgent n'est pas attendu à cet emplacement : l'éditeur d'un enregistrement SoftwareAgent est la Person ou l'Organization qui publie le logiciel, et non un autre logiciel. Le système de types admet SoftwareAgent via le supertype Agent, mais ce cas est exclu par convention."
  es: "El agente que publica o mantiene la especificación: un instrumento, una regla de puntuación, un calendario de prestaciones o un registro de agente de software. Normalmente una Organization (por ejemplo, el Washington Group on Disability Statistics, UNICEF, la iniciativa SMART, la iniciativa openIMIS, una oficina nacional de estadística o el ministerio que publica un calendario de prestaciones), pero puede ser una Person nombrada para metodologías normativas o publicaciones de investigación individuales. No se espera que aparezca un SoftwareAgent en esta posición: el editor de un registro SoftwareAgent es la Person o la Organization que publica el software, no otro software. El sistema de tipos admite SoftwareAgent a través del supertipo Agent, pero ese caso queda excluido por convención."

