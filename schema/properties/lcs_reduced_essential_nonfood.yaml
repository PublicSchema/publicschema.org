id: lcs_reduced_essential_nonfood
maturity: draft

definition:
  en: "Frequency with which the household reduced essential non-food spending, specifically health care, preventing access to needed treatment in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier."
  fr: "Fréquence à laquelle le ménage a réduit ses dépenses non alimentaires essentielles, plus précisément les soins de santé, empêchant l'accès aux traitements nécessaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise."
  es: "Frecuencia con la que el hogar redujo gastos no alimentarios esenciales, específicamente la atención sanitaria, impidiendo el acceso al tratamiento necesario en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
