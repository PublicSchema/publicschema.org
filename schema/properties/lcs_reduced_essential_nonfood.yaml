id: lcs_reduced_essential_nonfood
maturity: draft

definition:
  en: "Frequency with which the household reduced essential non-food expenses, including health care, to meet food needs in the past 30 days. Part of the WFP Livelihood Coping Strategies (LCS) module, crisis tier."
  fr: "Fréquence à laquelle le ménage a réduit ses dépenses non alimentaires essentielles, y compris les soins de santé, pour répondre à ses besoins alimentaires au cours des trente derniers jours. Fait partie du module des stratégies de moyens d'existence (LCS) du PAM, niveau de crise."
  es: "Frecuencia con la que el hogar redujo gastos no alimentarios esenciales, incluida la atención de salud, para cubrir sus necesidades alimentarias en los últimos treinta días. Forma parte del módulo de Estrategias de Medios de Vida (LCS) del PMA, nivel de crisis."

type: string
cardinality: single
vocabulary: lcs-frequency
references: null
category: food_security
valid_instruments: [wfp_lcs, wfp_cari]
