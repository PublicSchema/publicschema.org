id: evaluator
maturity: draft
label:
  en: "Evaluator"
  fr: "Évaluateur"
  es: "Evaluador"

definition:
  en: "The agent (field officer or agency) accountable for the scoring. Typically a Person or an Organization. When the computation was executed by software, record the tool separately as software_used; evaluator identifies who is responsible, not what ran the calculation."
  fr: "L'agent (agent de terrain ou organisme) responsable de la notation. Généralement une Person ou une Organization. Lorsque le calcul a été effectué par un logiciel, enregistrez l'outil séparément via software_used ; evaluator identifie qui est responsable, et non ce qui a exécuté le calcul."
  es: "El agente (agente de campo u organismo) responsable de la puntuación. Normalmente una Person o una Organization. Cuando el cálculo fue ejecutado por software, registre la herramienta por separado mediante software_used; evaluator identifica quién es responsable, no qué ejecutó el cálculo."

type: concept:Agent
