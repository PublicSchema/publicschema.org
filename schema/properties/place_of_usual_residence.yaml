id: place_of_usual_residence
maturity: draft
label:
  en: "Place of usual residence"
  fr: "Lieu de résidence habituelle"
  es: "Lugar de residencia habitual"

definition:
  en: "The usual place of residence of the person at the time of the vital event. Used by national statistics offices to allocate vital events to the place where people live, not only where events occur."
  fr: "Le lieu de résidence habituelle de la personne au moment de l'événement d'état civil. Utilisé par les bureaux nationaux de statistiques pour attribuer les événements d'état civil au lieu de vie des personnes, et non uniquement au lieu où l'événement s'est produit."
  es: "El lugar de residencia habitual de la persona al momento del evento vital. Usado por las oficinas nacionales de estadística para asignar los eventos vitales al lugar donde viven las personas, no solo donde ocurren los eventos."

type: concept:Location
cardinality: single
