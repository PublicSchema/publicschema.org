id: nationality
maturity: trial-use

definition:
  en: "The country of citizenship or nationality, expressed as an ISO 3166-1 alpha-2 code where possible."
  fr: "Le pays de citoyenneté ou de nationalité, exprimé sous forme de code ISO 3166-1 alpha-2 lorsque possible."
  es: "El pais de ciudadania o nacionalidad, expresado preferiblemente como codigo ISO 3166-1 alfa-2."

type: string
cardinality: single
vocabulary: country
references: null

external_equivalents:
  semic:
    label: "citizenship"
    uri: "http://www.w3.org/ns/person#citizenship"
    match: broad
    vocabulary: "Core Person"
    note: "SEMIC citizenship is an object property linking to a Jurisdiction; ours is a coded string (ISO 3166). Also, citizenship has legal connotations that nationality does not always carry."

convergence:
  system_count: 3
  total_systems: 6
  notes: "Present in 3 of 6 mapped systems. More common in systems handling migrants or refugees."
