id: difficulty_concentrating
maturity: draft

definition:
  en: "The degree of difficulty the child experiences concentrating on an activity they enjoy doing. Applies to children ages 5-17 (CFM). Paired with difficulty_remembering; the WG-SS difficulty_cognition property bundles both into a single question for adults."
  fr: "Le degré de difficulté que l'enfant éprouve à se concentrer sur une activité qu'il aime faire. S'applique aux enfants de 5 à 17 ans (CFM). Associé à difficulty_remembering; la propriété WG-SS difficulty_cognition regroupe les deux en une seule question pour les adultes."
  es: "El grado de dificultad que el niño experimenta para concentrarse en una actividad que disfruta. Se aplica a niños de 5 a 17 años (CFM). Se combina con difficulty_remembering; la propiedad WG-SS difficulty_cognition agrupa ambos en una sola pregunta para adultos."

type: string
cardinality: single
