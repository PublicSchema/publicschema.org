id: sex_at_birth
maturity: draft
label:
  en: "Sex at birth"
  fr: "Sexe à la naissance"
  es: "Sexo al nacer"

definition:
  en: "The sex of the child as observed and recorded at the time of birth. Distinct from any later legal or administrative sex marker."
  fr: "Le sexe de l'enfant tel qu'observé et consigné au moment de la naissance. Distinct de tout marqueur de sexe légal ou administratif ultérieur."
  es: "El sexo del niño o de la niña tal como se observa y registra en el momento del nacimiento. Distinto de cualquier marcador de sexo legal o administrativo posterior."

type: string
cardinality: single
vocabulary: sex
references: null
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Child gender/sex declaration field (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no core gender/sex enum. Farajaland's birth declaration defines a gender field on the child field group as a country-configured SELECT. The sex vocabulary system_mappings apply."
