id: street_address
maturity: draft

definition:
  en: "The street name, number, and any apartment or building identifiers."
  fr: "Le nom de la rue, le numero et tout identifiant d'appartement ou de batiment."
  es: "El nombre de la calle, numero y cualquier identificador de apartamento o edificio."

type: string
cardinality: single
vocabulary: null
references: null
schema_org_equivalent: "schema:streetAddress"

external_equivalents:
  semic:
    label: "thoroughfare"
    uri: "http://www.w3.org/ns/locn#thoroughfare"
    match: close
    vocabulary: "Core Location"
    note: "SEMIC thoroughfare is specifically the street name; ours may include the full street line with number"

  dci:
    label: "address_line_1"
    uri: "https://schema.spdci.org/core/v1/data/address_line_1"
    match: close
    vocabulary: "SPDCI Core"
    note: "PublicSchema uses a single street_address field; DCI splits into address_line_1 and address_line_2"
convergence:
  system_count: 3
  total_systems: 5
  notes: "Present in 3 of 5 mapped systems. Often stored as a single free-text field rather than parsed into sub-components."
