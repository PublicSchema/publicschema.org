id: difficulty_hearing_quiet_room
maturity: draft

definition:
  en: "The degree of difficulty the person experiences hearing what is said in a conversation with one other person in a quiet room, with their hearing aid in use if they wear one. Applies to adults (WG-ES HEAR_4)."
  fr: "Le degré de difficulté que la personne éprouve à entendre ce qui se dit dans une conversation avec une autre personne dans une pièce calme, avec son appareil auditif en place si elle en porte un. S'applique aux adultes (WG-ES HEAR_4)."
  es: "El grado de dificultad que la persona experimenta al oír lo que se dice en una conversación con otra persona en una habitación silenciosa, con el audífono puesto si lo usa. Se aplica a adultos (WG-ES HEAR_4)."

type: string
cardinality: single
