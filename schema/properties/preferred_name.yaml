id: preferred_name
maturity: candidate

definition:
  en: "The name a person is commonly known by, when it differs from their legal name. Covers chosen names, professional names, and naming conventions where given name plus family name is insufficient."
  fr: "Le nom sous lequel une personne est couramment connue, lorsqu'il diffère de son nom légal. Couvre les noms choisis, les noms professionnels et les conventions de dénomination où prénom et nom de famille sont insuffisants."
  es: "El nombre por el que una persona es comúnmente conocida, cuando difiere de su nombre legal. Cubre nombres de elección, nombres profesionales y convenciones de denominación donde nombre y apellido son insuficientes."

type: string
cardinality: single
vocabulary: null
references: null
category: identity
schema_org_equivalent: "schema:alternateName"

external_equivalents:
  semic:
    label: "alternative"
    uri: "http://purl.org/dc/terms/alternative"
    match: close
    vocabulary: "Core Person"
    note: "SEMIC uses dc:alternative for any alternative name; ours is specifically the preferred display name"

  dci:
    label: "given_name"
    uri: "https://schema.spdci.org/core/v1/data/given_name"
    match: broad
    vocabulary: "DCI Core"
    note: "DCI has no preferred or chosen name concept; closest is the generic given_name field"
convergence:
  system_count: 0
  total_systems: 6
  notes: "Not present in original convergence systems. Added based on EBSI PID/PDA1/ELM schema analysis."
