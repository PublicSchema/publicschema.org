id: event_location
maturity: draft
label:
  en: "Event location"
  fr: "Lieu de l'événement"
  es: "Lugar del evento"

definition:
  en: "The specific place where the vital event occurred (for example, the hospital of birth or the place of death). Distinct from the registration location, which is where the event was recorded."
  fr: "Le lieu précis où l'événement d'état civil s'est produit (par exemple, l'hôpital de naissance ou le lieu du décès). Distinct du lieu d'enregistrement, qui est l'endroit où l'événement a été consigné."
  es: "El lugar específico donde ocurrió el evento vital (por ejemplo, el hospital de nacimiento o el lugar de defunción). Distinto del lugar de registro, que es donde se registró el evento."

type: concept:Location
cardinality: single
vocabulary: null
references: Location
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "EventMetadata.placeOfEvent (UUID reference)"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/commons/src/events/EventMetadata.ts#EventMetadata"
    match: close
    vocabulary: "OpenCRVS v2 event service"
    note: "In v2, EventMetadata.placeOfEvent is a nullable UUID referencing a location in the Location service. Farajaland's EventConfig sets this from a country-configured location picker field. The semantic role (where the event occurred) aligns well."
