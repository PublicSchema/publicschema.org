id: parents
maturity: draft
label:
  en: "Parents"
  fr: "parents"
  es: "progenitores"

definition:
  en: "The parents of the child, each captured as a Parent link entity that combines a Person with a parental role (biological mother, adoptive father, etc.)."
  fr: "Les parents de l'enfant, chacun représenté par une entité de lien Parent qui associe une Personne à un rôle parental (mère biologique, père adoptif, etc.)."
  es: "Los padres del niño o de la niña, cada uno representado por una entidad de enlace Parent que combina una Persona con un rol parental (madre biológica, padre adoptivo, etc.)."

type: concept:Parent
cardinality: multiple
vocabulary: null
references: Parent
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "BirthRegistration.mother + BirthRegistration.father"
    uri: "https://github.com/opencrvs/opencrvs-core/blob/develop/packages/client/src/tests/schema.graphql#BirthRegistration"
    match: broad
    vocabulary: "OpenCRVS v1 GraphQL"
    note: "OpenCRVS splits parents across two gendered slots (mother, father); our parents list wraps each Person in a Parent link entity with an explicit parental_role. OpenCRVS v1 has no slot for adoptive, legal, or surrogate roles."
