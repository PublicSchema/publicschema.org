id: parents
maturity: draft
label:
  en: "Parents"
  fr: "Parents"
  es: "Progenitores"

definition:
  en: "The parents of the child, each captured as a Parent link entity that combines a Person with a parental role-nature (biological, gestational, legal, or adoptive)."
  fr: "Les parents de l'enfant, chacun représenté par une entité de lien Parent qui associe une Personne à une nature de rôle parental (biologique, gestationnel, légal ou adoptif)."
  es: "Los progenitores del niño o de la niña, cada uno representado por una entidad de enlace Parent que combina una Persona con una naturaleza de rol parental (biológico, gestacional, legal o adoptivo)."

type: concept:crvs/Parent
cardinality: multiple
vocabulary: null
references: crvs/Parent
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Birth declaration field groups (mother.*, father.*, country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/mother.ts"
    match: broad
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there are no typed mother/father fields at the core level. Farajaland's birth declaration form defines separate 'mother' and 'father' field groups in EventConfig.declaration using key prefixes. The semantic role matches but the structure is country-configured."
