id: is_enrolled
maturity: candidate

definition:
  en: "Whether the person is currently enrolled in a program. Designed for verifiable credentials where enrollment status must be disclosed without revealing the specific program or detailed enrollment state. For operational queries, use enrollment_status instead."
  fr: "Indique si la personne est actuellement inscrite dans un programme. Conçu pour les justificatifs vérifiables où le statut d'inscription doit être divulgué sans révéler le programme spécifique ou l'état détaillé de l'inscription. Pour les requêtes opérationnelles, utiliser enrollment_status."
  es: "Indica si la persona está actualmente inscrita en un programa. Diseñado para credenciales verificables donde el estado de inscripción debe divulgarse sin revelar el programa específico o el estado detallado de inscripción. Para consultas operacionales, usar enrollment_status."

type: boolean
cardinality: single
