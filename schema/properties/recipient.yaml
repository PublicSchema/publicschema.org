id: recipient
maturity: candidate
label:
  en: "Recipient"
  fr: "Destinataire du paiement"
  es: "Beneficiario"

definition:
  en: "The person or group that received or is intended to receive the payment. The recipient may differ from the enrolled beneficiary, for example when a guardian, payment proxy, or survivor collects on behalf of the beneficiary."
  fr: "La personne ou le groupe qui a reçu ou est destiné à recevoir le paiement. Le destinataire peut différer du bénéficiaire inscrit, par exemple lorsqu'un tuteur, un mandataire de paiement ou un survivant perçoit au nom du bénéficiaire."
  es: "La persona o el grupo que recibió o está destinado a recibir el pago. El destinatario puede diferir del beneficiario inscrito, por ejemplo cuando un tutor, apoderado de pago o sobreviviente cobra en nombre del beneficiario."

