id: difficulty_being_understood_inside_household
maturity: draft

definition:
  en: "The degree of difficulty people inside the household have understanding the child when (name) speaks, compared to children of the same age. Applies to children ages 5-17 (CFM CF15)."
  fr: "Le degré de difficulté qu'ont les personnes du ménage à comprendre l'enfant lorsqu'il parle, par rapport aux enfants du même âge. S'applique aux enfants de 5 à 17 ans (CFM CF15)."
  es: "El grado de dificultad que tienen las personas dentro del hogar para entender al niño cuando habla, en comparación con niños de la misma edad. Se aplica a niños de 5 a 17 años (CFM CF15)."

type: string
cardinality: single
vocabulary: functional-difficulty-severity
references: null
category: child_functioning
sensitivity: sensitive
age_applicability:
  - child_5_17
valid_instruments: [cfm_2_4]
