definition:
  en: "The number of current spouses the person has. Captures polygamous or polyandrous union type separately from marital status, following the UN census framework and DHS approach."
  fr: "Le nombre de conjoints actuels de la personne. Capture le type d'union polygame ou polyandrique séparément du statut matrimonial, suivant le cadre du recensement des Nations Unies et l'approche EDS."
  es: "El número de cónyuges actuales de la persona. Captura el tipo de unión polígama o poliándrica por separado del estado civil, siguiendo el marco del censo de las Naciones Unidas y el enfoque EDS."

