id: parental_role
maturity: draft
label:
  en: "Parental role"
  fr: "Rôle parental"
  es: "Rol parental"

definition:
  en: "The role-nature of the parent relationship (biological, gestational, legal, or adoptive), decoupled from gender. Makes the nature of parentage explicit and separable from the parent's identity. For jurisdictions requiring gendered or positional labels on the printed certificate, use certificate_label alongside this property."
  fr: "La nature du rôle parental (biologique, gestationnel, légal ou adoptif), découplée du genre. Rend explicite et séparable la nature de la parenté par rapport à l'identité du parent. Pour les juridictions qui exigent des étiquettes genrées ou positionnelles sur le certificat imprimé, utilisez certificate_label en complément de cette propriété."
  es: "La naturaleza del rol parental (biológico, gestacional, legal o adoptivo), desacoplada del género. Hace explícita y separable la naturaleza de la parentalidad respecto a la identidad del progenitor. Para las jurisdicciones que exigen etiquetas de género o posicionales en el certificado impreso, use certificate_label junto con esta propiedad."

