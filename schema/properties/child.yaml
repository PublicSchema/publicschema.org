id: child
maturity: draft
label:
  en: "Child"
  fr: "Enfant"
  es: "Niño o niña"

definition:
  en: "The child whose birth, adoption, or legitimation is recorded in this event."
  fr: "L'enfant dont la naissance, l'adoption ou la légitimation est consignée dans cet événement."
  es: "El niño o la niña cuyo nacimiento, adopción o legitimación se registra en este evento."

type: concept:crvs/Person
cardinality: single
vocabulary: null
references: crvs/Person
domain_override: crvs

external_equivalents:
  opencrvs:
    label: "Birth declaration field group (country-configured)"
    uri: "https://github.com/opencrvs/opencrvs-farajaland/blob/develop/src/events/birth/forms/pages/child.ts"
    match: close
    vocabulary: "OpenCRVS v2 country config (Farajaland)"
    note: "In v2 there is no typed child field at the core level. Farajaland's birth declaration form defines a 'child' field group (child.firstname, child.surname, child.dob, child.gender, etc.) in EventConfig.declaration. The semantic role matches but the structure is entirely country-configured."
