id: mother
maturity: draft
label:
  en: "Mother"
  fr: "Mère"
  es: "Madre"

definition:
  en: "A convenience reference to the Parent instance whose parental_role is gestational (or, where no gestational parent is recorded, whose certificate_label indicates 'mother'). Retained for compatibility with UN DESA Principles and Recommendations for a Vital Statistics System, Rev 3 (2014), which organizes birth-statistics variables under 'Characteristics of the mother' (Table III.1). Systems that satisfy UN DESA Rev 3 tabulation requirements can derive the 'mother' statistical category by mapping parental_role: gestational to 'mother'. This is a statistical-tabulation helper field, not a modelling assertion that only one parent is a 'mother' or that parenthood is gendered."
  fr: "Référence pratique à l'instance de Parent dont le parental_role est gestationnel (ou, en l'absence de parent gestationnel enregistré, dont le certificate_label indique 'mère'). Conservé pour la compatibilité avec les Principes et recommandations pour un système de statistiques de l'état civil de l'ONU DESA, Rév. 3 (2014), qui organise les variables statistiques relatives aux naissances sous 'Caractéristiques de la mère' (Tableau III.1). Les systèmes qui satisfont aux exigences de tabulation de l'ONU DESA Rév. 3 peuvent dériver la catégorie statistique 'mère' en associant parental_role : gestationnel à 'mère'. Ce champ est un auxiliaire de tabulation statistique, et non une affirmation de modélisation selon laquelle un seul parent serait une 'mère' ou que la parenté serait genrée."
  es: "Referencia de conveniencia a la instancia de Parent cuyo parental_role es gestacional (o, cuando no se registra ningún progenitor gestacional, cuyo certificate_label indica 'madre'). Se conserva para compatibilidad con los Principios y Recomendaciones para un Sistema de Estadísticas Vitales de ONU DESA, Rev. 3 (2014), que organiza las variables estadísticas de nacimientos bajo 'Características de la madre' (Tabla III.1). Los sistemas que satisfacen los requisitos de tabulación de ONU DESA Rev. 3 pueden derivar la categoría estadística 'madre' asignando parental_role: gestacional a 'madre'. Este es un campo auxiliar de tabulación estadística, no una afirmación de modelado de que solo un progenitor es 'madre' o de que la parentalidad esté determinada por el género."

