id: domicile
maturity: trial-use

definition:
  en: "The place that the person treats as their permanent home, which may differ from the address of their current household."
  fr: "Le lieu que la personne considere comme son domicile permanent, qui peut differer de l'adresse de son menage actuel."
  es: "El lugar que la persona considera como su domicilio permanente, que puede diferir de la direccion de su hogar actual."

type: concept:Address
cardinality: single
vocabulary: null
references: null
schema_org_equivalent: null

