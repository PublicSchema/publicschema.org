id: domicile
maturity: candidate

definition:
  en: "The place that the person treats as their permanent home, which may differ from the address of their current household."
  fr: "Le lieu que la personne considère comme son domicile permanent, qui peut différer de l'adresse de son ménage actuel."
  es: "El lugar que la persona considera su domicilio permanente, el cual puede diferir de la dirección de su hogar actual."

type: concept:Address
cardinality: single
vocabulary: null
references: null
category: contact
schema_org_equivalent: null

