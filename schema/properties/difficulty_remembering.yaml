id: difficulty_remembering
maturity: draft

definition:
  en: "The degree of difficulty the person experiences remembering things. This is one of two properties that together cover the cognitive domain measured by the WG-SS difficulty_cognition property, which bundles remembering and concentrating into a single question."
  fr: "Le degré de difficulté que la personne éprouve à se souvenir des choses. Cette propriété est l'une des deux qui couvrent ensemble le domaine cognitif mesuré par la propriété WG-SS difficulty_cognition, laquelle regroupe la mémoire et la concentration en une seule question."
  es: "El grado de dificultad que la persona experimenta para recordar cosas. Esta es una de dos propiedades que juntas cubren el dominio cognitivo medido por la propiedad WG-SS difficulty_cognition, que combina memoria y concentración en una sola pregunta."

type: string
cardinality: single
