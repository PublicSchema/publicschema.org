id: difficulty_remembering
maturity: draft

definition:
  en: "The degree of difficulty the child experiences remembering things. Applies to children ages 5-17 (CFM). Paired with difficulty_concentrating; the WG-SS difficulty_cognition property bundles both into a single question for adults."
  fr: "Le degré de difficulté que l'enfant éprouve à se souvenir des choses. S'applique aux enfants de 5 à 17 ans (CFM). Associé à difficulty_concentrating; la propriété WG-SS difficulty_cognition regroupe les deux en une seule question pour les adultes."
  es: "El grado de dificultad que el niño experimenta para recordar cosas. Se aplica a niños de 5 a 17 años (CFM). Se combina con difficulty_concentrating; la propiedad WG-SS difficulty_cognition agrupa ambos en una sola pregunta para adultos."

