id: patronymic_name
maturity: normative
label:
  en: "Patronymic name"
  fr: "Nom patronymique"
  es: "Nombre patronímico"

definition:
  en: "A name derived from the given name of the person's father or a paternal ancestor, used in naming conventions where patronymics are a distinct component of a person's full name."
  fr: "Un nom dérivé du prénom du père de la personne ou d'un ancêtre paternel, utilisé dans les conventions de dénomination où les patronymes constituent un élément distinct du nom complet."
  es: "Un nombre derivado del nombre de pila del padre de la persona o de un antepasado paterno, utilizado en convenciones de denominación donde los patronímicos son un componente distinto del nombre completo."

type: string
cardinality: single
vocabulary: null
references: null
category: identity
schema_org_equivalent: null

external_equivalents:
  semic:
    label: "patronymicName"
    uri: "http://www.w3.org/ns/person#patronymicName"
    match: exact
    vocabulary: "Core Person"

  dci:
    label: "second_name"
    uri: "https://schema.spdci.org/core/v1/data/second_name"
    match: broad
    vocabulary: "DCI Core"
    note: "DCI 'second_name' covers middle names broadly; patronymics are a specific naming convention not modeled by DCI"
convergence:
  system_count: 0
  total_systems: 6
  notes: "Not present in original convergence systems. Added based on EBSI PID/PDA1/ELM schema analysis."
